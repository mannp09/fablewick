r at dusk, a hushed crowd, soft lanterns", "Old Kabir at peace, devotees gathered close", "Hindu and Muslim followers on either side of the white shroud", "Careful hands lift the white cloth, the crowd leaning in", "Beneath the cloth — only a heap of glowing flowers", "The two groups each gather half the flowers, reconciled"], "title": {"en": "The Flowers Under the Cloth", "gu": "કપડા નીચેનાં ફૂલ", "hi": "कपड़े के नीचे के फूल"}, "moral": {"en": "Love unites what quarrels divide; the saint belonged to everyone.", "gu": "પ્રેમ એને જોડે છે જેને ઝઘડા વહેંચી નાખે છે; સંત સૌનો હતો.", "hi": "प्रेम उसे जोड़ता है जिसे झगड़े बाँट देते हैं; संत सबका था।"}, "levels": {"kids": {"en": ["In a small town long ago, there lived an old weaver named Kabir. His beard was white as cotton, and his hands were soft and slow.", "People came to sit close to him. They loved his quiet voice and his gentle songs.", "One evening, when the lanterns glowed warm and orange, old Kabir lay down to rest. He smiled at his friends. Then he was still, and he was at peace.", "His friends grew sad. And then, softly, his friends began to fuss.", "\"We will say goodbye one way,\" said some, standing on this side of a clean white cloth.", "\"We will say goodbye our way,\" said the others, standing on that side.", "They frowned a little. They did not agree.", "\"Let us look at him one last time,\" someone said. \"Let us lift the cloth.\"", "Slow, careful hands lifted the white cloth up. Everyone leaned in close. Everyone held their breath.", "And under the cloth — there was no Kabir at all.", "Only flowers! A soft, sweet heap of flowers. Orange ones, red ones, glowing in the dim lantern light.", "\"Oh,\" whispered the crowd. \"Oh.\"", "Nobody frowned now. Nobody fussed. This side gathered some flowers. That side gathered some flowers. Each one carried the blossoms home, soft and precious in their hands.", "And outside, the dark sky was slowly turning gold."], "gu": ["બહુ વખત પહેલાં, એક નાનકડા ગામમાં કબીર નામે એક વૃદ્ધ વણકર રહેતો હતો. એની દાઢી રૂ જેવી સફેદ હતી, અને એના હાથ નરમ અને ધીમા હતા.", "લોકો એની પાસે બેસવા આવતા. એમને એનો શાંત અવાજ અને એનાં મીઠાં ગીત બહુ ગમતાં.", "એક સાંજે, જ્યારે દીવા હૂંફાળા નારંગી રંગે ઝગમગતા હતા, ત્યારે વૃદ્ધ કબીર આરામ કરવા સૂઈ ગયો. એ પોતાના મિત્રો સામે હસ્યો. પછી એ સ્થિર થઈ ગયો, અને શાંતિમાં ભળી ગયો.", "એના મિત્રો ઉદાસ થઈ ગયા. અને પછી, ધીમેથી, એના મિત્રો ઝઘડવા લાગ્યા.", "\"અમે એક રીતે વિદાય આપીશું,\" એક સફેદ સ્વચ્છ કપડાની આ બાજુ ઊભા રહીને કેટલાક બોલ્યા.", "\"અમે અમારી રીતે વિદાય આપીશું,\" બીજી બાજુ ઊભા રહીને બીજાઓ બોલ્યા.", "એ થોડા ભવાં ચઢાવ્યાં. એમની વચ્ચે સહમતી ન થઈ.", "\"ચાલો, એને છેલ્લી વાર જોઈ લઈએ,\" કોઈ બોલ્યું. \"ચાલો, કપડું ઊંચું કરીએ.\"", "ધીમા, સંભાળભર્યા હાથોએ સફેદ કપડું ઊંચક્યું. સૌ નજીક ઝૂક્યા. સૌએ શ્વાસ રોકી રાખ્યો.", "અને કપડા નીચે — ત્યાં કબીર હતો જ નહીં.", "માત્ર ફૂલ! ફૂલોનો એક નરમ, મીઠો ઢગલો. નારંગી, લાલ, મંદ દીવાના પ્રકાશમાં ઝગમગતા.", "\"ઓહ,\" ભીડ ધીમેથી બોલી. \"ઓહ.\"", "હવે કોઈએ ભવાં ન ચઢાવ્યાં. કોઈ ઝઘડ્યું નહીં. આ બાજુએ થોડાં ફૂલ ભેગાં કર્યાં. પેલી બાજુએ થોડાં ફૂલ ભેગાં કર્યાં. દરેક જણ ફૂલોને નરમ અને કિંમતી રીતે હાથમાં લઈને ઘરે લઈ ગયો.", "અને બહાર, અંધારું આકાશ ધીમે ધીમે સોનેરી થઈ રહ્યું હતું."], "hi": ["बहुत समय पहले, एक छोटे-से कस्बे में कबीर नाम का एक बूढ़ा जुलाहा रहता था। उसकी दाढ़ी रुई जैसी सफ़ेद थी, और उसके हाथ नरम और धीमे थे।", "लोग उसके पास बैठने आते थे। उन्हें उसकी शांत आवाज़ और उसके मीठे गीत बहुत भाते थे।", "एक शाम, जब लालटेनें गरमाहट भरी नारंगी रोशनी में जगमगा रही थीं, बूढ़ा कबीर आराम करने के लिए लेट गया। वह अपने दोस्तों की ओर देखकर मुस्कुराया। फिर वह शांत हो गया, और चैन में समा गया।", "उसके दोस्त उदास हो गए। और फिर, धीरे से, उसके दोस्त आपस में उलझने लगे।", "\"हम एक तरीके से विदा देंगे,\" एक साफ़ सफ़ेद कपड़े की इस ओर खड़े होकर कुछ लोग बोले।", "\"हम अपने तरीके से विदा देंगे,\" उस ओर खड़े होकर दूसरे बोले।", "उन्होंने थोड़ी भौंहें चढ़ाईं। उनमें सहमति नहीं हुई।", "\"चलो, उसे आख़िरी बार देख लें,\" किसी ने कहा। \"चलो, कपड़ा उठाएँ।\"", "धीमे, सावधान हाथों ने सफ़ेद कपड़ा उठाया। सब पास झुक आए। सबने अपनी साँस रोक ली।", "और कपड़े के नीचे — वहाँ कबीर था ही नहीं।", "सिर्फ़ फूल! फूलों का एक नरम, मीठा ढेर। नारंगी, लाल, मद्धम लालटेन की रोशनी में जगमगाते हुए।", "\"ओह,\" भीड़ धीरे से बोली। \"ओह।\"", "अब किसी ने भौंहें नहीं चढ़ाईं। कोई नहीं उलझा। इस ओर वालों ने कुछ फूल समेटे। उस ओर वालों ने कुछ फूल समेटे। हर कोई फूलों को नरम और अनमोल समझकर हाथों में लिए घर ले गया।", "और बाहर, अँधेरा आसमान धीरे-धीरे सुनहरा होता जा रहा था।"]}, "adults": {"en": ["In a town where the roads ran red with dust and the marketplace rang with a hundred voices, there lived an old weaver named Kabir. All his long life, his hands had known the loom. Back and forth went the shuttle, back and forth, and the threads became cloth. But as he worked, something else was being woven too — songs. Little verses about love, and about the one great heart he believed lived inside everyone, no matter what name they called it by.", "People came from all corners to sit in the shade by his door. Some wore robes of deep saffron and bright marks upon their foreheads. Others wore simple caps and bowed their heads to pray in their own fashion. They were neighbors, but they did not always understand one another, and sometimes they argued in the market over whose way was right.", "Yet when Kabir began to sing, a curious thing happened. The arguing stopped. Saffron robe and simple cap sat down together in the dust, shoulder to shoulder, and listened — because his songs did not seem to belong to one side or the other. They belonged to whoever was listening.", "The years passed, as years do. Kabir's back bent like a question mark, and his beard turned as white as the cotton on his spindle. His voice grew thin, but the people leaned closer to catch every word, the way you lean toward a small fire on a cold night.", "Then came an evening soft with the smell of oil lamps. The lanterns were being lit one by one, and dusk lay over the town like a blue shawl. Kabir lay down among his friends, looked around at their faces, and smiled as though he had finished a very long and very beautiful piece of cloth. He closed his eyes. And gently, the way the loom goes still at the end of a day's work, he was at peace, and he did not wake again.", "His friends drew a clean white cloth over him. For a while they only sat, the lantern light trembling on their wet cheeks, too full of sorrow for words.", "But sorrow, when it has nowhere to go, can curdle into quarreling. And so it did.", "\"He was one of us,\" said an elder in saffron, his voice cracking. \"We must honor him the way our fathers taught us — we will return him to the fire.\"", "\"No,\" said a man in a simple cap, just as gently and just as firmly. \"He prayed beside us. He was one of us. We must lay him in the cool earth, as our fathers taught.\"", "\"The fire,\" insisted one side. \"The earth,\" insisted the other. Back and forth the voices went — not cruel, never cruel, but tight and trembling, because each side loved the old weaver so fiercely that the thought of letting the other side decide felt like losing him twice. Their hands knotted. Their eyes shone. And the white cloth lay between them like a small still island in a rising sea.", "It was a child, perhaps, or the quietest grandmother in the room — someone who had not yet said a word — who finally spoke. \"Wait,\" came the small voice. \"We are quarreling over him while he lies right here. Before we decide anything, let us lift the cloth and look upon his face one more time.\"", "The room went still. Even the loudest among them had to admit this was only right. So the hands that reached for the cloth were careful — careful as Kabir's own hands had been at the loom. The whole crowd pressed in close, holding its breath, saffron and cap and child all leaning toward the same small space, as the white cloth was slowly, slowly lifted away.", "And there was no weaver beneath it at all.", "Where the old man had lain, there was only flowers — a great, soft heap of them. Marigolds the deep orange of a setting sun. Roses red as a beating heart. Petals upon petals, fresh as morning, as though the garden itself had come to lie down in his place. And, though no one could ever quite explain it after, they seemed to glow, casting a warm and gentle light up onto every astonished face, and their sweetness filled the room until it pushed the sorrow right out the open door.", "No one spoke. What was there to say? The fire and the earth, the saffron and the cap, all the careful reasons each side had clutched so tightly — they simply slipped from everyone's hands, like a knot coming loose.", "At last the old man in saffron and the man in the simple cap looked across the flowers at one another. And slowly, both of them smiled, the way you smile when you have been worrying about the wrong thing all along.", "So they shared him. With hands as tender as if they were lifting a sleeping baby, the people in saffron gathered up half the flowers. The people in caps gathered up the other half. Each one cupped the blossoms close, and you could not have said, watching them go, which person belonged to which side — only that every single one of them carried the same orange and the same red, pressed gently to their chests.", "And as they stepped out of the little house into the wide night, they saw that the sky had already begun to change. The deep blue of dusk was thinning at its edge, warming, brightening — the first pale gold of dawn rising over the rooftops. Half the flowers would go to the fire. Half would go to the earth.", "But where, then, had the old weaver gone — the man who had belonged to no one, because he had belonged to them all?"], "gu": ["જ્યાં રસ્તાઓ ધૂળથી લાલ હતા અને બજાર સો અવાજોથી ગૂંજતું હતું, એવા એક ગામમાં કબીર નામે એક વૃદ્ધ વણકર રહેતો હતો. એના આખા લાંબા જીવનમાં, એના હાથ સાળ-લૂમને ઓળખતા હતા. શટલ આગળ-પાછળ જતું, આગળ-પાછળ, અને દોરા કાપડ બની જતા. પણ જ્યારે એ કામ કરતો, ત્યારે કંઈક બીજું પણ વણાતું હતું — ગીતો. પ્રેમ વિશેનાં નાનાં પદ, અને એ એક મહાન હૃદય વિશે જે, એ માનતો, દરેકની અંદર વસે છે, ભલે લોકો એને ગમે તે નામે બોલાવે.", "લોકો ચારે દિશાઓથી એના બારણા પાસેની છાંયડીમાં બેસવા આવતા. કેટલાક ઘેરા કેસરી વસ્ત્રો અને કપાળ પર ચળકતાં ચિહ્નો પહેરતા. બીજાઓ સાદી ટોપીઓ પહેરતા અને પોતાની રીતે માથું નમાવી પ્રાર્થના કરતા. એ પડોશીઓ હતા, પણ એ હંમેશાં એકબીજાને સમજતા નહીં, અને ક્યારેક બજારમાં કોની રીત સાચી છે એ વાતે ઝઘડતા.", "છતાં જ્યારે કબીર ગાવા લાગતો, ત્યારે એક અજબ વાત બનતી. ઝઘડો અટકી જતો. કેસરી વસ્ત્ર અને સાદી ટોપી સાથે ધૂળમાં બેસી જતા, ખભે ખભો મેળવી, અને સાંભળતા — કેમ કે એનાં ગીત જાણે કોઈ એક પક્ષનાં નહોતાં. એ તો જે સાંભળે એનાં હતાં.", "વર્ષો વીત્યાં, જેમ વર્ષો વીતે છે. કબીરની પીઠ પ્રશ્નચિહ્ન જેવી વળી ગઈ, અને એની દાઢી એની ત્રાક પરના રૂ જેવી સફેદ થઈ ગઈ. એનો અવાજ ધીમો પડ્યો, પણ લોકો દરેક શબ્દ ઝીલવા વધુ નજીક ઝૂકતા, જેમ ઠંડી રાતે કોઈ નાની આગ તરફ ઝૂકે છે.", "પછી એક સાંજ આવી, દીવાની તેલની સુગંધથી મૃદુ. દીવા એક પછી એક પ્રગટાવાતા હતા, અને સંધ્યા ગામ પર વાદળી શાલની જેમ પથરાઈ હતી. કબીર પોતાના મિત્રો વચ્ચે સૂઈ ગયો, સૌના ચહેરા તરફ જોયું, અને એમ હસ્યો જાણે એણે કોઈ બહુ લાંબું અને બહુ સુંદર કાપડ પૂરું કર્યું હોય. એણે આંખો બંધ કરી. અને ધીમેથી, જેમ દિવસના કામના અંતે સાળ સ્થિર થઈ જાય, એ શાંતિમાં ભળી ગયો, અને ફરી જાગ્યો નહીં.", "એના મિત્રોએ એના પર સ્વચ્છ સફેદ કપડું ઢાંક્યું. થોડી વાર એ ફક્ત બેસી રહ્યા, દીવાનો પ્રકાશ એમના ભીના ગાલ પર ધ્રૂજતો, શબ્દો માટે દુઃખથી બહુ ભરેલા.", "પણ દુઃખને જ્યારે ક્યાંય જગ્યા ન મળે, ત્યારે એ ઝઘડામાં ફેરવાઈ જાય છે. અને એમ જ થયું.", "\"એ અમારામાંનો એક હતો,\" એક કેસરી-વસ્ત્રધારી વડીલ બોલ્યો, એનો અવાજ તૂટતો હતો. \"અમારે એને એ રીતે માન આપવું જોઈએ જે અમારા વડવાઓએ શીખવ્યું — અમે એને અગ્નિને સોંપીશું.\"", "\"ના,\" એક સાદી ટોપીવાળો માણસ બોલ્યો, એટલી જ નરમાશથી અને એટલી જ દૃઢતાથી. \"એ અમારી પાસે પ્રાર્થના કરતો. એ અમારામાંનો એક હતો. અમારે એને ઠંડી ધરતીમાં દફનાવવો જોઈએ, જેમ અમારા વડવાઓએ શીખવ્યું.\"", "\"અગ્નિ,\" એક પક્ષે જિદ કરી. \"ધરતી,\" બીજાએ જિદ કરી. અવાજો આગળ-પાછળ ગયા — ક્રૂર નહીં, કદી ક્રૂર નહીં, પણ તંગ અને ધ્રૂજતા, કેમ કે દરેક પક્ષ વૃદ્ધ વણકરને એટલા તીવ્રતાથી ચાહતો કે બીજાને નિર્ણય લેવા દેવાનો વિચાર એને બે વાર ગુમાવવા જેવો લાગતો. એમના હાથ ગૂંથાઈ ગયા. એમની આંખો ચળકતી હતી. અને સફેદ કપડું એમની વચ્ચે ચઢતા સમુદ્રમાંના એક નાના સ્થિર ટાપુની જેમ પડ્યું હતું.", "કદાચ એક બાળક, અથવા ઓરડામાંની સૌથી શાંત દાદીમા — જે હજુ સુધી એક શબ્દ બોલ્યું નહોતું — એ આખરે બોલ્યું. \"રોકાઓ,\" એ ધીમો અવાજ આવ્યો. \"એ અહીં જ સૂતો છે ને આપણે એને માટે ઝઘડીએ છીએ. કંઈ પણ નક્કી કરતાં પહેલાં, ચાલો કપડું ઊંચું કરી એનો ચહેરો વધુ એક વાર જોઈ લઈએ.\"", "ઓરડો સ્થિર થઈ ગયો. એમાંના સૌથી મોટેથી બોલનારાએ પણ સ્વીકારવું પડ્યું કે આ જ યોગ્ય છે. તેથી કપડા તરફ વધેલા હાથ સંભાળભર્યા હતા — એટલા જ સંભાળભર્યા જેટલા કબીરના પોતાના હાથ સાળ પર હતા. આખી ભીડ નજીક દબાઈ, શ્વાસ રોકીને, કેસરી ને ટોપી ને બાળક સૌ એ જ નાની જગ્યા તરફ ઝૂકતા, જ્યારે સફેદ કપડું ધીમે, ધીમે ઊંચકાઈ ગયું.", "અને એની નીચે કોઈ વણકર હતો જ નહીં.", "જ્યાં વૃદ્ધ માણસ સૂતો હતો, ત્યાં માત્ર ફૂલ હતાં — એમનો એક મોટો, નરમ ઢગલો. આથમતા સૂરજ જેવી ઘેરી નારંગી ગલગોટા. ધડકતા હૃદય જેવા લાલ ગુલાબ. પાંખડી પર પાંખડી, સવાર જેવી તાજી, જાણે બાગ પોતે જ એની જગ્યાએ સૂઈ જવા આવ્યો હોય. અને, ભલે પછી કોઈ એ ક્યારેય બરાબર સમજાવી ન શક્યું, એ જાણે ઝગમગતાં હતાં, દરેક આશ્ચર્યચકિત ચહેરા પર હૂંફાળો અને કોમળ પ્રકાશ ફેંકતાં, અને એમની મીઠાશે ઓરડો એવો ભરી દીધો કે દુઃખને છેક ખુલ્લા બારણા બહાર ધકેલી દીધું.", "કોઈ બોલ્યું નહીં. કહેવા જેવું હતું પણ શું? અગ્નિ ને ધરતી, કેસરી ને ટોપી, દરેક પક્ષે જે સંભાળભર્યા કારણો એટલા કસીને પકડ્યાં હતાં — એ બધાં જાણે ગાંઠ ઢીલી થાય તેમ સૌના હાથમાંથી સરકી ગયાં.", "આખરે કેસરી-વસ્ત્રધારી વૃદ્ધ અને સાદી ટોપીવાળો માણસ ફૂલોની આરપાર એકબીજા સામે જોઈ રહ્યા. અને ધીમેથી, બંને હસ્યા, એ રીતે જેમ તમે ત્યારે હસો છો જ્યારે તમે આટલો વખત ખોટી વાતની ચિંતા કરી રહ્યા હો.", "તેથી એમણે એને વહેંચ્યો. સૂતેલા બાળકને ઊંચકતા હો એટલા કોમળ હાથોથી, કેસરી-વસ્ત્રધારીઓએ અડધાં ફૂલ ભેગાં કર્યાં. ટોપીવાળાઓએ બાકીનાં અડધાં ભેગાં કર્યાં. દરેકે ફૂલોને છાતી પાસે ઝીલ્યાં, અને એમને જતા જોઈને તમે કહી ન શકો કે કયો માણસ કયા પક્ષનો છે — માત્ર એટલું કે દરેકે દરેક એ જ નારંગી ને એ જ લાલ, છાતી સરસાં દબાવીને લઈ જતો હતો.", "અને જ્યારે એ નાનકડા ઘરમાંથી નીકળી વિશાળ રાતમાં પગ મૂક્યો, ત્યારે એમણે જોયું કે આકાશ પહેલેથી જ બદલાવા લાગ્યું હતું. સંધ્યાનો ઘેરો વાદળી રંગ એની કિનારે પાતળો પડતો, હૂંફાળો થતો, ઊજળો થતો — પ્રભાતનું પહેલું આછું સોનું છાપરાં પર ઊગતું. અડધાં ફૂલ અગ્નિ પાસે જશે. અડધાં ધરતી પાસે જશે.", "પણ તો પછી, એ વૃદ્ધ વણકર ક્યાં ગયો — એ માણસ જે કોઈનો નહોતો, કેમ કે એ સૌનો હતો?"], "hi": ["जहाँ सड़कें धूल से लाल थीं और बाज़ार सौ आवाज़ों से गूँजता था, ऐसे एक कस्बे में कबीर नाम का एक बूढ़ा जुलाहा रहता था। अपने पूरे लंबे जीवन में, उसके हाथ करघे को जानते थे। ढरकी आगे-पीछे जाती, आगे-पीछे, और धागे कपड़ा बन जाते। पर जब वह काम करता, तब कुछ और भी बुना जाता था — गीत। प्रेम के छोटे-छोटे पद, और उस एक महान हृदय के बारे में जो, उसकी मान्यता थी, हर किसी के भीतर बसता है, चाहे लोग उसे किसी भी नाम से पुकारें।", "लोग चारों कोनों से उसके दरवाज़े के पास की छाँव में बैठने आते। कुछ गहरे केसरिया वस्त्र और माथे पर चमकीले निशान पहनते। दूसरे सादी टोपियाँ पहनते और अपने तरीके से सिर झुकाकर प्रार्थना करते। वे पड़ोसी थे, पर हमेशा एक-दूसरे को समझते नहीं थे, और कभी-कभी बाज़ार में इस बात पर झगड़ते कि किसका तरीका सही है।", "फिर भी जब कबीर गाने लगता, तब एक अजीब बात होती। झगड़ा रुक जाता। केसरिया वस्त्र और सादी टोपी साथ-साथ धूल में बैठ जाते, कंधे से कंधा मिलाकर, और सुनते — क्योंकि उसके गीत मानो किसी एक पक्ष के नहीं थे। वे तो जो सुनता, उसके थे।", "साल बीतते गए, जैसे साल बीतते हैं। कबीर की पीठ प्रश्नचिह्न-सी झुक गई, और उसकी दाढ़ी उसकी तकली पर लगी रुई जैसी सफ़ेद हो गई। उसकी आवाज़ धीमी पड़ी, पर लोग हर शब्द को झेलने और पास झुक आते, जैसे ठंडी रात में कोई छोटी आग की ओर झुकता है।", "फिर एक शाम आई, दीयों के तेल की महक से कोमल। लालटेनें एक-एक कर जलाई जा रही थीं, और साँझ कस्बे पर नीली शॉल-सी फैली थी। कबीर अपने दोस्तों के बीच लेट गया, सबके चेहरों की ओर देखा, और ऐसे मुस्कुराया मानो उसने कोई बहुत लंबा और बहुत सुंदर कपड़ा पूरा कर लिया हो। उसने आँखें मूँद लीं। और धीरे से, जैसे दिन के काम के अंत में करघा थम जाता है, वह चैन में समा गया, और फिर नहीं जागा।", "उसके दोस्तों ने उस पर एक साफ़ सफ़ेद कपड़ा ढक दिया। कुछ देर वे बस बैठे रहे, लालटेन की रोशनी उनके भीगे गालों पर काँपती हुई, शब्दों के लिए दुःख से बहुत भरे हुए।", "पर दुःख को जब कहीं जगह नहीं मिलती, तब वह झगड़े में बदल जाता है। और ऐसा ही हुआ।", "\"वह हम में से एक था,\" एक केसरिया-वस्त्रधारी बुज़ुर्ग बोला, उसकी आवाज़ टूट रही थी। \"हमें उसे उसी तरह सम्मान देना चाहिए जैसा हमारे पुरखों ने सिखाया — हम उसे अग्नि को सौंपेंगे।\"", "\"नहीं,\" एक सादी टोपी वाला आदमी बोला, उतनी ही नरमी से और उतनी ही दृढ़ता से। \"वह हमारे साथ प्रार्थना करता था। वह हम में से एक था। हमें उसे ठंडी धरती में सुलाना चाहिए, जैसा हमारे पुरखों ने सिखाया।\"", "\"अग्नि,\" एक पक्ष ने ज़िद की। \"धरती,\" दूसरे ने ज़िद की। आवाज़ें आगे-पीछे गईं — क्रूर नहीं, कभी क्रूर नहीं, पर तनी हुई और काँपती, क्योंकि हर पक्ष बूढ़े जुलाहे को इतनी तीव्रता से चाहता था कि दूसरे को निर्णय लेने देने का ख़याल उसे दो बार खोने जैसा लगता। उनके हाथ गुँथ गए। उनकी आँखें चमक उठीं। और सफ़ेद कपड़ा उनके बीच चढ़ते समुद्र में एक छोटे शांत टापू-सा पड़ा था।", "शायद कोई बच्चा, या कमरे की सबसे शांत दादी — जो अब तक एक शब्द नहीं बोली थी — आख़िर बोल पड़ी। \"रुको,\" वह धीमी आवाज़ आई। \"वह यहीं तो लेटा है, और हम उसके लिए झगड़ रहे हैं। कुछ भी तय करने से पहले, चलो कपड़ा उठाकर उसका चेहरा एक बार और देख लें।\"", "कमरा थम गया। उनमें सबसे ज़ोर से बोलने वाले को भी मानना पड़ा कि यही उचित है। तो कपड़े की ओर बढ़े हाथ सावधान थे — उतने ही सावधान जितने कबीर के अपने हाथ करघे पर रहते थे। पूरी भीड़ पास सिमट आई, साँस रोके, केसरिया और टोपी और बच्चा सब उसी छोटी जगह की ओर झुकते, जब सफ़ेद कपड़ा धीरे, धीरे उठा लिया गया।", "और उसके नीचे कोई जुलाहा था ही नहीं।", "जहाँ बूढ़ा आदमी लेटा था, वहाँ सिर्फ़ फूल थे — उनका एक बड़ा, नरम ढेर। ढलते सूरज की गहरी नारंगी गेंदे। धड़कते दिल जैसे लाल गुलाब। पंखुड़ी पर पंखुड़ी, सुबह-सी ताज़ा, मानो बाग़ ख़ुद उसकी जगह लेटने आ गया हो। और, चाहे बाद में कोई इसे ठीक से समझा न सका, वे मानो जगमगा रहे थे, हर हैरान चेहरे पर गरम और कोमल रोशनी फेंकते, और उनकी मिठास ने कमरे को ऐसे भर दिया कि दुःख को सीधे खुले दरवाज़े के बाहर धकेल दिया।", "कोई नहीं बोला। कहने को था भी क्या? अग्नि और धरती, केसरिया और टोपी, हर पक्ष ने जो सावधान कारण इतनी कसकर पकड़े थे — वे सब मानो गाँठ ढीली होने की तरह सबके हाथों से फिसल गए।", "आख़िर केसरिया-वस्त्रधारी बूढ़ा और सादी टोपी वाला आदमी फूलों के आर-पार एक-दूसरे को देखते रहे। और धीरे से, दोनों मुस्कुराए, उस तरह जैसे आप तब मुस्कुराते हैं जब आप इतनी देर से ग़लत बात की चिंता कर रहे होते हैं।", "तो उन्होंने उसे बाँट लिया। सोते हुए बच्चे को उठाने जैसे कोमल हाथों से, केसरिया-वस्त्रधारियों ने आधे फूल समेटे। टोपी वालों ने बाकी आधे समेटे। हर किसी ने फूलों को छाती से लगाया, और उन्हें जाते देख आप कह न पाते कि कौन आदमी किस पक्ष का है — बस इतना कि हर एक वही नारंगी और वही लाल, छाती से सटाए लिए जा रहा था।", "और जब वे उस छोटे घर से निकलकर विशाल रात में पाँव रखते, तब उन्होंने देखा कि आसमान पहले ही बदलने लगा था। साँझ का गहरा नीला उसके किनारे पतला पड़ता, गरमाता, उजला होता — भोर का पहला हल्का सोना छतों पर उगता हुआ। आधे फूल अग्नि के पास जाएँगे। आधे धरती के पास।", "पर तब वह बूढ़ा जुलाहा कहाँ गया — वह आदमी जो किसी का नहीं था, क्योंकि वह सबका था?"]}, "seniors": {"en": ["In a town of dusty roads and crowded markets, there once lived an old weaver named Kabir. All his days his hands moved upon the loom, back and forth, and as the cloth grew under his fingers, songs grew too — gentle verses about love, and about the one great heart he believed dwelt in every living soul, by whatever name it was called.", "People came from every direction to sit in the shade by his door. Some wore robes of saffron and marks upon their brows; others wore simple caps and bowed their heads to pray in their own way. They were neighbors who did not always agree. Yet when Kabir sang, the quarrels fell silent, and saffron and cap sat together in the dust, shoulder to shoulder — for his songs belonged to no single side, but to whoever had ears to listen.", "The years passed gently. His back bent, his beard turned white as cotton, his voice grew soft. But the people only leaned in closer, the way one leans toward a small warm fire on a winter's night.", "Then came an evening fragrant with oil lamps, the dusk lying over the town like a blue shawl. Among his friends Kabir lay down, looked once at their dear faces, and smiled — as a weaver smiles who has finished a long and beautiful cloth. He closed his eyes, and as quietly as a loom falls still at the end of the day, he came to rest, and did not wake.", "His friends drew a clean white cloth over him and sat in their sorrow. But grief, having nowhere to go, slipped into quarreling.", "\"He was one of us,\" said an elder in saffron, his voice trembling. \"We must honor him with the fire, as our fathers taught.\" \"No — he prayed beside us,\" said a man in a simple cap, gentle and firm. \"We must lay him in the cool earth.\" Back and forth they went, never cruel, only trembling — for each loved the old man so dearly that to yield felt like losing him twice. And the white cloth lay between them like a still island in a rising sea.", "Then a small voice — a child's, perhaps, or the quietest grandmother's — spoke at last. \"We quarrel over him while he lies right here. Before we decide, let us lift the cloth and look upon his face one more time.\"", "The room grew still, for even the loudest knew this was right. Careful hands — careful as Kabir's own at the loom — reached for the cloth, and the whole crowd pressed close, holding its breath, as it was slowly lifted away.", "And beneath it there was no weaver at all.", "Where the old man had lain, there lay only flowers — a great soft heap of them. Marigolds orange as the setting sun, roses red as a beating heart, fresh as the dawn, as though the garden itself had come to rest in his place. And they seemed to glow, and their sweetness filled the room until the sorrow was gently pushed out the open door.", "No one spoke. The fire and the earth, the saffron and the cap, all the reasons each side had clutched so tightly — they loosened, like a knot coming undone. The old man in saffron and the man in the simple cap looked across the flowers at one another, and slowly both of them smiled — the way one smiles upon seeing, at last, that the quarrel was never the thing that mattered.", "So they shared him. With hands as tender as if lifting a sleeping child, those in saffron gathered half the flowers, and those in caps the other half. Each held the blossoms to the heart, and watching them go, you could not have told which belonged to which side — only that every one carried the same orange and the same red.", "And as they stepped into the wide night, the sky had already begun to change: the deep blue of dusk thinning at its edge, warming toward the first pale gold of dawn. Half the flowers would go to the fire, and half to the earth.", "But where, then, had the old weaver gone — the man who had belonged to no one, because he had belonged to them all?"], "gu": ["ધૂળિયા રસ્તા અને ભીડભર્યા બજારોવાળા એક ગામમાં, એક વાર કબીર નામે એક વૃદ્ધ વણકર રહેતો હતો. એના સૌ દિવસોમાં, એના હાથ સાળ પર ફરતા, આગળ-પાછળ, અને જેમ આંગળીઓ નીચે કાપડ ઊગતું, તેમ ગીતો પણ ઊગતાં — પ્રેમ વિશેનાં કોમળ પદ, અને એ એક મહાન હૃદય વિશે જે, એ માનતો, દરેક જીવમાં વસે છે, એને ભલે ગમે તે નામે બોલાવાય.", "લોકો ચારે દિશાઓથી એના બારણા પાસેની છાંયડીમાં બેસવા આવતા. કેટલાક કેસરી વસ્ત્રો અને કપાળ પર ચિહ્નો પહેરતા; બીજાઓ સાદી ટોપીઓ પહેરી પોતાની રીતે માથું નમાવી પ્રાર્થના કરતા. એ પડોશીઓ હતા જે હંમેશાં સહમત નહોતા થતા. છતાં જ્યારે કબીર ગાતો, ત્યારે ઝઘડા શાંત થઈ જતા, અને કેસરી ને ટોપી ધૂળમાં સાથે બેસતા, ખભે ખભો મેળવી — કેમ કે એનાં ગીત કોઈ એક પક્ષનાં નહોતાં, પણ જેને સાંભળવાના કાન હોય એનાં હતાં.", "વર્ષો ધીમેથી વીત્યાં. એની પીઠ વળી, એની દાઢી રૂ જેવી સફેદ થઈ, એનો અવાજ કોમળ થયો. પણ લોકો ફક્ત વધુ નજીક ઝૂકતા, જેમ શિયાળાની રાતે કોઈ નાની હૂંફાળી આગ તરફ ઝૂકે છે.", "પછી એક સાંજ આવી, દીવાની તેલની સુગંધભરી, સંધ્યા ગામ પર વાદળી શાલની જેમ પથરાયેલી. પોતાના મિત્રો વચ્ચે કબીર સૂઈ ગયો, એમના વહાલા ચહેરા તરફ એક વાર જોયું, અને હસ્યો — જેમ લાંબું ને સુંદર કાપડ પૂરું કરનાર વણકર હસે. એણે આંખો બંધ કરી, અને જેમ દિવસના અંતે સાળ સ્થિર થાય એટલી શાંતિથી, એ વિશ્રામમાં ભળી ગયો, અને જાગ્યો નહીં.", "એના મિત્રોએ એના પર સ્વચ્છ સફેદ કપડું ઢાંક્યું અને દુઃખમાં બેઠા. પણ શોકને જ્યાં જગ્યા ન મળી, ત્યાં એ ઝઘડામાં સરકી ગયો.", "\"એ અમારામાંનો એક હતો,\" એક કેસરી વડીલ ધ્રૂજતા અવાજે બોલ્યો. \"અમારે એને અગ્નિથી માન આપવું જોઈએ, જેમ વડવાઓએ શીખવ્યું.\" \"ના — એ અમારી પાસે પ્રાર્થના કરતો,\" એક સાદી ટોપીવાળો માણસ બોલ્યો, નરમ ને દૃઢ. \"અમારે એને ઠંડી ધરતીમાં સુવડાવવો જોઈએ, જેમ અમારાએ શીખવ્યું.\" અવાજો આગળ-પાછળ ગયા, કદી ક્રૂર નહીં, માત્ર ધ્રૂજતા, કેમ કે દરેક વૃદ્ધને એટલા વહાલથી ચાહતો કે ઝૂકવું એને બે વાર ગુમાવવા જેવું લાગતું. અને સફેદ કપડું એમની વચ્ચે ચઢતા સમુદ્રમાંના સ્થિર ટાપુની જેમ પડ્યું હતું.", "પછી એક ધીમો અવાજ — કદાચ બાળકનો, અથવા સૌથી શાંત દાદીમાનો — આખરે બોલ્યો. \"એ અહીં જ સૂતો છે ને આપણે એને માટે ઝઘડીએ છીએ. નક્કી કરતાં પહેલાં, ચાલો કપડું ઊંચું કરી એનો ચહેરો વધુ એક વાર જોઈ લઈએ.\"", "ઓરડો સ્થિર થયો, કેમ કે સૌથી મોટેથી બોલનાર પણ જાણતો કે આ યોગ્ય છે. સંભાળભર્યા હાથ — કબીરના સાળ પરના હાથ જેટલા સંભાળભર્યા — કપડા તરફ વધ્યા. આખી ભીડ નજીક દબાઈ, શ્વાસ રોકીને, કેસરી ને ટોપી ને બાળક એ એક નાની જગ્યા તરફ ઝૂકતા, જ્યારે સફેદ કપડું ધીમેથી ઊંચકાઈ ગયું.", "અને એની નીચે કોઈ વણકર હતો જ નહીં.", "જ્યાં વૃદ્ધ માણસ સૂતો હતો, ત્યાં માત્ર ફૂલ પડ્યાં હતાં — એમનો એક મોટો નરમ ઢગલો. આથમતા સૂરજ જેવા નારંગી ગલગોટા, ધડકતા હૃદય જેવા લાલ ગુલાબ, પાંખડી પર પાંખડી, પ્રભાત જેવી તાજી, જાણે બાગ પોતે જ એની જગ્યાએ વિશ્રામ કરવા આવ્યો હોય. અને એ ઝગમગતાં લાગતાં, દરેક આશ્ચર્યચકિત ચહેરા પર હૂંફાળો પ્રકાશ ફેંકતાં, અને એમની મીઠાશે ઓરડો ભરી દીધો ત્યાં સુધી કે શોકને છેક ખુલ્લા બારણા બહાર ધીમેથી ધકેલી દીધો.", "કોઈ બોલ્યું નહીં. અગ્નિ ને ધરતી, કેસરી ને ટોપી, દરેક પક્ષે જે કારણો કસીને પકડ્યાં હતાં — એ ગાંઠ ઢીલી થાય તેમ ઢીલાં થઈ ગયાં. કેસરી વૃદ્ધ અને સાદી ટોપીવાળો માણસ ફૂલોની આરપાર એકબીજા સામે જોઈ રહ્યા, અને ધીમેથી બંને હસ્યા — એ રીતે જેમ આખરે જોઈને હસાય કે ઝઘડો ક્યારેય મહત્ત્વનો હતો જ નહીં.", "તેથી એમણે એને વહેંચ્યો. સૂતેલા બાળકને ઊંચકતા હો એટલા કોમળ હાથોથી, કેસરીવાળાઓએ અડધાં ફૂલ ભેગાં કર્યાં, ને ટોપીવાળાઓએ બાકીનાં અડધાં. દરેકે ફૂલોને હૃદય પાસે ઝીલ્યાં, અને જતા જોઈને કહી ન શકાય કે કોણ કયા પક્ષનો છે — માત્ર એટલું કે દરેક એ જ નારંગી ને એ જ લાલ, છાતી સરસાં દબાવીને લઈ જતો.", "અને જ્યારે એ નાનકડા ઘરમાંથી નીકળી વિશાળ રાતમાં પગ મૂક્યો, ત્યારે આકાશ પહેલેથી જ બદલાવા લાગ્યું હતું: સંધ્યાનો ઘેરો વાદળી રંગ કિનારે પાતળો પડતો, હૂંફાળો ને ઊજળો થતો, પ્રભાતના પહેલા આછા સોના તરફ. અડધાં ફૂલ અગ્નિ પાસે જશે, ને અડધાં ધરતી પાસે.", "પણ તો પછી, એ વૃદ્ધ વણકર ક્યાં ગયો — એ માણસ જે કોઈનો નહોતો, કેમ કે એ સૌનો હતો?"], "hi": ["धूल भरी सड़कों और भीड़ भरे बाज़ारों वाले एक कस्बे में, कभी कबीर नाम का एक बूढ़ा जुलाहा रहता था। अपने सारे दिनों में, उसके हाथ करघे पर चलते, आगे-पीछे, और जैसे उँगलियों के नीचे कपड़ा बढ़ता, वैसे गीत भी बढ़ते — प्रेम के कोमल पद, और उस एक महान हृदय के बारे में जो, उसकी मान्यता थी, हर जीव में बसता है, उसे चाहे किसी भी नाम से पुकारा जाए।", "लोग हर दिशा से उसके दरवाज़े के पास की छाँव में बैठने आते। कुछ केसरिया वस्त्र और माथे पर निशान पहनते; दूसरे सादी टोपियाँ पहन अपने तरीके से सिर झुकाकर प्रार्थना करते। वे पड़ोसी थे जो हमेशा सहमत नहीं होते थे। फिर भी जब कबीर गाता, तब झगड़े शांत हो जाते, और केसरिया और टोपी धूल में साथ बैठते, कंधे से कंधा मिलाकर — क्योंकि उसके गीत किसी एक पक्ष के नहीं थे, बल्कि जिसके पास सुनने को कान हों, उसके थे।", "साल धीरे-धीरे बीते। उसकी पीठ झुकी, उसकी दाढ़ी रुई जैसी सफ़ेद हुई, उसकी आवाज़ कोमल हुई। पर लोग बस और पास झुक आते, जैसे जाड़े की रात में कोई छोटी गरम आग की ओर झुकता है।", "फिर एक शाम आई, दीयों के तेल की महक से भरी, साँझ कस्बे पर नीली शॉल-सी फैली हुई। अपने दोस्तों के बीच कबीर लेट गया, उनके प्यारे चेहरों को एक बार देखा, और मुस्कुराया — जैसे लंबा और सुंदर कपड़ा पूरा करने वाला जुलाहा मुस्कुराता है। उसने आँखें मूँदीं, और जैसे दिन के अंत में करघा थम जाता है उतनी शांति से, वह विश्राम में समा गया, और नहीं जागा।", "उसके दोस्तों ने उस पर साफ़ सफ़ेद कपड़ा ढका और अपने दुःख में बैठे। पर शोक को जब कहीं जगह न मिली, तो वह झगड़े में सरक गया।", "\"वह हम में से एक था,\" एक केसरिया बुज़ुर्ग काँपती आवाज़ में बोला। \"हमें उसे अग्नि से सम्मान देना चाहिए, जैसा पुरखों ने सिखाया।\" \"नहीं — वह हमारे साथ प्रार्थना करता था,\" एक सादी टोपी वाला आदमी बोला, नरम और दृढ़। \"हमें उसे ठंडी धरती में सुलाना चाहिए, जैसा हमारे पुरखों ने सिखाया।\" आवाज़ें आगे-पीछे गईं, कभी क्रूर नहीं, बस काँपती हुई, क्योंकि हर कोई बूढ़े को इतने प्यार से चाहता था कि झुकना उसे दो बार खोने जैसा लगता। और सफ़ेद कपड़ा उनके बीच चढ़ते समुद्र में एक शांत टापू-सा पड़ा था।", "फिर एक धीमी आवाज़ — शायद किसी बच्चे की, या सबसे शांत दादी की — आख़िर बोली। \"वह यहीं तो लेटा है और हम उसके लिए झगड़ रहे हैं। तय करने से पहले, चलो कपड़ा उठाकर उसका चेहरा एक बार और देख लें।\"", "कमरा थम गया, क्योंकि सबसे ज़ोर से बोलने वाला भी जानता था कि यही उचित है। सावधान हाथ — कबीर के करघे पर के हाथों जैसे सावधान — कपड़े की ओर बढ़े। पूरी भीड़ पास सिमट आई, साँस रोके, केसरिया और टोपी और बच्चा उसी छोटी जगह की ओर झुकते, जब सफ़ेद कपड़ा धीरे से उठा लिया गया।", "और उसके नीचे कोई जुलाहा था ही नहीं।", "जहाँ बूढ़ा आदमी लेटा था, वहाँ सिर्फ़ फूल पड़े थे — उनका एक बड़ा नरम ढेर। ढलते सूरज जैसे नारंगी गेंदे, धड़कते दिल जैसे लाल गुलाब, पंखुड़ी पर पंखुड़ी, भोर-सी ताज़ा, मानो बाग़ ख़ुद उसकी जगह विश्राम करने आ गया हो। और वे मानो जगमगा रहे थे, हर हैरान चेहरे पर गरम रोशनी फेंकते, और उनकी मिठास ने कमरे को भर दिया, यहाँ तक कि शोक को सीधे खुले दरवाज़े के बाहर धीरे से धकेल दिया।", "कोई नहीं बोला। अग्नि और धरती, केसरिया और टोपी, हर पक्ष ने जो कारण कसकर पकड़े थे — वे गाँठ ढीली होने की तरह ढीले पड़ गए। केसरिया बूढ़ा और सादी टोपी वाला आदमी फूलों के आर-पार एक-दूसरे को देखते रहे, और धीरे से दोनों मुस्कुराए — उस तरह जैसे आख़िर यह देखकर मुस्कुराते हैं कि झगड़ा कभी मायने रखता ही नहीं था।", "तो उन्होंने उसे बाँट लिया। सोते बच्चे को उठाने जैसे कोमल हाथों से, केसरिया वालों ने आधे फूल समेटे, और टोपी वालों ने बाकी आधे। हर किसी ने फूलों को दिल के पास लगाया, और उन्हें जाते देख आप कह न पाते कि कौन किस पक्ष का है — बस इतना कि हर एक वही नारंगी और वही लाल, छाती से सटाए लिए जा रहा था।", "और जब वे उस छोटे घर से निकलकर विशाल रात में पाँव रखते, तब आसमान पहले ही बदलने लगा था: साँझ का गहरा नीला किनारे पर पतला पड़ता, गरमाता और उजला होता, भोर के पहले हल्के सोने की ओर। आधे फूल अग्नि के पास जाएँगे, और आधे धरती के पास।", "पर तब वह बूढ़ा जुलाहा कहाँ गया — वह आदमी जो किसी का नहीं था, क्योंकि वह सबका था?"]}}, "img_cover": "assets/ramkabir/flowers-under-the-cloth/cover.jpg", "img_pages": ["assets/ramkabir/flowers-under-the-cloth/page-1.jpg", "assets/ramkabir/flowers-under-the-cloth/page-2.jpg", "assets/ramkabir/flowers-under-the-cloth/page-3.jpg", "assets/ramkabir/flowers-under-the-cloth/page-4.jpg", "assets/ramkabir/flowers-under-the-cloth/page-5.jpg"]}, {"slug": "jivanjis-green-field", "color": "sage", "scenes": ["Young Jivanji, a lone wanderer on a long Gujarat road at dawn", "Jivanji leaves home in Karamsad, family in the doorway", "The long search — Jivanji walking through changing seasons", "Jivanji bows to his guru Gopaldas at last", "A bean field flourishing vivid green in the summer heat", "Jivanji honors the village women, lifting the overlooked"], "title": {"en": "Jivanji's Green Field", "gu": "જીવણજીનું લીલું ખેતર", "hi": "जीवणजी का हरा खेत"}, "moral": {"en": "Keep your heart pointed at the truth, however long the road; and when your words finally carry weight, spend it lifting up those the world forgot.", "gu": "રસ્તો ગમે તેટલો લાંબો હોય, હૃદયને સત્ય તરફ વાળેલું રાખો; અને જ્યારે તમારી વાતનું વજન પડે, ત્યારે એ વજન દુનિયાએ ભૂલેલા લોકોને ઊંચા કરવામાં વાપરો.", "hi": "रास्ता चाहे जितना लंबा हो, दिल को सच की ओर लगाए रखो; और जब तुम्हारी बात में वज़न आ जाए, तो उसे उन लोगों को ऊपर उठाने में लगाओ जिन्हें दुनिया भूल गई।"}, "levels": {"kids": {"en": ["Jivanji put on his sandals. He picked up his stick. He wrapped some warm bread in a cloth. \"Goodbye!\" he called at the door. His mother waved. His father waved. And Jivanji set off down the road.", "He walked when the flowers came up pink and bright. He walked when the leaves turned gold and fell. He walked when the snow was cold on his nose. He walked when the sun came back, hot again. \"I am looking for a wise teacher,\" he said, and he kept on walking.", "His sandals grew thin. His beard grew long and grey. But still he walked. Then one quiet day, under a wide tree, he found an old man in a soft white robe. The old man's name was Gopaldas, and his eyes were kind. Jivanji bowed down low. \"I found you,\" he whispered. \"At last, I found you.\"", "Many summers later, Jivanji had a little field of his own. He planted Vaal-Papadi — flat green beans that climb up on curly vines. That summer was so hot! The ground went dry and brown and crackly. Nothing wanted to grow.", "But in Jivanji's field, the little bean plants pushed up. Green, green, green! Green leaves and fat green pods, right in the burning sun. The whole village came to look. \"How green!\" they said. \"How can it be so green in all this heat?\" Jivanji only smiled and watered his vines.", "Now, there were people in the village whom no one ever listened to — quiet women who always stood at the back. So that evening, Jivanji walked right up to them. He took their hands. \"Come sit at the front,\" he said. He put a bowl of his bright green beans in their hands first, before anyone else ate. And the women who always stood at the back sat down in the very best place — and ate. A little girl watched, and tugged her mother's sleeve. \"Why did no one ever do that before?\""], "gu": ["જીવણજીએ ચંપલ પહેર્યાં. એમણે પોતાની લાકડી ઉપાડી. ગરમ રોટલીને કપડામાં બાંધી. \"આવજો!\" દરવાજે ઊભા રહીને એમણે કહ્યું. માએ હાથ હલાવ્યો. બાપુએ હાથ હલાવ્યો. અને જીવણજી રસ્તે ચાલી નીકળ્યા.", "ફૂલ ગુલાબી ને ઝગમગતાં ઊગ્યાં ત્યારે એ ચાલ્યા. પાંદડાં સોનેરી થઈને ખર્યાં ત્યારે એ ચાલ્યા. નાક પર ઠંડો બરફ પડ્યો ત્યારે એ ચાલ્યા. સૂરજ ફરી તપવા લાગ્યો ત્યારે પણ એ ચાલ્યા. \"હું એક જ્ઞાની ગુરુને શોધું છું,\" એમ કહીને એ ચાલતા જ રહ્યા.", "એમનાં ચંપલ ઘસાઈને પાતળાં થઈ ગયાં. એમની દાઢી લાંબી ને ધોળી થઈ ગઈ. તોય એ ચાલતા રહ્યા. પછી એક શાંત દિવસે, એક પહોળા ઝાડ નીચે, એમને ધોળા વસ્ત્રમાં એક વૃદ્ધ માણસ મળ્યા. એ વૃદ્ધનું નામ ગોપાળદાસ, ને એમની આંખો બહુ માયાળુ. જીવણજી નીચા નમ્યા. \"મેં તમને શોધી લીધા,\" એમણે ધીમેથી કહ્યું. \"આખરે, મેં તમને શોધી લીધા.\"", "ઘણા ઉનાળા પછી, જીવણજી પાસે પોતાનું એક નાનું ખેતર હતું. એમણે વાલ-પાપડી વાવી — ચપટાં લીલાં બીજ જે વેલા પર ચડે છે. એ ઉનાળો કેટલો ગરમ! જમીન સૂકી, કથ્થઈ ને ફાટફાટ થઈ ગઈ. કશું ઊગવા જ ન માગતું.", "પણ જીવણજીના ખેતરમાં નાનાં વાલના છોડ ઊગી નીકળ્યાં. લીલાં, લીલાં, લીલાં! લીલાં પાંદડાં ને ભરાવદાર લીલી શિંગો, એ બળબળતા તડકામાં જ. આખું ગામ જોવા આવ્યું. \"કેટલું લીલું!\" એ બોલ્યા. \"આટલી ગરમીમાં આટલું લીલું કેમ?\" જીવણજી માત્ર હસ્યા ને પોતાના વેલાને પાણી પાતા રહ્યા.", "હવે, ગામમાં એવા લોકો હતા જેમની વાત કોઈ સાંભળતું જ નહીં — ચૂપચાપ ઊભી રહેતી સ્ત્રીઓ, જે હંમેશાં પાછળ ઊભી રહેતી. તો એ સાંજે, જીવણજી સીધા એમની પાસે ગયા. એમના હાથ ઝાલ્યા. \"આગળ આવીને બેસો,\" એમણે કહ્યું. એમણે પોતાની તાજી લીલી શિંગોનો વાટકો, બીજા કોઈ ખાય એ પહેલાં, એ સ્ત્રીઓના હાથમાં મૂક્યો. ને જે સ્ત્રીઓ હંમેશાં પાછળ ઊભી રહેતી, એ સૌથી સારી જગ્યાએ બેઠી — ને જમી. એક નાની છોકરીએ આ જોયું, ને માની બાંય ખેંચીને પૂછ્યું, \"આવું પહેલાં કોઈએ કેમ ન કર્યું?\""], "hi": ["जीवणजी ने अपनी चप्पल पहनी। अपनी लाठी उठाई। थोड़ी गरम रोटी एक कपड़े में बाँध ली। \"अलविदा!\" उन्होंने दरवाज़े पर कहा। माँ ने हाथ हिलाया। पिता ने हाथ हिलाया। और जीवणजी रास्ते पर निकल पड़े।", "जब फूल गुलाबी और चमकीले खिले, तब वे चले। जब पत्ते सुनहरे होकर गिरे, तब वे चले। जब बर्फ़ नाक पर ठंडी पड़ी, तब वे चले। जब सूरज फिर से तपने लगा, तब भी वे चले। \"मैं एक ज्ञानी गुरु को खोज रहा हूँ,\" वे कहते, और चलते ही रहते।", "उनकी चप्पल घिसकर पतली हो गई। उनकी दाढ़ी लंबी और सफ़ेद हो गई। फिर भी वे चलते रहे। फिर एक शांत दिन, एक चौड़े पेड़ के नीचे, उन्हें सफ़ेद वस्त्र में एक बूढ़े आदमी मिले। उस बूढ़े का नाम था गोपालदास, और उनकी आँखें बड़ी कोमल थीं। जीवणजी नीचे झुके। \"मैंने आपको पा लिया,\" उन्होंने धीरे से कहा। \"आख़िरकार, मैंने आपको पा लिया।\"", "कई गर्मियाँ बीतीं, और जीवणजी के पास अपना एक छोटा-सा खेत था। उन्होंने वाल-पापड़ी बोई — चपटी हरी फलियाँ जो बेलों पर चढ़ती हैं। वह गर्मी कितनी कड़ी थी! ज़मीन सूखकर भूरी और दरकी हुई हो गई। कुछ भी उगना नहीं चाहता था।", "पर जीवणजी के खेत में नन्हे वाल के पौधे ऊपर उठ आए। हरे, हरे, हरे! हरे पत्ते और भरी-भरी हरी फलियाँ, उसी जलते सूरज में। सारा गाँव देखने आया। \"कितना हरा!\" वे बोले। \"इतनी गर्मी में इतना हरा कैसे?\" जीवणजी बस मुस्कुराए और अपनी बेलों को पानी देते रहे।", "अब, गाँव में ऐसे लोग थे जिनकी बात कोई नहीं सुनता था — चुपचाप खड़ी रहने वाली औरतें, जो हमेशा पीछे खड़ी रहती थीं। तो उस शाम, जीवणजी सीधे उनके पास गए। उनके हाथ थामे। \"आगे आकर बैठो,\" उन्होंने कहा। उन्होंने अपनी ताज़ी हरी फलियों का कटोरा, किसी और के खाने से पहले, उन औरतों के हाथों में रखा। और जो औरतें हमेशा पीछे खड़ी रहती थीं, वे सबसे अच्छी जगह पर बैठीं — और खाया। एक नन्ही बच्ची ने यह देखा, और माँ की बाँह खींचकर पूछा, \"ऐसा पहले किसी ने क्यों नहीं किया?\""]}, "adults": {"en": ["On the morning Jivanji left home, the village of Karamsad was still grey with early light. He tied his sandals carefully, sensing the road ahead would be long, though he could not have guessed how long. He took up his staff and folded a round of bread into a cloth bundle. His family had gathered in the doorway behind him — his mother with her hand pressed to the frame, his father very quiet.", "\"You could stay,\" his mother said. It was not quite a question. \"I have to find him,\" Jivanji answered. \"A true teacher. Someone who truly knows.\" \"And how will you know him when you find him?\" Jivanji was honest. \"I don't know yet,\" he said. \"But I think I'll know.\" And he stepped onto the road before his courage could leak away.", "What followed was not one journey but a hundred small ones, stitched end to end. He walked through springs when the air smelled of turned earth, through monsoons when the rain drummed on his shoulders and the roads turned to brown rivers, through dry winters when his breath hung white at dawn, and through summers so fierce the horizon shook like water that wasn't there.", "He asked at every village. \"Is there a holy man here? A real one?\" Sometimes people pointed him onward; sometimes they only shrugged. He met teachers fond of their own voices, and teachers who wanted his coins more than his questions, and he bowed politely and moved on, because something in him stayed unconvinced.", "The years did their slow work. His sandals wore through and were mended and made new again. The black of his beard went grey at the corners of his mouth. The boy who had left Karamsad in a hurry became a man who no longer hurried at all. And here was the strange thing: the waiting did not make him bitter. It made him patient, the way a river makes a stone smooth — not all at once, but pass after pass. He stopped counting the empty roads as failures. Each one was simply the road that came before the right one.", "Twenty-three years after he left home, Jivanji came to a still place beneath a wide-armed tree. An old man sat there in a plain white robe, so quiet that the birds had settled near him without fear. He was not doing anything grand. He was simply present, the way deep water is present — calm all the way down. Jivanji stopped. His heart, which had walked through twenty-three years of seasons, recognized the end of the journey before his mind could explain it.", "He knelt and touched the dust at the old man's feet. \"I am Jivanji,\" he said, and his voice shook. \"I left home a young man to find a true teacher. I have looked for twenty-three years.\" The old man — Gopaldas — looked at him for a long, unhurried moment, the way you look at someone you have somehow been expecting. \"Twenty-three years is a long time to keep a heart pointed at one thing,\" he said gently, and reached down to lift Jivanji up by the arm. \"Most people give up by the second winter. You did not. Come. Sit. The looking is finished. Now we begin.\"", "Many seasons later, long after Gopaldas had taught him all he had to teach, Jivanji kept a small field at the edge of a village. In it he grew Vaal-Papadi — the flat, pale-green beans that hang in clusters from climbing vines. The summer that people would remember came down hard. The sun split the soil into tiles. Wells dropped low. Across the whole district, fields curled up brown and surrendered, leaf by leaf.", "But Jivanji's field would not turn. Day after blazing day it grew greener — broad green leaves, heavy green pods, a square of cool living color set into a brown and gasping land. Villagers stood at its edge and could not make sense of it. \"How?\" they asked each other. \"In this heat — it's greener than the monsoon.\" Jivanji only moved among his vines, lifting a leaf here, steadying a stalk there, and gave no speeches about it.", "But people had begun to watch him closely, and when a man's field stays green in a dead summer, his words start to carry weight. Jivanji felt that weight settle onto his shoulders, and thought carefully about what to do with it. In that village, as in most, some lived always at the back — among them women who had been shamed, or laughed at, or simply overlooked for so long that they had learned to make themselves small: to stand near the door, to eat last, to expect nothing.", "So at the next gathering, when the whole village sat down together and the food was brought out, everyone waited to see where the holy man of the green field would choose to sit. Jivanji rose. He walked past the front row, where the important men had left a place of honor for him. He kept walking, all the way to the back, to the women who were already half-turned toward the door as if to make room for everyone else.", "He held out his hands to them. \"Come and sit at the front,\" he said. \"And eat first.\" He placed a bowl of his own bright green beans in the oldest woman's hands before anyone else had touched a thing. \"These hands work as hard as any in this village. Why should they be the last to be fed?\" A hush went through the gathering. The women, who had spent their whole lives standing at the edges, looked at one another. Then, slowly, they came forward and sat in the good places, in the cool of the front, and lifted the first bites to their mouths.", "And watching the green beans pass from his field into their hands, a young child at the gathering tugged her mother's sleeve and asked the only question that really mattered: why had no one ever thought to do this before?"], "gu": ["જે સવારે જીવણજી ઘરેથી નીકળ્યા, ત્યારે કરમસદ ગામ વહેલી પરોઢના અજવાળામાં હજી ધૂંધળું હતું. એમણે ધ્યાનથી ચંપલ બાંધ્યાં, કેમ કે એમને લાગ્યું કે આગળનો રસ્તો લાંબો હશે — જોકે કેટલો લાંબો, એનો અંદાજ એ ન લગાવી શક્યા. એમણે લાકડી ઉપાડી. એક રોટલો ને થોડી ચીજો કપડામાં બાંધી, ગાંઠ વાળી. એમનો પરિવાર પાછળ બારણે ભેગો થયો — મા ચોકઠા પર હાથ દાબીને, ને બાપુ બહુ ચૂપ.", "\"તું રહી પણ શકે,\" માએ કહ્યું. એ બરાબર સવાલ નહોતો. \"મારે એમને શોધવા જ છે,\" જીવણજીએ જવાબ આપ્યો. \"સાચા ગુરુને. જે ખરેખર જાણતા હોય.\" \"ને જડે ત્યારે તું એમને ઓળખીશ કેવી રીતે?\" જીવણજી પ્રામાણિક હતા. \"એ મને હજી ખબર નથી,\" એમણે કહ્યું. \"પણ મને લાગે છે કે હું ઓળખી લઈશ.\" પોતાની હિંમત ઓગળી જાય એ પહેલાં એ રસ્તે ચડી ગયા, ને એક વારથી વધારે પાછળ વળીને જોવા ન દીધું.", "પછી જે આવ્યું એ એક નહીં, પણ સો નાની-નાની યાત્રાઓ હતી, એક પછી એક સંધાયેલી. એ વસંતમાં ચાલ્યા, જ્યારે ઘઉં કૂમળા ઊગતા ને હવામાં ખેડેલી માટીની સોડમ આવતી. એ ચોમાસામાં ચાલ્યા, જ્યારે વરસાદ ખભા પર ઢોલ વગાડતો, રસ્તા કથ્થઈ નદીઓ બની જતા ને દેડકાં આખી રાત ગાતાં. એ સૂકા શિયાળામાં ચાલ્યા, જ્યારે પરોઢે એમનો શ્વાસ ધોળો ઝૂલતો, ને એવા આકરા ઉનાળામાં કે ક્ષિતિજ ન હોય એવા પાણીની જેમ થરથરતી.", "એ દરેક ગામમાં પૂછતા. \"અહીં કોઈ સંત છે? સાચા?\" ક્યારેક લોકો આગળનો રસ્તો ચીંધતા; ક્યારેક માત્ર ખભા ઉલાળતા. એમને એવા ગુરુઓ મળ્યા જે પોતાના જ અવાજના આશિક નીકળ્યા, ને એવા જેમને એમના સવાલ કરતાં એમના સિક્કા વધારે વહાલા હતા; ને એ વિવેકથી નમીને આગળ વધી જતા, કેમ કે અંદર કશુંક હજી માનતું નહોતું.", "વર્ષોએ પોતાનું ધીમું કામ કર્યું. એમનાં પહેલાં ચંપલ એડી પાસેથી ઘસાઈ ગયાં, એમણે સાંધ્યાં, પછી નવાં બનાવ્યાં, ને એ પણ ઘસાઈ ગયાં. એમની કાળી દાઢી મોઢાના ખૂણે ધોળી થઈ ગઈ. ઉતાવળમાં કરમસદ છોડનારો છોકરો એવો માણસ બની ગયો જે હવે જરાય ઉતાવળ કરતો નહોતો. ને આશ્ચર્યની વાત એ હતી: એ રાહ જોવાથી એ કડવા ન બન્યા. એ ધીરજવાન બન્યા — જેમ નદી પથ્થરને લીસો કરે, એકસામટું નહીં, પણ વારંવાર, વાર પછી વાર. એમણે ખાલી રસ્તાઓને નિષ્ફળતા ગણવાનું છોડી દીધું. દરેક રસ્તો માત્ર સાચા રસ્તા પહેલાંનો રસ્તો હતો.", "ઘર છોડ્યાના ત્રેવીસ વર્ષ પછી, જીવણજી એક પહોળી ડાળોવાળા ઝાડ નીચે એક શાંત જગ્યાએ આવી પહોંચ્યા. ત્યાં સાદા ધોળા વસ્ત્રમાં એક વૃદ્ધ બેઠા હતા, એટલા શાંત કે પંખીઓ નિર્ભય થઈને એમની પાસે બેઠાં હતાં. એ કશું ભવ્ય નહોતા કરતા. એ માત્ર હાજર હતા — જેમ ઊંડું પાણી હાજર હોય, છેક તળિયા સુધી શાંત. જીવણજી થંભી ગયા. એમનું હૃદય, જે ત્રેવીસ વર્ષની ઋતુઓમાંથી ચાલ્યું હતું, મન સમજાવે એ પહેલાં યાત્રાનો અંત ઓળખી ગયું.", "એ ઘૂંટણિયે પડ્યા ને વૃદ્ધના ચરણની ધૂળને સ્પર્શ્યા. \"હું જીવણજી,\" એમણે કહ્યું, ને એમનો અવાજ ધ્રૂજ્યો. \"હું જુવાનીમાં સાચા ગુરુને શોધવા ઘરેથી નીકળ્યો હતો. ત્રેવીસ વર્ષથી શોધું છું.\" એ વૃદ્ધ — ગોપાળદાસ — એમની સામે લાંબી, અધીરાઈ વગરની ક્ષણ સુધી જોઈ રહ્યા, જેમ કોઈ એવા માણસને જુએ જેની એ કોઈક રીતે રાહ જોતા હોય. \"ત્રેવીસ વર્ષ સુધી હૃદયને એક જ વસ્તુ તરફ વાળેલું રાખવું — એ લાંબો સમય છે,\" એમણે કોમળતાથી કહ્યું, ને નમીને જીવણજીને બાવડેથી ઉઠાડ્યા. \"મોટા ભાગના લોકો બીજા શિયાળે જ હાર માની લે છે. તેં ન માની. આવ. બેસ. શોધ પૂરી થઈ. હવે આપણે શરૂ કરીએ.\"", "ઘણી ઋતુઓ પછી, ગોપાળદાસે એમને જે શીખવવાનું હતું એ બધું શીખવી લીધા પછી, જીવણજી એક ગામની સીમે નાનું ખેતર રાખતા. એમાં એ વાલ-પાપડી ઉગાડતા — ચપટાં, આછાં લીલાં બીજ જે વેલા પર ઝૂમખે-ઝૂમખે લટકે. જે ઉનાળો લોકોને યાદ રહી જવાનો હતો એ આકરો બેઠો. સૂરજે જમીનને કટકે-કટકે ફાડી નાખી. કૂવા તળિયે ગયા. આખા તાલુકામાં ખેતરો પાન પછી પાન કથ્થઈ થઈને હાર માની ગયાં.", "પણ જીવણજીનું ખેતર ન ફર્યું. એક પછી એક બળબળતા દિવસે એ વધારે લીલું થતું ગયું — પહોળાં લીલાં પાંદડાં, ભારે લીલી શિંગો, કથ્થઈ ને હાંફતી ધરતીમાં જડેલો ઠંડો જીવંત રંગનો ચોરસ. ગ્રામજનો આવીને ખેતરની ધાર પર ઊભા રહેતા ને એમને એનો કશો અર્થ ન સમજાતો. \"કેવી રીતે?\" એ એકબીજાને પૂછતા. \"આ ગરમીમાં? જુઓ તો — ચોમાસા કરતાંય લીલું.\" જીવણજી માત્ર પોતાના વેલા વચ્ચે ફરતા, અહીં એક પાન ઊંચું કરતા, ત્યાં એક દાંડી ટેકવતા, ને એ વિશે કોઈ ભાષણ ન આપતા.", "પણ લોકો હવે એમને ધ્યાનથી જોવા લાગ્યા હતા, ને જ્યારે કોઈનું ખેતર મરેલા ઉનાળામાં લીલું રહે, ત્યારે એના શબ્દોમાં વજન આવવા માંડે. જીવણજીને એ વજન પોતાના ખભા પર બેસતું લાગ્યું, ને એમણે વિચાર્યું કે એનું શું કરવું. એ ગામમાં, બીજાં મોટા ભાગનાં ગામની જેમ, એવા લોકો હતા જે દરેક મેળાવડામાં પાછળ રહેતા. એમાં એવી સ્ત્રીઓ હતી જેમને શરમાવાઈ હતી, કે હસવામાં લેવાઈ હતી, કે એટલા લાંબા સમયથી અવગણાઈ હતી કે એમણે પોતાને નાનાં બનાવી દેવાનું શીખી લીધું હતું — બારણા પાસે ઊભા રહેવાનું, છેલ્લે જમવાનું, કશીય આશા ન રાખવાનું.", "તો બીજે મેળાવડે, જ્યારે આખું ગામ સાથે બેઠું ને ભોજન પીરસાયું, ત્યારે સૌ જોવા લાગ્યા કે લીલા ખેતરના સંત ક્યાં બેસવાનું પસંદ કરે છે. જીવણજી ઊભા થયા. એ આગલી હરોળ વટાવી ગયા, જ્યાં મોટા માણસોએ એમના માટે માનની જગ્યા રાખી હતી. એ ચાલતા જ રહ્યા, છેક પાછળ સુધી, એ સ્ત્રીઓ પાસે જે પહેલેથી જ બારણા તરફ અડધી વળેલી હતી — જાણે બધાંને જગ્યા કરી આપવા.", "એમણે એમની તરફ હાથ લંબાવ્યા. \"આગળ આવીને બેસો,\" એમણે કહ્યું. \"ને પહેલાં જમો.\" એમણે પોતાની તાજી લીલી શિંગોનો વાટકો લીધો ને બીજા કોઈએ કશાનેય અડક્યા પહેલાં એ સૌથી વૃદ્ધ સ્ત્રીના હાથમાં મૂક્યો. \"આ હાથ આ ગામના કોઈ પણ હાથ જેટલા જ સખત મહેનત કરે છે,\" એમણે કહ્યું. \"એમને જમવામાં છેલ્લે કેમ રખાય?\" મેળાવડામાં સન્નાટો છવાઈ ગયો. જે સ્ત્રીઓએ આખી જિંદગી કિનારે ઊભા રહીને કાઢી હતી, એ એકબીજા સામે જોવા લાગી. પછી, ધીમે-ધીમે, એ આગળ આવી ને સારી જગ્યાએ, આગળની ઠંડકમાં બેઠી, ને પહેલા કોળિયા મોઢે માંડ્યા.", "ને પોતાના ખેતરની લીલી શિંગો એમના હાથમાં જતી જોઈને, મેળાવડામાંની એક નાની છોકરીએ માની બાંય ખેંચી ને એ જ સવાલ પૂછ્યો જે ખરેખર મહત્ત્વનો હતો: આવું પહેલાં કોઈને કેમ ન સૂઝ્યું?"], "hi": ["जिस सुबह जीवणजी घर से निकले, करमसद गाँव अभी सवेरे की रोशनी में धुँधला था। उन्होंने ध्यान से अपनी चप्पल बाँधी, क्योंकि उन्हें लगा कि आगे का रास्ता लंबा होगा — हालाँकि कितना लंबा, इसका अंदाज़ा वे नहीं लगा सके। उन्होंने अपनी लाठी उठाई। एक रोटी और थोड़ा सामान एक कपड़े में बाँधकर गाँठ लगा दी। उनका परिवार पीछे दरवाज़े पर इकट्ठा था — माँ चौखट पर हाथ दबाए, और पिता बहुत चुप।", "\"तुम रुक भी सकते हो,\" माँ ने कहा। यह पूरी तरह सवाल नहीं था। \"मुझे उन्हें खोजना ही है,\" जीवणजी ने जवाब दिया। \"एक सच्चे गुरु को। जो सचमुच जानते हों।\" \"और जब वे मिलेंगे, तो तुम उन्हें पहचानोगे कैसे?\" जीवणजी ईमानदार थे। \"यह मुझे अभी नहीं पता,\" उन्होंने कहा। \"पर मुझे लगता है, मैं पहचान लूँगा।\" अपनी हिम्मत के बह जाने से पहले वे रास्ते पर चढ़ गए, और एक बार से ज़्यादा पीछे मुड़कर देखने की इजाज़त ख़ुद को नहीं दी।", "फिर जो हुआ वह एक यात्रा नहीं, बल्कि सौ छोटी-छोटी यात्राएँ थीं, एक के बाद एक जुड़ी हुई। वे वसंत में चले, जब गेहूँ कोमल उगता और हवा में जुती हुई मिट्टी की महक होती। वे मानसून में चले, जब बारिश कंधों पर ढोल बजाती, रास्ते भूरी नदियाँ बन जाते और मेंढक रात भर गाते। वे सूखी सर्दियों में चले, जब सवेरे उनकी साँस सफ़ेद लटकती, और इतनी कड़ी गर्मियों में कि क्षितिज न होने वाले पानी की तरह काँपता।", "वे हर गाँव में पूछते। \"यहाँ कोई संत है? सच्चा?\" कभी लोग आगे का रास्ता बताते; कभी बस कंधे उचका देते। उन्हें ऐसे गुरु मिले जो अपनी ही आवाज़ के आशिक़ निकले, और ऐसे जिन्हें उनके सवालों से ज़्यादा उनके सिक्के प्यारे थे; और वे विनम्रता से झुककर आगे बढ़ जाते, क्योंकि भीतर कुछ अब भी मानता नहीं था।", "सालों ने अपना धीमा काम किया। उनकी पहली चप्पल एड़ी से घिस गई, उन्होंने उसे सिया, फिर नई बनाई, और वह भी घिस गई। उनकी काली दाढ़ी मुँह के कोनों पर सफ़ेद हो गई। जल्दी में करमसद छोड़ने वाला लड़का ऐसा आदमी बन गया जो अब बिलकुल जल्दी नहीं करता था। और अजीब बात यह थी: इस इंतज़ार ने उन्हें कड़वा नहीं बनाया। इसने उन्हें धीरजवान बनाया — जैसे नदी पत्थर को चिकना करती है, एक साथ नहीं, बल्कि बार-बार, बार पर बार। उन्होंने ख़ाली रास्तों को नाकामी गिनना छोड़ दिया। हर रास्ता बस सही रास्ते से पहले का रास्ता था।", "घर छोड़ने के तेईस साल बाद, जीवणजी एक चौड़ी डालियों वाले पेड़ के नीचे एक शांत जगह पहुँचे। वहाँ सादे सफ़ेद वस्त्र में एक बूढ़े बैठे थे, इतने शांत कि पंछी निडर होकर उनके पास बैठ गए थे। वे कुछ भव्य नहीं कर रहे थे। वे बस मौजूद थे — जैसे गहरा पानी मौजूद होता है, ठेठ तले तक शांत। जीवणजी ठहर गए। उनका दिल, जो तेईस साल की ऋतुओं में चला था, मन के समझाने से पहले ही यात्रा का अंत पहचान गया।", "वे घुटनों के बल झुके और बूढ़े के चरणों की धूल छुई। \"मैं जीवणजी हूँ,\" उन्होंने कहा, और उनकी आवाज़ काँपी। \"मैं जवानी में एक सच्चे गुरु को खोजने घर से निकला था। तेईस साल से खोज रहा हूँ।\" वे बूढ़े — गोपालदास — एक लंबे, बिना जल्दी वाले पल तक उन्हें देखते रहे, जैसे किसी ऐसे को देखते हैं जिसकी किसी तरह प्रतीक्षा रही हो। \"तेईस साल तक दिल को एक ही चीज़ की ओर लगाए रखना — यह बहुत लंबा समय है,\" उन्होंने कोमलता से कहा, और झुककर जीवणजी को बाँह से उठाया। \"ज़्यादातर लोग दूसरी सर्दी तक हार मान लेते हैं। तुमने नहीं मानी। आओ। बैठो। खोज पूरी हुई। अब हम शुरू करते हैं।\"", "कई ऋतुएँ बीतीं, और गोपालदास ने जो कुछ सिखाना था सब सिखा देने के बहुत बाद, जीवणजी एक गाँव की सीमा पर एक छोटा खेत रखते थे। उसमें वे वाल-पापड़ी उगाते — चपटी, हलकी हरी फलियाँ जो बेलों पर गुच्छों में लटकती हैं। जो गर्मी लोगों को याद रह जाने वाली थी, वह कड़ी होकर उतरी। सूरज ने ज़मीन को टुकड़ों-टुकड़ों में फाड़ दिया। कुएँ तले बैठ गए। पूरे इलाक़े में खेत पत्ते दर पत्ते भूरे होकर हार मान गए।", "पर जीवणजी का खेत नहीं मुड़ा। एक के बाद एक जलते दिन वह और हरा होता गया — चौड़े हरे पत्ते, भारी हरी फलियाँ, भूरी और हाँफती ज़मीन में जड़ा ठंडा जीवंत रंग का एक चौकोर। गाँव वाले आकर खेत के किनारे खड़े हो जाते और उन्हें इसका कोई अर्थ समझ न आता। \"कैसे?\" वे एक-दूसरे से पूछते। \"इस गर्मी में? देखो तो — मानसून से भी हरा।\" जीवणजी बस अपनी बेलों के बीच घूमते, यहाँ एक पत्ता उठाते, वहाँ एक डंठल सँभालते, और इस बारे में कोई भाषण न देते।", "पर लोग अब उन्हें ध्यान से देखने लगे थे, और जब किसी का खेत मरी हुई गर्मी में हरा रहे, तो उसके शब्दों में वज़न आने लगता है। जीवणजी को वह वज़न अपने कंधों पर बैठता महसूस हुआ, और उन्होंने सोच-समझकर तय किया कि उसका क्या करना है। उस गाँव में, ज़्यादातर गाँवों की तरह, ऐसे लोग थे जो हर जमावड़े में पीछे रहते थे। उनमें ऐसी औरतें थीं जिन्हें शर्मिंदा किया गया था, या हँसी में उड़ाया गया था, या इतने लंबे समय तक अनदेखा किया गया था कि उन्होंने ख़ुद को छोटा बना लेना सीख लिया था — दरवाज़े के पास खड़े रहना, सबसे आख़िर में खाना, कुछ भी उम्मीद न रखना।", "तो अगले जमावड़े में, जब पूरा गाँव साथ बैठा और खाना परोसा गया, सब देखने लगे कि हरे खेत वाला संत कहाँ बैठना चुनेगा। जीवणजी उठे। वे अगली पंक्ति को पार कर गए, जहाँ बड़े आदमियों ने उनके लिए सम्मान की जगह छोड़ रखी थी। वे चलते ही रहे, ठेठ पीछे तक, उन औरतों के पास जो पहले से ही दरवाज़े की ओर आधी मुड़ी थीं — मानो सबके लिए जगह बना रही हों।", "उन्होंने उनकी ओर हाथ बढ़ाए। \"आगे आकर बैठो,\" उन्होंने कहा। \"और पहले खाओ।\" उन्होंने अपनी ताज़ी हरी फलियों का कटोरा लिया और किसी के कुछ छूने से पहले उसे सबसे बूढ़ी औरत के हाथों में रखा। \"ये हाथ इस गाँव के किसी भी हाथ जितनी ही मेहनत करते हैं,\" उन्होंने कहा। \"इन्हें खाने में सबसे आख़िर में क्यों रखा जाए?\" जमावड़े में सन्नाटा छा गया। जिन औरतों ने पूरी ज़िंदगी किनारे खड़े रहकर बिताई थी, वे एक-दूसरे को देखने लगीं। फिर, धीरे-धीरे, वे आगे आईं और अच्छी जगहों पर, आगे की ठंडक में बैठीं, और पहले कौर मुँह तक उठाए।", "और अपने खेत की हरी फलियों को उनके हाथों में जाते देखकर, जमावड़े में बैठी एक नन्ही बच्ची ने माँ की बाँह खींची और वही सवाल पूछा जो सचमुच मायने रखता था: ऐसा पहले किसी को क्यों नहीं सूझा?"]}, "seniors": {"en": ["There was a young man of Karamsad named Jivanji, and one grey morning he tied his sandals, took up his staff, and folded a round of bread into a cloth. His mother stood in the doorway. \"You could stay,\" she said. \"I have to find him,\" he answered. \"A true teacher — one who truly knows.\" And he stepped onto the road, the way the soul steps out when it has heard a call it cannot un-hear.", "What followed was not one journey but many. He walked through springs when the earth smelled of turned soil, through monsoons when the roads became brown rivers, through winters when his breath hung white at dawn, and through summers fierce enough to make the horizon tremble. At every village he asked the same question — \"Is there a holy man here, a real one?\" — and at every village he bowed politely and moved on, because something within him stayed unconvinced.", "The years did their patient work. His sandals wore through and were made again; the black of his beard turned grey. And the long waiting, mercifully, did not make him bitter — it made him patient, the way a river smooths a stone, not all at once but pass after pass. Each empty road was only the road that came before the right one.", "Twenty-three years after he left home, beneath a wide-armed tree, he came upon an old man in a plain white robe, so still that the birds had settled near him without fear. He was doing nothing grand — he was simply present, calm all the way down, the way deep water is present. Jivanji's heart knew before his mind could speak. He knelt and touched the dust at the old man's feet. \"I have looked for twenty-three years,\" he said, his voice shaking. Gopaldas lifted him gently by the arm. \"Most give up by the second winter. You did not. Come. The looking is finished. Now we begin.\"", "Many seasons later, his learning long complete, Jivanji kept a small field at the edge of a village, where he grew Vaal-Papadi — flat, pale-green beans hanging in clusters from their vines. Then came a summer that cracked the soil and dropped the wells low, and across the whole district the fields curled brown and surrendered. But Jivanji's field would not turn. Day after blazing day it grew greener — a square of cool, living color set into a gasping land. The villagers gathered at its edge and could not understand it, and Jivanji only moved among his vines and gave no speeches.", "Yet when a man's field stays green in a dead summer, his words begin to carry weight, and Jivanji felt that weight settle upon his shoulders. He thought carefully about what to do with it. In that village, as in most, some lived always at the back — among them women who had been shamed, or laughed at, or overlooked so long they had learned to stand near the door, to eat last, to expect nothing.", "So at the next gathering, when the whole village sat to eat, all watched to see where the holy man of the green field would choose to sit. Jivanji rose. He walked past the front row of honor the important men had kept for him, and kept walking, all the way to the back, to those quiet women. He held out his hands. \"Come and sit at the front,\" he said, \"and eat first.\" He placed a bowl of his own bright green beans in the oldest woman's hands before anyone else had touched a thing. \"These hands work as hard as any in this village. Why should they be the last to be fed?\"", "A hush went through the gathering. The women who had spent their lives at the edges looked at one another, and slowly came forward, and sat in the good places, in the cool of the front, and lifted the first bites to their mouths. And watching the green beans pass from his field into their hands, a young child tugged her mother's sleeve and asked the only question that truly mattered: why had no one ever thought to do this before?"], "gu": ["કરમસદમાં જીવણજી નામે એક જુવાન રહેતો, ને એક ધૂંધળી સવારે એણે ચંપલ બાંધ્યાં, લાકડી ઉપાડી, ને એક રોટલો કપડામાં વાળ્યો. એની મા બારણે ઊભી હતી. \"તું રહી પણ શકે,\" એણે કહ્યું. \"મારે એમને શોધવા જ છે,\" એણે જવાબ આપ્યો. \"સાચા ગુરુને — જે ખરેખર જાણતા હોય.\" ને એ રસ્તે ચડી ગયો, જેમ આત્મા એવી હાક સાંભળીને નીકળે જે પછી અણસાંભળી થઈ શકતી નથી.", "પછી જે આવ્યું એ એક નહીં, પણ ઘણી યાત્રાઓ હતી. એ વસંતમાં ચાલ્યો, જ્યારે ધરતીમાંથી ખેડેલી માટીની સોડમ આવતી; ચોમાસામાં, જ્યારે રસ્તા કથ્થઈ નદીઓ બની જતા; શિયાળામાં, જ્યારે પરોઢે એનો શ્વાસ ધોળો ઝૂલતો; ને એવા આકરા ઉનાળામાં કે ક્ષિતિજ થરથરી ઊઠતી. દરેક ગામે એ એક જ સવાલ પૂછતો — \"અહીં કોઈ સંત છે, સાચા?\" — ને દરેક ગામે વિવેકથી નમીને આગળ વધી જતો, કેમ કે અંદર કશુંક હજી માનતું નહોતું.", "વર્ષોએ પોતાનું ધીરજવાળું કામ કર્યું. એનાં ચંપલ ઘસાઈ ગયાં ને ફરી બન્યાં. એની કાળી દાઢી ધોળી થઈ. ને એ લાંબી રાહે, ઈશ્વરકૃપાએ, એને કડવો ન બનાવ્યો — એને ધીરજવાન બનાવ્યો, જેમ નદી પથ્થરને લીસો કરે, એકસામટું નહીં પણ વાર પછી વાર. હવે એ ખાલી રસ્તાઓને નિષ્ફળતા ગણતો નહોતો. દરેક માત્ર સાચા રસ્તા પહેલાંનો રસ્તો હતો.", "ઘર છોડ્યાના ત્રેવીસ વર્ષ પછી, એક પહોળી ડાળોવાળા ઝાડ નીચે, એને સાદા ધોળા વસ્ત્રમાં એક વૃદ્ધ મળ્યા, એટલા શાંત કે પંખીઓ નિર્ભય થઈને એમની પાસે બેઠાં હતાં. એ કશું ભવ્ય નહોતા કરતા. એ માત્ર હાજર હતા, છેક તળિયા સુધી શાંત, જેમ ઊંડું પાણી હાજર હોય. જીવણજીનું હૃદય મન બોલે એ પહેલાં જાણી ગયું. એ ઘૂંટણિયે પડ્યો ને વૃદ્ધના ચરણની ધૂળ સ્પર્શી. \"હું ત્રેવીસ વર્ષથી શોધું છું,\" એણે કહ્યું, ને એનો અવાજ ધ્રૂજ્યો. ગોપાળદાસે કોમળતાથી એને બાવડેથી ઉઠાડ્યો. \"મોટા ભાગના લોકો બીજા શિયાળે જ હારી જાય,\" એમણે કહ્યું. \"તું ન હાર્યો. આવ. શોધ પૂરી થઈ. હવે આપણે શરૂ કરીએ.\"", "ઘણી ઋતુઓ પછી, એમનું શિક્ષણ ક્યારનુંય પૂરું થયા પછી, જીવણજી એક ગામની સીમે નાનું ખેતર રાખતા, જ્યાં એ વાલ-પાપડી ઉગાડતા — ચપટાં, આછાં લીલાં બીજ, વેલા પર ઝૂમખે લટકતાં. પછી એવો ઉનાળો આવ્યો જેણે જમીનને કટકે-કટકે ફાડી ને કૂવા તળિયે બેસાડ્યા, ને આખા તાલુકામાં ખેતરો કથ્થઈ થઈને હાર માની ગયાં. પણ જીવણજીનું ખેતર ન ફર્યું. એક પછી એક બળબળતા દિવસે એ વધારે લીલું થતું ગયું — હાંફતી ધરતીમાં જડેલો ઠંડો, જીવંત રંગનો ચોરસ. ગ્રામજનો ધાર પર ભેગા થતા ને એમને કશું સમજાતું નહીં, ને જીવણજી માત્ર પોતાના વેલા વચ્ચે ફરતા ને કોઈ ભાષણ ન આપતા.", "પણ જ્યારે કોઈનું ખેતર મરેલા ઉનાળામાં લીલું રહે, ત્યારે એના શબ્દોમાં વજન આવવા માંડે, ને જીવણજીને એ વજન પોતાના ખભા પર બેસતું લાગ્યું. એમણે વિચાર્યું કે એનું શું કરવું. એ ગામમાં, બીજાં મોટા ભાગનાં ગામની જેમ, કેટલાક હંમેશાં પાછળ રહેતા — એમાં એવી સ્ત્રીઓ હતી જેમને શરમાવાઈ હતી, કે હસવામાં લેવાઈ હતી, કે એટલા લાંબા સમયથી અવગણાઈ હતી કે એમણે બારણા પાસે ઊભા રહેવાનું, છેલ્લે જમવાનું, ને કશીય આશા ન રાખવાનું શીખી લીધું હતું.", "તો બીજે મેળાવડે, જ્યારે આખું ગામ જમવા બેઠું, સૌ જોવા લાગ્યા કે લીલા ખેતરના સંત ક્યાં બેસવાનું પસંદ કરે છે. જીવણજી ઊભા થયા. મોટા માણસોએ એમના માટે રાખેલી માનની આગલી હરોળ વટાવીને એ ચાલતા જ રહ્યા, છેક પાછળ, એ ચૂપ સ્ત્રીઓ પાસે. એમણે હાથ લંબાવ્યા. \"આગળ આવીને બેસો,\" એમણે કહ્યું, \"ને પહેલાં જમો.\" બીજા કોઈએ કશાનેય અડક્યા પહેલાં એમણે પોતાની તાજી લીલી શિંગોનો વાટકો સૌથી વૃદ્ધ સ્ત્રીના હાથમાં મૂક્યો. \"આ હાથ આ ગામના કોઈ પણ હાથ જેટલા જ સખત મહેનત કરે છે. એમને જમવામાં છેલ્લે કેમ રખાય?\"", "મેળાવડામાં સન્નાટો છવાઈ ગયો. જે સ્ત્રીઓએ આખી જિંદગી કિનારે કાઢી હતી એ એકબીજા સામે જોવા લાગી, ને ધીમે-ધીમે આગળ આવી, ને સારી જગ્યાએ, આગળની ઠંડકમાં બેઠી, ને પહેલા કોળિયા મોઢે માંડ્યા. ને પોતાના ખેતરની લીલી શિંગો એમના હાથમાં જતી જોઈને, એક નાની છોકરીએ માની બાંય ખેંચી ને એ જ સવાલ પૂછ્યો જે ખરેખર મહત્ત્વનો હતો: આવું પહેલાં કોઈને કેમ ન સૂઝ્યું?"], "hi": ["करमसद में जीवणजी नाम का एक जवान रहता था, और एक धुँधली सुबह उसने अपनी चप्पल बाँधी, लाठी उठाई, और एक रोटी कपड़े में लपेट ली। उसकी माँ दरवाज़े पर खड़ी थी। \"तुम रुक भी सकते हो,\" उसने कहा। \"मुझे उन्हें खोजना ही है,\" उसने जवाब दिया। \"एक सच्चे गुरु को — जो सचमुच जानते हों।\" और वह रास्ते पर चढ़ गया, जैसे आत्मा तब निकल पड़ती है जब उसने ऐसी पुकार सुन ली हो जिसे फिर अनसुना नहीं किया जा सकता।", "फिर जो हुआ वह एक यात्रा नहीं, बल्कि कई थीं। वह वसंत में चला, जब धरती से जुती मिट्टी की महक आती; मानसून में, जब रास्ते भूरी नदियाँ बन जाते; सर्दियों में, जब सवेरे उसकी साँस सफ़ेद लटकती; और इतनी कड़ी गर्मियों में कि क्षितिज काँप उठता। हर गाँव में वह यही सवाल पूछता — \"यहाँ कोई संत है, सच्चा?\" — और हर गाँव में विनम्रता से झुककर आगे बढ़ जाता, क्योंकि भीतर कुछ अब भी मानता नहीं था।", "सालों ने अपना धीरजवाला काम किया। उसकी चप्पल घिस गई और फिर से बनी। उसकी काली दाढ़ी सफ़ेद हो गई। और उस लंबे इंतज़ार ने, ईश्वर की कृपा से, उसे कड़वा नहीं बनाया — उसे धीरजवान बनाया, जैसे नदी पत्थर को चिकना करती है, एक साथ नहीं बल्कि बार पर बार। अब वह ख़ाली रास्तों को नाकामी नहीं गिनता था। हर एक बस सही रास्ते से पहले का रास्ता था।", "घर छोड़ने के तेईस साल बाद, एक चौड़ी डालियों वाले पेड़ के नीचे, उसे सादे सफ़ेद वस्त्र में एक बूढ़े मिले, इतने शांत कि पंछी निडर होकर उनके पास बैठ गए थे। वे कुछ भव्य नहीं कर रहे थे। वे बस मौजूद थे, ठेठ तले तक शांत, जैसे गहरा पानी मौजूद होता है। जीवणजी का दिल मन के बोलने से पहले ही जान गया। वह घुटनों के बल झुका और बूढ़े के चरणों की धूल छुई। \"मैं तेईस साल से खोज रहा हूँ,\" उसने कहा, और उसकी आवाज़ काँपी। गोपालदास ने कोमलता से उसे बाँह से उठाया। \"ज़्यादातर लोग दूसरी सर्दी तक हार मान लेते हैं,\" उन्होंने कहा। \"तुमने नहीं मानी। आओ। खोज पूरी हुई। अब हम शुरू करते हैं।\"", "कई ऋतुएँ बीतीं, उनकी शिक्षा कब की पूरी हो चुकी थी, और जीवणजी एक गाँव की सीमा पर एक छोटा खेत रखते थे, जहाँ वे वाल-पापड़ी उगाते — चपटी, हलकी हरी फलियाँ, बेलों पर गुच्छों में लटकती हुई। फिर ऐसी गर्मी आई जिसने ज़मीन को टुकड़ों में फाड़ा और कुओं को तले बैठा दिया, और पूरे इलाक़े में खेत भूरे होकर हार मान गए। पर जीवणजी का खेत नहीं मुड़ा। एक के बाद एक जलते दिन वह और हरा होता गया — हाँफती ज़मीन में जड़ा ठंडे, जीवंत रंग का एक चौकोर। गाँव वाले किनारे इकट्ठा होते और समझ न पाते, और जीवणजी बस अपनी बेलों के बीच घूमते और कोई भाषण न देते।", "पर जब किसी का खेत मरी हुई गर्मी में हरा रहे, तो उसके शब्दों में वज़न आने लगता है, और जीवणजी को वह वज़न अपने कंधों पर बैठता महसूस हुआ। उन्होंने सोच-समझकर तय किया कि उसका क्या करना है। उस गाँव में, ज़्यादातर गाँवों की तरह, कुछ लोग हमेशा पीछे रहते — उनमें ऐसी औरतें थीं जिन्हें शर्मिंदा किया गया था, या हँसी में उड़ाया गया था, या इतने लंबे समय तक अनदेखा किया गया था कि उन्होंने दरवाज़े के पास खड़े रहना, सबसे आख़िर में खाना, और कुछ भी उम्मीद न रखना सीख लिया था।", "तो अगले जमावड़े में, जब पूरा गाँव खाने बैठा, सब देखने लगे कि हरे खेत वाला संत कहाँ बैठना चुनेगा। जीवणजी उठे। बड़े आदमियों की रखी सम्मान की अगली पंक्ति को पार करके वे चलते ही रहे, ठेठ पीछे, उन चुप औरतों के पास। उन्होंने हाथ बढ़ाए। \"आगे आकर बैठो,\" उन्होंने कहा, \"और पहले खाओ।\" किसी के कुछ छूने से पहले उन्होंने अपनी ताज़ी हरी फलियों का कटोरा सबसे बूढ़ी औरत के हाथों में रखा। \"ये हाथ इस गाँव के किसी भी हाथ जितनी ही मेहनत करते हैं। इन्हें खाने में सबसे आख़िर में क्यों रखा जाए?\"", "जमावड़े में सन्नाटा छा गया। जिन औरतों ने पूरी ज़िंदगी किनारे बिताई थी, वे एक-दूसरे को देखने लगीं, और धीरे-धीरे आगे आईं, और अच्छी जगहों पर, आगे की ठंडक में बैठीं, और पहले कौर मुँह तक उठाए। और अपने खेत की हरी फलियों को उनके हाथों में जाते देखकर, एक नन्ही बच्ची ने माँ की बाँह खींची और वही सवाल पूछा जो सचमुच मायने रखता था: ऐसा पहले किसी को क्यों नहीं सूझा?"]}}, "img_cover": "assets/ramkabir/jivanjis-green-field/cover.jpg", "img_pages": ["assets/ramkabir/jivanjis-green-field/page-1.jpg", "assets/ramkabir/jivanjis-green-field/page-2.jpg", "assets/ramkabir/jivanjis-green-field/page-3.jpg", "assets/ramkabir/jivanjis-green-field/page-4.jpg", "assets/ramkabir/jivanjis-green-field/page-5.jpg"]}];

let lang="en", lvl="kids", cur=0;

const $ = id => document.getElementById(id);

function renderLangBar(){
  $("langbar").innerHTML = "";
  ["en","gu","hi"].forEach(l => {
    const b = document.createElement("button");
    b.textContent = UI.langName[l];
    b.className = (l===lang ? "on" : "");
    b.onclick = () => setLang(l);
    $("langbar").appendChild(b);
  });
}
function setLang(l){
  lang = l;
  document.body.className = "lang-" + l;
  renderLangBar(); renderStatic(); renderGrid();
  if ($("reader").style.display === "block"){ renderToggle(); renderBook(); }
}
function renderStatic(){
  $("kicker").textContent = UI.kicker[lang];
  $("sub").textContent = UI.sub[lang];
  $("note").textContent = UI.note[lang];
  $("coauthorBy").innerHTML = UI.coauthorBy[lang];
  $("coauthorSub").innerHTML = UI.coauthorSub[lang];
  $("coauthorContact").innerHTML = UI.coauthorContact[lang];
  $("source").innerHTML = UI.source[lang];
  $("back").textContent = UI.back[lang];
}
function renderGrid(){
  const grid = $("grid"); grid.innerHTML = "";
  BOOKS.forEach((b, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openBook(i);
    const coverStyle = b.img_cover
      ? `style="background-image:linear-gradient(to top,rgba(20,14,8,.62),rgba(20,14,8,0) 58%),url('${b.img_cover}');background-size:cover;background-position:center"`
      : "";
    const titleStyle = b.img_cover ? 'style="color:#FBF4EC;text-shadow:0 2px 10px rgba(0,0,0,.7)"' : "";
    card.innerHTML = `
      <div class="cover ${b.color}" ${coverStyle}>
        ${b.img_cover ? "" : '<span class="ill-tag">illustration coming</span>'}
        <h3 ${titleStyle}>${b.title[lang]}</h3>
        ${b.img_cover ? "" : `<div class="cap">${b.scenes[0]||""}</div>`}
      </div>
      <div class="meta">
        <div class="moral">${b.moral[lang]}</div>
        <div class="levels">${UI.levelsLine[lang]} · ${LEVELS.map(L=>UI.levelLabel[lang][L]).join(" · ")}</div>
      </div>`;
    grid.appendChild(card);
  });
}
function renderToggle(){
  const t = $("toggle"); t.innerHTML = "";
  LEVELS.forEach(L => {
    const b = document.createElement("button");
    b.textContent = UI.levelLabel[lang][L];
    b.className = (L===lvl ? "on" : "");
    b.onclick = () => { lvl = L; renderToggle(); renderBook(); };
    t.appendChild(b);
  });
}
function openBook(i){
  cur = i; lvl = "kids";
  $("library").style.display = "none";
  $("reader").style.display = "block";
  renderToggle(); renderBook();
  window.scrollTo(0,0);
}
function closeBook(){
  $("reader").style.display = "none";
  $("library").style.display = "block";
  window.scrollTo(0,0);
}
function renderBook(){
  const b = BOOKS[cur];
  $("rtitle").textContent = b.title[lang];
  const paras = (b.levels[lvl] && b.levels[lvl][lang]) || [];
  const scenes = b.scenes;
  let h = `<div class="lvl-label">${UI.levelLabel[lang][lvl]}</div>
           <h2>${b.title[lang]}</h2>
           <div class="moral">${b.moral[lang]}</div>
           ${b.img_cover ? `<img class="ill-img cover-img" src="${b.img_cover}" alt="${b.title.en}">`
                         : `<div class="ill cover-ill"><div class="badge">Cover</div><div class="scene">${scenes[0]||""}</div></div>`}`;
  const bodyScenes = scenes.slice(1);
  const n = paras.length;
  // narrative-anchored placement: scenes 1-4 sit at story fractions (setup→climax),
  // the final scene always lands after the LAST paragraph (the resolution beat).
  const FRACS = [0.15, 0.32, 0.54, 0.78];
  const place = {};
  bodyScenes.forEach((_,k) => {
    const pi = (k === bodyScenes.length - 1)
      ? n
      : Math.max(1, Math.min(n, Math.round((FRACS[k] != null ? FRACS[k] : (k+1)/(bodyScenes.length+1)) * n)));
    (place[pi] = place[pi] || []).push(k);
  });
  const illFor = k => b.img_pages[k]
      ? `<img class="ill-img" src="${b.img_pages[k]}" alt="${bodyScenes[k]}">`
      : `<div class="ill"><div class="badge">Illustration ${k+1} of 5</div><div class="scene">${bodyScenes[k]}</div></div>`;
  paras.forEach((p, idx) => {
    h += `<p class="story">${p}</p>`;
    (place[idx+1] || []).forEach(k => h += illFor(k));
  });
  h += `<div class="endmark">✦</div>`;
  $("book").innerHTML = h;
  window.scrollTo(0,0);
}
$("back").onclick = closeBook;

// init
renderLangBar(); renderStatic(); renderGrid();

(function(){
  const sky = $("starfield"); if(!sky) return;
  const spark = '<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 0 L13.5 10.5 L24 12 L13.5 13.5 L12 24 L10.5 13.5 L0 12 L10.5 10.5 Z" fill="#FFF6E0"/></svg>';
  const n = Math.max(34, Math.min(90, Math.round(innerWidth*innerHeight/15000)));
  for(let i=0;i<n;i++){
    const s=document.createElement('div'); s.className='twk';
    const size=(3+Math.random()*6).toFixed(1);
    s.style.left=(Math.random()*99).toFixed(1)+'%'; s.style.top=(Math.random()*94).toFixed(1)+'%';
    s.style.width=size+'px'; s.style.height=size+'px';
    s.style.animation='fwTw '+(2.4+Math.random()*3.2).toFixed(2)+'s ease-in-out '+(Math.random()*6).toFixed(2)+'s infinite';
    s.innerHTML=spark; sky.appendChild(s);
  }
})();
</script>
