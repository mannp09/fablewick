<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramkabir Fablewick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@400;500;600&family=Noto+Serif+Gujarati:wght@400;600&family=Noto+Serif+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#FBF6EE; --ink:#2A2118; --sage:#8FA68A; --amber:#D4925E; --coral:#D67A6E; --paper:#F3ECE2; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{ font-family:'Lora',Georgia,serif; color:var(--paper);
    background:linear-gradient(180deg,#1C2A52 0%,#46396A 52%,#B97E7A 100%);
    background-attachment:fixed; min-height:100vh; }
  body.lang-gu, body.lang-gu .story, body.lang-gu .moral{font-family:'Noto Serif Gujarati','Lora',serif}
  body.lang-hi, body.lang-hi .story, body.lang-hi .moral{font-family:'Noto Serif Devanagari','Lora',serif}
  #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  #starfield .twk{position:absolute;opacity:.16}
  @keyframes fwTw{0%,40%,100%{opacity:.14;transform:scale(.6)}47%{opacity:1;transform:scale(1)}54%{opacity:.14;transform:scale(.6)}}
  @media (prefers-reduced-motion:reduce){#starfield .twk{animation:none!important;opacity:.5!important}}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px 80px}

  header{text-align:center;padding:54px 0 26px}
  .kicker{font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:.30em;text-transform:uppercase;color:#DEB2A8;margin-bottom:14px}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(38px,6vw,68px);color:#FBF4EC;line-height:1.02}
  .sub{font-family:'Outfit',sans-serif;color:#E6DAE4;margin-top:14px;font-size:clamp(15px,1.6vw,18px)}
  body.lang-gu .sub{font-family:'Noto Serif Gujarati',sans-serif}
  body.lang-hi .sub{font-family:'Noto Serif Devanagari',sans-serif}

  /* language selector (home) */
  .langbar{display:flex;gap:10px;justify-content:center;margin:22px 0 6px}
  .langbar button{font-family:'Outfit',sans-serif;font-size:15px;cursor:pointer;color:#EADFF0;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);padding:9px 20px;border-radius:99px;transition:all .2s}
  .langbar button:hover{color:#fff;background:rgba(255,255,255,.16)}
  .langbar button.on{background:var(--paper);color:#2A2342;border-color:var(--paper);box-shadow:0 0 16px rgba(243,236,226,.35)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:26px;margin-top:18px}
  .card{cursor:pointer;border-radius:20px;overflow:hidden;background:rgba(24,34,66,.42);
    border:1px solid rgba(255,255,255,.14);transition:transform .3s,box-shadow .3s}
  .card:hover{transform:translateY(-5px);box-shadow:0 18px 50px rgba(0,0,0,.4)}
  .cover{aspect-ratio:4/3;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;position:relative;overflow:hidden}
  .cover .ill-tag{position:absolute;top:12px;right:14px;font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(42,33,24,.5);background:rgba(255,255,255,.45);padding:4px 9px;border-radius:99px}
  .cover h3{font-family:'Fraunces',serif;font-weight:600;font-size:25px;color:var(--ink);line-height:1.1}
  body.lang-gu .cover h3{font-family:'Noto Serif Gujarati',serif}
  body.lang-hi .cover h3{font-family:'Noto Serif Devanagari',serif}
  .cover .cap{font-family:'Outfit',sans-serif;font-size:12.5px;color:rgba(42,33,24,.66);margin-top:7px;line-height:1.4}
  .cover.amber{background:linear-gradient(150deg,#F3D9B8,#E6B483)}
  .cover.sage{background:linear-gradient(150deg,#D7E2CF,#A7C0A0)}
  .cover.coral{background:linear-gradient(150deg,#F2C9C0,#Df9d92)}
  .cover.cream{background:linear-gradient(150deg,#FBF4E8,#E9D8C4)}
  .meta{padding:16px 20px 20px}
  .meta .moral{font-family:'Outfit',sans-serif;color:#E4D9DD;font-size:14px;line-height:1.55}
  body.lang-gu .meta .moral{font-family:'Noto Serif Gujarati',sans-serif}
  body.lang-hi .meta .moral{font-family:'Noto Serif Devanagari',sans-serif}
  .meta .levels{font-family:'Outfit',sans-serif;font-size:11.5px;letter-spacing:.06em;color:#CBBECC;margin-top:10px}

  #reader{display:none}
  .rbar{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:16px 0 14px;margin-bottom:8px;background:linear-gradient(180deg,rgba(28,42,82,.92),rgba(28,42,82,.0))}
  .back{font-family:'Outfit',sans-serif;cursor:pointer;color:#E7DFF3;font-size:14px;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:99px}
  .back:hover{background:rgba(255,255,255,.2)}
  .rtitle{font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:#FBF4EC;margin-right:auto}
  body.lang-gu .rtitle{font-family:'Noto Serif Gujarati',serif}
  body.lang-hi .rtitle{font-family:'Noto Serif Devanagari',serif}
  .toggle{display:flex;gap:6px}
  .toggle button{font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;
    background:rgba(255,255,255,.1);color:#EADFF0;border:1px solid rgba(255,255,255,.22);padding:7px 14px;border-radius:99px;transition:all .2s}
  .toggle button:hover{color:#fff}
  .toggle button.on{background:var(--paper);color:#2A2342;border-color:var(--paper)}
  body.lang-gu .toggle button{font-family:'Noto Serif Gujarati',sans-serif}
  body.lang-hi .toggle button{font-family:'Noto Serif Devanagari',sans-serif}

  .book{background:var(--cream);color:var(--ink);border-radius:24px;padding:clamp(26px,5vw,64px);
    box-shadow:0 24px 70px rgba(0,0,0,.4);max-width:760px;margin:0 auto}
  .book .lvl-label{font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);text-align:center}
  body.lang-gu .book .lvl-label, body.lang-hi .book .lvl-label{letter-spacing:.08em}
  .book h2{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(28px,4.5vw,46px);text-align:center;margin:8px 0 6px;line-height:1.05}
  body.lang-gu .book h2{font-family:'Noto Serif Gujarati',serif}
  body.lang-hi .book h2{font-family:'Noto Serif Devanagari',serif}
  .book .moral{font-style:italic;text-align:center;color:#6b5d4a;margin-bottom:8px}
  .ill{aspect-ratio:16/9;border-radius:16px;margin:30px 0 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;border:1.5px dashed rgba(42,33,24,.22);
    background:repeating-linear-gradient(135deg,#F4EADd,#F4EADd 14px,#EFE3D2 14px,#EFE3D2 28px)}
  .ill .badge{font-family:'Outfit',sans-serif;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:#b08a5e;margin-bottom:9px}
  .ill .scene{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(15px,2vw,19px);color:#5e503c;max-width:80%;line-height:1.35}
  .ill.cover-ill{aspect-ratio:3/2;margin-top:6px}
  .ill-img{width:100%;border-radius:16px;margin:30px 0 12px;display:block;box-shadow:0 10px 30px rgba(42,33,24,.22)}
  .ill-img.cover-img{margin-top:6px}
  p.story{font-size:clamp(16px,1.7vw,18.5px);line-height:1.85;margin:18px 0;color:#332a1f}
  p.story:first-of-type::first-letter{font-family:'Fraunces',serif;font-weight:700;font-size:3.2em;float:left;line-height:.84;margin:6px 10px 0 0;color:var(--amber)}
  body.lang-gu p.story:first-of-type::first-letter, body.lang-hi p.story:first-of-type::first-letter{float:none;font-size:1em;margin:0;color:inherit}
  .endmark{text-align:center;color:var(--sage);font-size:22px;margin-top:26px}
  .site-footer{margin-top:46px;padding-top:28px;border-top:1px solid rgba(255,255,255,.14);text-align:center}
  .coauthor{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
  .coauthor-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.32);box-shadow:0 4px 14px rgba(0,0,0,.32)}
  .coauthor-text{text-align:left;font-family:'Outfit',sans-serif}
  .coauthor-by{color:#ECE2EA;font-size:15px}
  .coauthor-sub{color:#CBBECC;font-size:13px;margin-top:2px}
  .coauthor-contact{color:#CBBECC;font-size:13px;margin-top:2px}
  .footer-source{font-family:'Outfit',sans-serif;font-size:12.5px;color:#CBBECC;margin:16px auto 0;max-width:580px;line-height:1.6}
  .site-footer a{color:#E9BD93;text-decoration:none;border-bottom:1px solid rgba(233,189,147,.45)}
  .site-footer a:hover{color:#FBF4EC}
  .footer-note{font-family:'Outfit',sans-serif;font-size:12.5px;color:#CBBECC;margin-top:8px}
</style>
</head>

<script>
const BOOKS = [{"slug": "dry-banyan-twig", "color": "amber", "scenes": ["The great Kabirvad banyan on a Narmada island at golden dawn", "Two brothers press a dry banyan twig into the riverbank earth", "The brothers kneel beside the bare twig, making their vow", "Kabir the weaver walks the riverbank toward them", "The dry twig bursts into bright green leaf", "Years later — the twig is now a giant shading banyan"], "title": {"en": "The Dry Banyan Twig", "gu": "સૂકી વડની ડાળખી", "hi": "सूखी बरगद की टहनी"}, "moral": {"en": "Sincerity is proven by what actually happens, not by titles.", "gu": "સચ્ચાઈ ખરેખર શું થાય છે તેનાથી સાબિત થાય છે, પદવીઓથી નહીં.", "hi": "सच्चाई इससे साबित होती है कि सचमुच क्या होता है, उपाधियों से नहीं।"}, "levels": {"kids": {"en": ["By the wide Narmada river, near Bharuch, two brothers found a twig.", "It was brown. It was dry. It had no leaves at all.", "\"Let's plant it,\" said the big brother. They pushed the twig into the soft brown dirt. They patted it down. They waited.", "\"Only a true and good man could make a dead twig grow,\" they said. \"We will wait for him.\"", "The sun came up. The sun went down. The twig stayed brown. The twig stayed bare. Not one little leaf.", "Day after day, the brothers came back. They sat by the twig. They looked down the long river road. They watched the water go by.", "One morning, a man came walking. He wore plain white cloth. He carried a small spinning thread. His face was soft and calm. He walked past the dry little twig.", "And then — a tiny green leaf! Then another. Then another. Soft and bright and new.", "The brothers' eyes went wide. The twig was alive!", "The kind man, whose name was Kabir, only smiled and walked on, slow and quiet, down by the wide, wide river.", "The brothers stayed. They watched the little leaves shake in the wind. And the twig grew."], "gu": ["ભરૂચ પાસે, પહોળી નર્મદા નદીના કિનારે, બે ભાઈઓને એક ડાળખી મળી.", "એ ભૂરી હતી. એ સૂકી હતી. એને એક પણ પાંદડું નહોતું.", "\"ચાલો એને રોપીએ,\" મોટા ભાઈએ કહ્યું. તેઓએ ડાળખીને નરમ ભૂરી માટીમાં ખોસી. તેઓએ માટી થાબડી. તેઓ રાહ જોવા લાગ્યા.", "\"ફક્ત સાચો અને સારો માણસ જ સૂકી ડાળખીને ઊગાડી શકે,\" તેઓએ કહ્યું. \"અમે એની રાહ જોઈશું.\"", "સૂરજ ઊગ્યો. સૂરજ આથમ્યો. ડાળખી ભૂરી જ રહી. ડાળખી ઉઘાડી જ રહી. એક પણ નાનું પાંદડું નહીં.", "દિવસે દિવસે ભાઈઓ પાછા આવતા. તેઓ ડાળખી પાસે બેસતા. તેઓ નદી પાસેના લાંબા રસ્તા તરફ જોતા. તેઓ વહેતું પાણી જોતા.", "એક સવારે, એક માણસ ચાલતો આવ્યો. એણે સાદું સફેદ વસ્ત્ર પહેર્યું હતું. એના હાથમાં નાનો સૂતરનો ત્રાક હતો. એનો ચહેરો કોમળ અને શાંત હતો. એ સૂકી નાની ડાળખી પાસેથી પસાર થયો.", "અને પછી — એક નાનું લીલું પાંદડું! પછી બીજું. પછી ત્રીજું. કોમળ, ચમકતું અને નવું.", "ભાઈઓની આંખો પહોળી થઈ ગઈ. ડાળખી જીવતી થઈ ગઈ!", "એ દયાળુ માણસ, જેનું નામ કબીર હતું, ફક્ત હસ્યો અને ધીમે ધીમે, શાંતિથી, પહોળી, પહોળી નદીના કિનારે આગળ ચાલતો ગયો.", "ભાઈઓ ત્યાં જ રહ્યા. તેઓ પવનમાં હાલતાં નાનાં પાંદડાં જોતા રહ્યા. અને ડાળખી મોટી થતી ગઈ."], "hi": ["भरूच के पास, चौड़ी नर्मदा नदी के किनारे, दो भाइयों को एक टहनी मिली।", "वह भूरी थी। वह सूखी थी। उस पर एक भी पत्ता नहीं था।", "\"चलो इसे लगा देते हैं,\" बड़े भाई ने कहा। उन्होंने टहनी को नरम भूरी मिट्टी में गाड़ दिया। उन्होंने मिट्टी थपथपाई। वे इंतज़ार करने लगे।", "\"सिर्फ़ एक सच्चा और अच्छा इंसान ही सूखी टहनी को उगा सकता है,\" उन्होंने कहा। \"हम उसी का इंतज़ार करेंगे।\"", "सूरज निकला। सूरज ढला। टहनी भूरी ही रही। टहनी सूनी ही रही। एक भी नन्हा पत्ता नहीं।", "दिन पर दिन भाई लौटकर आते। वे टहनी के पास बैठते। वे नदी के लंबे रास्ते की ओर देखते। वे बहते पानी को देखते।", "एक सुबह, एक आदमी चलता हुआ आया। उसने सादा सफ़ेद कपड़ा पहना था। उसके हाथ में एक छोटी सूत की तकली थी। उसका चेहरा कोमल और शांत था। वह सूखी छोटी टहनी के पास से गुज़रा।", "और तभी — एक नन्हा हरा पत्ता! फिर दूसरा। फिर तीसरा। कोमल, चमकीला और नया।", "भाइयों की आँखें फैल गईं। टहनी जी उठी थी!", "वह दयालु आदमी, जिसका नाम कबीर था, बस मुस्कुराया और धीरे-धीरे, चुपचाप, चौड़ी, चौड़ी नदी के किनारे आगे बढ़ गया।", "भाई वहीं रुके रहे। वे हवा में हिलते नन्हे पत्तों को देखते रहे। और टहनी बढ़ती गई।"]}, "adults": {"en": ["Two brothers lived near Bharuch, in Gujarat, where the flat green fields meet the wide Narmada river. All their lives they had heard people say, \"He is a holy man. He is a true saint.\" But how could you ever really know?", "One day the younger brother found a banyan twig lying in the dust. It was dry and brown and leafless, dead as a stick of firewood. \"I have an idea,\" he said.", "They walked to the riverbank and pushed the twig deep into the damp earth, patting the soil around it with their hands. \"Let us make a vow,\" said the older brother. \"A dead twig cannot grow. But if a person comes who is truly good — truly holy, all the way through — then this twig will live. We will wait for that one and no other.\"", "So they waited. Days passed. The twig stayed bare. Many travelers walked the river road. Some wore fine clothes and golden rings. Some had crowds of followers calling out their names. The brothers watched each one walk by the twig. Nothing happened. The twig stayed dry.", "Doubt crept in. \"Maybe we were foolish,\" the younger brother whispered. \"Maybe no such person exists.\"", "Then, one quiet morning, a man came walking alone. He was not young and not old. He wore plain undyed cloth, white as river foam, with no gold and no followers. In his hands he carried a simple cotton spindle — the small tool a weaver uses to spin thread. He looked like any ordinary weaver heading home from his loom.", "The brothers almost did not look up. But as the weaver passed the planted twig, something changed in the air. A soft green light seemed to rise from the dirt.", "The younger brother gasped and pointed. A leaf had opened on the dry twig. A small, bright, perfect green leaf. Then another curled open beside it. Then another, and another, until the bare brown stick was trembling with new leaves.", "The brothers fell to their knees, amazed. They looked from the twig to the weaver and back again.", "The weaver — whose name was Kabir — only smiled, the gentle smile of someone who was not surprised at all. He did not boast. He did not stop to explain. He simply nodded to the two brothers and walked on along the riverbank, his spindle turning softly in his hand.", "The brothers stayed beside the twig for a long, long time, watching the new leaves catch the sun. And the little tree began to grow.", "Years went by, and the boys became men, and still the twig kept growing — thickening into a trunk, throwing down roots that became new trunks, the way banyans do, until it sheltered the whole riverbank. And sometimes, resting in its shade, one of them would touch the great rough bark and wonder how many other quiet weavers they had let walk past, in all the years before, without ever looking up."], "gu": ["ગુજરાતમાં ભરૂચ પાસે બે ભાઈઓ રહેતા હતા, જ્યાં સપાટ લીલાં ખેતરો પહોળી નર્મદા નદીને મળે છે. જીવનભર તેઓએ લોકોને કહેતા સાંભળ્યા હતા, \"એ સંત છે. એ સાચા સાધુ છે.\" પણ ખરેખર કેવી રીતે જાણવું?", "એક દિવસ નાના ભાઈને ધૂળમાં પડેલી વડની એક ડાળખી મળી. એ સૂકી, ભૂરી અને પાંદડાં વગરની હતી, બળતણના લાકડા જેવી મરી ગયેલી. \"મારી પાસે એક વિચાર છે,\" એ બોલ્યો.", "તેઓ નદીના કિનારે ગયા અને ડાળખીને ભીની માટીમાં ઊંડે ખોસી, હાથથી આસપાસની માટી થાબડી. \"ચાલો એક પ્રતિજ્ઞા લઈએ,\" મોટા ભાઈએ કહ્યું. \"મરી ગયેલી ડાળખી ઊગી શકતી નથી. પણ જો કોઈ એવો માણસ આવે જે ખરેખર સારો હોય — અંતરથી સાચો સંત — તો આ ડાળખી જીવી જશે. અમે એ એક જ માણસની રાહ જોઈશું, બીજા કોઈની નહીં.\"", "આથી તેઓ રાહ જોવા લાગ્યા. દિવસો વીત્યા. ડાળખી ઉઘાડી જ રહી. ઘણા મુસાફરો નદીના રસ્તે ચાલતા આવ્યા. કેટલાક સુંદર વસ્ત્રો અને સોનાની વીંટીઓ પહેરતા. કેટલાકની પાછળ તેમનાં નામ પોકારતા અનુયાયીઓની ભીડ ચાલતી. ભાઈઓ દરેકને ડાળખી પાસેથી પસાર થતા જોતા. કંઈ ન થયું. ડાળખી સૂકી જ રહી.", "શંકા ઘૂસી આવી. \"કદાચ આપણે મૂર્ખ હતા,\" નાના ભાઈએ ધીમેથી કહ્યું. \"કદાચ એવો કોઈ માણસ છે જ નહીં.\"", "પછી, એક શાંત સવારે, એક માણસ એકલો ચાલતો આવ્યો. એ ન તો જુવાન હતો, ન વૃદ્ધ. એણે સાદું, વગર રંગ્યું વસ્ત્ર પહેર્યું હતું, નદીના ફીણ જેવું સફેદ, ન સોનું ન અનુયાયીઓ. એના હાથમાં સાદો સૂતરનો ત્રાક હતો — વણકર સૂતર કાંતવા માટે વાપરે છે એ નાનું ઓજાર. એ પોતાની સાળ પરથી ઘેર પાછા ફરતા કોઈ સામાન્ય વણકર જેવો જ દેખાતો હતો.", "ભાઈઓએ માંડ ઊંચું જોયું. પણ જેવો વણકર રોપેલી ડાળખી પાસેથી પસાર થયો, હવામાં કંઈક બદલાયું. માટીમાંથી જાણે કોમળ લીલો પ્રકાશ ઊઠતો હોય એમ લાગ્યું.", "નાના ભાઈએ શ્વાસ રોકી લીધો અને આંગળી ચીંધી. સૂકી ડાળખી પર એક પાંદડું ખીલ્યું હતું. એક નાનું, ચમકતું, સંપૂર્ણ લીલું પાંદડું. પછી એની બાજુમાં બીજું ખીલ્યું. પછી ત્રીજું, ને ચોથું, ત્યાં સુધી કે ઉઘાડી ભૂરી ડાળખી નવાં પાંદડાંથી ધ્રૂજવા લાગી.", "ભાઈઓ આશ્ચર્યમાં ઘૂંટણિયે પડ્યા. તેઓ ડાળખીથી વણકર તરફ ને પાછા ડાળખી તરફ જોતા રહ્યા.", "વણકર — જેનું નામ કબીર હતું — ફક્ત હસ્યો, એવા માણસનું કોમળ સ્મિત જેને જરાય આશ્ચર્ય નહોતું. એણે બડાઈ ન મારી. એ સમજાવવા ઊભો ન રહ્યો. એણે ફક્ત બે ભાઈઓ સામે માથું હલાવ્યું અને નદીના કિનારે આગળ ચાલતો ગયો, એના હાથમાં ત્રાક ધીમેથી ફરતો રહ્યો.", "ભાઈઓ ઘણા, ઘણા સમય સુધી ડાળખી પાસે રહ્યા, સૂરજનો તડકો ઝીલતાં નવાં પાંદડાં જોતા રહ્યા. અને એ નાનું ઝાડ ઊગવા લાગ્યું.", "વર્ષો વીત્યાં, ને છોકરાઓ માણસ બન્યા, છતાં ડાળખી ઊગતી જ રહી — થડ બની જાડી થઈ, વડ જેમ કરે છે તેમ મૂળ નીચે નાખ્યાં જે નવાં થડ બન્યાં, ત્યાં સુધી કે એણે આખા નદીકિનારાને છાંયો આપ્યો. ને ક્યારેક, એના છાંયડે વિસામો લેતાં, તેમાંથી એક જણ એ મોટી ખરબચડી છાલને સ્પર્શતો ને વિચારતો કે અગાઉનાં બધાં વર્ષોમાં તેઓએ બીજા કેટલા શાંત વણકરોને ઊંચું જોયા વગર પસાર થવા દીધા હશે."], "hi": ["गुजरात में भरूच के पास दो भाई रहते थे, जहाँ समतल हरे खेत चौड़ी नर्मदा नदी से मिलते हैं। जीवन भर उन्होंने लोगों को कहते सुना था, \"वह संत है। वह सच्चा साधु है।\" पर सचमुच कैसे जाना जाए?", "एक दिन छोटे भाई को धूल में पड़ी बरगद की एक टहनी मिली। वह सूखी, भूरी और पत्तों से रहित थी, जलावन की लकड़ी जैसी मरी हुई। \"मेरे पास एक विचार है,\" वह बोला।", "वे नदी के किनारे गए और टहनी को गीली मिट्टी में गहरे गाड़ दिया, हाथों से उसके चारों ओर की मिट्टी थपथपाई। \"चलो एक प्रण लें,\" बड़े भाई ने कहा। \"मरी हुई टहनी उग नहीं सकती। पर अगर कोई ऐसा इंसान आए जो सचमुच अच्छा हो — भीतर तक सच्चा संत — तो यह टहनी जी उठेगी। हम उसी एक का इंतज़ार करेंगे, और किसी का नहीं।\"", "सो वे इंतज़ार करने लगे। दिन बीते। टहनी सूनी ही रही। कई मुसाफ़िर नदी के रास्ते से गुज़रे। कुछ बढ़िया कपड़े और सोने की अँगूठियाँ पहने थे। कुछ के पीछे उनके नाम पुकारते अनुयायियों की भीड़ थी। भाई हर एक को टहनी के पास से गुज़रते देखते। कुछ न हुआ। टहनी सूखी ही रही।", "संदेह घर कर गया। \"शायद हम मूर्ख थे,\" छोटे भाई ने फुसफुसाकर कहा। \"शायद ऐसा कोई इंसान है ही नहीं।\"", "फिर, एक शांत सुबह, एक आदमी अकेला चलता हुआ आया। वह न जवान था, न बूढ़ा। उसने सादा, बिना रंगा कपड़ा पहना था, नदी के झाग जैसा सफ़ेद, न सोना न अनुयायी। उसके हाथों में एक सादी सूत की तकली थी — वह छोटा औज़ार जिससे जुलाहा सूत कातता है। वह अपने करघे से घर लौटते किसी आम जुलाहे जैसा ही दिखता था।", "भाइयों ने मुश्किल से नज़र उठाई। पर जैसे ही जुलाहा रोपी हुई टहनी के पास से गुज़रा, हवा में कुछ बदल गया। मिट्टी से मानो एक कोमल हरी रोशनी उठती हुई लगी।", "छोटे भाई की साँस रुक गई और उसने उँगली उठाई। सूखी टहनी पर एक पत्ता खुल गया था। एक छोटा, चमकीला, बिल्कुल पूरा हरा पत्ता। फिर उसके बगल में दूसरा खुला। फिर तीसरा, और चौथा, यहाँ तक कि सूनी भूरी टहनी नए पत्तों से काँपने लगी।", "भाई अचंभे में घुटनों के बल गिर पड़े। वे टहनी से जुलाहे की ओर और फिर वापस टहनी की ओर देखते रहे।", "जुलाहा — जिसका नाम कबीर था — बस मुस्कुराया, उस इंसान की कोमल मुस्कान जिसे ज़रा भी अचंभा न हुआ हो। उसने डींग नहीं हाँकी। वह समझाने के लिए रुका नहीं। उसने बस दोनों भाइयों की ओर सिर हिलाया और नदी के किनारे आगे बढ़ गया, उसके हाथ में तकली धीरे-धीरे घूमती रही।", "भाई बहुत, बहुत देर तक टहनी के पास रहे, धूप को झेलते नए पत्तों को देखते रहे। और वह नन्हा पेड़ बढ़ने लगा।", "साल बीते, और लड़के आदमी बन गए, फिर भी टहनी बढ़ती ही रही — मोटी होकर तना बनी, बरगद की तरह जड़ें नीचे डालीं जो नए तने बन गईं, यहाँ तक कि उसने पूरे नदी-किनारे को छाँव दे दी। और कभी-कभी, उसकी छाँव में सुस्ताते हुए, उनमें से एक उस बड़ी खुरदरी छाल को छूता और सोचता कि पहले के उन सारे सालों में उन्होंने कितने और चुपचाप जुलाहों को बिना नज़र उठाए गुज़र जाने दिया होगा।"]}, "seniors": {"en": ["Near Bharuch, in Gujarat, where the flat green fields lie down beside the wide and patient Narmada, there once lived two brothers. All their lives they had heard the world speak of holy men — \"He is a saint,\" people would say of one, \"he is a true sadhu,\" of another. The brothers honored the words, yet quietly they wondered: how does a heart ever truly know who is real?", "One day the younger brother lifted a banyan twig from the dust. It was dry and brown and bare, lifeless as firewood. And from that small dead thing a thought was born. They carried it to the river, knelt in the damp earth, and pressed it gently into the soil.", "\"Let this be our vow,\" the elder said softly. \"No dead twig can grow by its own power. But should a soul pass who is good all the way to the root — truly, humbly holy — then this twig will live. For that one we will wait, and for no other.\"", "And so they kept their patient watch. The days gathered into seasons. Along the river road came many a traveler robed in silk and ringed in gold, trailed by crowds calling out their names. Each time, the brothers held still and watched — and each time the twig stayed brown and bare, and a little of their hope grew thin.", "\"Perhaps,\" the younger murmured one grey morning, \"holiness is only a word that people say.\" Yet they did not pull the twig from the ground. Something in them kept faith.", "Then, on an ordinary morning, a man came walking alone. He was neither young nor old. He wore a single length of undyed cloth, white as river foam — no gold upon him, no followers behind him. In his hands turned a humble cotton spindle, the quiet tool of a weaver returning from his loom. He carried himself like a man with no need to be admired.", "As he passed the planted twig, a hush settled over the air, and a soft green light seemed to rise from the dark soil, the way warmth rises from the ground at dawn.", "A leaf unfurled upon the dead wood. Then another, and another, until the bare brown stick stood trembling, clothed in tender green, alive and reaching toward the light.", "The brothers sank to their knees, their hearts full. They looked from the leaves to the stranger and back, scarcely able to breathe.", "The weaver — his name was Kabir — only smiled the gentle smile of one who is not surprised, for whom greenness in his wake is the most natural thing in the world. He did not boast. He did not pause to be praised. He gave the brothers a small, kind nod and walked on along the river, his spindle turning softly, until the bend of the water took him from sight.", "They did not chase him. They sat on beside the twig as the sun crossed the sky, watching the new leaves shiver in the breeze. And the little tree began to grow.", "In the long years that followed it thickened into a trunk and let down roots that rose as new trunks, the way of the banyan, until it became a whole green world of shade, wide enough to shelter a village upon its island in the river. And sometimes, resting in the cool beneath those branches, an old brother would lay his hand on the great rough bark and remember the dead stick it had once been — and wonder gently how many other quiet weavers had walked past in all the years before, while he had forgotten to look up."], "gu": ["ગુજરાતમાં ભરૂચ પાસે, જ્યાં સપાટ લીલાં ખેતરો પહોળી ને ધીરજવાન નર્મદાની બાજુમાં પોઢે છે, ત્યાં એક વાર બે ભાઈઓ રહેતા હતા. જીવનભર તેઓએ જગતને સંતો વિશે વાત કરતા સાંભળ્યું હતું — \"એ સંત છે,\" લોકો એક વિશે કહેતા, \"એ સાચા સાધુ છે,\" બીજા વિશે. ભાઈઓ એ વાતોને માન આપતા, છતાં મનમાં વિચારતા: હૃદય ખરેખર કેવી રીતે જાણે કે કોણ સાચું છે?", "એક દિવસ નાના ભાઈએ ધૂળમાંથી વડની એક ડાળખી ઉપાડી. એ સૂકી, ભૂરી ને ઉઘાડી હતી, બળતણ જેવી નિર્જીવ. ને એ નાની મરેલી વસ્તુમાંથી એક વિચાર જન્મ્યો. તેઓ એને નદી પાસે લઈ ગયા, ભીની માટીમાં ઘૂંટણિયે પડ્યા, ને હળવેથી માટીમાં ખોસી.", "\"આ આપણી પ્રતિજ્ઞા હો,\" મોટા ભાઈએ ધીમેથી કહ્યું. \"કોઈ મરેલી ડાળખી પોતાની શક્તિથી ઊગી શકતી નથી. પણ જો કોઈ એવો જીવ પસાર થાય જે મૂળ સુધી સારો હોય — ખરેખર, નમ્ર સંત — તો આ ડાળખી જીવી જશે. એ એક માટે અમે રાહ જોઈશું, બીજા કોઈ માટે નહીં.\"", "ને આમ તેઓ ધીરજથી રાહ જોતા રહ્યા. દિવસો ઋતુઓમાં ભેગા થયા. નદીના રસ્તે રેશમ પહેરેલા ને સોને મઢેલા કેટલાય મુસાફરો આવ્યા, પાછળ તેમનાં નામ પોકારતી ભીડ. દરેક વખતે ભાઈઓ સ્થિર રહી જોતા — ને દરેક વખતે ડાળખી ભૂરી ને ઉઘાડી જ રહેતી, ને તેમની આશા થોડી પાતળી થતી.", "\"કદાચ,\" એક ભૂખરી સવારે નાનો ભાઈ બોલ્યો, \"સંતપણું તો ફક્ત લોકો બોલે એવો શબ્દ જ છે.\" છતાં તેઓએ ડાળખીને જમીનમાંથી ઉખાડી નહીં. તેમની અંદર કંઈક શ્રદ્ધા રાખતું રહ્યું.", "પછી, એક સામાન્ય સવારે, એક માણસ એકલો ચાલતો આવ્યો. એ ન જુવાન હતો, ન વૃદ્ધ. એણે વગર રંગ્યું એક જ વસ્ત્ર પહેર્યું હતું, નદીના ફીણ જેવું સફેદ — ન અંગે સોનું, ન પાછળ અનુયાયીઓ. એના હાથમાં સાદો સૂતરનો ત્રાક ફરતો હતો, સાળ પરથી પાછા ફરતા વણકરનું શાંત ઓજાર. એ એવા માણસની જેમ ચાલતો જેને વખાણાવાની કોઈ જરૂર નથી.", "જેવો એ રોપેલી ડાળખી પાસેથી પસાર થયો, હવામાં શાંતિ છવાઈ, ને કાળી માટીમાંથી જાણે કોમળ લીલો પ્રકાશ ઊઠ્યો, જેમ પરોઢે જમીનમાંથી હૂંફ ઊઠે છે.", "મરેલા લાકડા પર એક પાંદડું ખીલ્યું. પછી બીજું, ને ત્રીજું, ત્યાં સુધી કે ઉઘાડી ભૂરી ડાળખી ધ્રૂજતી ઊભી રહી, કોમળ લીલપથી મઢાયેલી, જીવતી ને પ્રકાશ તરફ લંબાતી.", "ભાઈઓ હૃદય ભરાઈ આવતાં ઘૂંટણિયે પડ્યા. તેઓ પાંદડાંથી અજાણ્યા માણસ તરફ ને પાછા જોતા રહ્યા, માંડ શ્વાસ લેતા.", "વણકર — એનું નામ કબીર હતું — ફક્ત એવા માણસનું કોમળ સ્મિત હસ્યો જેને આશ્ચર્ય નથી, જેની પાછળ લીલપ ઊગવી એ જગતની સૌથી સ્વાભાવિક વાત છે. એણે બડાઈ ન મારી. એ વખાણ સાંભળવા થોભ્યો નહીં. એણે ભાઈઓ સામે નાનું, કોમળ માથું હલાવ્યું ને નદીના કિનારે આગળ ચાલ્યો, ત્રાક ધીમેથી ફરતો રહ્યો, ત્યાં સુધી કે પાણીના વળાંકે એને નજરથી ઓઝલ કરી દીધો.", "તેઓ એની પાછળ દોડ્યા નહીં. સૂરજ આકાશ ઓળંગતો રહ્યો ત્યાં સુધી તેઓ ડાળખી પાસે બેસી રહ્યા, પવનમાં ધ્રૂજતાં નવાં પાંદડાં જોતા. ને એ નાનું ઝાડ ઊગવા લાગ્યું.", "પછીનાં લાંબાં વર્ષોમાં એ થડ બની જાડું થયું ને વડની રીતે મૂળ નીચે ઉતાર્યાં જે નવાં થડ બની ઊઠ્યાં, ત્યાં સુધી કે એ આખું લીલું છાંયડાનું જગત બની ગયું, નદીમાંના પોતાના બેટ પર એક ગામને છાંયો આપે એટલું પહોળું. ને ક્યારેક, એ ડાળીઓ નીચેની ઠંડકમાં વિસામો લેતાં, કોઈ વૃદ્ધ ભાઈ એ મોટી ખરબચડી છાલ પર હાથ મૂકતો ને એ સૂકા લાકડાને યાદ કરતો જે એ એક વાર હતું — ને હળવેથી વિચારતો કે અગાઉનાં બધાં વર્ષોમાં બીજા કેટલા શાંત વણકરો પસાર થઈ ગયા હશે, જ્યારે એ ઊંચું જોવાનું ભૂલી ગયો હતો."], "hi": ["गुजरात में भरूच के पास, जहाँ समतल हरे खेत चौड़ी और धैर्यवान नर्मदा के किनारे लेटे हैं, वहाँ कभी दो भाई रहते थे। जीवन भर उन्होंने दुनिया को संतों की बात करते सुना था — \"वह संत है,\" लोग एक के बारे में कहते, \"वह सच्चा साधु है,\" दूसरे के बारे में। भाई उन बातों का आदर करते, फिर भी मन ही मन सोचते: हृदय सचमुच कैसे जाने कि कौन असली है?", "एक दिन छोटे भाई ने धूल से बरगद की एक टहनी उठाई। वह सूखी, भूरी और सूनी थी, जलावन जैसी निर्जीव। और उस छोटी मरी हुई चीज़ से एक विचार जन्मा। वे उसे नदी के पास ले गए, गीली मिट्टी में घुटनों के बल बैठे, और धीरे से मिट्टी में गाड़ दिया।", "\"यही हमारा प्रण हो,\" बड़े भाई ने धीरे से कहा। \"कोई मरी हुई टहनी अपने बल पर नहीं उग सकती। पर अगर कोई ऐसी आत्मा गुज़रे जो जड़ तक अच्छी हो — सचमुच, विनम्र संत — तो यह टहनी जी उठेगी। उसी एक के लिए हम इंतज़ार करेंगे, और किसी के लिए नहीं।\"", "और इस तरह वे धैर्य से अपनी राह तकते रहे। दिन ऋतुओं में बदलते गए। नदी के रास्ते रेशम पहने और सोने से मढ़े कई मुसाफ़िर आए, पीछे उनके नाम पुकारती भीड़। हर बार भाई स्थिर रहकर देखते — और हर बार टहनी भूरी और सूनी ही रहती, और उनकी आशा थोड़ी और क्षीण होती।", "\"शायद,\" एक धुँधली सुबह छोटा भाई बुदबुदाया, \"संतपन तो बस एक शब्द है जो लोग कहते हैं।\" फिर भी उन्होंने टहनी को ज़मीन से नहीं उखाड़ा। उनके भीतर कुछ श्रद्धा बनाए रखता रहा।", "फिर, एक साधारण सुबह, एक आदमी अकेला चलता हुआ आया। वह न जवान था, न बूढ़ा। उसने बिना रंगा एक ही कपड़ा पहना था, नदी के झाग जैसा सफ़ेद — न देह पर सोना, न पीछे अनुयायी। उसके हाथों में एक सादी सूत की तकली घूमती थी, करघे से लौटते जुलाहे का शांत औज़ार। वह ऐसे चलता था जैसे किसी आदमी को सराहे जाने की कोई ज़रूरत न हो।", "जैसे ही वह रोपी हुई टहनी के पास से गुज़रा, हवा में एक ख़ामोशी छा गई, और काली मिट्टी से मानो एक कोमल हरी रोशनी उठी, जैसे भोर में ज़मीन से गर्माहट उठती है।", "मरी हुई लकड़ी पर एक पत्ता खुला। फिर दूसरा, और तीसरा, यहाँ तक कि सूनी भूरी टहनी काँपती हुई खड़ी रही, कोमल हरियाली से ढकी, जीवित और रोशनी की ओर बढ़ती।", "भाई हृदय भर आने पर घुटनों के बल बैठ गए। वे पत्तों से उस अजनबी की ओर और फिर वापस देखते रहे, मुश्किल से साँस लेते।", "जुलाहा — उसका नाम कबीर था — बस उस इंसान की कोमल मुस्कान मुस्कुराया जिसे अचंभा नहीं होता, जिसके पीछे हरियाली का उगना दुनिया की सबसे स्वाभाविक बात हो। उसने डींग नहीं हाँकी। वह सराहना सुनने के लिए नहीं रुका। उसने भाइयों की ओर एक छोटा, स्नेहभरा सिर हिलाया और नदी के किनारे आगे बढ़ गया, उसकी तकली धीरे-धीरे घूमती रही, यहाँ तक कि पानी के मोड़ ने उसे नज़रों से ओझल कर दिया।", "वे उसके पीछे नहीं दौड़े। सूरज आकाश पार करता रहा, तब तक वे टहनी के पास बैठे रहे, हवा में काँपते नए पत्तों को देखते। और वह नन्हा पेड़ बढ़ने लगा।", "आगे के लंबे सालों में वह मोटा होकर तना बना और बरगद की रीत से जड़ें नीचे उतारीं जो नए तने बनकर उठीं, यहाँ तक कि वह हरियाली से भरा छाँव का एक पूरा संसार बन गया, नदी में अपने टापू पर एक गाँव को छाँव देने जितना चौड़ा। और कभी-कभी, उन डालियों के नीचे की ठंडक में सुस्ताते हुए, कोई बूढ़ा भाई उस बड़ी खुरदरी छाल पर हाथ रखता और उस सूखी लकड़ी को याद करता जो वह कभी थी — और धीरे से सोचता कि पहले के उन सारे सालों में कितने और चुपचाप जुलाहे गुज़र गए होंगे, जब वह ऊपर देखना भूल गया था।"]}}, "img_cover": "assets/ramkabir/dry-banyan-twig/cover.jpg", "img_pages": ["assets/ramkabir/dry-banyan-twig/page-1.jpg", "assets/ramkabir/dry-banyan-twig/page-2.jpg", "assets/ramkabir/dry-banyan-twig/page-3.jpg", "assets/ramkabir/dry-banyan-twig/page-4.jpg", "assets/ramkabir/dry-banyan-twig/page-5.jpg"]}, {"slug": "the-foot-that-said-ram", "color": "sage", "scenes": ["Boy Kabir alone on the dark temple steps before dawn", "Boy Kabir watches guru Ramanand teach beside the river", "Ramanand gently turns the boy away", "Night — Boy Kabir waits curled on the cold stone steps", "Dawn — Ramanand's foot brushes the boy, who cries 'Ram!'", "Ramanand blesses the boy as the sun rises over the ghat"], "title": {"en": "The Foot That Said Ram", "gu": "જે પગે રામ કહ્યું", "hi": "जिस पैर ने राम कहा"}, "moral": {"en": "Cleverness joined with real devotion opens doors that prejudice tried to shut; the name of God belongs to everyone.", "gu": "ચતુરાઈ સાચી ભક્તિ સાથે જોડાય ત્યારે ભેદભાવે બંધ કરેલા દરવાજા ખૂલી જાય છે; ભગવાનનું નામ સૌનું છે.", "hi": "चतुराई जब सच्ची भक्ति से जुड़ती है, तो भेदभाव के बंद किए दरवाज़े खुल जाते हैं; भगवान का नाम सबका है।"}, "levels": {"kids": {"en": ["By the river, the water went splash, splash.", "A boy named Kabir watched the old teacher. The teacher had a long white beard. He sat with his pupils and taught them holy words.", "Kabir wanted to learn too. \"Please teach me,\" he said.", "But the teacher shook his head. \"Not you, little one,\" he said softly.", "Kabir went home. But Kabir did not stop hoping. No, not Kabir.", "That night, Kabir went to the temple steps. The stone was cold. One little lamp glowed, flicker, flicker. Kabir curled up small and waited. He waited and waited in the dark.", "The sky turned soft and pink. The teacher came walking down the steps. Step, step, step.", "His bare foot touched the hidden boy.", "\"Ram!\" the teacher cried. \"Ram!\"", "It was a holy name. A name for God.", "The teacher looked down. The boy looked up. Both of them had big, surprised eyes.", "\"You gave me a holy word,\" said Kabir. \"Now you are my teacher.\"", "The old man smiled. The sun came up over the river, warm and golden. He put his hand on the boy's head.", "\"Yes,\" he said. \"Yes, little one. Come.\""], "gu": ["નદી કિનારે પાણી છપ-છપ વહેતું હતું.", "કબીર નામનો એક છોકરો વૃદ્ધ ગુરુને જોઈ રહ્યો હતો. ગુરુની દાઢી લાંબી ને સફેદ હતી. તે પોતાના શિષ્યો સાથે બેસીને એમને પવિત્ર શબ્દો શીખવતા.", "કબીરને પણ શીખવું હતું. \"મને પણ શીખવો ને,\" તેણે કહ્યું.", "પણ ગુરુએ માથું હલાવ્યું. \"તને નહીં, નાનકા,\" તેમણે હળવેથી કહ્યું.", "કબીર ઘરે ગયો. પણ કબીરે આશા ન છોડી. ના, કબીરે તો નહીં જ.", "એ રાત્રે કબીર મંદિરની સીડીઓ પાસે ગયો. પથ્થર ઠંડો હતો. એક નાનો દીવો ટમ-ટમ બળતો હતો. કબીર નાનો બનીને સંકોચાઈ ગયો ને રાહ જોવા લાગ્યો. અંધારામાં તે રાહ જોતો જ રહ્યો.", "આકાશ કુમળું ને ગુલાબી થયું. ગુરુ સીડીઓ ઊતરતા આવ્યા. ઠપ, ઠપ, ઠપ.", "એમનો ઉઘાડો પગ સંતાયેલા છોકરાને અડ્યો.", "\"રામ!\" ગુરુ બોલી ઊઠ્યા. \"રામ!\"", "એ એક પવિત્ર નામ હતું. ભગવાનનું નામ.", "ગુરુએ નીચે જોયું. છોકરાએ ઉપર જોયું. બંનેની આંખો અચરજથી મોટી થઈ ગઈ.", "\"તમે મને પવિત્ર શબ્દ આપ્યો,\" કબીરે કહ્યું. \"હવે તમે મારા ગુરુ.\"", "વૃદ્ધ ગુરુ હસ્યા. નદી પર સૂરજ ઊગ્યો, ગરમ ને સોનેરી. તેમણે છોકરાના માથે હાથ મૂક્યો.", "\"હા,\" તેમણે કહ્યું. \"હા, નાનકા. ચાલ, આવ.\""], "hi": ["नदी के किनारे पानी छप-छप बह रहा था.", "कबीर नाम का एक लड़का बूढ़े गुरु को देख रहा था. गुरु की दाढ़ी लंबी और सफ़ेद थी. वे अपने शिष्यों के साथ बैठकर उन्हें पवित्र शब्द सिखाते थे.", "कबीर भी सीखना चाहता था. \"मुझे भी सिखा दीजिए,\" उसने कहा.", "पर गुरु ने सिर हिला दिया. \"तुम्हें नहीं, नन्हे,\" उन्होंने धीरे से कहा.", "कबीर घर चला गया. पर कबीर ने उम्मीद नहीं छोड़ी. नहीं, कबीर ने तो बिलकुल नहीं.", "उस रात कबीर मंदिर की सीढ़ियों के पास गया. पत्थर ठंडा था. एक नन्हा दीया टिम-टिम जल रहा था. कबीर सिकुड़कर छोटा-सा हो गया और इंतज़ार करने लगा. अंधेरे में वह इंतज़ार करता ही रहा.", "आसमान कोमल और गुलाबी हो गया. गुरु सीढ़ियाँ उतरते हुए आए. ठप, ठप, ठप.", "उनका नंगा पैर छिपे हुए लड़के से छू गया.", "\"राम!\" गुरु पुकार उठे. \"राम!\"", "वह एक पवित्र नाम था. भगवान का नाम.", "गुरु ने नीचे देखा. लड़के ने ऊपर देखा. दोनों की आँखें हैरानी से बड़ी हो गईं.", "\"आपने मुझे पवित्र शब्द दे दिया,\" कबीर ने कहा. \"अब आप मेरे गुरु हैं.\"", "बूढ़े गुरु मुस्कुराए. नदी पर सूरज उगा, गरम और सुनहरा. उन्होंने लड़के के सिर पर हाथ रखा.", "\"हाँ,\" उन्होंने कहा. \"हाँ, नन्हे. आ जा, चल.\""]}, "adults": {"en": ["Every morning, before the rest of the town was awake, the old teacher Ramanand came down to the river to pray and to teach. He was a learned man, with a white beard that reached his chest and a string of worn prayer beads that clicked softly between his fingers. His pupils gathered around him on the wide stone steps, the ghat, that led down into the river, and they repeated after him the holy names of God while the water moved gold and grey in the early light.", "A little way off, at the river's edge, a weaver's boy stood watching.", "His name was Kabir. He was nine years old, slight as a reed, dressed in a plain white cloth, and he had loved those holy words from the very first time he heard them drift across the water. They were like a song he already half knew. He came every morning to listen, standing apart, mouthing the words to himself where no one could see.", "One morning, his longing grew too big to hold inside. He waited until the lesson ended and the pupils had gone, and then he stepped forward and bowed low.", "\"Master,\" he said, his voice trembling, \"will you teach me too?\"", "Ramanand looked down at the thin boy. His eyes were not unkind. But after a moment, he shook his head.", "\"Child,\" he said gently, \"you were not raised in the homes my pupils come from. It is not so simple. I cannot take you.\"", "He said it softly, and he turned away to his prayers, but to Kabir the words landed like a closed door.", "The boy walked home along the riverbank with his chin on his chest. Not so simple. Cannot take you. The words went round and round. But Kabir was not a boy who gave up easily, and somewhere between the river and his home, his sorrow turned quietly into a plan.", "A teacher, he thought, is one who gives you a holy word. If Master Ramanand will not give me a word with his mind made up, then perhaps he will give me one without meaning to.", "He knew the old man's habit. Every single morning, while it was still dark, Ramanand came down the temple steps to bathe and pray before anyone else stirred.", "So that night, when the town had gone quiet and the stars hung low over the river, Kabir crept back to the ghat. He lay down across one of the wide stone steps, halfway down, where the shadows pooled thickest. The stone was cold against his cheek. A single oil lamp burned in its niche, throwing one small circle of trembling light. Kabir pulled his thin cloth tight around his shoulders and waited.", "It was a long night. He shivered. His legs grew stiff. An owl called once across the water and went silent. More than once he thought of his warm bed at home, but every time, he stayed.", "At last, the sky behind the temple began to soften from black to deep grey, and then to the first pale grey of dawn. Birds stirred in the eaves. And from somewhere above came the sound Kabir had been waiting for all night long.", "Step. Step. Step.", "Ramanand was coming down, his mind still wrapped in sleep and prayer, his bare feet finding the worn stones the way they had for forty years. He did not see the small shape lying in the shadows.", "His foot came down softly against something warm, a shoulder, a boy.", "The old man gasped, and from his lips, quick as a heartbeat, leapt the name that always lived there:", "\"Ram! Ram!\"", "It rang out over the still water, the holy name of God.", "Kabir sat bolt upright, his eyes wide and bright in the lamplight.", "\"You said it,\" he breathed. \"Master, you gave it to me. With your own voice, in your own mouth, you taught me the holy name.\" He pressed his palms together. \"Now you are my teacher. You cannot say no, you have already taught me.\"", "Ramanand stood very still on the step above him. He looked at the boy he had turned away, the slight, shivering boy who had lain all night on cold stone, in the dark, just to catch a single word as it fell.", "And the old man began to understand something he had not seen in the daylight. He had thought the door was his to open or to close. But the holy name had slipped out of him on its own, without permission, without asking whose home the boy came from. It had gone to the one who was waiting for it. Perhaps, the old man thought, the name of God had never belonged to him to keep. Perhaps it had only ever been passing through.", "Behind him, the sun lifted over the far bank, and all at once the grey steps turned to warm and shining gold. The river caught fire with the light. And Ramanand, who had said no with his mind, found that his heart had somehow already said yes.", "He reached down and laid his hand upon the boy's bowed head.", "\"Come, then, my child,\" he said softly. \"It seems you have already begun.\"", "And as the two of them stood there in the rising gold, the old teacher found himself wondering: who, this morning, had truly taught, and who had truly learned?"], "gu": ["દરરોજ સવારે, આખું ગામ જાગે એ પહેલાં, વૃદ્ધ ગુરુ રામાનંદ નદી પાસે પ્રાર્થના કરવા ને શીખવવા આવતા. તેઓ વિદ્વાન પુરુષ હતા, છાતી સુધી પહોંચતી સફેદ દાઢી ને આંગળીઓ વચ્ચે હળવેથી ખખડતી જૂની માળા સાથે. નદીમાં ઊતરતી પહોળી પથ્થરની સીડીઓ, એટલે કે ઘાટ, પર એમના શિષ્યો એમની આસપાસ ભેગા થતા, ને વહેલી સવારના અજવાળે પાણી જ્યારે સોનેરી ને ભૂખરું વહેતું, ત્યારે તેઓ ગુરુ પાછળ ભગવાનનાં પવિત્ર નામ બોલતા.", "થોડે દૂર, નદીના કિનારે, એક વણકરનો છોકરો ઊભો ઊભો જોઈ રહ્યો હતો.", "એનું નામ કબીર. તે નવ વર્ષનો હતો, સળેખડા જેવો પાતળો, સાદા સફેદ વસ્ત્રમાં, ને જે ઘડીએ એ પવિત્ર શબ્દો પહેલી વાર પાણી પર તરતા આવ્યા, ત્યારથી જ એને એમના પર પ્રેમ થઈ ગયો હતો. એ શબ્દો જાણે કોઈ એવું ગીત હતા જે એને અડધું તો પહેલેથી જ આવડતું હોય. તે રોજ સવારે સાંભળવા આવતો, અળગો ઊભો રહીને, જ્યાં કોઈ ન જુએ ત્યાં ધીમેથી હોઠ ફફડાવીને એ શબ્દો બોલતો.", "એક સવારે, એની ઝંખના એટલી મોટી થઈ ગઈ કે અંદર સમાય નહીં. પાઠ પૂરો થાય ને શિષ્યો જતા રહે ત્યાં સુધી તે રાહ જોઈ રહ્યો, ને પછી આગળ વધીને ઝૂકીને પ્રણામ કર્યા.", "\"ગુરુજી,\" એણે ધ્રૂજતા અવાજે કહ્યું, \"મને પણ શીખવશો?\"", "રામાનંદે પાતળા છોકરા સામે જોયું. એમની આંખોમાં કઠોરતા નહોતી. પણ થોડી વાર પછી, એમણે માથું હલાવ્યું.", "\"દીકરા,\" એમણે હળવેથી કહ્યું, \"મારા શિષ્યો જે ઘરોમાંથી આવે છે એવા ઘરમાં તારો ઉછેર નથી થયો. વાત એટલી સહેલી નથી. હું તને ન લઈ શકું.\"", "એમણે હળવેથી એ કહ્યું, ને પ્રાર્થના તરફ વળી ગયા, પણ કબીરને માટે એ શબ્દો જાણે બંધ થયેલા દરવાજા જેવા લાગ્યા.", "છોકરો માથું છાતી પર ઢાળીને નદીકાંઠે ઘરે ચાલ્યો. એટલી સહેલી નથી. તને ન લઈ શકું. એ શબ્દો વારંવાર ફર્યા કરતા. પણ કબીર એવો છોકરો નહોતો જે સહેલાઈથી હાર માની લે, ને નદી ને ઘરની વચ્ચે ક્યાંક, એનું દુઃખ ચૂપચાપ એક યોજનામાં બદલાઈ ગયું.", "ગુરુ, એણે વિચાર્યું, એ છે જે તમને પવિત્ર શબ્દ આપે. જો ગુરુ રામાનંદ મન બનાવીને મને શબ્દ ન આપે, તો કદાચ તેઓ અજાણતાં મને એક શબ્દ આપી દેશે.", "એને વૃદ્ધ ગુરુની ટેવ ખબર હતી. દરરોજ સવારે, હજી અંધારું હોય ત્યારે, બીજું કોઈ હાલે એ પહેલાં રામાનંદ સ્નાન ને પ્રાર્થના કરવા મંદિરની સીડીઓ ઊતરતા.", "એટલે એ રાત્રે, જ્યારે ગામ શાંત થઈ ગયું ને તારા નદી પર નીચા ઝૂકી આવ્યા, ત્યારે કબીર ચૂપચાપ પાછો ઘાટ પર ગયો. પહોળી પથ્થરની સીડીઓમાંથી એક પર, અધવચ્ચે, જ્યાં પડછાયા સૌથી ઘટ્ટ હતા, ત્યાં તે આડો પડ્યો. પથ્થર એના ગાલ સામે ઠંડો હતો. એક જ દીવો ગોખલામાં બળતો, ધ્રૂજતા અજવાળાનું એક નાનું ગોળ કૂંડાળું પાથરતો. કબીરે પોતાનું પાતળું વસ્ત્ર ખભા ફરતે કસકસાવ્યું ને રાહ જોવા લાગ્યો.", "એ લાંબી રાત હતી. તે ધ્રૂજતો રહ્યો. એના પગ અકડાઈ ગયા. એક વાર પાણી પર ઘુવડ બોલ્યું ને પછી ચૂપ થઈ ગયું. એક કરતાં વધારે વાર એને ઘરની હૂંફાળી પથારી યાદ આવી, પણ દર વખતે, તે ત્યાં જ રહ્યો.", "આખરે, મંદિર પાછળનું આકાશ કાળામાંથી ઘેરા ભૂખરા, ને પછી પરોઢના પહેલા આછા ભૂખરા રંગમાં ઢળવા લાગ્યું. છજાંમાં પંખીઓ સળવળ્યાં. ને ઉપર ક્યાંકથી એ અવાજ આવ્યો જેની કબીર આખી રાત રાહ જોતો હતો.", "ઠપ. ઠપ. ઠપ.", "રામાનંદ નીચે આવી રહ્યા હતા, એમનું મન હજી ઊંઘ ને પ્રાર્થનામાં લપેટાયેલું, ને એમના ઉઘાડા પગ ઘસાયેલા પથ્થરો એ રીતે શોધી લેતા જે રીતે ચાળીસ વર્ષથી શોધતા આવ્યા હતા. પડછાયામાં પડેલી નાની આકૃતિ એમણે ન જોઈ.", "એમનો પગ હળવેથી કશાક ગરમ પર પડ્યો, એક ખભો, એક છોકરો.", "વૃદ્ધ ગુરુ ચોંકી ઊઠ્યા, ને એમના હોઠમાંથી, ધબકારા જેટલા ઝડપથી, ત્યાં હંમેશ વસતું એ નામ ઊછળી પડ્યું:", "\"રામ! રામ!\"", "એ શાંત પાણી પર ગૂંજી ઊઠ્યું, ભગવાનનું પવિત્ર નામ.", "કબીર સફાળો બેઠો થઈ ગયો, દીવાના અજવાળે એની આંખો પહોળી ને ચમકતી.", "\"તમે કહ્યું,\" એ ધીમેથી બોલ્યો. \"ગુરુજી, તમે મને એ આપી દીધું. તમારા પોતાના અવાજે, તમારા પોતાના મોઢે, તમે મને પવિત્ર નામ શીખવ્યું.\" એણે બે હાથ જોડ્યા. \"હવે તમે મારા ગુરુ. તમે ના ન કહી શકો, તમે તો શીખવી જ દીધું.\"", "રામાનંદ એની ઉપરની સીડી પર સાવ સ્થિર ઊભા રહ્યા. એમણે જે છોકરાને પાછો કાઢ્યો હતો એની સામે જોયું, એ પાતળો, ધ્રૂજતો છોકરો જે ઠંડા પથ્થર પર, અંધારામાં, માત્ર એક પડતો શબ્દ ઝીલવા આખી રાત પડ્યો રહ્યો.", "ને વૃદ્ધ ગુરુ એવું કંઈક સમજવા લાગ્યા જે દિવસના અજવાળે એમને દેખાયું નહોતું. એમણે માન્યું હતું કે દરવાજો ખોલવો કે બંધ કરવો એ એમના હાથની વાત છે. પણ પવિત્ર નામ તો જાતે જ એમનામાંથી સરકી ગયું, રજા વગર, છોકરો ક્યા ઘરનો છે એ પૂછ્યા વગર. જે એની રાહ જોતો હતો એની પાસે એ પહોંચી ગયું. કદાચ, વૃદ્ધ ગુરુએ વિચાર્યું, ભગવાનનું નામ કદી પોતાની પાસે રાખવાનું એમનું હતું જ નહીં. કદાચ એ તો માત્ર પસાર થઈ રહ્યું હતું.", "એમની પાછળ, સામેના કાંઠે સૂરજ ઊગ્યો, ને ક્ષણભરમાં ભૂખરી સીડીઓ ગરમ ને ઝળહળતા સોના જેવી થઈ ગઈ. નદી અજવાળાથી સળગી ઊઠી. ને રામાનંદ, જેમણે મનથી ના કહી હતી, એમને સમજાયું કે એમના હૃદયે કોણ જાણે ક્યારે હા કહી દીધી હતી.", "એમણે નીચે નમીને છોકરાના ઝૂકેલા માથે હાથ મૂક્યો.", "\"તો ચાલ, દીકરા,\" એમણે હળવેથી કહ્યું. \"લાગે છે કે તેં તો શરૂઆત કરી જ દીધી છે.\"", "ને એ બંને ઊગતા સોનામાં ત્યાં ઊભા હતા ત્યારે, વૃદ્ધ ગુરુ વિચારવા લાગ્યા: આજ સવારે, સાચે કોણે શીખવ્યું, ને સાચે કોણ શીખ્યું?"], "hi": ["हर सुबह, बाकी कस्बे के जागने से पहले, बूढ़े गुरु रामानंद नदी के पास प्रार्थना करने और सिखाने आते थे. वे विद्वान पुरुष थे, छाती तक पहुँचती सफ़ेद दाढ़ी और उँगलियों के बीच धीरे-धीरे खनकती पुरानी माला के साथ. नदी में उतरती चौड़ी पत्थर की सीढ़ियों, यानी घाट, पर उनके शिष्य उनके चारों ओर इकट्ठा होते, और भोर के उजाले में जब पानी सुनहरा और स्लेटी बहता, तब वे गुरु के पीछे भगवान के पवित्र नाम दोहराते.", "थोड़ी दूर, नदी के किनारे, एक जुलाहे का लड़का खड़ा देख रहा था.", "उसका नाम कबीर था. वह नौ साल का था, सरकंडे-सा दुबला, सादे सफ़ेद कपड़े में, और जिस पल वे पवित्र शब्द पहली बार पानी पर तैरते हुए आए, तभी से उसे उनसे प्रेम हो गया था. वे शब्द मानो कोई ऐसा गीत थे जो उसे आधा पहले से ही आता हो. वह हर सुबह सुनने आता, अलग खड़ा होकर, जहाँ कोई न देखे वहाँ धीरे से होंठ हिलाकर वे शब्द बुदबुदाता.", "एक सुबह, उसकी तड़प इतनी बड़ी हो गई कि भीतर समा न सकी. वह पाठ खत्म होने और शिष्यों के चले जाने तक रुका रहा, और फिर आगे बढ़कर झुककर प्रणाम किया.", "\"गुरुजी,\" उसने काँपती आवाज़ में कहा, \"क्या आप मुझे भी सिखाएँगे?\"", "रामानंद ने दुबले लड़के की ओर देखा. उनकी आँखों में कठोरता नहीं थी. पर एक पल बाद, उन्होंने सिर हिला दिया.", "\"बेटा,\" उन्होंने नरमी से कहा, \"मेरे शिष्य जिन घरों से आते हैं, वैसे घर में तेरी परवरिश नहीं हुई. बात इतनी आसान नहीं. मैं तुझे नहीं ले सकता.\"", "उन्होंने यह धीरे से कहा, और प्रार्थना की ओर मुड़ गए, पर कबीर के लिए वे शब्द किसी बंद दरवाज़े-से लगे.", "लड़का ठोड़ी छाती पर टिकाए नदी के किनारे घर चला. इतनी आसान नहीं. तुझे नहीं ले सकता. वे शब्द बार-बार घूमते रहे. पर कबीर ऐसा लड़का नहीं था जो आसानी से हार मान ले, और नदी और घर के बीच कहीं, उसका दुख चुपचाप एक योजना में बदल गया.", "गुरु, उसने सोचा, वह है जो तुम्हें पवित्र शब्द दे. अगर गुरु रामानंद मन बनाकर मुझे शब्द न दें, तो शायद वे अनजाने में मुझे एक शब्द दे ही देंगे.", "उसे बूढ़े गुरु की आदत पता थी. हर सुबह, जब अब भी अंधेरा होता, किसी के हिलने-डुलने से पहले रामानंद स्नान और प्रार्थना करने मंदिर की सीढ़ियाँ उतरते.", "तो उस रात, जब कस्बा शांत हो गया और तारे नदी पर नीचे झुक आए, कबीर चुपके से वापस घाट पर गया. चौड़ी पत्थर की सीढ़ियों में से एक पर, बीचोंबीच, जहाँ परछाइयाँ सबसे घनी थीं, वह लेट गया. पत्थर उसके गाल के सामने ठंडा था. एक ही दीया ताक में जल रहा था, काँपती रोशनी का एक छोटा-सा गोल घेरा बिखेरता. कबीर ने अपना पतला कपड़ा कंधों के चारों ओर कस लिया और इंतज़ार करने लगा.", "वह लंबी रात थी. वह काँपता रहा. उसके पैर अकड़ गए. एक बार पानी पर उल्लू बोला और फिर चुप हो गया. एक से ज़्यादा बार उसे घर की गरम बिस्तर याद आई, पर हर बार, वह वहीं रुका रहा.", "आखिर, मंदिर के पीछे का आसमान काले से गहरे स्लेटी, और फिर भोर के पहले हल्के स्लेटी रंग में ढलने लगा. छज्जों में पंछी सरसराए. और ऊपर कहीं से वह आवाज़ आई जिसका कबीर पूरी रात इंतज़ार कर रहा था.", "ठप. ठप. ठप.", "रामानंद नीचे उतर रहे थे, उनका मन अब भी नींद और प्रार्थना में लिपटा हुआ, और उनके नंगे पैर घिसे हुए पत्थरों को उसी तरह ढूँढ़ लेते जैसे चालीस साल से ढूँढ़ते आए थे. परछाई में पड़ी छोटी-सी आकृति उन्होंने नहीं देखी.", "उनका पैर धीरे से किसी गरम चीज़ पर पड़ा, एक कंधा, एक लड़का.", "बूढ़े गुरु चौंक उठे, और उनके होंठों से, धड़कन जितनी तेज़ी से, वह नाम उछल पड़ा जो वहाँ हमेशा बसा रहता था:", "\"राम! राम!\"", "वह शांत पानी पर गूँज उठा, भगवान का पवित्र नाम.", "कबीर झटके से उठ बैठा, दीये के उजाले में उसकी आँखें बड़ी और चमकीली.", "\"आपने कह दिया,\" वह धीरे से बोला. \"गुरुजी, आपने मुझे दे दिया. अपनी ही आवाज़ से, अपने ही मुँह से, आपने मुझे पवित्र नाम सिखा दिया.\" उसने दोनों हाथ जोड़ लिए. \"अब आप मेरे गुरु हैं. आप मना नहीं कर सकते, आपने तो सिखा ही दिया.\"", "रामानंद उसके ऊपर वाली सीढ़ी पर बिलकुल स्थिर खड़े रहे. उन्होंने उस लड़के की ओर देखा जिसे उन्होंने लौटा दिया था, वह दुबला, काँपता लड़का जो ठंडे पत्थर पर, अंधेरे में, बस एक गिरते शब्द को झेलने के लिए पूरी रात पड़ा रहा.", "और बूढ़े गुरु कुछ ऐसा समझने लगे जो उन्हें दिन के उजाले में दिखाई नहीं दिया था. उन्होंने सोचा था कि दरवाज़ा खोलना या बंद करना उनके हाथ की बात है. पर पवित्र नाम तो खुद ही उनमें से फिसल गया, बिना इजाज़त, यह पूछे बिना कि लड़का किस घर का है. जो उसका इंतज़ार कर रहा था, उसके पास वह पहुँच गया. शायद, बूढ़े गुरु ने सोचा, भगवान का नाम कभी अपने पास रखने को उनका था ही नहीं. शायद वह तो बस गुज़र रहा था.", "उनके पीछे, उस पार के किनारे सूरज उठा, और पल भर में स्लेटी सीढ़ियाँ गरम और दमकते सोने-सी हो गईं. नदी रोशनी से जल उठी. और रामानंद, जिन्होंने मन से ना कही थी, उन्हें लगा कि उनके हृदय ने न जाने कब हाँ कह दी थी.", "उन्होंने नीचे झुककर लड़के के झुके हुए सिर पर हाथ रखा.", "\"तो चल, बेटा,\" उन्होंने धीरे से कहा. \"लगता है तूने तो शुरुआत कर ही दी है.\"", "और जब वे दोनों उगते सोने में वहाँ खड़े थे, बूढ़े गुरु सोचने लगे: आज सुबह, सच में किसने सिखाया, और सच में कौन सीखा?"]}, "seniors": {"en": ["In the early hush of morning, before the town had stirred, the old teacher Ramanand came down to the river to pray. On the wide stone steps of the ghat, his pupils gathered close, and together they spoke the holy names of God into the rising light.", "A little apart, at the river's edge, stood a weaver's boy named Kabir, only nine, slight and quiet in a plain white cloth. From the first morning the sacred words drifted to him across the water, his heart held fast to them, and day after day he came to listen, his lips softly following every word.", "One morning his longing could no longer be kept inside. When the lesson ended and the pupils had gone, he stepped forward, bowed low, and said in a trembling voice, \"Master, will you not teach me too?\"", "There was no unkindness in the old man's eyes, yet after a moment he shook his head. \"Little one,\" he said gently, \"you were not born into the homes my pupils come from. I cannot take you.\" He turned back to his prayers, but to the boy those words fell like a door drawn shut.", "Kabir walked home with his chin upon his chest, yet he was not made of the cloth that gives up easily. A guru, he reasoned, is one who places a holy word upon your tongue. If the master would not give him one with his mind made up, perhaps the Divine would let one fall from him unawares.", "He knew the old man's faithful habit: every morning, while it was still dark, Ramanand came down to bathe and pray before any other soul had stirred. So when the town had gone to sleep, Kabir crept to the ghat and lay down upon a broad stone step, where the shadows gathered deepest. He drew his thin cloth close and waited. The night was long and cold, but he did not leave.", "At last the sky behind the temple softened to the first grey of dawn, and from above came the sound he had waited for all night long.", "Step. Step. Step.", "Down came Ramanand, his mind still folded in sleep and prayer, his bare feet finding the worn stones as they had for forty faithful years. He did not see the small shape in the shadow, and his foot came down soft against something warm, a shoulder, a child.", "The old man gasped, and from his lips, swift as a heartbeat, sprang the name that had lived there all his life: \"Ram! Ram!\" It rang out over the still water, the holy name of God.", "Kabir rose up at once, his eyes shining in the lamplight. \"You have said it,\" he breathed. \"With your own voice you have given me the sacred name. Now you are truly my guru, for you cannot teach a thing and then call it untaught.\"", "Ramanand stood very still, looking long at the child he had turned away, who had lain the whole night upon cold stone only to catch one word as it fell. And in that quiet hour he understood what the daylight had hidden. He had believed the door was his to open or to close. Yet the holy name had passed out of him of its own accord, asking nothing of whose house the child came from, going simply to the heart that was open and waiting. Perhaps the name of God had never been his to keep; perhaps it had only ever been passing through him.", "Behind him the sun lifted over the far bank, and the grey steps turned to warm and shining gold. Ramanand, who had said no with his mind, found that his heart had long since said yes. He bent down and laid his hand upon the boy's bowed head. \"Come, then, my child,\" he said softly. \"It seems your learning has already begun.\"", "And as the two of them stood together in the rising gold, the old teacher found a gentle question turning within him: that morning, who had truly been the teacher, and who the one who learned?"], "gu": ["સવારની વહેલી શાંતિમાં, ગામ જાગે એ પહેલાં, વૃદ્ધ ગુરુ રામાનંદ નદી પાસે પ્રાર્થના કરવા આવતા. ઘાટની પહોળી પથ્થરની સીડીઓ પર એમના શિષ્યો પાસે ભેગા થઈ, ઊગતા અજવાળામાં સૌ સાથે મળીને ભગવાનનાં પવિત્ર નામ બોલતા.", "થોડે અળગે, નદીના કિનારે, કબીર નામનો વણકરનો છોકરો ઊભો રહેતો, માત્ર નવ વર્ષનો, પાતળો ને શાંત, સાદા સફેદ વસ્ત્રમાં. જે પહેલી સવારે એ પવિત્ર શબ્દો પાણી પર તરતા એની પાસે આવ્યા, ત્યારથી જ એના હૃદયે એમને પકડી રાખ્યા, ને દિવસ પછી દિવસ તે સાંભળવા આવતો, હળવેથી દરેક શબ્દની પાછળ હોઠ ફફડાવતો.", "એક સવારે એની ઝંખના હવે અંદર ન રહી શકી. પાઠ પૂરો થયો ને શિષ્યો ગયા, ત્યારે તે આગળ વધ્યો, ઝૂક્યો, ને ધ્રૂજતા અવાજે બોલ્યો, \"ગુરુજી, મને પણ નહીં શીખવો?\"", "વૃદ્ધ ગુરુની આંખોમાં કોઈ કઠોરતા નહોતી, છતાં થોડી વાર પછી એમણે માથું હલાવ્યું. \"નાનકા,\" એમણે હળવેથી કહ્યું, \"મારા શિષ્યો જે ઘરોમાં જન્મ્યા છે એવા ઘરમાં તારો જન્મ નથી થયો. હું તને ન લઈ શકું.\" તેઓ પ્રાર્થના તરફ પાછા વળ્યા, પણ છોકરાને માટે એ શબ્દો જાણે બંધ થયેલા દરવાજા જેવા પડ્યા.", "કબીર માથું છાતી પર ઢાળીને ઘર ચાલ્યો, છતાં તે એવા કાપડનો બનેલો નહોતો જે સહેલાઈથી હાર માને. ગુરુ, એણે વિચાર્યું, એ છે જે તમારી જીભ પર પવિત્ર શબ્દ મૂકે. જો ગુરુ મન બનાવીને એને શબ્દ ન આપે, તો કદાચ પ્રભુ અજાણતાં એમનામાંથી એક શબ્દ પાડી દે.", "એને વૃદ્ધ ગુરુની નિષ્ઠાભરી ટેવ ખબર હતી: દરરોજ સવારે, હજી અંધારું હોય ત્યારે, બીજો કોઈ જીવ હાલે એ પહેલાં રામાનંદ સ્નાન ને પ્રાર્થના કરવા આવતા. એટલે ગામ ઊંઘી ગયું ત્યારે કબીર ઘાટ પર ગયો ને એક પહોળી પથ્થરની સીડી પર, જ્યાં પડછાયા સૌથી ઘટ્ટ હતા, ત્યાં આડો પડ્યો. એણે પોતાનું પાતળું વસ્ત્ર કસ્યું ને રાહ જોઈ. રાત લાંબી ને ઠંડી હતી, પણ તે ગયો નહીં.", "આખરે મંદિર પાછળનું આકાશ પરોઢના પહેલા ભૂખરા રંગમાં ઢળ્યું, ને ઉપરથી એ અવાજ આવ્યો જેની એ આખી રાત રાહ જોતો રહ્યો હતો.", "ઠપ. ઠપ. ઠપ.", "રામાનંદ નીચે આવ્યા, એમનું મન હજી ઊંઘ ને પ્રાર્થનામાં વીંટળાયેલું, ને એમના ઉઘાડા પગ ઘસાયેલા પથ્થરો એ રીતે શોધી લેતા જે રીતે ચાળીસ નિષ્ઠાવાન વર્ષોથી શોધતા આવ્યા. પડછાયામાં પડેલી નાની આકૃતિ એમણે ન જોઈ, ને એમનો પગ હળવેથી કશાક ગરમ પર પડ્યો, એક ખભો, એક બાળક.", "વૃદ્ધ ગુરુ ચોંકી ઊઠ્યા, ને એમના હોઠમાંથી, ધબકારા જેટલા ઝડપથી, આખી જિંદગી ત્યાં વસેલું એ નામ ઊછળી પડ્યું: \"રામ! રામ!\" એ શાંત પાણી પર ગૂંજી ઊઠ્યું, ભગવાનનું પવિત્ર નામ.", "કબીર તરત જ બેઠો થઈ ગયો, દીવાના અજવાળે એની આંખો ચમકતી. \"તમે કહ્યું,\" એ ધીમેથી બોલ્યો. \"તમારા પોતાના અવાજે તમે મને પવિત્ર નામ આપી દીધું. હવે તમે સાચે જ મારા ગુરુ, કેમ કે શીખવ્યા પછી એને ન-શીખવ્યું તો ન કહેવાય.\"", "રામાનંદ સાવ સ્થિર ઊભા રહ્યા, જે બાળકને એમણે પાછું કાઢ્યું હતું એની સામે ઘણી વાર સુધી જોતા, જે ઠંડા પથ્થર પર આખી રાત પડ્યો રહ્યો માત્ર એક પડતો શબ્દ ઝીલવા. ને એ શાંત ઘડીમાં તેઓ એ સમજ્યા જે દિવસના અજવાળે છૂપું રહ્યું હતું. એમણે માન્યું હતું કે દરવાજો ખોલવો કે બંધ કરવો એ એમના હાથની વાત છે. છતાં પવિત્ર નામ તો જાતે જ એમનામાંથી પસાર થઈ ગયું, બાળક ક્યા ઘરનું છે એ પૂછ્યા વગર, જે હૃદય ખુલ્લું ને રાહ જોતું હતું એની પાસે સહજ જઈને. કદાચ ભગવાનનું નામ કદી સંઘરી રાખવાનું એમનું હતું જ નહીં; કદાચ એ તો માત્ર એમનામાંથી પસાર થઈ રહ્યું હતું.", "એમની પાછળ સામેના કાંઠે સૂરજ ઊગ્યો, ને ભૂખરી સીડીઓ ગરમ ને ઝળહળતા સોના જેવી થઈ ગઈ. રામાનંદ, જેમણે મનથી ના કહી હતી, એમને સમજાયું કે એમના હૃદયે તો ક્યારનીય હા કહી દીધી હતી. એમણે નીચે નમીને છોકરાના ઝૂકેલા માથે હાથ મૂક્યો. \"તો ચાલ, દીકરા,\" એમણે હળવેથી કહ્યું. \"લાગે છે કે તારી શીખ તો શરૂ થઈ જ ગઈ છે.\"", "ને એ બંને ઊગતા સોનામાં સાથે ઊભા હતા, ત્યારે વૃદ્ધ ગુરુની અંદર એક હળવો પ્રશ્ન ફરવા લાગ્યો: એ સવારે, સાચે ગુરુ કોણ હતું, ને શીખનાર કોણ?"], "hi": ["सुबह की पहली खामोशी में, कस्बे के जागने से पहले, बूढ़े गुरु रामानंद नदी के पास प्रार्थना करने आते थे. घाट की चौड़ी पत्थर की सीढ़ियों पर उनके शिष्य पास इकट्ठा होकर, उगते उजाले में सब मिलकर भगवान के पवित्र नाम बोलते.", "थोड़ी दूर, नदी के किनारे, कबीर नाम का जुलाहे का लड़का खड़ा रहता, केवल नौ साल का, दुबला और शांत, सादे सफ़ेद कपड़े में. जिस पहली सुबह वे पवित्र शब्द पानी पर तैरते उसके पास आए, तभी से उसके हृदय ने उन्हें थाम लिया, और दिन पर दिन वह सुनने आता, धीरे से हर शब्द के पीछे होंठ हिलाता.", "एक सुबह उसकी तड़प अब भीतर न रह सकी. पाठ खत्म हुआ और शिष्य चले गए, तब वह आगे बढ़ा, झुका, और काँपती आवाज़ में बोला, \"गुरुजी, क्या आप मुझे भी नहीं सिखाएँगे?\"", "बूढ़े गुरु की आँखों में कोई कठोरता नहीं थी, फिर भी एक पल बाद उन्होंने सिर हिला दिया. \"नन्हे,\" उन्होंने नरमी से कहा, \"मेरे शिष्य जिन घरों में जन्मे हैं, वैसे घर में तेरा जन्म नहीं हुआ. मैं तुझे नहीं ले सकता.\" वे प्रार्थना की ओर लौट गए, पर लड़के के लिए वे शब्द किसी बंद दरवाज़े-से गिरे.", "कबीर सिर छाती पर टिकाए घर चला, फिर भी वह उस कपड़े का बना नहीं था जो आसानी से हार माने. गुरु, उसने सोचा, वह है जो तुम्हारी जीभ पर पवित्र शब्द रखे. अगर गुरु मन बनाकर उसे शब्द न दें, तो शायद प्रभु अनजाने में उनमें से एक शब्द गिरा दें.", "उसे बूढ़े गुरु की निष्ठावान आदत पता थी: हर सुबह, जब अब भी अंधेरा होता, किसी और जीव के हिलने से पहले रामानंद स्नान और प्रार्थना करने आते. तो जब कस्बा सो गया, कबीर घाट पर गया और एक चौड़ी पत्थर की सीढ़ी पर, जहाँ परछाइयाँ सबसे घनी थीं, वहाँ लेट गया. उसने अपना पतला कपड़ा कस लिया और इंतज़ार किया. रात लंबी और ठंडी थी, पर वह गया नहीं.", "आखिर मंदिर के पीछे का आसमान भोर के पहले स्लेटी रंग में ढला, और ऊपर से वह आवाज़ आई जिसका वह पूरी रात इंतज़ार करता रहा था.", "ठप. ठप. ठप.", "रामानंद नीचे आए, उनका मन अब भी नींद और प्रार्थना में लिपटा हुआ, और उनके नंगे पैर घिसे हुए पत्थरों को उसी तरह ढूँढ़ लेते जैसे चालीस निष्ठावान वर्षों से ढूँढ़ते आए. परछाई में पड़ी छोटी-सी आकृति उन्होंने नहीं देखी, और उनका पैर धीरे से किसी गरम चीज़ पर पड़ा, एक कंधा, एक बच्चा.", "बूढ़े गुरु चौंक उठे, और उनके होंठों से, धड़कन जितनी तेज़ी से, पूरी ज़िंदगी वहाँ बसा वह नाम उछल पड़ा: \"राम! राम!\" वह शांत पानी पर गूँज उठा, भगवान का पवित्र नाम.", "कबीर तुरंत उठ बैठा, दीये के उजाले में उसकी आँखें चमकती हुईं. \"आपने कह दिया,\" वह धीरे से बोला. \"अपनी ही आवाज़ से आपने मुझे पवित्र नाम दे दिया. अब आप सचमुच मेरे गुरु हैं, क्योंकि सिखाने के बाद उसे बिन-सिखाया तो नहीं कहा जा सकता.\"", "रामानंद बिलकुल स्थिर खड़े रहे, जिस बच्चे को उन्होंने लौटा दिया था उसकी ओर देर तक देखते, जो ठंडे पत्थर पर पूरी रात पड़ा रहा केवल एक गिरते शब्द को झेलने के लिए. और उस शांत घड़ी में उन्होंने वह समझा जो दिन के उजाले ने छिपा रखा था. उन्होंने माना था कि दरवाज़ा खोलना या बंद करना उनके हाथ की बात है. फिर भी पवित्र नाम तो खुद ही उनमें से गुज़र गया, यह पूछे बिना कि बच्चा किस घर का है, जो हृदय खुला और प्रतीक्षा करता था उसके पास सहज जाकर. शायद भगवान का नाम कभी सँभालकर रखने को उनका था ही नहीं; शायद वह तो बस उनमें से गुज़र रहा था.", "उनके पीछे उस पार के किनारे सूरज उगा, और स्लेटी सीढ़ियाँ गरम और दमकते सोने-सी हो गईं. रामानंद, जिन्होंने मन से ना कही थी, उन्हें लगा कि उनके हृदय ने तो कब का हाँ कह दिया था. उन्होंने नीचे झुककर लड़के के झुके हुए सिर पर हाथ रखा. \"तो चल, बेटा,\" उन्होंने धीरे से कहा. \"लगता है तेरी सीख तो शुरू हो ही गई है.\"", "और जब वे दोनों उगते सोने में साथ खड़े थे, बूढ़े गुरु के भीतर एक कोमल प्रश्न घूमने लगा: उस सुबह, सच में गुरु कौन था, और सीखने वाला कौन?"]}}, "img_cover": "assets/ramkabir/the-foot-that-said-ram/cover.jpg", "img_pages": ["assets/ramkabir/the-foot-that-said-ram/page-1.jpg", "assets/ramkabir/the-foot-that-said-ram/page-2.jpg", "assets/ramkabir/the-foot-that-said-ram/page-3.jpg", "assets/ramkabir/the-foot-that-said-ram/page-4.jpg", "assets/ramkabir/the-foot-that-said-ram/page-5.jpg"]}, {"slug": "my-ram-is-everywhere", "color": "coral", "scenes": ["Kabir at his loom under a wide open golden sky", "The proud Brahmin challenges Kabir, gesturing to a temple idol", "Kabir weaves, one hand open to sky, river, and air", "God's presence as warm light — the river, a bird, a child's breath", "The Brahmin's proud face softening into understanding", "Kabir and the Brahmin sit together in peace"], "title": {"en": "My Ram Is Everywhere", "gu": "મારો રામ બધે જ છે", "hi": "मेरा राम हर जगह है"}, "moral": {"en": "God is formless and lives in everything; an honest, kind heart matters more than show and ritual.", "gu": "ભગવાન નિરાકાર છે અને દરેક વસ્તુમાં વસે છે; દેખાડો અને વિધિ કરતાં પ્રામાણિક અને દયાળુ હૃદય વધારે મહત્ત્વનું છે.", "hi": "ईश्वर निराकार है और हर चीज़ में बसता है; दिखावे और कर्मकांड से कहीं ज़्यादा एक सच्चा और दयालु हृदय मायने रखता है।"}, "levels": {"kids": {"en": ["By the river, under the wide gold sky, a weaver named Kabir worked at his loom. Click, clack. Click, clack. The threads went over, under, over, under.", "A man in shiny clothes came down the path. His robes were cream and gold. He looked at Kabir's plain white cloth and his small loom.", "\"My God lives in the temple,\" the man said. \"My God is a beautiful golden statue. Where is your God?\"", "Kabir smiled. He kept weaving. Click, clack. \"My God is here,\" Kabir said.", "He opened his hand to the sky. \"There.\" He pointed to the river, shining and blue. \"There.\" He felt the soft wind on his face. \"And there.\"", "A little blue bird flew low over the water. A small child ran past on the path, breathing fast and laughing in the warm morning.", "\"My God is in the river,\" said Kabir. \"My God is in the bird. My God is in your breath, and in mine.\"", "The man looked at the sky. He looked at the river. He listened to the wind. He grew very quiet. He sat down beside Kabir on the warm ground.", "Click, clack. Click, clack. The two men sat together, and the gold sky shone over both of them."], "gu": ["નદીને કાંઠે, વિશાળ સોનેરી આકાશ નીચે, કબીર નામનો એક વણકર પોતાની સાળ પર કામ કરતો હતો. ખટ, ખટ. ખટ, ખટ. દોરા ઉપર-નીચે, ઉપર-નીચે જતા હતા.", "ચમકતાં કપડાં પહેરેલો એક માણસ રસ્તે આવ્યો. તેનાં વસ્ત્રો ક્રીમ અને સોનેરી રંગનાં હતાં. તેણે કબીરના સાદા સફેદ કાપડ અને નાનકડી સાળ સામે જોયું.", "\"મારો ભગવાન મંદિરમાં વસે છે,\" માણસે કહ્યું. \"મારો ભગવાન સોનાની સુંદર મૂર્તિ છે. તારો ભગવાન ક્યાં છે?\"", "કબીર હસ્યો. તે વણતો રહ્યો. ખટ, ખટ. \"મારો ભગવાન અહીં છે,\" કબીરે કહ્યું.", "તેણે હાથ આકાશ તરફ ખોલ્યો. \"ત્યાં.\" તેણે ચમકતી, ભૂરી નદી તરફ આંગળી ચીંધી. \"ત્યાં.\" તેણે ચહેરા પર નરમ પવનને અનુભવ્યો. \"અને ત્યાં.\"", "એક નાનકડું પંખી પાણી પર ઊડ્યું. એક બાળક ઝડપથી શ્વાસ લેતું, હસતું હસતું દોડી ગયું.", "\"મારો ભગવાન નદીમાં છે,\" કબીરે કહ્યું. \"મારો ભગવાન પંખીમાં છે. મારો ભગવાન તારા શ્વાસમાં છે, અને મારા શ્વાસમાં પણ.\"", "માણસે આકાશ સામે જોયું. તેણે નદી સામે જોયું. તેણે પવનને સાંભળ્યો. તે એકદમ શાંત થઈ ગયો. તે કબીરની બાજુમાં ગરમ જમીન પર બેસી ગયો.", "ખટ, ખટ. ખટ, ખટ. બંને માણસ સાથે બેઠા, અને સોનેરી આકાશ બંને પર ઝળહળતું રહ્યું."], "hi": ["नदी के किनारे, चौड़े सुनहरे आसमान के नीचे, कबीर नाम का एक जुलाहा अपने करघे पर काम कर रहा था। खट, खट। खट, खट। धागे ऊपर-नीचे, ऊपर-नीचे जा रहे थे।", "चमकीले कपड़ों में एक आदमी रास्ते पर आया। उसके वस्त्र क्रीम और सुनहरे रंग के थे। उसने कबीर के सादे सफ़ेद कपड़े और छोटे करघे को देखा।", "\"मेरा भगवान मंदिर में रहता है,\" आदमी ने कहा। \"मेरा भगवान सोने की सुंदर मूरत है। तुम्हारा भगवान कहाँ है?\"", "कबीर मुस्कुराया। वह बुनता रहा। खट, खट। \"मेरा भगवान यहाँ है,\" कबीर ने कहा।", "उसने अपना हाथ आसमान की ओर खोला। \"वहाँ।\" उसने चमकती, नीली नदी की ओर इशारा किया। \"वहाँ।\" उसने अपने चेहरे पर नरम हवा को महसूस किया। \"और वहाँ।\"", "एक नन्ही चिड़िया पानी के ऊपर उड़ी। एक बच्चा तेज़ साँस लेता, हँसता हुआ पास से दौड़ गया।", "\"मेरा भगवान नदी में है,\" कबीर ने कहा। \"मेरा भगवान चिड़िया में है। मेरा भगवान तुम्हारी साँस में है, और मेरी साँस में भी।\"", "आदमी ने आसमान को देखा। उसने नदी को देखा। उसने हवा को सुना। वह बहुत शांत हो गया। वह कबीर के पास गरम ज़मीन पर बैठ गया।", "खट, खट। खट, खट। दोनों आदमी साथ बैठे, और सुनहरा आसमान दोनों पर चमकता रहा।"]}, "adults": {"en": ["The morning sun poured gold across the river, and under that wide open sky, Kabir sat weaving at his loom. He wore a plain white cloth. His hands moved the threads — over, under, over, under — and the loom sang its soft wooden song.", "Down the path came a man dressed in fine robes of cream and gold. He was a scholar, a learned man who had read many holy books. He stopped and looked at Kabir's bare feet, the simple loom, the small mud house.", "\"I have come from the great temple,\" the scholar said, lifting his chin. \"There, our God stands carved in shining gold. We light lamps for him. We ring bells and sing. Tell me, weaver — where is your God? In this dust? At this little loom?\"", "Kabir did not stop weaving. He only smiled. \"Your God was born a prince, long ago, in one fine palace,\" Kabir said gently. \"I honor him. But the God I know was never born and will never end.\"", "He opened one hand toward the morning. \"Look. My God is in the sky that has no walls.\" A breeze came off the water. \"My God is in the wind you cannot hold.\"", "A kingfisher flashed blue across the river. A child ran by, laughing, her breath quick and warm. \"My God is in the river. In the bird. In that child's breath — and in yours, even now.\"", "The scholar opened his mouth to argue. He was used to winning. But he found he had no words. He looked at the golden temple far behind him, then at the river shining in front of him, then up at the endless sky.", "Something in his chest grew quiet and humble — soft, like he was small under something very large. For a long while he stood there. Then, slowly, he gathered his fine robes and sat down in the dust beside the weaver.", "\"Will you teach me that song your loom sings?\" he asked. Kabir laughed, a warm and easy laugh, and moved over to make room.", "The threads went over, under, over, under. The river ran bright. And the wide gold sky stretched on and on, with no walls anywhere, over the temple and the loom and the two men sitting side by side."], "gu": ["સવારનો સૂરજ નદી પર સોનું વેરતો હતો, અને એ વિશાળ ખુલ્લા આકાશ નીચે કબીર પોતાની સાળ પર બેસીને વણતો હતો. તેણે સાદું સફેદ વસ્ત્ર પહેર્યું હતું. તેના હાથ દોરા ફેરવતા હતા — ઉપર, નીચે, ઉપર, નીચે — અને સાળ પોતાનું મીઠું લાકડાનું ગીત ગાતી હતી.", "રસ્તે થઈને ક્રીમ અને સોનેરી રંગનાં મોંઘાં વસ્ત્રો પહેરેલો એક માણસ આવ્યો. તે એક પંડિત હતો, ઘણા ધર્મગ્રંથો વાંચેલો વિદ્વાન. તેણે ઊભા રહીને કબીરના ઉઘાડા પગ, સાદી સાળ અને નાનકડા માટીના ઘર સામે જોયું.", "\"હું મહાન મંદિરમાંથી આવ્યો છું,\" પંડિતે ગર્વથી માથું ઊંચું કરીને કહ્યું. \"ત્યાં અમારો ભગવાન ચમકતા સોનામાં કોતરાયેલો ઊભો છે. અમે તેના માટે દીવા પ્રગટાવીએ છીએ. ઘંટ વગાડીએ ને ભજન ગાઈએ છીએ. કહે, વણકર — તારો ભગવાન ક્યાં છે? આ ધૂળમાં? આ નાનકડી સાળ પર?\"", "કબીરે વણવાનું બંધ ન કર્યું. તે ફક્ત હસ્યો. \"તારો ભગવાન ઘણા સમય પહેલાં એક સુંદર મહેલમાં રાજકુમાર તરીકે જન્મ્યો હતો,\" કબીરે હળવેથી કહ્યું. \"હું તેને માન આપું છું. પણ જે ભગવાનને હું ઓળખું છું તે ક્યારેય જન્મ્યો નથી અને ક્યારેય સમાપ્ત નહીં થાય.\"", "તેણે એક હાથ સવાર તરફ ખોલ્યો. \"જો. મારો ભગવાન એ આકાશમાં છે જેને કોઈ દીવાલ નથી.\" પાણી પરથી પવનની એક લહેર આવી. \"મારો ભગવાન એ પવનમાં છે જેને તું પકડી શકતો નથી.\"", "એક નાનું ભૂરું માછીમાર પંખી નદી પર ચમકી ગયું. એક બાળકી હસતી હસતી દોડી ગઈ, તેનો શ્વાસ ઝડપી ને ગરમ હતો. \"મારો ભગવાન નદીમાં છે. પંખીમાં છે. એ બાળકીના શ્વાસમાં — અને તારા શ્વાસમાં પણ, અત્યારે જ.\"", "પંડિતે દલીલ કરવા મોં ખોલ્યું. તે જીતવા ટેવાયેલો હતો. પણ તેને કોઈ શબ્દ ન જડ્યા. તેણે પાછળ દૂર સોનેરી મંદિર સામે જોયું, પછી સામે ચમકતી નદી સામે, ને પછી ઉપર અનંત આકાશ સામે.", "તેની છાતીમાં કંઈક શાંત ને નમ્ર થઈ ગયું — કોમળ, જાણે તે કોઈ વિરાટ વસ્તુ નીચે નાનો હોય. ઘણી વાર સુધી તે ત્યાં ઊભો રહ્યો. પછી, ધીમેથી, તેણે પોતાનાં મોંઘાં વસ્ત્રો સંકેલ્યાં ને વણકરની બાજુમાં ધૂળમાં બેસી ગયો.", "\"તારી સાળ જે ગીત ગાય છે તે મને શીખવીશ?\" તેણે પૂછ્યું. કબીર હૂંફાળું, સહજ હસ્યો ને જગ્યા કરવા ખસ્યો.", "દોરા ઉપર, નીચે, ઉપર, નીચે જતા રહ્યા. નદી ઝળહળતી વહેતી રહી. અને વિશાળ સોનેરી આકાશ ક્યાંય દીવાલ વગર, મંદિર ને સાળ ને બાજુ-બાજુમાં બેઠેલા બે માણસો પર દૂર સુધી પથરાયેલું રહ્યું."], "hi": ["सुबह का सूरज नदी पर सोना बिखेर रहा था, और उस चौड़े खुले आसमान के नीचे कबीर अपने करघे पर बैठा बुन रहा था। उसने सादा सफ़ेद कपड़ा पहना था। उसके हाथ धागों को चला रहे थे — ऊपर, नीचे, ऊपर, नीचे — और करघा अपना मीठा लकड़ी का गीत गा रहा था।", "रास्ते से होकर क्रीम और सुनहरे रंग के बढ़िया वस्त्र पहने एक आदमी आया। वह एक पंडित था, बहुत से धर्मग्रंथ पढ़ा हुआ विद्वान। उसने रुककर कबीर के नंगे पैर, सादे करघे और छोटे मिट्टी के घर को देखा।", "\"मैं महान मंदिर से आया हूँ,\" पंडित ने ठुड्डी ऊँची करके कहा। \"वहाँ हमारा भगवान चमकते सोने में गढ़ा खड़ा है। हम उसके लिए दीये जलाते हैं। घंटियाँ बजाते और भजन गाते हैं। बता, जुलाहे — तेरा भगवान कहाँ है? इस धूल में? इस छोटे करघे पर?\"", "कबीर ने बुनना बंद नहीं किया। वह बस मुस्कुराया। \"तेरा भगवान बहुत समय पहले एक सुंदर महल में राजकुमार बनकर जन्मा था,\" कबीर ने धीरे से कहा। \"मैं उसका आदर करता हूँ। पर जिस भगवान को मैं जानता हूँ, वह न कभी जन्मा और न कभी ख़त्म होगा।\"", "उसने एक हाथ सुबह की ओर खोला। \"देख। मेरा भगवान उस आसमान में है जिसकी कोई दीवार नहीं।\" पानी से हवा का एक झोंका आया। \"मेरा भगवान उस हवा में है जिसे तू मुट्ठी में नहीं पकड़ सकता।\"", "एक नीली मछरंगी चिड़िया नदी पर चमक गई। एक बच्ची हँसती हुई दौड़ गई, उसकी साँस तेज़ और गरम थी। \"मेरा भगवान नदी में है। चिड़िया में है। उस बच्ची की साँस में — और तेरी साँस में भी, अभी इसी पल।\"", "पंडित ने बहस करने को मुँह खोला। वह जीतने का आदी था। पर उसे कोई शब्द न मिले। उसने पीछे दूर सुनहरे मंदिर को देखा, फिर सामने चमकती नदी को, फिर ऊपर अनंत आसमान को।", "उसकी छाती में कुछ शांत और विनम्र हो गया — कोमल, जैसे वह किसी बहुत बड़ी चीज़ के नीचे छोटा हो। देर तक वह वहीं खड़ा रहा। फिर, धीरे से, उसने अपने बढ़िया वस्त्र समेटे और जुलाहे के पास धूल में बैठ गया।", "\"तेरा करघा जो गीत गाता है, वह मुझे सिखाएगा?\" उसने पूछा। कबीर एक गरमजोशी भरी, सहज हँसी हँसा और जगह बनाने को खिसक गया।", "धागे ऊपर, नीचे, ऊपर, नीचे जाते रहे। नदी चमकती हुई बहती रही। और चौड़ा सुनहरा आसमान कहीं कोई दीवार न लिए, मंदिर और करघे और अगल-बगल बैठे दोनों आदमियों पर दूर तक फैला रहा।"]}, "seniors": {"en": ["The river never stopped moving, and neither did Kabir's hands. From sunrise he sat at his loom beneath the open sky, a plain white cloth wrapped about him, his fingers guiding the threads — over, under, over, under — while the wooden frame creaked its patient song. He was not a young man, nor a rich one. He was a weaver, and the cloth that grew under his hands was clean and honest, and that was enough for him.", "One morning, a shadow fell across his loom. A scholar stood on the path — a Brahmin in robes of cream and gold, with rings on his fingers and the dust of the great temple still on his sandals. He had studied the holy books since boyhood. He knew the chants, the rituals, the proper way to light every lamp.", "\"They tell me you are a teacher,\" the scholar said, with a smile that was not quite kind. \"But look at you. No temple. No idol. No bells. We have carved our God in gold, taller than two men. We bathe him, we dress him, we sing to him at dawn. Now tell me, weaver — what is your God? Where do you keep him? Surely not at this little loom, in all this dust?\"", "Kabir did not stop weaving. \"Your God,\" he said softly, \"was born a prince, long ago, in one beautiful palace. A real palace, with real walls. I bow to him; he is dear to me too.\" He paused, and the loom creaked. \"But if God can fit inside one palace, inside one golden shape, however grand — then how big is your God, really?\"", "He lifted one hand from the threads — slowly, the way you lift a hand to show a child a bird before it flies. \"My God has no door, because he has no walls. Look up. That sky with no edges — there.\" A breeze moved off the water. \"The wind you cannot catch in your fist — there. The river that has run since before your temple stood — there.\"", "A kingfisher dropped from the air and struck the water in a flash of blue, then rose again, shining. Down the path a small girl ran past, laughing, her breath quick and warm in the cool morning. \"And there,\" Kabir said, nodding after the child. \"In her breath. In yours. In mine, right now. I have never once been anywhere he was not.\"", "The scholar said nothing. He had won a hundred arguments, with answers folded up inside him like cloth in a chest. But standing there, he reached for them and found his hands empty. He looked back at the temple where the golden idol waited in its cool dark room, then at the river blazing with light, and the wide sky that truly went on with no wall anywhere. He felt, all at once, very small — but it was not a bad smallness. It was the smallness of a person standing at the edge of the sea.", "Then the scholar did a thing he had not planned. He gathered up his cream-and-gold robes, the fine ones he was always so careful to keep clean, and he sat down in the plain dust beside the weaver, the way a student sits. \"In my temple,\" he said slowly, \"I always knew exactly where to find God. I knew the room. I knew the hour.\" He looked at his own open hands. \"I never once thought to look in the spaces between.\"", "Kabir smiled and moved over to make room, and the loom went on — over, under, over, under — and the river ran bright past them both. The scholar watched the threads cross and join, cross and join, and a new question rose quietly in him, one no book had ever thought to ask: if God was here too, in the dust and the wind and his own slow breath — had he ever, in all his careful years, been away from home at all?"], "gu": ["નદી કદી વહેતી અટકતી નહોતી, ને કબીરના હાથ પણ નહીં. સૂર્યોદયથી તે ખુલ્લા આકાશ નીચે પોતાની સાળ પર બેસતો, સાદું સફેદ વસ્ત્ર વીંટાળેલું, તેની આંગળીઓ દોરા દોરતી — ઉપર, નીચે, ઉપર, નીચે — ને લાકડાનું ચોકઠું પોતાનું ધીરજભર્યું ગીત ગાતું. તે ન જુવાન હતો, ન શ્રીમંત. તે વણકર હતો, ને તેના હાથ નીચે ઊગતું કાપડ સ્વચ્છ ને પ્રામાણિક હતું, ને એ તેને માટે પૂરતું હતું.", "એક સવારે તેની સાળ પર પડછાયો પડ્યો. રસ્તે એક પંડિત ઊભો હતો — ક્રીમ ને સોનેરી વસ્ત્રોમાં એક બ્રાહ્મણ, આંગળીઓમાં વીંટીઓ ને ચંપલ પર હજી મહાન મંદિરની ધૂળ. તેણે બાળપણથી ધર્મગ્રંથો ભણ્યા હતા. તે મંત્રો, વિધિઓ ને દરેક દીવો પ્રગટાવવાની સાચી રીત જાણતો હતો.", "\"લોકો કહે છે કે તું ગુરુ છે,\" પંડિતે કહ્યું, એક એવા સ્મિત સાથે જે પૂરું દયાળુ નહોતું. \"પણ તારી સામે જો. ન મંદિર, ન મૂર્તિ, ન ઘંટ. અમે અમારા ભગવાનને બે માણસથી ઊંચા સોનામાં કોતર્યા છે. અમે તેને નવડાવીએ, શણગારીએ, પરોઢે ભજન ગાઈએ. હવે કહે, વણકર — તારો ભગવાન શું છે? તું તેને ક્યાં રાખે છે? આ નાનકડી સાળ પર, આ ધૂળમાં તો નહીં જ?\"", "કબીરે વણવાનું બંધ ન કર્યું. \"તારો ભગવાન,\" તેણે હળવેથી કહ્યું, \"ઘણા સમય પહેલાં એક સુંદર મહેલમાં રાજકુમાર તરીકે જન્મ્યો હતો. સાચો મહેલ, સાચી દીવાલો સાથે. હું તેને નમન કરું છું; તે મને પણ વહાલો છે.\" તે અટક્યો, ને સાળ ચૂં ચૂં બોલી. \"પણ જો ભગવાન એક મહેલમાં, એક સોનેરી આકારમાં, ભલે ગમે તેટલા ભવ્ય હોય, સમાઈ શકે — તો તારો ભગવાન ખરેખર કેટલો મોટો છે?\"", "તેણે દોરા પરથી એક હાથ ઊંચક્યો — ધીમેથી, જેમ બાળકને પંખી ઊડે એ પહેલાં બતાવવા હાથ ઊંચકાય તેમ. \"મારા ભગવાનને દરવાજો નથી, કેમ કે દીવાલ નથી. ઉપર જો. એ આકાશ જેને કિનારો નથી — ત્યાં.\" પાણી પરથી પવનની લહેર આવી. \"એ પવન જેને તું મુઠ્ઠીમાં પકડી ન શકે — ત્યાં. એ નદી જે તારા મંદિર પહેલાંથી વહે છે — ત્યાં.\"", "એક માછીમાર પંખી હવામાંથી નીચે ઊતરી ભૂરી ઝબકારા સાથે પાણીને અડ્યું, ને ફરી ચમકતું ઊડ્યું. રસ્તે એક નાનકડી છોકરી હસતી દોડી ગઈ, ઠંડી સવારમાં તેનો શ્વાસ ઝડપી ને ગરમ. \"ને ત્યાં,\" કબીરે છોકરી તરફ માથું હલાવી કહ્યું. \"તેના શ્વાસમાં. તારા શ્વાસમાં. મારા શ્વાસમાં, અત્યારે જ. હું ક્યારેય એવી જગ્યાએ રહ્યો જ નથી જ્યાં તે ન હોય.\"", "પંડિત કંઈ ન બોલ્યો. તે એવો માણસ હતો જેણે સો દલીલો જીતી હતી, ને તેની અંદર પેટીમાં કાપડની જેમ વાળેલા જવાબો પડ્યા હતા. પણ ત્યાં ઊભા રહીને તેણે એ જવાબો માટે હાથ લંબાવ્યો ને હાથ ખાલી જડ્યા. તેણે પાછળ મંદિર તરફ જોયું જ્યાં સોનેરી મૂર્તિ ઠંડા અંધારા ઓરડામાં રાહ જોતી હતી, પછી સવારના પ્રકાશમાં ઝળહળતી નદી તરફ, ને એ વિશાળ આકાશ તરફ જે ખરેખર ક્યાંય દીવાલ વગર પથરાયેલું હતું. તેને એકાએક પોતે ખૂબ નાનો લાગ્યો — પણ એ ખરાબ નાનાપણું નહોતું. એ સમુદ્રને કાંઠે ઊભેલા માણસનું નાનાપણું હતું.", "પછી પંડિતે એક અણધાર્યું કામ કર્યું. તેણે પોતાનાં ક્રીમ-સોનેરી વસ્ત્રો સંકેલ્યાં, એ મોંઘાં વસ્ત્રો જેને તે હંમેશાં સ્વચ્છ રાખવા આટલો કાળજી રાખતો, ને વણકરની બાજુમાં સાદી ધૂળમાં, વિદ્યાર્થી બેસે તેમ બેસી ગયો. \"મારા મંદિરમાં,\" તેણે ધીમેથી કહ્યું, \"મને હંમેશાં ખબર હતી કે ભગવાન ક્યાં મળશે. મને ઓરડો ખબર હતો. મને સમય ખબર હતો.\" તેણે પોતાના ખુલ્લા હાથ સામે જોયું. \"વચ્ચેની ખાલી જગ્યાઓમાં જોવાનું મને ક્યારેય સૂઝ્યું જ નહીં.\"", "કબીર હસ્યો ને જગ્યા કરવા ખસ્યો, ને સાળ ચાલતી રહી — ઉપર, નીચે, ઉપર, નીચે — ને નદી બંનેની પાસેથી ઝળહળતી વહેતી રહી. પંડિતે દોરાને એકબીજામાં ભળતા, જોડાતા જોયા, ને તેની અંદર એક નવો પ્રશ્ન શાંતિથી જાગ્યો, એવો જે કોઈ ગ્રંથે પૂછવાનું વિચાર્યું જ નહોતું: જો ભગવાન અહીં પણ હતો, ધૂળમાં ને પવનમાં ને તેના પોતાના ધીમા શ્વાસમાં — તો શું તે પોતાનાં આટલાં કાળજીભર્યાં વર્ષોમાં ક્યારેય ઘરથી દૂર ગયો જ હતો ખરો?"], "hi": ["नदी कभी बहना बंद नहीं करती थी, और न ही कबीर के हाथ। सूर्योदय से वह खुले आसमान के नीचे अपने करघे पर बैठता, सादा सफ़ेद कपड़ा लपेटे, उसकी उँगलियाँ धागों को राह दिखातीं — ऊपर, नीचे, ऊपर, नीचे — और लकड़ी का ढाँचा अपना धैर्यभरा गीत चरमराता। वह न जवान था, न अमीर। वह एक जुलाहा था, और उसके हाथों के नीचे उगता कपड़ा साफ़ और सच्चा था, और इतना उसके लिए काफ़ी था।", "एक सुबह उसके करघे पर एक परछाईं पड़ी। रास्ते पर एक पंडित खड़ा था — क्रीम और सुनहरे वस्त्रों में एक ब्राह्मण, उँगलियों में अँगूठियाँ और चप्पलों पर अब भी महान मंदिर की धूल। उसने बचपन से धर्मग्रंथ पढ़े थे। वह मंत्र, कर्मकांड और हर दीये को जलाने का सही तरीक़ा जानता था।", "\"लोग कहते हैं तुम गुरु हो,\" पंडित ने कहा, एक ऐसी मुस्कान के साथ जो पूरी तरह दयालु नहीं थी। \"पर ख़ुद को देखो। न मंदिर, न मूरत, न घंटियाँ। हमने अपने भगवान को दो आदमियों से ऊँचे सोने में गढ़ा है। हम उसे नहलाते हैं, सजाते हैं, भोर में भजन गाते हैं। अब बता, जुलाहे — तेरा भगवान क्या है? तू उसे कहाँ रखता है? इस छोटे करघे पर, इस धूल में तो नहीं?\"", "कबीर ने बुनना बंद नहीं किया। \"तेरा भगवान,\" उसने धीरे से कहा, \"बहुत समय पहले एक सुंदर महल में राजकुमार बनकर जन्मा था। सच्चा महल, सच्ची दीवारों वाला। मैं उसे नमन करता हूँ; वह मुझे भी प्यारा है।\" वह रुका, और करघा चरमराया। \"पर अगर भगवान एक महल में, एक सुनहरे रूप में, चाहे कितना भी भव्य हो, समा सकता है — तो तेरा भगवान सचमुच कितना बड़ा है?\"", "उसने धागों से एक हाथ उठाया — धीरे से, जैसे किसी बच्चे को चिड़िया उड़ने से पहले दिखाने को हाथ उठाते हैं। \"मेरे भगवान का कोई दरवाज़ा नहीं, क्योंकि उसकी कोई दीवार नहीं। ऊपर देख। वह आसमान जिसका कोई किनारा नहीं — वहाँ।\" पानी से हवा का एक झोंका आया। \"वह हवा जिसे तू मुट्ठी में नहीं पकड़ सकता — वहाँ। वह नदी जो तेरे मंदिर के बनने से पहले से बहती है — वहाँ।\"", "एक मछरंगी चिड़िया हवा से नीचे उतरी और नीली चमक के साथ पानी को छूकर फिर चमकती हुई उठ गई। रास्ते पर एक नन्ही लड़की हँसती हुई दौड़ गई, ठंडी सुबह में उसकी साँस तेज़ और गरम। \"और वहाँ,\" कबीर ने लड़की की ओर सिर हिलाकर कहा। \"उसकी साँस में। तेरी साँस में। मेरी साँस में, अभी इसी पल। मैं कभी एक पल को भी ऐसी जगह नहीं रहा जहाँ वह न हो।\"", "पंडित कुछ न बोला। वह ऐसा आदमी था जिसने सौ बहसें जीती थीं, जिसके भीतर जवाब किसी पेटी में रखे कपड़े की तरह तह किए पड़े थे। पर वहाँ खड़े-खड़े उसने उन्हें टटोला और हाथ ख़ाली पाए। उसने पीछे मंदिर की ओर देखा जहाँ सुनहरी मूरत ठंडे अँधेरे कमरे में प्रतीक्षा कर रही थी, फिर सुबह की रोशनी में दमकती नदी की ओर, और उस चौड़े आसमान की ओर जो सचमुच कहीं कोई दीवार लिए बिना दूर तक फैला था। उसे अचानक ख़ुद बहुत छोटा लगा — पर यह कोई बुरा छोटापन नहीं था। यह समंदर के किनारे खड़े आदमी का छोटापन था।", "फिर पंडित ने एक अनसोचा काम किया। उसने अपने क्रीम-सुनहरे वस्त्र समेटे, वही बढ़िया वस्त्र जिन्हें वह हमेशा इतनी सावधानी से साफ़ रखता था, और जुलाहे के पास सादी धूल में, जैसे कोई शिष्य बैठता है, बैठ गया। \"मेरे मंदिर में,\" उसने धीरे से कहा, \"मुझे हमेशा ठीक-ठीक पता था कि भगवान कहाँ मिलेगा। मुझे कमरा पता था। मुझे घड़ी पता थी।\" उसने अपने खुले हाथों को देखा। \"बीच की ख़ाली जगहों में देखने का ख़याल मुझे कभी आया ही नहीं।\"", "कबीर मुस्कुराया और जगह बनाने को खिसक गया, और करघा चलता रहा — ऊपर, नीचे, ऊपर, नीचे — और नदी दोनों के पास से चमकती हुई बहती रही। पंडित ने धागों को एक-दूसरे में मिलते, जुड़ते देखा, और उसके भीतर एक नया सवाल चुपचाप उठा, ऐसा जो किसी किताब ने कभी पूछने का सोचा ही न था: अगर भगवान यहाँ भी था, धूल में और हवा में और उसकी अपनी धीमी साँस में — तो क्या वह अपने इन सब सावधान बरसों में कभी घर से दूर गया भी था?"]}}, "img_cover": "assets/ramkabir/my-ram-is-everywhere/cover.jpg", "img_pages": ["assets/ramkabir/my-ram-is-everywhere/page-1.jpg", "assets/ramkabir/my-ram-is-everywhere/page-2.jpg", "assets/ramkabir/my-ram-is-everywhere/page-3.jpg", "assets/ramkabir/my-ram-is-everywhere/page-4.jpg", "assets/ramkabir/my-ram-is-everywhere/page-5.jpg"]}, {"slug": "flowers-under-the-cloth", "color": "cream", "scenes": ["A white shroud at Magha
