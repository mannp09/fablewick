    levels: {
      en: ["A small seed sat in the dark.\n\nThe dirt was warm. The dirt was quiet.\n\nThe seed could hear things up above. Birds. Rain. Little feet running.\n\n\"I should do something,\" said the seed. \"Everyone is doing something.\"\n\nBut the seed did not know what to do. So the seed just sat. And waited.\n\nA worm wiggled by. \"Hello, seed,\" said the worm. \"Are you working?\"\n\n\"I am sitting,\" said the seed. \"I think I am supposed to be doing more.\"\n\nThe worm smiled. \"Sitting is doing,\" said the worm. \"You are getting ready.\"\n\nThe seed sat for many days. The seed sat through cold nights. The seed sat through long rains.\n\nAnd then — one morning — something stretched.\n\nIt was the seed.\n\nA tiny green leaf pushed up, up, up, into the light.\n\nThe seed was a sprout now. The sprout looked back down at the dark, warm dirt.\n\n\"Thank you,\" said the sprout. \"I was getting ready the whole time.\"", "Deep under the garden, where the dirt was dark and warm, a small seed sat very still.\n\nUp above, the seed could hear all kinds of busy things. Birds calling to each other. Rain drumming on leaves. Children's feet running past. Everyone, it seemed, knew exactly what to do.\n\nThe seed felt small.\n\n\"I should be doing something,\" the seed whispered. \"Everyone else is.\"\n\nBut the seed did not know what to do. So the seed just sat in the warm, quiet dark.\n\nOne afternoon, a worm wiggled by.\n\n\"Hello, little seed,\" said the worm. \"You look worried.\"\n\n\"I think I am supposed to be doing more,\" said the seed. \"All the birds are flying. All the children are running. All the leaves are growing. But I am just sitting here.\"\n\nThe worm thought about this for a long minute.\n\n\"Sitting,\" said the worm, \"is also doing. You are getting ready. Some things take a long time to be ready. That is not nothing. That is something important.\"\n\nThe seed was not sure. But the worm seemed to know about dirt, so the seed decided to trust the worm.\n\nThe seed sat through three cold nights. The seed sat through a long, gray rain. The seed sat through a quiet, soft week when nothing happened at all.\n\nAnd then — one morning, when the sun came down warm and golden — the seed felt something it had never felt before.\n\nA stretch.\n\nA tiny green stretch, pushing up from the very middle of the seed. The stretch pushed up through the dirt, up through the cool, up through the dark — and out into the bright, bright air.\n\nThe seed was a sprout now.\n\nThe sprout looked at the sky, which was very blue. The sprout looked at the sun, which was very kind. And then the sprout looked back down at the dark, warm dirt where it had waited for so long.\n\n\"Thank you,\" the sprout said, very softly. \"I thought I was doing nothing. But I was getting ready the whole time.\"\n\nThe worm, who happened to be wiggling by, smiled. The worm did not say anything. The worm did not need to.", "Deep beneath the garden, where the dirt smelled like rain and old roots, a small seed had been sitting in the dark for what felt like a very long time.\n\nThe dirt was warm, which was nice. The dirt was quiet, which was mostly nice. But the seed was beginning to feel that something was wrong.\n\nFrom above, the seed could hear the world doing things. Birds, calling out in long, looping songs. Rain, drumming a hundred different rhythms on the leaves. The pat-pat-pat of children's feet, running somewhere fast. And every so often, the slow, careful crunch of a grown-up's boot on the path.\n\nEveryone up there, it seemed, knew exactly what they were supposed to be doing.\n\nThe seed did not.\n\n\"I think,\" the seed whispered, mostly to itself, \"that I am doing this wrong.\"\n\nBut what was the seed supposed to be doing? The seed did not know. So the seed just sat there, in the warm dark, and felt small, and worried.\n\nOne afternoon — at least, the seed thought it was afternoon; it was hard to tell down there — a worm came wiggling past.\n\n\"Oh,\" said the worm, stopping. \"Hello, little seed. You look unhappy.\"\n\n\"I think I'm supposed to be doing more,\" the seed said. \"All the birds are flying somewhere. All the leaves up there are growing. The children are running, the grown-ups are walking, even you are wiggling — and look at me. I'm just sitting. I haven't done anything in days.\"\n\nThe worm thought about this. The worm was, by worm standards, an unusually thoughtful worm.\n\n\"Sitting,\" said the worm, slowly, \"is also a kind of doing. It just doesn't look like one from the outside. You're getting ready, you see. Some things take a long, long time to be ready. That isn't nothing. That's something important.\"\n\n\"How long?\" asked the seed.\n\n\"That depends,\" said the worm. \"It's different for everyone.\"\n\nThe seed thought this was not a very helpful answer. But the worm seemed to know a great deal about dirt, and roots, and dark warm places, so the seed decided to trust the worm and try.\n\nThe seed sat through three cold nights, when the dirt went cool and still.\n\nThe seed sat through a long, gray rain, when the world above sounded muffled and far away.\n\nThe seed sat through a quiet week when, as far as the seed could tell, absolutely nothing happened.\n\nAnd just when the seed had almost decided that the worm had been wrong — that maybe seeds like this one simply never got ready, that maybe it would just sit here forever, alone, in the warm dark —\n\n— something stretched.\n\nIt was a very small stretch, at first. Just a little movement, somewhere deep in the very middle of the seed. The kind of movement you almost don't notice. But then the stretch pushed, and then it pushed harder, and then it was a green, hopeful, persistent thing pushing up, and up, and up.\n\nUp through the warm dirt. Up through the cool dirt. Up through the dark, the dark, the dark — and then —\n\nLight.\n\nThe sprout — for the seed was a sprout now, though it would take it a moment to realize this — blinked into the brightest, bluest, warmest morning it had ever seen.\n\nThere was so much sky. There was so much sun. There were birds, who were, as advertised, doing a great deal of flying. There were children, somewhere not too far away, laughing about something. There was a wind that smelled like grass.\n\nThe sprout looked at all of it, quietly, for a long time.\n\nAnd then, because it felt like the right thing to do, the sprout looked back down — down at the small hole it had pushed up through, down at the dark, warm dirt where it had waited for what had felt like forever.\n\n\"Thank you,\" the sprout said, very softly, so that only the dirt would hear. \"I thought I was doing nothing. But I was getting ready the whole time.\"\n\nThe worm, who was, as it happened, wiggling by at just that moment, smiled the small, satisfied smile of someone who had been right about something important.\n\nThe worm did not say anything.\n\nThe worm did not need to.\n\n*Something to think about: The sprout couldn't see what was happening underground. What's something you're getting ready for right now, even if it doesn't look like it from the outside?*"],
      hi: ["एक छोटा सा बीज अँधेरे में बैठा था।\n\nमिट्टी गरम थी। मिट्टी शांत थी।\n\nबीज ऊपर की चीज़ें सुन सकता था। चिड़ियाँ। बारिश। छोटे पाँव दौड़ते हुए।\n\n\"मुझे कुछ करना चाहिए,\" बीज ने कहा। \"सब कुछ कर रहे हैं।\"\n\nपर बीज को नहीं पता था क्या करना है। तो बीज बस बैठा रहा। और इंतज़ार करता रहा।\n\nएक केंचुआ रेंगते हुए पास से गुज़रा। \"नमस्ते, बीज,\" केंचुए ने कहा। \"क्या तुम काम कर रहे हो?\"\n\n\"मैं बैठा हूँ,\" बीज ने कहा। \"मुझे लगता है मुझे और कुछ करना चाहिए।\"\n\nकेंचुआ मुस्कुराया। \"बैठना भी करना है,\" केंचुए ने कहा। \"तुम तैयार हो रहे हो।\"\n\nबीज कई दिनों तक बैठा रहा। बीज ठंडी रातों में बैठा रहा। बीज लम्बी बारिशों में बैठा रहा।\n\nऔर फिर — एक सुबह — कुछ खिंचा।\n\nवह बीज था।\n\nएक नन्ही हरी पत्ती ऊपर, ऊपर, ऊपर, रोशनी में धकेल गई।\n\nबीज अब अंकुर था। अंकुर ने नीचे अँधेरी, गरम मिट्टी की ओर देखा।\n\n\"धन्यवाद,\" अंकुर ने कहा। \"मैं पूरे समय तैयार हो रहा था।\"", "बगीचे के नीचे गहराई में, जहाँ मिट्टी अँधेरी और गरम थी, एक छोटा सा बीज बहुत स्थिर बैठा था।\n\nऊपर, बीज हर तरह की व्यस्त चीज़ें सुन सकता था। चिड़ियाँ एक-दूसरे को पुकारती हुई। बारिश पत्तियों पर ढोल बजाती हुई। बच्चों के पाँव भागते हुए। सब, ऐसा लगता था, ठीक से जानते थे कि क्या करना है।\n\nबीज छोटा महसूस करता था।\n\n\"मुझे कुछ करना चाहिए,\" बीज ने फुसफुसाया। \"बाक़ी सब कर रहे हैं।\"\n\nपर बीज को नहीं पता था क्या करना है। तो बीज बस गरम, शांत अँधेरे में बैठा रहा।\n\nएक दोपहर, एक केंचुआ रेंगते हुए पास से गुज़रा।\n\n\"नमस्ते, छोटे बीज,\" केंचुए ने कहा। \"तुम परेशान लग रहे हो।\"\n\n\"मुझे लगता है मुझे और कुछ करना चाहिए,\" बीज ने कहा। \"सारी चिड़ियाँ उड़ रही हैं। सारे बच्चे दौड़ रहे हैं। सारी पत्तियाँ बढ़ रही हैं। पर मैं बस यहाँ बैठा हूँ।\"\n\nकेंचुए ने एक लम्बे मिनट तक इसके बारे में सोचा।\n\n\"बैठना,\" केंचुए ने कहा, \"भी एक तरह का करना है। तुम तैयार हो रहे हो। कुछ चीज़ों को तैयार होने में बहुत समय लगता है। वह कुछ नहीं नहीं है। वह कुछ महत्वपूर्ण है।\"\n\nबीज को यक़ीन नहीं था। पर केंचुआ मिट्टी के बारे में जानता लगता था, तो बीज ने केंचुए पर भरोसा करने का फ़ैसला किया।\n\nबीज तीन ठंडी रातों में बैठा रहा। बीज एक लम्बी, धूसर बारिश में बैठा रहा। बीज एक शांत, नरम हफ़्ते में बैठा रहा जब कुछ भी नहीं हुआ।\n\nऔर फिर — एक सुबह, जब सूरज गरम और सुनहरा निकला — बीज ने वह महसूस किया जो उसने पहले कभी महसूस नहीं किया था।\n\nएक खिंचाव।\n\nएक छोटा हरा खिंचाव, बीज के बिल्कुल बीच से ऊपर धकेलता हुआ। खिंचाव मिट्टी के ज़रिए ऊपर धकेला, ठंडक के ज़रिए, अँधेरे के ज़रिए — और बाहर चमकदार, चमकदार हवा में।\n\nबीज अब एक अंकुर था।\n\nअंकुर ने आसमान की ओर देखा, जो बहुत नीला था। अंकुर ने सूरज की ओर देखा, जो बहुत दयालु था। और फिर अंकुर ने नीचे अँधेरी, गरम मिट्टी की ओर देखा जहाँ वह इतनी देर तक इंतज़ार करता रहा था।\n\n\"धन्यवाद,\" अंकुर ने बहुत धीरे से कहा। \"मुझे लगा मैं कुछ नहीं कर रहा था। पर मैं पूरे समय तैयार हो रहा था।\"\n\nकेंचुआ, जो वहीं रेंगते हुए जा रहा था, मुस्कुराया। केंचुए ने कुछ नहीं कहा। केंचुए को कहने की ज़रूरत नहीं थी।", "बगीचे के नीचे गहराई में, जहाँ मिट्टी से बारिश और पुरानी जड़ों की महक आती थी, एक छोटा सा बीज अँधेरे में बैठा था जो कि एक बहुत लम्बे समय जैसा महसूस हो रहा था।\n\nमिट्टी गरम थी, जो अच्छा था। मिट्टी शांत थी, जो ज़्यादातर अच्छा था। पर बीज को लगने लगा था कि कुछ ग़लत है।\n\nऊपर से, बीज दुनिया को चीज़ें करते सुन सकता था। चिड़ियाँ, लम्बे, घुमावदार गानों में पुकारती हुई। बारिश, पत्तियों पर सौ अलग लय में ढोल बजाती हुई। बच्चों के पाँव की पट-पट-पट, कहीं तेज़ी से भागती हुई। और कभी-कभी, रास्ते पर एक बड़े के जूते की धीमी, सावधान चरमराहट।\n\nवहाँ ऊपर सब, ऐसा लगता था, ठीक से जानते थे कि उन्हें क्या करना है।\n\nबीज नहीं जानता था।\n\n\"मुझे लगता है,\" बीज ने ज़्यादातर अपने आप से फुसफुसाया, \"कि मैं यह ग़लत कर रहा हूँ।\"\n\nपर बीज को क्या करना चाहिए था? बीज को नहीं पता था। तो बीज बस वहाँ, गरम अँधेरे में बैठा रहा, और छोटा महसूस करता रहा, और चिंतित होता रहा।\n\nएक दोपहर — कम से कम, बीज को लगा कि यह दोपहर थी; वहाँ नीचे बताना मुश्किल था — एक केंचुआ रेंगते हुए पास से गुज़रा।\n\n\"ओह,\" केंचुए ने रुकते हुए कहा। \"नमस्ते, छोटे बीज। तुम दुखी लग रहे हो।\"\n\n\"मुझे लगता है मुझे और कुछ करना चाहिए,\" बीज ने कहा। \"सारी चिड़ियाँ कहीं उड़ रही हैं। ऊपर की सारी पत्तियाँ बढ़ रही हैं। बच्चे दौड़ रहे हैं, बड़े चल रहे हैं, यहाँ तक कि तुम भी रेंग रहे हो — और मुझे देखो। मैं बस बैठा हूँ। मैंने कई दिनों से कुछ नहीं किया।\"\n\nकेंचुए ने इसके बारे में सोचा। केंचुआ, केंचुओं के मानक से, असामान्य रूप से विचारशील केंचुआ था।\n\n\"बैठना,\" केंचुए ने धीरे से कहा, \"भी एक तरह का करना है। यह बस बाहर से वैसा नहीं दिखता। तुम तैयार हो रहे हो, देखो। कुछ चीज़ों को तैयार होने में बहुत, बहुत लम्बा समय लगता है। वह कुछ नहीं नहीं है। वह कुछ महत्वपूर्ण है।\"\n\n\"कितना लम्बा?\" बीज ने पूछा।\n\n\"यह निर्भर करता है,\" केंचुए ने कहा। \"यह सबके लिए अलग है।\"\n\nबीज को लगा कि यह बहुत मददगार जवाब नहीं था। पर केंचुआ मिट्टी, और जड़ों, और अँधेरी गरम जगहों के बारे में बहुत कुछ जानता लगता था, तो बीज ने केंचुए पर भरोसा करने और कोशिश करने का फ़ैसला किया।\n\nबीज तीन ठंडी रातों में बैठा रहा, जब मिट्टी ठंडी और स्थिर हो गई।\n\nबीज एक लम्बी, धूसर बारिश में बैठा रहा, जब ऊपर की दुनिया दबी हुई और दूर सुनाई दी।\n\nबीज एक शांत हफ़्ते में बैठा रहा जब, बीज जितना बता सकता था, बिल्कुल कुछ भी नहीं हुआ।\n\nऔर ठीक तभी जब बीज लगभग तय कर चुका था कि केंचुआ ग़लत था — कि शायद इस तरह के बीज कभी तैयार नहीं होते, कि शायद वह बस यहाँ हमेशा के लिए, अकेला, गरम अँधेरे में, बैठा रहेगा —\n\n— कुछ खिंचा।\n\nयह पहले एक बहुत छोटा खिंचाव था। बस एक छोटी सी हरकत, बीज के बिल्कुल बीच में कहीं गहरे। उस तरह की हरकत जिसे तुम लगभग नहीं देख पाते। पर फिर खिंचाव ने धकेला, और फिर उसने और ज़ोर से धकेला, और फिर वह एक हरी, उम्मीद भरी, ज़िद्दी चीज़ बन गई जो ऊपर, ऊपर, और ऊपर धकेल रही थी।\n\nगरम मिट्टी के ज़रिए ऊपर। ठंडी मिट्टी के ज़रिए ऊपर। अँधेरे, अँधेरे, अँधेरे के ज़रिए ऊपर — और फिर —\n\nरोशनी।\n\nअंकुर — क्योंकि बीज अब अंकुर था, हालाँकि उसे यह समझने में एक पल लगेगा — सबसे चमकदार, सबसे नीली, सबसे गरम सुबह में पलकें झपकाई जो उसने कभी देखी थी।\n\nइतना सारा आसमान था। इतना सारा सूरज था। चिड़ियाँ थीं, जो, जैसा बताया गया था, बहुत सारी उड़ान भर रही थीं। बच्चे थे, कहीं ज़्यादा दूर नहीं, किसी बात पर हँसते हुए। एक हवा थी जिससे घास की महक आ रही थी।\n\nअंकुर ने यह सब चुपचाप, लम्बे समय तक देखा।\n\nऔर फिर, क्योंकि यह करने की सही बात लगी, अंकुर ने वापस नीचे देखा — उस छोटे छेद की ओर जिससे वह ऊपर धकेला था, उस अँधेरी, गरम मिट्टी की ओर जहाँ वह इतनी देर तक इंतज़ार करता रहा था जो हमेशा जैसा लगा था।\n\n\"धन्यवाद,\" अंकुर ने बहुत धीरे से कहा, इतना कि बस मिट्टी ही सुने। \"मुझे लगा मैं कुछ नहीं कर रहा था। पर मैं पूरे समय तैयार हो रहा था।\"\n\nकेंचुआ, जो उसी पल रेंगते हुए जा रहा था, उस छोटी, संतुष्ट मुस्कान से मुस्कुराया जो किसी ऐसे की होती है जो किसी महत्वपूर्ण बात के बारे में सही था।\n\nकेंचुए ने कुछ नहीं कहा।\n\nकेंचुए को कहने की ज़रूरत नहीं थी।\n\n*सोचने की बात: अंकुर नहीं देख सकता था कि ज़मीन के नीचे क्या हो रहा है। ऐसी क्या चीज़ है जिसके लिए तुम अभी तैयार हो रहे हो, चाहे बाहर से ऐसा न दिखे?*"],
      gu: ["એક નાનું બીજ અંધારામાં બેઠું હતું.\n\nમાટી ગરમ હતી. માટી શાંત હતી.\n\nબીજ ઉપરની વાતો સાંભળી શકતું હતું. પક્ષીઓ. વરસાદ. નાના પગ દોડતા.\n\n\"મારે કંઈક કરવું જોઈએ,\" બીજે કહ્યું. \"બધા કંઈક કરી રહ્યા છે.\"\n\nપણ બીજને ખબર ન હતી કે શું કરવું. તેથી બીજ બસ બેઠું. અને રાહ જોતું રહ્યું.\n\nએક અળસિયું પાસેથી પસાર થયું. \"નમસ્તે, બીજ,\" અળસિયાએ કહ્યું. \"તું કામ કરી રહ્યું છે?\"\n\n\"હું બેઠું છું,\" બીજે કહ્યું. \"મને લાગે છે મારે વધારે કરવું જોઈએ.\"\n\nઅળસિયું હસ્યું. \"બેસવું પણ કરવું છે,\" અળસિયાએ કહ્યું. \"તું તૈયાર થઈ રહ્યું છે.\"\n\nબીજ ઘણા દિવસો સુધી બેઠું. બીજ ઠંડી રાતો સુધી બેઠું. બીજ લાંબા વરસાદ સુધી બેઠું.\n\nઅને પછી — એક સવારે — કંઈક ખેંચાયું.\n\nએ બીજ હતું.\n\nએક નાનું લીલું પાન ઉપર, ઉપર, ઉપર, પ્રકાશમાં ધકેલાયું.\n\nબીજ હવે અંકુર હતું. અંકુરે પાછું નીચે અંધારી, ગરમ માટી તરફ જોયું.\n\n\"આભાર,\" અંકુરે કહ્યું. \"હું આખા સમય તૈયાર થઈ રહ્યું હતું.\"", "બગીચાની નીચે ઊંડે, જ્યાં માટી અંધારી અને ગરમ હતી, એક નાનું બીજ ખૂબ સ્થિર બેઠું હતું.\n\nઉપર, બીજ બધી પ્રકારની વ્યસ્ત વાતો સાંભળી શકતું હતું. પક્ષીઓ એકબીજાને બોલાવતા. વરસાદ પાન પર ઢોલ વગાડતો. બાળકોના પગ દોડતા. બધા, એવું લાગતું હતું, બરાબર જાણતા હતા કે શું કરવું.\n\nબીજ નાનું લાગતું હતું.\n\n\"મારે કંઈક કરવું જોઈએ,\" બીજે ગુસપુસ કર્યું. \"બધા કરી રહ્યા છે.\"\n\nપણ બીજને ખબર ન હતી કે શું કરવું. તેથી બીજ બસ ગરમ, શાંત અંધારામાં બેઠું.\n\nએક બપોરે, એક અળસિયું પાસેથી પસાર થયું.\n\n\"નમસ્તે, નાના બીજ,\" અળસિયાએ કહ્યું. \"તું ચિંતિત લાગે છે.\"\n\n\"મને લાગે છે મારે વધારે કરવું જોઈએ,\" બીજે કહ્યું. \"બધા પક્ષીઓ ઉડી રહ્યા છે. બધા બાળકો દોડી રહ્યા છે. બધા પાન ઊગી રહ્યા છે. પણ હું ફક્ત અહીં બેઠું છું.\"\n\nઅળસિયાએ આ વિશે એક લાંબી મિનિટ વિચાર્યું.\n\n\"બેસવું,\" અળસિયાએ કહ્યું, \"પણ કરવું છે. તું તૈયાર થઈ રહ્યું છે. કેટલીક વસ્તુઓને તૈયાર થવામાં ઘણો સમય લાગે છે. એ કંઈ નહીં નથી. એ કંઈક મહત્વનું છે.\"\n\nબીજને ખાતરી ન હતી. પણ અળસિયું માટી વિશે જાણતું હોય એમ લાગ્યું, તેથી બીજે અળસિયા પર વિશ્વાસ કરવાનો નિર્ણય કર્યો.\n\nબીજ ત્રણ ઠંડી રાતો સુધી બેઠું. બીજ એક લાંબા, ભૂખરા વરસાદ સુધી બેઠું. બીજ એક શાંત, નરમ અઠવાડિયા સુધી બેઠું જ્યારે કંઈ જ ન થયું.\n\nઅને પછી — એક સવારે, જ્યારે સૂરજ ગરમ અને સોનેરી નીકળ્યો — બીજે કંઈક અનુભવ્યું જે એણે પહેલા ક્યારેય અનુભવ્યું ન હતું.\n\nએક ખેંચાણ.\n\nએક નાનું લીલું ખેંચાણ, બીજની એકદમ વચ્ચેથી ઉપર ધકેલાતું. ખેંચાણ માટીમાંથી ઉપર ધકેલાયું, ઠંડકમાંથી, અંધારામાંથી — અને બહાર તેજસ્વી, તેજસ્વી હવામાં.\n\nબીજ હવે અંકુર હતું.\n\nઅંકુરે આકાશ તરફ જોયું, જે ખૂબ વાદળી હતું. અંકુરે સૂરજ તરફ જોયું, જે ખૂબ દયાળુ હતો. અને પછી અંકુરે પાછું નીચે અંધારી, ગરમ માટી તરફ જોયું જ્યાં તે આટલા લાંબા સમય સુધી રાહ જોતું હતું.\n\n\"આભાર,\" અંકુરે ખૂબ ધીમેથી કહ્યું. \"મને લાગ્યું કે હું કંઈ નથી કરી રહ્યું. પણ હું આખા સમય તૈયાર થઈ રહ્યું હતું.\"\n\nઅળસિયું, જે હમણાં જ પાસેથી પસાર થઈ રહ્યું હતું, હસ્યું. અળસિયું કંઈ બોલ્યું નહીં. અળસિયાને બોલવાની જરૂર ન હતી.", "બગીચાની નીચે ઊંડે, જ્યાં માટીમાંથી વરસાદ અને જૂના મૂળિયાંની ગંધ આવતી, એક નાનું બીજ અંધારામાં બેઠું હતું જે ખૂબ લાંબા સમય જેવું લાગતું હતું.\n\nમાટી ગરમ હતી, જે સારું હતું. માટી શાંત હતી, જે મોટેભાગે સારું હતું. પણ બીજને લાગવા લાગ્યું હતું કે કંઈક ખોટું છે.\n\nઉપરથી, બીજ દુનિયાને કામો કરતી સાંભળી શકતું. પક્ષીઓ, લાંબા, વળાંકવાળા ગીતોમાં બોલાવતા. વરસાદ, પાન પર સો અલગ લયમાં ઢોલ વગાડતો. બાળકોના પગની પટ-પટ-પટ, ક્યાંક ઝડપથી દોડતી. અને ક્યારેક, રસ્તા પર મોટાઓના બૂટની ધીમી, સંભાળભરી ચીંચીંયાટી.\n\nત્યાં ઉપર બધા, એવું લાગતું હતું, બરાબર જાણતા હતા કે એમણે શું કરવાનું છે.\n\nબીજ જાણતું ન હતું.\n\n\"મને લાગે છે,\" બીજે ગુસપુસ કર્યું, મોટેભાગે પોતાને જ, \"કે હું આ ખોટું કરી રહ્યું છું.\"\n\nપણ બીજે શું કરવાનું હતું? બીજને ખબર ન હતી. તેથી બીજ બસ ત્યાં, ગરમ અંધારામાં બેઠું, અને નાનું લાગતું રહ્યું, અને ચિંતા કરતું રહ્યું.\n\nએક બપોરે — ઓછામાં ઓછું, બીજને લાગ્યું કે એ બપોર હતી; ત્યાં નીચે કહેવું મુશ્કેલ હતું — એક અળસિયું પાસેથી પસાર થયું.\n\n\"ઓહ,\" અળસિયાએ રોકાતા કહ્યું. \"નમસ્તે, નાના બીજ. તું દુખી લાગે છે.\"\n\n\"મને લાગે છે મારે વધારે કરવું જોઈએ,\" બીજે કહ્યું. \"બધા પક્ષીઓ ક્યાંક ઉડી રહ્યા છે. ઉપરના બધા પાન ઊગી રહ્યા છે. બાળકો દોડી રહ્યા છે, મોટાઓ ચાલી રહ્યા છે, તું પણ સરકી રહ્યું છે — અને મને જો. હું બસ બેઠું છું. મેં દિવસોથી કંઈ કર્યું નથી.\"\n\nઅળસિયાએ આ વિશે વિચાર્યું. અળસિયું, અળસિયાંના માપદંડ પ્રમાણે, અસામાન્ય રીતે વિચારશીલ અળસિયું હતું.\n\n\"બેસવું,\" અળસિયાએ ધીમેથી કહ્યું, \"પણ એક પ્રકારનું કરવું છે. એ બસ બહારથી એવું દેખાતું નથી. તું તૈયાર થઈ રહ્યું છે, જો. કેટલીક વસ્તુઓને તૈયાર થવામાં ખૂબ, ખૂબ લાંબો સમય લાગે છે. એ કંઈ નહીં નથી. એ કંઈક મહત્વનું છે.\"\n\n\"કેટલો લાંબો?\" બીજે પૂછ્યું.\n\n\"એ આધાર રાખે છે,\" અળસિયાએ કહ્યું. \"એ બધા માટે અલગ છે.\"\n\nબીજને લાગ્યું કે આ બહુ ઉપયોગી જવાબ ન હતો. પણ અળસિયું માટી, અને મૂળિયાં, અને અંધારી ગરમ જગ્યાઓ વિશે ઘણું જાણતું હોય એમ લાગ્યું, તેથી બીજે અળસિયા પર વિશ્વાસ કરવાનો અને પ્રયત્ન કરવાનો નિર્ણય કર્યો.\n\nબીજ ત્રણ ઠંડી રાતો સુધી બેઠું, જ્યારે માટી ઠંડી અને સ્થિર થઈ ગઈ.\n\nબીજ એક લાંબા, ભૂખરા વરસાદ સુધી બેઠું, જ્યારે ઉપરની દુનિયા દબાયેલી અને દૂર સંભળાઈ.\n\nબીજ એક શાંત અઠવાડિયા સુધી બેઠું જ્યારે, બીજ જેટલું કહી શકતું, બિલકુલ કંઈ ન થયું.\n\nઅને બરાબર ત્યારે જ્યારે બીજ લગભગ નક્કી કરી ચૂક્યું હતું કે અળસિયું ખોટું હતું — કે કદાચ આવા બીજ ક્યારેય તૈયાર નથી થતા, કે કદાચ એ બસ અહીં હંમેશ માટે, એકલા, ગરમ અંધારામાં, બેઠું રહેશે —\n\n— કંઈક ખેંચાયું.\n\nએ પહેલા એક ખૂબ નાનું ખેંચાણ હતું. બસ એક નાની હલચલ, બીજની એકદમ વચ્ચે ક્યાંક ઊંડે. એ પ્રકારની હલચલ જે તું લગભગ નથી જોઈ શકતો. પણ પછી ખેંચાણે ધકેલ્યું, અને પછી એણે વધારે જોરથી ધકેલ્યું, અને પછી એ એક લીલી, આશાભરી, હઠીલી વસ્તુ બની જે ઉપર, અને ઉપર, અને ઉપર ધકેલી રહી હતી.\n\nગરમ માટીમાંથી ઉપર. ઠંડી માટીમાંથી ઉપર. અંધારા, અંધારા, અંધારામાંથી ઉપર — અને પછી —\n\nપ્રકાશ.\n\nઅંકુર — કેમ કે બીજ હવે અંકુર હતું, જોકે એને એ સમજવામાં એક પળ લાગશે — સૌથી તેજસ્વી, સૌથી વાદળી, સૌથી ગરમ સવારમાં પાંપણો ખંજવાળી જે એણે ક્યારેય જોઈ હતી.\n\nએટલું બધું આકાશ હતું. એટલો બધો સૂરજ હતો. પક્ષીઓ હતા, જે, જાહેરાત મુજબ, ઘણી ઉડાન ભરી રહ્યા હતા. બાળકો હતા, ક્યાંક ખૂબ દૂર નહીં, કંઈક પર હસતા. એક પવન હતો જેમાંથી ઘાસની ગંધ આવતી.\n\nઅંકુરે આ બધું શાંતપણે, લાંબા સમય સુધી જોયું.\n\nઅને પછી, કેમ કે એ કરવાની સાચી વાત લાગી, અંકુરે પાછું નીચે જોયું — એ નાના કાણા તરફ જેમાંથી એ ઉપર ધકેલાયું હતું, એ અંધારી, ગરમ માટી તરફ જ્યાં એણે એટલા લાંબા સમય સુધી રાહ જોઈ હતી જે હંમેશ જેવી લાગી હતી.\n\n\"આભાર,\" અંકુરે ખૂબ ધીમેથી કહ્યું, એટલું કે ફક્ત માટી જ સાંભળે. \"મને લાગ્યું કે હું કંઈ નથી કરી રહ્યું. પણ હું આખા સમય તૈયાર થઈ રહ્યું હતું.\"\n\nઅળસિયું, જે, એમ બન્યું કે, બરાબર એ જ ક્ષણે પાસેથી પસાર થઈ રહ્યું હતું, એ નાની, સંતુષ્ટ સ્મિતથી હસ્યું જે કોઈ એવાનું હોય છે જે કોઈ મહત્વની વાત વિશે સાચું હતું.\n\nઅળસિયું કંઈ બોલ્યું નહીં.\n\nઅળસિયાને બોલવાની જરૂર ન હતી.\n\n*વિચારવા જેવી વાત: અંકુર નહોતું જોઈ શકતું કે જમીન નીચે શું થઈ રહ્યું છે. એવી શું વસ્તુ છે જેના માટે તું હમણાં તૈયાર થઈ રહ્યો છે, ભલે બહારથી એવું ન દેખાતું હોય?*"],
      es: ["Una semilla pequeña estaba sentada en la oscuridad.\n\nLa tierra estaba tibia. La tierra estaba en silencio.\n\nLa semilla podía oír cosas allá arriba. Pájaros. Lluvia. Pies pequeños corriendo.\n\n\"Debería hacer algo,\" dijo la semilla. \"Todos están haciendo algo.\"\n\nPero la semilla no sabía qué hacer. Así que la semilla solo se quedó sentada. Y esperó.\n\nUn gusano pasó arrastrándose. \"Hola, semilla,\" dijo el gusano. \"¿Estás trabajando?\"\n\n\"Estoy sentada,\" dijo la semilla. \"Creo que debería estar haciendo más.\"\n\nEl gusano sonrió. \"Sentarse también es hacer,\" dijo el gusano. \"Te estás preparando.\"\n\nLa semilla se quedó sentada muchos días. La semilla se quedó sentada durante noches frías. La semilla se quedó sentada durante lluvias largas.\n\nY entonces, una mañana, algo se estiró.\n\nEra la semilla.\n\nUna hojita verde empujó hacia arriba, arriba, arriba, hacia la luz.\n\nLa semilla ahora era un brote. El brote miró hacia abajo, hacia la tierra oscura y tibia.\n\n\"Gracias,\" dijo el brote. \"Me estuve preparando todo el tiempo.\"", "En lo profundo del jardín, donde la tierra estaba oscura y tibia, una semilla pequeña estaba sentada muy quieta.\n\nAllá arriba, la semilla podía oír toda clase de cosas ocupadas. Pájaros llamándose unos a otros. Lluvia tamborileando sobre las hojas. Pies de niños corriendo. Todos, parecía, sabían exactamente qué hacer.\n\nLa semilla se sentía pequeña.\n\n\"Debería estar haciendo algo,\" susurró la semilla. \"Todos los demás lo están.\"\n\nPero la semilla no sabía qué hacer. Así que la semilla solo se quedó sentada en la oscuridad tibia y callada.\n\nUna tarde, un gusano pasó arrastrándose.\n\n\"Hola, semillita,\" dijo el gusano. \"Pareces preocupada.\"\n\n\"Creo que debería estar haciendo más,\" dijo la semilla. \"Todos los pájaros están volando. Todos los niños están corriendo. Todas las hojas están creciendo. Pero yo solo estoy aquí sentada.\"\n\nEl gusano lo pensó durante un largo minuto.\n\n\"Sentarse,\" dijo el gusano, \"también es hacer. Te estás preparando. Algunas cosas tardan mucho en estar listas. Eso no es nada. Eso es algo importante.\"\n\nLa semilla no estaba segura. Pero el gusano parecía saber sobre la tierra, así que la semilla decidió confiar en el gusano.\n\nLa semilla se quedó sentada durante tres noches frías. La semilla se quedó sentada durante una lluvia larga y gris. La semilla se quedó sentada durante una semana callada y suave en la que no pasó nada.\n\nY entonces, una mañana, cuando el sol salió tibio y dorado, la semilla sintió algo que nunca había sentido antes.\n\nUn estiramiento.\n\nUn pequeño estiramiento verde, empujando desde el mismo medio de la semilla. El estiramiento empujó hacia arriba a través de la tierra, a través del frescor, a través de la oscuridad, y salió al aire brillante, brillante.\n\nLa semilla ahora era un brote.\n\nEl brote miró el cielo, que estaba muy azul. El brote miró el sol, que era muy amable. Y entonces el brote miró hacia abajo, hacia la tierra oscura y tibia donde había esperado tanto tiempo.\n\n\"Gracias,\" dijo el brote, muy suavemente. \"Pensé que no estaba haciendo nada. Pero me estuve preparando todo el tiempo.\"\n\nEl gusano, que justo pasaba arrastrándose por ahí, sonrió. El gusano no dijo nada. El gusano no tenía que decirlo.", "En lo profundo del jardín, donde la tierra olía a lluvia y a raíces viejas, una semilla pequeña había estado sentada en la oscuridad por lo que se sentía como un tiempo muy largo.\n\nLa tierra estaba tibia, lo cual era agradable. La tierra estaba en silencio, lo cual era casi siempre agradable. Pero la semilla empezaba a sentir que algo andaba mal.\n\nDesde arriba, la semilla podía oír al mundo haciendo cosas. Pájaros, llamando con canciones largas y onduladas. Lluvia, tamborileando cien ritmos diferentes sobre las hojas. El pat-pat-pat de los pies de los niños, corriendo a algún sitio rápido. Y de vez en cuando, el crujido lento y cuidadoso de una bota de adulto en el sendero.\n\nTodos allá arriba, parecía, sabían exactamente qué se suponía que tenían que estar haciendo.\n\nLa semilla no.\n\n\"Creo,\" susurró la semilla, sobre todo para sí misma, \"que estoy haciendo esto mal.\"\n\nPero ¿qué se suponía que tenía que estar haciendo la semilla? La semilla no lo sabía. Así que la semilla solo se quedó ahí, en la oscuridad tibia, y se sintió pequeña, y se preocupó.\n\nUna tarde — al menos, la semilla pensó que era la tarde; era difícil saberlo allá abajo — un gusano pasó arrastrándose.\n\n\"Oh,\" dijo el gusano, deteniéndose. \"Hola, semillita. Pareces infeliz.\"\n\n\"Creo que se supone que debería estar haciendo más,\" dijo la semilla. \"Todos los pájaros están volando a algún lado. Todas las hojas allá arriba están creciendo. Los niños están corriendo, los adultos están caminando, hasta tú estás arrastrándote, y mírame. Solo estoy sentada. No he hecho nada en días.\"\n\nEl gusano lo pensó. El gusano era, para los estándares de los gusanos, un gusano inusualmente pensativo.\n\n\"Sentarse,\" dijo el gusano, despacio, \"también es una forma de hacer. Solo que no se ve así desde afuera. Te estás preparando, ¿ves? Algunas cosas tardan mucho, mucho tiempo en estar listas. Eso no es nada. Eso es algo importante.\"\n\n\"¿Cuánto tiempo?\" preguntó la semilla.\n\n\"Eso depende,\" dijo el gusano. \"Es diferente para cada quien.\"\n\nLa semilla pensó que esa no era una respuesta muy útil. Pero el gusano parecía saber mucho sobre la tierra, y las raíces, y los lugares oscuros y tibios, así que la semilla decidió confiar en el gusano e intentarlo.\n\nLa semilla se quedó sentada durante tres noches frías, cuando la tierra se puso fría y quieta.\n\nLa semilla se quedó sentada durante una lluvia larga y gris, cuando el mundo de arriba sonaba apagado y lejano.\n\nLa semilla se quedó sentada durante una semana callada en la que, hasta donde la semilla podía decir, absolutamente nada pasó.\n\nY justo cuando la semilla casi había decidido que el gusano se había equivocado — que tal vez las semillas como esta simplemente nunca se preparaban, que tal vez se quedaría aquí para siempre, sola, en la oscuridad tibia —\n\n— algo se estiró.\n\nFue un estiramiento muy pequeño, al principio. Solo un pequeño movimiento, en algún lugar muy en el medio de la semilla. La clase de movimiento que casi no notas. Pero entonces el estiramiento empujó, y luego empujó más fuerte, y luego era una cosa verde, esperanzada, persistente que empujaba hacia arriba, y arriba, y arriba.\n\nHacia arriba a través de la tierra tibia. Hacia arriba a través de la tierra fresca. Hacia arriba a través de la oscuridad, la oscuridad, la oscuridad, y entonces:\n\nLuz.\n\nEl brote — porque la semilla era ahora un brote, aunque le tomaría un momento darse cuenta — parpadeó hacia la mañana más brillante, más azul y más tibia que jamás había visto.\n\nHabía tanto cielo. Había tanto sol. Había pájaros, que, como habían anunciado, hacían bastante vuelo. Había niños, en algún lugar no muy lejos, riéndose por algo. Había un viento que olía a hierba.\n\nEl brote miró todo eso, en silencio, durante mucho rato.\n\nY entonces, porque se sintió como lo correcto, el brote miró hacia abajo, hacia el pequeño agujero por el que había empujado para salir, hacia la tierra oscura y tibia donde había esperado lo que había sentido como una eternidad.\n\n\"Gracias,\" dijo el brote, muy suavemente, para que solo la tierra lo oyera. \"Pensé que no estaba haciendo nada. Pero me estuve preparando todo el tiempo.\"\n\nEl gusano, que, daba la casualidad, pasaba arrastrándose justo en ese momento, sonrió con la pequeña sonrisa satisfecha de alguien que ha tenido razón en algo importante.\n\nEl gusano no dijo nada.\n\nEl gusano no tenía que decirlo.\n\n*Algo en qué pensar: el brote no podía ver lo que estaba pasando bajo tierra. ¿Para qué te estás preparando tú ahora mismo, aunque no lo parezca desde afuera?*"],
      fr: ["Une petite graine était assise dans le noir.\n\nLa terre était chaude. La terre était silencieuse.\n\nLa graine pouvait entendre des choses là-haut. Des oiseaux. La pluie. De petits pieds qui couraient.\n\n\"Je devrais faire quelque chose,\" dit la graine. \"Tout le monde fait quelque chose.\"\n\nMais la graine ne savait pas quoi faire. Alors la graine resta simplement assise. Et attendit.\n\nUn ver passa en se tortillant. \"Bonjour, graine,\" dit le ver. \"Tu travailles ?\"\n\n\"Je suis assise,\" dit la graine. \"Je pense que je devrais faire plus.\"\n\nLe ver sourit. \"S'asseoir, c'est aussi faire,\" dit le ver. \"Tu te prépares.\"\n\nLa graine resta assise pendant de nombreux jours. La graine resta assise pendant des nuits froides. La graine resta assise pendant de longues pluies.\n\nEt puis, un matin, quelque chose s'étira.\n\nC'était la graine.\n\nUne minuscule feuille verte poussa vers le haut, le haut, le haut, vers la lumière.\n\nLa graine était maintenant une pousse. La pousse regarda en bas vers la terre sombre et chaude.\n\n\"Merci,\" dit la pousse. \"Je me préparais tout ce temps.\"", "Sous le jardin, là où la terre était sombre et chaude, une petite graine était assise très immobile.\n\nLà-haut, la graine pouvait entendre toutes sortes de choses occupées. Des oiseaux qui s'appelaient les uns les autres. La pluie qui tambourinait sur les feuilles. Les pieds des enfants qui couraient. Tout le monde, semblait-il, savait exactement quoi faire.\n\nLa graine se sentait petite.\n\n\"Je devrais faire quelque chose,\" murmura la graine. \"Tous les autres en font.\"\n\nMais la graine ne savait pas quoi faire. Alors la graine resta simplement assise dans l'obscurité chaude et silencieuse.\n\nUn après-midi, un ver passa en se tortillant.\n\n\"Bonjour, petite graine,\" dit le ver. \"Tu as l'air inquiète.\"\n\n\"Je pense que je devrais faire plus,\" dit la graine. \"Tous les oiseaux volent. Tous les enfants courent. Toutes les feuilles poussent. Mais moi, je reste juste assise ici.\"\n\nLe ver y réfléchit pendant une longue minute.\n\n\"S'asseoir,\" dit le ver, \"c'est aussi faire. Tu te prépares. Certaines choses prennent beaucoup de temps à être prêtes. Ce n'est pas rien. C'est quelque chose d'important.\"\n\nLa graine n'était pas sûre. Mais le ver semblait s'y connaître en terre, alors la graine décida de faire confiance au ver.\n\nLa graine resta assise pendant trois nuits froides. La graine resta assise pendant une longue pluie grise. La graine resta assise pendant une semaine calme et douce où rien ne se passa du tout.\n\nEt puis, un matin, quand le soleil descendit chaud et doré, la graine sentit quelque chose qu'elle n'avait jamais senti auparavant.\n\nUn étirement.\n\nUn minuscule étirement vert, poussant depuis le tout milieu de la graine. L'étirement poussa à travers la terre, à travers le frais, à travers le noir, et sortit dans l'air brillant, brillant.\n\nLa graine était maintenant une pousse.\n\nLa pousse regarda le ciel, qui était très bleu. La pousse regarda le soleil, qui était très gentil. Et puis la pousse regarda en bas vers la terre sombre et chaude où elle avait attendu si longtemps.\n\n\"Merci,\" dit la pousse, très doucement. \"Je pensais que je ne faisais rien. Mais je me préparais tout ce temps.\"\n\nLe ver, qui passait justement en se tortillant, sourit. Le ver ne dit rien. Le ver n'avait pas besoin.", "Sous le jardin, là où la terre sentait la pluie et les vieilles racines, une petite graine était assise dans le noir depuis ce qui semblait être un très long temps.\n\nLa terre était chaude, ce qui était agréable. La terre était silencieuse, ce qui était surtout agréable. Mais la graine commençait à sentir que quelque chose n'allait pas.\n\nD'en haut, la graine pouvait entendre le monde faire des choses. Des oiseaux, qui appelaient en de longs chants ondulants. La pluie, qui tambourinait cent rythmes différents sur les feuilles. Le pat-pat-pat des pieds d'enfants, qui couraient quelque part rapidement. Et de temps en temps, le craquement lent et soigneux de la botte d'un adulte sur le sentier.\n\nTout le monde là-haut, semblait-il, savait exactement ce qu'il était censé faire.\n\nLa graine, non.\n\n\"Je pense,\" murmura la graine, surtout à elle-même, \"que je m'y prends mal.\"\n\nMais qu'était-ce que la graine était censée faire ? La graine ne savait pas. Alors la graine resta simplement là, dans le noir chaud, et se sentit petite, et s'inquiéta.\n\nUn après-midi — du moins, la graine pensa que c'était l'après-midi ; c'était dur à dire là en bas — un ver passa en se tortillant.\n\n\"Oh,\" dit le ver, en s'arrêtant. \"Bonjour, petite graine. Tu as l'air malheureuse.\"\n\n\"Je pense que je suis censée faire plus,\" dit la graine. \"Tous les oiseaux volent quelque part. Toutes les feuilles là-haut poussent. Les enfants courent, les adultes marchent, même toi tu te tortilles — et regarde-moi. Je suis juste assise. Je n'ai rien fait depuis des jours.\"\n\nLe ver y réfléchit. Le ver était, selon les standards des vers, un ver inhabituellement réfléchi.\n\n\"S'asseoir,\" dit le ver, lentement, \"c'est aussi une sorte de faire. Ça ne ressemble juste pas à ça de l'extérieur. Tu te prépares, tu vois. Certaines choses prennent un très, très long temps à être prêtes. Ce n'est pas rien. C'est quelque chose d'important.\"\n\n\"Combien de temps ?\" demanda la graine.\n\n\"Ça dépend,\" dit le ver. \"C'est différent pour chacun.\"\n\nLa graine pensa que ce n'était pas une réponse très utile. Mais le ver semblait en savoir beaucoup sur la terre, et les racines, et les endroits sombres et chauds, alors la graine décida de faire confiance au ver et d'essayer.\n\nLa graine resta assise pendant trois nuits froides, quand la terre devint fraîche et immobile.\n\nLa graine resta assise pendant une longue pluie grise, quand le monde au-dessus sonnait étouffé et lointain.\n\nLa graine resta assise pendant une semaine silencieuse pendant laquelle, pour autant que la graine puisse dire, absolument rien ne se passa.\n\nEt juste au moment où la graine avait presque décidé que le ver s'était trompé — que peut-être les graines comme celle-ci n'étaient simplement jamais prêtes, qu'elle resterait peut-être ici pour toujours, seule, dans le noir chaud —\n\n— quelque chose s'étira.\n\nC'était un tout petit étirement, au début. Juste un petit mouvement, quelque part au plus profond du milieu de la graine. Le genre de mouvement que tu ne remarques presque pas. Mais ensuite l'étirement poussa, et puis il poussa plus fort, et puis c'était une chose verte, pleine d'espoir, persévérante qui poussait vers le haut, et le haut, et le haut.\n\nVers le haut à travers la terre chaude. Vers le haut à travers la terre fraîche. Vers le haut à travers le noir, le noir, le noir — et puis —\n\nLa lumière.\n\nLa pousse — car la graine était maintenant une pousse, bien qu'il lui faudrait un moment pour le réaliser — cligna des yeux dans le matin le plus brillant, le plus bleu, le plus chaud qu'elle ait jamais vu.\n\nIl y avait tellement de ciel. Il y avait tellement de soleil. Il y avait des oiseaux, qui, comme annoncé, faisaient beaucoup de vol. Il y avait des enfants, quelque part pas trop loin, qui riaient à propos de quelque chose. Il y avait un vent qui sentait l'herbe.\n\nLa pousse regarda tout cela, en silence, pendant un long moment.\n\nEt puis, parce que cela semblait être la bonne chose à faire, la pousse regarda en bas — vers le petit trou par lequel elle avait poussé pour sortir, vers la terre sombre et chaude où elle avait attendu ce qui avait semblé être une éternité.\n\n\"Merci,\" dit la pousse, très doucement, pour que seule la terre l'entende. \"Je pensais que je ne faisais rien. Mais je me préparais tout ce temps.\"\n\nLe ver, qui, comme par hasard, passait en se tortillant à ce moment précis, sourit du petit sourire satisfait de quelqu'un qui a eu raison sur quelque chose d'important.\n\nLe ver ne dit rien.\n\nLe ver n'avait pas besoin.\n\n*Quelque chose à quoi penser : la pousse ne pouvait pas voir ce qui se passait sous terre. Pour quoi te prépares-tu en ce moment, même si ça n'en a pas l'air de l'extérieur ?*"]
    }

    levels: {
      en: ["Pip was a small mouse. Pip lived in a field.\n\nOne morning, Pip heard a tiny voice.\n\n\"I am lost,\" said the voice.\n\nPip looked up. There was a small white cloud, very close to the ground.\n\n\"Are you a cloud?\" said Pip.\n\n\"Yes,\" said the cloud. \"I came down to look at a flower. Now I cannot find the sky again.\"\n\nPip thought. \"Clouds go up,\" said Pip. \"The sky is up.\"\n\n\"I cannot remember how to go up,\" said the cloud, very small.\n\nPip climbed to the top of a tall, tall grass. Pip pointed up.\n\n\"There!\" said Pip. \"The sky is there. With the other clouds.\"\n\nThe cloud looked up. The cloud saw the other clouds, far away, drifting.\n\nThe cloud took a soft, slow breath. And then — up the cloud went. Slowly at first. Then faster.\n\nThe cloud waved goodbye to Pip.\n\nPip waved back.\n\n\"Goodbye, little cloud,\" said Pip. \"Welcome home.\"", "Pip was a small field mouse who lived between a row of barley and an old stone wall.\n\nOne quiet morning, while Pip was nibbling on a piece of clover, Pip heard a very tiny, very sad voice.\n\n\"I am lost,\" said the voice. \"I do not know how to get home.\"\n\nPip looked up.\n\nThere, just above the tops of the tallest grasses, was a small, soft, white cloud. The cloud was bumping gently into a thistle, the way a balloon bumps into a ceiling.\n\n\"Excuse me,\" said Pip. \"Are you a cloud?\"\n\n\"Yes,\" said the cloud, sniffing. \"I came down a little bit, just to look at a poppy. The poppy was so red. I had never seen anything so red before. But now I cannot find the way back to the sky. And I am scared.\"\n\nPip thought about this.\n\n\"Clouds belong up high,\" Pip said. \"The sky is up.\"\n\n\"I know,\" said the cloud, very small. \"But I cannot remember how to go up. I keep going sideways. Or down. I just want to be home.\"\n\nPip looked around. Pip looked at the grass, and the wall, and the wide, blue sky above them both.\n\nThen Pip had an idea.\n\nPip climbed, very carefully, to the very top of the very tallest stalk of grass. From up there, Pip could see far, far across the field. And Pip could see — high above — three or four other clouds, drifting along in a slow line.\n\nPip pointed with one small paw.\n\n\"There,\" Pip said. \"There is your family. They are going that way.\"\n\nThe cloud looked. The cloud looked for a long moment.\n\nAnd then the cloud saw them — the other clouds — moving softly across the blue.\n\nThe cloud took a slow, soft breath.\n\nAnd, very gently, the cloud began to lift. Just a little at first. Like a piece of dandelion fluff catching the wind.\n\nThen a little more.\n\nThen — slowly, slowly — up, up, up, all the way back into the bright blue sky.\n\nThe cloud waved a soft, white wave at Pip.\n\nPip stood on top of the tall grass and waved back, both small paws above his head.\n\n\"Goodbye, little cloud,\" Pip called. \"Welcome home.\"\n\nThe cloud joined the others, and they drifted slowly out of sight.\n\nPip climbed back down to his clover.\n\nIt was, Pip thought, a very good morning.", "Pip lived in the long grass between a barley field and an old stone wall. Pip was a small field mouse with a slightly chipped front tooth and a very serious face. Pip's days were mostly the same: collect seeds, listen for owls, take a nap in the warm part of the afternoon.\n\nUntil the morning Pip met the cloud.\n\nIt was just after sunrise. The dew was still hanging on every blade of grass like a tiny lamp. Pip was halfway through breakfast — a particularly excellent piece of clover — when Pip heard a small voice.\n\n\"I am lost,\" said the voice. \"I do not know how to get home.\"\n\nPip stopped chewing.\n\nPip looked up. And there, bumping gently into a thistle and looking very embarrassed about it, was a small, soft, perfectly round white cloud.\n\n\"Hello,\" said Pip, cautiously. \"You are a cloud.\"\n\n\"Yes,\" said the cloud, in a voice that sounded a bit watery.\n\n\"You are very close to the ground,\" said Pip.\n\n\"I know,\" said the cloud. \"I came down to look at a poppy. The poppy was so red. I had never seen anything so red in my entire life. I only meant to look for a moment.\" The cloud sniffled. \"But now I do not know how to get back. I keep drifting sideways. Once I drifted into the wall. It was very firm.\"\n\nPip considered the cloud. The cloud was, Pip thought, about half the size of a regular mouse-hole. It was the gentlest thing Pip had ever seen up close.\n\n\"Clouds belong up there,\" Pip said. \"The sky is up.\"\n\n\"I know,\" said the cloud, in a very small voice. \"But I have forgotten how to go up. Every time I try, I go the wrong way. I just want to be home with my family.\"\n\nThis, Pip understood. Pip had once been turned around in a very thick stand of barley and had spent the better part of an afternoon walking the wrong direction, certain the whole time that the burrow had moved.\n\nPip looked around. Pip thought.\n\nThen Pip had what felt like a very good idea.\n\n\"Come on,\" Pip said. \"Follow me. But not too close — I think the thistles might be a problem for you.\"\n\nPip climbed. Pip climbed up the wall, where the moss was thick and easy to grip. Pip climbed up the longest stalk of grass at the edge of the wall — the one that swayed when the smallest breeze went by. Higher and higher, until the wind was crisp and the field looked like a green carpet stretching out in every direction.\n\nThe cloud followed, drifting awkwardly, bumping into the stalk twice.\n\nFrom the very top, Pip pointed.\n\n\"Look,\" Pip said. \"Out there. Do you see them?\"\n\nThe cloud looked.\n\nFar, far up — much higher than where they were now, but in the same direction — there was a long, soft, lazy line of clouds, moving slowly across the morning sky. Some were big. Some were small. They were all going somewhere together.\n\nThe cloud said nothing for a long moment.\n\nThen the cloud said, very quietly, \"That's them.\"\n\n\"That's them,\" Pip agreed.\n\nThe cloud took a slow, soft breath.\n\nAnd, very gently — like a piece of dandelion fluff that has just made up its mind — the cloud began to lift.\n\nFirst, just a little. Then a little more. Then more.\n\nUp past the grass. Up past the wall. Up past the highest branch of the old willow. Up, and up, and up, until the cloud was just a small, soft, white circle against the blue, drifting toward the line of others.\n\nThe cloud paused, just before catching up.\n\nAnd then the cloud waved.\n\nIt was a small wave — just a little curl at the edge of the cloud — but Pip saw it.\n\nPip stood on top of the very tallest stalk of grass and waved back with both paws.\n\n\"Goodbye, little cloud,\" Pip called, even though the cloud was much too far away to hear. \"Welcome home.\"\n\nThe cloud slipped quietly into the line of others, and together they drifted away over the barley, toward wherever it is that clouds go in the morning.\n\nPip climbed down, slowly, the way mice do.\n\nWhen Pip got back to the clover, the clover was still there, slightly less impressive now. Pip ate it anyway. It tasted, somehow, like a very good morning.\n\nLater, when the sun was high and the field smelled like warm grass, Pip sat in the doorway of his burrow and watched the clouds.\n\nThere were a lot of them up there. Pip could not tell which was which.\n\nBut Pip thought — and Pip was almost sure of this — that one of them was waving.\n\n*Something to think about: Pip didn't fix the cloud. Pip just helped the cloud see the way home. When has someone helped you see the way back to something?*"],
      hi: ["पिप एक छोटा चूहा था. पिप एक खेत में रहता था.\n\nएक सुबह, पिप ने एक नन्ही आवाज़ सुनी.\n\n\"मैं खो गया हूँ,\" आवाज़ ने कहा.\n\nपिप ने ऊपर देखा. वहाँ एक छोटा सफ़ेद बादल था, ज़मीन के बहुत पास.\n\n\"क्या तुम बादल हो?\" पिप ने कहा.\n\n\"हाँ,\" बादल ने कहा. \"मैं एक फूल देखने के लिए नीचे आया था. अब मुझे आसमान वापस नहीं मिल रहा.\"\n\nपिप ने सोचा. \"बादल ऊपर जाते हैं,\" पिप ने कहा. \"आसमान ऊपर है.\"\n\n\"मुझे याद नहीं कि ऊपर कैसे जाएँ,\" बादल ने बहुत धीरे कहा.\n\nपिप एक लंबी, बहुत लंबी घास के ऊपर चढ़ गया. पिप ने ऊपर इशारा किया.\n\n\"वहाँ!\" पिप ने कहा. \"आसमान वहाँ है. दूसरे बादलों के साथ.\"\n\nबादल ने ऊपर देखा. बादल ने दूसरे बादलों को देखा, दूर, बहते हुए.\n\nबादल ने एक नरम, धीमी साँस ली. और फिर बादल ऊपर चला गया. पहले धीरे. फिर तेज़.\n\nबादल ने पिप को अलविदा कहा.\n\nपिप ने भी हाथ हिलाया.\n\n\"अलविदा, नन्हे बादल,\" पिप ने कहा. \"घर आने पर स्वागत है.\"", "पिप एक छोटा खेत-चूहा था जो जौ की एक पंक्ति और एक पुरानी पत्थर की दीवार के बीच रहता था.\n\nएक शांत सुबह, जब पिप तिपतिया घास का एक टुकड़ा कुतर रहा था, पिप ने एक बहुत नन्ही, बहुत उदास आवाज़ सुनी.\n\n\"मैं खो गया हूँ,\" आवाज़ ने कहा. \"मुझे नहीं पता कैसे घर जाऊँ.\"\n\nपिप ने ऊपर देखा.\n\nवहाँ, सबसे लंबी घास की चोटियों के ठीक ऊपर, एक छोटा, नरम, सफ़ेद बादल था. बादल धीरे से एक कँटीले पौधे से टकरा रहा था, जैसे गुब्बारा छत से टकराता है.\n\n\"माफ़ करना,\" पिप ने कहा. \"क्या तुम बादल हो?\"\n\n\"हाँ,\" बादल ने सिसकते हुए कहा. \"मैं थोड़ा नीचे आया था, बस एक पॉपी का फूल देखने के लिए. पॉपी इतना लाल था. मैंने इससे पहले कुछ इतना लाल कभी नहीं देखा था. लेकिन अब मुझे आसमान का रास्ता नहीं मिल रहा. और मुझे डर लग रहा है.\"\n\nपिप ने इस बारे में सोचा.\n\n\"बादल ऊँचाई पर रहते हैं,\" पिप ने कहा. \"आसमान ऊपर है.\"\n\n\"मुझे पता है,\" बादल ने बहुत धीरे कहा. \"लेकिन मुझे याद नहीं कि ऊपर कैसे जाएँ. मैं बस अगल-बगल जाता रहता हूँ. या नीचे. मैं बस घर जाना चाहता हूँ.\"\n\nपिप ने इधर-उधर देखा. पिप ने घास को देखा, दीवार को देखा, और उन दोनों के ऊपर फैले विशाल नीले आसमान को देखा.\n\nफिर पिप के मन में एक विचार आया.\n\nपिप बहुत सावधानी से, सबसे लंबी घास के सबसे ऊपरी सिरे तक चढ़ गया. वहाँ से, पिप दूर, बहुत दूर तक खेत को देख सकता था. और पिप देख सकता था बहुत ऊपर तीन या चार और बादल, धीमी कतार में बहते हुए.\n\nपिप ने अपने एक छोटे पंजे से इशारा किया.\n\n\"वहाँ,\" पिप ने कहा. \"वहाँ तुम्हारा परिवार है. वे उस तरफ जा रहे हैं.\"\n\nबादल ने देखा. बादल ने एक लंबी देर तक देखा.\n\nऔर फिर बादल ने उन्हें देखा बाक़ी बादलों को नीले आसमान में धीरे से बहते हुए.\n\nबादल ने एक धीमी, नरम साँस ली.\n\nऔर, बहुत कोमलता से, बादल ऊपर उठने लगा. पहले बस थोड़ा सा. जैसे डंडलायन का एक टुकड़ा हवा पकड़ रहा हो.\n\nफिर थोड़ा और.\n\nफिर धीरे, धीरे ऊपर, ऊपर, ऊपर, सीधे चमकीले नीले आसमान में वापस.\n\nबादल ने पिप को एक नरम, सफ़ेद अलविदा का इशारा किया.\n\nपिप लंबी घास के ऊपर खड़ा था और उसने दोनों छोटे पंजे सिर के ऊपर उठाकर जवाब दिया.\n\n\"अलविदा, नन्हे बादल,\" पिप ने पुकारा. \"घर आने पर स्वागत है.\"\n\nबादल बाक़ी बादलों से जा मिला, और वे धीरे-धीरे आँखों से ओझल हो गए.\n\nपिप वापस अपनी तिपतिया घास तक नीचे आ गया.\n\nयह, पिप ने सोचा, एक बहुत अच्छी सुबह थी.", "पिप जौ के एक खेत और एक पुरानी पत्थर की दीवार के बीच की लंबी घास में रहता था. पिप एक छोटा खेत-चूहा था जिसका एक सामने का दाँत थोड़ा टूटा हुआ था और चेहरा बहुत गंभीर रहता था. पिप के दिन ज़्यादातर एक जैसे होते थे: बीज इकट्ठा करना, उल्लुओं की आहट सुनना, दोपहर के गरम हिस्से में झपकी लेना.\n\nजब तक उस सुबह पिप बादल से नहीं मिला.\n\nसूरज निकलने के थोड़ी देर बाद की बात थी. ओस अभी भी घास की हर पत्ती पर एक नन्हे दीये की तरह लटकी हुई थी. पिप नाश्ता आधा कर चुका था एक ख़ास तौर पर शानदार तिपतिया घास का टुकड़ा जब पिप ने एक छोटी आवाज़ सुनी.\n\n\"मैं खो गया हूँ,\" आवाज़ ने कहा. \"मुझे नहीं पता कैसे घर जाऊँ.\"\n\nपिप चबाना भूल गया.\n\nपिप ने ऊपर देखा. और वहाँ, धीरे से एक कँटीले पौधे से टकराता हुआ और इस बात पर बहुत शर्मिंदा दिखता हुआ, एक छोटा, नरम, बिल्कुल गोल सफ़ेद बादल था.\n\n\"नमस्ते,\" पिप ने सावधानी से कहा. \"तुम एक बादल हो.\"\n\n\"हाँ,\" बादल ने कहा, एक थोड़ी पनीली आवाज़ में.\n\n\"तुम ज़मीन के बहुत पास हो,\" पिप ने कहा.\n\n\"मुझे पता है,\" बादल ने कहा. \"मैं एक पॉपी का फूल देखने नीचे आया था. पॉपी इतना लाल था. मैंने अपनी पूरी ज़िंदगी में कुछ इतना लाल नहीं देखा. मैं बस एक पल के लिए देखना चाहता था.\" बादल ने सिसकी ली. \"लेकिन अब मुझे नहीं पता कैसे वापस जाऊँ. मैं बस अगल-बगल बहता रहता हूँ. एक बार मैं दीवार से जा टकराया. वो बहुत सख़्त थी.\"\n\nपिप ने बादल पर ध्यान दिया. बादल, पिप ने सोचा, एक आम चूहे के बिल का लगभग आधा था. यह सबसे कोमल चीज़ थी जो पिप ने इतने पास से कभी देखी हो.\n\n\"बादल ऊपर रहते हैं,\" पिप ने कहा. \"आसमान ऊपर है.\"\n\n\"मुझे पता है,\" बादल ने बहुत धीमी आवाज़ में कहा. \"लेकिन मैं भूल गया हूँ कि ऊपर कैसे जाएँ. हर बार जब मैं कोशिश करता हूँ, मैं ग़लत दिशा में चला जाता हूँ. मैं बस अपने परिवार के साथ घर पर होना चाहता हूँ.\"\n\nयह पिप समझता था. पिप भी एक बार जौ के बहुत घने झुरमुट में दिशा भूल गया था और दोपहर का अधिकांश हिस्सा ग़लत दिशा में चलते हुए बिताया था, यह पूरी तरह यक़ीन करते हुए कि बिल अपनी जगह से हट गया है.\n\nपिप ने इधर-उधर देखा. पिप ने सोचा.\n\nफिर पिप के मन में जो लगा एक बहुत अच्छा विचार आया.\n\n\"चलो,\" पिप ने कहा. \"मेरे पीछे आओ. लेकिन ज़्यादा पास नहीं मुझे लगता है कँटीले पौधे तुम्हारे लिए मुश्किल हो सकते हैं.\"\n\nपिप चढ़ा. पिप दीवार पर चढ़ा, जहाँ काई मोटी थी और पकड़ने में आसान. पिप दीवार के किनारे की सबसे लंबी घास के डंठल पर चढ़ा वो जो सबसे हल्की हवा से भी झूलती थी. ऊँचे और ऊँचे, जब तक हवा ताज़ी न हो गई और खेत हर दिशा में फैले हरे गलीचे जैसा न दिखने लगा.\n\nबादल पीछे आया, अटपटे ढंग से बहता हुआ, डंठल से दो बार टकराता हुआ.\n\nबिल्कुल चोटी से, पिप ने इशारा किया.\n\n\"देखो,\" पिप ने कहा. \"वहाँ बाहर. क्या तुम उन्हें देख रहे हो?\"\n\nबादल ने देखा.\n\nदूर, बहुत दूर ऊपर वे जहाँ अभी थे उससे कहीं ज़्यादा ऊँचा, लेकिन उसी दिशा में बादलों की एक लंबी, नरम, सुस्त कतार थी, सुबह के आसमान में धीरे-धीरे बह रही थी. कुछ बड़े थे. कुछ छोटे. वे सब एक साथ कहीं जा रहे थे.\n\nबादल एक लंबी देर तक कुछ नहीं बोला.\n\nफिर बादल ने बहुत धीरे कहा, \"वो हैं वो.\"\n\n\"वो हैं वो,\" पिप ने मान लिया.\n\nबादल ने एक धीमी, नरम साँस ली.\n\nऔर, बहुत कोमलता से जैसे डंडलायन के फूल का एक टुकड़ा अभी-अभी अपना मन बना चुका हो बादल उठने लगा.\n\nपहले, बस थोड़ा सा. फिर थोड़ा और. फिर और भी.\n\nघास के पार ऊपर. दीवार के पार ऊपर. पुराने विलो की सबसे ऊँची शाखा के पार ऊपर. ऊपर, और ऊपर, और ऊपर, जब तक बादल नीले के सामने एक छोटा, नरम, सफ़ेद गोला न रह गया, बाक़ी की कतार की तरफ बहता हुआ.\n\nबादल ठीक मिलने से पहले रुका.\n\nऔर फिर बादल ने हाथ हिलाया.\n\nयह एक छोटा सा इशारा था बादल के किनारे पर बस एक नन्ही मरोड़ लेकिन पिप ने उसे देख लिया.\n\nपिप सबसे लंबी घास के डंठल के ऊपर खड़ा था और उसने दोनों पंजों से जवाब दिया.\n\n\"अलविदा, नन्हे बादल,\" पिप ने पुकारा, हालाँकि बादल सुनने के लिए बहुत दूर था. \"घर आने पर स्वागत है.\"\n\nबादल चुपचाप बाक़ी कतार में जा मिला, और वे साथ-साथ जौ के खेत के ऊपर से बहते हुए वहाँ चले गए जहाँ भी बादल सुबह में जाते हैं.\n\nपिप नीचे उतरा, धीरे-धीरे, जैसे चूहे उतरते हैं.\n\nजब पिप वापस तिपतिया घास तक पहुँचा, तिपतिया वहीं थी, अब थोड़ी कम प्रभावशाली. पिप ने फिर भी उसे खाया. वह, किसी तरह, एक बहुत अच्छी सुबह जैसा स्वाद देती थी.\n\nबाद में, जब सूरज ऊँचा था और खेत से गरम घास की महक आ रही थी, पिप अपने बिल के दरवाज़े पर बैठा बादलों को देखने लगा.\n\nऊपर बहुत सारे थे. पिप नहीं बता सकता था कौन-सा कौन-सा है.\n\nलेकिन पिप ने सोचा और पिप को इसका लगभग पूरा यक़ीन था कि उनमें से एक हाथ हिला रहा था.\n\n*सोचने के लिए कुछ: पिप ने बादल को ठीक नहीं किया. पिप ने बस बादल को घर का रास्ता देखने में मदद की. कब किसी ने तुम्हें किसी चीज़ का रास्ता वापस देखने में मदद की है?*"],
      gu: ["પિપ એક નાનો ઉંદર હતો. પિપ એક ખેતરમાં રહેતો હતો.\n\nએક સવારે, પિપ એ એક નાનો અવાજ સાંભળ્યો.\n\n\"હું ખોવાઈ ગયો છું,\" અવાજે કહ્યું.\n\nપિપ એ ઉપર જોયું. ત્યાં એક નાનું સફેદ વાદળ હતું, જમીનની ખૂબ નજીક.\n\n\"શું તું વાદળ છે?\" પિપ એ કહ્યું.\n\n\"હા,\" વાદળે કહ્યું. \"હું એક ફૂલ જોવા નીચે આવ્યું હતું. હવે મને આકાશ પાછું મળતું નથી.\"\n\nપિપ એ વિચાર્યું. \"વાદળો ઉપર જાય છે,\" પિપ એ કહ્યું. \"આકાશ ઉપર છે.\"\n\n\"મને યાદ નથી કે ઉપર કેવી રીતે જવું,\" વાદળે ખૂબ ધીમેથી કહ્યું.\n\nપિપ એક ઊંચા, ખૂબ ઊંચા ઘાસની ટોચ પર ચઢ્યો. પિપ એ ઉપર ઈશારો કર્યો.\n\n\"ત્યાં!\" પિપ એ કહ્યું. \"આકાશ ત્યાં છે. બીજાં વાદળો સાથે.\"\n\nવાદળે ઉપર જોયું. વાદળે બીજાં વાદળોને જોયાં, દૂર, વહેતાં.\n\nવાદળે એક નરમ, ધીમો શ્વાસ લીધો. અને પછી વાદળ ઉપર ચાલ્યું ગયું. પહેલાં ધીમે. પછી ઝડપથી.\n\nવાદળે પિપ ને હાથ હલાવી અલવિદા કહ્યું.\n\nપિપ એ પણ હાથ હલાવ્યો.\n\n\"અલવિદા, નાના વાદળ,\" પિપ એ કહ્યું. \"ઘરમાં સ્વાગત છે.\"", "પિપ એક નાનો ખેત-ઉંદર હતો જે જવની એક હાર અને એક જૂની પથ્થરની દીવાલની વચ્ચે રહેતો હતો.\n\nએક શાંત સવારે, જ્યારે પિપ ક્લોવરનો એક ટુકડો કરડી રહ્યો હતો, પિપ એ એક ખૂબ નાનો, ખૂબ ઉદાસ અવાજ સાંભળ્યો.\n\n\"હું ખોવાઈ ગયો છું,\" અવાજે કહ્યું. \"મને ખબર નથી કે ઘરે કેવી રીતે જવું.\"\n\nપિપ એ ઉપર જોયું.\n\nત્યાં, સૌથી ઊંચા ઘાસની ટોચોની ઉપર જ, એક નાનું, નરમ, સફેદ વાદળ હતું. વાદળ ધીમેથી એક કાંટાળા છોડ સાથે અથડાઈ રહ્યું હતું, જેમ ફુગ્ગો છત સાથે અથડાય.\n\n\"માફ કરજે,\" પિપ એ કહ્યું. \"શું તું વાદળ છે?\"\n\n\"હા,\" વાદળે સૂંઘતાં કહ્યું. \"હું થોડું નીચે આવ્યું હતું, ફક્ત એક પોપીને જોવા. પોપી એટલું લાલ હતું. મેં આ પહેલાં ક્યારેય આટલું લાલ કંઈ જોયું ન હતું. પણ હવે મને આકાશનો રસ્તો મળતો નથી. અને મને ડર લાગે છે.\"\n\nપિપ એ આ વિશે વિચાર્યું.\n\n\"વાદળો ઊંચે હોય છે,\" પિપ એ કહ્યું. \"આકાશ ઉપર છે.\"\n\n\"મને ખબર છે,\" વાદળે ખૂબ ધીમેથી કહ્યું. \"પણ મને યાદ નથી કે ઉપર કેવી રીતે જવું. હું ફક્ત આડું જતું રહું છું. અથવા નીચે. હું બસ ઘરે જવા માગું છું.\"\n\nપિપ એ આસપાસ જોયું. પિપ એ ઘાસ, દીવાલ, અને તેમની ઉપર ફેલાયેલા વિશાળ વાદળી આકાશને જોયું.\n\nપછી પિપ ને એક વિચાર આવ્યો.\n\nપિપ ખૂબ સાવધાનીથી, સૌથી ઊંચા ઘાસના સૌથી ઊંચા ભાગ સુધી ચઢ્યો. ત્યાંથી, પિપ ખેતરમાં દૂર, દૂર સુધી જોઈ શકતો હતો. અને પિપ જોઈ શકતો હતો ઊંચે ત્રણ કે ચાર બીજાં વાદળો, ધીમી હારમાં વહેતાં.\n\nપિપ એ એક નાનું પંજો બતાવ્યો.\n\n\"ત્યાં,\" પિપ એ કહ્યું. \"ત્યાં તારું પરિવાર છે. તેઓ એ બાજુ જઈ રહ્યાં છે.\"\n\nવાદળે જોયું. વાદળે લાંબા સમય સુધી જોયું.\n\nઅને પછી વાદળે તેમને જોયાં બીજાં વાદળોને વાદળી આકાશમાં ધીરેથી જતાં.\n\nવાદળે એક ધીમો, નરમ શ્વાસ લીધો.\n\nઅને, ખૂબ કોમળતાથી, વાદળ ઉપર ઊઠવા લાગ્યું. પહેલાં બસ થોડું. જેમ ડેન્ડેલિયનનો ટુકડો પવન પકડે.\n\nપછી થોડું વધારે.\n\nપછી ધીમે, ધીમે ઉપર, ઉપર, ઉપર, સીધો ચમકતા વાદળી આકાશમાં પાછું.\n\nવાદળે પિપ તરફ એક નરમ, સફેદ હાથ હલાવ્યો.\n\nપિપ ઊંચા ઘાસની ટોચ પર ઊભો રહ્યો અને બંને નાના પંજા માથા ઉપર ઊંચા કરીને જવાબ આપ્યો.\n\n\"અલવિદા, નાના વાદળ,\" પિપ એ બૂમ પાડી. \"ઘરમાં સ્વાગત છે.\"\n\nવાદળ બાકીનાં વાદળોમાં જઈ મળ્યું, અને તેઓ ધીમે ધીમે નજરથી દૂર થઈ ગયાં.\n\nપિપ પોતાના ક્લોવર પાસે પાછો ઊતર્યો.\n\nએ, પિપ એ વિચાર્યું, એક ખૂબ સારી સવાર હતી.", "પિપ જવના ખેતર અને એક જૂની પથ્થરની દીવાલની વચ્ચે લાંબા ઘાસમાં રહેતો હતો. પિપ એક નાનો ખેત-ઉંદર હતો જેનો આગળનો એક દાંત થોડો તૂટેલો હતો અને ચહેરો ખૂબ ગંભીર રહેતો. પિપ ના દિવસો મોટેભાગે એક જેવા હતા: બીજ ભેગાં કરવાં, ઘુવડોની આહટ સાંભળવી, બપોરના ગરમ ભાગમાં ઊંઘ લેવી.\n\nજ્યાં સુધી તે સવારે પિપ વાદળને ન મળ્યો.\n\nસૂર્યોદય પછી થોડી વાર પછીની વાત હતી. ઘાસના દરેક પાન પર ઝાકળ હજુ એક નાના દીવાની જેમ લટકતી હતી. પિપ નાસ્તો અડધો કરી ચૂક્યો હતો ખાસ સારો ક્લોવરનો ટુકડો ત્યારે પિપ એ એક નાનો અવાજ સાંભળ્યો.\n\n\"હું ખોવાઈ ગયો છું,\" અવાજે કહ્યું. \"મને ખબર નથી કે ઘરે કેવી રીતે જવું.\"\n\nપિપ ચાવવાનું બંધ કરી દીધું.\n\nપિપ એ ઉપર જોયું. અને ત્યાં, ધીરેથી એક કાંટાળા છોડ સાથે અથડાતું અને એ વાતે ખૂબ શરમાઈને દેખાતું, એક નાનું, નરમ, એકદમ ગોળ સફેદ વાદળ હતું.\n\n\"નમસ્તે,\" પિપ એ સાવધાનીથી કહ્યું. \"તું વાદળ છે.\"\n\n\"હા,\" વાદળે કહ્યું, થોડા પાણીદાર અવાજે.\n\n\"તું જમીનની ખૂબ નજીક છે,\" પિપ એ કહ્યું.\n\n\"મને ખબર છે,\" વાદળે કહ્યું. \"હું એક પોપીને જોવા નીચે આવ્યું હતું. પોપી એટલું લાલ હતું. મેં મારા આખા જીવનમાં આટલું લાલ કંઈ જોયું ન હતું. મારે ફક્ત એક ક્ષણ માટે જોવું હતું.\" વાદળે સૂંઘ્યું. \"પણ હવે મને ખબર નથી કે પાછું કેવી રીતે જવું. હું ફક્ત આડું વહેતું જાઉં છું. એક વાર હું દીવાલમાં અથડાઈ ગયું. એ ખૂબ મજબૂત હતી.\"\n\nપિપ એ વાદળ પર ધ્યાન આપ્યું. વાદળ, પિપ એ વિચાર્યું, એક સામાન્ય ઉંદર-દરની લગભગ અડધી હતી. તે સૌથી કોમળ વસ્તુ હતી જે પિપ એ આટલી નજીકથી ક્યારેય જોઈ હતી.\n\n\"વાદળો ત્યાં ઉપર હોય છે,\" પિપ એ કહ્યું. \"આકાશ ઉપર છે.\"\n\n\"મને ખબર છે,\" વાદળે ખૂબ નાના અવાજે કહ્યું. \"પણ હું ભૂલી ગયું છું કે ઉપર કેવી રીતે જવું. દર વખતે જ્યારે હું પ્રયત્ન કરું છું, હું ખોટી દિશામાં જાઉં છું. હું બસ મારા પરિવાર સાથે ઘરે રહેવા માગું છું.\"\n\nએ પિપ સમજતો હતો. પિપ એક વાર જવના ખૂબ ઘેરા ઝુંડમાં દિશા ભૂલી ગયો હતો અને બપોરનો મોટો ભાગ ખોટી દિશામાં ચાલવામાં વિતાવ્યો હતો, એમ માનીને કે દર ખસી ગયું છે.\n\nપિપ એ આસપાસ જોયું. પિપ એ વિચાર્યું.\n\nપછી પિપ ને જે લાગ્યું એક ખૂબ સારો વિચાર આવ્યો.\n\n\"ચાલ,\" પિપ એ કહ્યું. \"મારી પાછળ આવ. પણ ખૂબ નજીક નહીં મને લાગે છે કાંટાળા છોડ તારા માટે મુશ્કેલી હોઈ શકે છે.\"\n\nપિપ ચઢ્યો. પિપ દીવાલ પર ચઢ્યો, જ્યાં શેવાળ જાડું હતું અને પકડવામાં સહેલું. પિપ દીવાલની કિનારે સૌથી લાંબા ઘાસના દાંડા પર ચઢ્યો જે સૌથી નાની હવામાં પણ ઝૂલતો. ઊંચે અને ઊંચે, જ્યાં સુધી હવા તાજી ન થઈ ગઈ અને ખેતર દરેક દિશામાં ફેલાયેલા લીલા ગાલીચા જેવું ન દેખાવા લાગ્યું.\n\nવાદળ પાછળ આવ્યું, અટપટું વહેતું, દાંડા સાથે બે વાર અથડાતું.\n\nએકદમ ટોચ પરથી, પિપ એ ઈશારો કર્યો.\n\n\"જો,\" પિપ એ કહ્યું. \"ત્યાં બહાર. શું તું તેમને જુએ છે?\"\n\nવાદળે જોયું.\n\nદૂર, ખૂબ દૂર ઉપર તેઓ જ્યાં હતા ત્યાંથી ઘણું ઊંચે, પણ એ જ દિશામાં વાદળોની એક લાંબી, નરમ, સુસ્ત હાર હતી, સવારના આકાશમાં ધીમે ધીમે વહેતી. કેટલાંક મોટાં હતાં. કેટલાંક નાનાં. તેઓ બધાં સાથે ક્યાંક જઈ રહ્યાં હતાં.\n\nવાદળ લાંબા સમય સુધી કંઈ બોલ્યું નહીં.\n\nપછી વાદળે ખૂબ ધીમેથી કહ્યું, \"એ તેઓ છે.\"\n\n\"એ તેઓ છે,\" પિપ એ સહમતી દર્શાવી.\n\nવાદળે એક ધીમો, નરમ શ્વાસ લીધો.\n\nઅને, ખૂબ કોમળતાથી જેમ ડેન્ડેલિયનનો ટુકડો જેણે હમણાં જ મન બનાવ્યું હોય વાદળ ઊઠવા લાગ્યું.\n\nપહેલાં, બસ થોડું. પછી થોડું વધારે. પછી વધારે.\n\nઘાસથી ઉપર. દીવાલથી ઉપર. જૂના વિલોની સૌથી ઊંચી ડાળથી ઉપર. ઉપર, અને ઉપર, અને ઉપર, જ્યાં સુધી વાદળ વાદળી સામે એક નાનો, નરમ, સફેદ ગોળો જ રહ્યો, બીજાંની હાર તરફ વહેતો.\n\nવાદળ બરાબર પહોંચતાં પહેલાં થોભ્યું.\n\nઅને પછી વાદળે હાથ હલાવ્યો.\n\nએ એક નાનો ઈશારો હતો વાદળની કિનારે બસ એક નાનો વળાંક પણ પિપ એ તે જોયો.\n\nપિપ સૌથી ઊંચા ઘાસના દાંડા પર ઊભો રહ્યો અને બંને પંજાથી જવાબ આપ્યો.\n\n\"અલવિદા, નાના વાદળ,\" પિપ એ બૂમ પાડી, ભલે વાદળ સાંભળવા માટે ખૂબ દૂર હતું. \"ઘરમાં સ્વાગત છે.\"\n\nવાદળ ચુપચાપ બીજાંની હારમાં જઈ મળ્યું, અને તેઓ સાથે જવના ખેતર ઉપરથી વહેતાં, ત્યાં ગયાં જ્યાં વાદળો સવારે જાય છે.\n\nપિપ ધીરે ધીરે ઊતર્યો, જેવી રીતે ઉંદરો ઊતરે છે.\n\nજ્યારે પિપ ક્લોવર પાસે પાછો પહોંચ્યો, ક્લોવર ત્યાં જ હતું, હવે થોડું ઓછું પ્રભાવશાળી. પિપ એ તેને છતાં ખાધું. તે, કોઈ રીતે, એક ખૂબ સારી સવાર જેવો સ્વાદ આપતું હતું.\n\nપછી, જ્યારે સૂર્ય ઊંચે હતો અને ખેતરમાંથી ગરમ ઘાસની સુગંધ આવતી હતી, પિપ પોતાના દરના દરવાજે બેઠો અને વાદળોને જોવા લાગ્યો.\n\nત્યાં ઉપર ઘણાં હતાં. પિપ કહી શકતો ન હતો કે કોણ કોણ છે.\n\nપણ પિપ એ વિચાર્યું અને પિપ ને એનો લગભગ ખાતરી હતો કે તેમાંથી એક હાથ હલાવી રહ્યું હતું.\n\n*વિચારવા જેવી વાત: પિપ એ વાદળને ઠીક નથી કર્યું. પિપ એ બસ વાદળને ઘરનો રસ્તો જોવામાં મદદ કરી. ક્યારે કોઈએ તને કોઈ વસ્તુનો રસ્તો પાછો જોવામાં મદદ કરી છે?*"],
      es: ["Pip era un ratón pequeño. Pip vivía en un campo.\n\nUna mañana, Pip oyó una vocecita.\n\n\"Estoy perdida,\" dijo la voz.\n\nPip miró hacia arriba. Había una pequeña nube blanca, muy cerca del suelo.\n\n\"¿Eres una nube?\" dijo Pip.\n\n\"Sí,\" dijo la nube. \"Bajé a mirar una flor. Ahora no encuentro el cielo otra vez.\"\n\nPip pensó. \"Las nubes van hacia arriba,\" dijo Pip. \"El cielo está arriba.\"\n\n\"No recuerdo cómo subir,\" dijo la nube, muy bajito.\n\nPip trepó hasta lo alto de una hierba muy, muy alta. Pip señaló hacia arriba.\n\n\"¡Allí!\" dijo Pip. \"El cielo está allí. Con las otras nubes.\"\n\nLa nube miró hacia arriba. La nube vio a las otras nubes, lejos, flotando.\n\nLa nube tomó un aliento suave y lento. Y entonces la nube subió. Despacio al principio. Luego más rápido.\n\nLa nube le hizo un gesto de despedida a Pip.\n\nPip le respondió con la patita.\n\n\"Adiós, pequeña nube,\" dijo Pip. \"Bienvenida a casa.\"", "Pip era un ratoncito de campo que vivía entre una hilera de cebada y un viejo muro de piedra.\n\nUna mañana tranquila, mientras Pip mordisqueaba un trocito de trébol, Pip oyó una voz muy pequeñita y muy triste.\n\n\"Estoy perdida,\" dijo la voz. \"No sé cómo volver a casa.\"\n\nPip miró hacia arriba.\n\nAllí, justo por encima de las puntas de las hierbas más altas, había una nube pequeña, suave y blanca. La nube chocaba suavemente contra un cardo, como un globo choca contra el techo.\n\n\"Disculpa,\" dijo Pip. \"¿Eres una nube?\"\n\n\"Sí,\" dijo la nube, sorbiendo. \"Bajé un poquito, solo para mirar una amapola. La amapola era tan roja. Nunca había visto algo tan rojo antes. Pero ahora no encuentro el camino de vuelta al cielo. Y tengo miedo.\"\n\nPip pensó en esto.\n\n\"Las nubes pertenecen arriba,\" dijo Pip. \"El cielo está arriba.\"\n\n\"Lo sé,\" dijo la nube, muy bajito. \"Pero no recuerdo cómo subir. Me sigo yendo de lado. O hacia abajo. Solo quiero estar en casa.\"\n\nPip miró a su alrededor. Pip miró la hierba, y el muro, y el ancho cielo azul sobre ambos.\n\nEntonces a Pip se le ocurrió una idea.\n\nPip trepó, con mucho cuidado, hasta lo más alto del tallo de hierba más alto. Desde allí, Pip podía ver muy, muy lejos por el campo. Y Pip podía ver muy arriba tres o cuatro nubes más, flotando en una lenta hilera.\n\nPip señaló con una pequeña patita.\n\n\"Allí,\" dijo Pip. \"Allí está tu familia. Van por ese lado.\"\n\nLa nube miró. La nube miró durante un largo momento.\n\nY entonces la nube las vio a las otras nubes moviéndose suavemente por el azul.\n\nLa nube tomó un aliento lento y suave.\n\nY, muy delicadamente, la nube comenzó a elevarse. Solo un poquito al principio. Como un trocito de pelusa de diente de león atrapando el viento.\n\nLuego un poco más.\n\nLuego despacio, despacio arriba, arriba, arriba, todo el camino de vuelta al brillante cielo azul.\n\nLa nube saludó a Pip con un gesto suave y blanco.\n\nPip se quedó en lo alto de la hierba alta y respondió con las dos patitas sobre la cabeza.\n\n\"Adiós, pequeña nube,\" llamó Pip. \"Bienvenida a casa.\"\n\nLa nube se unió a las otras, y juntas flotaron lentamente fuera de la vista.\n\nPip bajó de regreso a su trébol.\n\nFue, pensó Pip, una mañana muy buena.", "Pip vivía en la hierba alta entre un campo de cebada y un viejo muro de piedra. Pip era un ratoncito de campo con un diente delantero ligeramente roto y una cara muy seria. Los días de Pip eran casi todos iguales: recoger semillas, escuchar por si había búhos, echarse una siesta en la parte cálida de la tarde.\n\nHasta la mañana en que Pip conoció a la nube.\n\nFue justo después del amanecer. El rocío todavía colgaba de cada brizna de hierba como una lamparita. Pip estaba a la mitad del desayuno un trozo de trébol particularmente excelente cuando Pip oyó una vocecita.\n\n\"Estoy perdida,\" dijo la voz. \"No sé cómo volver a casa.\"\n\nPip dejó de masticar.\n\nPip miró hacia arriba. Y allí, chocando suavemente contra un cardo y luciendo muy avergonzada por ello, había una nube blanca, pequeña, suave y perfectamente redonda.\n\n\"Hola,\" dijo Pip, con cautela. \"Eres una nube.\"\n\n\"Sí,\" dijo la nube, con una voz que sonaba un poco aguada.\n\n\"Estás muy cerca del suelo,\" dijo Pip.\n\n\"Lo sé,\" dijo la nube. \"Bajé a mirar una amapola. La amapola era tan roja. Nunca había visto algo tan rojo en toda mi vida. Solo iba a mirar un momento.\" La nube sorbió. \"Pero ahora no sé cómo volver. Me sigo yendo de lado. Una vez me fui contra el muro. Estaba muy firme.\"\n\nPip consideró a la nube. La nube era, pensó Pip, más o menos la mitad del tamaño de una madriguera de ratón normal. Era la cosa más gentil que Pip había visto de cerca.\n\n\"Las nubes pertenecen allá arriba,\" dijo Pip. \"El cielo está arriba.\"\n\n\"Lo sé,\" dijo la nube, con una voz muy pequeña. \"Pero he olvidado cómo subir. Cada vez que lo intento, voy en la dirección equivocada. Solo quiero estar en casa con mi familia.\"\n\nEsto, Pip lo entendía. Pip una vez se había desorientado en una mata muy espesa de cebada y se había pasado la mayor parte de una tarde caminando en la dirección equivocada, completamente seguro todo el tiempo de que la madriguera se había movido.\n\nPip miró a su alrededor. Pip pensó.\n\nEntonces Pip tuvo lo que le pareció una idea muy buena.\n\n\"Vamos,\" dijo Pip. \"Sígueme. Pero no demasiado cerca creo que los cardos pueden ser un problema para ti.\"\n\nPip trepó. Pip trepó por el muro, donde el musgo era grueso y fácil de agarrar. Pip trepó por el tallo de hierba más alto al borde del muro el que se mecía cuando pasaba la brisa más pequeña. Más alto y más alto, hasta que el viento se volvió fresco y el campo parecía una alfombra verde extendiéndose en todas direcciones.\n\nLa nube siguió, flotando con torpeza, chocando contra el tallo dos veces.\n\nDesde lo más alto, Pip señaló.\n\n\"Mira,\" dijo Pip. \"Allá afuera. ¿Las ves?\"\n\nLa nube miró.\n\nMuy, muy arriba mucho más alto de donde estaban ahora, pero en la misma dirección había una hilera larga, suave y perezosa de nubes, moviéndose lentamente por el cielo de la mañana. Algunas eran grandes. Algunas pequeñas. Todas iban juntas a alguna parte.\n\nLa nube no dijo nada durante un largo momento.\n\nLuego la nube dijo, muy bajito, \"Esas son ellas.\"\n\n\"Esas son ellas,\" coincidió Pip.\n\nLa nube tomó un aliento lento y suave.\n\nY, muy delicadamente como un trozo de pelusa de diente de león que acaba de decidirse la nube comenzó a elevarse.\n\nPrimero, solo un poquito. Luego un poco más. Luego más.\n\nMás allá de la hierba. Más allá del muro. Más allá de la rama más alta del viejo sauce. Arriba, y arriba, y arriba, hasta que la nube fue solo un círculo pequeño, suave y blanco contra el azul, flotando hacia la hilera de las otras.\n\nLa nube se detuvo, justo antes de alcanzarlas.\n\nY entonces la nube saludó.\n\nFue un saludo pequeño solo un pequeño rizo en el borde de la nube pero Pip lo vio.\n\nPip se quedó de pie en lo alto del tallo de hierba más alto y respondió con las dos patitas.\n\n\"Adiós, pequeña nube,\" llamó Pip, aunque la nube estaba demasiado lejos para oír. \"Bienvenida a casa.\"\n\nLa nube se deslizó silenciosamente hacia la hilera de las otras, y juntas flotaron lejos sobre la cebada, hacia donde sea que vayan las nubes por la mañana.\n\nPip bajó, despacio, como bajan los ratones.\n\nCuando Pip volvió al trébol, el trébol seguía allí, ahora un poco menos impresionante. Pip se lo comió de todos modos. Sabía, de alguna manera, a una mañana muy buena.\n\nMás tarde, cuando el sol estaba alto y el campo olía a hierba cálida, Pip se sentó en la entrada de su madriguera y miró las nubes.\n\nHabía muchas allá arriba. Pip no podía distinguir cuál era cuál.\n\nPero Pip pensó y Pip estaba casi seguro de esto que una de ellas estaba saludando.\n\n*Algo para pensar: Pip no arregló a la nube. Pip solo ayudó a la nube a ver el camino a casa. ¿Cuándo te ha ayudado alguien a ver el camino de regreso a algo?*"],
      fr: ["Pip était une petite souris. Pip vivait dans un champ.\n\nUn matin, Pip entendit une toute petite voix.\n\n\"Je suis perdu,\" dit la voix.\n\nPip leva les yeux. Il y avait un petit nuage blanc, tout près du sol.\n\n\"Es-tu un nuage?\" dit Pip.\n\n\"Oui,\" dit le nuage. \"Je suis descendu pour regarder une fleur. Maintenant je ne retrouve plus le ciel.\"\n\nPip réfléchit. \"Les nuages vont vers le haut,\" dit Pip. \"Le ciel est en haut.\"\n\n\"Je ne me souviens plus comment monter,\" dit le nuage, tout doucement.\n\nPip grimpa au sommet d'une herbe très, très haute. Pip pointa vers le haut.\n\n\"Là!\" dit Pip. \"Le ciel est là. Avec les autres nuages.\"\n\nLe nuage regarda en haut. Le nuage vit les autres nuages, au loin, qui dérivaient.\n\nLe nuage prit une respiration douce et lente. Et puis le nuage monta. Lentement d'abord. Puis plus vite.\n\nLe nuage fit un signe d'adieu à Pip.\n\nPip lui répondit en agitant la patte.\n\n\"Au revoir, petit nuage,\" dit Pip. \"Bienvenue à la maison.\"", "Pip était un petit mulot qui vivait entre une rangée d'orge et un vieux mur de pierre.\n\nUn matin tranquille, alors que Pip grignotait un morceau de trèfle, Pip entendit une toute petite voix très triste.\n\n\"Je suis perdu,\" dit la voix. \"Je ne sais pas comment rentrer chez moi.\"\n\nPip leva les yeux.\n\nLà, juste au-dessus des cimes des herbes les plus hautes, se trouvait un petit nuage blanc et doux. Le nuage cognait doucement contre un chardon, comme un ballon cogne contre un plafond.\n\n\"Excuse-moi,\" dit Pip. \"Es-tu un nuage?\"\n\n\"Oui,\" dit le nuage en reniflant. \"Je suis descendu un tout petit peu, juste pour regarder un coquelicot. Le coquelicot était si rouge. Je n'avais jamais rien vu d'aussi rouge auparavant. Mais maintenant je ne retrouve plus le chemin du ciel. Et j'ai peur.\"\n\nPip réfléchit à cela.\n\n\"Les nuages appartiennent au ciel,\" dit Pip. \"Le ciel est en haut.\"\n\n\"Je sais,\" dit le nuage, tout doucement. \"Mais je ne me souviens plus comment monter. Je continue à aller de côté. Ou vers le bas. Je veux juste être à la maison.\"\n\nPip regarda autour de lui. Pip regarda l'herbe, et le mur, et le grand ciel bleu au-dessus d'eux deux.\n\nPuis Pip eut une idée.\n\nPip grimpa, très prudemment, jusqu'au sommet de la plus haute tige d'herbe. De là-haut, Pip pouvait voir très, très loin à travers le champ. Et Pip pouvait voir tout en haut trois ou quatre autres nuages, dérivant en une lente file.\n\nPip pointa d'une petite patte.\n\n\"Là,\" dit Pip. \"Là est ta famille. Ils vont par là.\"\n\nLe nuage regarda. Le nuage regarda pendant un long moment.\n\nEt puis le nuage les vit les autres nuages qui se déplaçaient doucement à travers le bleu.\n\nLe nuage prit une respiration lente et douce.\n\nEt, très délicatement, le nuage commença à s'élever. Juste un peu d'abord. Comme un petit morceau de duvet de pissenlit qui attrape le vent.\n\nPuis un peu plus.\n\nPuis lentement, lentement vers le haut, vers le haut, vers le haut, tout le long du chemin jusqu'au ciel bleu éclatant.\n\nLe nuage fit un signe doux et blanc à Pip.\n\nPip se tenait au sommet de l'herbe haute et répondit, les deux petites pattes au-dessus de la tête.\n\n\"Au revoir, petit nuage,\" appela Pip. \"Bienvenue à la maison.\"\n\nLe nuage rejoignit les autres, et ensemble ils dérivèrent lentement hors de vue.\n\nPip redescendit jusqu'à son trèfle.\n\nC'était, pensa Pip, une très bonne matinée.", "Pip vivait dans les hautes herbes entre un champ d'orge et un vieux mur de pierre. Pip était un petit mulot avec une dent de devant légèrement ébréchée et un visage très sérieux. Les journées de Pip étaient presque toutes les mêmes: ramasser des graines, écouter s'il y avait des hiboux, faire une sieste dans la partie chaude de l'après-midi.\n\nJusqu'au matin où Pip rencontra le nuage.\n\nC'était juste après le lever du soleil. La rosée pendait encore à chaque brin d'herbe comme une petite lampe. Pip était à la moitié de son petit-déjeuner un morceau de trèfle particulièrement excellent quand Pip entendit une petite voix.\n\n\"Je suis perdu,\" dit la voix. \"Je ne sais pas comment rentrer chez moi.\"\n\nPip arrêta de mâcher.\n\nPip leva les yeux. Et là, cognant doucement contre un chardon et ayant l'air très embarrassé à ce sujet, se trouvait un petit nuage blanc, doux et parfaitement rond.\n\n\"Bonjour,\" dit Pip, prudemment. \"Tu es un nuage.\"\n\n\"Oui,\" dit le nuage, d'une voix qui sonnait un peu liquide.\n\n\"Tu es très près du sol,\" dit Pip.\n\n\"Je sais,\" dit le nuage. \"Je suis descendu pour regarder un coquelicot. Le coquelicot était si rouge. Je n'avais jamais rien vu d'aussi rouge de toute ma vie. Je voulais seulement le regarder un moment.\" Le nuage renifla. \"Mais maintenant je ne sais pas comment revenir. Je dérive sans arrêt de côté. Une fois j'ai dérivé contre le mur. C'était très ferme.\"\n\nPip considéra le nuage. Le nuage faisait, pensa Pip, environ la moitié de la taille d'un terrier de souris ordinaire. C'était la chose la plus douce que Pip ait jamais vue de près.\n\n\"Les nuages appartiennent là-haut,\" dit Pip. \"Le ciel est en haut.\"\n\n\"Je sais,\" dit le nuage, d'une toute petite voix. \"Mais j'ai oublié comment monter. Chaque fois que j'essaie, je vais dans la mauvaise direction. Je veux juste être à la maison avec ma famille.\"\n\nCela, Pip le comprenait. Pip s'était une fois perdu dans un bosquet d'orge très épais et avait passé une bonne partie d'un après-midi à marcher dans la mauvaise direction, certain tout le temps que le terrier avait bougé.\n\nPip regarda autour de lui. Pip réfléchit.\n\nPuis Pip eut ce qui lui sembla être une très bonne idée.\n\n\"Viens,\" dit Pip. \"Suis-moi. Mais pas trop près je pense que les chardons pourraient être un problème pour toi.\"\n\nPip grimpa. Pip grimpa le mur, là où la mousse était épaisse et facile à agripper. Pip grimpa la plus longue tige d'herbe au bord du mur celle qui se balançait quand la plus petite brise passait. De plus en plus haut, jusqu'à ce que le vent devienne vif et que le champ ressemble à un tapis vert s'étendant dans toutes les directions.\n\nLe nuage suivit, dérivant maladroitement, cognant la tige deux fois.\n\nDu tout en haut, Pip pointa.\n\n\"Regarde,\" dit Pip. \"Là-bas. Tu les vois?\"\n\nLe nuage regarda.\n\nTout, tout là-haut bien plus haut qu'ils ne l'étaient maintenant, mais dans la même direction se trouvait une longue file douce et paresseuse de nuages, se déplaçant lentement à travers le ciel du matin. Certains étaient grands. Certains étaient petits. Ils allaient tous quelque part ensemble.\n\nLe nuage ne dit rien pendant un long moment.\n\nPuis le nuage dit, très doucement, \"Ce sont eux.\"\n\n\"Ce sont eux,\" approuva Pip.\n\nLe nuage prit une respiration lente et douce.\n\nEt, très délicatement comme un morceau de duvet de pissenlit qui vient de se décider le nuage commença à s'élever.\n\nD'abord, juste un peu. Puis un peu plus. Puis plus encore.\n\nAu-delà de l'herbe. Au-delà du mur. Au-delà de la plus haute branche du vieux saule. Vers le haut, vers le haut, vers le haut, jusqu'à ce que le nuage ne soit plus qu'un petit cercle doux et blanc contre le bleu, dérivant vers la file des autres.\n\nLe nuage s'arrêta, juste avant de les rattraper.\n\nEt puis le nuage agita un signe.\n\nC'était un petit signe juste une petite boucle au bord du nuage mais Pip le vit.\n\nPip se tenait au sommet de la plus haute tige d'herbe et répondit avec les deux pattes.\n\n\"Au revoir, petit nuage,\" appela Pip, même si le nuage était beaucoup trop loin pour entendre. \"Bienvenue à la maison.\"\n\nLe nuage glissa silencieusement dans la file des autres, et ensemble ils dérivèrent au loin au-dessus de l'orge, vers là où vont les nuages le matin.\n\nPip redescendit, lentement, à la manière des souris.\n\nQuand Pip revint au trèfle, le trèfle était toujours là, un peu moins impressionnant maintenant. Pip le mangea quand même. Il avait, en quelque sorte, le goût d'une très bonne matinée.\n\nPlus tard, quand le soleil était haut et que le champ sentait l'herbe chaude, Pip s'assit dans l'entrée de son terrier et regarda les nuages.\n\nIl y en avait beaucoup là-haut. Pip ne pouvait pas dire lequel était lequel.\n\nMais Pip pensa et Pip en était presque sûr que l'un d'eux faisait un signe de la main.\n\n*Quelque chose à méditer: Pip n'a pas réparé le nuage. Pip a juste aidé le nuage à voir le chemin de la maison. Quand quelqu'un t'a-t-il aidé à voir le chemin du retour vers quelque chose?*"]
