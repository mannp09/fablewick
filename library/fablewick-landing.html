<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fablewick — A Free Storybook Library for Curious Kids</title>
<meta name="description" content="Fablewick is a free, open-source AI storybook library for kids. Beautiful stories in multiple languages, no accounts, no tracking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FBF6EE;
  --ink: #2A2118;
  --sage: #8FA68A;
  --amber: #D4925E;
  --coral: #D67A6E;
  --blue: #7A9BB5;
  --cream-dark: #F0E8DA;
  --ink-light: #5A4D3E;
  --sage-light: #C2D4BE;
  --amber-light: #ECC9A8;
  --coral-light: #EBBFB8;
  --blue-light: #B5CFE0;
  --radius-soft: 12px;
  --radius-warm: 20px;
  --radius-cozy: 28px;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-ui: 'Outfit', sans-serif;
  --shadow-card: 0 2px 12px rgba(42,33,24,0.06), 0 1px 3px rgba(42,33,24,0.08);
  --shadow-card-hover: 0 8px 32px rgba(42,33,24,0.10), 0 2px 8px rgba(42,33,24,0.06);
  --transition: 0.25s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── TOP NAV ─────────────────────────── */

.top-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(251, 246, 238, 0.85);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(42, 33, 24, 0.08);
  padding: 0.85rem 1.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.5rem;
  font-family: var(--font-ui);
}
.top-nav .brand {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  margin-right: auto;
  padding-left: 0.25rem;
  height: 36px;
}
.top-nav .brand img {
  height: 36px;
  width: auto;
  display: block;
  object-fit: contain;
}
.top-nav-links {
  display: flex;
  gap: 1.4rem;
  align-items: center;
}
.top-nav a.nav-link {
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--ink-light);
  text-decoration: none;
  padding: 0.35rem 0.1rem;
  border-bottom: 2px solid transparent;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.top-nav a.nav-link:hover {
  color: var(--amber);
  border-bottom-color: var(--amber);
}
@media (max-width: 640px) {
  .top-nav { padding: 0.65rem 0.9rem; gap: 0.8rem; }
  .top-nav .brand { font-size: 1rem; padding-left: 0; }
  .top-nav-links { gap: 1rem; }
  .top-nav a.nav-link { font-size: 0.85rem; }
}

/* ── HEADER ───────────────────────────── */

.site-header {
  text-align: center;
  padding: 4rem 1.5rem 3rem;
  max-width: 720px;
  margin: 0 auto;
}

.site-title {
  display: block;
  margin: 0 auto 0.5rem;
  max-width: min(560px, 80vw);
  line-height: 0;
}
.site-title .site-logo {
  width: 100%;
  height: auto;
  display: block;
}

.site-subtitle {
  font-family: var(--font-body);
  font-size: clamp(1.05rem, 2.5vw, 1.35rem);
  color: var(--ink-light);
  font-weight: 400;
  margin-bottom: 2rem;
}

.lang-toggle {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.lang-btn {
  font-family: var(--font-ui);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.4rem 1rem;
  border: 1.5px solid var(--ink);
  border-radius: 100px;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.02em;
}

.lang-btn:hover {
  background: var(--ink);
  color: var(--cream);
}

.lang-btn.active {
  background: var(--ink);
  color: var(--cream);
}

/* ── GRID ─────────────────────────────── */

.book-grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}
#bookGrid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
}

@media (min-width: 640px) {
  #bookGrid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 960px) {
  #bookGrid { grid-template-columns: repeat(3, 1fr); }
}

/* ── CARD ─────────────────────────────── */

.book-card {
  background: #fff;
  border-radius: var(--radius-cozy);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: box-shadow var(--transition), transform var(--transition);
  display: flex;
  flex-direction: column;
}

.book-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-3px);
}

.card-hero {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  cursor: pointer;
}
.card-hero:focus-visible {
  outline: 3px solid var(--amber);
  outline-offset: 2px;
}
.card-hero::after {
  content: '↗';
  position: absolute;
  bottom: 0.75rem;
  left: 0.75rem;
  width: 32px;
  height: 32px;
  background: rgba(42, 33, 24, 0.7);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  color: #fff;
  font-family: var(--font-ui);
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity var(--transition), transform var(--transition);
  pointer-events: none;
}
.book-card:hover .card-hero::after {
  opacity: 1;
  transform: translateY(0);
}

.card-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}

.book-card:hover .card-hero img {
  transform: scale(1.04);
}

.age-badge {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 0.25rem 0.65rem;
  border-radius: 100px;
  color: #fff;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
  text-shadow: 0 1px 2px rgba(74, 40, 16, 0.28);
  box-shadow: 0 2px 8px rgba(74, 40, 16, 0.18);
}

/* Twilight age palette — aqua (youngest) -> cobalt -> violet (oldest) */
.age-badge.color-sage   { background: #3FA9C0; }  /* 3-6  aqua   */
.age-badge.color-amber  { background: #4A78C4; }  /* 5-8  cobalt */
.age-badge.color-coral  { background: #7E5FB0; }  /* 7-10 violet */
.age-badge.color-cream  { background: #7E5FB0; }
.age-badge.color-blue   { background: #4A78C4; }

.card-body {
  padding: 1.25rem 1.4rem 1.4rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 1.3rem;
  line-height: 1.25;
  margin-bottom: 0.6rem;
  color: var(--ink);
}

.card-summary {
  font-family: var(--font-body);
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--ink-light);
  margin-bottom: 0.65rem;
}

.card-lesson {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--amber);
  margin-bottom: 1rem;
  line-height: 1.5;
}

/* ── READING LEVEL TOGGLE ─────────────── */

.reading-levels {
  margin-bottom: 0.85rem;
}

.level-btns {
  display: flex;
  gap: 0.35rem;
  margin-bottom: 0.6rem;
}

.level-btn {
  font-family: var(--font-ui);
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.3rem 0.65rem;
  border: 1px solid var(--cream-dark);
  border-radius: 100px;
  background: var(--cream);
  color: var(--ink-light);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.level-btn:hover {
  border-color: var(--sage);
  color: var(--ink);
}

.level-btn.active {
  background: var(--sage);
  border-color: var(--sage);
  color: #fff;
}

.level-preview {
  font-family: var(--font-body);
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--ink-light);
  background: var(--cream);
  border-radius: var(--radius-soft);
  padding: 0.7rem 0.85rem;
  min-height: 3.6rem;
  max-height: 4.8rem;
  overflow: hidden;
  position: relative;
  transition: opacity var(--transition);
}
.level-preview::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 1.4rem;
  background: linear-gradient(to bottom, transparent, var(--cream));
  pointer-events: none;
}

.read-btn {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 0.55rem 0.9rem;
  margin-top: 0.7rem;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  align-self: flex-start;
}
.read-btn:hover {
  background: var(--amber);
  transform: translateY(-1px);
}
.read-btn .arr {
  display: inline-block;
  margin-left: 0.35em;
  transition: transform var(--transition);
}
.read-btn:hover .arr { transform: translateX(3px); }

/* ── READER MODAL ──────────────────────── */
.reader-modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(42, 33, 24, 0.65);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  animation: fadeIn 0.25s ease;
}
.reader-modal.open { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.reader-card {
  background: var(--cream);
  width: min(720px, 100%);
  max-height: 90vh;
  border-radius: var(--radius-cozy);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.reader-head {
  padding: 1.5rem 1.75rem 1rem;
  border-bottom: 1px solid var(--cream-dark);
  display: flex;
  align-items: center;
  gap: 1rem;
}
.reader-head h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 1.45rem;
  color: var(--ink);
  flex: 1;
}
.reader-close {
  font-size: 1.5rem;
  background: transparent;
  border: none;
  color: var(--ink-light);
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  line-height: 1;
  border-radius: 50%;
  transition: background var(--transition);
}
.reader-close:hover {
  background: var(--cream-dark);
  color: var(--ink);
}
.reader-levels {
  display: flex;
  gap: 0.45rem;
  padding: 1rem 1.75rem;
  border-bottom: 1px solid var(--cream-dark);
  flex-wrap: wrap;
}
.reader-level-btn {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--cream-dark);
  border-radius: 100px;
  background: #fff;
  color: var(--ink-light);
  cursor: pointer;
  transition: all var(--transition);
}
.reader-level-btn.active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}
.reader-body {
  padding: 1.75rem 1.75rem 2rem;
  overflow-y: auto;
  font-family: var(--font-body);
  font-size: 1.02rem;
  line-height: 1.85;
  color: var(--ink);
  white-space: pre-wrap;
  scroll-behavior: smooth;
}
.reader-body p { margin-bottom: 1.1rem; }
@media (max-width: 540px) {
  .reader-modal { padding: 0; align-items: stretch; }
  .reader-card { border-radius: 0; max-height: 100vh; height: 100vh; width: 100%; }
}

/* ── TAGS ─────────────────────────────── */

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: auto;
  padding-top: 0.5rem;
}

.tag {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  font-weight: 500;
  padding: 0.2rem 0.55rem;
  border-radius: 100px;
  background: var(--cream);
  color: var(--ink-light);
  letter-spacing: 0.02em;
}

.tag.color-sage   { background: var(--sage-light); color: #3A5235; }
.tag.color-amber  { background: var(--amber-light); color: #6B4525; }
.tag.color-coral  { background: var(--coral-light); color: #6B3530; }
.tag.color-cream  { background: var(--cream-dark); color: var(--ink-light); }
.tag.color-blue   { background: var(--blue-light); color: #3A5568; }

/* ── FOOTER ───────────────────────────── */

.site-footer {
  text-align: center;
  padding: 3rem 1.5rem 4rem;
  max-width: 600px;
  margin: 0 auto;
  border-top: 1px solid var(--cream-dark);
}

.footer-main {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 0.6rem;
}

.footer-sub {
  font-family: var(--font-ui);
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--ink-light);
  letter-spacing: 0.04em;
}

.footer-sub span {
  margin: 0 0.35rem;
  opacity: 0.4;
}

/* ── TRANSITIONS ──────────────────────── */

.fade-text {
  transition: opacity 0.2s ease;
}

.fade-text.fading {
  opacity: 0;
}

/* ── SCROLLBAR ────────────────────────── */

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--cream); }
::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #D5CBBA; }

/* ── MOBILE TWEAKS ────────────────────── */

@media (max-width: 639px) {
  .site-header { padding: 3rem 1.25rem 2rem; }
  .book-grid { padding: 0 1rem 3rem; gap: 1.5rem; }
  .card-body { padding: 1rem 1.15rem 1.15rem; }
  .card-title { font-size: 1.15rem; }
  .level-btns { flex-wrap: wrap; }
}

/* ── ABOUT SECTION ───────────────────── */
.about-section {
  max-width: 880px;
  margin: 4rem auto 3rem;
  padding: 0 1.5rem;
  scroll-margin-top: 90px;
}
.about-kicker {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
  text-align: center;
  margin-bottom: 0.75rem;
}
.about-heading {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  color: var(--ink);
  text-align: center;
  line-height: 1.2;
  margin-bottom: 2rem;
}
.about-body {
  font-family: var(--font-body);
  font-size: 1.05rem;
  color: var(--ink);
  line-height: 1.75;
  max-width: 620px;
  margin: 0 auto 1.25rem;
  text-align: center;
}
.about-rule {
  width: 60px;
  height: 1px;
  background: rgba(42, 33, 24, 0.2);
  margin: 2.5rem auto;
  border: none;
}
.coauthor-block {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 1.75rem;
  align-items: center;
  max-width: 640px;
  margin: 0 auto;
}
.coauthor-photo {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--amber-light), var(--coral-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 2.5rem;
  color: var(--cream);
  font-weight: 500;
  overflow: hidden;
  flex-shrink: 0;
}
.coauthor-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.author-link {
  color: var(--amber);
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  transition: color var(--transition), border-color var(--transition);
}
.author-link:hover {
  color: var(--coral);
}

.coauthor-label {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.5rem;
}
.coauthor-body {
  font-family: var(--font-body);
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--ink);
}
@media (max-width: 540px) {
  .coauthor-block {
    grid-template-columns: 1fr;
    text-align: center;
    gap: 1.25rem;
  }
  .coauthor-photo { margin: 0 auto; }
}

/* ── DUSK THEME — night sky background + light chrome ─────────── */
body {
  background: linear-gradient(180deg, #1C2A52 0%, #46396A 52%, #B97E7A 100%) !important;
  background-attachment: fixed !important;
  color: #F3ECE2;
}
#starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
#starfield .twk { position: absolute; opacity: 0.16; will-change: opacity, transform; }
@keyframes fwTw { 0%,40%,100% { opacity: 0.14; transform: scale(0.6); } 47% { opacity: 1; transform: scale(1); } 54% { opacity: 0.14; transform: scale(0.6); } }
@media (prefers-reduced-motion: reduce) { #starfield .twk { animation: none !important; opacity: 0.5 !important; } }

.top-nav, .site-header, .book-grid, .about-section, .site-footer { position: relative; z-index: 1; }

.top-nav { background: rgba(24, 34, 66, 0.74) !important; border-bottom-color: rgba(255,255,255,0.12) !important; }
.top-nav a.nav-link { color: #E7DFF3 !important; }
.top-nav a.nav-link:hover { color: #FFFFFF !important; border-bottom-color: #C9B6E0 !important; }

.site-subtitle { color: #E6DAE4 !important; }
.site-title .site-logo { filter: drop-shadow(0 2px 10px rgba(0,0,0,0.28)); }
.lang-btn { background: rgba(255,255,255,0.10) !important; color: #EADFF0 !important; border-color: rgba(255,255,255,0.22) !important; }
.lang-btn:hover { color: #FFFFFF !important; }
.lang-btn.active { background: #F3ECE2 !important; color: #2A2342 !important; border-color: #F3ECE2 !important; }

.about-section { background: transparent !important; border: none !important; box-shadow: none !important; }
.about-kicker { color: #DEB2A8 !important; }
.about-heading { color: #FBF4EC !important; }
.about-body { color: #E4D9DD !important; }
.about-rule { border-top-color: rgba(255,255,255,0.16) !important; }
.coauthor-label { color: #FBF4EC !important; }
.coauthor-body { color: #D6CBD2 !important; }
.author-link, .coauthor-label .author-link { color: #E9BD93 !important; }

.footer-main { color: #ECE2EA !important; }
.footer-sub { color: #CBBECC !important; }
.footer-sub span { color: #CBBECC !important; }

/* lesson line -> slate blue; tags -> cool, matched to each book's Twilight badge */
.card-lesson { color: #5C6B86 !important; }
.tag.color-sage  { background: #E4F1F4 !important; color: #2C7E92 !important; }  /* 3-6  aqua   */
.tag.color-amber { background: #E7EDF8 !important; color: #3A5FA8 !important; }  /* 5-8  cobalt */
.tag.color-coral { background: #EEEAF6 !important; color: #6A4F9C !important; }  /* 7-10 violet */
.tag.color-cream { background: #ECEDF2 !important; color: #4A5570 !important; }
.tag.color-blue  { background: #E7EDF8 !important; color: #3A5FA8 !important; }
</style>
</head>
<body>
<div id="starfield" aria-hidden="true"></div>

<nav class="top-nav" aria-label="Site navigation">
  <a href="#top" class="brand" aria-label="Fablewick — home"><img src="../src/assets/fablewick-mark.png" alt="Fablewick"></a>
  <div class="top-nav-links">
    <a href="#top" class="nav-link" data-i18n-nav="home">Home</a>
    <a href="#stories" class="nav-link" data-i18n-nav="stories">Stories</a>
    <a href="#about" class="nav-link" data-i18n-nav="about">About</a>
  </div>
</nav>

<header class="site-header" id="top">

goes dark. No puddle.\n\n\"Good,\" says Dada.\n\nThat is all he says.\n\nThe next morning: come. The morning after that: come.\n\nEvery morning the kid holds the watering can and the water falls in a soft, hissing shower over the dirt. Every morning, nothing looks different. The soil just sits there, dark from watering, quiet.\n\nWeeks pass. The kid stops thinking about it as something special and starts thinking about it as something that just happens in the morning, like brushing teeth.\n\nAnd then one morning — a green line, thin as a thread, rising up through the soil.\n\nThe kid stares. Dada does not make a big deal of it. He just nods.\n\nMore days. A leaf unfolds. Then two. Then a small yellow flower that smells faintly of something the kid can't name.\n\nThen a tomato — first a pale green button, then swelling, then blushing, then one morning fully red and heavy on its stem.\n\nDada picks it with both hands. Carries it inside. Cuts it carefully on the wooden board.\n\nHe gives the kid half.\n\nThe kid bites in. It is warm from the morning sun. It tastes bright and a little sweet and a little sharp, and the juice runs down and the kid does not even care.\n\n\"We grew this,\" says the kid.\n\n\"Yes,\" says Dada.\n\nThe kid looks at him — at his dusty knees, at his rough hands, at his face that always looks a little stern but is not stern right now.\n\n\"Dada — why do you do this every day?\"\n\nDada picks up the second half of the tomato. He looks at it for a moment.\n\nThen he looks at the kid.\n\n\"Come tomorrow,\" he says. \"I will show you.\"\n\nAnd the kid already knows the answer is not about tomatoes.", "Dada does not say I love you. Not once, not ever, not in the way the kid has heard other people say it — easy and fast, like a reflex, like something the mouth does without the heart having to try.\n\nDada says: \"Come. Hold this.\"\n\nHe is already outside when the kid wakes up, most mornings. Already kneeling in the strip of garden behind the house — four clay pots, a row of something with narrow leaves, a tangle of green the kid cannot name yet. His kurta is pale yellow and always dusty at the knees by the time the kid finds him. His hair recedes back from his forehead in a neat, definite line, as though it made a decision. His hands are brown and weathered, the knuckles like small, hard knots of wood.\n\nHis face is stern. It is usually stern. The kid used to think this meant something was wrong.\n\n\"What are we planting?\" asks the kid, the first morning Dada calls them out.\n\nDada holds up a seed between his thumb and forefinger. It is tiny, dry, almost nothing — something the kid would vacuum up without noticing.\n\n\"Tomato,\" says Dada.\n\nThe kid does not understand why this requires getting up early. The kid has very good opinions about sleeping in.\n\nBut Dada says come, so the kid crouches down in the dirt beside him.\n\nDada shows how to make a hole with two fingers pressed together — straight down, not too deep, exactly this deep. He places the seed in the hole like it is something fragile, something worth being careful with. He covers it. He pats the soil flat, gently.\n\n\"Now water,\" he says, handing over the tin can.\n\n\"How much?\"\n\n\"Until the soil is dark. Stop before it puddles.\"\n\nThe kid waters. Carefully. The soil goes dark in a spreading circle around the pot. No puddle.\n\n\"Good,\" says Dada.\n\nHe says nothing else. He moves to the next pot and starts again.\n\nThe next morning, Dada says come. The morning after that, come. Every morning that month — come, hold this, water, enough, stop. The same words in the same order, like a small, serious song.\n\nThe kid starts to think of it as chores. It is chores. It is just that Dada calls it gardening.\n\nNothing happens in the soil. The kid checks — more carefully at first, then out of habit, then just because it is something to look at while the water falls. The dirt is dark. The dirt is quiet. The dirt does not seem to be doing anything.\n\nOne morning the kid says: \"Why do you care so much about this?\"\n\nDada does not answer immediately. He finishes pressing a seed into the second pot. He covers it. He pats it flat.\n\nThen he says: \"You cannot hurry a seed. You can only be there.\"\n\nThe kid does not know what that means. It sounds like something adults say when they do not want to explain.\n\nThree weeks pass. The kid has stopped counting days.\n\nAnd then one morning — and it is a perfectly ordinary morning, pale light, the smell of something cooking from the kitchen window — the kid looks down into the first pot and there is a line. A thin green thread pushing up through the soil. It was not there yesterday. Or maybe it was there and the kid didn't see it. The kid is not sure anymore what they have and have not been seeing.\n\nDada does not celebrate. He just nods, the way he nods when something is happening the way it is supposed to happen.\n\nMore days. A leaf, folded tight like a fist, unclenching. Then two leaves, then four, a small colony of green. Then a flower — yellow, smaller than a fingernail, with a faint smell the kid cannot name but wants to remember. Then a pale green button forming where the flower was. Then the button swelling. Then — slowly, so slowly the kid cannot catch the moment it happens — the green going golden, then orange, then one morning a red so full and so complete it looks like something from a painting.\n\nDada picks it with both hands. Carries it inside. Sets it on the wooden cutting board and slices it carefully in half, all the way through, and the inside is as red as the outside. He salts it — just a pinch — and gives one half to the kid.\n\nThe kid bites in.\n\nIt is warm from the sun. It tastes bright and complicated — sweet first, then sharp at the back of the throat, and the juice runs down the chin and the kid does not care, does not care at all, just stands there in the kitchen holding a half-eaten tomato and understanding something that is hard to put into words.\n\nThey grew this. They grew this together, with their own hands, out of a seed that was almost nothing.\n\nThe kid looks up at Dada.\n\nDada is already at the door. Already heading back out to the garden. He picks up his watering can from the step without looking at it. He is moving toward the next pot, the next row, the next small thing that needs tending.\n\nThe kid watches him kneel in the dirt.\n\nHis hands, those rough and weathered hands, press into the soil.\n\nAnd the kid understands — not about tomatoes, not really — but about what it means to show up every single morning for something you love. Not because someone told you to. Not because it is easy. Because you are there and it needs you and that is the whole reason.\n\nDada never says I love you.\n\nBut he has been saying it, every morning, in the dirt."],
      hi: ["दादा का एक बगीचा है।\n\nहर सुबह वह बाहर जाते हैं। वह मिट्टी में घुटनों के बल बैठते हैं। उनके हाथ पेड़ की छाल की तरह काले और खुरदरे हैं।\n\n\"आओ,\" वह कहते हैं।\n\nबच्चा आता है।\n\nदादा दिखाते हैं कि एक छोटा सा छेद कैसे बनाया जाता है। एक बीज को अंदर कैसे दबाया जाता है। मिट्टी को धीरे से कैसे बंद किया जाता है, जैसे किसी चीज़ को सुलाते समय कंबल ओढ़ाते हैं।\n\n\"क्यों?\" बच्चा पूछता है।\n\nदादा बस मिट्टी की ओर इशारा करते हैं।\n\nहर दिन, दादा पानी देते हैं। बहुत ज़्यादा नहीं। बस ठीक उतना। बच्चा डिब्बा पकड़ता है। पानी धीरे से गिरता है।\n\nकुछ नहीं होता।\n\nकुछ नहीं होता।\n\nकुछ नहीं होता।\n\nफिर एक सुबह — मिट्टी में एक पतली हरी रेखा।\n\nफिर एक पत्ता।\n\nफिर और पत्ते।\n\nफिर एक फूल।\n\nफिर — एक टमाटर। पहले छोटा, फिर बड़ा, फिर लाल।\n\nदादा उसे तोड़ते हैं। उसे आधा काटते हैं। एक आधा बच्चे को देते हैं।\n\nबच्चा एक काट लेता है। यह धूप से गर्म है। इसका स्वाद किसी ज़रूरी चीज़ जैसा लगता है।\n\nबच्चा दादा की ओर देखता है।\n\nदादा पहले से ही अगली कतार में घुटनों के बल बैठकर और बीज दबा रहे हैं।\n\nबच्चा वहाँ खड़ा रहता है, टमाटर पकड़े हुए।\n\nऔर कुछ ऐसा समझता है जिसके लिए अभी कोई शब्द नहीं हैं।", "दादा \"मैं तुमसे प्यार करता हूँ\" नहीं कहते।\n\nवह कहते हैं: \"आओ। इसे पकड़ो।\"\n\nजब बच्चा उठता है तब तक दादा अक्सर बगीचे में घुटनों के बल बैठे होते हैं। उनके कुर्ता के घुटनों पर धूल जमी होती है। उनके हाथ भूरे और मौसम की मार खाए हुए हैं, उँगलियों के जोड़ लकड़ी की छोटी गाँठों जैसे हैं। वह सख़्त दिखते हैं — उनका चेहरा हमेशा थोड़ा सख़्त दिखता है — लेकिन वह अपनी साँस के नीचे कुछ गुनगुना रहे हैं।\n\n\"हम क्या कर रहे हैं?\" बच्चा पूछता है।\n\nदादा अपने सामने रखे छोटे मिट्टी के गमले की ओर इशारा करते हैं। \"हम पौधा लगा रहे हैं।\"\n\nबच्चे को समझ नहीं आता कि यह क्यों ज़रूरी है। बच्चे के पास करने को बहुत कुछ है। कार्टून हैं। सोफे पर अच्छी जगह है।\n\nलेकिन दादा \"आओ\" कहते हैं, तो बच्चा आता है।\n\nदादा दिखाते हैं कि दो उँगलियों से मिट्टी में छेद कैसे बनाया जाता है — बस इतना गहरा, और गहरा नहीं। वह छेद में एक बीज रखते हैं। एक बीज। वह उसे ऐसे ढकते हैं जैसे यह कोई चीज़ हो जो ध्यान से ढकने के लायक है।\n\n\"अब पानी दो,\" दादा कहते हैं, और डिब्बा थमा देते हैं।\n\n\"कितना?\"\n\n\"इतना कि मिट्टी काली हो जाए। इतना नहीं कि पानी जमा हो जाए।\"\n\nबच्चा पानी देता है। मिट्टी काली हो जाती है। पानी जमा नहीं होता।\n\n\"अच्छा,\" दादा कहते हैं।\n\nबस इतना ही कहते हैं।\n\nअगली सुबह: आओ। उसकी अगली सुबह: आओ।\n\nहर सुबह बच्चा पानी का डिब्बा पकड़ता है और पानी मिट्टी पर एक नरम, फुहार की तरह गिरता है। हर सुबह, कुछ भी अलग नहीं दिखता। मिट्टी बस वहीं बैठी रहती है, पानी से काली, चुप।\n\nहफ़्ते बीतते हैं। बच्चा इसके बारे में कुछ खास सोचना बंद कर देता है और इसे ऐसी चीज़ समझने लगता है जो बस सुबह होती है, जैसे दाँत साफ़ करना।\n\nऔर फिर एक सुबह — एक हरी रेखा, धागे जैसी पतली, मिट्टी से ऊपर उठती हुई।\n\nबच्चा देखता रह जाता है। दादा इसे कोई बड़ी बात नहीं बनाते। वह बस सिर हिलाते हैं।\n\nऔर दिन। एक पत्ता खुलता है। फिर दो। फिर एक छोटा पीला फूल जिसमें हल्की सी खुशबू है जिसका नाम बच्चे को नहीं पता।\n\nफिर एक टमाटर — पहले एक हल्का हरा बटन, फिर बढ़ता हुआ, फिर शरमाता हुआ, फिर एक सुबह पूरी तरह लाल और अपनी डंडी पर भारी।\n\nदादा उसे दोनों हाथों से तोड़ते हैं। उसे अंदर ले जाते हैं। लकड़ी के तख्ते पर ध्यान से काटते हैं।\n\nवह बच्चे को आधा देते हैं।\n\nबच्चा एक काट लेता है। यह सुबह की धूप से गर्म है। इसका स्वाद चमकीला और थोड़ा मीठा और थोड़ा तेज़ है, और रस ठोड़ी पर बहता है और बच्चे को परवाह भी नहीं।\n\n\"हमने इसे उगाया,\" बच्चा कहता है।\n\n\"हाँ,\" दादा कहते हैं।\n\nबच्चा उनकी ओर देखता है — उनके धूल भरे घुटनों की ओर, उनके खुरदरे हाथों की ओर, उनके चेहरे की ओर जो हमेशा थोड़ा सख़्त दिखता है लेकिन अभी सख़्त नहीं है।\n\n\"दादा — आप यह हर दिन क्यों करते हैं?\"\n\nदादा टमाटर का दूसरा आधा हिस्सा उठाते हैं। एक पल के लिए उसे देखते हैं।\n\nफिर वह बच्चे की ओर देखते हैं।\n\n\"कल आना,\" वह कहते हैं। \"मैं तुम्हें दिखाऊँगा।\"\n\nऔर बच्चा पहले से ही जानता है कि जवाब टमाटरों के बारे में नहीं है।", "दादा \"मैं तुमसे प्यार करता हूँ\" नहीं कहते। एक बार नहीं, कभी नहीं, उस तरह नहीं जैसे बच्चे ने दूसरों को कहते सुना है — आसान और जल्दी, जैसे कोई प्रतिक्रिया हो, जैसे कोई चीज़ जो मुँह बिना दिल की कोशिश के कर देता है।\n\nदादा कहते हैं: \"आओ। इसे पकड़ो।\"\n\nजब बच्चा उठता है तब तक वह अक्सर बाहर हो चुके होते हैं। पहले से ही घर के पीछे बगीचे की पट्टी में घुटनों के बल बैठे होते हैं — चार मिट्टी के गमले, संकरी पत्तियों वाली किसी चीज़ की एक कतार, हरियाली का एक जाल जिसका नाम बच्चा अभी नहीं जानता। उनका कुर्ता हल्का पीला है और जब तक बच्चा उन्हें पाता है, घुटनों पर हमेशा धूल जमी होती है। उनके बाल माथे से एक साफ, निश्चित रेखा में पीछे हटे हुए हैं, जैसे उन्होंने कोई फैसला किया हो। उनके हाथ भूरे और मौसम की मार खाए हुए हैं, उँगलियों के जोड़ लकड़ी की छोटी, सख़्त गाँठों जैसे हैं।\n\nउनका चेहरा सख़्त है। आमतौर पर सख़्त ही रहता है। बच्चा पहले सोचता था कि इसका मतलब है कुछ गड़बड़ है।\n\n\"हम क्या लगा रहे हैं?\" बच्चा पूछता है, उस पहली सुबह जब दादा उन्हें बुलाते हैं।\n\nदादा अपने अंगूठे और तर्जनी के बीच एक बीज ऊपर उठाते हैं। यह छोटा है, सूखा है, लगभग कुछ भी नहीं — कुछ ऐसा जिसे बच्चा बिना ध्यान दिए वैक्यूम कर देता।\n\n\"टमाटर,\" दादा कहते हैं।\n\nबच्चे को समझ नहीं आता कि इसके लिए जल्दी उठने की क्या ज़रूरत है। बच्चे की देर तक सोने के बारे में बहुत अच्छी राय है।\n\nलेकिन दादा \"आओ\" कहते हैं, तो बच्चा उनके बगल में मिट्टी में बैठ जाता है।\n\nदादा दिखाते हैं कि दो उँगलियों को एक साथ दबाकर छेद कैसे बनाया जाता है — सीधे नीचे, ज़्यादा गहरा नहीं, ठीक इतना गहरा। वह बीज को छेद में ऐसे रखते हैं जैसे यह कोई नाज़ुक चीज़ हो, कुछ ऐसा जिसके साथ सावधान रहना ज़रूरी हो। वह उसे ढकते हैं। वह मिट्टी को धीरे से थपथपाते हैं।\n\n\"अब पानी,\" वह कहते हैं, और टीन का डिब्बा सौंप देते हैं।\n\n\"कितना?\"\n\n\"जब तक मिट्टी काली न हो जाए। जमने से पहले रुक जाना।\"\n\nबच्चा पानी देता है। सावधानी से। गमले के चारों ओर फैलते हुए घेरे में मिट्टी काली हो जाती है। पानी जमा नहीं होता।\n\n\"अच्छा,\" दादा कहते हैं।\n\nवह और कुछ नहीं कहते। वह अगले गमले की ओर बढ़ते हैं और फिर शुरू करते हैं।\n\nअगली सुबह, दादा कहते हैं आओ। उसकी अगली सुबह, आओ। उस महीने हर सुबह — आओ, इसे पकड़ो, पानी दो, बस इतना, रुको। वही शब्द वही क्रम में, एक छोटे, गंभीर गीत की तरह।\n\nबच्चा इसे काम के रूप में सोचने लगता है। यह काम है। बस दादा इसे बागवानी कहते हैं।\n\nमिट्टी में कुछ नहीं होता। बच्चा देखता है — पहले ज़्यादा ध्यान से, फिर आदत से, फिर बस इसलिए क्योंकि पानी गिरते समय देखने के लिए कुछ है। मिट्टी काली है। मिट्टी चुप है। मिट्टी कुछ करती नहीं दिखती।\n\nएक सुबह बच्चा कहता है: \"आप इसकी इतनी परवाह क्यों करते हैं?\"\n\nदादा तुरंत जवाब नहीं देते। वह दूसरे गमले में बीज दबाना खत्म करते हैं। वह उसे ढकते हैं। वह उसे थपथपाते हैं।\n\nफिर वह कहते हैं: \"तुम बीज को जल्दी नहीं कर सकते। तुम बस वहाँ हो सकते हो।\"\n\nबच्चे को नहीं पता इसका क्या मतलब है। ऐसा लगता है जैसे बड़े वह कहते हैं जब वह समझाना नहीं चाहते।\n\nतीन हफ़्ते बीतते हैं। बच्चे ने दिन गिनना बंद कर दिया है।\n\nऔर फिर एक सुबह — और यह एकदम साधारण सुबह है, हल्की रोशनी, रसोई की खिड़की से किसी चीज़ के पकने की खुशबू — बच्चा पहले गमले में नीचे देखता है और वहाँ एक रेखा है। एक पतला हरा धागा मिट्टी से ऊपर धकेलता हुआ। यह कल वहाँ नहीं थी। या शायद थी और बच्चे ने नहीं देखी। बच्चा अब नहीं जानता कि वह क्या देख रहा था और क्या नहीं देख रहा था।\n\nदादा जश्न नहीं मनाते। वह बस सिर हिलाते हैं, उस तरह जैसे वह तब सिर हिलाते हैं जब कुछ वैसे हो रहा है जैसे होना चाहिए।\n\nऔर दिन। एक पत्ता, मुट्ठी की तरह कसकर बंद, खुलता हुआ। फिर दो पत्ते, फिर चार, हरियाली की एक छोटी कॉलोनी। फिर एक फूल — पीला, नाखून से छोटा, हल्की सी खुशबू के साथ जिसका नाम बच्चे को नहीं पता लेकिन याद रखना चाहता है। फिर एक हल्का हरा बटन बनता है जहाँ फूल था। फिर बटन बढ़ता है। फिर — धीरे-धीरे, इतनी धीरे कि बच्चा वह पल पकड़ नहीं सकता जब यह होता है — हरा सुनहरा होता है, फिर नारंगी, फिर एक सुबह इतना भरा हुआ और इतना पूरा लाल कि किसी चित्र से लगता है।\n\nदादा उसे दोनों हाथों से तोड़ते हैं। अंदर ले जाते हैं। लकड़ी के काटने वाले तख्ते पर रखते हैं और सावधानी से बीच में काटते हैं, पूरा, और अंदर का हिस्सा बाहर जितना ही लाल है। वह उस पर नमक छिड़कते हैं — बस एक चुटकी — और एक आधा बच्चे को देते हैं।\n\nबच्चा एक काट लेता है।\n\nयह धूप से गर्म है। इसका स्वाद चमकीला और जटिल है — पहले मीठा, फिर गले के पीछे तेज़, और रस ठोड़ी पर बहता है और बच्चे को परवाह नहीं, बिल्कुल परवाह नहीं, बस रसोई में एक आधा खाया हुआ टमाटर पकड़े खड़ा रहता है और कुछ ऐसा समझता है जिसे शब्दों में रखना मुश्किल है।\n\nउन्होंने यह उगाया। उन्होंने यह एक साथ उगाया, अपने हाथों से, एक बीज से जो लगभग कुछ भी नहीं था।\n\nबच्चा दादा की ओर देखता है।\n\nदादा पहले से ही दरवाज़े पर हैं। पहले से ही बगीचे की ओर वापस जा रहे हैं। वह बिना देखे सीढ़ी से अपना पानी का डिब्बा उठाते हैं। वह अगले गमले की ओर बढ़ रहे हैं, अगली कतार, अगली छोटी चीज़ जिसे देखभाल चाहिए।\n\nबच्चा उन्हें मिट्टी में घुटनों के बल बैठते देखता है।\n\nउनके हाथ, वह खुरदरे और मौसम की मार खाए हाथ, मिट्टी में दबते हैं।\n\nऔर बच्चा समझ जाता है — टमाटरों के बारे में नहीं, सच में नहीं — बल्कि इसके बारे में कि किसी चीज़ के लिए हर सुबह आने का क्या मतलब है जिससे तुम प्यार करते हो। इसलिए नहीं कि किसी ने तुम्हें कहा। इसलिए नहीं कि यह आसान है। क्योंकि तुम वहाँ हो और उसे तुम्हारी ज़रूरत है और यही पूरी वजह है।\n\nदादा कभी \"मैं तुमसे प्यार करता हूँ\" नहीं कहते।\n\nलेकिन वह यह कहते आ रहे हैं, हर सुबह, मिट्टी में।"],
      gu: ["દાદા નો એક બગીચો છે.\n\nદર સવારે તે બહાર જાય છે. તે માટીમાં ઘૂંટણિયે બેસે છે. તેમના હાથ ઝાડની છાલ જેવા કાળા અને ખરબચડા છે.\n\n\"આવો,\" તે કહે છે.\n\nબાળક આવે છે.\n\nદાદા બતાવે છે કે નાનું છિદ્ર કેવી રીતે બનાવવું. એક બીજને કેવી રીતે અંદર દબાવવું. માટીને ધીમેથી કેવી રીતે બંધ કરવી, જાણે કંઈક ઓઢાડતા હોય.\n\n\"કેમ?\" બાળક પૂછે છે.\n\nદાદા માત્ર માટી તરફ ઈશારો કરે છે.\n\nદર રોજ, દાદા પાણી આપે છે. બહુ વધારે નહીં. બસ પૂરતું. બાળક ડબ્બો પકડે છે. પાણી ધીમેથી પડે છે.\n\nકશું થતું નથી.\n\nકશું થતું નથી.\n\nકશું થતું નથી.\n\nપછી એક સવારે — માટીમાં એક પાતળી લીલી રેખા.\n\nપછી એક પાન.\n\nપછી વધુ પાન.\n\nપછી એક ફૂલ.\n\nપછી — એક ટામેટું. પહેલા નાનું, પછી મોટું, પછી લાલ.\n\nદાદા તેને તોડે છે. તેને અડધો કાપે છે. એક અડધો બાળકને આપે છે.\n\nબાળક એક બાઈટ લે છે. તે સૂરજથી ગરમ છે. તેનો સ્વાદ કંઈક અગત્યનું છે એવો લાગે છે.\n\nબાળક દાદા તરફ જુએ છે.\n\nદાદા પહેલેથી જ આગલી હરોળમાં ઘૂંટણિયે બેઠા છે, વધુ બીજ દબાવી રહ્યા છે.\n\nબાળક ત્યાં ઊભો રહે છે, ટામેટું પકડીને.\n\nઅને કંઈક એવું સમજે છે જેના માટે હજુ કોઈ શબ્દો નથી.", "દાદા \"હું તને પ્રેમ કરું છું\" નથી કહેતા.\n\nતે કહે છે: \"આવ. આ પકડ.\"\n\nજ્યારે બાળક જાગે છે ત્યારે મોટેભાગે દાદા બગીચામાં ઘૂંટણિયે બેઠેલા હોય છે. તેમના કુર્તા ના ઘૂંટણ ધૂળવાળા છે. તેમના હાથ ભૂરા અને હવામાનથી ઘસાયેલા છે, સાંધાઓ લાકડાની નાની ગાંઠો જેવા છે. તે કડક દેખાય છે — તેમનો ચહેરો હંમેશા થોડો કડક દેખાય છે — પણ તે પોતાના શ્વાસ નીચે કંઈક ગણગણાવી રહ્યા છે.\n\n\"આપણે શું કરી રહ્યા છીએ?\" બાળક પૂછે છે.\n\nદાદા પોતાની સામેના નાના માટીના ગમલા તરફ ઈશારો કરે છે. \"આપણે વાવી રહ્યા છીએ.\"\n\nબાળકને નથી સમજાતું કે આ કેમ મહત્વનું છે. બાળકને કરવાનું ઘણું છે. કાર્ટૂન છે. સોફા પર સારી જગ્યા છે.\n\nપણ દાદા કહે છે આવ, તો બાળક આવે છે.\n\nદાદા બતાવે છે કે બે આંગળીઓથી માટીમાં છિદ્ર કેવી રીતે બનાવવું — બસ એટલું ઊંડું, વધારે નહીં. તે છિદ્રમાં બીજ મૂકે છે. એક બીજ. તે તેને એવી રીતે ઢાંકે છે જાણે તે કોઈ વસ્તુ હોય જે કાળજીપૂર્વક ઢાંકવા લાયક છે.\n\n\"હવે પાણી,\" દાદા કહે છે, અને ડબ્બો સોંપે છે.\n\n\"કેટલું?\"\n\n\"એટલું કે માટી કાળી થઈ જાય. એટલું નહીં કે પાણી ભરાય.\"\n\nબાળક પાણી આપે છે. માટી કાળી થાય છે. પાણી ભરાતું નથી.\n\n\"સારું,\" દાદા કહે છે.\n\nબસ આટલું જ કહે છે.\n\nબીજી સવારે: આવ. તેની બીજી સવારે: આવ.\n\nદર સવારે બાળક પાણીનો ડબ્બો પકડે છે અને પાણી માટી પર નરમ ફુવારાની જેમ પડે છે. દર સવારે, કંઈ અલગ દેખાતું નથી. માટી બસ ત્યાં બેઠી રહે છે, પાણીથી કાળી, શાંત.\n\nઅઠવાડિયા પસાર થાય છે. બાળક તેને ખાસ વસ્તુ તરીકે વિચારવાનું બંધ કરે છે અને તેને એવી વસ્તુ તરીકે વિચારવાનું શરૂ કરે છે જે બસ સવારે થાય છે, જેમ કે દાંત સાફ કરવા.\n\nઅને પછી એક સવારે — એક લીલી રેખા, દોરા જેવી પાતળી, માટીમાંથી ઉપર ઊઠતી.\n\nબાળક જોતો રહે છે. દાદા તેને મોટી વાત નથી બનાવતા. તે બસ માથું હલાવે છે.\n\nવધુ દિવસો. એક પાન ખૂલે છે. પછી બે. પછી એક નાનું પીળું ફૂલ જેમાં હળવી સુગંધ છે જેનું નામ બાળકને નથી ખબર.\n\nપછી એક ટામેટું — પહેલા ઝાંખું લીલું બટન, પછી ફૂલતું, પછી શરમાતું, પછી એક સવારે સંપૂર્ણ લાલ અને તેની ડાંડી પર ભારે.\n\nદાદા તેને બંને હાથોથી તોડે છે. તેને અંદર લઈ જાય છે. લાકડાના પાટિયા પર કાળજીપૂર્વક કાપે છે.\n\nતે બાળકને અડધો આપે છે.\n\nબાળક એક બાઈટ લે છે. તે સવારના સૂરજથી ગરમ છે. તેનો સ્વાદ ચમકતો અને થોડો મીઠો અને થોડો તીખો છે, અને રસ નીચે ટપકે છે અને બાળકને પરવા પણ નથી.\n\n\"આપણે આ ઉગાડ્યું,\" બાળક કહે છે.\n\n\"હા,\" દાદા કહે છે.\n\nબાળક તેમની તરફ જુએ છે — તેમના ધૂળવાળા ઘૂંટણ તરફ, તેમના ખરબચડા હાથો તરફ, તેમના ચહેરા તરફ જે હંમેશા થોડો કડક દેખાય છે પણ અત્યારે કડક નથી.\n\n\"દાદા — તમે આ દર રોજ કેમ કરો છો?\"\n\nદાદા ટામેટાનો બીજો અડધો ભાગ ઉપાડે છે. એક ક્ષણ માટે તેને જુએ છે.\n\nપછી તે બાળક તરફ જુએ છે.\n\n\"કાલે આવજે,\" તે કહે છે. \"હું તને બતાવીશ.\"\n\nઅને બાળક પહેલેથી જ જાણે છે કે જવાબ ટામેટાં વિશે નથી.", "દાદા \"હું તને પ્રેમ કરું છું\" નથી કહેતા. એક પણ વાર નહીં, ક્યારેય નહીં, એ રીતે નહીં જે રીતે બાળકે બીજાઓને કહેતા સાંભળ્યું છે — સહેલું અને ઝડપી, જાણે પ્રતિક્રિયા હોય, જાણે મોં હૃદય વગર કરતું હોય.\n\nદાદા કહે છે: \"આવ. આ પકડ.\"\n\nજ્યારે બાળક જાગે છે ત્યારે મોટેભાગે તે પહેલેથી જ બહાર હોય છે. ઘરની પાછળના બગીચાની પટ્ટીમાં પહેલેથી જ ઘૂંટણિયે બેઠેલા — ચાર માટીના ગમલા, સાંકડા પાનવાળું કંઈક, લીલોતરીની ગૂંચ જેનું નામ બાળકને હજુ નથી ખબર. તેમનો કુર્તા આછો પીળો છે અને જ્યારે બાળક તેમને શોધે છે ત્યારે ઘૂંટણ પર હંમેશા ધૂળ હોય છે. તેમના વાળ માથેથી સ્પષ્ટ, નિશ્ચિત રેખામાં પાછળ હટેલા છે, જાણે કોઈ નિર્ણય કર્યો હોય. તેમના હાથ ભૂરા અને હવામાનથી ઘસાયેલા છે, સાંધા લાકડાની નાની, સખત ગાંઠો જેવા.\n\nતેમનો ચહેરો કડક છે. સામાન્ય રીતે કડક હોય છે. બાળક પહેલા વિચારતો કે આનો અર્થ કંઈક ખોટું છે.\n\n\"આપણે શું વાવી રહ્યા છીએ?\" બાળક પૂછે છે, એ પહેલી સવારે જ્યારે દાદા તેને બોલાવે છે.\n\nદાદા પોતાના અંગૂઠા અને તર્જની વચ્ચે એક બીજ ઊંચું કરે છે. તે નાનું છે, સૂકું છે, લગભગ કશું જ નહીં — કંઈક જે બાળક ધ્યાન વગર વેક્યુમ કરી દે.\n\n\"ટામેટું,\" દાદા કહે છે.\n\nબાળકને નથી સમજાતું કે આના માટે વહેલા ઊઠવાની શી જરૂર છે. બાળકને મોડું સૂવા વિશે ખૂબ સારા મંતવ્યો છે.\n\nપણ દાદા કહે છે આવ, તો બાળક તેમની બાજુમાં માટીમાં બેસી જાય છે.\n\nદાદા બતાવે છે કે બે આંગળીઓ સાથે દબાવીને છિદ્ર કેવી રીતે બનાવવું — સીધું નીચે, વધારે ઊંડું નહીં, બરાબર આટલું ઊંડું. તે છિદ્રમાં બીજ મૂકે છે જાણે તે કંઈક નાજુક હોય, કંઈક જેની સાથે કાળજી રાખવા જેવી હોય. તે તેને ઢાંકે છે. તે માટીને ધીમેથી થપથપાવે છે.\n\n\"હવે પાણી,\" તે કહે છે, અને ટીનનો ડબ્બો સોંપે છે.\n\n\"કેટલું?\"\n\n\"જ્યાં સુધી માટી કાળી ન થાય. પાણી ભરાય તે પહેલા બંધ કરજે.\"\n\nબાળક પાણી આપે છે. કાળજીપૂર્વક. ગમલાની ચારે બાજુ ફેલાતા વર્તુળમાં માટી કાળી થાય છે. પાણી ભરાતું નથી.\n\n\"સારું,\" દાદા કહે છે.\n\nતે બીજું કંઈ નથી કહેતા. તે આગલા ગમલા તરફ જાય છે અને ફરી શરૂ કરે છે.\n\nબીજી સવારે, દાદા કહે છે આવ. તેની બીજી સવારે, આવ. તે મહિને દર સવારે — આવ, આ પકડ, પાણી આપ, બસ આટલું, બંધ કર. એ જ શબ્દો એ જ ક્રમમાં, એક નાના, ગંભીર ગીતની જેમ.\n\nબાળક તેને કામ તરીકે વિચારવાનું શરૂ કરે છે. તે કામ છે. બસ દાદા તેને બાગકામ કહે છે.\n\nમાટીમાં કંઈ થતું નથી. બાળક તપાસે છે — પહેલા વધુ કાળજીપૂર્વક, પછી આદતથી, પછી માત્ર એટલા માટે કે પાણી પડતું હોય ત્યારે જોવા માટે કંઈક છે. માટી કાળી છે. માટી શાંત છે. માટી કંઈ કરતી દેખાતી નથી.\n\nએક સવારે બાળક કહે છે: \"તમે આની આટલી પરવા કેમ કરો છો?\"\n\nદાદા તરત જવાબ નથી આપતા. તે બીજા ગમલામાં બીજ દબાવવાનું પૂરું કરે છે. તે તેને ઢાંકે છે. તે તેને થપથપાવે છે.\n\nપછી તે કહે છે: \"તું બીજને ઉતાવળ ન કરી શકે. તું માત્ર ત્યાં હોઈ શકે.\"\n\nબાળકને નથી ખબર આનો અર્થ શું છે. એવું લાગે છે જે મોટાઓ કહે છે જ્યારે તેઓ સમજાવવા નથી માગતા.\n\nત્રણ અઠવાડિયા પસાર થાય છે. બાળકે દિવસો ગણવાનું બંધ કર્યું છે.\n\nઅને પછી એક સવારે — અને તે એકદમ સામાન્ય સવાર છે, હળવો પ્રકાશ, રસોડાની બારીમાંથી કંઈક રંધાવાની સુગંધ — બાળક પહેલા ગમલામાં નીચે જુએ છે અને ત્યાં એક રેખા છે. એક પાતળો લીલો દોરો માટીમાંથી ઉપર ધકેલતો. તે ગઈકાલે ત્યાં નહોતી. અથવા કદાચ હતી અને બાળકે જોઈ નહોતી. બાળકને હવે ખબર નથી કે તે શું જોઈ રહ્યું હતું અને શું નહોતું જોઈ રહ્યું.\n\nદાદા ઉજવણી નથી કરતા. તે માત્ર માથું હલાવે છે, એ રીતે જે રીતે તે હલાવે છે જ્યારે કંઈક એમ થઈ રહ્યું હોય જેમ થવું જોઈએ.\n\nવધુ દિવસો. એક પાન, મુઠ્ઠીની જેમ ચુસ્ત બંધ, ખૂલતું. પછી બે પાન, પછી ચાર, લીલોતરીની નાની વસાહત. પછી એક ફૂલ — પીળું, નખ કરતા નાનું, હળવી સુગંધ સાથે જેનું નામ બાળકને નથી ખબર પણ યાદ રાખવા માગે છે. પછી ફૂલ હતું ત્યાં એક ઝાંખું લીલું બટન બને છે. પછી બટન ફૂલે છે. પછી — ધીમેથી, એટલી ધીમેથી કે બાળક પળ પકડી શકતો નથી જ્યારે તે થાય છે — લીલું સોનેરી થાય છે, પછી નારંગી, પછી એક સવારે એટલું ભરપૂર અને એટલું સંપૂર્ણ લાલ કે ચિત્રમાંથી હોય એવું લાગે છે.\n\nદાદા તેને બંને હાથોથી તોડે છે. અંદર લઈ જાય છે. લાકડાના કાપવાના પાટિયા પર મૂકે છે અને કાળજીપૂર્વક અડધામાં કાપે છે, સંપૂર્ણ, અને અંદરનો ભાગ બહાર જેટલો જ લાલ છે. તે તેના પર મીઠું છાંટે છે — બસ એક ચપટી — અને એક અડધો બાળકને આપે છે.\n\nબાળક એક બાઈટ લે છે.\n\nતે સૂરજથી ગરમ છે. તેનો સ્વાદ ચમકતો અને જટિલ છે — પહેલા મીઠો, પછી ગળાના પાછળના ભાગે તીખો, અને રસ ચીન પર નીચે ટપકે છે અને બાળકને પરવા નથી, જરા પણ પરવા નથી, બસ રસોડામાં અડધું ખાધેલું ટામેટું પકડીને ઊભો રહે છે અને કંઈક સમજે છે જે શબ્દોમાં મૂકવું મુશ્કેલ છે.\n\nતેમણે આ ઉગાડ્યું. તેમણે આ સાથે મળીને ઉગાડ્યું, પોતાના હાથોથી, એક બીજમાંથી જે લગભગ કશું જ નહોતું.\n\nબાળક દાદા તરફ ઉપર જુએ છે.\n\nદાદા પહેલેથી જ બારણે છે. પહેલેથી જ બગીચા તરફ પાછા જઈ રહ્યા છે. તે પગથિયા પરથી પોતાનો પાણીનો ડબ્બો જોયા વગર ઉપાડે છે. તે આગલા ગમલા તરફ જઈ રહ્યા છે, આગલી હરોળ, આગલી નાની વસ્તુ જેને દેખભાળ જોઈએ.\n\nબાળક તેમને માટીમાં ઘૂંટણિયે બેસતા જુએ છે.\n\nતેમના હાથ, એ ખરબચડા અને હવામાનથી ઘસાયેલા હાથ, માટીમાં દબાય છે.\n\nઅને બાળક સમજે છે — ટામેટાં વિશે નહીં, ખરેખર નહીં — પણ એ વિશે કે કોઈ વસ્તુ માટે દર સવારે હાજર થવાનો શો અર્થ છે જેને તું પ્રેમ કરે છે. એટલા માટે નહીં કે કોઈએ તને કહ્યું. એટલા માટે નહીં કે તે સહેલું છે. કારણ કે તું ત્યાં છે અને તેને તારી જરૂર છે અને એ જ આખું કારણ છે.\n\nદાદા ક્યારેય \"હું તને પ્રેમ કરું છું\" નથી કહેતા.\n\nપણ તે કહેતા આવ્યા છે, દર સવારે, માટીમાં."],
      es: ["Dada tiene un jardín.\n\nCada mañana sale afuera. Se arrodilla en la tierra. Sus manos son oscuras y ásperas, como corteza de árbol.\n\n\"Ven,\" dice.\n\nEl niño viene.\n\nDada le muestra cómo hacer un pequeño hoyo. Cómo presionar una semilla adentro. Cómo cerrar la tierra suavemente, como arropando algo.\n\n\"¿Por qué?\" pregunta el niño.\n\nDada solo señala la tierra.\n\nCada día, Dada riega. No demasiado. Justo lo suficiente. El niño sostiene la regadera. El agua cae suave.\n\nNo pasa nada.\n\nNo pasa nada.\n\nNo pasa nada.\n\nEntonces una mañana — una fina línea verde en la tierra.\n\nLuego una hoja.\n\nLuego más hojas.\n\nLuego una flor.\n\nLuego — un tomate. Pequeño, luego más grande, luego rojo.\n\nDada lo recoge. Lo corta por la mitad. Le da una mitad al niño.\n\nEl niño le da un mordisco. Está tibio por el sol. Sabe a algo importante.\n\nEl niño mira a Dada.\n\nDada ya está arrodillado en la siguiente fila, presionando más semillas adentro.\n\nEl niño se queda ahí parado, sosteniendo el tomate.\n\nY entiende algo que aún no tiene palabras.", "Dada no dice te quiero.\n\nDice: \"Ven. Sostén esto.\"\n\nLa mayoría de las mañanas, ya está arrodillado en el jardín cuando el niño se despierta. Su kurta está polvoriento en las rodillas. Sus manos son morenas y curtidas, los nudillos como pequeños nudos de madera. Se ve serio — su cara siempre se ve un poco seria — pero está tarareando algo en voz baja.\n\n\"¿Qué estamos haciendo?\" pregunta el niño.\n\nDada señala la pequeña maceta de barro frente a él. \"Estamos plantando.\"\n\nEl niño no ve por qué esto importa. El niño tiene cosas que hacer. Hay dibujos animados. Hay el buen lugar en el sofá.\n\nPero Dada dice ven, así que el niño viene.\n\nDada le muestra cómo hacer un hoyo en la tierra con dos dedos — solo lo suficientemente profundo, no más. Coloca una semilla en el hoyo. Una semilla. La cubre como si fuera algo que merece ser cubierto con cuidado.\n\n\"Ahora agua,\" dice Dada, y le entrega la regadera.\n\n\"¿Cuánta?\"\n\n\"La suficiente para que la tierra esté oscura. No tanta que se encharque.\"\n\nEl niño riega. La tierra se pone oscura. No hay charco.\n\n\"Bien,\" dice Dada.\n\nEso es todo lo que dice.\n\nA la mañana siguiente: ven. La mañana después: ven.\n\nCada mañana el niño sostiene la regadera y el agua cae en una suave lluvia silbante sobre la tierra. Cada mañana, nada se ve diferente. La tierra simplemente está ahí, oscura del riego, callada.\n\nPasan semanas. El niño deja de pensar en esto como algo especial y empieza a pensarlo como algo que simplemente pasa por la mañana, como cepillarse los dientes.\n\nY entonces una mañana — una línea verde, fina como un hilo, subiendo a través de la tierra.\n\nEl niño se queda mirando. Dada no hace gran cosa de ello. Solo asiente.\n\nMás días. Una hoja se despliega. Luego dos. Luego una pequeña flor amarilla que huele tenuemente a algo que el niño no puede nombrar.\n\nLuego un tomate — primero un botón verde pálido, luego hinchándose, luego sonrojándose, luego una mañana completamente rojo y pesado en su tallo.\n\nDada lo recoge con ambas manos. Lo lleva adentro. Lo corta con cuidado sobre la tabla de madera.\n\nLe da al niño una mitad.\n\nEl niño le da un mordisco. Está tibio por el sol de la mañana. Sabe brillante y un poco dulce y un poco fuerte, y el jugo le corre y al niño ni le importa.\n\n\"Nosotros cultivamos esto,\" dice el niño.\n\n\"Sí,\" dice Dada.\n\nEl niño lo mira — sus rodillas polvorientas, sus manos ásperas, su cara que siempre se ve un poco seria pero ahora no lo está.\n\n\"Dada — ¿por qué haces esto todos los días?\"\n\nDada recoge la segunda mitad del tomate. La mira por un momento.\n\nLuego mira al niño.\n\n\"Ven mañana,\" dice. \"Te mostraré.\"\n\nY el niño ya sabe que la respuesta no es sobre tomates.", "Dada no dice te quiero. Ni una vez, jamás, no de la manera en que el niño ha escuchado a otras personas decirlo — fácil y rápido, como un reflejo, como algo que la boca hace sin que el corazón tenga que intentarlo.\n\nDada dice: \"Ven. Sostén esto.\"\n\nLa mayoría de las mañanas, ya está afuera cuando el niño se despierta. Ya arrodillado en la franja de jardín detrás de la casa — cuatro macetas de barro, una hilera de algo con hojas estrechas, una maraña de verde que el niño aún no puede nombrar. Su kurta es amarillo pálido y siempre está polvoriento en las rodillas para cuando el niño lo encuentra. Su pelo retrocede de su frente en una línea pulcra y definida, como si hubiera tomado una decisión. Sus manos son morenas y curtidas, los nudillos como pequeños y duros nudos de madera.\n\nSu cara es seria. Suele ser seria. El niño solía pensar que esto significaba que algo andaba mal.\n\n\"¿Qué estamos plantando?\" pregunta el niño, la primera mañana que Dada los llama afuera.\n\nDada sostiene una semilla entre su pulgar e índice. Es diminuta, seca, casi nada — algo que el niño aspiraría sin darse cuenta.\n\n\"Tomate,\" dice Dada.\n\nEl niño no entiende por qué esto requiere levantarse temprano. El niño tiene opiniones muy buenas sobre dormir hasta tarde.\n\nPero Dada dice ven, así que el niño se agacha en la tierra a su lado.\n\nDada le muestra cómo hacer un hoyo con dos dedos presionados juntos — recto hacia abajo, no demasiado profundo, exactamente así de profundo. Coloca la semilla en el hoyo como si fuera algo frágil, algo que vale la pena tratar con cuidado. La cubre. Da palmaditas a la tierra para aplanarla, suavemente.\n\n\"Ahora agua,\" dice, entregando la regadera de hojalata.\n\n\"¿Cuánta?\"\n\n\"Hasta que la tierra esté oscura. Para antes de que se encharque.\"\n\nEl niño riega. Con cuidado. La tierra se pone oscura en un círculo que se extiende alrededor de la maceta. No hay charco.\n\n\"Bien,\" dice Dada.\n\nNo dice nada más. Pasa a la siguiente maceta y empieza de nuevo.\n\nA la mañana siguiente, Dada dice ven. La mañana siguiente, ven. Cada mañana de ese mes — ven, sostén esto, agua, suficiente, para. Las mismas palabras en el mismo orden, como una pequeña canción seria.\n\nEl niño empieza a pensar en esto como quehaceres. Son quehaceres. Es solo que Dada lo llama jardinería.\n\nNo pasa nada en la tierra. El niño revisa — más cuidadosamente al principio, luego por costumbre, luego solo porque es algo que mirar mientras cae el agua. La tierra está oscura. La tierra está callada. La tierra no parece estar haciendo nada.\n\nUna mañana el niño dice: \"¿Por qué te importa tanto esto?\"\n\nDada no responde inmediatamente. Termina de presionar una semilla en la segunda maceta. La cubre. Da palmaditas para aplanarla.\n\nLuego dice: \"No puedes apurar una semilla. Solo puedes estar ahí.\"\n\nEl niño no sabe qué significa eso. Suena como algo que los adultos dicen cuando no quieren explicar.\n\nPasan tres semanas. El niño ha dejado de contar los días.\n\nY entonces una mañana — y es una mañana perfectamente ordinaria, luz pálida, el olor de algo cocinándose desde la ventana de la cocina — el niño mira hacia abajo en la primera maceta y hay una línea. Un fino hilo verde empujando hacia arriba a través de la tierra. No estaba ahí ayer. O quizá estaba ahí y el niño no lo vio. El niño ya no está seguro de qué ha estado viendo y qué no.\n\nDada no celebra. Solo asiente, de la manera en que asiente cuando algo está sucediendo como se supone que debe suceder.\n\nMás días. Una hoja, doblada apretada como un puño, abriéndose. Luego dos hojas, luego cuatro, una pequeña colonia de verde. Luego una flor — amarilla, más pequeña que una uña, con un olor tenue que el niño no puede nombrar pero quiere recordar. Luego un botón verde pálido formándose donde estaba la flor. Luego el botón hinchándose. Luego — lentamente, tan lentamente que el niño no puede atrapar el momento en que sucede — el verde volviéndose dorado, luego naranja, luego una mañana un rojo tan pleno y tan completo que parece algo de una pintura.\n\nDada lo recoge con ambas manos. Lo lleva adentro. Lo coloca sobre la tabla de madera para cortar y lo rebana cuidadosamente por la mitad, todo el camino, y el interior es tan rojo como el exterior. Le pone sal — solo una pizca — y le da una mitad al niño.\n\nEl niño le da un mordisco.\n\nEstá tibio por el sol. Sabe brillante y complicado — dulce primero, luego fuerte al fondo de la garganta, y el jugo le corre por la barbilla y al niño no le importa, no le importa en absoluto, simplemente se queda ahí en la cocina sosteniendo un tomate a medio comer y entendiendo algo que es difícil poner en palabras.\n\nEllos cultivaron esto. Cultivaron esto juntos, con sus propias manos, de una semilla que era casi nada.\n\nEl niño mira hacia arriba a Dada.\n\nDada ya está en la puerta. Ya se dirige de regreso al jardín. Recoge su regadera del escalón sin mirarla. Se mueve hacia la siguiente maceta, la siguiente fila, la siguiente pequeña cosa que necesita cuidado.\n\nEl niño lo ve arrodillarse en la tierra.\n\nSus manos, esas manos ásperas y curtidas, se presionan en la tierra.\n\nY el niño entiende — no sobre tomates, no realmente — sino sobre lo que significa aparecer cada mañana por algo que amas. No porque alguien te lo dijo. No porque sea fácil. Porque tú estás ahí y eso te necesita y esa es toda la razón.\n\nDada nunca dice te quiero.\n\nPero lo ha estado diciendo, cada mañana, en la tierra."],
      fr: ["Dada a un jardin.\n\nChaque matin, il sort. Il s'agenouille dans la terre. Ses mains sont sombres et rugueuses, comme l'écorce d'un arbre.\n\n\"Viens,\" dit-il.\n\nL'enfant vient.\n\nDada montre comment faire un petit trou. Comment presser une graine à l'intérieur. Comment refermer la terre doucement, comme on borde quelque chose.\n\n\"Pourquoi?\" demande l'enfant.\n\nDada montre simplement la terre du doigt.\n\nChaque jour, Dada arrose. Pas trop. Juste assez. L'enfant tient l'arrosoir. L'eau tombe doucement.\n\nRien ne se passe.\n\nRien ne se passe.\n\nRien ne se passe.\n\nPuis un matin — une fine ligne verte dans la terre.\n\nPuis une feuille.\n\nPuis plus de feuilles.\n\nPuis une fleur.\n\nPuis — une tomate. Petite, puis plus grande, puis rouge.\n\nDada la cueille. La coupe en deux. Donne une moitié à l'enfant.\n\nL'enfant mord dedans. C'est chaud du soleil. Ça a le goût de quelque chose d'important.\n\nL'enfant regarde Dada.\n\nDada est déjà agenouillé au rang suivant, pressant d'autres graines à l'intérieur.\n\nL'enfant reste là, tenant la tomate.\n\nEt comprend quelque chose qui n'a pas encore de mots.", "Dada ne dit pas je t'aime.\n\nIl dit: \"Viens. Tiens ça.\"\n\nLa plupart des matins, il est déjà agenouillé dans le jardin quand l'enfant se réveille. Son kurta est poussiéreux aux genoux. Ses mains sont brunes et tannées, les jointures comme de petits nœuds de bois. Il a l'air sévère — son visage a toujours l'air un peu sévère — mais il fredonne quelque chose sous son souffle.\n\n\"Qu'est-ce qu'on fait?\" demande l'enfant.\n\nDada montre le petit pot en argile devant lui. \"On plante.\"\n\nL'enfant ne voit pas pourquoi cela importe. L'enfant a des choses à faire. Il y a des dessins animés. Il y a la bonne place sur le canapé.\n\nMais Dada dit viens, alors l'enfant vient.\n\nDada montre comment faire un trou dans la terre avec deux doigts — juste assez profond, pas plus. Il place une graine dans le trou. Une graine. Il la recouvre comme si c'était quelque chose qui mérite d'être recouvert avec soin.\n\n\"Maintenant arrose,\" dit Dada, et lui tend l'arrosoir.\n\n\"Combien?\"\n\n\"Assez pour que la terre soit sombre. Pas assez pour que ça fasse une flaque.\"\n\nL'enfant arrose. La terre devient sombre. Pas de flaque.\n\n\"Bien,\" dit Dada.\n\nC'est tout ce qu'il dit.\n\nLe lendemain matin: viens. Le matin d'après: viens.\n\nChaque matin, l'enfant tient l'arrosoir et l'eau tombe en une douce pluie sifflante sur la terre. Chaque matin, rien ne semble différent. La terre reste juste là, sombre d'avoir été arrosée, silencieuse.\n\nLes semaines passent. L'enfant cesse d'y penser comme à quelque chose de spécial et commence à y penser comme à quelque chose qui arrive simplement le matin, comme se brosser les dents.\n\nEt puis un matin — une ligne verte, fine comme un fil, montant à travers la terre.\n\nL'enfant fixe. Dada n'en fait pas une grande affaire. Il hoche simplement la tête.\n\nPlus de jours. Une feuille se déplie. Puis deux. Puis une petite fleur jaune qui sent vaguement quelque chose que l'enfant ne peut pas nommer.\n\nPuis une tomate — d'abord un bouton vert pâle, puis qui gonfle, puis qui rougit, puis un matin entièrement rouge et lourde sur sa tige.\n\nDada la cueille à deux mains. La porte à l'intérieur. La coupe soigneusement sur la planche en bois.\n\nIl donne à l'enfant la moitié.\n\nL'enfant mord dedans. C'est chaud du soleil du matin. Ça a un goût vif et un peu sucré et un peu acide, et le jus coule et l'enfant s'en moque.\n\n\"On a fait pousser ça,\" dit l'enfant.\n\n\"Oui,\" dit Dada.\n\nL'enfant le regarde — ses genoux poussiéreux, ses mains rugueuses, son visage qui a toujours l'air un peu sévère mais ne l'est pas en ce moment.\n\n\"Dada — pourquoi fais-tu ça tous les jours?\"\n\nDada ramasse la seconde moitié de la tomate. La regarde un moment.\n\nPuis il regarde l'enfant.\n\n\"Viens demain,\" dit-il. \"Je te montrerai.\"\n\nEt l'enfant sait déjà que la réponse n'est pas à propos des tomates.", "Dada ne dit pas je t'aime. Pas une seule fois, jamais, pas de la façon dont l'enfant a entendu d'autres personnes le dire — facile et rapide, comme un réflexe, comme quelque chose que la bouche fait sans que le cœur ait à essayer.\n\nDada dit: \"Viens. Tiens ça.\"\n\nLa plupart des matins, il est déjà dehors quand l'enfant se réveille. Déjà agenouillé dans la bande de jardin derrière la maison — quatre pots en argile, une rangée de quelque chose aux feuilles étroites, un enchevêtrement de vert que l'enfant ne peut pas encore nommer. Son kurta est jaune pâle et toujours poussiéreux aux genoux au moment où l'enfant le trouve. Ses cheveux reculent de son front en une ligne nette et définie, comme s'ils avaient pris une décision. Ses mains sont brunes et tannées, les jointures comme de petits nœuds durs de bois.\n\nSon visage est sévère. Il est généralement sévère. L'enfant pensait que cela signifiait que quelque chose n'allait pas.\n\n\"Qu'est-ce qu'on plante?\" demande l'enfant, le premier matin où Dada les appelle dehors.\n\nDada tient une graine entre son pouce et son index. Elle est minuscule, sèche, presque rien — quelque chose que l'enfant aspirerait sans le remarquer.\n\n\"Tomate,\" dit Dada.\n\nL'enfant ne comprend pas pourquoi cela demande de se lever tôt. L'enfant a de très bonnes opinions sur le fait de faire la grasse matinée.\n\nMais Dada dit viens, alors l'enfant s'accroupit dans la terre à côté de lui.\n\nDada montre comment faire un trou avec deux doigts pressés ensemble — droit vers le bas, pas trop profond, exactement aussi profond. Il place la graine dans le trou comme si c'était quelque chose de fragile, quelque chose qui mérite qu'on prenne soin. Il la recouvre. Il tapote la terre à plat, doucement.\n\n\"Maintenant arrose,\" dit-il, en tendant l'arrosoir en fer-blanc.\n\n\"Combien?\"\n\n\"Jusqu'à ce que la terre soit sombre. Arrête avant que ça ne fasse une flaque.\"\n\nL'enfant arrose. Avec soin. La terre devient sombre dans un cercle qui s'étend autour du pot. Pas de flaque.\n\n\"Bien,\" dit Dada.\n\nIl ne dit rien d'autre. Il passe au pot suivant et recommence.\n\nLe lendemain matin, Dada dit viens. Le matin d'après, viens. Chaque matin de ce mois — viens, tiens ça, arrose, assez, arrête. Les mêmes mots dans le même ordre, comme une petite chanson sérieuse.\n\nL'enfant commence à y penser comme à des corvées. Ce sont des corvées. Sauf que Dada appelle ça du jardinage.\n\nRien ne se passe dans la terre. L'enfant vérifie — plus soigneusement au début, puis par habitude, puis simplement parce que c'est quelque chose à regarder pendant que l'eau tombe. La terre est sombre. La terre est silencieuse. La terre ne semble rien faire.\n\nUn matin l'enfant dit: \"Pourquoi tu te soucies tant de ça?\"\n\nDada ne répond pas immédiatement. Il finit de presser une graine dans le deuxième pot. Il la recouvre. Il la tapote à plat.\n\nPuis il dit: \"Tu ne peux pas presser une graine. Tu peux seulement être là.\"\n\nL'enfant ne sait pas ce que cela signifie. Cela sonne comme quelque chose que les adultes disent quand ils ne veulent pas expliquer.\n\nTrois semaines passent. L'enfant a arrêté de compter les jours.\n\nEt puis un matin — et c'est un matin parfaitement ordinaire, lumière pâle, l'odeur de quelque chose qui cuit depuis la fenêtre de la cuisine — l'enfant regarde dans le premier pot et il y a une ligne. Un mince fil vert qui pousse à travers la terre. Il n'était pas là hier. Ou peut-être qu'il était là et l'enfant ne l'a pas vu. L'enfant n'est plus sûr de ce qu'il a vu ou pas vu.\n\nDada ne célèbre pas. Il hoche juste la tête, de la façon dont il hoche la tête quand quelque chose se passe comme il est censé se passer.\n\nPlus de jours. Une feuille, pliée serrée comme un poing, se déplie. Puis deux feuilles, puis quatre, une petite colonie de vert. Puis une fleur — jaune, plus petite qu'un ongle, avec une odeur faible que l'enfant ne peut pas nommer mais veut se rappeler. Puis un bouton vert pâle se forme là où était la fleur. Puis le bouton qui gonfle. Puis — lentement, si lentement que l'enfant ne peut pas attraper le moment où cela se produit — le vert qui devient doré, puis orange, puis un matin un rouge si plein et si complet qu'il ressemble à quelque chose d'une peinture.\n\nDada la cueille à deux mains. La porte à l'intérieur. La pose sur la planche à découper en bois et la tranche soigneusement en deux, de part en part, et l'intérieur est aussi rouge que l'extérieur. Il la sale — juste une pincée — et donne une moitié à l'enfant.\n\nL'enfant mord dedans.\n\nC'est chaud du soleil. Ça a un goût vif et compliqué — sucré d'abord, puis acide au fond de la gorge, et le jus coule sur le menton et l'enfant s'en moque, s'en moque complètement, reste juste là dans la cuisine tenant une tomate à moitié mangée et comprend quelque chose qui est difficile à mettre en mots.\n\nIls ont fait pousser ça. Ils ont fait pousser ça ensemble, de leurs propres mains, à partir d'une graine qui n'était presque rien.\n\nL'enfant lève les yeux vers Dada.\n\nDada est déjà à la porte. Déjà en route vers le jardin. Il ramasse son arrosoir sur la marche sans le regarder. Il se dirige vers le pot suivant, la rangée suivante, la prochaine petite chose qui a besoin de soin.\n\nL'enfant le regarde s'agenouiller dans la terre.\n\nSes mains, ces mains rugueuses et tannées, s'enfoncent dans la terre.\n\nEt l'enfant comprend — pas à propos des tomates, pas vraiment — mais à propos de ce que signifie se présenter chaque matin pour quelque chose qu'on aime. Pas parce que quelqu'un te l'a dit. Pas parce que c'est facile. Parce que tu es là et que ça a besoin de toi et c'est toute la raison.\n\nDada ne dit jamais je t'aime.\n\nMais il l'a dit, chaque matin, dans la terre."]
