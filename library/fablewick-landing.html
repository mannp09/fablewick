    levels: {
      en: ["Moss was a small hedgehog.\n\nMoss looked up a lot.\n\nMoss looked up at the sky in the day. Moss looked up at the sky at night.\n\nThe night sky had stars. So many stars.\n\n\"What are stars?\" said Moss.\n\nMoss asked the old owl.\n\n\"Stars are very far away,\" said the owl. \"And very, very old.\"\n\n\"How old?\" said Moss.\n\n\"Older than me. Older than this tree. Older than this forest.\"\n\nMoss thought about this.\n\n\"Are the stars looking back at me?\" said Moss.\n\nThe owl blinked slowly. \"I do not know,\" said the owl. \"That is a good question.\"\n\n\"Will you tell me when you find out?\" said Moss.\n\n\"I do not think I will ever find out,\" said the owl, smiling. \"That is the kind of question that stays a question.\"\n\nMoss did not understand. Not yet.\n\nBut Moss sat in the cool grass and looked up at the stars. And the stars looked, maybe, a little less far away.\n\nMoss waved one small paw at the sky.\n\nJust in case.", "Moss was a small hedgehog who lived under the roots of an old apple tree, and Moss was almost always looking up.\n\nIn the morning, Moss looked at the clouds. In the afternoon, Moss looked at the leaves. But it was the night sky — the deep, dark, star-spilled night sky — that Moss loved most.\n\nMoss had so many questions about the stars.\n\nOne quiet evening, Moss waddled out to find the old owl, who was, as usual, sitting on the lowest branch of a birch tree, thinking.\n\n\"Owl,\" said Moss. \"What are stars?\"\n\nThe owl turned its great round head slowly. \"Stars,\" said the owl, \"are very far away. And very, very old.\"\n\n\"How far?\" asked Moss.\n\n\"Farther than you could walk in a hundred lifetimes,\" said the owl.\n\n\"And how old?\"\n\n\"Older than me. Older than this birch. Older, maybe, than this whole forest. Some of the stars you see tonight have been shining for so long that the light is only just now arriving.\"\n\nMoss sat down in the cool grass to think about this.\n\nA piece of moonlight slid across Moss's spines.\n\n\"Owl,\" said Moss, finally. \"Are the stars looking back at me?\"\n\nThe owl was quiet for a long time. The owl blinked once, slowly.\n\n\"I do not know,\" said the owl. \"That is an excellent question. I do not have an answer.\"\n\n\"Will you tell me when you find out?\" said Moss.\n\nThe owl made a small, kind sound that was almost a laugh.\n\n\"Moss,\" the owl said, \"some questions stay questions. They do not have answers. You ask them not to find out the answer, but because the asking is the good thing. The asking is what makes you look up.\"\n\nMoss thought about this. Moss thought hard.\n\nMoss was not entirely sure Moss understood. Not yet, anyway. But Moss looked back up at the sky, and there were so many stars — more than Moss could count, more than there were leaves on the old apple tree, more than there were words Moss knew.\n\nAnd it was true, Moss thought, that even without an answer, looking up felt good. Looking up felt like a kind of belonging. Looking up made Moss feel small in a way that wasn't sad — just small, the way the moon is small in a giant sky, the way a bright thing is small in a great dark.\n\nMoss lifted one small paw and waved at the stars.\n\nJust in case.\n\nThe stars, as far as Moss could tell, did not wave back. But they did keep shining, very steady, the way they had been shining for longer than anyone could remember.\n\nThat was enough, for tonight.\n\nMoss waddled back home under the apple tree, and dreamed, for the first time, of a road made of stars.\n\nMoss decided, in the morning, that there would be more questions tomorrow.", "Moss was a small hedgehog who lived in a snug burrow beneath the roots of an old apple tree, on the edge of the forest where the meadow began. Moss was, by hedgehog standards, unusual: Moss was almost always looking up.\n\nIn the morning, when most of the burrow was still asleep, Moss watched the way the light came down through the leaves in green slants. In the afternoon, Moss watched the clouds change shape — into dogs, into ships, into other clouds. In the evening, Moss watched the sky turn pink and then violet and then, finally, deep blue.\n\nBut it was the deep, dark, star-spilled night that Moss loved best. And Moss had, by Moss's count, exactly four hundred and twelve questions about the night sky, none of which Moss had ever asked out loud.\n\nOne quiet evening, when the stars were unusually thick and the moon was a thin silver curl, Moss waddled out across the meadow to find the old owl.\n\nThe owl was, as the owl almost always was, sitting on the lowest branch of a birch tree, looking exactly like a small, feathered thought.\n\n\"Owl,\" said Moss, gathering courage. \"I have a question.\"\n\nThe owl turned its enormous round head, slowly, the way owls do. \"Moss,\" said the owl, \"you may ask.\"\n\n\"What are stars?\"\n\nThe owl was quiet for a moment. The owl seemed to be choosing words carefully.\n\n\"Stars,\" said the owl, \"are very, very far away. And very, very old. Far enough that no one — no owl, no hedgehog, no anyone — has ever traveled to one. Old enough that some of the stars you are looking at tonight have been shining for so long that the light only just now arrived. The star itself may not even still be there. You are seeing where it used to be.\"\n\nMoss thought about this. Moss thought about it the way you might think about a riddle you suddenly realize is a real thing.\n\n\"Owl,\" said Moss, finally, in a careful voice. \"Are the stars looking back at me?\"\n\nThe owl did not answer right away. The owl blinked, once, slowly. The owl's eyes were yellow and bright and seemed, somehow, to contain a lot of patient time.\n\n\"That,\" said the owl, \"is a very good question.\"\n\n\"What is the answer?\" said Moss.\n\n\"I do not know,\" said the owl. \"I have lived a long time. I have asked many things. I have never been able to find that one out.\"\n\nMoss felt, for a small moment, disappointed. Moss had imagined that the owl knew everything, the way trees know how to be trees and rivers know how to be rivers. But the owl did not seem disappointed in the not-knowing. The owl seemed almost happy about it.\n\n\"Will you tell me,\" said Moss, hesitantly, \"if you ever find out?\"\n\nThe owl made a soft, gentle sound that was almost a laugh.\n\n\"Moss,\" said the owl, \"some questions stay questions. They never become answers. That isn't a sad thing — that's the question's whole job. A question that stays a question keeps you looking. It keeps you wondering. It keeps you small in a good way, and curious in a wide way, and humble in a kind way. The world is bigger than any answer. The asking is what lets us touch the bigness.\"\n\nMoss was not entirely sure Moss understood.\n\nBut Moss looked back up at the sky, and there were so many stars — more than Moss could count, more than there were leaves on the apple tree, more than there were words Moss knew. The night was enormous. The night did not care if Moss understood. The night just kept shining, very steady, the way it had been shining since long before there were any hedgehogs to look up at it.\n\nAnd it was true, Moss thought, that even without an answer, looking up felt good. Looking up felt like a kind of belonging. Looking up made Moss feel small in a way that wasn't sad — just small, the way the moon is small in a giant sky, the way a single bright thing is small in a vast and patient dark.\n\nMoss lifted one small paw and waved at the stars.\n\nJust in case.\n\nThe stars, as far as Moss could tell, did not wave back. They went on doing what they had been doing for a very long time, which was being there, and being old, and being beautiful.\n\nThat, Moss decided, was enough for tonight.\n\nMoss waddled home across the cool grass. Moss dreamed, for the first time, of a road made of stars, and of walking it without ever needing to arrive.\n\nIn the morning, Moss decided that there would be more questions tomorrow. Many, many more. Moss had three hundred and ninety-eight left, by Moss's count, and a feeling that more were already on the way.\n\n*Something to think about: Some questions are meant to be answered. Some are meant to be lived with. Do you have a question you carry around that doesn't have an answer yet — and what does carrying it feel like?*"],
      hi: ["मॉस एक छोटा हेजहॉग था.\n\nमॉस बहुत ऊपर देखता था.\n\nमॉस दिन में आसमान की ओर ऊपर देखता. मॉस रात में आसमान की ओर ऊपर देखता.\n\nरात के आसमान में सितारे थे. इतने सारे सितारे.\n\n\"सितारे क्या हैं?\" मॉस ने कहा.\n\nमॉस ने बूढ़े उल्लू से पूछा.\n\n\"सितारे बहुत दूर हैं,\" उल्लू ने कहा. \"और बहुत, बहुत पुराने.\"\n\n\"कितने पुराने?\" मॉस ने कहा.\n\n\"मुझसे पुराने. इस पेड़ से पुराने. इस जंगल से पुराने.\"\n\nमॉस ने इस बारे में सोचा.\n\n\"क्या सितारे मुझे वापस देख रहे हैं?\" मॉस ने कहा.\n\nउल्लू ने धीरे से पलकें झपकाईं. \"मुझे नहीं पता,\" उल्लू ने कहा. \"यह एक अच्छा सवाल है.\"\n\n\"क्या तुम मुझे बताओगे जब तुम्हें पता चले?\" मॉस ने कहा.\n\n\"मुझे नहीं लगता मुझे कभी पता चलेगा,\" उल्लू ने मुस्कुराते हुए कहा. \"यह उस तरह का सवाल है जो सवाल ही रहता है.\"\n\nमॉस नहीं समझा. अभी नहीं.\n\nलेकिन मॉस ठंडी घास में बैठा और सितारों की ओर ऊपर देखा. और सितारे, शायद, थोड़े कम दूर लगे.\n\nमॉस ने आसमान की ओर एक छोटा पंजा हिलाया.\n\nबस अगर हो तो.", "मॉस एक छोटा हेजहॉग था जो एक पुराने सेब के पेड़ की जड़ों के नीचे रहता था, और मॉस लगभग हमेशा ऊपर देखता रहता था.\n\nसुबह में, मॉस बादलों को देखता. दोपहर में, मॉस पत्तियों को देखता. लेकिन यह रात का आसमान था गहरा, अँधेरा, सितारों से छिड़का हुआ रात का आसमान जिसे मॉस सबसे ज़्यादा पसंद करता था.\n\nमॉस के पास सितारों के बारे में इतने सारे सवाल थे.\n\nएक शांत शाम, मॉस बूढ़े उल्लू को ढूँढने के लिए बाहर निकला, जो हमेशा की तरह, एक बर्च के पेड़ की सबसे नीची शाखा पर बैठा सोच रहा था.\n\n\"उल्लू,\" मॉस ने कहा. \"सितारे क्या हैं?\"\n\nउल्लू ने अपना बड़ा गोल सिर धीरे से घुमाया. \"सितारे,\" उल्लू ने कहा, \"बहुत दूर हैं. और बहुत, बहुत पुराने हैं.\"\n\n\"कितने दूर?\" मॉस ने पूछा.\n\n\"इतने दूर कि तुम सौ ज़िंदगियाँ चलकर भी नहीं पहुँच सकते,\" उल्लू ने कहा.\n\n\"और कितने पुराने?\"\n\n\"मुझसे पुराने. इस बर्च से पुराने. शायद इस पूरे जंगल से पुराने. आज रात तुम जो कुछ सितारे देख रहे हो वे इतने लंबे समय से चमक रहे हैं कि उनकी रोशनी अब जाकर पहुँच रही है.\"\n\nमॉस इस बारे में सोचने के लिए ठंडी घास में बैठ गया.\n\nचाँदनी का एक टुकड़ा मॉस के काँटों के ऊपर से सरका.\n\n\"उल्लू,\" मॉस ने आख़िरकार कहा. \"क्या सितारे मुझे वापस देख रहे हैं?\"\n\nउल्लू एक लंबे समय तक चुप रहा. उल्लू ने एक बार, धीरे से, पलक झपकाई.\n\n\"मुझे नहीं पता,\" उल्लू ने कहा. \"यह एक बहुत अच्छा सवाल है. मेरे पास कोई जवाब नहीं है.\"\n\n\"क्या तुम मुझे बताओगे जब तुम्हें पता चले?\" मॉस ने कहा.\n\nउल्लू ने एक छोटी, दयालु आवाज़ निकाली जो लगभग एक हँसी थी.\n\n\"मॉस,\" उल्लू ने कहा, \"कुछ सवाल सवाल ही रहते हैं. उनके जवाब नहीं होते. तुम उन्हें जवाब पाने के लिए नहीं पूछते, बल्कि इसलिए कि पूछना ही अच्छी बात है. पूछना ही है जो तुम्हें ऊपर देखने पर मजबूर करता है.\"\n\nमॉस ने इस बारे में सोचा. मॉस ने ज़ोर से सोचा.\n\nमॉस पूरी तरह नहीं समझ सका कि वो समझ रहा है. अभी नहीं, कम से कम. लेकिन मॉस ने फिर आसमान की ओर ऊपर देखा, और इतने सारे सितारे थे मॉस जितना गिन सकता था उससे ज़्यादा, पुराने सेब के पेड़ पर पत्तियों से ज़्यादा, मॉस जितने शब्द जानता था उनसे ज़्यादा.\n\nऔर यह सच था, मॉस ने सोचा, कि बिना जवाब के भी, ऊपर देखना अच्छा लगता था. ऊपर देखना एक तरह से अपनेपन जैसा लगता था. ऊपर देखना मॉस को छोटा महसूस कराता था एक ऐसे तरीक़े से जो उदास नहीं था बस छोटा, जैसे चाँद विशाल आसमान में छोटा है, जैसे एक चमकीली चीज़ बड़े अँधेरे में छोटी है.\n\nमॉस ने एक छोटा पंजा उठाया और सितारों की ओर हिलाया.\n\nबस अगर हो तो.\n\nजहाँ तक मॉस बता सकता था, सितारों ने जवाब नहीं दिया. लेकिन वे चमकते रहे, बहुत स्थिर, उस तरह जैसे वे लंबे समय से चमक रहे थे जितना कोई याद कर सके.\n\nयह काफ़ी था, आज रात के लिए.\n\nमॉस सेब के पेड़ के नीचे अपने घर वापस गया, और पहली बार, सितारों की बनी एक सड़क का सपना देखा.\n\nमॉस ने सुबह में फ़ैसला किया कि कल और सवाल होंगे.", "मॉस एक छोटा हेजहॉग था जो एक पुराने सेब के पेड़ की जड़ों के नीचे एक आरामदायक बिल में रहता था, जंगल के किनारे पर जहाँ घास का मैदान शुरू होता था. मॉस, हेजहॉग के हिसाब से, असामान्य था: मॉस लगभग हमेशा ऊपर देख रहा होता था.\n\nसुबह में, जब बिल का अधिकांश हिस्सा अभी सो रहा होता, मॉस देखता कि रोशनी पत्तियों के बीच से हरी तिरछी किरणों में कैसे आती है. दोपहर में, मॉस बादलों को आकार बदलते देखता कुत्तों में, जहाज़ों में, और दूसरे बादलों में. शाम में, मॉस आसमान को गुलाबी होते, फिर बैंगनी, और फिर अंत में, गहरा नीला होते देखता.\n\nलेकिन यह गहरी, अँधेरी, सितारों से छिड़की रात थी जिसे मॉस सबसे ज़्यादा पसंद करता था. और मॉस के पास, मॉस की गिनती के अनुसार, रात के आसमान के बारे में ठीक चार सौ बारह सवाल थे, जिनमें से एक भी मॉस ने कभी ज़ोर से नहीं पूछा था.\n\nएक शांत शाम, जब सितारे असामान्य रूप से घने थे और चाँद एक पतली चाँदी की कुंडली था, मॉस घास के मैदान के पार बूढ़े उल्लू को ढूँढने निकला.\n\nउल्लू, जैसा कि उल्लू लगभग हमेशा होता, एक बर्च के पेड़ की सबसे नीची शाखा पर बैठा था, एक छोटे, पंखों वाले विचार जैसा बिल्कुल दिख रहा था.\n\n\"उल्लू,\" मॉस ने हिम्मत जुटाते हुए कहा. \"मेरा एक सवाल है.\"\n\nउल्लू ने अपना बड़ा गोल सिर धीरे से घुमाया, उस तरह जैसे उल्लू करते हैं. \"मॉस,\" उल्लू ने कहा, \"तुम पूछ सकते हो.\"\n\n\"सितारे क्या हैं?\"\n\nउल्लू एक पल के लिए चुप रहा. उल्लू शब्दों को सावधानी से चुन रहा लग रहा था.\n\n\"सितारे,\" उल्लू ने कहा, \"बहुत, बहुत दूर हैं. और बहुत, बहुत पुराने. इतने दूर कि कोई भी कोई उल्लू, कोई हेजहॉग, कोई भी कभी किसी एक तक नहीं पहुँचा. इतने पुराने कि आज रात तुम जो कुछ सितारे देख रहे हो वे इतने लंबे समय से चमक रहे हैं कि रोशनी अब जाकर पहुँची है. वो सितारा ख़ुद वहाँ शायद अब न भी हो. तुम देख रहे हो जहाँ वो हुआ करता था.\"\n\nमॉस ने इस बारे में सोचा. मॉस ने इस बारे में उस तरह सोचा जैसे तुम किसी पहेली के बारे में सोचो जो अचानक तुम्हें असली चीज़ लगने लगे.\n\n\"उल्लू,\" मॉस ने आख़िरकार, एक सावधान आवाज़ में कहा. \"क्या सितारे मुझे वापस देख रहे हैं?\"\n\nउल्लू ने तुरंत जवाब नहीं दिया. उल्लू ने एक बार, धीरे से, पलक झपकाई. उल्लू की आँखें पीली और चमकीली थीं और लग रहा था, किसी तरह, बहुत सारे धैर्यपूर्ण समय को समेटे हुए हैं.\n\n\"वो,\" उल्लू ने कहा, \"एक बहुत अच्छा सवाल है.\"\n\n\"जवाब क्या है?\" मॉस ने कहा.\n\n\"मुझे नहीं पता,\" उल्लू ने कहा. \"मैं लंबे समय से जी रहा हूँ. मैंने बहुत सी चीज़ें पूछी हैं. मैं वो एक चीज़ कभी नहीं ढूँढ पाया.\"\n\nमॉस को एक पल के लिए निराशा हुई. मॉस ने सोचा था कि उल्लू सब कुछ जानता है, उस तरह जैसे पेड़ जानते हैं कि पेड़ कैसे होना है और नदियाँ जानती हैं कि नदियाँ कैसे होनी हैं. लेकिन उल्लू न-जानने से निराश नहीं लग रहा था. उल्लू इस बारे में लगभग ख़ुश लग रहा था.\n\n\"क्या तुम मुझे बताओगे,\" मॉस ने झिझकते हुए कहा, \"अगर तुम्हें कभी पता चले?\"\n\nउल्लू ने एक नरम, कोमल आवाज़ निकाली जो लगभग एक हँसी थी.\n\n\"मॉस,\" उल्लू ने कहा, \"कुछ सवाल सवाल ही रहते हैं. वे कभी जवाब नहीं बनते. यह उदास बात नहीं है यह सवाल का पूरा काम है. एक सवाल जो सवाल बना रहता है तुम्हें देखता रखता है. वो तुम्हें सोचता रखता है. वो तुम्हें एक अच्छे तरीक़े से छोटा रखता है, और एक विशाल तरीक़े से जिज्ञासु, और एक दयालु तरीक़े से नम्र. दुनिया किसी भी जवाब से बड़ी है. पूछना ही है जो हमें उस बड़ेपन को छूने देता है.\"\n\nमॉस पूरी तरह यक़ीन नहीं कर पाया कि वो समझ रहा है.\n\nलेकिन मॉस ने फिर आसमान की ओर ऊपर देखा, और इतने सारे सितारे थे मॉस जितना गिन सकता था उससे ज़्यादा, सेब के पेड़ पर पत्तियों से ज़्यादा, मॉस जितने शब्द जानता था उनसे ज़्यादा. रात विशाल थी. रात को परवाह नहीं थी कि मॉस समझा या नहीं. रात बस चमकती रही, बहुत स्थिर, उस तरह जैसे वो लंबे समय से चमक रही थी इससे पहले कि कोई हेजहॉग ऊपर देखने वाला हो.\n\nऔर यह सच था, मॉस ने सोचा, कि बिना जवाब के भी, ऊपर देखना अच्छा लगता था. ऊपर देखना एक तरह से अपनेपन जैसा लगता था. ऊपर देखना मॉस को छोटा महसूस कराता था एक ऐसे तरीक़े से जो उदास नहीं था बस छोटा, जैसे चाँद विशाल आसमान में छोटा है, जैसे एक चमकीली चीज़ एक विशाल और धैर्यवान अँधेरे में छोटी है.\n\nमॉस ने एक छोटा पंजा उठाया और सितारों की ओर हिलाया.\n\nबस अगर हो तो.\n\nजहाँ तक मॉस बता सकता था, सितारों ने जवाब नहीं दिया. वे वही करते रहे जो वे बहुत लंबे समय से कर रहे थे, जो था वहाँ होना, और पुराना होना, और सुंदर होना.\n\nवो, मॉस ने तय किया, आज रात के लिए काफ़ी था.\n\nमॉस ठंडी घास के पार घर लौटा. मॉस ने पहली बार सपना देखा, सितारों की बनी एक सड़क का, और बिना कभी पहुँचने की ज़रूरत के उस पर चलने का.\n\nसुबह में, मॉस ने फ़ैसला किया कि कल और सवाल होंगे. बहुत सारे और. मॉस के पास, मॉस की गिनती के अनुसार, तीन सौ अट्ठानवे बाक़ी थे, और एक एहसास कि और भी पहले से ही रास्ते में हैं.\n\n*सोचने के लिए कुछ: कुछ सवाल जवाब के लिए होते हैं. कुछ सवाल साथ जीने के लिए होते हैं. क्या तुम्हारे पास कोई सवाल है जिसे तुम साथ रखते हो जिसका जवाब अभी नहीं है और उसे साथ रखना कैसा लगता है?*"],
      gu: ["મોસ એક નાનું હેજહોગ હતું.\n\nમોસ ઘણી વાર ઉપર જોતું.\n\nમોસ દિવસે આકાશ સામે ઉપર જોતું. મોસ રાતે આકાશ સામે ઉપર જોતું.\n\nરાતના આકાશમાં તારા હતા. એટલા બધા તારા.\n\n\"તારા શું છે?\" મોસ એ કહ્યું.\n\nમોસ એ વૃદ્ધ ઘુવડને પૂછ્યું.\n\n\"તારા બહુ દૂર છે,\" ઘુવડે કહ્યું. \"અને બહુ, બહુ જૂના.\"\n\n\"કેટલા જૂના?\" મોસ એ કહ્યું.\n\n\"મારાથી જૂના. આ વૃક્ષથી જૂના. આ જંગલથી જૂના.\"\n\nમોસ એ આ વિશે વિચાર્યું.\n\n\"શું તારા મને પાછા જોઈ રહ્યા છે?\" મોસ એ કહ્યું.\n\nઘુવડે ધીમેથી પલકો ઝપકાવી. \"મને ખબર નથી,\" ઘુવડે કહ્યું. \"એ એક સારો પ્રશ્ન છે.\"\n\n\"તું મને કહીશ જ્યારે તને ખબર પડે?\" મોસ એ કહ્યું.\n\n\"મને નથી લાગતું કે મને ક્યારેય ખબર પડશે,\" ઘુવડે હસતાં કહ્યું. \"એ એવો પ્રશ્ન છે જે પ્રશ્ન જ રહે છે.\"\n\nમોસ સમજ્યું નહીં. હજુ નહીં.\n\nપણ મોસ ઠંડા ઘાસમાં બેઠું અને તારા સામે ઉપર જોયું. અને તારા, કદાચ, થોડા ઓછા દૂર લાગ્યા.\n\nમોસ એ આકાશ સામે એક નાનો પંજો હલાવ્યો.\n\nબસ જો હોય તો.", "મોસ એક નાનું હેજહોગ હતું જે એક જૂના સફરજનના વૃક્ષની મૂળિયાં નીચે રહેતું હતું, અને મોસ લગભગ હંમેશા ઉપર જોતું રહેતું.\n\nસવારે, મોસ વાદળોને જોતું. બપોરે, મોસ પાંદડાંને જોતું. પણ એ રાતનું આકાશ ઊંડું, અંધારું, તારાઓથી છંટાયેલું રાતનું આકાશ હતું જે મોસ ને સૌથી વધારે ગમતું.\n\nમોસ પાસે તારાઓ વિશે એટલા બધા પ્રશ્નો હતા.\n\nએક શાંત સાંજે, મોસ વૃદ્ધ ઘુવડને શોધવા બહાર નીકળ્યું, જે હંમેશની જેમ, બર્ચ વૃક્ષની સૌથી નીચલી ડાળે બેઠું વિચારી રહ્યું હતું.\n\n\"ઘુવડ,\" મોસ એ કહ્યું. \"તારા શું છે?\"\n\nઘુવડે પોતાનું મોટું ગોળ માથું ધીમેથી ફેરવ્યું. \"તારા,\" ઘુવડે કહ્યું, \"બહુ દૂર છે. અને બહુ, બહુ જૂના.\"\n\n\"કેટલા દૂર?\" મોસ એ પૂછ્યું.\n\n\"એટલા દૂર કે તું સો જિંદગીઓ ચાલીને પણ ન પહોંચે,\" ઘુવડે કહ્યું.\n\n\"અને કેટલા જૂના?\"\n\n\"મારાથી જૂના. આ બર્ચથી જૂના. કદાચ આ આખા જંગલથી જૂના. આજે રાતે તું જે કેટલાક તારા જુએ છે તે એટલા લાંબા સમયથી ચમકી રહ્યા છે કે પ્રકાશ હવે જ પહોંચી રહ્યો છે.\"\n\nમોસ આ વિશે વિચારવા ઠંડા ઘાસમાં બેસી ગયું.\n\nચાંદનીનો એક ટુકડો મોસ ના કાંટા પરથી સરક્યો.\n\n\"ઘુવડ,\" મોસ એ આખરે કહ્યું. \"શું તારા મને પાછા જોઈ રહ્યા છે?\"\n\nઘુવડ લાંબા સમય સુધી શાંત રહ્યું. ઘુવડે એક વાર, ધીમેથી, પલક ઝપકાવી.\n\n\"મને ખબર નથી,\" ઘુવડે કહ્યું. \"એ એક ઉત્તમ પ્રશ્ન છે. મારી પાસે જવાબ નથી.\"\n\n\"તું મને કહીશ જ્યારે તને ખબર પડે?\" મોસ એ કહ્યું.\n\nઘુવડે એક નાનો, દયાળુ અવાજ કાઢ્યો જે લગભગ હાસ્ય જેવો હતો.\n\n\"મોસ,\" ઘુવડે કહ્યું, \"કેટલાક પ્રશ્નો પ્રશ્નો જ રહે છે. તેમના જવાબ નથી હોતા. તું તેમને જવાબ માટે નથી પૂછતું, પણ એટલા માટે કે પૂછવું એ જ સારી વાત છે. પૂછવું એ જ છે જે તને ઉપર જોવા પ્રેરે છે.\"\n\nમોસ એ આ વિશે વિચાર્યું. મોસ એ સખત વિચાર્યું.\n\nમોસ ને પૂરી ખાતરી ન હતી કે તે સમજ્યું. હજુ નહીં, ઓછામાં ઓછું. પણ મોસ એ ફરી આકાશ સામે જોયું, અને એટલા બધા તારા હતા મોસ ગણી શકે તેનાથી વધારે, જૂના સફરજનના વૃક્ષ પર પાંદડાં કરતાં વધારે, મોસ જાણતું હતું તે શબ્દો કરતાં વધારે.\n\nઅને એ સાચું હતું, મોસ એ વિચાર્યું, કે જવાબ વગર પણ, ઉપર જોવું સારું લાગતું હતું. ઉપર જોવું એક પ્રકારના આપણાપણા જેવું લાગતું હતું. ઉપર જોવાથી મોસ ને નાનું લાગતું એવી રીતે જે ઉદાસ ન હતી બસ નાનું, જેવી રીતે ચાંદ વિશાળ આકાશમાં નાનો છે, જેવી રીતે એક ચમકતી વસ્તુ મોટા અંધારામાં નાની છે.\n\nમોસ એ એક નાનો પંજો ઊંચક્યો અને તારા સામે હલાવ્યો.\n\nબસ જો હોય તો.\n\nમોસ કહી શકતું ત્યાં સુધી, તારાઓએ જવાબ ન આપ્યો. પણ તેઓ ચમકતા રહ્યા, ખૂબ સ્થિર, જે રીતે તેઓ ત્યાં સુધી ચમકતા આવ્યા હતા જે કોઈ યાદ કરી શકે.\n\nએ આજ રાત માટે પૂરતું હતું.\n\nમોસ સફરજનના વૃક્ષ નીચે પોતાના ઘરે પાછું ગયું, અને પહેલી વાર, તારાઓથી બનેલા એક રસ્તાનું સ્વપ્ન જોયું.\n\nમોસ એ સવારે નક્કી કર્યું કે કાલે વધુ પ્રશ્નો હશે.", "મોસ એક નાનું હેજહોગ હતું જે જૂના સફરજનના વૃક્ષની મૂળિયાં નીચે એક આરામદાયક દરમાં રહેતું હતું, જંગલની ધાર પર જ્યાં ઘાસનું મેદાન શરૂ થતું. મોસ, હેજહોગના ધોરણે, અસામાન્ય હતું: મોસ લગભગ હંમેશા ઉપર જોતું.\n\nસવારે, જ્યારે દરનો મોટો ભાગ હજુ સૂતો હોય, મોસ જોતું કે પ્રકાશ પાંદડાંમાંથી લીલી ત્રાંસી કિરણોમાં કેવી રીતે આવે છે. બપોરે, મોસ વાદળોને આકાર બદલતા જોતું કૂતરાઓમાં, વહાણોમાં, અને બીજાં વાદળોમાં. સાંજે, મોસ આકાશને ગુલાબી થતું, પછી જાંબલી, અને પછી છેવટે, ઘેરું વાદળી થતું જોતું.\n\nપણ એ ઊંડી, અંધારી, તારાઓથી છંટાયેલી રાત હતી જે મોસ ને સૌથી વધારે ગમતી. અને મોસ પાસે, મોસ ની ગણતરી મુજબ, રાતના આકાશ વિશે બરાબર ચારસો બાર પ્રશ્નો હતા, જેમાંથી એક પણ મોસ એ ક્યારેય મોટેથી પૂછ્યો ન હતો.\n\nએક શાંત સાંજે, જ્યારે તારા અસામાન્ય રીતે ઘેરા હતા અને ચાંદ એક પાતળી ચાંદીની કુંડી હતો, મોસ ઘાસના મેદાનને પાર કરીને વૃદ્ધ ઘુવડને શોધવા નીકળ્યું.\n\nઘુવડ, જેવું ઘુવડ લગભગ હંમેશા હોય છે, બર્ચ વૃક્ષની સૌથી નીચલી ડાળ પર બેઠું હતું, એક નાના, પીંછાવાળા વિચાર જેવું દેખાતું હતું.\n\n\"ઘુવડ,\" મોસ એ હિંમત ભેગી કરતાં કહ્યું. \"મારે એક પ્રશ્ન છે.\"\n\nઘુવડે પોતાનું વિશાળ ગોળ માથું ધીમેથી ફેરવ્યું, જે રીતે ઘુવડ કરે છે. \"મોસ,\" ઘુવડે કહ્યું, \"તું પૂછી શકે છે.\"\n\n\"તારા શું છે?\"\n\nઘુવડ એક ક્ષણ માટે શાંત રહ્યું. ઘુવડ શબ્દો કાળજીપૂર્વક પસંદ કરી રહ્યું હોય તેવું લાગ્યું.\n\n\"તારા,\" ઘુવડે કહ્યું, \"બહુ, બહુ દૂર છે. અને બહુ, બહુ જૂના. એટલા દૂર કે કોઈ પણ કોઈ ઘુવડ, કોઈ હેજહોગ, કોઈ પણ ક્યારેય એક સુધી પહોંચ્યું નથી. એટલા જૂના કે આજે રાતે તું જે કેટલાક તારા જુએ છે તે એટલા લાંબા સમયથી ચમકી રહ્યા છે કે પ્રકાશ હવે જ પહોંચ્યો છે. તારો પોતે ત્યાં હવે કદાચ ન પણ હોય. તું જુએ છે જ્યાં તે હતો.\"\n\nમોસ એ આ વિશે વિચાર્યું. મોસ એ એ રીતે વિચાર્યું જે રીતે તું કોઈ ઉખાણા વિશે વિચારે જે અચાનક તને ખરી વસ્તુ લાગે.\n\n\"ઘુવડ,\" મોસ એ આખરે, એક કાળજીપૂર્વકના અવાજે કહ્યું. \"શું તારા મને પાછા જોઈ રહ્યા છે?\"\n\nઘુવડે તરત જવાબ ન આપ્યો. ઘુવડે એક વાર, ધીમેથી, પલક ઝપકાવી. ઘુવડની આંખો પીળી અને ચમકતી હતી અને કોઈક રીતે, ઘણા ધીરજવાન સમયને સમાવતી લાગતી હતી.\n\n\"એ,\" ઘુવડે કહ્યું, \"એક બહુ સારો પ્રશ્ન છે.\"\n\n\"જવાબ શું છે?\" મોસ એ કહ્યું.\n\n\"મને ખબર નથી,\" ઘુવડે કહ્યું. \"હું લાંબા સમયથી જીવી રહ્યું છું. મેં ઘણી વસ્તુઓ પૂછી છે. હું એ એક ક્યારેય શોધી શક્યું નથી.\"\n\nમોસ ને એક ક્ષણ માટે નિરાશા થઈ. મોસ એ કલ્પના કરી હતી કે ઘુવડ બધું જાણે છે, જે રીતે વૃક્ષો જાણે છે કે વૃક્ષ કેવી રીતે થવું અને નદીઓ જાણે છે કે નદી કેવી રીતે થવું. પણ ઘુવડ ન-જાણવાથી નિરાશ લાગતું ન હતું. ઘુવડ આ વિશે લગભગ ખુશ લાગતું હતું.\n\n\"તું મને કહીશ,\" મોસ એ સંકોચાતાં કહ્યું, \"જો તને ક્યારેય ખબર પડે?\"\n\nઘુવડે એક નરમ, કોમળ અવાજ કાઢ્યો જે લગભગ હાસ્ય જેવો હતો.\n\n\"મોસ,\" ઘુવડે કહ્યું, \"કેટલાક પ્રશ્નો પ્રશ્નો જ રહે છે. તેઓ ક્યારેય જવાબ બનતા નથી. એ ઉદાસ વસ્તુ નથી એ પ્રશ્નનું આખું કામ છે. એક પ્રશ્ન જે પ્રશ્ન રહે છે તે તને જોતું રાખે છે. તે તને વિચારતું રાખે છે. તે તને એક સારી રીતે નાનું રાખે છે, અને એક વિશાળ રીતે જિજ્ઞાસુ, અને એક દયાળુ રીતે નમ્ર. દુનિયા કોઈ પણ જવાબ કરતાં મોટી છે. પૂછવું એ જ છે જે અમને એ મોટાપણાને સ્પર્શવા દે છે.\"\n\nમોસ ને પૂરી ખાતરી ન હતી કે તે સમજ્યું.\n\nપણ મોસ એ ફરી આકાશ સામે જોયું, અને એટલા બધા તારા હતા મોસ ગણી શકે તેનાથી વધારે, સફરજનના વૃક્ષ પર પાંદડાં કરતાં વધારે, મોસ જાણતું હતું તે શબ્દો કરતાં વધારે. રાત વિશાળ હતી. રાતને પરવા ન હતી કે મોસ સમજ્યું કે નહીં. રાત બસ ચમકતી રહી, ખૂબ સ્થિર, જે રીતે તે લાંબા સમયથી ચમકતી હતી તે પહેલાં કે કોઈ હેજહોગ ઉપર જોવા માટે હોય.\n\nઅને એ સાચું હતું, મોસ એ વિચાર્યું, કે જવાબ વગર પણ, ઉપર જોવું સારું લાગતું હતું. ઉપર જોવું એક પ્રકારના આપણાપણા જેવું લાગતું હતું. ઉપર જોવાથી મોસ ને નાનું લાગતું એવી રીતે જે ઉદાસ ન હતી બસ નાનું, જેવી રીતે ચાંદ વિશાળ આકાશમાં નાનો છે, જેવી રીતે એક ચમકતી વસ્તુ વિશાળ અને ધીરજવાન અંધારામાં નાની છે.\n\nમોસ એ એક નાનો પંજો ઊંચક્યો અને તારા સામે હલાવ્યો.\n\nબસ જો હોય તો.\n\nમોસ કહી શકતું ત્યાં સુધી, તારાઓએ જવાબ ન આપ્યો. તેઓ એ જ કરતા રહ્યા જે તેઓ ખૂબ લાંબા સમયથી કરી રહ્યા હતા, જે હતું ત્યાં હોવું, અને જૂના હોવું, અને સુંદર હોવું.\n\nએ, મોસ એ નક્કી કર્યું, આજ રાત માટે પૂરતું હતું.\n\nમોસ ઠંડા ઘાસને પાર કરીને ઘરે ગયું. મોસ એ પહેલી વાર સ્વપ્ન જોયું, તારાઓથી બનેલા એક રસ્તાનું, અને ક્યારેય પહોંચવાની જરૂર વગર તેના પર ચાલવાનું.\n\nસવારે, મોસ એ નક્કી કર્યું કે કાલે વધુ પ્રશ્નો હશે. ઘણા, ઘણા વધુ. મોસ પાસે, મોસ ની ગણતરી મુજબ, ત્રણસો અઠ્ઠાણું બાકી હતા, અને એક અહેસાસ કે વધુ પહેલેથી જ રસ્તે છે.\n\n*વિચારવા જેવી વાત: કેટલાક પ્રશ્નો જવાબ માટે હોય છે. કેટલાક સાથે જીવવા માટે હોય છે. શું તારી પાસે કોઈ પ્રશ્ન છે જે તું સાથે રાખે છે જેનો જવાબ હજુ નથી અને તેને સાથે રાખવું કેવું લાગે છે?*"],
      es: ["Moss era un pequeño erizo.\n\nMoss miraba hacia arriba mucho.\n\nMoss miraba hacia arriba al cielo durante el día. Moss miraba hacia arriba al cielo por la noche.\n\nEl cielo nocturno tenía estrellas. Tantas estrellas.\n\n\"¿Qué son las estrellas?\" dijo Moss.\n\nMoss le preguntó al viejo búho.\n\n\"Las estrellas están muy lejos,\" dijo el búho. \"Y son muy, muy viejas.\"\n\n\"¿Cuán viejas?\" dijo Moss.\n\n\"Más viejas que yo. Más viejas que este árbol. Más viejas que este bosque.\"\n\nMoss pensó en esto.\n\n\"¿Las estrellas me están mirando a mí?\" dijo Moss.\n\nEl búho parpadeó lentamente. \"No lo sé,\" dijo el búho. \"Esa es una buena pregunta.\"\n\n\"¿Me lo dirás cuando lo descubras?\" dijo Moss.\n\n\"No creo que vaya a descubrirlo nunca,\" dijo el búho, sonriendo. \"Esa es la clase de pregunta que sigue siendo pregunta.\"\n\nMoss no entendió. Todavía no.\n\nPero Moss se sentó en la hierba fresca y miró hacia arriba a las estrellas. Y las estrellas parecieron, quizás, un poco menos lejanas.\n\nMoss saludó al cielo con una pequeña patita.\n\nPor si acaso.", "Moss era un pequeño erizo que vivía bajo las raíces de un viejo manzano, y Moss casi siempre estaba mirando hacia arriba.\n\nPor la mañana, Moss miraba las nubes. Por la tarde, Moss miraba las hojas. Pero era el cielo nocturno el cielo nocturno profundo, oscuro, lleno de estrellas lo que Moss amaba más.\n\nMoss tenía tantas preguntas sobre las estrellas.\n\nUna noche tranquila, Moss salió contoneándose a buscar al viejo búho, quien, como de costumbre, estaba sentado en la rama más baja de un abedul, pensando.\n\n\"Búho,\" dijo Moss. \"¿Qué son las estrellas?\"\n\nEl búho giró su gran cabeza redonda lentamente. \"Las estrellas,\" dijo el búho, \"están muy lejos. Y son muy, muy viejas.\"\n\n\"¿Cuán lejos?\" preguntó Moss.\n\n\"Más lejos de lo que podrías caminar en cien vidas,\" dijo el búho.\n\n\"¿Y cuán viejas?\"\n\n\"Más viejas que yo. Más viejas que este abedul. Quizás más viejas que todo este bosque. Algunas de las estrellas que ves esta noche han estado brillando durante tanto tiempo que la luz apenas está llegando ahora.\"\n\nMoss se sentó en la hierba fresca a pensar en esto.\n\nUn trozo de luz de luna se deslizó sobre las púas de Moss.\n\n\"Búho,\" dijo Moss, finalmente. \"¿Las estrellas me están mirando a mí?\"\n\nEl búho estuvo callado durante mucho tiempo. El búho parpadeó una vez, lentamente.\n\n\"No lo sé,\" dijo el búho. \"Esa es una excelente pregunta. No tengo respuesta.\"\n\n\"¿Me lo dirás cuando lo descubras?\" dijo Moss.\n\nEl búho hizo un pequeño sonido amable que era casi una risa.\n\n\"Moss,\" dijo el búho, \"algunas preguntas siguen siendo preguntas. No tienen respuestas. No las haces para encontrar la respuesta, sino porque preguntar es lo bueno. Preguntar es lo que te hace mirar hacia arriba.\"\n\nMoss pensó en esto. Moss pensó mucho.\n\nMoss no estaba del todo seguro de que Moss entendiera. Todavía no, al menos. Pero Moss volvió a mirar al cielo, y había tantas estrellas más de las que Moss podía contar, más que hojas en el viejo manzano, más que palabras que Moss conocía.\n\nY era cierto, pensó Moss, que incluso sin una respuesta, mirar hacia arriba se sentía bien. Mirar hacia arriba se sentía como una especie de pertenencia. Mirar hacia arriba hacía que Moss se sintiera pequeño de una manera que no era triste solo pequeño, como la luna es pequeña en un cielo gigante, como una cosa brillante es pequeña en una gran oscuridad.\n\nMoss levantó una pequeña patita y saludó a las estrellas.\n\nPor si acaso.\n\nLas estrellas, hasta donde Moss podía ver, no respondieron al saludo. Pero siguieron brillando, muy constantes, como habían estado brillando durante más tiempo del que nadie podía recordar.\n\nEso era suficiente, por esta noche.\n\nMoss se contoneó de vuelta a casa bajo el manzano, y soñó, por primera vez, con un camino hecho de estrellas.\n\nMoss decidió, por la mañana, que habría más preguntas mañana.", "Moss era un pequeño erizo que vivía en una madriguera acogedora bajo las raíces de un viejo manzano, en el borde del bosque donde comenzaba el prado. Moss era, según los estándares de los erizos, inusual: Moss casi siempre estaba mirando hacia arriba.\n\nPor la mañana, cuando la mayoría de la madriguera todavía dormía, Moss observaba cómo la luz bajaba a través de las hojas en franjas verdes inclinadas. Por la tarde, Moss observaba a las nubes cambiar de forma en perros, en barcos, en otras nubes. Por la noche, Moss observaba al cielo volverse rosado y luego violeta y luego, finalmente, azul profundo.\n\nPero era la noche profunda, oscura, llena de estrellas la que Moss amaba más. Y Moss tenía, según la cuenta de Moss, exactamente cuatrocientas doce preguntas sobre el cielo nocturno, ninguna de las cuales Moss había hecho jamás en voz alta.\n\nUna noche tranquila, cuando las estrellas eran inusualmente espesas y la luna era una fina curva plateada, Moss se contoneó a través del prado para buscar al viejo búho.\n\nEl búho estaba, como casi siempre lo estaba, sentado en la rama más baja de un abedul, luciendo exactamente como un pequeño pensamiento con plumas.\n\n\"Búho,\" dijo Moss, reuniendo valor. \"Tengo una pregunta.\"\n\nEl búho giró su enorme cabeza redonda, lentamente, como hacen los búhos. \"Moss,\" dijo el búho, \"puedes preguntar.\"\n\n\"¿Qué son las estrellas?\"\n\nEl búho estuvo callado un momento. El búho parecía estar eligiendo las palabras con cuidado.\n\n\"Las estrellas,\" dijo el búho, \"están muy, muy lejos. Y son muy, muy viejas. Lo suficientemente lejos como para que nadie ningún búho, ningún erizo, nadie haya viajado nunca hasta una. Lo suficientemente viejas como para que algunas de las estrellas que estás mirando esta noche hayan estado brillando durante tanto tiempo que la luz apenas acaba de llegar. La estrella misma puede que ya no esté allí. Estás viendo donde solía estar.\"\n\nMoss pensó en esto. Moss pensó en ello de la manera en que podrías pensar en un acertijo del que de repente te das cuenta de que es una cosa real.\n\n\"Búho,\" dijo Moss, finalmente, con una voz cuidadosa. \"¿Las estrellas me están mirando a mí?\"\n\nEl búho no respondió de inmediato. El búho parpadeó, una vez, lentamente. Los ojos del búho eran amarillos y brillantes y parecían, de alguna manera, contener mucho tiempo paciente.\n\n\"Esa,\" dijo el búho, \"es una muy buena pregunta.\"\n\n\"¿Cuál es la respuesta?\" dijo Moss.\n\n\"No lo sé,\" dijo el búho. \"He vivido mucho tiempo. He preguntado muchas cosas. Nunca he podido descubrir esa.\"\n\nMoss se sintió, por un pequeño momento, decepcionado. Moss había imaginado que el búho lo sabía todo, de la manera en que los árboles saben cómo ser árboles y los ríos saben cómo ser ríos. Pero el búho no parecía decepcionado por no saber. El búho parecía casi feliz al respecto.\n\n\"¿Me lo dirás,\" dijo Moss, con vacilación, \"si alguna vez lo descubres?\"\n\nEl búho hizo un sonido suave y gentil que era casi una risa.\n\n\"Moss,\" dijo el búho, \"algunas preguntas siguen siendo preguntas. Nunca se convierten en respuestas. Eso no es algo triste ese es el trabajo completo de la pregunta. Una pregunta que sigue siendo pregunta te mantiene mirando. Te mantiene preguntándote. Te mantiene pequeño de una buena manera, y curioso de una manera amplia, y humilde de una manera amable. El mundo es más grande que cualquier respuesta. Preguntar es lo que nos deja tocar la grandeza.\"\n\nMoss no estaba del todo seguro de que Moss entendiera.\n\nPero Moss volvió a mirar al cielo, y había tantas estrellas más de las que Moss podía contar, más que hojas en el manzano, más que palabras que Moss conocía. La noche era enorme. A la noche no le importaba si Moss entendía. La noche simplemente seguía brillando, muy constante, como había estado brillando desde mucho antes de que hubiera erizos para mirar hacia arriba.\n\nY era cierto, pensó Moss, que incluso sin una respuesta, mirar hacia arriba se sentía bien. Mirar hacia arriba se sentía como una especie de pertenencia. Mirar hacia arriba hacía que Moss se sintiera pequeño de una manera que no era triste solo pequeño, como la luna es pequeña en un cielo gigante, como una sola cosa brillante es pequeña en una vasta y paciente oscuridad.\n\nMoss levantó una pequeña patita y saludó a las estrellas.\n\nPor si acaso.\n\nLas estrellas, hasta donde Moss podía ver, no respondieron al saludo. Siguieron haciendo lo que habían estado haciendo durante mucho tiempo, que era estar allí, y ser viejas, y ser hermosas.\n\nEso, decidió Moss, era suficiente por esta noche.\n\nMoss se contoneó a casa a través de la hierba fresca. Moss soñó, por primera vez, con un camino hecho de estrellas, y con caminarlo sin tener que llegar nunca.\n\nPor la mañana, Moss decidió que habría más preguntas mañana. Muchas, muchas más. A Moss le quedaban, según la cuenta de Moss, trescientas noventa y ocho, y la sensación de que más ya venían en camino.\n\n*Algo para pensar: Algunas preguntas están hechas para ser respondidas. Otras están hechas para vivir con ellas. ¿Tienes alguna pregunta que llevas contigo que todavía no tiene respuesta y cómo se siente llevarla?*"],
      fr: ["Moss était un petit hérisson.\n\nMoss levait beaucoup les yeux.\n\nMoss levait les yeux vers le ciel le jour. Moss levait les yeux vers le ciel la nuit.\n\nLe ciel nocturne avait des étoiles. Tellement d'étoiles.\n\n\"Que sont les étoiles?\" dit Moss.\n\nMoss demanda au vieux hibou.\n\n\"Les étoiles sont très loin,\" dit le hibou. \"Et très, très vieilles.\"\n\n\"Vieilles comment?\" dit Moss.\n\n\"Plus vieilles que moi. Plus vieilles que cet arbre. Plus vieilles que cette forêt.\"\n\nMoss y pensa.\n\n\"Est-ce que les étoiles me regardent en retour?\" dit Moss.\n\nLe hibou cligna lentement des yeux. \"Je ne sais pas,\" dit le hibou. \"C'est une bonne question.\"\n\n\"Tu me le diras quand tu trouveras?\" dit Moss.\n\n\"Je ne pense pas que je trouverai jamais,\" dit le hibou en souriant. \"C'est le genre de question qui reste une question.\"\n\nMoss ne comprit pas. Pas encore.\n\nMais Moss s'assit dans l'herbe fraîche et regarda les étoiles. Et les étoiles parurent, peut-être, un peu moins loin.\n\nMoss agita une petite patte vers le ciel.\n\nAu cas où.", "Moss était un petit hérisson qui vivait sous les racines d'un vieux pommier, et Moss levait presque toujours les yeux.\n\nLe matin, Moss regardait les nuages. L'après-midi, Moss regardait les feuilles. Mais c'était le ciel nocturne le ciel nocturne profond, sombre, parsemé d'étoiles que Moss aimait le plus.\n\nMoss avait tellement de questions sur les étoiles.\n\nUn soir tranquille, Moss sortit en se dandinant pour trouver le vieux hibou, qui était, comme d'habitude, assis sur la branche la plus basse d'un bouleau, en train de réfléchir.\n\n\"Hibou,\" dit Moss. \"Que sont les étoiles?\"\n\nLe hibou tourna sa grande tête ronde lentement. \"Les étoiles,\" dit le hibou, \"sont très loin. Et très, très vieilles.\"\n\n\"Loin comment?\" demanda Moss.\n\n\"Plus loin que tu ne pourrais marcher en cent vies,\" dit le hibou.\n\n\"Et vieilles comment?\"\n\n\"Plus vieilles que moi. Plus vieilles que ce bouleau. Plus vieilles, peut-être, que toute cette forêt. Certaines des étoiles que tu vois ce soir brillent depuis si longtemps que la lumière vient seulement d'arriver.\"\n\nMoss s'assit dans l'herbe fraîche pour y réfléchir.\n\nUn morceau de clair de lune glissa sur les épines de Moss.\n\n\"Hibou,\" dit Moss, finalement. \"Est-ce que les étoiles me regardent en retour?\"\n\nLe hibou resta silencieux pendant un long moment. Le hibou cligna une fois des yeux, lentement.\n\n\"Je ne sais pas,\" dit le hibou. \"C'est une excellente question. Je n'ai pas de réponse.\"\n\n\"Tu me le diras quand tu trouveras?\" dit Moss.\n\nLe hibou fit un petit son gentil qui était presque un rire.\n\n\"Moss,\" dit le hibou, \"certaines questions restent des questions. Elles n'ont pas de réponse. Tu ne les poses pas pour trouver la réponse, mais parce que poser la question est la bonne chose. Poser la question est ce qui te fait lever les yeux.\"\n\nMoss y pensa. Moss pensa fort.\n\nMoss n'était pas tout à fait sûr de comprendre. Pas encore, en tout cas. Mais Moss leva à nouveau les yeux vers le ciel, et il y avait tellement d'étoiles plus que Moss ne pouvait compter, plus que de feuilles sur le vieux pommier, plus que de mots que Moss connaissait.\n\nEt c'était vrai, pensa Moss, que même sans réponse, lever les yeux faisait du bien. Lever les yeux ressemblait à une sorte d'appartenance. Lever les yeux faisait sentir Moss petit d'une manière qui n'était pas triste juste petit, comme la lune est petite dans un ciel géant, comme une chose brillante est petite dans une grande obscurité.\n\nMoss leva une petite patte et fit signe aux étoiles.\n\nAu cas où.\n\nLes étoiles, pour autant que Moss puisse dire, ne répondirent pas. Mais elles continuèrent à briller, très régulièrement, comme elles brillaient depuis plus longtemps que quiconque puisse se souvenir.\n\nC'était assez, pour ce soir.\n\nMoss se dandina vers la maison sous le pommier, et rêva, pour la première fois, d'une route faite d'étoiles.\n\nMoss décida, le matin, qu'il y aurait plus de questions demain.", "Moss était un petit hérisson qui vivait dans un terrier douillet sous les racines d'un vieux pommier, à la lisière de la forêt où commençait la prairie. Moss était, selon les standards des hérissons, inhabituel: Moss levait presque toujours les yeux.\n\nLe matin, quand la plus grande partie du terrier dormait encore, Moss regardait la lumière descendre à travers les feuilles en faisceaux verts inclinés. L'après-midi, Moss regardait les nuages changer de forme en chiens, en navires, en d'autres nuages. Le soir, Moss regardait le ciel devenir rose puis violet puis, enfin, bleu profond.\n\nMais c'était la nuit profonde, sombre, parsemée d'étoiles que Moss aimait le mieux. Et Moss avait, selon le compte de Moss, exactement quatre cent douze questions sur le ciel nocturne, dont aucune Moss n'avait jamais posée à voix haute.\n\nUn soir tranquille, quand les étoiles étaient inhabituellement épaisses et que la lune était une mince courbe argentée, Moss se dandina à travers la prairie pour trouver le vieux hibou.\n\nLe hibou était, comme le hibou l'était presque toujours, assis sur la branche la plus basse d'un bouleau, ressemblant exactement à une petite pensée à plumes.\n\n\"Hibou,\" dit Moss, prenant courage. \"J'ai une question.\"\n\nLe hibou tourna son énorme tête ronde, lentement, à la manière des hiboux. \"Moss,\" dit le hibou, \"tu peux demander.\"\n\n\"Que sont les étoiles?\"\n\nLe hibou resta silencieux un moment. Le hibou semblait choisir ses mots avec soin.\n\n\"Les étoiles,\" dit le hibou, \"sont très, très loin. Et très, très vieilles. Assez loin pour que personne aucun hibou, aucun hérisson, personne n'ait jamais voyagé jusqu'à l'une d'elles. Assez vieilles pour que certaines des étoiles que tu regardes ce soir brillent depuis si longtemps que la lumière vient seulement d'arriver. L'étoile elle-même n'est peut-être même plus là. Tu vois où elle était.\"\n\nMoss y pensa. Moss y pensa de la manière dont tu pourrais penser à une énigme dont tu réalises soudain qu'elle est une vraie chose.\n\n\"Hibou,\" dit Moss, finalement, d'une voix prudente. \"Est-ce que les étoiles me regardent en retour?\"\n\nLe hibou ne répondit pas tout de suite. Le hibou cligna, une fois, lentement des yeux. Les yeux du hibou étaient jaunes et brillants et semblaient, d'une certaine manière, contenir beaucoup de temps patient.\n\n\"C'est,\" dit le hibou, \"une très bonne question.\"\n\n\"Quelle est la réponse?\" dit Moss.\n\n\"Je ne sais pas,\" dit le hibou. \"J'ai vécu longtemps. J'ai demandé beaucoup de choses. Je n'ai jamais pu trouver celle-là.\"\n\nMoss se sentit, pour un petit moment, déçu. Moss avait imaginé que le hibou savait tout, de la manière dont les arbres savent comment être des arbres et les rivières savent comment être des rivières. Mais le hibou ne semblait pas déçu de ne pas savoir. Le hibou semblait presque heureux à ce sujet.\n\n\"Tu me le diras,\" dit Moss, avec hésitation, \"si tu trouves jamais?\"\n\nLe hibou fit un son doux et gentil qui était presque un rire.\n\n\"Moss,\" dit le hibou, \"certaines questions restent des questions. Elles ne deviennent jamais des réponses. Ce n'est pas une chose triste c'est tout le travail de la question. Une question qui reste une question te garde regardant. Elle te garde te demandant. Elle te garde petit d'une bonne manière, et curieux d'une manière large, et humble d'une manière douce. Le monde est plus grand que toute réponse. Poser la question est ce qui nous laisse toucher la grandeur.\"\n\nMoss n'était pas tout à fait sûr de comprendre.\n\nMais Moss leva à nouveau les yeux vers le ciel, et il y avait tellement d'étoiles plus que Moss ne pouvait compter, plus que de feuilles sur le pommier, plus que de mots que Moss connaissait. La nuit était énorme. La nuit ne se souciait pas de savoir si Moss comprenait. La nuit continuait simplement à briller, très régulièrement, comme elle brillait depuis bien avant qu'il y ait des hérissons pour lever les yeux vers elle.\n\nEt c'était vrai, pensa Moss, que même sans réponse, lever les yeux faisait du bien. Lever les yeux ressemblait à une sorte d'appartenance. Lever les yeux faisait sentir Moss petit d'une manière qui n'était pas triste juste petit, comme la lune est petite dans un ciel géant, comme une seule chose brillante est petite dans une obscurité vaste et patiente.\n\nMoss leva une petite patte et fit signe aux étoiles.\n\nAu cas où.\n\nLes étoiles, pour autant que Moss puisse dire, ne répondirent pas. Elles continuèrent à faire ce qu'elles faisaient depuis très longtemps, qui était d'être là, et d'être vieilles, et d'être belles.\n\nCela, décida Moss, était assez pour ce soir.\n\nMoss se dandina à la maison à travers l'herbe fraîche. Moss rêva, pour la première fois, d'une route faite d'étoiles, et de la parcourir sans jamais avoir besoin d'arriver.\n\nLe matin, Moss décida qu'il y aurait plus de questions demain. Beaucoup, beaucoup plus. Il en restait à Moss, selon le compte de Moss, trois cent quatre-vingt-dix-huit, et un sentiment que d'autres étaient déjà en chemin.\n\n*Quelque chose à méditer: Certaines questions sont faites pour être répondues. D'autres sont faites pour être vécues avec. As-tu une question que tu portes avec toi qui n'a pas encore de réponse et comment cela se sent de la porter?*"]

    levels: {
      en: ["Wren the bird was sad.\n\nWren did not want to talk.\n\nBear came and sat down.\n\nBear did not ask why.\n\nBear just sat.\n\nThe sky changed color. The wind moved the grass.\n\nBear stayed.\n\nWren did not say anything for a long time.\n\nThen Wren said, \"I am sad today.\"\n\n\"I know,\" said Bear.\n\nWren said, \"I do not want to be all by myself.\"\n\n\"I know,\" said Bear. \"That is why I am here.\"\n\nThey watched the sky together. The sky was pink. Then the sky was orange. Then the sky was a soft, sleepy blue.\n\nWren leaned a tiny bit on Bear.\n\nBear did not move.\n\n\"Thank you, Bear,\" said Wren.\n\n\"You're welcome, Wren,\" said Bear.\n\nThey watched the first star come out.\n\nIt was a good night for not talking.\n\nAnd then, later, it was a good night for talking too.\n\nBut that came later.\n\nFirst, they just sat.", "Wren the small brown bird was sitting on the low branch of a hawthorn tree, and Wren was sad.\n\nWren did not want to talk about it. Wren did not even know how to talk about it. Sometimes sad is like that — it shows up without telling you why, and it does not want to be explained.\n\nBear came up the path slowly. Bear was a big bear, and a quiet bear, and a very gentle bear. Bear had known Wren for a long time.\n\nBear stopped under the hawthorn tree.\n\nBear did not ask, \"What is wrong?\"\nBear did not ask, \"Why are you sad?\"\nBear did not say, \"Cheer up.\"\n\nBear just sat down at the base of the tree, with a soft thump, and looked at the sky.\n\nWren said nothing.\n\nBear said nothing.\n\nA breeze moved the grass. A few yellow leaves came down. Far off, a creek made a soft, ongoing sound.\n\nBear stayed.\n\nAfter a long time — long enough that the sky began to change color at one edge — Wren spoke. Wren's voice was very small.\n\n\"I am sad today,\" Wren said. \"I do not know exactly why.\"\n\n\"I know,\" said Bear.\n\nThe sky turned pink at the top of the trees.\n\n\"I do not want to be all by myself,\" said Wren.\n\n\"I know,\" said Bear. \"That is why I came. I am not going anywhere.\"\n\nWren thought about this. Wren had been waiting, without knowing it, for someone to ask all the wrong questions — to want explanations, to want to fix the sad, to want it to be over so they could be comfortable. Bear had not done any of that. Bear had just come, and stayed.\n\nThe sky turned orange. Then a deeper orange. Then the soft, sleepy blue that comes before night.\n\nWren hopped off the branch and down onto the ground, next to Bear. Wren leaned, just a little, against the warm dark fur of Bear's side.\n\nBear did not move at all.\n\n\"Thank you, Bear,\" Wren said.\n\n\"You're welcome, Wren,\" Bear said.\n\nThe first star came out. Then another. Bear smelled like pine and warm earth.\n\nLater — much later, after the moon was already up — Wren would talk a little about what had been sad about today. And Bear would listen, without trying to fix any of it. And that, too, would feel good.\n\nBut first, before any of that, they just sat together. Quietly. Watching the sky get dark.\n\nThat was the most important part.\n\nThat was, Wren realized, what a friend is.", "Wren was a small brown bird who lived in the hawthorn tree at the edge of the meadow, and on this particular afternoon, Wren was sad.\n\nWren could not have told you exactly why. Some sadness comes with a clear story — somebody said something, something broke, something ended. But the sadness Wren had today was the other kind, the kind that just arrives, fully formed, and sits on your chest like a small heavy stone, and refuses to explain itself.\n\nWren was perched on the lowest branch of the hawthorn, and Wren was very, very still.\n\nDown the path came Bear.\n\nBear was a big bear. Bear was a quiet bear. Bear was, by reputation, the gentlest creature in the entire meadow. Bear had known Wren for a long time. Long enough that they had stopped feeling like they had to fill silences with chatter, the way newer friends do.\n\nBear came up the path slowly, looking, as bears often do, like a piece of the woods that had decided to walk for a while.\n\nBear stopped at the foot of the hawthorn tree.\n\nNow, what Bear did not do, here, was important.\n\nBear did not say, \"Wren! What's wrong?\"\nBear did not say, \"Why are you sad?\"\nBear did not say, \"Tell me about it, I'll help.\"\nBear did not say, \"Come on, cheer up, it'll be okay.\"\n\nBear had learned, somewhere along the way, that questions like those are sometimes the wrong tools for the job. They sound like they are about the sad person, but they are often about the person doing the asking — who wants the sad to be over so they can be comfortable again.\n\nSo Bear did not ask anything.\n\nBear just sat down at the base of the hawthorn, with a soft, settling thump, and looked at the sky.\n\nWren said nothing.\n\nBear said nothing.\n\nThe wind moved the long grass. A few early yellow leaves came down. Far off, somewhere past the willows, a creek went on making its constant, careful, ongoing sound. The sky began, very gradually, to think about the evening.\n\nBear stayed.\n\nAfter a long time — long enough that the top of the sky had gone the color of the inside of a peach — Wren spoke. Wren's voice was so small that anyone else might have missed it.\n\n\"I am sad today,\" Wren said. \"I do not know exactly why. I just am.\"\n\n\"I know,\" said Bear.\n\nThe sky deepened. The first edge of dusk arrived.\n\n\"I did not want to be all by myself,\" Wren said.\n\n\"I know,\" said Bear. \"That is why I came. I am not going anywhere.\"\n\nWren thought about this for a while. Wren had been bracing, without realizing it, for the wrong questions — for the long, well-meaning attempts to explain the sad away, to wrap it up neatly, to make it go somewhere else so everyone could feel better. Bear had not done any of that. Bear had just shown up and stayed.\n\nIt turned out, Wren thought, that staying was an enormous thing. Bigger than Wren had understood.\n\nThe sky turned orange, and then a deep, lit orange, and then the soft, slow blue that comes just before night. A first star came out, then a second. The temperature dropped a careful degree.\n\nWren hopped down off the branch and landed on the cool grass beside Bear. Wren leaned, just a little — just the smallest, most careful amount — against the warm, dark fur of Bear's side.\n\nBear did not move.\n\n\"Thank you, Bear,\" Wren said.\n\n\"You're welcome, Wren,\" Bear said.\n\nThey sat there together for a long time. Bear smelled like pine sap and warm earth and quiet weather. Somewhere a cricket made up its mind about a song.\n\nLater — much later, after the moon was already a clean white curve above the willows — Wren would say a little about what had been sad about today. Some of it, anyway. The parts that could be put into words. And Bear would listen, without trying to fix any of it, and that would feel good in a way Wren had not expected. Talking, when somebody truly listens, is its own kind of medicine.\n\nBut all of that came later.\n\nFirst, they sat. Quietly. Side by side. Watching the sky get dark.\n\nThat was the most important part.\n\nThat was, Wren understood now, what a friend is.\n\n*Something to think about: When someone you love is sad, the urge to fix it is strong. But sometimes the most loving thing is just to be there, without trying to make it go away. When has someone done this for you?*"],
      hi: ["वेन चिड़िया उदास थी.\n\nवेन बात नहीं करना चाहती थी.\n\nभालू आया और बैठ गया.\n\nभालू ने नहीं पूछा क्यों.\n\nभालू बस बैठ गया.\n\nआसमान का रंग बदल गया. हवा ने घास को हिलाया.\n\nभालू रुका रहा.\n\nवेन ने बहुत देर तक कुछ नहीं कहा.\n\nफिर वेन ने कहा, \"मैं आज उदास हूँ.\"\n\n\"मुझे पता है,\" भालू ने कहा.\n\nवेन ने कहा, \"मैं अकेले नहीं रहना चाहती.\"\n\n\"मुझे पता है,\" भालू ने कहा. \"इसीलिए मैं यहाँ हूँ.\"\n\nउन्होंने एक साथ आसमान देखा. आसमान गुलाबी था. फिर आसमान नारंगी हुआ. फिर आसमान एक नरम, नींद भरा नीला रंग बन गया.\n\nवेन थोड़ा सा भालू पर झुक गई.\n\nभालू हिला नहीं.\n\n\"धन्यवाद, भालू,\" वेन ने कहा.\n\n\"कोई बात नहीं, वेन,\" भालू ने कहा.\n\nउन्होंने पहला तारा निकलते देखा.\n\nवो रात बात न करने के लिए अच्छी थी.\n\nऔर फिर, बाद में, बात करने के लिए भी अच्छी थी.\n\nलेकिन वो बाद में हुआ.\n\nपहले, वो बस बैठे रहे.", "वेन छोटी भूरी चिड़िया एक कांटेदार पेड़ की नीची डाली पर बैठी थी, और वेन उदास थी.\n\nवेन इसके बारे में बात नहीं करना चाहती थी. वेन को पता भी नहीं था कि इसके बारे में कैसे बात करे. कभी कभी उदासी ऐसी ही होती है. वो बिना बताए आ जाती है, और समझाई नहीं जाना चाहती.\n\nभालू धीरे धीरे रास्ते पर आया. भालू बड़ा भालू था, और शांत भालू था, और बहुत नरम भालू था. भालू वेन को बहुत समय से जानता था.\n\nभालू कांटेदार पेड़ के नीचे रुक गया.\n\nभालू ने नहीं पूछा, \"क्या हुआ है?\"\nभालू ने नहीं पूछा, \"तुम उदास क्यों हो?\"\nभालू ने नहीं कहा, \"खुश हो जाओ.\"\n\nभालू बस पेड़ के नीचे बैठ गया, एक नरम धम के साथ, और आसमान को देखा.\n\nवेन ने कुछ नहीं कहा.\n\nभालू ने कुछ नहीं कहा.\n\nहवा ने घास को हिलाया. कुछ पीले पत्ते गिरे. दूर कहीं, एक नदी नरम, लगातार आवाज़ करती रही.\n\nभालू रुका रहा.\n\nबहुत देर बाद, इतनी देर कि आसमान एक किनारे पर रंग बदलने लगा, वेन बोली. वेन की आवाज़ बहुत छोटी थी.\n\n\"मैं आज उदास हूँ,\" वेन ने कहा. \"मुझे ठीक से नहीं पता क्यों.\"\n\n\"मुझे पता है,\" भालू ने कहा.\n\nपेड़ों के ऊपर आसमान गुलाबी हो गया.\n\n\"मैं अकेले नहीं रहना चाहती,\" वेन ने कहा.\n\n\"मुझे पता है,\" भालू ने कहा. \"इसीलिए मैं आया. मैं कहीं नहीं जा रहा.\"\n\nवेन ने इसके बारे में सोचा. वेन इंतज़ार कर रही थी, बिना जाने, कि कोई गलत सवाल पूछेगा. कोई समझाना चाहेगा, उदासी को ठीक करना चाहेगा, इसे ख़त्म करना चाहेगा ताकि वो आराम से रह सके. भालू ने ऐसा कुछ नहीं किया. भालू बस आया था, और रुका था.\n\nआसमान नारंगी हुआ. फिर गहरा नारंगी. फिर वो नरम, नींद भरा नीला जो रात से पहले आता है.\n\nवेन डाली से उतरी और ज़मीन पर आ गई, भालू के बगल में. वेन थोड़ी सी, भालू की गर्म काली खाल पर झुक गई.\n\nभालू बिल्कुल नहीं हिला.\n\n\"धन्यवाद, भालू,\" वेन ने कहा.\n\n\"कोई बात नहीं, वेन,\" भालू ने कहा.\n\nपहला तारा निकला. फिर दूसरा. भालू की महक देवदार और गर्म मिट्टी जैसी थी.\n\nबाद में, बहुत बाद में, जब चाँद निकल चुका था, वेन थोड़ा बताती कि आज क्या उदास था. और भालू सुनता, बिना उसे ठीक करने की कोशिश किए. और वो भी अच्छा लगता.\n\nलेकिन पहले, उससे पहले, वो बस साथ बैठे. चुपचाप. आसमान को अंधेरा होते देखते.\n\nवो सबसे ज़रूरी हिस्सा था.\n\nवो था, वेन ने समझा, असली दोस्त क्या होता है.", "वेन एक छोटी भूरी चिड़िया थी जो घास के मैदान के किनारे कांटेदार पेड़ में रहती थी, और इस ख़ास दोपहर, वेन उदास थी.\n\nवेन तुम्हें ठीक से नहीं बता सकती थी क्यों. कुछ उदासी एक साफ़ कहानी के साथ आती है. किसी ने कुछ कहा, कुछ टूटा, कुछ ख़त्म हुआ. लेकिन जो उदासी आज वेन को थी, वो दूसरी तरह की थी. वो जो बिना बुलाए आ जाती है, पूरी बनी हुई, और छाती पर एक छोटे भारी पत्थर की तरह बैठ जाती है, और खुद को समझाने से इंकार करती है.\n\nवेन कांटेदार पेड़ की सबसे नीची डाली पर बैठी थी, और वेन बहुत, बहुत शांत थी.\n\nरास्ते से नीचे भालू आया.\n\nभालू एक बड़ा भालू था. भालू एक शांत भालू था. भालू, सबकी मानें तो, पूरे घास के मैदान का सबसे नरम जीव था. भालू वेन को बहुत समय से जानता था. इतना समय कि वो ख़ामोशी को बातचीत से भरना ज़रूरी नहीं समझते थे, जैसा नए दोस्त करते हैं.\n\nभालू धीरे धीरे रास्ते पर आया, ऐसे लग रहा था जैसे जंगल का एक टुकड़ा थोड़ी देर के लिए चलने का फ़ैसला कर ले.\n\nभालू कांटेदार पेड़ के पाँव में रुक गया.\n\nअब, भालू ने यहाँ जो नहीं किया, वो ज़रूरी था.\n\nभालू ने नहीं कहा, \"वेन! क्या हुआ?\"\nभालू ने नहीं कहा, \"तुम उदास क्यों हो?\"\nभालू ने नहीं कहा, \"मुझे बताओ, मैं मदद करूँगा.\"\nभालू ने नहीं कहा, \"चलो, खुश हो जाओ, सब ठीक हो जाएगा.\"\n\nभालू ने कहीं रास्ते में सीखा था कि ऐसे सवाल कभी कभी ग़लत औज़ार होते हैं इस काम के लिए. वो उदास इंसान के बारे में लगते हैं, लेकिन अक्सर वो पूछने वाले के बारे में होते हैं. जो चाहता है कि उदासी ख़त्म हो जाए ताकि वो फिर से आराम से रह सके.\n\nतो भालू ने कुछ नहीं पूछा.\n\nभालू बस कांटेदार पेड़ के नीचे बैठ गया, एक नरम धम के साथ, और आसमान को देखा.\n\nवेन ने कुछ नहीं कहा.\n\nभालू ने कुछ नहीं कहा.\n\nहवा ने लंबी घास को हिलाया. कुछ जल्दी आए पीले पत्ते गिरे. दूर कहीं, विलो के पेड़ों के पार, एक नदी अपनी लगातार, सावधान आवाज़ करती रही. आसमान बहुत धीरे धीरे, शाम के बारे में सोचने लगा.\n\nभालू रुका रहा.\n\nबहुत देर बाद, इतनी देर कि आसमान का ऊपरी हिस्सा आम के अंदर के रंग जैसा हो गया, वेन बोली. वेन की आवाज़ इतनी छोटी थी कि कोई और सुन नहीं पाता.\n\n\"मैं आज उदास हूँ,\" वेन ने कहा. \"मुझे ठीक से नहीं पता क्यों. बस हूँ.\"\n\n\"मुझे पता है,\" भालू ने कहा.\n\nआसमान गहरा हुआ. सांझ का पहला किनारा आया.\n\n\"मैं अकेले नहीं रहना चाहती थी,\" वेन ने कहा.\n\n\"मुझे पता है,\" भालू ने कहा. \"इसीलिए मैं आया. मैं कहीं नहीं जा रहा.\"\n\nवेन ने इसके बारे में देर तक सोचा. वेन तैयार थी, बिना जाने, ग़लत सवालों के लिए. लंबी, अच्छी नीयत वाली कोशिशों के लिए कि उदासी को समझा कर दूर किया जाए, उसे साफ़ करके लपेट दिया जाए, उसे कहीं और भेज दिया जाए ताकि सब बेहतर महसूस करें. भालू ने ऐसा कुछ नहीं किया था. भालू बस आया था और रुका था.\n\nपता चला, वेन ने सोचा, कि रुकना एक बहुत बड़ी चीज़ है. इससे बड़ी जितनी वेन ने समझा था.\n\nआसमान नारंगी हुआ, फिर गहरा, जलता हुआ नारंगी, फिर वो नरम, धीमा नीला जो रात से ठीक पहले आता है. एक पहला तारा निकला, फिर दूसरा. तापमान एक डिग्री गिरा.\n\nवेन डाली से उतरी और भालू के बगल में ठंडी घास पर उतरी. वेन थोड़ी सी, सबसे छोटी, सबसे सावधान मात्रा में, भालू की गर्म, काली खाल पर झुक गई.\n\nभालू नहीं हिला.\n\n\"धन्यवाद, भालू,\" वेन ने कहा.\n\n\"कोई बात नहीं, वेन,\" भालू ने कहा.\n\nवो वहाँ बहुत देर तक साथ बैठे रहे. भालू की महक देवदार के रस और गर्म मिट्टी और शांत मौसम जैसी थी. कहीं एक झींगुर ने एक गाने के बारे में अपना मन बनाया.\n\nबाद में, बहुत बाद में, जब चाँद विलो के ऊपर एक साफ़ सफ़ेद चाप बन चुका था, वेन थोड़ा बताती कि आज क्या उदास था. कम से कम कुछ हिस्से. जो शब्दों में रखे जा सकते थे. और भालू सुनता, बिना उसे ठीक करने की कोशिश किए, और वो ऐसे अच्छा लगता जिसकी वेन ने उम्मीद नहीं की थी. बात करना, जब कोई सच में सुने, अपनी तरह की दवा होती है.\n\nलेकिन वो सब बाद में आया.\n\nपहले, वो बैठे. चुपचाप. साथ साथ. आसमान को अंधेरा होते देखते.\n\nवो सबसे ज़रूरी हिस्सा था.\n\nवो था, वेन अब समझती थी, असली दोस्त क्या होता है.\n\n*सोचने के लिए कुछ. जब कोई जिसे तुम प्यार करते हो उदास होता है, तो उसे ठीक करने की इच्छा बहुत होती है. लेकिन कभी कभी सबसे प्यार भरी बात यही होती है कि बस वहाँ रहो, बिना उसे दूर करने की कोशिश किए. किसी ने तुम्हारे लिए कब ऐसा किया था?*"],
      gu: ["રેન પંખી ઉદાસ હતી.\n\nરેન વાત કરવા નહોતી માંગતી.\n\nભાલુ આવ્યો અને બેસી ગયો.\n\nભાલુ એ ન પૂછ્યું કેમ.\n\nભાલુ ફક્ત બેઠો.\n\nઆકાશનો રંગ બદલાયો. પવને ઘાસને હલાવ્યું.\n\nભાલુ રહ્યો.\n\nરેન એ ઘણા સમય સુધી કંઈ ન કહ્યું.\n\nપછી રેન એ કહ્યું, \"હું આજે ઉદાસ છું.\"\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું.\n\nરેન એ કહ્યું, \"હું એકલી નથી રહેવા માંગતી.\"\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું. \"એટલે જ હું અહીં છું.\"\n\nતેઓએ સાથે આકાશ જોયું. આકાશ ગુલાબી હતું. પછી આકાશ નારંગી થયું. પછી આકાશ એક નરમ, ઊંઘ ભર્યું વાદળી થયું.\n\nરેન થોડી ભાલુ પર ઝૂકી.\n\nભાલુ હલ્યો નહીં.\n\n\"આભાર, ભાલુ,\" રેન એ કહ્યું.\n\n\"તારું સ્વાગત છે, રેન,\" ભાલુ એ કહ્યું.\n\nતેઓએ પહેલો તારો નીકળતો જોયો.\n\nએ રાત વાત ન કરવા માટે સારી હતી.\n\nઅને પછી, પાછળથી, વાત કરવા માટે પણ સારી હતી.\n\nપણ એ પાછળથી થયું.\n\nપહેલા, તેઓ ફક્ત બેઠા.", "રેન નાની ભૂરી પંખી એક કાંટાવાળા ઝાડની નીચલી ડાળી પર બેઠી હતી, અને રેન ઉદાસ હતી.\n\nરેન એના વિશે વાત નહોતી કરવા માંગતી. રેન ને ખબર પણ નહોતી કે એના વિશે કેવી રીતે વાત કરવી. ક્યારેક ઉદાસી એવી જ હોય છે. એ બતાવ્યા વગર આવી જાય છે, અને સમજાવી લેવા નથી માંગતી.\n\nભાલુ ધીમે ધીમે રસ્તે આવ્યો. ભાલુ મોટો રીંછ હતો, અને શાંત રીંછ હતો, અને બહુ નરમ રીંછ હતો. ભાલુ રેન ને ઘણા સમયથી ઓળખતો હતો.\n\nભાલુ કાંટાવાળા ઝાડ નીચે ઊભો રહ્યો.\n\nભાલુ એ ન પૂછ્યું, \"શું થયું છે?\"\nભાલુ એ ન પૂછ્યું, \"તું ઉદાસ કેમ છે?\"\nભાલુ એ ન કહ્યું, \"ખુશ થા.\"\n\nભાલુ ફક્ત ઝાડના થડ પાસે બેસી ગયો, એક નરમ ધડ સાથે, અને આકાશ તરફ જોયું.\n\nરેન એ કંઈ ન કહ્યું.\n\nભાલુ એ કંઈ ન કહ્યું.\n\nપવને ઘાસને હલાવ્યું. થોડા પીળા પાંદડા પડ્યા. દૂર ક્યાંક, એક નદી નરમ, સતત અવાજ કરતી રહી.\n\nભાલુ રહ્યો.\n\nઘણા સમય પછી, એટલા સમય પછી કે આકાશ એક કિનારે રંગ બદલવા લાગ્યું, રેન બોલી. રેન નો અવાજ બહુ નાનો હતો.\n\n\"હું આજે ઉદાસ છું,\" રેન એ કહ્યું. \"મને બરાબર ખબર નથી કેમ.\"\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું.\n\nઝાડોની ઉપર આકાશ ગુલાબી થયું.\n\n\"હું એકલી નથી રહેવા માંગતી,\" રેન એ કહ્યું.\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું. \"એટલે જ હું આવ્યો. હું ક્યાંય નથી જઈ રહ્યો.\"\n\nરેન એ આ વિશે વિચાર્યું. રેન રાહ જોતી હતી, જાણ્યા વગર, કે કોઈ ખોટા સવાલ પૂછશે. કોઈ સમજાવવા માંગશે, ઉદાસીને ઠીક કરવા માંગશે, એને પૂરી કરવા માંગશે જેથી તેઓ આરામથી રહી શકે. ભાલુ એ એમાંથી કંઈ ન કર્યું. ભાલુ ફક્ત આવ્યો હતો, અને રહ્યો હતો.\n\nઆકાશ નારંગી થયું. પછી ઘેરું નારંગી. પછી એ નરમ, ઊંઘ ભર્યું વાદળી જે રાત પહેલા આવે છે.\n\nરેન ડાળી પરથી ઊતરી અને જમીન પર ભાલુ ની બાજુમાં આવી. રેન થોડી, ભાલુ ની ગરમ કાળી રુવાંટી પર ઝૂકી.\n\nભાલુ બિલકુલ ન હલ્યો.\n\n\"આભાર, ભાલુ,\" રેન એ કહ્યું.\n\n\"તારું સ્વાગત છે, રેન,\" ભાલુ એ કહ્યું.\n\nપહેલો તારો નીકળ્યો. પછી બીજો. ભાલુ ની સુગંધ દેવદાર અને ગરમ માટી જેવી હતી.\n\nપાછળથી, ઘણા સમય પછી, જ્યારે ચંદ્ર ઊગી ચૂક્યો હતો, રેન થોડું કહેતી કે આજે શું ઉદાસ હતું. અને ભાલુ સાંભળતો, એને ઠીક કરવાનો પ્રયત્ન કર્યા વગર. અને એ પણ સારું લાગતું.\n\nપણ પહેલા, એ બધાથી પહેલા, તેઓ ફક્ત સાથે બેઠા. શાંતિથી. આકાશને અંધારું થતું જોતા.\n\nએ સૌથી જરૂરી ભાગ હતો.\n\nએ હતો, રેન ને સમજાયું, કે મિત્ર શું હોય છે.", "રેન એક નાની ભૂરી પંખી હતી જે ઘાસના મેદાનની કિનારે કાંટાવાળા ઝાડમાં રહેતી હતી, અને આ ખાસ બપોરે, રેન ઉદાસ હતી.\n\nરેન તમને બરાબર ન કહી શકતી કેમ. કેટલીક ઉદાસી એક સ્પષ્ટ વાર્તા સાથે આવે છે. કોઈએ કંઈક કહ્યું, કંઈક તૂટ્યું, કંઈક પૂરું થયું. પણ આજે રેન ને જે ઉદાસી હતી, એ બીજા પ્રકારની હતી. એ જે ફક્ત આવી જાય છે, પૂરી બનેલી, અને છાતી પર એક નાના ભારે પથ્થરની જેમ બેસી જાય છે, અને પોતાને સમજાવવાનો ઇનકાર કરે છે.\n\nરેન કાંટાવાળા ઝાડની સૌથી નીચલી ડાળી પર બેઠી હતી, અને રેન બહુ, બહુ શાંત હતી.\n\nરસ્તે ભાલુ આવ્યો.\n\nભાલુ મોટો રીંછ હતો. ભાલુ શાંત રીંછ હતો. ભાલુ, બધાના કહેવા પ્રમાણે, આખા ઘાસના મેદાનનું સૌથી નરમ પ્રાણી હતું. ભાલુ રેન ને ઘણા સમયથી ઓળખતો હતો. એટલા સમયથી કે તેઓ શાંતિને વાતચીતથી ભરવી જરૂરી નહોતા સમજતા, જેમ નવા મિત્રો કરે છે.\n\nભાલુ ધીમે ધીમે રસ્તે આવ્યો, એમ લાગતું જાણે જંગલનો એક ટુકડો થોડી વાર ચાલવાનું નક્કી કરી લે.\n\nભાલુ કાંટાવાળા ઝાડના પગ પાસે ઊભો રહ્યો.\n\nહવે, ભાલુ એ અહીં જે ન કર્યું, એ મહત્વનું હતું.\n\nભાલુ એ ન કહ્યું, \"રેન! શું થયું?\"\nભાલુ એ ન કહ્યું, \"તું ઉદાસ કેમ છે?\"\nભાલુ એ ન કહ્યું, \"મને કહે, હું મદદ કરીશ.\"\nભાલુ એ ન કહ્યું, \"ચાલ, ખુશ થા, બધું ઠીક થઈ જશે.\"\n\nભાલુ એ ક્યાંક રસ્તામાં શીખ્યું હતું કે આવા સવાલ ક્યારેક આ કામ માટે ખોટા સાધનો હોય છે. એ ઉદાસ વ્યક્તિ વિશે લાગે છે, પણ ઘણી વાર એ પૂછનાર વ્યક્તિ વિશે હોય છે. જે ઇચ્છે છે કે ઉદાસી પૂરી થઈ જાય જેથી તેઓ ફરી આરામથી રહી શકે.\n\nએટલે ભાલુ એ કંઈ ન પૂછ્યું.\n\nભાલુ ફક્ત કાંટાવાળા ઝાડના થડ પાસે બેસી ગયો, એક નરમ, સ્થિર ધડ સાથે, અને આકાશ તરફ જોયું.\n\nરેન એ કંઈ ન કહ્યું.\n\nભાલુ એ કંઈ ન કહ્યું.\n\nપવને લાંબા ઘાસને હલાવ્યું. થોડા વહેલા આવેલા પીળા પાંદડા પડ્યા. દૂર ક્યાંક, વિલોના ઝાડોની પાર, એક નદી પોતાનો સતત, સાવધાન અવાજ કરતી રહી. આકાશ બહુ ધીમે ધીમે સાંજ વિશે વિચારવા લાગ્યું.\n\nભાલુ રહ્યો.\n\nઘણા સમય પછી, એટલા સમય પછી કે આકાશનો ઉપરનો ભાગ કેરીના અંદરના રંગ જેવો થઈ ગયો, રેન બોલી. રેન નો અવાજ એટલો નાનો હતો કે બીજું કોઈ સાંભળી ન શકતું.\n\n\"હું આજે ઉદાસ છું,\" રેન એ કહ્યું. \"મને બરાબર ખબર નથી કેમ. હું ફક્ત છું.\"\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું.\n\nઆકાશ ઘેરું થયું. સંધ્યાનો પહેલો કિનારો આવ્યો.\n\n\"હું એકલી નહોતી રહેવા માંગતી,\" રેન એ કહ્યું.\n\n\"મને ખબર છે,\" ભાલુ એ કહ્યું. \"એટલે જ હું આવ્યો. હું ક્યાંય નથી જઈ રહ્યો.\"\n\nરેન એ આ વિશે થોડા સમય સુધી વિચાર્યું. રેન તૈયાર હતી, જાણ્યા વગર, ખોટા સવાલો માટે. લાંબા, સારી નિયત વાળા પ્રયત્નો માટે કે ઉદાસીને સમજાવીને દૂર કરી દેવાય, એને સ્પષ્ટ રીતે વીંટી દેવાય, એને ક્યાંક બીજે મોકલી દેવાય જેથી બધા સારું અનુભવી શકે. ભાલુ એ એમાંથી કંઈ નહોતું કર્યું. ભાલુ ફક્ત આવ્યો હતો અને રહ્યો હતો.\n\nખબર પડી, રેન એ વિચાર્યું, કે રહેવું એ બહુ મોટી વાત છે. એનાથી મોટી જે રેન એ સમજી હતી.\n\nઆકાશ નારંગી થયું, અને પછી ઘેરું, સળગતું નારંગી, અને પછી એ નરમ, ધીમું વાદળી જે રાત પહેલા આવે છે. એક પહેલો તારો નીકળ્યો, પછી બીજો. તાપમાન એક ડિગ્રી ઘટ્યું.\n\nરેન ડાળી પરથી ઊતરી અને ભાલુ ની બાજુમાં ઠંડા ઘાસ પર ઊતરી. રેન થોડી, સૌથી નાની, સૌથી સાવધાન માત્રામાં, ભાલુ ની ગરમ, કાળી રુવાંટી પર ઝૂકી.\n\nભાલુ ન હલ્યો.\n\n\"આભાર, ભાલુ,\" રેન એ કહ્યું.\n\n\"તારું સ્વાગત છે, રેન,\" ભાલુ એ કહ્યું.\n\nતેઓ ત્યાં ઘણા સમય સુધી સાથે બેઠા. ભાલુ ની સુગંધ દેવદારના રસ અને ગરમ માટી અને શાંત હવામાન જેવી હતી. ક્યાંક એક તીતીઘોડાએ એક ગીત વિશે પોતાનું મન બનાવ્યું.\n\nપાછળથી, ઘણા સમય પછી, જ્યારે ચંદ્ર વિલોની ઉપર એક સ્પષ્ટ સફેદ વળાંક બની ચૂક્યો હતો, રેન થોડું કહેતી કે આજે શું ઉદાસ હતું. ઓછામાં ઓછું થોડું. જે શબ્દોમાં મૂકી શકાય. અને ભાલુ સાંભળતો, એને ઠીક કરવાનો પ્રયત્ન કર્યા વગર, અને એ એવી રીતે સારું લાગતું જેની રેન એ આશા નહોતી રાખી. વાત કરવી, જ્યારે કોઈ ખરેખર સાંભળે, એ પોતાની જાતની દવા છે.\n\nપણ એ બધું પાછળથી આવ્યું.\n\nપહેલા, તેઓ બેઠા. શાંતિથી. એક બીજાની બાજુમાં. આકાશને અંધારું થતું જોતા.\n\nએ સૌથી જરૂરી ભાગ હતો.\n\nએ હતો, રેન હવે સમજતી હતી, કે મિત્ર શું હોય છે.\n\n*વિચારવા જેવી વાત. જ્યારે કોઈ જેને તમે પ્રેમ કરો છો ઉદાસ હોય, ત્યારે એને ઠીક કરવાની ઇચ્છા બહુ હોય છે. પણ ક્યારેક સૌથી પ્રેમ ભરી વાત એ જ હોય છે કે ફક્ત ત્યાં રહો, એને દૂર કરવાનો પ્રયત્ન કર્યા વગર. કોઈએ તમારા માટે ક્યારે આવું કર્યું હતું?*"],
      es: ["Wren el pajarito estaba triste.\n\nWren no quería hablar.\n\nBear llegó y se sentó.\n\nBear no preguntó por qué.\n\nBear solo se sentó.\n\nEl cielo cambió de color. El viento movió la hierba.\n\nBear se quedó.\n\nWren no dijo nada durante mucho tiempo.\n\nLuego Wren dijo, \"Estoy triste hoy.\"\n\n\"Lo sé,\" dijo Bear.\n\nWren dijo, \"No quiero estar sola.\"\n\n\"Lo sé,\" dijo Bear. \"Por eso estoy aquí.\"\n\nMiraron el cielo juntos. El cielo estaba rosa. Luego el cielo se puso naranja. Luego el cielo fue de un azul suave y soñoliento.\n\nWren se apoyó un poquito en Bear.\n\nBear no se movió.\n\n\"Gracias, Bear,\" dijo Wren.\n\n\"De nada, Wren,\" dijo Bear.\n\nVieron salir la primera estrella.\n\nFue una buena noche para no hablar.\n\nY luego, después, fue una buena noche para hablar también.\n\nPero eso vino después.\n\nPrimero, solo se sentaron.", "Wren la pequeña pajarita marrón estaba sentada en la rama baja de un espino blanco, y Wren estaba triste.\n\nWren no quería hablar de eso. Wren ni siquiera sabía cómo hablar de eso. A veces la tristeza es así. Aparece sin decirte por qué, y no quiere ser explicada.\n\nBear subió por el camino despacio. Bear era un oso grande, y un oso callado, y un oso muy gentil. Bear conocía a Wren desde hacía mucho tiempo.\n\nBear se detuvo bajo el espino blanco.\n\nBear no preguntó, \"¿Qué pasa?\"\nBear no preguntó, \"¿Por qué estás triste?\"\nBear no dijo, \"Anímate.\"\n\nBear solo se sentó al pie del árbol, con un suave golpe, y miró el cielo.\n\nWren no dijo nada.\n\nBear no dijo nada.\n\nUna brisa movió la hierba. Cayeron algunas hojas amarillas. A lo lejos, un arroyo hacía un sonido suave y constante.\n\nBear se quedó.\n\nDespués de mucho tiempo, suficiente para que el cielo comenzara a cambiar de color en un borde, Wren habló. La voz de Wren era muy pequeña.\n\n\"Estoy triste hoy,\" dijo Wren. \"No sé exactamente por qué.\"\n\n\"Lo sé,\" dijo Bear.\n\nEl cielo se puso rosa sobre los árboles.\n\n\"No quiero estar sola,\" dijo Wren.\n\n\"Lo sé,\" dijo Bear. \"Por eso vine. No me voy a ningún lado.\"\n\nWren pensó en esto. Wren había estado esperando, sin saberlo, a alguien que hiciera todas las preguntas equivocadas. Que quisiera explicaciones, que quisiera arreglar la tristeza, que quisiera que terminara para poder sentirse cómodo. Bear no había hecho nada de eso. Bear solo había venido, y se había quedado.\n\nEl cielo se puso naranja. Luego un naranja más profundo. Luego el azul suave y soñoliento que viene antes de la noche.\n\nWren saltó de la rama y bajó al suelo, junto a Bear. Wren se apoyó, solo un poquito, contra el cálido pelaje oscuro del costado de Bear.\n\nBear no se movió en absoluto.\n\n\"Gracias, Bear,\" dijo Wren.\n\n\"De nada, Wren,\" dijo Bear.\n\nSalió la primera estrella. Luego otra. Bear olía a pino y a tierra cálida.\n\nDespués, mucho después, cuando la luna ya había salido, Wren hablaría un poco de lo que había estado triste hoy. Y Bear escucharía, sin tratar de arreglar nada. Y eso, también, se sentiría bien.\n\nPero primero, antes de todo eso, solo se sentaron juntos. En silencio. Mirando el cielo oscurecer.\n\nEsa era la parte más importante.\n\nEso era, Wren se dio cuenta, lo que es un amigo.", "Wren era una pequeña pajarita marrón que vivía en el espino blanco al borde del prado, y en esta tarde en particular, Wren estaba triste.\n\nWren no podría haberte dicho exactamente por qué. Algunas tristezas vienen con una historia clara. Alguien dijo algo, algo se rompió, algo terminó. Pero la tristeza que Wren tenía hoy era del otro tipo. La que simplemente llega, completamente formada, y se sienta en tu pecho como una pequeña piedra pesada, y se niega a explicarse.\n\nWren estaba posada en la rama más baja del espino, y Wren estaba muy, muy quieta.\n\nPor el camino vino Bear.\n\nBear era un oso grande. Bear era un oso callado. Bear era, según se decía, la criatura más gentil de todo el prado. Bear conocía a Wren desde hacía mucho tiempo. El suficiente como para que hubieran dejado de sentir que tenían que llenar los silencios con charla, como hacen los amigos nuevos.\n\nBear subió por el camino despacio, pareciendo, como suelen parecer los osos, un pedazo del bosque que había decidido caminar por un rato.\n\nBear se detuvo al pie del espino blanco.\n\nAhora, lo que Bear no hizo, aquí, era importante.\n\nBear no dijo, \"¡Wren! ¿Qué pasa?\"\nBear no dijo, \"¿Por qué estás triste?\"\nBear no dijo, \"Cuéntame, te ayudaré.\"\nBear no dijo, \"Vamos, anímate, todo estará bien.\"\n\nBear había aprendido, en algún punto del camino, que preguntas como esas son a veces las herramientas equivocadas para el trabajo. Parecen ser sobre la persona triste, pero a menudo son sobre la persona que pregunta. Que quiere que la tristeza termine para poder volver a sentirse cómoda.\n\nAsí que Bear no preguntó nada.\n\nBear solo se sentó al pie del espino, con un suave golpe, y miró el cielo.\n\nWren no dijo nada.\n\nBear no dijo nada.\n\nEl viento movió la hierba alta. Cayeron algunas hojas amarillas tempranas. A lo lejos, más allá de los sauces, un arroyo seguía haciendo su sonido constante y cuidadoso. El cielo comenzó, muy gradualmente, a pensar en la tarde.\n\nBear se quedó.\n\nDespués de mucho tiempo, suficiente para que la parte alta del cielo se hubiera puesto del color del interior de un mango, Wren habló. La voz de Wren era tan pequeña que cualquier otro podría haberla perdido.\n\n\"Estoy triste hoy,\" dijo Wren. \"No sé exactamente por qué. Simplemente lo estoy.\"\n\n\"Lo sé,\" dijo Bear.\n\nEl cielo se profundizó. Llegó el primer borde del atardecer.\n\n\"No quería estar sola,\" dijo Wren.\n\n\"Lo sé,\" dijo Bear. \"Por eso vine. No me voy a ningún lado.\"\n\nWren pensó en esto un rato. Wren se había estado preparando, sin darse cuenta, para las preguntas equivocadas. Para los largos intentos bien intencionados de explicar la tristeza, de envolverla con cuidado, de hacerla ir a otra parte para que todos pudieran sentirse mejor. Bear no había hecho nada de eso. Bear simplemente había aparecido y se había quedado.\n\nResultó, pensó Wren, que quedarse era una cosa enorme. Más grande de lo que Wren había entendido.\n\nEl cielo se puso naranja, y luego un naranja profundo y encendido, y luego el azul suave y lento que viene justo antes de la noche. Salió una primera estrella, luego una segunda. La temperatura bajó un grado con cuidado.\n\nWren bajó de la rama y aterrizó en la hierba fría junto a Bear. Wren se apoyó, solo un poco, la cantidad más pequeña y cuidadosa, contra el cálido pelaje oscuro del costado de Bear.\n\nBear no se movió.\n\n\"Gracias, Bear,\" dijo Wren.\n\n\"De nada, Wren,\" dijo Bear.\n\nSe quedaron sentados allí juntos durante mucho tiempo. Bear olía a savia de pino y tierra cálida y clima tranquilo. En algún lugar un grillo se decidió por una canción.\n\nDespués, mucho después, cuando la luna ya era una curva blanca limpia sobre los sauces, Wren diría un poco sobre lo que había estado triste hoy. Algo, al menos. Las partes que podían ponerse en palabras. Y Bear escucharía, sin tratar de arreglar nada de eso, y eso se sentiría bien de una manera que Wren no había esperado. Hablar, cuando alguien verdaderamente escucha, es su propia clase de medicina.\n\nPero todo eso vino después.\n\nPrimero, se sentaron. En silencio. Uno al lado del otro. Mirando el cielo oscurecer.\n\nEsa era la parte más importante.\n\nEso era, Wren ahora entendía, lo que es un amigo.\n\n*Algo para pensar. Cuando alguien que amas está triste, las ganas de arreglarlo son fuertes. Pero a veces la cosa más amorosa es simplemente estar ahí, sin tratar de hacerlo desaparecer. ¿Cuándo ha hecho alguien esto por ti?*"],
      fr: ["Wren l'oiseau était triste.\n\nWren ne voulait pas parler.\n\nBear est arrivé et s'est assis.\n\nBear n'a pas demandé pourquoi.\n\nBear s'est juste assis.\n\nLe ciel a changé de couleur. Le vent a fait bouger l'herbe.\n\nBear est resté.\n\nWren n'a rien dit pendant longtemps.\n\nPuis Wren a dit, \"Je suis triste aujourd'hui.\"\n\n\"Je sais,\" a dit Bear.\n\nWren a dit, \"Je ne veux pas être toute seule.\"\n\n\"Je sais,\" a dit Bear. \"C'est pour ça que je suis là.\"\n\nIls ont regardé le ciel ensemble. Le ciel était rose. Puis le ciel est devenu orange. Puis le ciel a été d'un bleu doux et endormi.\n\nWren s'est appuyée un tout petit peu sur Bear.\n\nBear n'a pas bougé.\n\n\"Merci, Bear,\" a dit Wren.\n\n\"De rien, Wren,\" a dit Bear.\n\nIls ont regardé sortir la première étoile.\n\nC'était une bonne nuit pour ne pas parler.\n\nEt puis, plus tard, c'était une bonne nuit pour parler aussi.\n\nMais ça est venu plus tard.\n\nD'abord, ils se sont juste assis.", "Wren le petit oiseau brun était posée sur la branche basse d'un aubépine, et Wren était triste.\n\nWren ne voulait pas en parler. Wren ne savait même pas comment en parler. Parfois la tristesse est comme ça. Elle arrive sans te dire pourquoi, et elle ne veut pas être expliquée.\n\nBear est venu sur le chemin lentement. Bear était un grand ours, et un ours calme, et un ours très doux. Bear connaissait Wren depuis longtemps.\n\nBear s'est arrêté sous l'aubépine.\n\nBear n'a pas demandé, \"Qu'est-ce qui ne va pas?\"\nBear n'a pas demandé, \"Pourquoi es-tu triste?\"\nBear n'a pas dit, \"Souris.\"\n\nBear s'est juste assis au pied de l'arbre, avec un doux bruit sourd, et a regardé le ciel.\n\nWren n'a rien dit.\n\nBear n'a rien dit.\n\nUne brise a bougé l'herbe. Quelques feuilles jaunes sont tombées. Au loin, un ruisseau faisait un son doux et continu.\n\nBear est resté.\n\nAprès longtemps, assez longtemps pour que le ciel commence à changer de couleur sur un bord, Wren a parlé. La voix de Wren était très petite.\n\n\"Je suis triste aujourd'hui,\" a dit Wren. \"Je ne sais pas exactement pourquoi.\"\n\n\"Je sais,\" a dit Bear.\n\nLe ciel est devenu rose au-dessus des arbres.\n\n\"Je ne veux pas être toute seule,\" a dit Wren.\n\n\"Je sais,\" a dit Bear. \"C'est pour ça que je suis venu. Je ne vais nulle part.\"\n\nWren a pensé à ça. Wren avait attendu, sans le savoir, que quelqu'un pose toutes les mauvaises questions. Veuille des explications, veuille réparer la tristesse, veuille que ça finisse pour pouvoir être à l'aise. Bear n'avait fait rien de tout ça. Bear était juste venu, et était resté.\n\nLe ciel est devenu orange. Puis un orange plus profond. Puis le bleu doux et endormi qui vient avant la nuit.\n\nWren a sauté de la branche et est descendue sur le sol, à côté de Bear. Wren s'est appuyée, juste un peu, contre la fourrure chaude et sombre du flanc de Bear.\n\nBear n'a pas bougé du tout.\n\n\"Merci, Bear,\" a dit Wren.\n\n\"De rien, Wren,\" a dit Bear.\n\nLa première étoile est sortie. Puis une autre. Bear sentait le pin et la terre chaude.\n\nPlus tard, beaucoup plus tard, après que la lune était déjà levée, Wren parlerait un peu de ce qui avait été triste aujourd'hui. Et Bear écouterait, sans essayer de rien réparer. Et ça aussi, ce serait bien.\n\nMais d'abord, avant tout ça, ils se sont juste assis ensemble. En silence. À regarder le ciel s'assombrir.\n\nC'était la partie la plus importante.\n\nC'était, Wren a réalisé, ce qu'est un ami.", "Wren était un petit oiseau brun qui vivait dans l'aubépine au bord du pré, et cet après-midi en particulier, Wren était triste.\n\nWren n'aurait pas pu te dire exactement pourquoi. Certaines tristesses viennent avec une histoire claire. Quelqu'un a dit quelque chose, quelque chose s'est cassé, quelque chose s'est terminé. Mais la tristesse que Wren avait aujourd'hui était de l'autre sorte. Celle qui arrive simplement, complètement formée, et s'assied sur ta poitrine comme une petite pierre lourde, et refuse de s'expliquer.\n\nWren était posée sur la branche la plus basse de l'aubépine, et Wren était très, très immobile.\n\nSur le chemin est venu Bear.\n\nBear était un grand ours. Bear était un ours calme. Bear était, de réputation, la créature la plus douce de tout le pré. Bear connaissait Wren depuis longtemps. Assez longtemps pour qu'ils aient cessé de sentir qu'ils devaient remplir les silences de bavardage, comme le font les nouveaux amis.\n\nBear est venu sur le chemin lentement, ressemblant, comme les ours en ont souvent l'air, à un morceau de la forêt qui avait décidé de marcher un moment.\n\nBear s'est arrêté au pied de l'aubépine.\n\nMaintenant, ce que Bear n'a pas fait, ici, était important.\n\nBear n'a pas dit, \"Wren! Qu'est-ce qui ne va pas?\"\nBear n'a pas dit, \"Pourquoi es-tu triste?\"\nBear n'a pas dit, \"Raconte-moi, je vais t'aider.\"\nBear n'a pas dit, \"Allez, souris, tout ira bien.\"\n\nBear avait appris, quelque part en cours de route, que des questions comme celles-là sont parfois les mauvais outils pour le travail. Elles semblent être à propos de la personne triste, mais souvent elles sont à propos de la personne qui pose la question. Qui veut que la tristesse finisse pour qu'elle puisse à nouveau être à l'aise.\n\nDonc Bear n'a rien demandé.\n\nBear s'est juste assis au pied de l'aubépine, avec un doux bruit sourd qui s'installe, et a regardé le ciel.\n\nWren n'a rien dit.\n\nBear n'a rien dit.\n\nLe vent a bougé l'herbe longue. Quelques feuilles jaunes précoces sont tombées. Au loin, par-delà les saules, un ruisseau continuait à faire son son constant et soigneux. Le ciel a commencé, très progressivement, à penser au soir.\n\nBear est resté.\n\nAprès longtemps, assez longtemps pour que le haut du ciel ait pris la couleur de l'intérieur d'une mangue, Wren a parlé. La voix de Wren était si petite que quelqu'un d'autre aurait pu la manquer.\n\n\"Je suis triste aujourd'hui,\" a dit Wren. \"Je ne sais pas exactement pourquoi. Je le suis, c'est tout.\"\n\n\"Je sais,\" a dit Bear.\n\nLe ciel s'est approfondi. Le premier bord du crépuscule est arrivé.\n\n\"Je ne voulais pas être toute seule,\" a dit Wren.\n\n\"Je sais,\" a dit Bear. \"C'est pour ça que je suis venu. Je ne vais nulle part.\"\n\nWren a pensé à ça un moment. Wren s'était préparée, sans s'en rendre compte, aux mauvaises questions. Aux longues tentatives bien intentionnées d'expliquer la tristesse, de l'envelopper proprement, de la faire aller ailleurs pour que tout le monde puisse se sentir mieux. Bear n'avait rien fait de tout ça. Bear était simplement venu et était resté.\n\nIl s'est avéré, a pensé Wren, que rester était une chose énorme. Plus grande que Wren n'avait compris.\n\nLe ciel est devenu orange, puis un orange profond et allumé, puis le bleu doux et lent qui vient juste avant la nuit. Une première étoile est sortie, puis une seconde. La température a baissé d'un degré avec soin.\n\nWren a sauté de la branche et a atterri sur l'herbe fraîche à côté de Bear. Wren s'est appuyée, juste un peu, la plus petite et la plus soigneuse des quantités, contre la fourrure chaude et sombre du flanc de Bear.\n\nBear n'a pas bougé.\n\n\"Merci, Bear,\" a dit Wren.\n\n\"De rien, Wren,\" a dit Bear.\n\nIls sont restés assis là ensemble pendant longtemps. Bear sentait la sève de pin et la terre chaude et le temps tranquille. Quelque part un grillon s'est décidé sur une chanson.\n\nPlus tard, beaucoup plus tard, après que la lune était déjà une courbe blanche et propre au-dessus des saules, Wren dirait un peu de ce qui avait été triste aujourd'hui. Une partie, au moins. Les parties qui pouvaient être mises en mots. Et Bear écouterait, sans essayer de rien réparer, et ça se sentirait bien d'une manière à laquelle Wren ne s'attendait pas. Parler, quand quelqu'un écoute vraiment, est son propre genre de médicament.\n\nMais tout cela est venu plus tard.\n\nD'abord, ils se sont assis. En silence. Côte à côte. À regarder le ciel s'assombrir.\n\nC'était la partie la plus importante.\n\nC'était, Wren comprenait maintenant, ce qu'est un ami.\n\n*Quelque chose à penser. Quand quelqu'un que tu aimes est triste, l'envie de réparer est forte. Mais parfois la chose la plus aimante est simplement d'être là, sans essayer de la faire disparaître. Quand quelqu'un a-t-il fait ça pour toi?*"]
    }
  },

    title: {

    summary: {

      gu: "તુલી એ સીટી વગાડતા શીખવાનું નક્કી કર્યું. બહુ સારું નથી ચાલતું.",

    lesson: {

      hi: "कठिन हिस्सा बीच में होता है। फिर भी आगे बढ़ते रहो।",
      gu: "અઘરું ભાગ વચ્ચે હોય છે. છતાં પણ આગળ વધતા રહો.",
