    levels: {
      en: ["Tuli the fox wanted to whistle.\n\nTuli made a little O with his mouth.\n\nTuli blew.\n\n\"PFFFF,\" said Tuli.\n\nNo whistle came out.\n\nTuli tried again. \"PFFFFFFFFF.\"\n\nNo whistle.\n\nA squirrel watched. \"You are not whistling,\" said the squirrel.\n\n\"I know,\" said Tuli.\n\nTuli tried all morning. \"Pfff. Pfffff. Pffff.\"\n\nNo whistle.\n\nTuli sat down. Tuli was tired.\n\n\"Maybe I cannot whistle,\" said Tuli.\n\n\"Maybe,\" said the squirrel. \"Or maybe you can. Just not yet.\"\n\nTuli thought about that.\n\nTuli tried again. \"Pfff.\"\n\nAnd then —\n\n\"Pfeeee.\"\n\nA tiny whistle came out. Very small. But a whistle.\n\nTuli smiled a very big fox smile.\n\n\"Did you hear that?\" said Tuli.\n\n\"I heard it!\" said the squirrel.\n\nThe whistle was small. It did not last long.\n\nBut Tuli had whistled.\n\nAnd Tuli knew, now, that he could.\n\n\"I am going to do that again,\" said Tuli.\n\nTuli practiced every day after that.\n\nIt got better.", "Tuli the young fox had made up his mind: today, he would learn to whistle.\n\nTuli had heard a shepherd whistle one morning, and the sound had been so clean and bright and useful that Tuli had been thinking about it ever since. A whistle could call your friends. A whistle could mean hello. A whistle could be a song that fit in your mouth. Tuli wanted that very much.\n\nTuli sat down in a sunny patch of moss. Tuli made a careful little O with his mouth, the way he had seen the shepherd do. Tuli took a breath. Tuli blew.\n\n\"PFFFFFF,\" went Tuli.\n\nNo whistle.\n\nTuli frowned. Tuli tried again.\n\n\"PFFFFFFFFFFFF.\"\n\nNo whistle.\n\nA squirrel was watching from a branch. The squirrel was eating an acorn very slowly, the way squirrels do when they are settling in to enjoy a show.\n\n\"You are not whistling,\" the squirrel said helpfully.\n\n\"I am aware,\" said Tuli.\n\nTuli tried for the whole morning. Pff. Pfff. Pffffff. Sometimes a little hissing sound came out. Sometimes nothing came out at all. Once Tuli's lips made a kind of buzzing flutter, which was not a whistle, but was, at least, a new sound.\n\nBy lunch, Tuli's mouth felt tired. By afternoon, Tuli's mouth felt extremely tired.\n\nTuli sat down with a thump. Tuli was discouraged.\n\n\"Maybe,\" said Tuli slowly, \"I just cannot whistle.\"\n\nThe squirrel paused mid-acorn.\n\n\"Maybe,\" said the squirrel. \"Or maybe you can. Just not yet. There is a difference between 'cannot' and 'cannot yet'. Most things start out as cannot yet. Then, if you keep going, they turn into can. The boring middle part is where most foxes give up.\"\n\nTuli thought about this. Tuli thought about it for a long minute. The boring middle part. Tuli was definitely in the boring middle part.\n\nTuli tried again. He took a careful breath. He made a careful O.\n\n\"Pff.\"\n\nNothing.\n\nTuli did not give up.\n\nHe tried again.\n\nAnd then —\n\n\"PFEEEE.\"\n\nA whistle. A tiny one. A small, thin, slightly wobbly whistle. But, unmistakably, a whistle.\n\nTuli froze. Tuli had heard it. The squirrel had heard it.\n\n\"DID YOU HEAR THAT?\" said Tuli, with such enthusiasm that the whistle immediately went away again.\n\n\"I heard it!\" said the squirrel, hopping in place.\n\nThe whistle had been small. The whistle had not lasted long. The whistle had been more of a squeak than a tune.\n\nBut Tuli had whistled.\n\nAnd Tuli knew now — really, truly knew, the way you only know after you have done a thing once — that he could.\n\n\"I am going to do that again,\" said Tuli, very seriously.\n\nAnd he did. Every day. It got better.", "Tuli the young fox had made up his mind. He had decided this in the morning, with the particular firmness of a creature who is too young to know better and too determined to be talked out of anything: today, Tuli was going to learn to whistle.\n\nIt had started with the shepherd.\n\nThe day before, Tuli had been watching a shepherd from a safe distance — foxes always watch shepherds from a safe distance — and the shepherd had whistled. Just once. A clean, bright, two-note whistle that had cut across the field, and a dog had come running from very far away. The sound had landed in Tuli's chest and stayed there. A whistle, Tuli thought. A whistle was a tool. A whistle was a song that fit in your mouth. A whistle could call friends from a great distance. Tuli wanted, very much, to have one.\n\nSo this morning, Tuli had found a sunny patch of moss in the clearing, sat down with great seriousness, and begun.\n\nTuli made a careful little O with his mouth, the way he had seen the shepherd do. He took in a slow, measured breath. He blew.\n\n\"PFFFFFFF,\" went Tuli.\n\nNo whistle.\n\nTuli frowned. Tuli adjusted the O. Tuli tried again.\n\n\"PFFFFFFFFFF.\"\n\nNo whistle.\n\nA squirrel had appeared on a nearby branch with an acorn and was watching the proceedings with the focused, slightly delighted attention of a creature who has stumbled into excellent free entertainment.\n\n\"You are not whistling,\" the squirrel offered, after a particularly long PFFFF.\n\n\"I am aware,\" said Tuli.\n\nTuli worked at it for the whole morning. Pff. Pfff. Pffff. He tried tightening his lips. He tried loosening his lips. He tried tilting his head. He tried not tilting his head. Once, his lips made a kind of flapping, buzzing sound that was not a whistle, but was, at least, a sound the lips had not previously made.\n\nBy late morning, Tuli's mouth felt tired. By midday, Tuli's mouth felt exhausted. By early afternoon, Tuli's mouth felt as if it had been used to chew a very tough leaf for several hours.\n\nTuli slumped down onto the moss with a thump.\n\n\"Maybe,\" said Tuli slowly, mostly to himself, \"I just cannot whistle. Maybe whistling is not something foxes do. Maybe my mouth is the wrong shape for it. Maybe — \"\n\nThe squirrel set down the acorn. The squirrel looked very kindly at Tuli.\n\n\"Maybe you cannot whistle,\" said the squirrel. \"Or maybe you can. Just not yet. Those are not the same thing.\"\n\n\"They feel like the same thing,\" said Tuli.\n\n\"They are not,\" said the squirrel. \"Cannot is a wall. Cannot-yet is a door you have not opened. Most things in the world start out as cannot-yet. Walking. Climbing. Counting. Catching fish out of a stream — I had to fall in a great many times before I figured that one out, and I am, technically, a creature who is not supposed to enjoy water.\"\n\n\"What was hard about it?\" asked Tuli.\n\n\"The middle,\" said the squirrel, immediately. \"The middle is where most foxes give up. The beginning is exciting — you are starting a new thing! The end is wonderful — you can do the thing! But the middle is boring, and tiring, and it does not feel like you are getting anywhere. The middle is where you have to remember that boring and tiring are not the same as not working. You are working. You just cannot see it yet.\"\n\nTuli thought about this.\n\nTuli took another careful breath. Tuli made the careful O. Tuli blew.\n\n\"Pff.\"\n\nNothing.\n\nTuli did not stop.\n\nTuli tried again.\n\nAnd then —\n\n\"PFEEEEE.\"\n\nA whistle. A small whistle. A thin, wobbly, slightly surprised-sounding whistle. But unmistakably — clearly, completely, undeniably — a whistle.\n\nTuli froze.\n\nThe squirrel froze.\n\n\"DID YOU HEAR THAT,\" said Tuli, in the loud, joyful voice that immediately made the whistle disappear again.\n\n\"I HEARD IT,\" said the squirrel, hopping straight up off the branch.\n\nThe whistle had been small. The whistle had been short. The whistle had been, frankly, more of a squeak than the clean two-note thing the shepherd had produced. It had lasted, generously, half a second.\n\nBut Tuli had whistled.\n\nAnd Tuli knew now — really, truly, in his bones — that he could.\n\n\"I am going to do that again,\" said Tuli, very seriously.\n\nAnd he did. Not right away. Not even later that afternoon, after another hour of pff. But the next day, twice. And the day after that, four times. And by the end of the next week, when the shepherd whistled across the field, a small, clean, slightly proud whistle answered him from the woods.\n\n*Something to think about: The boring middle is where most things fall apart. What is something you are in the boring middle of right now? What would it look like to keep going for one more day?*"],
      hi: ["तुली लोमड़ी सीटी बजाना चाहता था.\n\nतुली ने अपने मुँह से एक छोटा सा O बनाया.\n\nतुली ने फूँक मारी.\n\n\"PFFFF,\" तुली बोला.\n\nकोई सीटी नहीं आई.\n\nतुली ने फिर कोशिश की. \"PFFFFFFFFF.\"\n\nकोई सीटी नहीं.\n\nएक गिलहरी देख रही थी. \"तुम सीटी नहीं बजा रहे,\" गिलहरी ने कहा.\n\n\"मुझे पता है,\" तुली ने कहा.\n\nतुली ने पूरी सुबह कोशिश की. \"Pfff. Pfffff. Pffff.\"\n\nकोई सीटी नहीं.\n\nतुली बैठ गया. तुली थक गया था.\n\n\"शायद मैं सीटी नहीं बजा सकता,\" तुली ने कहा.\n\n\"शायद,\" गिलहरी ने कहा. \"या शायद तुम बजा सकते हो. बस अभी नहीं.\"\n\nतुली ने इसके बारे में सोचा.\n\nतुली ने फिर कोशिश की. \"Pfff.\"\n\nऔर फिर —\n\n\"Pfeeee.\"\n\nएक छोटी सी सीटी निकली. बहुत छोटी. लेकिन एक सीटी.\n\nतुली बहुत बड़ी लोमड़ी जैसी मुस्कान मुस्कुराया.\n\n\"तुमने सुना?\" तुली ने कहा.\n\n\"मैंने सुना!\" गिलहरी ने कहा.\n\nसीटी छोटी थी. वो ज़्यादा देर नहीं चली.\n\nलेकिन तुली ने सीटी बजाई थी.\n\nऔर तुली को अब पता था कि वो बजा सकता है.\n\n\"मैं ये फिर करूँगा,\" तुली ने कहा.\n\nउसके बाद तुली ने हर दिन अभ्यास किया.\n\nयह बेहतर होती गई.", "तुली नौजवान लोमड़ी ने अपना मन बना लिया था. आज, वो सीटी बजाना सीखेगा.\n\nतुली ने एक चरवाहे को एक सुबह सीटी बजाते सुना था, और वो आवाज़ इतनी साफ़ और चमकीली और काम की थी कि तुली तब से उसके बारे में सोच रहा था. एक सीटी से तुम अपने दोस्तों को बुला सकते हो. एक सीटी का मतलब नमस्ते हो सकता है. एक सीटी एक गाना हो सकती है जो तुम्हारे मुँह में फ़िट हो जाए. तुली को वो बहुत चाहिए था.\n\nतुली धूप वाली काई के एक टुकड़े पर बैठ गया. तुली ने अपने मुँह से एक सावधान छोटा O बनाया, जैसे उसने चरवाहे को करते देखा था. तुली ने साँस ली. तुली ने फूँक मारी.\n\n\"PFFFFFF,\" तुली ने किया.\n\nकोई सीटी नहीं.\n\nतुली ने मुँह बनाया. तुली ने फिर कोशिश की.\n\n\"PFFFFFFFFFFFF.\"\n\nकोई सीटी नहीं.\n\nएक गिलहरी एक डाली से देख रही थी. गिलहरी एक बलूत बहुत धीरे धीरे खा रही थी, जैसे गिलहरियाँ करती हैं जब वो एक तमाशा देखने के लिए जम जाती हैं.\n\n\"तुम सीटी नहीं बजा रहे,\" गिलहरी ने मदद से कहा.\n\n\"मुझे पता है,\" तुली ने कहा.\n\nतुली ने पूरी सुबह कोशिश की. Pff. Pfff. Pffffff. कभी कभी एक छोटी सी फुसफुसाहट आती. कभी कभी कुछ नहीं आता. एक बार तुली के होंठों ने एक तरह की भिनभिनाहट की, जो सीटी नहीं थी, लेकिन कम से कम, एक नई आवाज़ थी.\n\nदोपहर तक, तुली का मुँह थका हुआ लगा. दोपहर बाद, तुली का मुँह बहुत थका हुआ लगा.\n\nतुली धम से बैठ गया. तुली हताश था.\n\n\"शायद,\" तुली ने धीरे से कहा, \"मैं बस सीटी नहीं बजा सकता.\"\n\nगिलहरी बलूत के बीच में रुकी.\n\n\"शायद,\" गिलहरी ने कहा. \"या शायद तुम बजा सकते हो. बस अभी नहीं. 'नहीं बजा सकता' और 'अभी नहीं बजा सकता' में फ़र्क है. ज़्यादातर चीज़ें 'अभी नहीं बजा सकता' से शुरू होती हैं. फिर, अगर तुम चलते रहो, वो 'बजा सकता हूँ' बन जाती हैं. बीच का उबाऊ हिस्सा वो है जहाँ ज़्यादातर लोमड़ियाँ हार मान लेती हैं.\"\n\nतुली ने इसके बारे में सोचा. तुली ने इसके बारे में एक लंबे पल तक सोचा. बीच का उबाऊ हिस्सा. तुली पक्का बीच के उबाऊ हिस्से में था.\n\nतुली ने फिर कोशिश की. उसने एक सावधान साँस ली. उसने एक सावधान O बनाया.\n\n\"Pff.\"\n\nकुछ नहीं.\n\nतुली ने हार नहीं मानी.\n\nउसने फिर कोशिश की.\n\nऔर फिर —\n\n\"PFEEEE.\"\n\nएक सीटी. एक छोटी. एक छोटी, पतली, थोड़ी डगमगाती सीटी. लेकिन, साफ़ साफ़, एक सीटी.\n\nतुली जम गया. तुली ने सुना था. गिलहरी ने सुना था.\n\n\"तुमने सुना?\" तुली ने कहा, इतने जोश से कि सीटी फिर से चली गई.\n\n\"मैंने सुना!\" गिलहरी ने कहा, अपनी जगह पर कूदते हुए.\n\nसीटी छोटी थी. सीटी ज़्यादा देर नहीं चली थी. सीटी एक गाने से ज़्यादा एक चूँ चूँ थी.\n\nलेकिन तुली ने सीटी बजाई थी.\n\nऔर तुली को अब पता था, सच में, सच्ची तरह से, जैसा तुम तभी जानते हो जब तुमने एक बार कुछ कर लिया हो, कि वो कर सकता है.\n\n\"मैं ये फिर करूँगा,\" तुली ने बहुत गंभीरता से कहा.\n\nऔर उसने किया. हर दिन. यह बेहतर होती गई.", "तुली नौजवान लोमड़ी ने अपना मन बना लिया था. उसने ये सुबह तय किया था, उस ख़ास दृढ़ता के साथ जो एक प्राणी की होती है जो बेहतर जानने के लिए बहुत छोटा है और किसी भी बात से समझाए जाने के लिए बहुत ज़िद्दी है. आज, तुली सीटी बजाना सीखने वाला था.\n\nइसकी शुरुआत चरवाहे से हुई थी.\n\nएक दिन पहले, तुली एक सुरक्षित दूरी से एक चरवाहे को देख रहा था. लोमड़ियाँ हमेशा चरवाहों को सुरक्षित दूरी से देखती हैं. और चरवाहे ने सीटी बजाई. बस एक बार. एक साफ़, चमकीली, दो सुरों वाली सीटी जो मैदान के पार चली थी, और एक कुत्ता बहुत दूर से दौड़ता हुआ आया था. वो आवाज़ तुली की छाती में उतर गई थी और वहीं रह गई थी. एक सीटी, तुली ने सोचा. एक सीटी एक औज़ार है. एक सीटी एक गाना है जो तुम्हारे मुँह में फ़िट हो जाए. एक सीटी से तुम बहुत दूर से दोस्तों को बुला सकते हो. तुली को, बहुत, एक चाहिए थी.\n\nतो इस सुबह, तुली ने सफ़ाई में धूप वाली काई का एक टुकड़ा ढूँढा, बड़ी गंभीरता से बैठ गया, और शुरू किया.\n\nतुली ने अपने मुँह से एक सावधान छोटा O बनाया, जैसे उसने चरवाहे को करते देखा था. उसने एक धीमी, मापी हुई साँस ली. उसने फूँक मारी.\n\n\"PFFFFFFF,\" तुली ने किया.\n\nकोई सीटी नहीं.\n\nतुली ने मुँह बनाया. तुली ने O को ठीक किया. तुली ने फिर कोशिश की.\n\n\"PFFFFFFFFFF.\"\n\nकोई सीटी नहीं.\n\nएक गिलहरी पास की एक डाली पर एक बलूत के साथ आ गई थी और कार्यवाही को उस ध्यान से देख रही थी जो एक प्राणी की होती है जो शानदार मुफ़्त मनोरंजन में आ गिरा हो.\n\n\"तुम सीटी नहीं बजा रहे,\" गिलहरी ने एक ख़ास तौर पर लंबे PFFFF के बाद कहा.\n\n\"मुझे पता है,\" तुली ने कहा.\n\nतुली ने पूरी सुबह काम किया. Pff. Pfff. Pffff. उसने अपने होंठों को कसने की कोशिश की. उसने अपने होंठों को ढीला करने की कोशिश की. उसने सिर झुकाने की कोशिश की. उसने सिर न झुकाने की कोशिश की. एक बार, उसके होंठों ने एक तरह की फड़फड़ाती, भिनभिनाती आवाज़ की जो सीटी नहीं थी, लेकिन कम से कम, एक आवाज़ थी जो होंठों ने पहले नहीं की थी.\n\nदेर सुबह तक, तुली का मुँह थका हुआ लगा. दोपहर तक, तुली का मुँह बहुत थका हुआ लगा. शुरुआती दोपहर तक, तुली का मुँह ऐसा लगा जैसे उसने कई घंटों तक एक बहुत सख़्त पत्ता चबाया हो.\n\nतुली काई पर धम से बैठ गया.\n\n\"शायद,\" तुली ने धीरे से कहा, ज़्यादातर खुद से, \"मैं बस सीटी नहीं बजा सकता. शायद सीटी बजाना लोमड़ियाँ नहीं करतीं. शायद मेरा मुँह उसके लिए ग़लत आकार का है. शायद…\"\n\nगिलहरी ने बलूत नीचे रख दिया. गिलहरी ने तुली की तरफ़ बहुत प्यार से देखा.\n\n\"शायद तुम सीटी नहीं बजा सकते,\" गिलहरी ने कहा. \"या शायद तुम बजा सकते हो. बस अभी नहीं. वो एक ही बात नहीं हैं.\"\n\n\"वो एक ही बात लगती हैं,\" तुली ने कहा.\n\n\"वो नहीं हैं,\" गिलहरी ने कहा. \"नहीं कर सकता एक दीवार है. अभी नहीं कर सकता एक दरवाज़ा है जो तुमने नहीं खोला. दुनिया की ज़्यादातर चीज़ें अभी नहीं कर सकता से शुरू होती हैं. चलना. चढ़ना. गिनना. नदी से मछली पकड़ना. मुझे कई बार गिरना पड़ा इससे पहले कि मैं इसे समझा, और मैं, तकनीकी तौर पर, एक प्राणी हूँ जो पानी का आनंद लेने वाला नहीं है.\"\n\n\"इसमें क्या मुश्किल था?\" तुली ने पूछा.\n\n\"बीच का हिस्सा,\" गिलहरी ने तुरंत कहा. \"बीच का हिस्सा वो है जहाँ ज़्यादातर लोमड़ियाँ हार मान लेती हैं. शुरुआत रोमांचक होती है. तुम एक नई चीज़ शुरू कर रहे हो. अंत शानदार होता है. तुम वो चीज़ कर सकते हो. लेकिन बीच का हिस्सा उबाऊ है, और थका देने वाला है, और ये नहीं लगता कि तुम कहीं पहुँच रहे हो. बीच का हिस्सा वो है जहाँ तुम्हें याद रखना है कि उबाऊ और थका देने वाला 'काम नहीं हो रहा' के बराबर नहीं हैं. तुम काम कर रहे हो. तुम बस अभी नहीं देख सकते.\"\n\nतुली ने इसके बारे में सोचा.\n\nतुली ने एक और सावधान साँस ली. तुली ने सावधान O बनाया. तुली ने फूँक मारी.\n\n\"Pff.\"\n\nकुछ नहीं.\n\nतुली नहीं रुका.\n\nतुली ने फिर कोशिश की.\n\nऔर फिर —\n\n\"PFEEEEE.\"\n\nएक सीटी. एक छोटी सीटी. एक पतली, डगमगाती, थोड़ी चकित आवाज़ वाली सीटी. लेकिन साफ़ साफ़, पूरी तरह, बिना किसी शक के, एक सीटी.\n\nतुली जम गया.\n\nगिलहरी जम गई.\n\n\"तुमने सुना?\" तुली ने उस ज़ोरदार, खुश आवाज़ में कहा जिसने सीटी को फिर से ग़ायब कर दिया.\n\n\"मैंने सुना!\" गिलहरी ने डाली से सीधे ऊपर कूदते हुए कहा.\n\nसीटी छोटी थी. सीटी छोटी थी. सीटी, सच में, उस साफ़ दो सुरों वाली चीज़ से ज़्यादा एक चूँ चूँ थी जो चरवाहे ने बनाई थी. वो, उदारता से, आधे सेकंड चली.\n\nलेकिन तुली ने सीटी बजाई थी.\n\nऔर तुली को अब पता था, सच में, सच्ची तरह से, अपनी हड्डियों में, कि वो कर सकता है.\n\n\"मैं ये फिर करूँगा,\" तुली ने बहुत गंभीरता से कहा.\n\nऔर उसने किया. तुरंत नहीं. उस दोपहर बाद भी नहीं, एक और घंटे के pff के बाद. लेकिन अगले दिन, दो बार. और उसके अगले दिन, चार बार. और अगले हफ़्ते के अंत तक, जब चरवाहे ने मैदान के पार सीटी बजाई, एक छोटी, साफ़, थोड़ी गर्व भरी सीटी ने जंगल से उसे जवाब दिया.\n\n*सोचने के लिए कुछ. बीच का उबाऊ हिस्सा वो है जहाँ ज़्यादातर चीज़ें टूट जाती हैं. ऐसी कौन सी चीज़ है जिसके बीच के उबाऊ हिस्से में तुम अभी हो? एक और दिन के लिए चलते रहने का क्या मतलब होगा?*"],
      gu: ["તુલી શિયાળ સીટી વગાડવા માંગતો હતો.\n\nતુલી એ પોતાના મોંથી એક નાનો O બનાવ્યો.\n\nતુલી એ ફૂંક મારી.\n\n\"PFFFF,\" તુલી બોલ્યો.\n\nકોઈ સીટી ન આવી.\n\nતુલી એ ફરી પ્રયત્ન કર્યો. \"PFFFFFFFFF.\"\n\nકોઈ સીટી નહીં.\n\nએક ખિસકોલી જોઈ રહી હતી. \"તું સીટી નથી વગાડતો,\" ખિસકોલીએ કહ્યું.\n\n\"મને ખબર છે,\" તુલી એ કહ્યું.\n\nતુલી એ આખી સવાર પ્રયત્ન કર્યો. \"Pfff. Pfffff. Pffff.\"\n\nકોઈ સીટી નહીં.\n\nતુલી બેસી ગયો. તુલી થાકી ગયો હતો.\n\n\"કદાચ હું સીટી નથી વગાડી શકતો,\" તુલી એ કહ્યું.\n\n\"કદાચ,\" ખિસકોલીએ કહ્યું. \"અથવા કદાચ તું વગાડી શકે. ફક્ત હજી નહીં.\"\n\nતુલી એ એના વિશે વિચાર્યું.\n\nતુલી એ ફરી પ્રયત્ન કર્યો. \"Pfff.\"\n\nઅને પછી —\n\n\"Pfeeee.\"\n\nએક નાનકડી સીટી નીકળી. બહુ નાની. પણ એક સીટી.\n\nતુલી બહુ મોટું શિયાળ જેવું હસ્યો.\n\n\"તેં સાંભળ્યું?\" તુલી એ કહ્યું.\n\n\"મેં સાંભળ્યું!\" ખિસકોલીએ કહ્યું.\n\nસીટી નાની હતી. એ વધારે વાર ન ચાલી.\n\nપણ તુલી એ સીટી વગાડી હતી.\n\nઅને તુલી ને હવે ખબર હતી કે એ વગાડી શકે છે.\n\n\"હું આ ફરી કરીશ,\" તુલી એ કહ્યું.\n\nએ પછી તુલી એ રોજ અભ્યાસ કર્યો.\n\nએ સારી થતી ગઈ.", "તુલી જુવાન શિયાળે પોતાનું મન બનાવી લીધું હતું. આજે, એ સીટી વગાડવાનું શીખશે.\n\nતુલી એ એક ઘેટાંપાળકને એક સવારે સીટી વગાડતો સાંભળ્યો હતો, અને એ અવાજ એટલો સ્પષ્ટ અને તેજસ્વી અને કામનો હતો કે તુલી ત્યારથી એના વિશે વિચારી રહ્યો હતો. એક સીટીથી તું તારા મિત્રોને બોલાવી શકે. એક સીટીનો અર્થ નમસ્તે હોઈ શકે. એક સીટી એક ગીત હોઈ શકે જે તારા મોંમાં ફિટ થઈ જાય. તુલી ને એ બહુ જોઈતી હતી.\n\nતુલી તડકાવાળી શેવાળના એક ટુકડા પર બેસી ગયો. તુલી એ પોતાના મોંથી એક સાવધાન નાનો O બનાવ્યો, જેમ એણે ઘેટાંપાળકને કરતો જોયો હતો. તુલી એ શ્વાસ લીધો. તુલી એ ફૂંક મારી.\n\n\"PFFFFFF,\" તુલી એ કર્યું.\n\nકોઈ સીટી નહીં.\n\nતુલી એ મોં બગાડ્યું. તુલી એ ફરી પ્રયત્ન કર્યો.\n\n\"PFFFFFFFFFFFF.\"\n\nકોઈ સીટી નહીં.\n\nએક ખિસકોલી એક ડાળી પરથી જોઈ રહી હતી. ખિસકોલી એક અકોર્ન બહુ ધીમે ધીમે ખાતી હતી, જેમ ખિસકોલીઓ કરે છે જ્યારે તેઓ એક તમાશો જોવા માટે જામી જાય છે.\n\n\"તું સીટી નથી વગાડતો,\" ખિસકોલીએ મદદથી કહ્યું.\n\n\"મને ખબર છે,\" તુલી એ કહ્યું.\n\nતુલી એ આખી સવાર પ્રયત્ન કર્યો. Pff. Pfff. Pffffff. ક્યારેક એક નાનકડી ફુસફુસાહટ આવતી. ક્યારેક કંઈ નહીં આવતું. એક વાર તુલી ના હોઠોએ એક પ્રકારની ભનભનાહટ કરી, જે સીટી નહોતી, પણ ઓછામાં ઓછું, એક નવો અવાજ હતો.\n\nબપોર સુધી, તુલી નું મોં થાકેલું લાગ્યું. બપોર પછી, તુલી નું મોં બહુ થાકેલું લાગ્યું.\n\nતુલી ધડ સાથે બેસી ગયો. તુલી નિરાશ હતો.\n\n\"કદાચ,\" તુલી એ ધીરેથી કહ્યું, \"હું ફક્ત સીટી નથી વગાડી શકતો.\"\n\nખિસકોલી અકોર્નની વચ્ચે અટકી.\n\n\"કદાચ,\" ખિસકોલીએ કહ્યું. \"અથવા કદાચ તું વગાડી શકે. ફક્ત હજી નહીં. 'નથી વગાડી શકતો' અને 'હજી નથી વગાડી શકતો' માં ફરક છે. મોટાભાગની વસ્તુઓ 'હજી નથી વગાડી શકતો' થી શરૂ થાય છે. પછી, જો તું ચાલતો રહે, એ 'વગાડી શકું છું' બની જાય છે. વચ્ચેનો કંટાળાજનક ભાગ એ છે જ્યાં મોટાભાગના શિયાળ હાર માની લે છે.\"\n\nતુલી એ એના વિશે વિચાર્યું. તુલી એ એના વિશે એક લાંબી ક્ષણ સુધી વિચાર્યું. વચ્ચેનો કંટાળાજનક ભાગ. તુલી ચોક્કસ વચ્ચેના કંટાળાજનક ભાગમાં હતો.\n\nતુલી એ ફરી પ્રયત્ન કર્યો. એણે એક સાવધાન શ્વાસ લીધો. એણે એક સાવધાન O બનાવ્યો.\n\n\"Pff.\"\n\nકંઈ નહીં.\n\nતુલી એ હાર ન માની.\n\nએણે ફરી પ્રયત્ન કર્યો.\n\nઅને પછી —\n\n\"PFEEEE.\"\n\nએક સીટી. એક નાનકડી. એક નાની, પાતળી, થોડી ડગમગતી સીટી. પણ, સ્પષ્ટ રીતે, એક સીટી.\n\nતુલી અટકી ગયો. તુલી એ સાંભળ્યું હતું. ખિસકોલીએ સાંભળ્યું હતું.\n\n\"તેં સાંભળ્યું?\" તુલી એ કહ્યું, એટલા ઉત્સાહથી કે સીટી તરત જ ફરીથી ચાલી ગઈ.\n\n\"મેં સાંભળ્યું!\" ખિસકોલીએ પોતાની જગ્યાએ કૂદતાં કહ્યું.\n\nસીટી નાની હતી. સીટી વધારે વાર નહોતી ચાલી. સીટી એક ગીત કરતાં વધારે એક ચૂ ચૂ હતી.\n\nપણ તુલી એ સીટી વગાડી હતી.\n\nઅને તુલી ને હવે ખબર હતી, સાચે, સાચી રીતે, જેવી રીતે તું ત્યારે જ જાણે છે જ્યારે તેં એક વાર કંઈક કર્યું હોય, કે એ કરી શકે છે.\n\n\"હું આ ફરી કરીશ,\" તુલી એ બહુ ગંભીરતાથી કહ્યું.\n\nઅને એણે કર્યું. દરરોજ. એ સારી થતી ગઈ.", "તુલી જુવાન શિયાળે પોતાનું મન બનાવી લીધું હતું. એણે આ સવારે નક્કી કર્યું હતું, એ ખાસ દૃઢતા સાથે જે એક પ્રાણીની હોય છે જે વધારે જાણવા માટે બહુ નાનું છે અને કોઈપણ વાતથી મનાવી લેવા માટે બહુ જિદ્દી છે. આજે, તુલી સીટી વગાડવાનું શીખવાનો હતો.\n\nએની શરૂઆત ઘેટાંપાળકથી થઈ હતી.\n\nએક દિવસ પહેલા, તુલી એક સુરક્ષિત અંતરથી એક ઘેટાંપાળકને જોઈ રહ્યો હતો. શિયાળ હંમેશા ઘેટાંપાળકોને સુરક્ષિત અંતરથી જુએ છે. અને ઘેટાંપાળકે સીટી વગાડી. ફક્ત એક વાર. એક સ્પષ્ટ, તેજસ્વી, બે સૂરવાળી સીટી જે ખેતરની પાર ગઈ હતી, અને એક કૂતરો બહુ દૂરથી દોડતો આવ્યો હતો. એ અવાજ તુલી ની છાતીમાં ઊતરી ગયો હતો અને ત્યાં જ રહી ગયો હતો. એક સીટી, તુલી એ વિચાર્યું. એક સીટી એક સાધન છે. એક સીટી એક ગીત છે જે તારા મોંમાં ફિટ થઈ જાય. એક સીટીથી તું બહુ દૂરથી મિત્રોને બોલાવી શકે. તુલી ને, બહુ, એક જોઈતી હતી.\n\nએટલે આ સવારે, તુલી એ સફાઈમાં તડકાવાળી શેવાળનો એક ટુકડો શોધ્યો, બહુ ગંભીરતાથી બેસી ગયો, અને શરૂ કર્યું.\n\nતુલી એ પોતાના મોંથી એક સાવધાન નાનો O બનાવ્યો, જેમ એણે ઘેટાંપાળકને કરતો જોયો હતો. એણે એક ધીમો, મપાયેલો શ્વાસ લીધો. એણે ફૂંક મારી.\n\n\"PFFFFFFF,\" તુલી એ કર્યું.\n\nકોઈ સીટી નહીં.\n\nતુલી એ મોં બગાડ્યું. તુલી એ O ને ગોઠવ્યો. તુલી એ ફરી પ્રયત્ન કર્યો.\n\n\"PFFFFFFFFFF.\"\n\nકોઈ સીટી નહીં.\n\nએક ખિસકોલી નજીકની એક ડાળી પર એક અકોર્ન સાથે આવી ગઈ હતી અને કાર્યવાહીને એ ધ્યાનથી જોઈ રહી હતી જે એક પ્રાણીની હોય છે જે શાનદાર મફત મનોરંજનમાં આવી પડ્યું હોય.\n\n\"તું સીટી નથી વગાડતો,\" ખિસકોલીએ એક ખાસ રીતે લાંબા PFFFF પછી કહ્યું.\n\n\"મને ખબર છે,\" તુલી એ કહ્યું.\n\nતુલી એ આખી સવાર કામ કર્યું. Pff. Pfff. Pffff. એણે પોતાના હોઠ ભીંસવાનો પ્રયત્ન કર્યો. એણે પોતાના હોઠ ઢીલા કરવાનો પ્રયત્ન કર્યો. એણે માથું નમાવવાનો પ્રયત્ન કર્યો. એણે માથું ન નમાવવાનો પ્રયત્ન કર્યો. એક વાર, એના હોઠોએ એક પ્રકારનો ફફડતો, ભનભનતો અવાજ કર્યો જે સીટી નહોતી, પણ ઓછામાં ઓછું, એક અવાજ હતો જે હોઠોએ પહેલા નહોતો કર્યો.\n\nમોડી સવાર સુધી, તુલી નું મોં થાકેલું લાગ્યું. બપોર સુધી, તુલી નું મોં થાકી ગયેલું લાગ્યું. વહેલી બપોર સુધી, તુલી નું મોં એવું લાગ્યું જાણે એણે ઘણા કલાકો સુધી એક બહુ સખત પાંદડું ચાવ્યું હોય.\n\nતુલી શેવાળ પર ધડ સાથે બેસી ગયો.\n\n\"કદાચ,\" તુલી એ ધીરેથી કહ્યું, મોટેભાગે પોતાને જ, \"હું ફક્ત સીટી નથી વગાડી શકતો. કદાચ સીટી વગાડવી શિયાળ નથી કરતા. કદાચ મારું મોં એના માટે ખોટા આકારનું છે. કદાચ…\"\n\nખિસકોલીએ અકોર્ન નીચે મૂક્યું. ખિસકોલીએ તુલી તરફ બહુ પ્રેમથી જોયું.\n\n\"કદાચ તું સીટી નથી વગાડી શકતો,\" ખિસકોલીએ કહ્યું. \"અથવા કદાચ તું વગાડી શકે. ફક્ત હજી નહીં. એ એક જ વાત નથી.\"\n\n\"એ એક જ વાત લાગે છે,\" તુલી એ કહ્યું.\n\n\"એ નથી,\" ખિસકોલીએ કહ્યું. \"નથી કરી શકતો એ એક દિવાલ છે. હજી નથી કરી શકતો એ એક દરવાજો છે જે તેં ખોલ્યો નથી. દુનિયાની મોટાભાગની વસ્તુઓ હજી નથી કરી શકતો થી શરૂ થાય છે. ચાલવું. ચઢવું. ગણવું. નદીમાંથી માછલી પકડવી. મારે ઘણી વાર પડવું પડ્યું હતું એ સમજતા પહેલા, અને હું, ટેકનિકલી રીતે, એક પ્રાણી છું જે પાણીનો આનંદ લેવાનું માનતું નથી.\"\n\n\"એમાં શું મુશ્કેલ હતું?\" તુલી એ પૂછ્યું.\n\n\"વચ્ચેનો ભાગ,\" ખિસકોલીએ તરત જ કહ્યું. \"વચ્ચેનો ભાગ એ છે જ્યાં મોટાભાગના શિયાળ હાર માની લે છે. શરૂઆત ઉત્તેજક હોય છે. તું એક નવી વસ્તુ શરૂ કરી રહ્યો છે! અંત શાનદાર હોય છે. તું એ વસ્તુ કરી શકે છે! પણ વચ્ચેનો ભાગ કંટાળાજનક છે, અને થકવી નાખનારો છે, અને એ નથી લાગતું કે તું ક્યાંય પહોંચી રહ્યો છે. વચ્ચેનો ભાગ એ છે જ્યાં તારે યાદ રાખવાનું છે કે કંટાળાજનક અને થકવી નાખનારું એ 'કામ નથી થઈ રહ્યું' જેટલું જ નથી. તું કામ કરી રહ્યો છે. તું ફક્ત હજી જોઈ શકતો નથી.\"\n\nતુલી એ એના વિશે વિચાર્યું.\n\nતુલી એ બીજો સાવધાન શ્વાસ લીધો. તુલી એ સાવધાન O બનાવ્યો. તુલી એ ફૂંક મારી.\n\n\"Pff.\"\n\nકંઈ નહીં.\n\nતુલી અટક્યો નહીં.\n\nતુલી એ ફરી પ્રયત્ન કર્યો.\n\nઅને પછી —\n\n\"PFEEEEE.\"\n\nએક સીટી. એક નાની સીટી. એક પાતળી, ડગમગતી, થોડી ચોંકાવનારી અવાજવાળી સીટી. પણ સ્પષ્ટ રીતે, સંપૂર્ણ રીતે, કોઈ શંકા વગર, એક સીટી.\n\nતુલી અટકી ગયો.\n\nખિસકોલી અટકી ગઈ.\n\n\"તેં સાંભળ્યું?\" તુલી એ એ ઊંચા, ખુશ અવાજમાં કહ્યું જેણે સીટીને તરત જ ફરી ગાયબ કરી દીધી.\n\n\"મેં સાંભળ્યું!\" ખિસકોલીએ ડાળી પરથી સીધી ઉપર કૂદતા કહ્યું.\n\nસીટી નાની હતી. સીટી ટૂંકી હતી. સીટી, સાચે, એ સ્પષ્ટ બે સૂરવાળી વસ્તુ કરતાં વધારે એક ચૂ ચૂ હતી જે ઘેટાંપાળકે બનાવી હતી. એ, ઉદારતાથી, અડધી સેકન્ડ ચાલી.\n\nપણ તુલી એ સીટી વગાડી હતી.\n\nઅને તુલી ને હવે ખબર હતી, સાચે, સાચી રીતે, પોતાના હાડકાંમાં, કે એ કરી શકે છે.\n\n\"હું આ ફરી કરીશ,\" તુલી એ બહુ ગંભીરતાથી કહ્યું.\n\nઅને એણે કર્યું. તરત નહીં. એ બપોર પછી પણ નહીં, બીજા એક કલાકના pff પછી. પણ બીજા દિવસે, બે વાર. અને એના પછીના દિવસે, ચાર વાર. અને બીજા અઠવાડિયાના અંત સુધી, જ્યારે ઘેટાંપાળકે ખેતરની પાર સીટી વગાડી, એક નાની, સ્પષ્ટ, થોડી ગર્વ ભરી સીટીએ જંગલમાંથી એને જવાબ આપ્યો.\n\n*વિચારવા જેવી વાત. વચ્ચેનો કંટાળાજનક ભાગ એ છે જ્યાં મોટાભાગની વસ્તુઓ તૂટી જાય છે. એવી કઈ વસ્તુ છે જેના વચ્ચેના કંટાળાજનક ભાગમાં તું અત્યારે છે? એક વધુ દિવસ માટે ચાલતા રહેવાનો અર્થ શું હશે?*"],
      es: ["Tuli el zorro quería silbar.\n\nTuli hizo una pequeña O con la boca.\n\nTuli sopló.\n\n\"PFFFF,\" dijo Tuli.\n\nNo salió ningún silbido.\n\nTuli lo intentó de nuevo. \"PFFFFFFFFF.\"\n\nNingún silbido.\n\nUna ardilla miraba. \"No estás silbando,\" dijo la ardilla.\n\n\"Lo sé,\" dijo Tuli.\n\nTuli lo intentó toda la mañana. \"Pfff. Pfffff. Pffff.\"\n\nNingún silbido.\n\nTuli se sentó. Tuli estaba cansado.\n\n\"Quizás no puedo silbar,\" dijo Tuli.\n\n\"Quizás,\" dijo la ardilla. \"O quizás puedes. Solo que todavía no.\"\n\nTuli pensó en eso.\n\nTuli lo intentó de nuevo. \"Pfff.\"\n\nY luego —\n\n\"Pfeeee.\"\n\nSalió un pequeño silbido. Muy pequeño. Pero un silbido.\n\nTuli sonrió una sonrisa de zorro muy grande.\n\n\"¿Lo oíste?\" dijo Tuli.\n\n\"¡Lo oí!\" dijo la ardilla.\n\nEl silbido fue pequeño. No duró mucho.\n\nPero Tuli había silbado.\n\nY Tuli sabía, ahora, que podía.\n\n\"Voy a hacer eso de nuevo,\" dijo Tuli.\n\nTuli practicó todos los días después de eso.\n\nFue mejorando.", "Tuli el joven zorro lo había decidido. Hoy, aprendería a silbar.\n\nTuli había oído a un pastor silbar una mañana, y el sonido había sido tan limpio y brillante y útil que Tuli había estado pensando en ello desde entonces. Un silbido podía llamar a tus amigos. Un silbido podía significar hola. Un silbido podía ser una canción que cabía en tu boca. Tuli quería eso mucho.\n\nTuli se sentó en un parche soleado de musgo. Tuli hizo una pequeña O cuidadosa con la boca, como había visto hacer al pastor. Tuli tomó aire. Tuli sopló.\n\n\"PFFFFFF,\" hizo Tuli.\n\nNingún silbido.\n\nTuli frunció el ceño. Tuli lo intentó de nuevo.\n\n\"PFFFFFFFFFFFF.\"\n\nNingún silbido.\n\nUna ardilla miraba desde una rama. La ardilla comía una bellota muy despacio, como hacen las ardillas cuando se acomodan para disfrutar de un espectáculo.\n\n\"No estás silbando,\" dijo la ardilla servicialmente.\n\n\"Soy consciente,\" dijo Tuli.\n\nTuli lo intentó toda la mañana. Pff. Pfff. Pffffff. A veces salía un pequeño sonido sibilante. A veces no salía nada en absoluto. Una vez los labios de Tuli hicieron una especie de aleteo zumbante, que no era un silbido, pero era, al menos, un sonido nuevo.\n\nPara el almuerzo, la boca de Tuli se sentía cansada. Para la tarde, la boca de Tuli se sentía extremadamente cansada.\n\nTuli se sentó con un golpe. Tuli estaba desanimado.\n\n\"Quizás,\" dijo Tuli despacio, \"simplemente no puedo silbar.\"\n\nLa ardilla hizo una pausa a mitad de bellota.\n\n\"Quizás,\" dijo la ardilla. \"O quizás puedes. Solo que todavía no. Hay una diferencia entre 'no puedo' y 'no puedo todavía'. La mayoría de las cosas empiezan como no puedo todavía. Luego, si sigues, se convierten en puedo. La parte aburrida del medio es donde la mayoría de los zorros se rinden.\"\n\nTuli pensó en esto. Tuli lo pensó durante un largo minuto. La parte aburrida del medio. Tuli estaba definitivamente en la parte aburrida del medio.\n\nTuli lo intentó de nuevo. Tomó un respiro cuidadoso. Hizo una O cuidadosa.\n\n\"Pff.\"\n\nNada.\n\nTuli no se rindió.\n\nLo intentó de nuevo.\n\nY luego —\n\n\"PFEEEE.\"\n\nUn silbido. Uno pequeño. Un silbido pequeño, fino, ligeramente tembloroso. Pero, inequívocamente, un silbido.\n\nTuli se quedó quieto. Tuli lo había oído. La ardilla lo había oído.\n\n\"¿LO OÍSTE?\" dijo Tuli, con tanto entusiasmo que el silbido inmediatamente se fue de nuevo.\n\n\"¡Lo oí!\" dijo la ardilla, saltando en su lugar.\n\nEl silbido había sido pequeño. El silbido no había durado mucho. El silbido había sido más un chillido que una melodía.\n\nPero Tuli había silbado.\n\nY Tuli sabía ahora, realmente, verdaderamente sabía, de la manera en que solo sabes después de haber hecho algo una vez, que podía.\n\n\"Voy a hacer eso de nuevo,\" dijo Tuli, muy seriamente.\n\nY lo hizo. Todos los días. Fue mejorando.", "Tuli el joven zorro lo había decidido. Lo había decidido por la mañana, con la firmeza particular de una criatura que es demasiado joven para saber mejor y demasiado decidida para que le hablen y le saquen de cualquier cosa. Hoy, Tuli iba a aprender a silbar.\n\nHabía empezado con el pastor.\n\nEl día anterior, Tuli había estado mirando a un pastor desde una distancia segura. Los zorros siempre miran a los pastores desde una distancia segura. Y el pastor había silbado. Solo una vez. Un silbido limpio, brillante, de dos notas que había cortado a través del campo, y un perro había venido corriendo desde muy lejos. El sonido había aterrizado en el pecho de Tuli y se había quedado ahí. Un silbido, pensó Tuli. Un silbido era una herramienta. Un silbido era una canción que cabía en tu boca. Un silbido podía llamar amigos desde una gran distancia. Tuli quería, mucho, tener uno.\n\nAsí que esta mañana, Tuli había encontrado un parche soleado de musgo en el claro, se había sentado con gran seriedad, y había comenzado.\n\nTuli hizo una pequeña O cuidadosa con la boca, como había visto hacer al pastor. Tomó un respiro lento, medido. Sopló.\n\n\"PFFFFFFF,\" hizo Tuli.\n\nNingún silbido.\n\nTuli frunció el ceño. Tuli ajustó la O. Tuli lo intentó de nuevo.\n\n\"PFFFFFFFFFF.\"\n\nNingún silbido.\n\nUna ardilla había aparecido en una rama cercana con una bellota y miraba el procedimiento con la atención enfocada, ligeramente encantada, de una criatura que ha tropezado con excelente entretenimiento gratis.\n\n\"No estás silbando,\" ofreció la ardilla, después de un PFFFF particularmente largo.\n\n\"Soy consciente,\" dijo Tuli.\n\nTuli trabajó en ello toda la mañana. Pff. Pfff. Pffff. Intentó apretar los labios. Intentó aflojar los labios. Intentó inclinar la cabeza. Intentó no inclinar la cabeza. Una vez, sus labios hicieron una especie de sonido aleteando, zumbando, que no era un silbido, pero era, al menos, un sonido que los labios no habían hecho antes.\n\nPara el final de la mañana, la boca de Tuli se sentía cansada. Para el mediodía, la boca de Tuli se sentía exhausta. Para la tarde temprana, la boca de Tuli se sentía como si la hubieran usado para masticar una hoja muy dura durante varias horas.\n\nTuli se desplomó sobre el musgo con un golpe.\n\n\"Quizás,\" dijo Tuli despacio, principalmente para sí mismo, \"simplemente no puedo silbar. Quizás silbar no es algo que hacen los zorros. Quizás mi boca es de la forma equivocada para ello. Quizás…\"\n\nLa ardilla dejó la bellota. La ardilla miró muy amablemente a Tuli.\n\n\"Quizás no puedes silbar,\" dijo la ardilla. \"O quizás puedes. Solo que todavía no. Esas no son la misma cosa.\"\n\n\"Se sienten como la misma cosa,\" dijo Tuli.\n\n\"No lo son,\" dijo la ardilla. \"No puedo es un muro. No puedo todavía es una puerta que no has abierto. La mayoría de las cosas en el mundo empiezan como no puedo todavía. Caminar. Trepar. Contar. Atrapar peces de un arroyo. Tuve que caer muchas veces antes de descubrir esa, y soy, técnicamente, una criatura que no se supone que disfrute del agua.\"\n\n\"¿Qué fue difícil de eso?\" preguntó Tuli.\n\n\"El medio,\" dijo la ardilla, inmediatamente. \"El medio es donde la mayoría de los zorros se rinden. El principio es emocionante. ¡Estás empezando algo nuevo! El final es maravilloso. ¡Puedes hacer la cosa! Pero el medio es aburrido, y agotador, y no se siente como si estuvieras llegando a ninguna parte. El medio es donde tienes que recordar que aburrido y agotador no son lo mismo que no funciona. Estás trabajando. Simplemente no puedes verlo todavía.\"\n\nTuli pensó en esto.\n\nTuli tomó otro respiro cuidadoso. Tuli hizo la O cuidadosa. Tuli sopló.\n\n\"Pff.\"\n\nNada.\n\nTuli no se detuvo.\n\nTuli lo intentó de nuevo.\n\nY luego —\n\n\"PFEEEEE.\"\n\nUn silbido. Un silbido pequeño. Un silbido fino, tembloroso, ligeramente sorprendido. Pero inequívocamente, claramente, completamente, innegablemente, un silbido.\n\nTuli se quedó quieto.\n\nLa ardilla se quedó quieta.\n\n\"¿LO OÍSTE?\" dijo Tuli, en la voz alta y alegre que inmediatamente hizo desaparecer el silbido de nuevo.\n\n\"¡LO OÍ!\" dijo la ardilla, saltando directo hacia arriba desde la rama.\n\nEl silbido había sido pequeño. El silbido había sido corto. El silbido había sido, francamente, más un chillido que la cosa limpia de dos notas que el pastor había producido. Había durado, generosamente, medio segundo.\n\nPero Tuli había silbado.\n\nY Tuli sabía ahora, realmente, verdaderamente, en sus huesos, que podía.\n\n\"Voy a hacer eso de nuevo,\" dijo Tuli, muy seriamente.\n\nY lo hizo. No de inmediato. Ni siquiera más tarde esa tarde, después de otra hora de pff. Pero al día siguiente, dos veces. Y al día siguiente, cuatro veces. Y para el final de la semana siguiente, cuando el pastor silbó a través del campo, un silbido pequeño, limpio, ligeramente orgulloso le respondió desde el bosque.\n\n*Algo para pensar. El aburrido medio es donde la mayoría de las cosas se derrumban. ¿Qué es algo en el aburrido medio del que estás ahora mismo? ¿Cómo se vería seguir un día más?*"],
      fr: ["Tuli le renard voulait siffler.\n\nTuli a fait un petit O avec sa bouche.\n\nTuli a soufflé.\n\n\"PFFFF,\" a dit Tuli.\n\nAucun sifflement n'est sorti.\n\nTuli a réessayé. \"PFFFFFFFFF.\"\n\nAucun sifflement.\n\nUn écureuil regardait. \"Tu ne siffles pas,\" a dit l'écureuil.\n\n\"Je sais,\" a dit Tuli.\n\nTuli a essayé toute la matinée. \"Pfff. Pfffff. Pffff.\"\n\nAucun sifflement.\n\nTuli s'est assis. Tuli était fatigué.\n\n\"Peut-être que je ne peux pas siffler,\" a dit Tuli.\n\n\"Peut-être,\" a dit l'écureuil. \"Ou peut-être que tu peux. Juste pas encore.\"\n\nTuli a pensé à ça.\n\nTuli a réessayé. \"Pfff.\"\n\nEt puis —\n\n\"Pfeeee.\"\n\nUn tout petit sifflement est sorti. Très petit. Mais un sifflement.\n\nTuli a souri un très grand sourire de renard.\n\n\"Tu as entendu?\" a dit Tuli.\n\n\"J'ai entendu!\" a dit l'écureuil.\n\nLe sifflement était petit. Il n'a pas duré longtemps.\n\nMais Tuli avait sifflé.\n\nEt Tuli savait, maintenant, qu'il pouvait.\n\n\"Je vais refaire ça,\" a dit Tuli.\n\nTuli s'est entraîné tous les jours après ça.\n\nC'est devenu mieux.", "Tuli le jeune renard avait décidé. Aujourd'hui, il apprendrait à siffler.\n\nTuli avait entendu un berger siffler un matin, et le son avait été si propre et brillant et utile que Tuli y pensait depuis. Un sifflement pouvait appeler tes amis. Un sifflement pouvait signifier bonjour. Un sifflement pouvait être une chanson qui rentrait dans ta bouche. Tuli voulait ça très fort.\n\nTuli s'est assis dans une parcelle ensoleillée de mousse. Tuli a fait un petit O soigneux avec sa bouche, comme il avait vu le berger faire. Tuli a pris une respiration. Tuli a soufflé.\n\n\"PFFFFFF,\" a fait Tuli.\n\nAucun sifflement.\n\nTuli a froncé les sourcils. Tuli a réessayé.\n\n\"PFFFFFFFFFFFF.\"\n\nAucun sifflement.\n\nUn écureuil regardait depuis une branche. L'écureuil mangeait un gland très lentement, comme font les écureuils quand ils s'installent pour profiter d'un spectacle.\n\n\"Tu ne siffles pas,\" a dit l'écureuil utilement.\n\n\"Je suis au courant,\" a dit Tuli.\n\nTuli a essayé toute la matinée. Pff. Pfff. Pffffff. Parfois un petit son sifflant sortait. Parfois rien ne sortait du tout. Une fois, les lèvres de Tuli ont fait une sorte de bourdonnement vibrant, qui n'était pas un sifflement, mais était, au moins, un nouveau son.\n\nÀ midi, la bouche de Tuli était fatiguée. Dans l'après-midi, la bouche de Tuli était extrêmement fatiguée.\n\nTuli s'est assis avec un bruit sourd. Tuli était découragé.\n\n\"Peut-être,\" a dit Tuli lentement, \"je ne peux simplement pas siffler.\"\n\nL'écureuil s'est arrêté au milieu du gland.\n\n\"Peut-être,\" a dit l'écureuil. \"Ou peut-être que tu peux. Juste pas encore. Il y a une différence entre 'je ne peux pas' et 'je ne peux pas encore'. La plupart des choses commencent par je ne peux pas encore. Puis, si tu continues, elles deviennent je peux. La partie ennuyeuse du milieu est là où la plupart des renards abandonnent.\"\n\nTuli a pensé à ça. Tuli y a pensé pendant une longue minute. La partie ennuyeuse du milieu. Tuli était définitivement dans la partie ennuyeuse du milieu.\n\nTuli a réessayé. Il a pris une respiration soigneuse. Il a fait un O soigneux.\n\n\"Pff.\"\n\nRien.\n\nTuli n'a pas abandonné.\n\nIl a réessayé.\n\nEt puis —\n\n\"PFEEEE.\"\n\nUn sifflement. Un petit. Un sifflement petit, fin, légèrement tremblant. Mais, sans aucun doute, un sifflement.\n\nTuli s'est figé. Tuli l'avait entendu. L'écureuil l'avait entendu.\n\n\"TU AS ENTENDU?\" a dit Tuli, avec tellement d'enthousiasme que le sifflement est immédiatement reparti.\n\n\"J'ai entendu!\" a dit l'écureuil, sautillant sur place.\n\nLe sifflement avait été petit. Le sifflement n'avait pas duré longtemps. Le sifflement avait été plus un couinement qu'une mélodie.\n\nMais Tuli avait sifflé.\n\nEt Tuli savait maintenant, vraiment, vraiment savait, de la manière dont tu ne sais que quand tu as fait quelque chose une fois, qu'il pouvait.\n\n\"Je vais refaire ça,\" a dit Tuli, très sérieusement.\n\nEt il l'a fait. Tous les jours. C'est devenu mieux.", "Tuli le jeune renard avait décidé. Il avait décidé cela le matin, avec la fermeté particulière d'une créature qui est trop jeune pour savoir mieux et trop déterminée pour qu'on la dissuade de quoi que ce soit. Aujourd'hui, Tuli allait apprendre à siffler.\n\nÇa avait commencé avec le berger.\n\nLa veille, Tuli avait regardé un berger à distance sûre. Les renards regardent toujours les bergers à distance sûre. Et le berger avait sifflé. Juste une fois. Un sifflement propre, brillant, à deux notes qui avait traversé le champ, et un chien était venu en courant de très loin. Le son avait atterri dans la poitrine de Tuli et y était resté. Un sifflement, a pensé Tuli. Un sifflement était un outil. Un sifflement était une chanson qui rentrait dans ta bouche. Un sifflement pouvait appeler des amis de très loin. Tuli voulait, très fort, en avoir un.\n\nDonc ce matin, Tuli avait trouvé une parcelle ensoleillée de mousse dans la clairière, s'était assis avec grand sérieux, et avait commencé.\n\nTuli a fait un petit O soigneux avec sa bouche, comme il avait vu le berger faire. Il a pris une respiration lente, mesurée. Il a soufflé.\n\n\"PFFFFFFF,\" a fait Tuli.\n\nAucun sifflement.\n\nTuli a froncé les sourcils. Tuli a ajusté le O. Tuli a réessayé.\n\n\"PFFFFFFFFFF.\"\n\nAucun sifflement.\n\nUn écureuil était apparu sur une branche voisine avec un gland et regardait la procédure avec l'attention concentrée, légèrement ravie, d'une créature qui est tombée sur un excellent divertissement gratuit.\n\n\"Tu ne siffles pas,\" a offert l'écureuil, après un PFFFF particulièrement long.\n\n\"Je suis au courant,\" a dit Tuli.\n\nTuli a travaillé là-dessus toute la matinée. Pff. Pfff. Pffff. Il a essayé de serrer ses lèvres. Il a essayé de relâcher ses lèvres. Il a essayé d'incliner sa tête. Il a essayé de ne pas incliner sa tête. Une fois, ses lèvres ont fait une sorte de bruit battant, bourdonnant, qui n'était pas un sifflement, mais était, au moins, un son que les lèvres n'avaient pas fait avant.\n\nVers la fin de la matinée, la bouche de Tuli était fatiguée. À midi, la bouche de Tuli était épuisée. En début d'après-midi, la bouche de Tuli avait l'impression d'avoir été utilisée pour mâcher une feuille très dure pendant plusieurs heures.\n\nTuli s'est affalé sur la mousse avec un bruit sourd.\n\n\"Peut-être,\" a dit Tuli lentement, surtout pour lui-même, \"je ne peux simplement pas siffler. Peut-être que siffler n'est pas quelque chose que les renards font. Peut-être que ma bouche est de la mauvaise forme pour ça. Peut-être…\"\n\nL'écureuil a posé le gland. L'écureuil a regardé Tuli très gentiment.\n\n\"Peut-être que tu ne peux pas siffler,\" a dit l'écureuil. \"Ou peut-être que tu peux. Juste pas encore. Ce ne sont pas la même chose.\"\n\n\"Ça ressemble à la même chose,\" a dit Tuli.\n\n\"Ce ne l'est pas,\" a dit l'écureuil. \"Je ne peux pas est un mur. Je ne peux pas encore est une porte que tu n'as pas ouverte. La plupart des choses dans le monde commencent par je ne peux pas encore. Marcher. Grimper. Compter. Attraper des poissons dans un ruisseau. J'ai dû tomber un très grand nombre de fois avant de comprendre celui-là, et je suis, techniquement, une créature qui n'est pas censée aimer l'eau.\"\n\n\"Qu'est-ce qui était difficile là-dedans?\" a demandé Tuli.\n\n\"Le milieu,\" a dit l'écureuil, immédiatement. \"Le milieu est là où la plupart des renards abandonnent. Le début est excitant. Tu commences quelque chose de nouveau! La fin est merveilleuse. Tu peux faire la chose! Mais le milieu est ennuyeux, et fatigant, et ça ne donne pas l'impression que tu arrives quelque part. Le milieu est là où tu dois te rappeler que ennuyeux et fatigant ne sont pas la même chose que ça ne marche pas. Tu travailles. Tu ne peux juste pas le voir encore.\"\n\nTuli a pensé à ça.\n\nTuli a pris une autre respiration soigneuse. Tuli a fait le O soigneux. Tuli a soufflé.\n\n\"Pff.\"\n\nRien.\n\nTuli ne s'est pas arrêté.\n\nTuli a réessayé.\n\nEt puis —\n\n\"PFEEEEE.\"\n\nUn sifflement. Un petit sifflement. Un sifflement fin, tremblant, légèrement surpris. Mais sans aucun doute, clairement, complètement, indéniablement, un sifflement.\n\nTuli s'est figé.\n\nL'écureuil s'est figé.\n\n\"TU AS ENTENDU?\" a dit Tuli, dans la voix forte et joyeuse qui a immédiatement fait disparaître le sifflement de nouveau.\n\n\"J'AI ENTENDU!\" a dit l'écureuil, sautant tout droit en l'air depuis la branche.\n\nLe sifflement avait été petit. Le sifflement avait été court. Le sifflement avait été, franchement, plus un couinement que la chose propre à deux notes que le berger avait produite. Il avait duré, généreusement, une demi-seconde.\n\nMais Tuli avait sifflé.\n\nEt Tuli savait maintenant, vraiment, vraiment, dans ses os, qu'il pouvait.\n\n\"Je vais refaire ça,\" a dit Tuli, très sérieusement.\n\nEt il l'a fait. Pas tout de suite. Pas même plus tard cet après-midi-là, après une autre heure de pff. Mais le lendemain, deux fois. Et le jour d'après, quatre fois. Et à la fin de la semaine suivante, quand le berger a sifflé à travers le champ, un petit sifflement propre, légèrement fier lui a répondu depuis les bois.\n\n*Quelque chose à penser. Le milieu ennuyeux est là où la plupart des choses s'effondrent. Quelle est une chose dont tu es au milieu ennuyeux en ce moment? À quoi ressemblerait continuer un jour de plus?*"]
