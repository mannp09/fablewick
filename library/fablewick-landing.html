    levels: {
      en: ["Long ago, a serious boy grew up in a big, busy city.\n\nThe boy's name was Pierpont. He liked numbers. He liked quiet rooms.\n\nWhen he grew up, he became a banker. He was the most famous banker in the whole country.\n\nOne autumn, something bad happened. People got scared. They ran to the banks. They wanted all their money. Right now. All at once.\n\nThere was not enough money for everyone.\n\nThe banks were going to fall over. The country was going to fall over.\n\nPierpont was an old man now. He thought for a while. Then he opened his library.\n\nHe called all the other bankers to come.\n\nThe bankers came. They argued. They shouted. They tried to leave.\n\nPierpont locked the door.\n\nHe sat in his big chair. He did not shout. He looked at them.\n\n\"Nobody leaves,\" he said, \"until we have decided.\"\n\nHe sat there for hours. He sat there for days. He waited.\n\nIn the end, they decided.\n\nThe country did not fall over.\n\nA steady person can change a noisy room.", "Long ago, in a big, busy American city, there was a serious boy named John Pierpont Morgan. Everyone called him Pierpont. Pierpont was the kind of boy who liked numbers more than he liked games. He liked quiet rooms more than he liked crowded ones. When he read, he read all the way to the end, even if the book was very long.\n\nPierpont grew up, and grew up some more, and eventually became a banker. He was so good at being a banker that, by the time he was an old man with a great white beard and small round glasses, he was the most famous banker in the entire country.\n\nOne autumn — Pierpont was seventy years old — something very bad happened.\n\nIt was called a panic.\n\nA panic, in money words, means that everyone gets scared at the same time. People who had put their savings in banks suddenly worried that the banks might not have their money anymore. So they ran to the banks. They stood in long lines. They asked for all their money back, all at once. The banks, who had loaned a lot of that money out, could not give everyone their money back at the same time. And so the banks were about to fall over. And if the banks fell over, the country was about to fall over too.\n\nPierpont was at his country home when he heard. He took a long train back to the city. He did not say much during the ride.\n\nWhen he got back, he did something nobody expected. He did not give a speech. He did not write a letter to the newspapers. Instead, he opened up his big private library — the one with all the rare books — and sent word to every important banker in the city to come there at once.\n\nThe bankers came. They sat in the library, surrounded by quiet shelves of old books, in chairs that creaked when they shifted. They argued. They shouted. Some of them tried to leave.\n\nPierpont locked the door.\n\nHe sat in his big leather chair, the one shaped like a throne, at the head of the room. He did not shout. He did not pound the table. He did not even speak very much. He just looked at them, one by one, with his small round glasses and his great white beard.\n\n\"Nobody,\" he said, finally, \"leaves this room until we have decided how to fix this.\"\n\nHe sat there for many hours. He sat there for days. He waited.\n\nIn the end, the bankers decided.\n\nThey put their own money together, all of them, and they used it to hold the banks up.\n\nThe country did not fall over.\n\nAnd it was because, in the middle of all that noise, one steady person had refused to move.", "Long ago, in a big, busy American city called New York, there was a serious boy named John Pierpont Morgan. Everyone called him Pierpont, because his first and middle names together were too much of a mouthful for a boy.\n\nPierpont was the kind of boy who, when other boys were running and yelling outside, was usually inside, reading a book or doing sums. He liked numbers more than he liked games. He liked quiet rooms more than he liked crowded ones. When he read a book, he read all the way to the end, even if the book was very long and very dull. When he made up his mind about something, his mind stayed made up.\n\nPierpont grew up. He went to school in America, and then to school in Switzerland and Germany. He grew tall. He grew a beard. He went into the family business, which was banking. And he was so quietly, stubbornly, doggedly good at being a banker that by the time he was an old man — with a great white beard, small round glasses, and a stare that could make a grown stranger forget his own name — Pierpont Morgan was the most famous banker in the entire country.\n\nOne autumn, when Pierpont was seventy years old and had been thinking, very seriously, about finally slowing down, something terrible happened.\n\nIt was called a panic.\n\nA panic, in the language of money, is what you get when everyone in a country becomes frightened about their savings at exactly the same time. It happened like this: a few important banks in New York had made some very risky bets and lost. Once one bank wobbled, people began to worry about *all* the banks. Worried people went to their banks to take their money out. Banks that had loaned a lot of that money out to other people couldn't give it all back at once. Lines outside the banks got longer. The newspapers shouted. The worry spread.\n\nAnd then the worry became something worse. Banks began closing their doors. Some closed because they had run out of money. Others closed because they were afraid they would run out tomorrow. By the middle of October, it looked very much as if every bank in America was about to fall over, all at the same time, in a slow, terrible chain reaction.\n\nIf the banks fell over, the country fell over.\n\nThis was no small thing.\n\nPierpont was at his country house when he first heard. He listened, very quietly, while the messenger told him what was happening. Then he packed a small bag, ate a slow dinner, and took a long train back to New York. He did not say much during the ride. He smoked a cigar. He looked out the window.\n\nWhen he got back to the city, he did something nobody quite expected. He did not give a public speech. He did not write angry letters to the newspapers. He did not appear on any kind of stage.\n\nInstead, he went home, walked up the steps of his big private library — the one with the rare books, behind the heavy bronze doors — and sent word to every important banker, broker, and government official in New York to come *there*, that evening, without fail.\n\nThey came. They had to. Everyone knew, by this point, that Pierpont Morgan was the only person in the room everyone else, secretly, looked to.\n\nThe library was a strange place for a meeting. It was hushed, and lined with very old books that smelled like leather and dust and history. There were paintings of stern-looking men on the walls. The chairs creaked whenever someone shifted in them. The whole room felt as if it had been designed, long ago, to make loud people feel slightly embarrassed about being loud.\n\nThe bankers came in. They sat. They argued. They shouted at each other across the table. Some of them said it was someone else's fault. Some of them said the government should fix it. Some of them, after an hour or two, simply tried to walk out of the room because they were tired and they did not see a solution coming.\n\nPierpont got up, walked to the door, and locked it.\n\nThen he went back to his big leather chair — the one at the head of the room, shaped almost like a throne — and he sat down. He did not slam the table. He did not shout. He did not even speak very much. He just looked at the men in the room, one by one, slowly, with his small round glasses and his great white beard.\n\n\"Nobody,\" he said, when the room had finally gone quiet, \"leaves this room until we have decided how to fix this.\"\n\nAnd then he waited.\n\nHe waited many hours. He waited through arguments that flared up and died down again. He waited through midnight, and through morning, and through more meals and more cigars than anyone could count. He came back in the next night and waited again. Some of the men slept on couches. Some of them paced. The country, outside, panicked and waited and panicked and waited.\n\nIn the end — because they had nowhere else to go, because Pierpont would not let them — the bankers decided.\n\nThey put their own money together, all of them, into one giant pool, and they used it to hold the wobbling banks up until the panic passed.\n\nThe country did not fall over.\n\nAfter that autumn, books were written about Pierpont Morgan, and not all of them were kind. Some said he had too much power for one person. Others said he had been a hero. Pierpont, who did not care very much for arguments about himself, mostly went back to his books and his numbers and his quiet, careful work.\n\nBut everyone who had been in that library — everyone who had sat in that uncomfortable chair under that uncomfortable stare — remembered the same thing.\n\nIn the middle of all that noise, one steady person had refused to move.\n\nAnd somehow, because of that, the whole country had been able to keep its feet.\n\n*Something to think about: Pierpont's power, in the library, wasn't shouting. It was sitting still. When have you noticed someone change a noisy room by being the calmest one in it? What might that look like for you?*"],
      hi: ["बहुत समय पहले, एक गंभीर लड़का एक बड़े, व्यस्त शहर में बड़ा हुआ।\n\nलड़के का नाम पियरपोंट था। उसे संख्याएँ पसंद थीं। उसे शांत कमरे पसंद थे।\n\nजब वह बड़ा हुआ, वह एक बैंकर बन गया। वह पूरे देश का सबसे प्रसिद्ध बैंकर था।\n\nएक पतझड़, कुछ बुरा हुआ। लोग डर गए। वे बैंकों की ओर भागे। वे अपना सारा पैसा चाहते थे। अभी। एक साथ।\n\nसबके लिए पर्याप्त पैसा नहीं था।\n\nबैंक गिरने वाले थे। देश गिरने वाला था।\n\nपियरपोंट अब बूढ़ा आदमी था। उसने कुछ देर सोचा। फिर उसने अपनी लाइब्रेरी खोली।\n\nउसने बाक़ी सभी बैंकरों को आने के लिए बुलाया।\n\nबैंकर आए। वे बहस करते रहे। वे चिल्लाते रहे। वे जाने की कोशिश करते रहे।\n\nपियरपोंट ने दरवाज़ा बंद कर दिया।\n\nवह अपनी बड़ी कुर्सी पर बैठ गया। वह चिल्लाया नहीं। उसने उन्हें देखा।\n\n\"कोई नहीं जाएगा,\" उसने कहा, \"जब तक हम तय नहीं कर लेते।\"\n\nवह घंटों वहाँ बैठा रहा। वह दिनों वहाँ बैठा रहा। वह इंतज़ार करता रहा।\n\nआख़िर में, उन्होंने तय कर लिया।\n\nदेश नहीं गिरा।\n\nएक स्थिर इंसान एक शोरगुल वाले कमरे को बदल सकता है।", "बहुत समय पहले, एक बड़े, व्यस्त अमेरिकी शहर में, जॉन पियरपोंट मॉर्गन नाम का एक गंभीर लड़का था। सब उसे पियरपोंट कहते थे। पियरपोंट उस तरह का लड़का था जिसे खेलों से ज़्यादा संख्याएँ पसंद थीं। उसे भीड़ वाले कमरों से ज़्यादा शांत कमरे पसंद थे। जब वह पढ़ता था, वह आख़िर तक पढ़ता था, चाहे किताब बहुत लम्बी हो।\n\nपियरपोंट बड़ा हुआ, और थोड़ा और बड़ा हुआ, और आख़िरकार एक बैंकर बन गया। वह बैंकर होने में इतना अच्छा था कि जब वह एक बड़ी सफ़ेद दाढ़ी और छोटे गोल चश्मे वाला बूढ़ा आदमी बना, तब तक वह पूरे देश का सबसे प्रसिद्ध बैंकर था।\n\nएक पतझड़ — पियरपोंट सत्तर साल का था — कुछ बहुत बुरा हुआ।\n\nइसे पैनिक कहा गया।\n\nपैनिक, पैसे की भाषा में, मतलब है कि सब एक साथ डर जाते हैं। जिन लोगों ने अपनी बचत बैंकों में रखी थी, उन्हें अचानक चिंता हुई कि शायद बैंकों के पास उनका पैसा नहीं है। तो वे बैंकों की ओर भागे। वे लम्बी क़तारों में खड़े हुए। उन्होंने अपना सारा पैसा एक साथ वापस माँगा। बैंक, जिन्होंने उसमें से बहुत सारा पैसा उधार दे दिया था, सबको एक साथ पैसा वापस नहीं दे सकते थे। और इसलिए बैंक गिरने वाले थे। और अगर बैंक गिरते, देश भी गिरने वाला था।\n\nजब पियरपोंट को ख़बर मिली तब वह अपने देहाती घर पर था। उसने शहर वापस आने के लिए एक लम्बी ट्रेन ली। रास्ते में उसने ज़्यादा कुछ नहीं कहा।\n\nजब वह वापस आया, उसने वह किया जिसकी किसी को उम्मीद नहीं थी। उसने कोई भाषण नहीं दिया। उसने अख़बारों को कोई पत्र नहीं लिखा। बजाय इसके, उसने अपनी बड़ी निजी लाइब्रेरी खोल दी — वही जिसमें सभी दुर्लभ किताबें थीं — और शहर के हर महत्वपूर्ण बैंकर को तुरंत वहाँ आने के लिए ख़बर भेज दी।\n\nबैंकर आए। वे लाइब्रेरी में बैठे, पुरानी किताबों की शांत अलमारियों से घिरे हुए, उन कुर्सियों पर जो हिलने पर चरमराती थीं। वे बहस करते रहे। वे चिल्लाते रहे। उनमें से कुछ ने जाने की कोशिश की।\n\nपियरपोंट ने दरवाज़ा बंद कर दिया।\n\nवह अपनी बड़ी चमड़े की कुर्सी पर बैठ गया, वही जो सिंहासन जैसी आकार की थी, कमरे के सिर पर। वह चिल्लाया नहीं। उसने मेज़ नहीं पीटी। उसने ज़्यादा बात भी नहीं की। उसने बस उन्हें देखा, एक-एक करके, अपने छोटे गोल चश्मे और बड़ी सफ़ेद दाढ़ी के साथ।\n\n\"कोई भी,\" आख़िरकार उसने कहा, \"इस कमरे से तब तक नहीं जाएगा जब तक हम तय नहीं कर लेते कि इसे कैसे ठीक करें।\"\n\nवह कई घंटों वहाँ बैठा रहा। वह दिनों वहाँ बैठा रहा। उसने इंतज़ार किया।\n\nआख़िर में, बैंकरों ने तय कर लिया।\n\nउन्होंने अपना पैसा एक साथ रखा, सब ने, और उसका इस्तेमाल करके बैंकों को सहारा दिया।\n\nदेश नहीं गिरा।\n\nऔर यह इसलिए हुआ क्योंकि उस सारे शोर के बीच में, एक स्थिर इंसान ने हिलने से इनकार कर दिया था।", "बहुत समय पहले, न्यू यॉर्क नाम के एक बड़े, व्यस्त अमेरिकी शहर में, जॉन पियरपोंट मॉर्गन नाम का एक गंभीर लड़का था। सब उसे पियरपोंट कहते थे, क्योंकि उसका पहला और बीच का नाम एक साथ एक लड़के के लिए बहुत भारी थे।\n\nपियरपोंट उस तरह का लड़का था जो, जब बाक़ी लड़के बाहर भागते और चिल्लाते थे, आम तौर पर अंदर होता था, किताब पढ़ता या जोड़ करता हुआ। उसे खेलों से ज़्यादा संख्याएँ पसंद थीं। उसे भीड़ वाले कमरों से ज़्यादा शांत कमरे पसंद थे। जब वह किताब पढ़ता था, वह आख़िर तक पढ़ता था, चाहे किताब बहुत लम्बी और बहुत उबाऊ हो। जब वह किसी बात के बारे में अपना मन बना लेता था, उसका मन बना ही रहता था।\n\nपियरपोंट बड़ा हुआ। उसने अमेरिका में स्कूल किया, और फिर स्विट्ज़रलैंड और जर्मनी में स्कूल किया। वह लम्बा हुआ। उसके दाढ़ी आई। वह परिवार के कारोबार में गया, जो बैंकिंग था। और वह बैंकर होने में इतना चुपचाप, ज़िद्दी ढंग से, लगन से अच्छा था कि जब तक वह एक बूढ़ा आदमी बना — एक बड़ी सफ़ेद दाढ़ी, छोटे गोल चश्मे, और एक ऐसी नज़र के साथ जो एक बड़े अजनबी को उसका अपना नाम भुला सकती थी — पियरपोंट मॉर्गन पूरे देश का सबसे प्रसिद्ध बैंकर था।\n\nएक पतझड़, जब पियरपोंट सत्तर साल का था और बहुत गंभीरता से आख़िरकार धीमे होने के बारे में सोच रहा था, कुछ भयानक हुआ।\n\nइसे पैनिक कहा गया।\n\nपैनिक, पैसे की भाषा में, वह है जो तब होता है जब किसी देश में सब लोग ठीक एक ही समय पर अपनी बचत के बारे में डर जाते हैं। यह इस तरह हुआ: न्यू यॉर्क में कुछ महत्वपूर्ण बैंकों ने कुछ बहुत जोखिम भरे दाँव लगाए और हार गए। एक बार जब एक बैंक डगमगाया, लोग *सभी* बैंकों के बारे में चिंता करने लगे। चिंतित लोग अपना पैसा निकालने अपने बैंकों में गए। जिन बैंकों ने उसमें से बहुत सारा पैसा दूसरे लोगों को उधार दे दिया था, वे एक साथ सब कुछ वापस नहीं दे सकते थे। बैंकों के बाहर क़तारें लम्बी होने लगीं। अख़बार चिल्लाने लगे। चिंता फैल गई।\n\nऔर फिर चिंता कुछ और बुरी बन गई। बैंक अपने दरवाज़े बंद करने लगे। कुछ इसलिए बंद हुए क्योंकि उनके पास पैसा ख़त्म हो गया था। दूसरे इसलिए बंद हुए क्योंकि उन्हें डर था कि कल पैसा ख़त्म हो जाएगा। अक्टूबर के बीच तक, ऐसा लग रहा था जैसे अमेरिका का हर बैंक एक साथ, एक धीमी, भयानक श्रृंखला प्रतिक्रिया में गिरने वाला है।\n\nअगर बैंक गिरते, देश गिर जाता।\n\nयह कोई छोटी बात नहीं थी।\n\nजब पियरपोंट को पहली बार ख़बर मिली तब वह अपने देहाती घर पर था। उसने बहुत चुपचाप सुना जब संदेशवाहक ने उसे बताया कि क्या हो रहा है। फिर उसने एक छोटा बैग पैक किया, धीरे-धीरे खाना खाया, और न्यू यॉर्क वापस आने के लिए एक लम्बी ट्रेन ली। रास्ते में उसने ज़्यादा कुछ नहीं कहा। उसने एक सिगार पिया। उसने खिड़की से बाहर देखा।\n\nजब वह शहर वापस आया, उसने वह किया जिसकी किसी को ठीक से उम्मीद नहीं थी। उसने कोई सार्वजनिक भाषण नहीं दिया। उसने अख़बारों को नाराज़ पत्र नहीं लिखे। वह किसी भी मंच पर नहीं आया।\n\nबजाय इसके, वह घर गया, अपनी बड़ी निजी लाइब्रेरी की सीढ़ियाँ चढ़ा — वही जिसमें दुर्लभ किताबें थीं, भारी काँसे के दरवाज़ों के पीछे — और न्यू यॉर्क के हर महत्वपूर्ण बैंकर, ब्रोकर, और सरकारी अधिकारी को संदेश भेजा कि *वहाँ* आएँ, उस शाम, बिना नागा।\n\nवे आए। उन्हें आना पड़ा। सब जानते थे, इस समय तक, कि पियरपोंट मॉर्गन ही वह एक इंसान था जिसकी ओर बाक़ी सब चुपके से देखते थे।\n\nलाइब्रेरी मीटिंग के लिए एक अजीब जगह थी। यह शांत थी, और बहुत पुरानी किताबों से लाइन की गई थी जिनसे चमड़े, धूल, और इतिहास की महक आती थी। दीवारों पर कड़े दिखने वाले पुरुषों की पेंटिंग्स थीं। कुर्सियाँ जब भी कोई हिलता तो चरमराती थीं। पूरा कमरा ऐसा महसूस होता था जैसे बहुत पहले इसे इस तरह से डिज़ाइन किया गया हो कि शोर मचाने वाले लोग शोर मचाने के बारे में थोड़े शर्मिंदा महसूस करें।\n\nबैंकर अंदर आए। वे बैठे। वे बहस करते रहे। वे मेज़ के पार एक-दूसरे पर चिल्लाते रहे। उनमें से कुछ ने कहा कि किसी और की ग़लती है। उनमें से कुछ ने कहा कि सरकार को इसे ठीक करना चाहिए। उनमें से कुछ ने, एक-दो घंटे बाद, बस कमरे से बाहर जाने की कोशिश की क्योंकि वे थक गए थे और उन्हें कोई हल नहीं दिख रहा था।\n\nपियरपोंट उठा, दरवाज़े तक गया, और उसे बंद कर दिया।\n\nफिर वह अपनी बड़ी चमड़े की कुर्सी पर वापस गया — कमरे के सिर पर वाली, लगभग सिंहासन जैसी आकार की — और वह बैठ गया। उसने मेज़ नहीं पीटी। वह चिल्लाया नहीं। उसने ज़्यादा बात भी नहीं की। उसने बस कमरे में पुरुषों को देखा, एक-एक करके, धीरे-धीरे, अपने छोटे गोल चश्मे और बड़ी सफ़ेद दाढ़ी के साथ।\n\n\"कोई भी,\" आख़िरकार कमरा शांत हुआ तो उसने कहा, \"इस कमरे से तब तक नहीं जाएगा जब तक हम तय नहीं कर लेते कि इसे कैसे ठीक करें।\"\n\nऔर फिर उसने इंतज़ार किया।\n\nउसने कई घंटों इंतज़ार किया। उसने बहसों के दौरान इंतज़ार किया जो भड़की और फिर शांत हो गईं। उसने आधी रात तक इंतज़ार किया, और सुबह तक, और इतने खानों और इतने सिगार के दौरान जिनकी कोई गिनती नहीं कर सकता था। वह अगली रात फिर आया और फिर इंतज़ार किया। कुछ लोग सोफ़ों पर सो गए। कुछ लोग टहलते रहे। बाहर देश घबराता रहा और इंतज़ार करता रहा और घबराता रहा और इंतज़ार करता रहा।\n\nआख़िर में — क्योंकि उनके पास जाने को और कोई जगह नहीं थी, क्योंकि पियरपोंट उन्हें जाने नहीं देगा — बैंकरों ने तय कर लिया।\n\nउन्होंने अपना पैसा एक साथ रखा, सब ने, एक बड़े तालाब में, और उसका इस्तेमाल डगमगाते बैंकों को सहारा देने के लिए किया जब तक पैनिक ख़त्म नहीं हुआ।\n\nदेश नहीं गिरा।\n\nउस पतझड़ के बाद, पियरपोंट मॉर्गन के बारे में किताबें लिखी गईं, और वे सब दयालु नहीं थीं। कुछ ने कहा कि उसके पास एक इंसान के लिए बहुत ज़्यादा शक्ति थी। दूसरों ने कहा कि वह एक हीरो था। पियरपोंट, जिसे अपने बारे में बहसों की ज़्यादा परवाह नहीं थी, ज़्यादातर अपनी किताबों और अपनी संख्याओं और अपने शांत, सावधान काम पर वापस चला गया।\n\nपर जो कोई उस लाइब्रेरी में था — जो कोई उस असहज कुर्सी पर उस असहज नज़र के नीचे बैठा था — सब को एक ही बात याद थी।\n\nउस सारे शोर के बीच में, एक स्थिर इंसान ने हिलने से इनकार कर दिया था।\n\nऔर किसी तरह, उसकी वजह से, पूरा देश अपने पैरों पर खड़ा रह पाया था।\n\n*सोचने की बात: पियरपोंट की शक्ति, लाइब्रेरी में, चिल्लाना नहीं थी। वह स्थिर बैठना थी। तुमने कब देखा है कि किसी ने कमरे में सबसे शांत होकर एक शोरगुल वाले कमरे को बदल दिया? तुम्हारे लिए वह कैसा दिख सकता है?*"],
      gu: ["બહુ સમય પહેલા, એક ગંભીર છોકરો એક મોટા, વ્યસ્ત શહેરમાં મોટો થયો.\n\nછોકરાનું નામ પિયરપોન્ટ હતું. એને સંખ્યાઓ ગમતી હતી. એને શાંત રૂમ ગમતા હતા.\n\nજ્યારે એ મોટો થયો, એ એક બેંકર બન્યો. એ આખા દેશનો સૌથી પ્રખ્યાત બેંકર હતો.\n\nએક પાનખર, કંઈક ખરાબ થયું. લોકો ડરી ગયા. એ બેંકો તરફ દોડ્યા. એમને એમના બધા પૈસા જોઈતા હતા. અત્યારે જ. એક સાથે.\n\nબધા માટે પૂરતા પૈસા ન હતા.\n\nબેંકો પડવાની હતી. દેશ પડવાનો હતો.\n\nપિયરપોન્ટ હવે વૃદ્ધ માણસ હતો. એણે થોડી વાર વિચાર્યું. પછી એણે પોતાનું પુસ્તકાલય ખોલ્યું.\n\nએણે બાકીના બધા બેંકરોને આવવા માટે બોલાવ્યા.\n\nબેંકરો આવ્યા. એ વાદવિવાદ કરતા રહ્યા. એ બૂમો પાડતા રહ્યા. એ જવાનો પ્રયત્ન કરતા રહ્યા.\n\nપિયરપોન્ટ એ બારણું બંધ કરી દીધું.\n\nએ પોતાની મોટી ખુરશીમાં બેઠો. એ બૂમો ન પાડ્યો. એણે એમની સામે જોયું.\n\n\"કોઈ નહીં જાય,\" એણે કહ્યું, \"જ્યાં સુધી અમે નક્કી નહીં કરી લઈએ.\"\n\nએ કલાકો સુધી ત્યાં બેઠો. એ દિવસો સુધી ત્યાં બેઠો. એ રાહ જોતો રહ્યો.\n\nઅંતે, એમણે નક્કી કરી લીધું.\n\nદેશ પડ્યો નહીં.\n\nએક સ્થિર વ્યક્તિ એક ઘોંઘાટભર્યા રૂમને બદલી શકે છે.", "બહુ સમય પહેલા, એક મોટા, વ્યસ્ત અમેરિકન શહેરમાં, જ્હોન પિયરપોન્ટ મોર્ગન નામનો એક ગંભીર છોકરો હતો. બધા એને પિયરપોન્ટ કહેતા. પિયરપોન્ટ એવા પ્રકારનો છોકરો હતો જેને રમતો કરતાં સંખ્યાઓ વધારે ગમતી. એને ભીડભાડવાળા રૂમ કરતાં શાંત રૂમ વધારે ગમતા. જ્યારે એ વાંચતો, એ અંત સુધી વાંચતો, ભલે પુસ્તક ખૂબ લાંબું હોય.\n\nપિયરપોન્ટ મોટો થયો, અને થોડો વધારે મોટો થયો, અને છેવટે એક બેંકર બન્યો. એ બેંકર હોવામાં એટલો સારો હતો કે જ્યારે એ મોટી સફેદ દાઢી અને નાના ગોળ ચશ્મા સાથેનો વૃદ્ધ માણસ બન્યો, ત્યાં સુધી એ આખા દેશનો સૌથી પ્રખ્યાત બેંકર હતો.\n\nએક પાનખર — પિયરપોન્ટ સિત્તેર વર્ષનો હતો — કંઈક બહુ ખરાબ થયું.\n\nએને પેનિક કહેવાયું.\n\nપેનિક, પૈસાની ભાષામાં, એટલે કે બધા એક જ સમયે ડરી જાય. જે લોકોએ પોતાની બચત બેંકોમાં મૂકી હતી તેઓ અચાનક ચિંતા કરવા લાગ્યા કે કદાચ બેંકો પાસે હવે એમના પૈસા ન હોય. તેથી એ બેંકો તરફ દોડ્યા. એ લાંબી હારોમાં ઊભા રહ્યા. એમણે પોતાના બધા પૈસા એક સાથે પાછા માગ્યા. બેંકો, જેમણે એમાંથી ઘણા પૈસા ઉધાર આપી દીધા હતા, બધાને એક સાથે પૈસા પાછા આપી શકતી ન હતી. અને તેથી બેંકો પડવાની હતી. અને જો બેંકો પડે, દેશ પણ પડવાનો હતો.\n\nજ્યારે પિયરપોન્ટ ને સમાચાર મળ્યા ત્યારે એ પોતાના ગામડાના ઘરે હતો. એણે શહેરમાં પાછા આવવા માટે એક લાંબી ટ્રેન લીધી. રસ્તામાં એ બહુ બોલ્યો નહીં.\n\nજ્યારે એ પાછો આવ્યો, એણે કંઈક એવું કર્યું જેની કોઈએ અપેક્ષા ન હતી. એણે કોઈ ભાષણ ન આપ્યું. એણે અખબારોને કોઈ પત્ર ન લખ્યો. એને બદલે, એણે પોતાનું મોટું ખાનગી પુસ્તકાલય ખોલ્યું — એ જ જેમાં બધા દુર્લભ પુસ્તકો હતા — અને શહેરના દરેક મહત્વના બેંકરને તરત જ ત્યાં આવવા સંદેશ મોકલ્યો.\n\nબેંકરો આવ્યા. એ પુસ્તકાલયમાં બેઠા, જૂના પુસ્તકોની શાંત શેલ્ફથી ઘેરાયેલા, એવી ખુરશીઓમાં જે હાલતી ત્યારે ચીંચીંયાટી. એ વાદવિવાદ કરતા રહ્યા. એ બૂમો પાડતા રહ્યા. એમાંના કેટલાકે જવાનો પ્રયત્ન કર્યો.\n\nપિયરપોન્ટ એ બારણું બંધ કરી દીધું.\n\nએ પોતાની મોટી ચામડાની ખુરશીમાં બેઠો, જે સિંહાસન જેવી આકારની હતી, રૂમના માથે. એ બૂમો ન પાડ્યો. એણે ટેબલ પર પછાડ્યું નહીં. એણે વધારે વાત પણ ન કરી. એણે ફક્ત એમને જોયા, એક પછી એક, પોતાના નાના ગોળ ચશ્મા અને મોટી સફેદ દાઢી સાથે.\n\n\"કોઈ,\" એણે છેવટે કહ્યું, \"આ રૂમમાંથી ત્યાં સુધી નહીં જાય જ્યાં સુધી અમે નક્કી નથી કરી લેતા કે આને કેવી રીતે ઠીક કરવું.\"\n\nએ ઘણા કલાકો સુધી ત્યાં બેઠો. એ દિવસો સુધી ત્યાં બેઠો. એ રાહ જોતો રહ્યો.\n\nઅંતે, બેંકરોએ નક્કી કરી લીધું.\n\nએ બધાએ પોતાના પૈસા એક સાથે મૂક્યા, અને એનો ઉપયોગ બેંકોને ટેકો આપવા માટે કર્યો.\n\nદેશ પડ્યો નહીં.\n\nઅને એ એટલા માટે હતું કે એ બધા ઘોંઘાટની વચ્ચે, એક સ્થિર વ્યક્તિએ હાલવાનો ઇનકાર કરી દીધો હતો.", "બહુ સમય પહેલા, ન્યૂ યોર્ક નામના એક મોટા, વ્યસ્ત અમેરિકન શહેરમાં, જ્હોન પિયરપોન્ટ મોર્ગન નામનો એક ગંભીર છોકરો હતો. બધા એને પિયરપોન્ટ કહેતા, કેમ કે એનું પહેલું અને વચલું નામ એક છોકરા માટે એક સાથે ખૂબ ભારે હતા.\n\nપિયરપોન્ટ એવા પ્રકારનો છોકરો હતો કે, જ્યારે બીજા છોકરાઓ બહાર દોડતા અને બૂમો પાડતા, સામાન્ય રીતે અંદર હોતો, પુસ્તક વાંચતો કે સરવાળા કરતો. એને રમતો કરતાં સંખ્યાઓ વધારે ગમતી. એને ભીડભાડવાળા રૂમ કરતાં શાંત રૂમ વધારે ગમતા. જ્યારે એ પુસ્તક વાંચતો, એ અંત સુધી વાંચતો, ભલે પુસ્તક ખૂબ લાંબું અને ખૂબ કંટાળાજનક હોય. જ્યારે એ કોઈ વાત વિશે મન બનાવી લેતો, એનું મન બનેલું જ રહેતું.\n\nપિયરપોન્ટ મોટો થયો. એણે અમેરિકામાં શાળામાં અભ્યાસ કર્યો, અને પછી સ્વિટ્ઝરલેન્ડ અને જર્મની માં અભ્યાસ કર્યો. એ ઊંચો થયો. એને દાઢી આવી. એ પરિવારના વ્યવસાયમાં ગયો, જે બેંકિંગ હતો. અને એ બેંકર હોવામાં એટલો શાંતપણે, હઠપૂર્વક, મહેનતથી સારો હતો કે જ્યાં સુધી એ વૃદ્ધ માણસ બન્યો — મોટી સફેદ દાઢી, નાના ગોળ ચશ્મા, અને એવી નજર સાથે જે એક મોટા અજાણ્યાને એનું પોતાનું નામ ભુલાવી શકતી — પિયરપોન્ટ મોર્ગન આખા દેશનો સૌથી પ્રખ્યાત બેંકર હતો.\n\nએક પાનખર, જ્યારે પિયરપોન્ટ સિત્તેર વર્ષનો હતો અને બહુ ગંભીરતાથી છેવટે ધીમો થવા વિશે વિચારી રહ્યો હતો, કંઈક ભયંકર થયું.\n\nએને પેનિક કહેવાયું.\n\nપેનિક, પૈસાની ભાષામાં, એ છે જે ત્યારે થાય જ્યારે દેશમાં બધા લોકો બરાબર એક જ સમયે પોતાની બચત વિશે ડરી જાય. એ આ રીતે થયું: ન્યૂ યોર્ક માં કેટલીક મહત્વની બેંકોએ બહુ જોખમી દાવ લગાવ્યા અને હારી ગયા. એક વાર એક બેંક ડગમગાઈ, લોકો *બધી* બેંકો વિશે ચિંતા કરવા લાગ્યા. ચિંતિત લોકો પોતાના પૈસા કાઢવા પોતાની બેંકોમાં ગયા. જે બેંકોએ એમાંથી ઘણા પૈસા બીજા લોકોને ઉધાર આપી દીધા હતા તે બધું એક સાથે પાછું આપી શકતી ન હતી. બેંકોની બહાર હારો લાંબી થવા લાગી. અખબારો બૂમો પાડવા લાગ્યા. ચિંતા ફેલાઈ ગઈ.\n\nઅને પછી ચિંતા કંઈક વધારે ખરાબ બની. બેંકો પોતાના બારણાં બંધ કરવા લાગી. કેટલીક એટલા માટે બંધ થઈ કેમ કે એમની પાસે પૈસા ખલાસ થઈ ગયા હતા. બીજી એટલા માટે બંધ થઈ કેમ કે એમને ડર હતો કે કાલે પૈસા ખલાસ થઈ જશે. ઓક્ટોબરની વચ્ચે સુધી, એવું લાગતું હતું જાણે અમેરિકાની દરેક બેંક એક સાથે, એક ધીમી, ભયંકર સાંકળ પ્રતિક્રિયામાં, પડવાની છે.\n\nજો બેંકો પડે, દેશ પડે.\n\nએ કોઈ નાની વાત ન હતી.\n\nજ્યારે પિયરપોન્ટ ને પહેલી વાર સમાચાર મળ્યા ત્યારે એ પોતાના ગામડાના ઘરે હતો. એણે બહુ શાંતપણે સાંભળ્યું જ્યારે સંદેશવાહકે એને કહ્યું કે શું થઈ રહ્યું છે. પછી એણે એક નાની થેલી ભરી, ધીમેથી જમ્યો, અને ન્યૂ યોર્ક પાછા આવવા માટે એક લાંબી ટ્રેન લીધી. રસ્તામાં એ બહુ બોલ્યો નહીં. એણે એક સિગાર પીધો. એણે બારી બહાર જોયું.\n\nજ્યારે એ શહેરમાં પાછો આવ્યો, એણે કંઈક એવું કર્યું જેની કોઈને બરાબર અપેક્ષા ન હતી. એણે કોઈ જાહેર ભાષણ ન આપ્યું. એણે અખબારોને ગુસ્સાભર્યા પત્રો ન લખ્યા. એ કોઈ સ્ટેજ પર ન આવ્યો.\n\nએને બદલે, એ ઘરે ગયો, પોતાના મોટા ખાનગી પુસ્તકાલયની સીડીઓ ચડ્યો — એ જ જેમાં દુર્લભ પુસ્તકો હતા, ભારે કાંસાના બારણાં પાછળ — અને ન્યૂ યોર્ક ના દરેક મહત્વના બેંકર, બ્રોકર, અને સરકારી અધિકારીને સંદેશ મોકલ્યો કે *ત્યાં* આવે, એ સાંજે, ચૂક્યા વગર.\n\nએ આવ્યા. એમને આવવું પડ્યું. બધા જાણતા હતા, આ સમય સુધી, કે પિયરપોન્ટ મોર્ગન જ એ એક વ્યક્તિ હતો જેની તરફ બાકીના બધા, ગુપ્ત રીતે, જોતા હતા.\n\nપુસ્તકાલય મીટિંગ માટે વિચિત્ર જગ્યા હતી. એ શાંત હતી, અને બહુ જૂના પુસ્તકોથી લાઇન કરેલી હતી જેમાંથી ચામડું, ધૂળ, અને ઇતિહાસની ગંધ આવતી. દિવાલો પર કડક દેખાતા પુરુષોના ચિત્રો હતા. ખુરશીઓ જ્યારે પણ કોઈ હાલતું ત્યારે ચીંચીંયાટી. આખો રૂમ એવું લાગતું જાણે બહુ સમય પહેલા એને એવી રીતે ડિઝાઇન કર્યો હોય કે ઘોંઘાટ કરનારા લોકોને ઘોંઘાટ કરવા વિશે થોડી શરમ આવે.\n\nબેંકરો અંદર આવ્યા. એ બેઠા. એ વાદવિવાદ કરતા રહ્યા. એ ટેબલની આરપાર એકબીજા પર બૂમો પાડતા રહ્યા. એમાંના કેટલાકે કહ્યું કે કોઈ બીજાની ભૂલ છે. એમાંના કેટલાકે કહ્યું કે સરકારે એને ઠીક કરવું જોઈએ. એમાંના કેટલાક, એક-બે કલાક પછી, ફક્ત રૂમની બહાર ચાલવાનો પ્રયત્ન કરવા લાગ્યા કેમ કે એ થાકી ગયા હતા અને એમને કોઈ ઉકેલ આવતો દેખાતો ન હતો.\n\nપિયરપોન્ટ ઊભો થયો, બારણા સુધી ગયો, અને એને બંધ કરી દીધું.\n\nપછી એ પોતાની મોટી ચામડાની ખુરશીમાં પાછો ગયો — રૂમના માથે વાળી, લગભગ સિંહાસન જેવી આકારની — અને એ બેઠો. એણે ટેબલ પર પછાડ્યું નહીં. એ બૂમો ન પાડ્યો. એણે વધારે વાત પણ ન કરી. એણે ફક્ત રૂમમાંના માણસોને જોયા, એક પછી એક, ધીમે ધીમે, પોતાના નાના ગોળ ચશ્મા અને મોટી સફેદ દાઢી સાથે.\n\n\"કોઈ,\" એણે કહ્યું, જ્યારે રૂમ આખરે શાંત થયો, \"આ રૂમમાંથી ત્યાં સુધી નહીં જાય જ્યાં સુધી અમે નક્કી નથી કરી લેતા કે આને કેવી રીતે ઠીક કરવું.\"\n\nઅને પછી એણે રાહ જોઈ.\n\nએણે ઘણા કલાકો રાહ જોઈ. એણે વાદવિવાદો દરમિયાન રાહ જોઈ જે ભડક્યા અને ફરી શાંત થયા. એણે મધરાત સુધી રાહ જોઈ, અને સવાર સુધી, અને એટલા ભોજનો અને એટલા સિગાર દરમિયાન જેની કોઈ ગણતરી કરી શકતું ન હતું. એ આગલી રાતે પાછો આવ્યો અને ફરી રાહ જોઈ. કેટલાક માણસો સોફા પર સૂઈ ગયા. કેટલાક ચાલતા રહ્યા. બહાર દેશ ગભરાતો રહ્યો અને રાહ જોતો રહ્યો અને ગભરાતો રહ્યો અને રાહ જોતો રહ્યો.\n\nઅંતે — કેમ કે એમને જવા માટે કોઈ બીજી જગ્યા ન હતી, કેમ કે પિયરપોન્ટ એમને જવા નહીં દે — બેંકરોએ નક્કી કરી લીધું.\n\nએ બધાએ પોતાના પૈસા એક સાથે મૂક્યા, એક વિશાળ તળાવ માં, અને એનો ઉપયોગ ડગમગતી બેંકોને ટેકો આપવા માટે કર્યો જ્યાં સુધી પેનિક પસાર ન થયું.\n\nદેશ પડ્યો નહીં.\n\nએ પાનખર પછી, પિયરપોન્ટ મોર્ગન વિશે પુસ્તકો લખાયા, અને એ બધા દયાળુ ન હતા. કેટલાકે કહ્યું કે એની પાસે એક વ્યક્તિ માટે બહુ વધારે શક્તિ હતી. બીજાઓએ કહ્યું કે એ હીરો હતો. પિયરપોન્ટ, જેને પોતાના વિશેના વાદવિવાદોની બહુ પરવા ન હતી, મોટેભાગે પોતાના પુસ્તકો અને પોતાની સંખ્યાઓ અને પોતાના શાંત, સંભાળભર્યા કામ પર પાછો ગયો.\n\nપણ જે કોઈ એ પુસ્તકાલયમાં હતું — જે કોઈ એ અસુવિધાજનક ખુરશીમાં એ અસુવિધાજનક નજર નીચે બેઠું હતું — એ બધાને એક જ વાત યાદ હતી.\n\nએ બધા ઘોંઘાટની વચ્ચે, એક સ્થિર વ્યક્તિએ હાલવાનો ઇનકાર કરી દીધો હતો.\n\nઅને કોઈક રીતે, એને કારણે, આખો દેશ પોતાના પગ પર ઊભો રહી શક્યો હતો.\n\n*વિચારવા જેવી વાત: પિયરપોન્ટ ની શક્તિ, પુસ્તકાલયમાં, બૂમો પાડવી ન હતી. એ સ્થિર બેસવી હતી. તેં ક્યારે જોયું છે કે કોઈએ રૂમમાં સૌથી શાંત હોવાથી ઘોંઘાટભર્યા રૂમને બદલી દીધો હોય? તારા માટે એ કેવું દેખાઈ શકે?*"],
      es: ["Hace mucho tiempo, un niño serio creció en una ciudad grande y bulliciosa.\n\nEl niño se llamaba Pierpont. Le gustaban los números. Le gustaban los cuartos tranquilos.\n\nCuando creció, se hizo banquero. Era el banquero más famoso de todo el país.\n\nUn otoño, pasó algo malo. La gente se asustó. Corrieron a los bancos. Querían todo su dinero. Ahora mismo. Todos a la vez.\n\nNo había suficiente dinero para todos.\n\nLos bancos iban a caerse. El país iba a caerse.\n\nPierpont era ya un hombre viejo. Pensó un rato. Después abrió su biblioteca.\n\nLlamó a todos los demás banqueros para que vinieran.\n\nLos banqueros vinieron. Discutieron. Gritaron. Trataron de irse.\n\nPierpont cerró la puerta con llave.\n\nSe sentó en su gran sillón. No gritó. Los miró.\n\n\"Nadie se va,\" dijo, \"hasta que hayamos decidido.\"\n\nSe quedó ahí sentado por horas. Se quedó ahí sentado por días. Esperó.\n\nAl final, decidieron.\n\nEl país no se cayó.\n\nUna persona firme puede cambiar un cuarto ruidoso.", "Hace mucho tiempo, en una ciudad estadounidense grande y bulliciosa, había un niño serio que se llamaba John Pierpont Morgan. Todos lo llamaban Pierpont. Pierpont era el tipo de niño al que le gustaban más los números que los juegos. Le gustaban más los cuartos tranquilos que los llenos de gente. Cuando leía, leía hasta el final, aunque el libro fuera muy largo.\n\nPierpont creció, y creció un poco más, y al final se hizo banquero. Era tan bueno siendo banquero que, cuando ya era un hombre viejo con una gran barba blanca y pequeños anteojos redondos, era el banquero más famoso de todo el país.\n\nUn otoño — Pierpont tenía setenta años — pasó algo muy malo.\n\nSe llamó un pánico.\n\nUn pánico, en palabras de dinero, significa que todos se asustan al mismo tiempo. La gente que había puesto sus ahorros en los bancos de pronto se preocupó de que los bancos quizás ya no tuvieran su dinero. Entonces corrieron a los bancos. Hicieron filas largas. Pidieron de vuelta todo su dinero, todos a la vez. Los bancos, que habían prestado mucho de ese dinero, no podían devolverle el dinero a todos al mismo tiempo. Y entonces los bancos estaban a punto de caerse. Y si los bancos se caían, el país también se iba a caer.\n\nPierpont estaba en su casa de campo cuando se enteró. Tomó un tren largo de vuelta a la ciudad. No habló mucho durante el viaje.\n\nCuando volvió, hizo algo que nadie esperaba. No dio un discurso. No le escribió una carta a los periódicos. En cambio, abrió su gran biblioteca privada — la que tenía todos los libros raros — y mandó decir a todos los banqueros importantes de la ciudad que vinieran ahí enseguida.\n\nLos banqueros vinieron. Se sentaron en la biblioteca, rodeados de estanterías silenciosas de libros viejos, en sillas que crujían cuando se movían. Discutieron. Gritaron. Algunos trataron de irse.\n\nPierpont cerró la puerta con llave.\n\nSe sentó en su gran sillón de cuero, el que tenía forma de trono, a la cabecera del cuarto. No gritó. No golpeó la mesa. Casi ni habló. Solo los miró, uno por uno, con sus pequeños anteojos redondos y su gran barba blanca.\n\n\"Nadie,\" dijo, finalmente, \"se va de este cuarto hasta que hayamos decidido cómo arreglar esto.\"\n\nSe quedó ahí muchas horas. Se quedó ahí varios días. Esperó.\n\nAl final, los banqueros decidieron.\n\nJuntaron su propio dinero, todos ellos, y lo usaron para sostener los bancos.\n\nEl país no se cayó.\n\nY fue porque, en medio de todo ese ruido, una persona firme se había negado a moverse.", "Hace mucho tiempo, en una ciudad estadounidense grande y bulliciosa llamada New York, había un niño serio que se llamaba John Pierpont Morgan. Todos lo llamaban Pierpont, porque su primer nombre y su segundo nombre juntos eran demasiado para un niño.\n\nPierpont era el tipo de niño que, cuando los otros niños corrían y gritaban afuera, normalmente estaba adentro, leyendo un libro o haciendo sumas. Le gustaban más los números que los juegos. Le gustaban más los cuartos tranquilos que los llenos de gente. Cuando leía un libro, leía hasta el final, aunque el libro fuera muy largo y muy aburrido. Cuando se decidía por algo, su decisión se quedaba decidida.\n\nPierpont creció. Estudió en América, y después estudió en Switzerland y Germany. Creció alto. Le creció una barba. Entró en el negocio familiar, que era la banca. Y era tan calladamente, tercamente, obstinadamente bueno siendo banquero que, cuando llegó a ser un hombre viejo — con una gran barba blanca, pequeños anteojos redondos, y una mirada que podía hacer a un extraño adulto olvidar su propio nombre — Pierpont Morgan era el banquero más famoso de todo el país.\n\nUn otoño, cuando Pierpont tenía setenta años y había estado pensando, muy seriamente, en finalmente bajar el ritmo, pasó algo terrible.\n\nSe llamó un pánico.\n\nUn pánico, en el idioma del dinero, es lo que pasa cuando todos en un país se asustan por sus ahorros exactamente al mismo tiempo. Pasó así: unos cuantos bancos importantes en New York habían hecho apuestas muy arriesgadas y las habían perdido. Una vez que un banco se tambaleó, la gente empezó a preocuparse por *todos* los bancos. La gente preocupada fue a sus bancos a sacar su dinero. Los bancos que habían prestado mucho de ese dinero a otras personas no podían devolverlo todo al mismo tiempo. Las filas afuera de los bancos se hicieron más largas. Los periódicos gritaron. La preocupación se extendió.\n\nY después la preocupación se hizo algo peor. Los bancos empezaron a cerrar sus puertas. Algunos cerraron porque se les había acabado el dinero. Otros cerraron porque tenían miedo de que se les acabara mañana. Para mediados de octubre, parecía mucho que todos los bancos de América estaban a punto de caerse, todos al mismo tiempo, en una reacción en cadena lenta y terrible.\n\nSi los bancos se caían, el país se caía.\n\nNo era una cosa pequeña.\n\nPierpont estaba en su casa de campo cuando se enteró por primera vez. Escuchó, muy callado, mientras el mensajero le contaba lo que estaba pasando. Después empacó una bolsa pequeña, comió una cena lenta, y tomó un tren largo de vuelta a New York. No habló mucho durante el viaje. Fumó un cigarro. Miró por la ventana.\n\nCuando volvió a la ciudad, hizo algo que nadie esperaba del todo. No dio un discurso público. No escribió cartas furiosas a los periódicos. No apareció en ningún tipo de escenario.\n\nEn cambio, fue a su casa, subió los escalones de su gran biblioteca privada — la que tenía los libros raros, detrás de las pesadas puertas de bronce — y mandó decir a todos los banqueros, corredores y funcionarios del gobierno importantes de New York que vinieran *ahí*, esa misma noche, sin falta.\n\nVinieron. Tenían que hacerlo. Todos sabían, para ese momento, que Pierpont Morgan era la única persona en el cuarto a la que todos los demás, en secreto, miraban.\n\nLa biblioteca era un lugar raro para una reunión. Estaba en silencio, y forrada de libros muy viejos que olían a cuero, polvo, e historia. Había pinturas de hombres de aspecto severo en las paredes. Las sillas crujían cada vez que alguien se movía. Todo el cuarto se sentía como si hubiera sido diseñado, hace mucho tiempo, para hacer que la gente ruidosa se sintiera un poco avergonzada de ser ruidosa.\n\nLos banqueros entraron. Se sentaron. Discutieron. Se gritaron unos a otros a través de la mesa. Algunos dijeron que era culpa de otro. Algunos dijeron que el gobierno debería arreglarlo. Algunos, después de una o dos horas, simplemente trataron de salir del cuarto porque estaban cansados y no veían venir una solución.\n\nPierpont se levantó, caminó hasta la puerta, y la cerró con llave.\n\nDespués volvió a su gran sillón de cuero — el de la cabecera del cuarto, con forma casi de trono — y se sentó. No golpeó la mesa. No gritó. Casi ni habló. Solo miró a los hombres del cuarto, uno por uno, despacio, con sus pequeños anteojos redondos y su gran barba blanca.\n\n\"Nadie,\" dijo, cuando el cuarto por fin se quedó en silencio, \"se va de este cuarto hasta que hayamos decidido cómo arreglar esto.\"\n\nY entonces esperó.\n\nEsperó muchas horas. Esperó durante discusiones que se encendían y se apagaban. Esperó durante la medianoche, y durante la mañana, y durante más comidas y más cigarros de los que nadie podía contar. Volvió la noche siguiente y esperó otra vez. Algunos de los hombres dormían en los sofás. Algunos caminaban de un lado a otro. El país, afuera, se asustaba y esperaba y se asustaba y esperaba.\n\nAl final — porque no tenían a dónde más ir, porque Pierpont no los iba a dejar — los banqueros decidieron.\n\nJuntaron su propio dinero, todos ellos, en una sola gran reserva, y la usaron para sostener los bancos que se tambaleaban hasta que pasó el pánico.\n\nEl país no se cayó.\n\nDespués de ese otoño, se escribieron libros sobre Pierpont Morgan, y no todos eran amables. Algunos decían que tenía demasiado poder para una sola persona. Otros decían que había sido un héroe. Pierpont, a quien no le importaban mucho las discusiones sobre él mismo, volvió en su mayoría a sus libros y a sus números y a su trabajo tranquilo y cuidadoso.\n\nPero todos los que habían estado en esa biblioteca — todos los que se habían sentado en esa silla incómoda bajo esa mirada incómoda — recordaban lo mismo.\n\nEn medio de todo ese ruido, una persona firme se había negado a moverse.\n\nY de alguna manera, gracias a eso, todo el país había logrado mantenerse en pie.\n\n*Algo en qué pensar: el poder de Pierpont, en la biblioteca, no era gritar. Era quedarse quieto. ¿Cuándo has visto que alguien cambie un cuarto ruidoso siendo el más calmado en él? ¿Cómo podría verse eso para ti?*"],
      fr: ["Il y a longtemps, un garçon sérieux a grandi dans une grande ville animée.\n\nLe garçon s'appelait Pierpont. Il aimait les nombres. Il aimait les pièces calmes.\n\nQuand il a grandi, il est devenu banquier. Il était le banquier le plus célèbre de tout le pays.\n\nUn automne, quelque chose de mauvais s'est passé. Les gens ont eu peur. Ils ont couru vers les banques. Ils voulaient tout leur argent. Tout de suite. Tous en même temps.\n\nIl n'y avait pas assez d'argent pour tout le monde.\n\nLes banques allaient s'effondrer. Le pays allait s'effondrer.\n\nPierpont était maintenant un vieil homme. Il a réfléchi un moment. Puis il a ouvert sa bibliothèque.\n\nIl a appelé tous les autres banquiers à venir.\n\nLes banquiers sont venus. Ils ont discuté. Ils ont crié. Ils ont essayé de partir.\n\nPierpont a verrouillé la porte.\n\nIl s'est assis dans son grand fauteuil. Il n'a pas crié. Il les a regardés.\n\n\"Personne ne part,\" a-t-il dit, \"avant que nous ayons décidé.\"\n\nIl est resté assis là pendant des heures. Il est resté assis là pendant des jours. Il a attendu.\n\nÀ la fin, ils ont décidé.\n\nLe pays ne s'est pas effondré.\n\nUne personne calme peut changer une pièce bruyante.", "Il y a longtemps, dans une grande ville américaine animée, il y avait un garçon sérieux qui s'appelait John Pierpont Morgan. Tout le monde l'appelait Pierpont. Pierpont était le genre de garçon qui aimait les nombres plus que les jeux. Il aimait les pièces calmes plus que les pièces bondées. Quand il lisait, il lisait jusqu'à la fin, même si le livre était très long.\n\nPierpont a grandi, et a grandi encore un peu, et est finalement devenu banquier. Il était si doué pour être banquier que, lorsqu'il est devenu un vieil homme avec une grande barbe blanche et de petites lunettes rondes, il était le banquier le plus célèbre de tout le pays.\n\nUn automne — Pierpont avait soixante-dix ans — quelque chose de très mauvais s'est passé.\n\nOn l'a appelé un panique.\n\nUn panique, en mots d'argent, signifie que tout le monde a peur en même temps. Les gens qui avaient mis leurs économies dans les banques se sont soudainement inquiétés que les banques n'aient peut-être plus leur argent. Alors ils ont couru aux banques. Ils ont fait de longues files. Ils ont demandé tout leur argent en retour, tous en même temps. Les banques, qui avaient prêté beaucoup de cet argent, ne pouvaient pas rendre à tout le monde son argent en même temps. Et donc les banques étaient sur le point de s'effondrer. Et si les banques s'effondraient, le pays s'effondrait aussi.\n\nPierpont était dans sa maison de campagne quand il l'a appris. Il a pris un long train pour retourner à la ville. Il n'a pas beaucoup parlé pendant le trajet.\n\nQuand il est revenu, il a fait quelque chose que personne n'attendait. Il n'a pas fait de discours. Il n'a pas écrit de lettre aux journaux. Au lieu de cela, il a ouvert sa grande bibliothèque privée — celle avec tous les livres rares — et a fait dire à chaque banquier important de la ville de venir là tout de suite.\n\nLes banquiers sont venus. Ils se sont assis dans la bibliothèque, entourés d'étagères silencieuses de vieux livres, dans des fauteuils qui craquaient quand ils bougeaient. Ils ont discuté. Ils ont crié. Certains ont essayé de partir.\n\nPierpont a verrouillé la porte.\n\nIl s'est assis dans son grand fauteuil de cuir, celui en forme de trône, à la tête de la pièce. Il n'a pas crié. Il n'a pas frappé sur la table. Il n'a même pas beaucoup parlé. Il les a juste regardés, un par un, avec ses petites lunettes rondes et sa grande barbe blanche.\n\n\"Personne,\" a-t-il dit, finalement, \"ne quitte cette pièce avant que nous ayons décidé comment réparer cela.\"\n\nIl est resté assis là pendant de nombreuses heures. Il est resté assis là pendant des jours. Il a attendu.\n\nÀ la fin, les banquiers ont décidé.\n\nIls ont mis leur propre argent en commun, tous, et ils l'ont utilisé pour soutenir les banques.\n\nLe pays ne s'est pas effondré.\n\nEt c'était parce que, au milieu de tout ce bruit, une personne calme avait refusé de bouger.", "Il y a longtemps, dans une grande ville américaine animée appelée New York, il y avait un garçon sérieux qui s'appelait John Pierpont Morgan. Tout le monde l'appelait Pierpont, parce que son prénom et son deuxième prénom ensemble étaient trop pour un garçon.\n\nPierpont était le genre de garçon qui, quand les autres garçons couraient et criaient dehors, était habituellement à l'intérieur, en train de lire un livre ou de faire des additions. Il aimait les nombres plus que les jeux. Il aimait les pièces calmes plus que les pièces bondées. Quand il lisait un livre, il lisait jusqu'à la fin, même si le livre était très long et très ennuyeux. Quand il se décidait sur quelque chose, sa décision restait prise.\n\nPierpont a grandi. Il est allé à l'école en Amérique, puis à l'école en Switzerland et en Germany. Il est devenu grand. Une barbe lui a poussé. Il est entré dans l'entreprise familiale, qui était la banque. Et il était si silencieusement, obstinément, opiniâtrement bon pour être banquier qu'au moment où il est devenu un vieil homme — avec une grande barbe blanche, de petites lunettes rondes, et un regard qui pouvait faire oublier à un étranger adulte son propre nom — Pierpont Morgan était le banquier le plus célèbre de tout le pays.\n\nUn automne, alors que Pierpont avait soixante-dix ans et avait pensé, très sérieusement, à enfin ralentir, quelque chose de terrible s'est passé.\n\nOn l'a appelé un panique.\n\nUn panique, dans le langage de l'argent, est ce qui arrive quand tout le monde dans un pays a peur pour ses économies exactement en même temps. C'est arrivé comme ça : quelques banques importantes à New York avaient fait des paris très risqués et les avaient perdus. Une fois qu'une banque a vacillé, les gens ont commencé à s'inquiéter pour *toutes* les banques. Les gens inquiets sont allés à leurs banques pour retirer leur argent. Les banques qui avaient prêté beaucoup de cet argent à d'autres gens ne pouvaient pas tout rendre en même temps. Les files dehors devant les banques se sont allongées. Les journaux ont crié. L'inquiétude s'est répandue.\n\nEt puis l'inquiétude est devenue quelque chose de pire. Les banques ont commencé à fermer leurs portes. Certaines ont fermé parce qu'elles n'avaient plus d'argent. D'autres ont fermé parce qu'elles avaient peur de manquer d'argent demain. Vers la mi-octobre, il semblait fort que chaque banque d'Amérique était sur le point de s'effondrer, toutes en même temps, dans une réaction en chaîne lente et terrible.\n\nSi les banques s'effondraient, le pays s'effondrait.\n\nCe n'était pas une petite chose.\n\nPierpont était dans sa maison de campagne quand il l'a appris pour la première fois. Il a écouté, très calmement, pendant que le messager lui disait ce qui se passait. Puis il a fait un petit sac, a mangé un dîner lent, et a pris un long train pour retourner à New York. Il n'a pas beaucoup parlé pendant le trajet. Il a fumé un cigare. Il a regardé par la fenêtre.\n\nQuand il est revenu à la ville, il a fait quelque chose que personne n'attendait vraiment. Il n'a pas fait de discours public. Il n'a pas écrit de lettres en colère aux journaux. Il n'est apparu sur aucune sorte de scène.\n\nAu lieu de cela, il est rentré chez lui, a monté les marches de sa grande bibliothèque privée — celle avec les livres rares, derrière les lourdes portes de bronze — et a fait dire à chaque banquier, courtier, et fonctionnaire important de New York de venir *là*, ce soir-là, sans faute.\n\nIls sont venus. Ils devaient venir. Tout le monde savait, à ce moment-là, que Pierpont Morgan était la seule personne dans la pièce vers qui tout le monde, secrètement, se tournait.\n\nLa bibliothèque était un endroit étrange pour une réunion. Elle était silencieuse, et tapissée de très vieux livres qui sentaient le cuir, la poussière, et l'histoire. Il y avait des peintures d'hommes à l'air sévère sur les murs. Les fauteuils craquaient chaque fois que quelqu'un bougeait. Toute la pièce donnait l'impression d'avoir été conçue, il y a longtemps, pour faire que les gens bruyants se sentent un peu gênés d'être bruyants.\n\nLes banquiers sont entrés. Ils se sont assis. Ils ont discuté. Ils se sont criés dessus à travers la table. Certains ont dit que c'était la faute de quelqu'un d'autre. Certains ont dit que le gouvernement devrait régler ça. Certains, après une heure ou deux, ont simplement essayé de sortir de la pièce parce qu'ils étaient fatigués et ne voyaient pas de solution venir.\n\nPierpont s'est levé, a marché jusqu'à la porte, et l'a verrouillée.\n\nPuis il est retourné à son grand fauteuil de cuir — celui à la tête de la pièce, en forme presque de trône — et il s'est assis. Il n'a pas frappé sur la table. Il n'a pas crié. Il n'a même pas beaucoup parlé. Il a juste regardé les hommes dans la pièce, un par un, lentement, avec ses petites lunettes rondes et sa grande barbe blanche.\n\n\"Personne,\" a-t-il dit, quand la pièce s'est enfin tue, \"ne quitte cette pièce avant que nous ayons décidé comment réparer cela.\"\n\nEt puis il a attendu.\n\nIl a attendu de nombreuses heures. Il a attendu pendant que les disputes s'enflammaient et s'éteignaient. Il a attendu jusqu'à minuit, et jusqu'au matin, et pendant plus de repas et plus de cigares que personne ne pouvait compter. Il est revenu la nuit suivante et a encore attendu. Certains des hommes dormaient sur les canapés. Certains marchaient de long en large. Le pays, dehors, paniquait et attendait et paniquait et attendait.\n\nÀ la fin — parce qu'ils n'avaient nulle part ailleurs où aller, parce que Pierpont ne les laisserait pas partir — les banquiers ont décidé.\n\nIls ont mis leur propre argent en commun, tous, dans un seul grand fonds, et ils l'ont utilisé pour soutenir les banques chancelantes jusqu'à ce que le panique soit passé.\n\nLe pays ne s'est pas effondré.\n\nAprès cet automne, des livres ont été écrits sur Pierpont Morgan, et tous n'étaient pas gentils. Certains disaient qu'il avait trop de pouvoir pour une seule personne. D'autres disaient qu'il avait été un héros. Pierpont, qui ne se souciait pas beaucoup des disputes à son sujet, est principalement retourné à ses livres et à ses nombres et à son travail calme et soigneux.\n\nMais tous ceux qui avaient été dans cette bibliothèque — tous ceux qui s'étaient assis dans ce fauteuil inconfortable sous ce regard inconfortable — se souvenaient de la même chose.\n\nAu milieu de tout ce bruit, une personne calme avait refusé de bouger.\n\nEt d'une certaine manière, à cause de cela, tout le pays avait pu se tenir debout.\n\n*Quelque chose à quoi penser : le pouvoir de Pierpont, dans la bibliothèque, n'était pas de crier. C'était de rester assis tranquillement. Quand avez-vous remarqué que quelqu'un changeait une pièce bruyante en étant le plus calme dedans ? À quoi cela pourrait-il ressembler pour vous ?*"]
