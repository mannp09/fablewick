      en: ["Ba is always in the kitchen.\n\nBa has a knife. Ba has a cutting board. Ba has fruit.\n\nWhen you come to Ba's house, Ba says: \"Did you eat?\"\n\nThat is Ba's hello.\n\nThen fruit appears on the table. A mango. Sliced thin. On a plate with a little fork.\n\n\"Ba, I already ate.\"\n\nBa does not care. The fruit stays on the table.\n\nEvery time. Every visit. Fruit on the table.\n\nYou eat it. It is sweet. Ba watches.\n\nOne day you come over and no one knows you are coming.\n\nYou walk in quietly.\n\nBa is in the kitchen. Ba does not know you are there.\n\nBa is cutting a mango. Slowly. Carefully. The pieces fall in a little row.\n\nNo one asked for it. No one is there. Ba is just cutting.\n\nJust in case.\n\nYou stand in the doorway.\n\nYou understand.\n\nYou walk over and put your arms around Ba from behind.\n\n\"I love you, Ba.\"\n\nBa does not say it back.\n\nBa blushes.\n\nBa cuts another mango.", "Ba is always in the kitchen.\n\nThat is just where Ba is. Other grandmothers sit in the living room. Other grandmothers watch television, or read, or rest in the afternoon sun. Ba is in the kitchen. Ba has always been in the kitchen.\n\nWhen you come to Ba's house, the first thing Ba says is not \"Hello\" and not \"How are you.\"\n\nThe first thing Ba says is: \"Did you eat?\"\n\nEvery single time.\n\nYou say yes, because you probably did eat. You ate before you came. You are not even hungry.\n\nBa nods. Ba goes back to the kitchen.\n\nA few minutes later, fruit appears on the table. A mango, sliced into long gold pieces. Or bananas, split and arranged on a plate. Or whatever Ba has — guava when they are in season, papaya when Ba finds a good one.\n\nThe plate is there. It always just appears.\n\n\"Ba, I'm not hungry.\"\n\nBa does not say anything. Ba goes back to the kitchen. The plate stays.\n\nYou eat it. Of course you eat it. It is sweet and cold and perfectly ripe, because Ba checks the fruit every day and knows exactly when it is ready.\n\nBa watches from the doorway. Just for a moment. Then Ba goes back.\n\nThis happens every visit. You are used to it. You roll your eyes a little, but only to yourself.\n\nOne afternoon, you come over without calling. The door is unlocked, as it always is. You walk in quietly, the way you always do.\n\nBa is in the kitchen, but Ba does not know you are there yet.\n\nYou stop at the kitchen door.\n\nBa is standing at the counter with the knife and the cutting board, and in Ba's hands is a mango. Ba is cutting it slowly, the way Ba always does, turning it and slicing it so the pieces come off even and clean.\n\nBut there is no one else home. No one called. No one asked for anything.\n\nBa is just cutting a mango.\n\nJust in case someone comes.\n\nYou watch Ba work for a moment, not saying anything. The kitchen smells like ripe mango and something warm on the stove. Ba's hands are careful and steady.\n\nYou understand something then.\n\nNot a big thought, not words. Just a feeling that settles into place like a stone dropping into still water.\n\nThis is it. This is what Ba has been saying, every single visit, every single plate of fruit.\n\nYou walk into the kitchen and put your arms around Ba from behind.\n\n\"I love you, Ba.\"\n\nBa goes very still.\n\nBa's ears go pink.\n\nBa doesn't say it back. Ba never has.\n\nBa pats your hand once, twice. Then Ba picks up the knife again.\n\nBa cuts another mango.", "Ba is always in the kitchen.\n\nYou have known this your whole life. Other grandmothers, maybe, sit in the garden, or fold laundry in front of the news, or fall asleep in the good chair by the window. Ba is in the kitchen. The kitchen is where Ba lives. The rest of the house is just rooms.\n\nThe kitchen smells a certain way. Cumin that has been in a jar for twenty years. Warm oil. The particular sweetness of fruit that is at the exact right moment of ripe. You have known that smell since you were small enough to sit on the counter and watch Ba work.\n\nWhen you come to Ba's house, Ba hears you come in — Ba always hears, even when you are trying to be quiet — and the first thing Ba says, every time, without exception, is not \"Hello\" and not \"It is so good to see you\" and not \"How are you, my love.\"\n\nThe first thing Ba says is: \"Did you eat?\"\n\nYou say yes, you did eat, you ate before you came, you are fine.\n\nBa makes a sound that is not quite a nod and not quite a dismissal, and goes back to the cutting board.\n\nA few minutes later, without ceremony, a plate appears on the kitchen table. A mango, sliced into long crescent pieces, arranged just so. Or bananas, split down the middle, fanned out carefully. Or guava when they are in season, cut open to show the pink inside. Or papaya if Ba found a good one at the market, which Ba visits every few days and takes very seriously.\n\nThe plate is simply there. It arrives the way weather arrives — without announcement.\n\n\"Ba, I said I'm not hungry.\"\n\nBa does not look up. \"Eat a little.\"\n\nYou eat. You are, it turns out, a little hungry. The mango is perfect — sweet and cold and not a single fiber too tough, because Ba checks the fruit every day and moves it from the counter to the refrigerator at exactly the right moment, and you have never once in your life been given an unripe piece of fruit by Ba.\n\nBa watches from the door to the kitchen. Just for a second. Just long enough to see that you are eating. Then Ba goes back.\n\nThis is every visit. For your whole life.\n\nWhen you were younger you didn't think about it. When you got older you started, sometimes, to feel a little pestered by it. You weren't hungry. You didn't ask. The fruit just appeared anyway, and Ba stood in the doorway and watched, and the whole thing was a little embarrassing, like being treated like you were still seven.\n\n\"I already ate, Ba.\"\n\n\"Did you eat enough?\"\n\nThere was no right answer to that question. There was never enough, in Ba's accounting.\n\nOne afternoon in November — a grey day, the kind where the sky sits low and the light is the color of old paper — you go over without calling. You don't always call. The door is never locked. You let yourself in and the house is quiet, which means Ba is in the kitchen, because Ba is always in the kitchen, but quiet.\n\nYou set your bag down in the front room and walk toward the kitchen, and then you stop.\n\nBa is standing at the counter with the small sharp knife and the wooden cutting board that has been in that kitchen since before you were born. The board is worn in the middle, a shallow curve from decades of use. In Ba's hands is a mango.\n\nBa is cutting it. Carefully, the way Ba always does — feeling for the flat of the seed, turning the fruit, drawing the knife along the curve. The pieces fall away neat and even. Ba arranges them without thinking about it, the same way Ba has arranged them a thousand times.\n\nBut there is no one else home. No one called ahead. No one asked for anything.\n\nBa doesn't know you are there yet.\n\nBa is just cutting a mango. Alone in the kitchen on a grey afternoon, for no one, for whoever might come, just in case.\n\nYou stand in the doorway and watch.\n\nThe kitchen smells the way it always does — cumin and warm oil and ripe fruit. Ba's hands are steady. Ba has been cutting fruit in this kitchen for fifty years. Ba will cut fruit in this kitchen until Ba cannot stand anymore, and probably after that.\n\nYou feel something move through you. Not a big thing. Not words, exactly. More like something shifting into focus that has been slightly blurry your whole life — a picture you have been standing too close to, and you have finally taken one step back and now you can see what it is.\n\nDid you eat.\n\nEat a little.\n\nThe plate on the table, every time, whether you asked or not.\n\nBa checking the fruit every morning to know exactly when it is ready.\n\nBa cutting a mango alone on a grey November afternoon, just in case.\n\nYou walk into the kitchen. Ba hears you and starts to turn, surprised, and you get there first — you put your arms around Ba from behind, your face against the back of Ba's shoulder.\n\n\"I love you, Ba.\"\n\nBa goes completely still.\n\nYou feel it — the stillness, and then, after a moment, the warmth of Ba's hand covering yours. Ba pats your hand twice, the way Ba has always done when there are no words.\n\nBa's ears have gone pink.\n\nBa doesn't say it back. Ba has never said it. That is not Ba's language.\n\nAfter a moment, Ba straightens up gently, and you let go, and Ba turns back to the cutting board.\n\nBa cuts another mango.\n\nBa puts it on a plate.\n\nBa sets it on the table without looking at you.\n\n\"Eat,\" Ba says. \"You look thin.\"\n\nYou sit down. You eat the mango. It is perfect.\n\nBa stands in the doorway and watches you eat, and does not say anything else, and that is the whole thing. That is all of it."],
      hi: ["बा हमेशा रसोई में रहती हैं।\n\nबा के पास एक चाकू है। बा के पास एक कटिंग बोर्ड है। बा के पास फल हैं।\n\nजब तुम बा के घर आते हो, बा कहती हैं: \"तुमने खाना खाया?\"\n\nयही बा का नमस्ते है।\n\nफिर मेज़ पर फल आ जाते हैं। एक आम। पतला कटा हुआ। एक प्लेट में, एक छोटे काँटे के साथ।\n\n\"बा, मैंने पहले से खा लिया है।\"\n\nबा को परवाह नहीं। फल मेज़ पर ही रहता है।\n\nहर बार। हर मुलाक़ात पर। मेज़ पर फल।\n\nतुम खा लेते हो। मीठा होता है। बा देखती हैं।\n\nएक दिन तुम आते हो और किसी को नहीं पता कि तुम आ रहे हो।\n\nतुम चुपचाप अंदर आते हो।\n\nबा रसोई में हैं। बा को नहीं पता कि तुम वहाँ हो।\n\nबा एक आम काट रही हैं। धीरे-धीरे। ध्यान से। टुकड़े एक छोटी सी क़तार में गिरते हैं।\n\nकिसी ने माँगा नहीं। कोई वहाँ नहीं है। बा बस काट रही हैं।\n\nबस इसलिए कि कोई आ जाए तो।\n\nतुम दरवाज़े पर खड़े हो जाते हो।\n\nतुम समझ जाते हो।\n\nतुम जाकर पीछे से बा को बाँहों में भर लेते हो।\n\n\"मैं तुमसे प्यार करता हूँ, बा।\"\n\nबा जवाब में कुछ नहीं कहतीं।\n\nबा शरमा जाती हैं।\n\nबा एक और आम काटती हैं।", "बा हमेशा रसोई में रहती हैं।\n\nबस वहीं बा रहती हैं। दूसरी दादियाँ बैठक में बैठती हैं। दूसरी दादियाँ टीवी देखती हैं, या किताब पढ़ती हैं, या दोपहर की धूप में आराम करती हैं। बा रसोई में रहती हैं। बा हमेशा से रसोई में रही हैं।\n\nजब तुम बा के घर आते हो, बा सबसे पहले \"नमस्ते\" नहीं कहतीं और \"कैसे हो\" भी नहीं कहतीं।\n\nबा पहली बात यह कहती हैं: \"तुमने खाना खाया?\"\n\nहर एक बार।\n\nतुम हाँ कहते हो, क्योंकि तुमने शायद खा ही लिया होगा। तुमने आने से पहले खा लिया था। तुम्हें भूख भी नहीं है।\n\nबा सिर हिलाती हैं। बा वापस रसोई में चली जाती हैं।\n\nकुछ मिनट बाद, मेज़ पर फल आ जाते हैं। एक आम, लम्बे सुनहरे टुकड़ों में कटा हुआ। या केले, बीच से कटे, एक प्लेट में सजे हुए। या जो भी बा के पास हो — अमरूद जब उनका मौसम हो, पपीता जब बा को कोई अच्छा वाला मिल जाए।\n\nप्लेट वहीं रहती है। बस अचानक आ जाती है।\n\n\"बा, मुझे भूख नहीं है।\"\n\nबा कुछ नहीं कहतीं। बा वापस रसोई में चली जाती हैं। प्लेट वहीं रहती है।\n\nतुम खा लेते हो। बेशक खाते हो। मीठा है, ठंडा है, बिल्कुल पका हुआ है, क्योंकि बा हर दिन फल देखती हैं और जानती हैं कि वह कब तैयार होगा।\n\nबा दरवाज़े से देखती हैं। बस एक पल के लिए। फिर वापस चली जाती हैं।\n\nयह हर मुलाक़ात पर होता है। तुम्हें आदत हो गई है। तुम मन ही मन थोड़ा आँखें घुमाते हो, पर बस अपने अंदर।\n\nएक दोपहर, तुम बिना फ़ोन किए आ जाते हो। दरवाज़ा खुला है, हमेशा की तरह। तुम चुपचाप अंदर आते हो, जैसे हमेशा आते हो।\n\nबा रसोई में हैं, पर बा को अभी पता नहीं कि तुम वहाँ हो।\n\nतुम रसोई के दरवाज़े पर रुक जाते हो।\n\nबा काउंटर पर खड़ी हैं, चाकू और कटिंग बोर्ड के साथ, और बा के हाथों में एक आम है। बा उसे धीरे-धीरे काट रही हैं, जिस तरह हमेशा काटती हैं, उसे घुमाते हुए और काटते हुए ताकि टुकड़े बराबर और साफ़ निकलें।\n\nपर घर में कोई और नहीं है। किसी ने फ़ोन नहीं किया। किसी ने कुछ नहीं माँगा।\n\nबा बस एक आम काट रही हैं।\n\nबस इसलिए कि कोई आ जाए तो।\n\nतुम एक पल बा को काम करते देखते हो, कुछ नहीं कहते। रसोई से पके हुए आम की और चूल्हे पर कुछ गरम होने की महक आ रही है। बा के हाथ नाज़ुक और स्थिर हैं।\n\nतब तुम कुछ समझ जाते हो।\n\nकोई बड़ा विचार नहीं, शब्द नहीं। बस एक एहसास जो ठहरे हुए पानी में पत्थर गिरने जैसा अंदर बैठ जाता है।\n\nयही है। यही है जो बा हर मुलाक़ात पर, फल की हर प्लेट के साथ, कहती रही हैं।\n\nतुम रसोई में जाते हो और पीछे से बा को बाँहों में भर लेते हो।\n\n\"मैं तुमसे प्यार करता हूँ, बा।\"\n\nबा बिल्कुल स्थिर हो जाती हैं।\n\nबा के कान गुलाबी हो जाते हैं।\n\nबा जवाब में कुछ नहीं कहतीं। बा ने कभी नहीं कहा।\n\nबा तुम्हारे हाथ पर एक बार, दो बार थपकी देती हैं। फिर बा दोबारा चाकू उठा लेती हैं।\n\nबा एक और आम काटती हैं।", "बा हमेशा रसोई में रहती हैं।\n\nतुम्हें यह बात अपनी पूरी ज़िंदगी से पता है। दूसरी दादियाँ शायद बगीचे में बैठती होंगी, या ख़बरों के सामने कपड़े मोड़ती होंगी, या खिड़की के पास अच्छी कुर्सी पर सो जाती होंगी। बा रसोई में रहती हैं। रसोई वहाँ है जहाँ बा रहती हैं। बाक़ी घर तो बस कमरे हैं।\n\nरसोई से एक ख़ास तरह की महक आती है। जीरा जो बीस साल से एक डिब्बे में पड़ा है। गरम तेल। उस फल की वह ख़ास मिठास जो एकदम पकने के सही पल पर है। तुम्हें वह महक तब से याद है जब तुम इतने छोटे थे कि काउंटर पर बैठकर बा को काम करते देखा करते थे।\n\nजब तुम बा के घर आते हो, बा सुन लेती हैं कि तुम आए हो — बा हमेशा सुन लेती हैं, चाहे तुम कितनी ही चुपचाप आने की कोशिश करो — और बा पहली बात, हर बार, बिना किसी अपवाद के, यह नहीं कहतीं कि \"नमस्ते\" और न ही यह कि \"तुम्हें देखकर बहुत अच्छा लगा\" और न ही यह कि \"कैसे हो मेरे प्यारे।\"\n\nबा पहली बात यह कहती हैं: \"तुमने खाना खाया?\"\n\nतुम कहते हो हाँ, तुमने खा लिया, तुमने आने से पहले खा लिया, तुम ठीक हो।\n\nबा एक ऐसी आवाज़ निकालती हैं जो न पूरी तरह से हाँ है और न पूरी तरह से इनकार, और वापस कटिंग बोर्ड पर चली जाती हैं।\n\nकुछ मिनट बाद, बिना किसी तामझाम के, रसोई की मेज़ पर एक प्लेट आ जाती है। एक आम, लम्बे चाँद जैसे टुकड़ों में कटा हुआ, बस यूँ ही सजा हुआ। या केले, बीच से कटे, ध्यान से पंखे की तरह फैले हुए। या अमरूद जब उनका मौसम हो, खुले हुए ताकि अंदर का गुलाबी रंग दिख सके। या पपीता अगर बा को बाज़ार में कोई अच्छा वाला मिल गया हो, जहाँ बा हर कुछ दिनों में जाती हैं और बहुत गंभीरता से जाती हैं।\n\nप्लेट बस वहाँ होती है। यह उस तरह आती है जैसे मौसम आता है — बिना घोषणा के।\n\n\"बा, मैंने कहा था मुझे भूख नहीं है।\"\n\nबा देखती तक नहीं। \"थोड़ा सा खा लो।\"\n\nतुम खा लेते हो। पता चलता है कि तुम्हें थोड़ी भूख तो है। आम बिल्कुल सही है — मीठा और ठंडा और एक भी रेशा सख़्त नहीं, क्योंकि बा हर दिन फल देखती हैं और उसे काउंटर से फ्रिज में बिल्कुल सही पल पर डालती हैं, और तुम्हें अपनी ज़िंदगी में कभी एक बार भी बा ने कच्चा फल नहीं दिया।\n\nबा रसोई के दरवाज़े से देखती हैं। बस एक सेकंड के लिए। बस इतनी देर कि देख लें तुम खा रहे हो। फिर वापस चली जाती हैं।\n\nयह हर मुलाक़ात पर होता है। तुम्हारी पूरी ज़िंदगी।\n\nजब तुम छोटे थे तब तुम इसके बारे में नहीं सोचते थे। जब तुम बड़े हुए तो तुम्हें कभी-कभी इससे थोड़ा परेशानी होने लगी। तुम्हें भूख नहीं थी। तुमने माँगा नहीं था। फल फिर भी आ जाता था, और बा दरवाज़े पर खड़ी होकर देखती थीं, और पूरी बात थोड़ी शर्मनाक थी, जैसे अभी भी तुम्हें सात साल का बच्चा समझा जा रहा हो।\n\n\"बा, मैंने पहले से खा लिया है।\"\n\n\"क्या तुमने काफ़ी खाया?\"\n\nइस सवाल का कोई सही जवाब नहीं था। बा के हिसाब से कभी काफ़ी नहीं था।\n\nनवंबर की एक दोपहर — एक धूसर दिन, उस तरह का जब आसमान नीचे बैठा रहता है और रोशनी पुराने काग़ज़ के रंग की होती है — तुम बिना फ़ोन किए चले जाते हो। तुम हमेशा फ़ोन नहीं करते। दरवाज़ा कभी बंद नहीं होता। तुम अंदर आ जाते हो और घर शांत है, मतलब बा रसोई में हैं, क्योंकि बा हमेशा रसोई में होती हैं, पर शांत।\n\nतुम अपना बैग सामने वाले कमरे में रखते हो और रसोई की तरफ़ जाते हो, और फिर रुक जाते हो।\n\nबा काउंटर पर खड़ी हैं, उस छोटे तेज़ चाकू और लकड़ी के कटिंग बोर्ड के साथ जो उस रसोई में तुम्हारे जन्म से भी पहले से है। बोर्ड के बीच में घिसाव है, दशकों के इस्तेमाल से एक उथला सा गड्ढा। बा के हाथों में एक आम है।\n\nबा उसे काट रही हैं। ध्यान से, जिस तरह बा हमेशा काटती हैं — गुठली की सतह को महसूस करते हुए, फल को घुमाते हुए, उसकी गोलाई के साथ चाकू को खींचते हुए। टुकड़े साफ़ और बराबर गिरते हैं। बा उन्हें बिना सोचे सजा देती हैं, उसी तरह जैसे बा ने उन्हें हज़ार बार सजाया है।\n\nपर घर में कोई और नहीं है। किसी ने पहले से ख़बर नहीं की। किसी ने कुछ नहीं माँगा।\n\nबा को अभी नहीं पता कि तुम वहाँ हो।\n\nबा बस एक आम काट रही हैं। एक धूसर दोपहर में रसोई में अकेले, किसी के लिए नहीं, जो भी आ जाए उसके लिए, बस इसलिए कि कोई आ जाए तो।\n\nतुम दरवाज़े पर खड़े होकर देखते हो।\n\nरसोई से उसी तरह की महक आती है जैसी हमेशा आती है — जीरा और गरम तेल और पका हुआ फल। बा के हाथ स्थिर हैं। बा पचास साल से इस रसोई में फल काट रही हैं। बा तब तक इस रसोई में फल काटती रहेंगी जब तक खड़ी रह सकती हैं, और शायद उसके बाद भी।\n\nतुम्हारे अंदर कुछ हिलता है। कोई बड़ी बात नहीं। ठीक से शब्द नहीं। बस कुछ ऐसा जो साफ़ हो रहा है जो तुम्हारी पूरी ज़िंदगी हल्का सा धुंधला रहा है — एक तस्वीर जिसके बहुत क़रीब तुम खड़े थे, और अब तुमने आख़िरकार एक क़दम पीछे लिया है और अब तुम देख सकते हो कि वह क्या है।\n\nतुमने खाना खाया।\n\nथोड़ा सा खा लो।\n\nमेज़ पर वह प्लेट, हर बार, चाहे तुमने माँगा हो या नहीं।\n\nबा हर सुबह फल देखती हैं कि वह कब बिल्कुल तैयार होगा।\n\nबा नवंबर की धूसर दोपहर में अकेले एक आम काट रही हैं, बस इसलिए कि कोई आ जाए तो।\n\nतुम रसोई में जाते हो। बा तुम्हें सुन लेती हैं और मुड़ने लगती हैं, चौंकी हुई, और तुम पहले पहुँच जाते हो — तुम पीछे से बा को बाँहों में भर लेते हो, अपना चेहरा बा के कंधे के पीछे रखकर।\n\n\"मैं तुमसे प्यार करता हूँ, बा।\"\n\nबा बिल्कुल स्थिर हो जाती हैं।\n\nतुम महसूस करते हो — वह स्थिरता, और फिर, एक पल बाद, बा के हाथ की गरमाहट तुम्हारे हाथ को ढकती हुई। बा तुम्हारे हाथ पर दो बार थपकी देती हैं, जैसे बा ने हमेशा किया है जब शब्द नहीं होते।\n\nबा के कान गुलाबी हो गए हैं।\n\nबा जवाब में कुछ नहीं कहतीं। बा ने कभी नहीं कहा। यह बा की भाषा नहीं है।\n\nएक पल बाद, बा हल्के से सीधी होती हैं, और तुम छोड़ देते हो, और बा वापस कटिंग बोर्ड की ओर मुड़ जाती हैं।\n\nबा एक और आम काटती हैं।\n\nबा उसे एक प्लेट में रखती हैं।\n\nबा उसे तुम्हारी ओर देखे बिना मेज़ पर रख देती हैं।\n\n\"खाओ,\" बा कहती हैं। \"तुम पतले लग रहे हो।\"\n\nतुम बैठ जाते हो। तुम आम खाते हो। यह बिल्कुल सही है।\n\nबा दरवाज़े पर खड़ी होकर तुम्हें खाते देखती हैं, और कुछ और नहीं कहतीं, और बस यही है। बस यही पूरी बात है।"],
      gu: ["બા હંમેશા રસોડામાં હોય છે.\n\nબા પાસે છરી છે. બા પાસે કાપવાનું પાટિયું છે. બા પાસે ફળ છે.\n\nજ્યારે તું બા ના ઘરે આવે છે, બા કહે છે: \"તેં ખાધું?\"\n\nએ બા નું હેલો છે.\n\nપછી ટેબલ પર ફળ આવી જાય છે. એક કેરી. પાતળું કાપેલું. એક પ્લેટમાં, એક નાના કાંટા સાથે.\n\n\"બા, મેં પહેલેથી જ ખાધું છે.\"\n\nબા ને પરવા નથી. ફળ ટેબલ પર જ રહે છે.\n\nદર વખતે. દરેક મુલાકાતે. ટેબલ પર ફળ.\n\nતું ખાઈ લે છે. એ મીઠું છે. બા જુએ છે.\n\nએક દિવસ તું આવે છે અને કોઈને ખબર નથી કે તું આવી રહ્યો છે.\n\nતું ચૂપચાપ અંદર આવે છે.\n\nબા રસોડામાં છે. બા ને ખબર નથી કે તું ત્યાં છે.\n\nબા એક કેરી કાપી રહી છે. ધીમે ધીમે. ધ્યાનથી. ટુકડા એક નાની હારમાં પડે છે.\n\nકોઈએ માંગ્યું નથી. કોઈ ત્યાં નથી. બા બસ કાપી રહી છે.\n\nબસ એટલા માટે કે કોઈ આવી જાય તો.\n\nતું દરવાજે ઊભો રહી જાય છે.\n\nતું સમજી જાય છે.\n\nતું જઈને પાછળથી બા ને હાથમાં લઈ લે છે.\n\n\"હું તને પ્રેમ કરું છું, બા.\"\n\nબા જવાબ આપતી નથી.\n\nબા શરમાય છે.\n\nબા બીજો એક કેરી કાપે છે.", "બા હંમેશા રસોડામાં હોય છે.\n\nબસ ત્યાં જ બા રહે છે. બીજી દાદીઓ બેઠકખંડમાં બેસે છે. બીજી દાદીઓ ટીવી જુએ છે, અથવા વાંચે છે, અથવા બપોરના તડકામાં આરામ કરે છે. બા રસોડામાં છે. બા હંમેશા રસોડામાં જ રહી છે.\n\nજ્યારે તું બા ના ઘરે આવે છે, બા પહેલી વાત \"નમસ્તે\" નથી કહેતી અને \"કેમ છે\" પણ નથી કહેતી.\n\nબા પહેલી વાત આ કહે છે: \"તેં ખાધું?\"\n\nદર એક વખતે.\n\nતું હા કહે છે, કેમ કે તેં કદાચ ખાધું જ હશે. તેં આવતા પહેલા ખાધું હતું. તને ભૂખ પણ નથી.\n\nબા માથું હલાવે છે. બા પાછી રસોડામાં જાય છે.\n\nથોડી મિનિટ પછી, ટેબલ પર ફળ આવી જાય છે. એક કેરી, લાંબા સોનેરી ટુકડામાં કાપેલો. કે કેળાં, વચ્ચેથી કાપેલા, એક પ્લેટમાં ગોઠવેલા. કે જે પણ બા પાસે હોય — જામફળ જ્યારે મોસમ હોય, પપૈયું જ્યારે બા ને કોઈ સારો મળી જાય.\n\nપ્લેટ ત્યાં હોય છે. એ બસ આવી જાય છે.\n\n\"બા, મને ભૂખ નથી.\"\n\nબા કંઈ કહેતી નથી. બા પાછી રસોડામાં જાય છે. પ્લેટ ત્યાં જ રહે છે.\n\nતું ખાઈ લે છે. અલબત્ત ખાય છે. એ મીઠું છે અને ઠંડું છે અને બરાબર પાકેલું છે, કેમ કે બા દરરોજ ફળ તપાસે છે અને જાણે છે કે એ ક્યારે તૈયાર છે.\n\nબા દરવાજેથી જુએ છે. બસ એક પળ માટે. પછી બા પાછી જાય છે.\n\nઆ દરેક મુલાકાતે થાય છે. તને ટેવ પડી ગઈ છે. તું મનમાં થોડી આંખો ઘુમાવે છે, પણ બસ તારી અંદર.\n\nએક બપોરે, તું ફોન કર્યા વગર આવી જાય છે. દરવાજો ખુલ્લો છે, હંમેશની જેમ. તું ચૂપચાપ અંદર આવે છે, જે રીતે હંમેશા આવે છે.\n\nબા રસોડામાં છે, પણ બા ને હજી ખબર નથી કે તું ત્યાં છે.\n\nતું રસોડાના દરવાજે રોકાય છે.\n\nબા કાઉન્ટર પર ઊભી છે, છરી અને કાપવાના પાટિયા સાથે, અને બા ના હાથમાં એક કેરી છે. બા એને ધીમે ધીમે કાપી રહી છે, જે રીતે બા હંમેશા કાપે છે, એને ફેરવતી અને કાપતી જેથી ટુકડા સરખા અને સાફ આવે.\n\nપણ ઘરમાં બીજું કોઈ નથી. કોઈએ ફોન કર્યો નથી. કોઈએ કંઈ માંગ્યું નથી.\n\nબા બસ એક કેરી કાપી રહી છે.\n\nબસ એટલા માટે કે કોઈ આવી જાય તો.\n\nતું એક પળ બા ને કામ કરતા જુએ છે, કંઈ બોલ્યા વગર. રસોડામાંથી પાકા કેરી ની અને ચૂલા પર કંઈક ગરમ થવાની ગંધ આવે છે. બા ના હાથ સંભાળથી અને સ્થિર છે.\n\nત્યારે તું કંઈક સમજી જાય છે.\n\nકોઈ મોટો વિચાર નહીં, શબ્દો નહીં. બસ એક એહસાસ જે સ્થિર પાણીમાં પથ્થર પડવાની જેમ અંદર બેસી જાય છે.\n\nઆ જ છે. આ જ છે જે બા દરેક મુલાકાતે, ફળની દરેક પ્લેટ સાથે, કહેતી રહી છે.\n\nતું રસોડામાં જાય છે અને પાછળથી બા ને હાથમાં લઈ લે છે.\n\n\"હું તને પ્રેમ કરું છું, બા.\"\n\nબા એકદમ સ્થિર થઈ જાય છે.\n\nબા ના કાન ગુલાબી થઈ જાય છે.\n\nબા જવાબ આપતી નથી. બા એ ક્યારેય જવાબ આપ્યો નથી.\n\nબા તારા હાથ પર એક વાર, બે વાર થપથપાવે છે. પછી બા ફરી છરી ઉપાડે છે.\n\nબા બીજો એક કેરી કાપે છે.", "બા હંમેશા રસોડામાં હોય છે.\n\nતને આ વાત તારી આખી જિંદગીથી ખબર છે. બીજી દાદીઓ કદાચ બગીચામાં બેસતી હશે, કે સમાચાર સામે કપડાં વાળતી હશે, કે બારી પાસેની સારી ખુરશીમાં ઊંઘી જતી હશે. બા રસોડામાં છે. રસોડું એ જગ્યા છે જ્યાં બા રહે છે. બાકીનું ઘર તો બસ રૂમ છે.\n\nરસોડામાંથી એક ખાસ ગંધ આવે છે. જીરું જે વીસ વર્ષથી ડબ્બામાં છે. ગરમ તેલ. ફળની એ ખાસ મીઠાશ જે પાકેલા હોવાની બરાબર સાચી પળે હોય છે. તને એ ગંધ ત્યારથી યાદ છે જ્યારે તું એટલો નાનો હતો કે કાઉન્ટર પર બેસીને બા ને કામ કરતા જોતો હતો.\n\nજ્યારે તું બા ના ઘરે આવે છે, બા સાંભળી લે છે કે તું આવ્યો — બા હંમેશા સાંભળી લે છે, ભલે તું ગમે તેટલો ચૂપ રહેવાનો પ્રયત્ન કરે — અને બા પહેલી વાત, દર વખતે, કોઈ અપવાદ વગર, \"નમસ્તે\" નથી અને \"તને જોઈને બહુ સારું લાગ્યું\" પણ નથી અને \"કેમ છે, મારા વ્હાલા\" પણ નથી.\n\nબા પહેલી વાત આ કહે છે: \"તેં ખાધું?\"\n\nતું કહે છે હા, મેં ખાધું, હું આવતા પહેલા ખાઈને આવ્યો છું, હું બરાબર છું.\n\nબા એક અવાજ કાઢે છે જે ન તો પૂરી હા છે ન તો પૂરી ના, અને પાછી કાપવાના પાટિયા પર જાય છે.\n\nથોડી મિનિટ પછી, કોઈ ધામધૂમ વગર, રસોડાના ટેબલ પર એક પ્લેટ આવી જાય છે. એક કેરી, લાંબા અર્ધચંદ્ર જેવા ટુકડામાં કાપેલો, બસ આમ ગોઠવેલો. કે કેળાં, વચ્ચેથી કાપેલા, ધ્યાનથી પંખા જેવા ફેલાવેલા. કે જામફળ જ્યારે મોસમ હોય, ખોલેલા જેથી અંદરનો ગુલાબી રંગ દેખાય. કે પપૈયું જો બા ને બજારમાં કોઈ સારો મળી ગયો હોય, જ્યાં બા દર થોડા દિવસે જાય છે અને બહુ ગંભીરતાથી જાય છે.\n\nપ્લેટ ફક્ત ત્યાં હોય છે. એ એ રીતે આવે છે જે રીતે હવામાન આવે છે — જાહેરાત વગર.\n\n\"બા, મેં કહ્યું મને ભૂખ નથી.\"\n\nબા ઉપર જોતી પણ નથી. \"થોડું ખા.\"\n\nતું ખાય છે. તને થોડી ભૂખ છે, એવું બહાર આવે છે. કેરી એકદમ સાચો છે — મીઠો અને ઠંડો અને એક પણ રેસો કઠણ નહીં, કેમ કે બા દરરોજ ફળ તપાસે છે અને એને કાઉન્ટરથી ફ્રિજમાં બરાબર સાચી પળે ખસેડે છે, અને તને તારી જિંદગીમાં ક્યારેય એક વાર પણ બા એ કાચું ફળ આપ્યું નથી.\n\nબા રસોડાના દરવાજેથી જુએ છે. બસ એક સેકન્ડ માટે. બસ એટલા સમય માટે કે જોઈ લે કે તું ખાઈ રહ્યો છે. પછી બા પાછી જાય છે.\n\nઆ દરેક મુલાકાતે છે. તારી આખી જિંદગી.\n\nજ્યારે તું નાનો હતો ત્યારે તું એના વિશે વિચારતો ન હતો. જ્યારે તું મોટો થયો ત્યારે તને ક્યારેક એનાથી થોડી ચીડ થવા લાગી. તને ભૂખ ન હતી. તેં માંગ્યું ન હતું. ફળ તો પણ આવી જતું, અને બા દરવાજે ઊભી રહીને જોતી, અને આખી વાત થોડી શરમજનક હતી, જાણે હજી તું સાત વર્ષનો બાળક હોય.\n\n\"મેં પહેલેથી ખાધું છે, બા.\"\n\n\"તેં પૂરતું ખાધું?\"\n\nએ સવાલનો કોઈ સાચો જવાબ ન હતો. બા ના હિસાબે ક્યારેય પૂરતું ન હતું.\n\nનવેમ્બરની એક બપોરે — એક ભૂખરો દિવસ, એવો જ્યારે આકાશ નીચે બેઠું હોય અને પ્રકાશ જૂના કાગળના રંગનો હોય — તું ફોન કર્યા વગર જાય છે. તું હંમેશા ફોન કરતો નથી. દરવાજો ક્યારેય બંધ નથી હોતો. તું અંદર આવી જાય છે અને ઘર શાંત છે, એટલે બા રસોડામાં છે, કેમ કે બા હંમેશા રસોડામાં હોય છે, પણ શાંત.\n\nતું તારી થેલી આગળના રૂમમાં મૂકે છે અને રસોડા તરફ જાય છે, અને પછી રોકાય છે.\n\nબા કાઉન્ટર પર ઊભી છે, એ નાની તીક્ષ્ણ છરી અને લાકડાના કાપવાના પાટિયા સાથે જે એ રસોડામાં તારા જન્મ પહેલાથી છે. પાટિયું વચ્ચે ઘસાયેલું છે, દાયકાઓના ઉપયોગથી એક છીછરી વળાંક. બા ના હાથમાં એક કેરી છે.\n\nબા એને કાપી રહી છે. ધ્યાનથી, જે રીતે બા હંમેશા કાપે છે — બીના સપાટ ભાગને અનુભવતા, ફળને ફેરવતા, છરીને એની વળાંક પર ખેંચતા. ટુકડા સાફ અને સરખા પડે છે. બા એમને વિચાર્યા વગર ગોઠવે છે, એ જ રીતે જે રીતે બા એ એમને હજાર વાર ગોઠવ્યા છે.\n\nપણ ઘરમાં બીજું કોઈ નથી. કોઈએ ફોન કરીને જણાવ્યું ન હતું. કોઈએ કંઈ માંગ્યું ન હતું.\n\nબા ને હજી ખબર નથી કે તું ત્યાં છે.\n\nબા બસ એક કેરી કાપી રહી છે. ભૂખરી બપોરે રસોડામાં એકલી, કોઈના માટે નહીં, જે પણ આવી જાય એના માટે, બસ એટલા માટે કે કોઈ આવી જાય તો.\n\nતું દરવાજે ઊભો રહીને જુએ છે.\n\nરસોડામાંથી એ જ ગંધ આવે છે જે હંમેશા આવે છે — જીરું અને ગરમ તેલ અને પાકેલું ફળ. બા ના હાથ સ્થિર છે. બા પચાસ વર્ષથી આ રસોડામાં ફળ કાપતી રહી છે. બા ત્યાં સુધી આ રસોડામાં ફળ કાપતી રહેશે જ્યાં સુધી ઊભી રહી શકશે, અને કદાચ એ પછી પણ.\n\nતારી અંદર કંઈક હાલે છે. કોઈ મોટી વાત નહીં. બરાબર શબ્દો નહીં. વધારે કંઈક એવું જે સ્પષ્ટ થઈ રહ્યું છે જે તારી આખી જિંદગી થોડું ધૂંધળું રહ્યું છે — એક ચિત્ર જેની તું બહુ નજીક ઊભો રહ્યો છે, અને તેં છેવટે એક પગલું પાછળ લીધું છે અને હવે તું જોઈ શકે છે કે એ શું છે.\n\nતેં ખાધું.\n\nથોડું ખા.\n\nટેબલ પર એ પ્લેટ, દર વખતે, ભલે તેં માંગ્યું હોય કે ન માંગ્યું હોય.\n\nબા દર સવારે ફળ તપાસે છે કે એ ક્યારે બરાબર તૈયાર છે.\n\nબા નવેમ્બરની ભૂખરી બપોરે એકલી એક કેરી કાપી રહી છે, બસ એટલા માટે કે કોઈ આવી જાય તો.\n\nતું રસોડામાં જાય છે. બા તને સાંભળી લે છે અને ફરવા લાગે છે, ચોંકેલી, અને તું પહેલા પહોંચી જાય છે — તું પાછળથી બા ને હાથમાં લઈ લે છે, તારો ચહેરો બા ના ખભા પાછળ.\n\n\"હું તને પ્રેમ કરું છું, બા.\"\n\nબા એકદમ સ્થિર થઈ જાય છે.\n\nતું એ અનુભવે છે — એ સ્થિરતા, અને પછી, એક પળ બાદ, બા ના હાથની ગરમાટ તારા હાથને ઢાંકતી. બા તારા હાથ પર બે વાર થપથપાવે છે, જે રીતે બા એ હંમેશા કર્યું છે જ્યારે શબ્દો ન હોય.\n\nબા ના કાન ગુલાબી થઈ ગયા છે.\n\nબા જવાબ આપતી નથી. બા એ ક્યારેય આપ્યો નથી. એ બા ની ભાષા નથી.\n\nએક પળ બાદ, બા હળવેથી સીધી થાય છે, અને તું છોડી દે છે, અને બા પાછી કાપવાના પાટિયા તરફ ફરે છે.\n\nબા બીજો એક કેરી કાપે છે.\n\nબા એને એક પ્લેટમાં મૂકે છે.\n\nબા એને તારી તરફ જોયા વગર ટેબલ પર મૂકે છે.\n\n\"ખા,\" બા કહે છે. \"તું પાતળો દેખાય છે.\"\n\nતું બેસી જાય છે. તું કેરી ખાય છે. એ એકદમ સાચો છે.\n\nબા દરવાજે ઊભી રહીને તને ખાતા જુએ છે, અને બીજું કંઈ કહેતી નથી, અને બસ આ જ છે. આ જ આખી વાત છે."],
      es: ["Ba siempre está en la cocina.\n\nBa tiene un cuchillo. Ba tiene una tabla para cortar. Ba tiene fruta.\n\nCuando vienes a casa de Ba, Ba dice: \"¿Comiste?\"\n\nEse es el hola de Ba.\n\nEntonces aparece fruta en la mesa. Un mango. Cortado en rebanadas finas. En un plato con un tenedor pequeño.\n\n\"Ba, ya comí.\"\n\nA Ba no le importa. La fruta se queda en la mesa.\n\nCada vez. En cada visita. Fruta en la mesa.\n\nLa comes. Es dulce. Ba mira.\n\nUn día vienes y nadie sabe que vienes.\n\nEntras en silencio.\n\nBa está en la cocina. Ba no sabe que estás ahí.\n\nBa está cortando un mango. Despacio. Con cuidado. Las piezas caen en una pequeña fila.\n\nNadie lo pidió. No hay nadie. Ba simplemente está cortando.\n\nPor si acaso.\n\nTe quedas en la puerta.\n\nEntiendes.\n\nTe acercas y rodeas a Ba con los brazos por detrás.\n\n\"Te quiero, Ba.\"\n\nBa no lo dice de vuelta.\n\nBa se sonroja.\n\nBa corta otro mango.", "Ba siempre está en la cocina.\n\nAhí es donde Ba está. Otras abuelas se sientan en la sala. Otras abuelas ven la televisión, o leen, o descansan al sol de la tarde. Ba está en la cocina. Ba siempre ha estado en la cocina.\n\nCuando vienes a casa de Ba, lo primero que Ba dice no es \"Hola\" ni \"¿Cómo estás?\"\n\nLo primero que Ba dice es: \"¿Comiste?\"\n\nCada vez.\n\nDices que sí, porque probablemente comiste. Comiste antes de venir. Ni siquiera tienes hambre.\n\nBa asiente. Ba vuelve a la cocina.\n\nUnos minutos después, aparece fruta en la mesa. Un mango, cortado en largas piezas doradas. O plátanos, partidos y acomodados en un plato. O lo que sea que Ba tenga: guayaba cuando es la temporada, papaya cuando Ba encuentra una buena.\n\nEl plato está ahí. Siempre aparece y ya.\n\n\"Ba, no tengo hambre.\"\n\nBa no dice nada. Ba vuelve a la cocina. El plato se queda.\n\nLo comes. Por supuesto que lo comes. Es dulce y fresco y está perfectamente maduro, porque Ba revisa la fruta todos los días y sabe exactamente cuándo está lista.\n\nBa mira desde la puerta. Solo por un momento. Después Ba se va.\n\nEsto pasa en cada visita. Estás acostumbrado. Pones los ojos en blanco un poco, pero solo para ti.\n\nUna tarde vienes sin llamar. La puerta está abierta, como siempre. Entras en silencio, como siempre.\n\nBa está en la cocina, pero Ba no sabe todavía que estás ahí.\n\nTe detienes en la puerta de la cocina.\n\nBa está parada en el mesón con el cuchillo y la tabla para cortar, y en las manos de Ba hay un mango. Ba lo está cortando despacio, como siempre hace, girándolo y rebanándolo para que las piezas salgan parejas y limpias.\n\nPero no hay nadie más en casa. Nadie llamó. Nadie pidió nada.\n\nBa simplemente está cortando un mango.\n\nPor si alguien viene.\n\nMiras a Ba trabajar por un momento, sin decir nada. La cocina huele a mango maduro y a algo cálido en la estufa. Las manos de Ba son cuidadosas y firmes.\n\nEntiendes algo en ese momento.\n\nNo es un pensamiento grande, no son palabras. Solo una sensación que se asienta como una piedra cayendo en agua quieta.\n\nEsto es. Esto es lo que Ba ha estado diciendo, en cada visita, con cada plato de fruta.\n\nEntras a la cocina y rodeas a Ba con los brazos por detrás.\n\n\"Te quiero, Ba.\"\n\nBa se queda completamente quieta.\n\nLas orejas de Ba se ponen rosadas.\n\nBa no lo dice de vuelta. Ba nunca lo ha dicho.\n\nBa te da una palmadita en la mano una vez, dos veces. Después Ba vuelve a tomar el cuchillo.\n\nBa corta otro mango.", "Ba siempre está en la cocina.\n\nLo has sabido toda tu vida. Otras abuelas, tal vez, se sientan en el jardín, o doblan la ropa frente a las noticias, o se duermen en la silla buena junto a la ventana. Ba está en la cocina. La cocina es donde Ba vive. El resto de la casa son solo cuartos.\n\nLa cocina huele de cierta manera. Comino que ha estado en un frasco por veinte años. Aceite caliente. La dulzura particular de la fruta que está en el momento exacto de madurez. Has conocido ese olor desde que eras lo bastante pequeño para sentarte en el mesón y ver a Ba trabajar.\n\nCuando vienes a casa de Ba, Ba te oye entrar — Ba siempre oye, incluso cuando intentas hacer silencio — y lo primero que Ba dice, cada vez, sin excepción, no es \"Hola\" ni \"Qué bueno verte\" ni \"¿Cómo estás, mi amor?\"\n\nLo primero que Ba dice es: \"¿Comiste?\"\n\nDices que sí, sí comiste, comiste antes de venir, estás bien.\n\nBa hace un sonido que no es del todo un asentimiento ni del todo un descarte, y vuelve a la tabla para cortar.\n\nUnos minutos después, sin ceremonia, aparece un plato en la mesa de la cocina. Un mango, cortado en largas piezas en forma de luna, acomodado así nomás. O plátanos, partidos por la mitad, abiertos en abanico con cuidado. O guayaba cuando es la temporada, abierta para mostrar el rosado de adentro. O papaya si Ba encontró una buena en el mercado, al que Ba va cada pocos días y toma muy en serio.\n\nEl plato simplemente está ahí. Llega como llega el clima: sin anunciarse.\n\n\"Ba, dije que no tengo hambre.\"\n\nBa no levanta la mirada. \"Come un poco.\"\n\nComes. Resulta que sí tienes un poco de hambre. El mango está perfecto: dulce y fresco y ni una sola fibra demasiado dura, porque Ba revisa la fruta todos los días y la mueve del mesón a la nevera en el momento exacto, y ni una sola vez en tu vida Ba te ha dado una pieza de fruta que no esté madura.\n\nBa mira desde la puerta de la cocina. Solo un segundo. Solo el tiempo suficiente para ver que estás comiendo. Después Ba se va.\n\nEsto es cada visita. Toda tu vida.\n\nCuando eras más joven no pensabas en eso. Cuando creciste empezó a fastidiarte un poco, a veces. No tenías hambre. No habías pedido. La fruta aparecía igual, y Ba se paraba en la puerta y miraba, y todo el asunto era un poco vergonzoso, como si te trataran como si todavía tuvieras siete años.\n\n\"Ya comí, Ba.\"\n\n\"¿Comiste suficiente?\"\n\nNo había respuesta correcta para esa pregunta. En las cuentas de Ba, nunca era suficiente.\n\nUna tarde de noviembre — un día gris, de esos en que el cielo está bajo y la luz es del color del papel viejo — vas sin llamar. No siempre llamas. La puerta nunca está con llave. Entras y la casa está en silencio, lo que significa que Ba está en la cocina, porque Ba siempre está en la cocina, pero en silencio.\n\nDejas tu bolso en la sala y caminas hacia la cocina, y entonces te detienes.\n\nBa está parada en el mesón con el cuchillo pequeño y filoso y la tabla de madera para cortar que ha estado en esa cocina desde antes de que nacieras. La tabla está gastada en el medio, una curva poco profunda de décadas de uso. En las manos de Ba hay un mango.\n\nBa lo está cortando. Con cuidado, como Ba siempre hace: sintiendo la parte plana de la semilla, girando la fruta, pasando el cuchillo por la curva. Las piezas caen limpias y parejas. Ba las acomoda sin pensarlo, de la misma manera en que las ha acomodado mil veces.\n\nPero no hay nadie más en casa. Nadie llamó antes. Nadie pidió nada.\n\nBa todavía no sabe que estás ahí.\n\nBa simplemente está cortando un mango. Sola en la cocina en una tarde gris, para nadie, para quien pueda venir, por si acaso.\n\nTe quedas en la puerta y miras.\n\nLa cocina huele como siempre: comino y aceite caliente y fruta madura. Las manos de Ba están firmes. Ba lleva cincuenta años cortando fruta en esta cocina. Ba va a cortar fruta en esta cocina hasta que ya no se pueda parar, y probablemente después también.\n\nSientes algo moverse dentro de ti. No una cosa grande. No palabras, exactamente. Más como algo que se enfoca y que toda tu vida estuvo un poco borroso: un cuadro al que has estado demasiado cerca, y finalmente has dado un paso atrás y ahora puedes ver lo que es.\n\n¿Comiste?\n\nCome un poco.\n\nEl plato en la mesa, cada vez, hayas pedido o no.\n\nBa revisando la fruta cada mañana para saber exactamente cuándo está lista.\n\nBa cortando un mango sola en una tarde gris de noviembre, por si acaso.\n\nEntras a la cocina. Ba te oye y empieza a voltearse, sorprendida, y tú llegas primero: rodeas a Ba con los brazos por detrás, tu cara contra la parte de atrás del hombro de Ba.\n\n\"Te quiero, Ba.\"\n\nBa se queda completamente quieta.\n\nLo sientes: la quietud, y después, tras un momento, el calor de la mano de Ba cubriendo la tuya. Ba te da una palmadita en la mano dos veces, como Ba siempre ha hecho cuando no hay palabras.\n\nLas orejas de Ba se han puesto rosadas.\n\nBa no lo dice de vuelta. Ba nunca lo ha dicho. Ese no es el idioma de Ba.\n\nDespués de un momento, Ba se endereza con suavidad, y tú la sueltas, y Ba vuelve a la tabla para cortar.\n\nBa corta otro mango.\n\nBa lo pone en un plato.\n\nBa lo pone en la mesa sin mirarte.\n\n\"Come,\" dice Ba. \"Estás delgado.\"\n\nTe sientas. Comes el mango. Está perfecto.\n\nBa se queda en la puerta y te mira comer, y no dice nada más, y eso es todo. Eso es todo el asunto."],
      fr: ["Ba est toujours dans la cuisine.\n\nBa a un couteau. Ba a une planche à découper. Ba a des fruits.\n\nQuand tu viens chez Ba, Ba dit : \"Tu as mangé ?\"\n\nC'est le bonjour de Ba.\n\nPuis des fruits apparaissent sur la table. Un mangue. Coupé en tranches fines. Sur une assiette avec une petite fourchette.\n\n\"Ba, j'ai déjà mangé.\"\n\nBa s'en fiche. Le fruit reste sur la table.\n\nChaque fois. À chaque visite. Des fruits sur la table.\n\nTu les manges. C'est doux. Ba regarde.\n\nUn jour tu viens et personne ne sait que tu arrives.\n\nTu entres en silence.\n\nBa est dans la cuisine. Ba ne sait pas que tu es là.\n\nBa coupe un mangue. Lentement. Avec soin. Les morceaux tombent en une petite rangée.\n\nPersonne ne l'a demandé. Il n'y a personne. Ba coupe, c'est tout.\n\nAu cas où.\n\nTu restes dans l'embrasure de la porte.\n\nTu comprends.\n\nTu t'approches et tu entoures Ba de tes bras par-derrière.\n\n\"Je t'aime, Ba.\"\n\nBa ne le dit pas en retour.\n\nBa rougit.\n\nBa coupe un autre mangue.", "Ba est toujours dans la cuisine.\n\nC'est juste là que Ba se trouve. D'autres grands-mères s'assoient dans le salon. D'autres grands-mères regardent la télévision, ou lisent, ou se reposent au soleil de l'après-midi. Ba est dans la cuisine. Ba a toujours été dans la cuisine.\n\nQuand tu viens chez Ba, la première chose que Ba dit n'est pas \"Bonjour\" ni \"Comment vas-tu.\"\n\nLa première chose que Ba dit est : \"Tu as mangé ?\"\n\nÀ chaque fois.\n\nTu dis oui, parce que tu as probablement mangé. Tu as mangé avant de venir. Tu n'as même pas faim.\n\nBa hoche la tête. Ba retourne à la cuisine.\n\nQuelques minutes plus tard, des fruits apparaissent sur la table. Un mangue, coupé en longues tranches dorées. Ou des bananes, fendues et disposées sur une assiette. Ou ce que Ba a : goyave quand c'est la saison, papaye quand Ba en trouve une bonne.\n\nL'assiette est là. Elle apparaît, simplement.\n\n\"Ba, je n'ai pas faim.\"\n\nBa ne dit rien. Ba retourne à la cuisine. L'assiette reste.\n\nTu manges. Bien sûr que tu manges. C'est doux et frais et parfaitement mûr, parce que Ba vérifie les fruits chaque jour et sait exactement quand ils sont prêts.\n\nBa regarde depuis la porte. Juste un instant. Puis Ba s'en va.\n\nCela arrive à chaque visite. Tu en as l'habitude. Tu lèves un peu les yeux au ciel, mais seulement pour toi-même.\n\nUn après-midi, tu viens sans appeler. La porte n'est pas verrouillée, comme toujours. Tu entres en silence, comme toujours.\n\nBa est dans la cuisine, mais Ba ne sait pas encore que tu es là.\n\nTu t'arrêtes à la porte de la cuisine.\n\nBa se tient devant le plan de travail avec le couteau et la planche à découper, et dans les mains de Ba il y a un mangue. Ba le coupe lentement, comme Ba le fait toujours, en le tournant et en le tranchant pour que les morceaux sortent réguliers et nets.\n\nMais il n'y a personne d'autre à la maison. Personne n'a appelé. Personne n'a rien demandé.\n\nBa coupe simplement un mangue.\n\nAu cas où quelqu'un viendrait.\n\nTu regardes Ba travailler un moment, sans rien dire. La cuisine sent le mangue mûr et quelque chose de chaud sur la cuisinière. Les mains de Ba sont soignées et stables.\n\nTu comprends quelque chose à ce moment-là.\n\nPas une grande pensée, pas des mots. Juste un sentiment qui se pose comme une pierre tombant dans l'eau immobile.\n\nC'est ça. C'est ce que Ba a dit, à chaque visite, à chaque assiette de fruits.\n\nTu entres dans la cuisine et tu entoures Ba de tes bras par-derrière.\n\n\"Je t'aime, Ba.\"\n\nBa devient parfaitement immobile.\n\nLes oreilles de Ba deviennent roses.\n\nBa ne le dit pas en retour. Ba ne l'a jamais dit.\n\nBa tapote ta main une fois, deux fois. Puis Ba reprend le couteau.\n\nBa coupe un autre mangue.", "Ba est toujours dans la cuisine.\n\nTu le sais depuis toujours. D'autres grands-mères, peut-être, s'assoient dans le jardin, ou plient le linge devant les nouvelles, ou s'endorment dans le bon fauteuil près de la fenêtre. Ba est dans la cuisine. La cuisine, c'est là où Ba vit. Le reste de la maison, ce ne sont que des pièces.\n\nLa cuisine a une certaine odeur. Du cumin qui est dans un bocal depuis vingt ans. De l'huile chaude. La douceur particulière des fruits qui sont au moment exact de la maturité. Tu connais cette odeur depuis que tu étais assez petit pour t'asseoir sur le plan de travail et regarder Ba travailler.\n\nQuand tu viens chez Ba, Ba t'entend entrer — Ba entend toujours, même quand tu essaies d'être silencieux — et la première chose que Ba dit, à chaque fois, sans exception, n'est pas \"Bonjour\" ni \"Ça fait plaisir de te voir\" ni \"Comment vas-tu, mon amour.\"\n\nLa première chose que Ba dit est : \"Tu as mangé ?\"\n\nTu dis oui, tu as mangé, tu as mangé avant de venir, tu vas bien.\n\nBa fait un son qui n'est pas tout à fait un hochement de tête et pas tout à fait un rejet, et retourne à la planche à découper.\n\nQuelques minutes plus tard, sans cérémonie, une assiette apparaît sur la table de la cuisine. Un mangue, coupé en longs morceaux en croissant, disposés juste comme il faut. Ou des bananes, fendues en deux, déployées en éventail avec soin. Ou goyave quand c'est la saison, ouverte pour montrer le rose à l'intérieur. Ou papaye si Ba en a trouvé une bonne au marché, où Ba va tous les quelques jours et prend très au sérieux.\n\nL'assiette est simplement là. Elle arrive comme le temps arrive — sans annonce.\n\n\"Ba, j'ai dit que je n'ai pas faim.\"\n\nBa ne lève pas les yeux. \"Mange un peu.\"\n\nTu manges. Il s'avère que tu as un peu faim. Le mangue est parfait — doux et frais et pas une seule fibre trop dure, parce que Ba vérifie les fruits chaque jour et les déplace du plan de travail au réfrigérateur au moment exact, et tu n'as jamais reçu une seule fois dans ta vie un fruit pas mûr de Ba.\n\nBa regarde depuis la porte de la cuisine. Juste une seconde. Juste assez longtemps pour voir que tu manges. Puis Ba s'en va.\n\nC'est chaque visite. Toute ta vie.\n\nQuand tu étais plus jeune, tu n'y pensais pas. Quand tu as grandi, tu as commencé, parfois, à te sentir un peu agacé par cela. Tu n'avais pas faim. Tu n'avais pas demandé. Les fruits apparaissaient quand même, et Ba se tenait dans l'embrasure de la porte et regardait, et tout cela était un peu embarrassant, comme si on te traitait comme si tu avais encore sept ans.\n\n\"J'ai déjà mangé, Ba.\"\n\n\"Tu as assez mangé ?\"\n\nIl n'y avait pas de bonne réponse à cette question. Dans la comptabilité de Ba, ce n'était jamais assez.\n\nUn après-midi de novembre — un jour gris, le genre où le ciel est bas et la lumière a la couleur du papier vieilli — tu y vas sans appeler. Tu n'appelles pas toujours. La porte n'est jamais verrouillée. Tu entres et la maison est silencieuse, ce qui signifie que Ba est dans la cuisine, parce que Ba est toujours dans la cuisine, mais silencieuse.\n\nTu poses ton sac dans la pièce d'entrée et tu marches vers la cuisine, et puis tu t'arrêtes.\n\nBa se tient devant le plan de travail avec le petit couteau bien aiguisé et la planche à découper en bois qui est dans cette cuisine depuis avant ta naissance. La planche est usée au milieu, une légère courbe creusée par des décennies d'utilisation. Dans les mains de Ba, il y a un mangue.\n\nBa le coupe. Avec soin, comme Ba le fait toujours — en sentant la partie plate du noyau, en tournant le fruit, en passant le couteau le long de la courbe. Les morceaux tombent nets et réguliers. Ba les dispose sans y penser, de la même manière dont Ba les a disposés mille fois.\n\nMais il n'y a personne d'autre à la maison. Personne n'a appelé à l'avance. Personne n'a rien demandé.\n\nBa ne sait pas encore que tu es là.\n\nBa coupe simplement un mangue. Seule dans la cuisine un après-midi gris, pour personne, pour qui pourrait venir, au cas où.\n\nTu restes dans l'embrasure de la porte et tu regardes.\n\nLa cuisine sent comme elle sent toujours — cumin et huile chaude et fruit mûr. Les mains de Ba sont stables. Ba coupe des fruits dans cette cuisine depuis cinquante ans. Ba coupera des fruits dans cette cuisine jusqu'à ce que Ba ne puisse plus se tenir debout, et probablement après.\n\nTu sens quelque chose bouger en toi. Pas une grande chose. Pas des mots, exactement. Plutôt quelque chose qui se met au point et qui a été légèrement flou toute ta vie — une image dont tu as été trop près, et tu as enfin fait un pas en arrière et maintenant tu peux voir ce que c'est.\n\nTu as mangé.\n\nMange un peu.\n\nL'assiette sur la table, chaque fois, que tu l'aies demandée ou non.\n\nBa vérifiant les fruits chaque matin pour savoir exactement quand ils sont prêts.\n\nBa coupant un mangue seule un après-midi gris de novembre, au cas où.\n\nTu entres dans la cuisine. Ba t'entend et commence à se tourner, surprise, et tu y arrives en premier — tu entoures Ba de tes bras par-derrière, ton visage contre le dos de l'épaule de Ba.\n\n\"Je t'aime, Ba.\"\n\nBa devient parfaitement immobile.\n\nTu le sens — l'immobilité, et puis, après un moment, la chaleur de la main de Ba couvrant la tienne. Ba tapote ta main deux fois, comme Ba l'a toujours fait quand il n'y a pas de mots.\n\nLes oreilles de Ba sont devenues roses.\n\nBa ne le dit pas en retour. Ba ne l'a jamais dit. Ce n'est pas la langue de Ba.\n\nAprès un moment, Ba se redresse doucement, et tu lâches prise, et Ba se retourne vers la planche à découper.\n\nBa coupe un autre mangue.\n\nBa le met sur une assiette.\n\nBa la pose sur la table sans te regarder.\n\n\"Mange,\" dit Ba. \"Tu as l'air maigre.\"\n\nTu t'assois. Tu manges le mangue. Il est parfait.\n\nBa se tient dans l'embrasure de la porte et te regarde manger, et ne dit rien d'autre, et c'est tout. C'est toute l'histoire."]
