    levels: {
      en: ["Maya was a swimmer. The pool had six lanes.\n\nIn her lane, the water was calm. She kicked. She breathed. She kicked.\n\nIn the lane next to her, a girl was swimming faster.\n\nMaya looked. Maya stopped kicking.\n\n\"Watch your own lane,\" said her coach.\n\nMaya tried again. She kicked. She breathed. But she peeked.\n\nThe other girl was way ahead.\n\nMaya stopped. She splashed. She got water in her nose.\n\n\"Watch your own lane,\" said her coach again. \"Yours is the only one you swim in.\"\n\nThe big race came. Six girls. Six lanes.\n\nMaya put her face in the water. She did not look left. She did not look right.\n\nShe kicked. She breathed. She kicked.\n\nHer hand touched the wall.\n\nMaya looked up. Her coach was smiling.\n\n\"Where did I finish?\" asked Maya.\n\n\"Fifth,\" said her coach. \"Now look at the clock.\"\n\nThe number on the clock was Maya's fastest time. Ever.\n\n\"You swam your race,\" said her coach. \"That is the only one that's yours.\"\n\nMaya smiled. The water was calm again.", "Maya had been swimming for as long as she could remember. The pool was where she felt most like herself — long, blue, and quiet, with six neat lanes painted on the bottom.\n\nThe trouble was the lane next to her.\n\nIn the lane next to her, there was almost always somebody fast. Maya could see them out of the corner of her goggles — a streak of arms, a churn of feet, getting ahead, always getting ahead. And every time Maya saw it, something inside her went tight.\n\nShe would slow down. She would lift her head to check. She would lose her rhythm.\n\n\"Maya,\" said her coach, who was named Coach Ngu, \"what are you doing?\"\n\n\"I'm watching the other lane,\" said Maya.\n\n\"Why?\"\n\n\"To see if I'm winning.\"\n\nCoach Ngu shook his head slowly. \"You cannot win in someone else's lane,\" he said. \"You can only swim in yours. Watch yours.\"\n\nMaya tried. She really did. She would put her face in the water and tell herself, *my lane, my lane, my lane.* But the moment she heard the splash of fast feet on her left, her eyes would slide that way all on their own. And the moment her eyes slid that way, her arms forgot what they were doing.\n\nThe big meet came at the end of the month. Six lanes. Six girls. And in the lane next to Maya: the fastest swimmer Maya had ever seen.\n\nMaya stood on the block, shaking a little. Coach Ngu came up behind her.\n\n\"Maya,\" he said. \"I will not ask you to win. I will ask you to swim *your* race. Do you understand the difference?\"\n\nMaya nodded, even though she wasn't sure she did.\n\nThe whistle blew. Maya dove.\n\nIn the water, the world went quiet. Maya kicked. She breathed. She kicked. There was a splash on her left, but she did not turn her head. There was a noise from the crowd, but it was very far away.\n\n*My lane, my lane, my lane.*\n\nHer hand hit the wall.\n\nMaya pulled off her goggles. The fastest swimmer was already out of the pool, smiling at her parents. Two other girls were touching the wall behind Maya. She had not won.\n\nThen Coach Ngu pointed at the big clock.\n\nMaya looked. The number on the clock was her fastest time ever — by almost two seconds.\n\n\"You swam your race,\" said Coach Ngu, very quietly. \"That is the only race that has ever been yours.\"\n\nMaya looked at the clock for a long moment.\n\nThen she looked at her own lane — calm again, blue again, hers.\n\nAnd she smiled.", "Maya had been a swimmer for as long as she could remember, which, when you are nine years old, feels like forever. The pool was where she felt most herself. It was long, and blue, and mostly quiet, and it had six perfect lanes painted on the bottom like a map for her arms.\n\nThe trouble — and there was a trouble — was always the lane next to her.\n\nIn the lane next to her, there was almost always somebody fast. Maya could see them out of the corner of her goggles: a streak of pale arms, a churn of kicking feet, a body cutting through the water like a small, determined torpedo. They were always, *always*, getting ahead. And every single time Maya saw it, something inside her chest went tight and her stomach forgot what it was doing.\n\nShe would slow down. She would lift her head to check. She would breathe out of rhythm and get a tiny sip of pool water up her nose, which was the worst feeling in the world.\n\n\"Maya,\" said her coach, who was named Coach Ngu and who had been a swimmer himself a very long time ago, \"what are you doing?\"\n\n\"I'm watching the other lane,\" Maya said.\n\n\"Why?\"\n\n\"To see if I'm winning.\"\n\nCoach Ngu shook his head, slowly, the way he did when he had explained something many times and was about to explain it again, and was not impatient about it, but a little tired.\n\n\"Maya,\" he said. \"You cannot *win* in someone else's lane. You can only swim in yours. Yours is the only one you have. Watch *yours.*\"\n\nMaya tried. She really, really tried. She would put her face down into the cool, blue water, take her first stroke, and tell herself, very firmly, *my lane, my lane, my lane.* Sometimes she made it almost a whole length before her eyes betrayed her. The moment a splash sounded too close on her left, her goggles slid sideways all on their own, and the moment her goggles slid sideways, her arms went stupid and her kicks turned into flutters, and the swimmer in the lane next to her got further ahead, and Maya got slower, and the whole thing went exactly the way Coach Ngu had said it would.\n\nThe big meet came at the end of the month. The whole team got bright new caps. The parents brought folding chairs and orange slices. The pool deck smelled like chlorine and warm concrete and, somehow, just a little bit like Maya's nerves.\n\nThere were six lanes, and six girls. In the lane right next to Maya was the fastest swimmer Maya had ever seen — a tall girl from another club whose strokes were so clean they barely splashed.\n\nMaya stood on her block, shaking, just a little. Coach Ngu came up behind her and put one hand on her shoulder.\n\n\"Maya,\" he said, in his usual quiet voice, \"I am not going to ask you to win today. I am going to ask you to swim *your* race. Do you understand the difference?\"\n\nMaya nodded, though she wasn't sure, yet, that she did.\n\n\"Your race,\" Coach Ngu said, \"is the one in *your* lane. If you swim it well, the rest takes care of itself. If you swim it badly, even winning won't feel like winning. Do you hear me?\"\n\nMaya nodded again.\n\nThe whistle blew. Maya dove.\n\nIn the water, the world went quiet, the way it always did. The pool was blue and her lane was hers. Maya kicked. She breathed. She kicked. There was a splash on her left, very close — the tall girl, of course, pulling away — but Maya did not, this time, lift her head to check. She did not, this time, let her eyes slide. There was a cheering noise from somewhere far above the surface of the water, but it was a very far-away noise, and Maya was busy.\n\n*My lane,* she thought, on every breath. *My lane. My lane. My lane.*\n\nHer hand slapped the wall.\n\nMaya pulled off her goggles and looked around, blinking. The tall girl was already out of the pool, smiling at her parents. Two other girls were touching the wall behind Maya. She had not won. She had not even come close to winning.\n\nThen Coach Ngu, standing on the deck, pointed at the big yellow clock on the wall.\n\nMaya looked.\n\nThe number on the clock was her own time. And it was almost two whole seconds faster than her best time had ever, ever been.\n\nFor a long, strange moment, Maya did not feel happy or sad. She just felt — *quiet*. She felt the way the pool felt when nobody was in it: smooth, settled, hers.\n\nCoach Ngu crouched down by the lane line.\n\n\"You swam your race,\" he said, very softly, as if it were a secret only she should hear. \"That is the only race that has ever been yours.\"\n\nMaya looked at the clock for one more long moment. Then she looked, finally, at her own lane — calm again, blue again, exactly as wide and exactly as long as it had ever been.\n\nAnd she smiled, the small, careful smile of someone who has just learned the only kind of winning that lasts.\n\n*Something to think about: When you watch someone else's lane, you stop swimming yours. What's something in your life right now where you're swimming better when you're not checking what someone else is doing?*"],
      hi: ["माया एक तैराक थी। पूल में छह लेन थीं।\n\nउसकी लेन में, पानी शांत था। उसने पैर मारे। उसने सांस ली। उसने पैर मारे।\n\nउसके बगल वाली लेन में, एक लड़की तेज़ तैर रही थी।\n\nमाया ने देखा। माया ने पैर मारना बंद कर दिया।\n\n\"अपनी लेन पर ध्यान दो,\" उसकी कोच ने कहा।\n\nमाया ने फिर कोशिश की। उसने पैर मारे। उसने सांस ली। लेकिन उसने झांका।\n\nदूसरी लड़की बहुत आगे थी।\n\nमाया रुक गई। उसने पानी उछाला। उसकी नाक में पानी चला गया।\n\n\"अपनी लेन पर ध्यान दो,\" उसकी कोच ने फिर कहा। \"तुम सिर्फ अपनी लेन में ही तैरती हो।\"\n\nबड़ी रेस आ गई। छह लड़कियाँ। छह लेन।\n\nमाया ने अपना चेहरा पानी में डाला। उसने बाईं ओर नहीं देखा। उसने दाईं ओर नहीं देखा।\n\nउसने पैर मारे। उसने सांस ली। उसने पैर मारे।\n\nउसका हाथ दीवार से टकराया।\n\nमाया ने ऊपर देखा। उसकी कोच मुस्कुरा रही थी।\n\n\"मैं कौन से नंबर पर आई?\" माया ने पूछा।\n\n\"पाँचवें,\" उसकी कोच ने कहा। \"अब घड़ी देखो।\"\n\nघड़ी पर जो नंबर था वह माया का अब तक का सबसे तेज़ समय था।\n\n\"तुमने अपनी रेस तैरी,\" उसकी कोच ने कहा। \"यही एकमात्र रेस है जो सच में तुम्हारी है।\"\n\nमाया मुस्कुराई। पानी फिर से शांत था।", "माया जब से याद कर सकती थी, तब से तैर रही थी। पूल वह जगह थी जहाँ वह सबसे अधिक खुद जैसी महसूस करती थी। लंबा, नीला और शांत, तल पर छह साफ़-सुथरी लेन बनी हुई।\n\nपरेशानी उसके बगल वाली लेन थी।\n\nउसके बगल वाली लेन में, लगभग हमेशा कोई तेज़ तैराक होता था। माया उन्हें अपने चश्मे के कोने से देख सकती थी। हाथों की एक लकीर, पैरों की हलचल, आगे बढ़ती हुई, हमेशा आगे बढ़ती हुई। और हर बार जब माया यह देखती, उसके अंदर कुछ कस जाता।\n\nवह धीमी हो जाती। वह जाँचने के लिए सिर उठाती। वह अपनी लय खो देती।\n\n\"माया,\" उसके कोच ने कहा, जिनका नाम कोच ङ्गू था, \"तुम क्या कर रही हो?\"\n\n\"मैं दूसरी लेन देख रही हूँ,\" माया ने कहा।\n\n\"क्यों?\"\n\n\"यह देखने के लिए कि मैं जीत रही हूँ या नहीं।\"\n\nकोच ङ्गू ने धीरे से सिर हिलाया। \"तुम किसी और की लेन में जीत नहीं सकती,\" उन्होंने कहा। \"तुम केवल अपनी लेन में तैर सकती हो। अपनी देखो।\"\n\nमाया ने कोशिश की। सच में कोशिश की। वह पानी में चेहरा डालती और खुद से कहती, मेरी लेन, मेरी लेन, मेरी लेन। लेकिन जिस पल वह अपनी बाईं ओर तेज़ पैरों की छपछप सुनती, उसकी आँखें अपने आप उस ओर खिसक जातीं। और जिस पल उसकी आँखें खिसकतीं, उसके हाथ भूल जाते कि वे क्या कर रहे थे।\n\nमहीने के अंत में बड़ी प्रतियोगिता आई। छह लेन। छह लड़कियाँ। और माया के बगल वाली लेन में: माया ने अब तक की सबसे तेज़ तैराक देखी।\n\nमाया ब्लॉक पर खड़ी थी, थोड़ी काँपते हुए। कोच ङ्गू उसके पीछे आए।\n\n\"माया,\" उन्होंने कहा। \"मैं तुमसे जीतने को नहीं कहूँगा। मैं तुमसे कहूँगा कि अपनी रेस तैरो। क्या तुम फर्क समझती हो?\"\n\nमाया ने सिर हिलाया, हालाँकि उसे यकीन नहीं था कि वह समझती है।\n\nसीटी बजी। माया ने डुबकी लगाई।\n\nपानी में, दुनिया शांत हो गई। माया ने पैर मारे। उसने सांस ली। उसने पैर मारे। बाईं ओर एक छपछप थी, लेकिन उसने सिर नहीं घुमाया। भीड़ से शोर था, लेकिन वह बहुत दूर था।\n\nमेरी लेन, मेरी लेन, मेरी लेन।\n\nउसका हाथ दीवार से टकराया।\n\nमाया ने अपना चश्मा खींचकर निकाला। सबसे तेज़ तैराक पहले ही पूल से बाहर थी, अपने माता-पिता को देखकर मुस्कुरा रही थी। दो और लड़कियाँ माया के पीछे दीवार छू रही थीं। वह नहीं जीती थी।\n\nफिर कोच ङ्गू ने बड़ी घड़ी की ओर इशारा किया।\n\nमाया ने देखा। घड़ी पर नंबर उसका अब तक का सबसे तेज़ समय था। लगभग दो सेकंड से।\n\n\"तुमने अपनी रेस तैरी,\" कोच ङ्गू ने बहुत धीरे से कहा। \"यही एकमात्र रेस है जो सच में तुम्हारी रही है।\"\n\nमाया ने घड़ी को लंबे पल तक देखा।\n\nफिर उसने अपनी लेन देखी। फिर से शांत, फिर से नीली, उसकी अपनी।\n\nऔर वह मुस्कुराई।", "माया जब से याद कर सकती थी, तब से तैराक थी। और जब आप नौ साल के होते हैं, तो यह हमेशा जैसा लगता है। पूल वह जगह थी जहाँ वह सबसे ज़्यादा खुद जैसी महसूस करती थी। लंबा, नीला, और ज़्यादातर शांत। तल पर छह बिल्कुल सही लेन बनी हुई थीं, जैसे उसके हाथों के लिए कोई नक्शा हो।\n\nपरेशानी, और परेशानी थी, हमेशा उसके बगल वाली लेन थी।\n\nउसके बगल वाली लेन में, लगभग हमेशा कोई तेज़ तैराक होता था। माया उन्हें अपने चश्मे के कोने से देख सकती थी। हल्के हाथों की एक लकीर, पैरों की हलचल, पानी को काटता हुआ एक छोटा, ज़िद्दी शरीर। वे हमेशा, हमेशा आगे निकल जाते थे। और हर एक बार जब माया यह देखती, उसकी छाती में कुछ कस जाता और उसका पेट भूल जाता कि वह क्या कर रहा था।\n\nवह धीमी हो जाती। वह जाँचने के लिए सिर उठाती। वह लय से बाहर सांस लेती और उसकी नाक में पूल के पानी की एक छोटी बूँद चली जाती, जो दुनिया का सबसे बुरा एहसास था।\n\n\"माया,\" उसके कोच ने कहा, जिनका नाम कोच ङ्गू था और जो खुद बहुत समय पहले तैराक रह चुके थे, \"तुम क्या कर रही हो?\"\n\n\"मैं दूसरी लेन देख रही हूँ,\" माया ने कहा।\n\n\"क्यों?\"\n\n\"यह देखने के लिए कि मैं जीत रही हूँ या नहीं।\"\n\nकोच ङ्गू ने धीरे से सिर हिलाया, उस तरह जैसे जब उन्होंने कोई बात कई बार समझाई हो और उसे फिर से समझाने वाले हों। अधीर नहीं, बस थोड़े थके हुए।\n\n\"माया,\" उन्होंने कहा। \"तुम किसी और की लेन में जीत नहीं सकती। तुम सिर्फ़ अपनी लेन में तैर सकती हो। तुम्हारी एक ही है। अपनी देखो।\"\n\nमाया ने कोशिश की। सच में, सच में कोशिश की। वह अपना चेहरा ठंडे, नीले पानी में डालती, अपना पहला स्ट्रोक लगाती, और बहुत दृढ़ता से खुद से कहती, मेरी लेन, मेरी लेन, मेरी लेन। कभी-कभी वह लगभग पूरी लंबाई तय कर लेती, इससे पहले कि उसकी आँखें उसे धोखा दे दें। जिस पल बाईं ओर बहुत पास से एक छपछप की आवाज़ आती, उसका चश्मा अपने आप बगल की ओर फिसल जाता। और जिस पल उसका चश्मा बगल की ओर फिसलता, उसके हाथ बेवकूफ़ हो जाते और उसके पैर बस फड़फड़ाने लगते। और बगल वाली लेन की तैराक और आगे बढ़ जाती, और माया और धीमी हो जाती, और सब कुछ ठीक वैसे ही होता जैसा कोच ङ्गू ने कहा था।\n\nमहीने के अंत में बड़ी प्रतियोगिता आई। पूरी टीम को नई चमकदार टोपियाँ मिलीं। माता-पिता मोड़ने वाली कुर्सियाँ और संतरे के टुकड़े लाए। पूल डेक से क्लोरीन और गर्म कंक्रीट की गंध आ रही थी, और किसी तरह, थोड़ी सी माया की घबराहट की भी।\n\nछह लेन थीं, और छह लड़कियाँ। माया के ठीक बगल वाली लेन में माया ने अब तक की सबसे तेज़ तैराक थी। एक लंबी लड़की दूसरे क्लब से, जिसके स्ट्रोक इतने साफ़ थे कि मुश्किल से छपछप करते थे।\n\nमाया अपने ब्लॉक पर खड़ी थी, थोड़ी सी काँप रही थी। कोच ङ्गू उसके पीछे आए और उसके कंधे पर एक हाथ रखा।\n\n\"माया,\" उन्होंने अपनी सामान्य शांत आवाज़ में कहा, \"मैं आज तुमसे जीतने को नहीं कहूँगा। मैं तुमसे कहूँगा कि अपनी रेस तैरो। क्या तुम फर्क समझती हो?\"\n\nमाया ने सिर हिलाया, हालाँकि उसे अभी यकीन नहीं था कि वह समझती है।\n\n\"तुम्हारी रेस,\" कोच ङ्गू ने कहा, \"वह है जो तुम्हारी लेन में है। अगर तुम इसे अच्छे से तैरीं, तो बाकी अपने आप संभल जाएगा। अगर तुम इसे बुरी तरह तैरीं, तो जीतना भी जीत जैसा नहीं लगेगा। क्या तुम मुझे सुन रही हो?\"\n\nमाया ने फिर सिर हिलाया।\n\nसीटी बजी। माया ने डुबकी लगाई।\n\nपानी में, दुनिया शांत हो गई, जैसा हमेशा होता था। पूल नीला था और उसकी लेन उसकी थी। माया ने पैर मारे। उसने सांस ली। उसने पैर मारे। बाईं ओर एक छपछप थी, बहुत पास। बेशक वह लंबी लड़की, आगे निकल रही थी। लेकिन इस बार माया ने जाँचने के लिए सिर नहीं उठाया। इस बार उसने अपनी आँखें फिसलने नहीं दीं। पानी की सतह से कहीं ऊपर से एक खुशी का शोर आ रहा था, लेकिन वह बहुत दूर का शोर था, और माया व्यस्त थी।\n\nमेरी लेन, उसने हर सांस पर सोचा। मेरी लेन। मेरी लेन। मेरी लेन।\n\nउसका हाथ दीवार से टकराया।\n\nमाया ने अपना चश्मा खींचकर निकाला और चारों ओर देखा, पलक झपकाते हुए। लंबी लड़की पहले से ही पूल से बाहर थी, अपने माता-पिता को देखकर मुस्कुरा रही थी। दो और लड़कियाँ माया के पीछे दीवार छू रही थीं। वह नहीं जीती थी। वह जीतने के पास भी नहीं आई थी।\n\nफिर कोच ङ्गू, डेक पर खड़े होकर, दीवार पर लगी बड़ी पीली घड़ी की ओर इशारा किया।\n\nमाया ने देखा।\n\nघड़ी पर नंबर उसका अपना समय था। और यह उसके अब तक के सबसे अच्छे समय से लगभग दो पूरे सेकंड तेज़ था।\n\nएक लंबे, अजीब पल के लिए, माया न खुश थी न दुखी। वह बस शांत महसूस कर रही थी। वह वैसे ही महसूस कर रही थी जैसे पूल महसूस करता है जब उसमें कोई नहीं होता। चिकना, स्थिर, उसका।\n\nकोच ङ्गू लेन की रेखा के पास झुक गए।\n\n\"तुमने अपनी रेस तैरी,\" उन्होंने बहुत धीरे से कहा, जैसे यह एक राज़ हो जो केवल उसे सुनना चाहिए। \"यही एकमात्र रेस है जो सच में तुम्हारी रही है।\"\n\nमाया ने एक और लंबे पल के लिए घड़ी देखी। फिर उसने आखिरकार अपनी लेन देखी। फिर से शांत, फिर से नीली, ठीक उतनी ही चौड़ी और उतनी ही लंबी जितनी वह हमेशा रही थी।\n\nऔर वह मुस्कुराई। उस छोटी, सावधान मुस्कान से जो किसी ने तब सीखी हो जब उसने अभी-अभी जीतने का एकमात्र वह तरीका सीखा हो जो टिकता है।\n\nसोचने के लिए कुछ: जब आप किसी और की लेन देखते हैं, तो आप अपनी लेन में तैरना बंद कर देते हैं। आपकी अपनी ज़िंदगी में अभी ऐसा क्या है जहाँ आप बेहतर तैर रहे हैं जब आप यह नहीं देख रहे कि कोई और क्या कर रहा है?"],
      gu: ["માયા તરવૈયા હતી. પૂલમાં છ લેન હતી.\n\nએની લેનમાં, પાણી શાંત હતું. એણે પગ માર્યા. એણે શ્વાસ લીધો. એણે પગ માર્યા.\n\nએની બાજુની લેનમાં, એક છોકરી ઝડપથી તરી રહી હતી.\n\nમાયા એ જોયું. માયા એ પગ મારવાનું બંધ કરી દીધું.\n\n\"તારી પોતાની લેન પર ધ્યાન આપ,\" એની કોચે કહ્યું.\n\nમાયા એ ફરી પ્રયત્ન કર્યો. એણે પગ માર્યા. એણે શ્વાસ લીધો. પણ એણે ડોકિયું કર્યું.\n\nબીજી છોકરી ઘણી આગળ હતી.\n\nમાયા અટકી ગઈ. એણે પાણી છાંટ્યું. એના નાકમાં પાણી ગયું.\n\n\"તારી પોતાની લેન પર ધ્યાન આપ,\" એની કોચે ફરી કહ્યું. \"તું ફક્ત તારી જ લેનમાં તરે છે.\"\n\nમોટી રેસ આવી. છ છોકરીઓ. છ લેન.\n\nમાયા એ ચહેરો પાણીમાં મૂક્યો. એણે ડાબી બાજુ ન જોયું. એણે જમણી બાજુ ન જોયું.\n\nએણે પગ માર્યા. એણે શ્વાસ લીધો. એણે પગ માર્યા.\n\nએનો હાથ દિવાલને અડ્યો.\n\nમાયા એ ઉપર જોયું. એની કોચ હસતી હતી.\n\n\"હું ક્યાં આવી?\" માયા એ પૂછ્યું.\n\n\"પાંચમી,\" એની કોચે કહ્યું. \"હવે ઘડિયાળ જો.\"\n\nઘડિયાળ પરનો નંબર માયા નો સૌથી ઝડપી સમય હતો. અત્યાર સુધીનો.\n\n\"તેં તારી રેસ તરી,\" એની કોચે કહ્યું. \"એ જ એક રેસ છે જે ખરેખર તારી છે.\"\n\nમાયા હસી. પાણી ફરી શાંત હતું.", "માયા જ્યારથી યાદ રાખી શકતી હતી ત્યારથી તરતી હતી. પૂલ એવી જગ્યા હતી જ્યાં તે પોતાના જેવી સૌથી વધુ લાગતી. લાંબો, વાદળી અને શાંત, તળિયે છ સ્વચ્છ લેન દોરેલી.\n\nમુશ્કેલી એની બાજુની લેન હતી.\n\nએની બાજુની લેનમાં, લગભગ હંમેશા કોઈ ઝડપી તરનાર હોતું. માયા એમને એના ચશ્માની ધારથી જોઈ શકતી. હાથોની એક રેખા, પગની હલચલ, આગળ વધતા, હંમેશા આગળ વધતા. અને જ્યારે જ્યારે માયા એ જોતી, એની અંદર કંઈક કસાઈ જતું.\n\nએ ધીમી પડી જતી. એ તપાસવા માટે માથું ઊંચું કરતી. એ પોતાની લય ગુમાવી દેતી.\n\n\"માયા,\" એના કોચે કહ્યું, જેમનું નામ કોચ ન્ગુ હતું, \"તું શું કરી રહી છે?\"\n\n\"હું બીજી લેન જોઈ રહી છું,\" માયા એ કહ્યું.\n\n\"કેમ?\"\n\n\"એ જોવા કે હું જીતી રહી છું કે નહીં.\"\n\nકોચ ન્ગુ એ ધીમેથી માથું હલાવ્યું. \"તું બીજાની લેનમાં જીતી શકતી નથી,\" એમણે કહ્યું. \"તું ફક્ત તારી પોતાની લેનમાં જ તરી શકે છે. તારી જો.\"\n\nમાયા એ પ્રયત્ન કર્યો. ખરેખર પ્રયત્ન કર્યો. એ પાણીમાં ચહેરો મૂકતી અને પોતાને કહેતી, મારી લેન, મારી લેન, મારી લેન. પણ જે ક્ષણે એને એની ડાબી બાજુ ઝડપી પગનો છપકો સંભળાતો, એની આંખો પોતાની મેળે જ એ બાજુ ખસી જતી. અને જે ક્ષણે એની આંખો ખસતી, એના હાથો ભૂલી જતા કે તેઓ શું કરી રહ્યા હતા.\n\nમહિનાના અંતે મોટી સ્પર્ધા આવી. છ લેન. છ છોકરીઓ. અને માયા ની બાજુની લેનમાં: માયા એ જોયેલી સૌથી ઝડપી તરનાર.\n\nમાયા બ્લોક પર ઊભી હતી, થોડી ધ્રૂજતી. કોચ ન્ગુ એની પાછળ આવ્યા.\n\n\"માયા,\" એમણે કહ્યું. \"હું તને જીતવાનું નહીં કહું. હું તને કહીશ કે તારી રેસ તર. શું તને ફેર સમજાય છે?\"\n\nમાયા એ માથું હલાવ્યું, જોકે એને ખાતરી નહોતી કે એ સમજે છે.\n\nસીટી વાગી. માયા એ ડૂબકી લગાવી.\n\nપાણીમાં, દુનિયા શાંત થઈ ગઈ. માયા એ પગ માર્યા. એણે શ્વાસ લીધો. એણે પગ માર્યા. એની ડાબી બાજુ છપકો હતો, પણ એણે માથું ન ફેરવ્યું. ભીડમાંથી અવાજ આવતો હતો, પણ એ ઘણો દૂર હતો.\n\nમારી લેન, મારી લેન, મારી લેન.\n\nએનો હાથ દિવાલને અડ્યો.\n\nમાયા એ ચશ્મા ઉતાર્યા. સૌથી ઝડપી તરનાર પહેલેથી જ પૂલની બહાર હતી, એના માતા-પિતા સામે હસતી હતી. બે બીજી છોકરીઓ માયા ની પાછળ દિવાલને અડી રહી હતી. એ જીતી નહોતી.\n\nપછી કોચ ન્ગુ એ મોટી ઘડિયાળ તરફ ઈશારો કર્યો.\n\nમાયા એ જોયું. ઘડિયાળ પરનો નંબર એનો અત્યાર સુધીનો સૌથી ઝડપી સમય હતો. લગભગ બે સેકન્ડથી.\n\n\"તેં તારી રેસ તરી,\" કોચ ન્ગુ એ ખૂબ ધીમેથી કહ્યું. \"એ જ એક રેસ છે જે ખરેખર તારી રહી છે.\"\n\nમાયા એ લાંબા સમય માટે ઘડિયાળ જોઈ.\n\nપછી એણે પોતાની લેન જોઈ. ફરી શાંત, ફરી વાદળી, એની પોતાની.\n\nઅને એ હસી.", "માયા જ્યારથી યાદ રાખી શકતી હતી ત્યારથી તરવૈયા હતી. અને જ્યારે તમે નવ વર્ષના હોવ ત્યારે, એ હંમેશા જેવું લાગે છે. પૂલ એવી જગ્યા હતી જ્યાં તે પોતાના જેવી સૌથી વધુ લાગતી. લાંબો, વાદળી અને મોટેભાગે શાંત. તળિયે છ સંપૂર્ણ લેન દોરેલી હતી, એના હાથો માટે નકશા જેવી.\n\nમુશ્કેલી, અને મુશ્કેલી હતી, હંમેશા એની બાજુની લેન હતી.\n\nએની બાજુની લેનમાં, લગભગ હંમેશા કોઈ ઝડપી તરનાર હોતું. માયા એમને એના ચશ્માની ધારથી જોઈ શકતી. હળવા હાથોની એક રેખા, પગની હલચલ, પાણીને કાપતું એક નાનું, જિદ્દી શરીર. તેઓ હંમેશા, હંમેશા આગળ વધી જતા. અને દરેક વખતે જ્યારે માયા એ જોતી, એની છાતીમાં કંઈક કસાઈ જતું અને એનું પેટ ભૂલી જતું કે એ શું કરી રહ્યું હતું.\n\nએ ધીમી પડી જતી. એ તપાસવા માટે માથું ઊંચું કરતી. એ લયથી બહાર શ્વાસ લેતી અને એના નાકમાં પૂલના પાણીની એક નાની ઘૂંટ જતી, જે દુનિયાનો સૌથી ખરાબ અનુભવ હતો.\n\n\"માયા,\" એના કોચે કહ્યું, જેમનું નામ કોચ ન્ગુ હતું અને જેઓ પોતે ઘણા સમય પહેલા તરવૈયા હતા, \"તું શું કરી રહી છે?\"\n\n\"હું બીજી લેન જોઈ રહી છું,\" માયા એ કહ્યું.\n\n\"કેમ?\"\n\n\"એ જોવા કે હું જીતી રહી છું કે નહીં.\"\n\nકોચ ન્ગુ એ ધીમેથી માથું હલાવ્યું, એ રીતે જે રીતે તેઓ કોઈ વાત ઘણી વાર સમજાવી ચૂક્યા હોય અને ફરી સમજાવવાના હોય ત્યારે કરતા. અધીરા નહીં, પણ થોડા થાકેલા.\n\n\"માયા,\" એમણે કહ્યું. \"તું બીજાની લેનમાં જીતી શકતી નથી. તું ફક્ત તારી પોતાની લેનમાં તરી શકે છે. તારી પાસે એક જ છે. તારી જો.\"\n\nમાયા એ પ્રયત્ન કર્યો. ખરેખર, ખરેખર પ્રયત્ન કર્યો. એ પોતાનો ચહેરો ઠંડા, વાદળી પાણીમાં મૂકતી, પોતાનો પહેલો સ્ટ્રોક લેતી, અને ખૂબ દૃઢતાથી પોતાને કહેતી, મારી લેન, મારી લેન, મારી લેન. ક્યારેક એ લગભગ આખી લંબાઈ પૂરી કરી લેતી, એ પહેલા કે એની આંખો એને દગો આપે. જે ક્ષણે ડાબી બાજુ ખૂબ નજીકથી છપકાનો અવાજ આવતો, એના ચશ્મા પોતાની મેળે જ બાજુ પર ખસી જતા. અને જે ક્ષણે એના ચશ્મા ખસતા, એના હાથો બેવકૂફ થઈ જતા અને એના પગ ફક્ત ફફડવા લાગતા. અને બાજુની લેનની તરનાર વધુ આગળ વધી જતી, અને માયા વધુ ધીમી પડી જતી, અને બધું જ બરાબર એ રીતે થતું જે રીતે કોચ ન્ગુ એ કહ્યું હતું.\n\nમહિનાના અંતે મોટી સ્પર્ધા આવી. આખી ટીમને નવી ચમકતી ટોપીઓ મળી. માતા-પિતા વાળી શકાય તેવી ખુરશીઓ અને નારંગીના ટુકડા લાવ્યા. પૂલ ડેક પરથી ક્લોરિન અને ગરમ સિમેન્ટની ગંધ આવતી હતી, અને કોઈક રીતે, થોડી માયા ની ગભરાટની પણ.\n\nછ લેન હતી, અને છ છોકરીઓ. માયા ની ઠીક બાજુની લેનમાં માયા એ જોયેલી સૌથી ઝડપી તરનાર હતી. એક ઊંચી છોકરી બીજા ક્લબમાંથી, જેના સ્ટ્રોક એટલા સ્વચ્છ હતા કે ભાગ્યે જ છપકો કરતા.\n\nમાયા પોતાના બ્લોક પર ઊભી હતી, થોડી ધ્રૂજતી. કોચ ન્ગુ એની પાછળ આવ્યા અને એના ખભા પર એક હાથ મૂક્યો.\n\n\"માયા,\" એમણે પોતાના સામાન્ય શાંત અવાજમાં કહ્યું, \"હું તને આજે જીતવાનું નહીં કહું. હું તને કહીશ કે તારી રેસ તર. શું તને ફેર સમજાય છે?\"\n\nમાયા એ માથું હલાવ્યું, જોકે એને હજુ ખાતરી નહોતી કે એ સમજે છે.\n\n\"તારી રેસ,\" કોચ ન્ગુ એ કહ્યું, \"એ છે જે તારી લેનમાં છે. જો તું એને સારી રીતે તરે, તો બાકીનું પોતાની મેળે સંભાળાઈ જશે. જો તું એને ખરાબ રીતે તરે, તો જીતવું પણ જીત જેવું નહીં લાગે. શું તું મને સાંભળે છે?\"\n\nમાયા એ ફરી માથું હલાવ્યું.\n\nસીટી વાગી. માયા એ ડૂબકી લગાવી.\n\nપાણીમાં, દુનિયા શાંત થઈ ગઈ, હંમેશાની જેમ. પૂલ વાદળી હતો અને એની લેન એની હતી. માયા એ પગ માર્યા. એણે શ્વાસ લીધો. એણે પગ માર્યા. એની ડાબી બાજુ છપકો હતો, ખૂબ નજીક. અલબત્ત એ ઊંચી છોકરી, આગળ ખેંચાઈ રહી. પણ આ વખતે માયા એ તપાસવા માટે માથું ન ઊંચક્યું. આ વખતે એણે પોતાની આંખોને ખસવા ન દીધી. પાણીની સપાટીથી ક્યાંક ઉપરથી ઉત્સાહનો અવાજ આવી રહ્યો હતો, પણ એ ઘણો દૂરનો અવાજ હતો, અને માયા વ્યસ્ત હતી.\n\nમારી લેન, એણે દરેક શ્વાસે વિચાર્યું. મારી લેન. મારી લેન. મારી લેન.\n\nએનો હાથ દિવાલને ટકરાયો.\n\nમાયા એ ચશ્મા ઉતાર્યા અને આસપાસ જોયું, આંખો ઝપકાવતી. ઊંચી છોકરી પહેલેથી જ પૂલની બહાર હતી, એના માતા-પિતા સામે હસતી. બે બીજી છોકરીઓ માયા ની પાછળ દિવાલને અડી રહી હતી. એ જીતી નહોતી. એ જીતવાની નજીક પણ નહોતી આવી.\n\nપછી કોચ ન્ગુ, ડેક પર ઊભા રહીને, દિવાલ પરની મોટી પીળી ઘડિયાળ તરફ ઈશારો કર્યો.\n\nમાયા એ જોયું.\n\nઘડિયાળ પરનો નંબર એનો પોતાનો સમય હતો. અને એ એના અત્યાર સુધીના સૌથી સારા સમય કરતાં લગભગ બે પૂરી સેકન્ડ ઝડપી હતો.\n\nએક લાંબી, વિચિત્ર ક્ષણ માટે, માયા ન ખુશ હતી ન દુખી. એ ફક્ત શાંત લાગતી. એ એ રીતે લાગતી જે રીતે પૂલ લાગતો જ્યારે એમાં કોઈ ન હોય. સરળ, સ્થિર, એનો.\n\nકોચ ન્ગુ લેનની રેખા પાસે ઝૂક્યા.\n\n\"તેં તારી રેસ તરી,\" એમણે ખૂબ ધીમેથી કહ્યું, જાણે એ એક રહસ્ય હોય જે ફક્ત એણે જ સાંભળવું જોઈએ. \"એ જ એક રેસ છે જે ખરેખર તારી રહી છે.\"\n\nમાયા એ વધુ એક લાંબી ક્ષણ માટે ઘડિયાળ જોઈ. પછી એણે આખરે પોતાની લેન જોઈ. ફરી શાંત, ફરી વાદળી, બરાબર એટલી જ પહોળી અને એટલી જ લાંબી જેટલી તે હંમેશા રહી હતી.\n\nઅને એ હસી. એ નાની, સાવધાન મુસ્કાનથી જે કોઈએ ત્યારે શીખી હોય જ્યારે એણે હમણાં જ જીતવાનો એક માત્ર એવો પ્રકાર શીખ્યો હોય જે ટકે.\n\nવિચારવા જેવી વાત: જ્યારે તમે બીજાની લેન જુઓ છો, ત્યારે તમે તમારી લેનમાં તરવાનું બંધ કરી દો છો. તમારી પોતાની જિંદગીમાં અત્યારે એવું શું છે જ્યાં તમે વધુ સારી રીતે તરી રહ્યા છો જ્યારે તમે એ નથી જોઈ રહ્યા કે બીજું કોઈ શું કરી રહ્યું છે?"],
      es: ["Maya era nadadora. La piscina tenía seis carriles.\n\nEn su carril, el agua estaba tranquila. Pateaba. Respiraba. Pateaba.\n\nEn el carril de al lado, una niña nadaba más rápido.\n\nMaya miró. Maya dejó de patear.\n\n\"Mira tu propio carril,\" dijo su entrenadora.\n\nMaya intentó otra vez. Pateó. Respiró. Pero echó un vistazo.\n\nLa otra niña iba muy adelante.\n\nMaya se detuvo. Salpicó. Le entró agua por la nariz.\n\n\"Mira tu propio carril,\" dijo su entrenadora de nuevo. \"El tuyo es el único en el que nadas.\"\n\nLlegó la gran carrera. Seis niñas. Seis carriles.\n\nMaya metió la cara en el agua. No miró a la izquierda. No miró a la derecha.\n\nPateó. Respiró. Pateó.\n\nSu mano tocó la pared.\n\nMaya levantó la vista. Su entrenadora estaba sonriendo.\n\n\"¿En qué lugar quedé?\" preguntó Maya.\n\n\"Quinta,\" dijo su entrenadora. \"Ahora mira el reloj.\"\n\nEl número en el reloj era el tiempo más rápido de Maya. Jamás.\n\n\"Nadaste tu carrera,\" dijo su entrenadora. \"Esa es la única que es tuya.\"\n\nMaya sonrió. El agua estaba tranquila otra vez.", "Maya había estado nadando desde que podía recordar. La piscina era el lugar donde más se sentía ella misma. Larga, azul y silenciosa, con seis carriles ordenados pintados en el fondo.\n\nEl problema era el carril de al lado.\n\nEn el carril de al lado, casi siempre había alguien rápido. Maya podía verlos por el rabillo de sus gafas. Una estela de brazos, una agitación de pies, adelantándose, siempre adelantándose. Y cada vez que Maya lo veía, algo dentro de ella se tensaba.\n\nReducía la velocidad. Levantaba la cabeza para comprobar. Perdía su ritmo.\n\n\"Maya,\" dijo su entrenador, que se llamaba Coach Ngu, \"¿qué estás haciendo?\"\n\n\"Estoy mirando el otro carril,\" dijo Maya.\n\n\"¿Por qué?\"\n\n\"Para ver si voy ganando.\"\n\nCoach Ngu negó con la cabeza lentamente. \"No puedes ganar en el carril de otra persona,\" dijo. \"Solo puedes nadar en el tuyo. Mira el tuyo.\"\n\nMaya lo intentó. De verdad lo intentó. Metía la cara en el agua y se decía a sí misma, mi carril, mi carril, mi carril. Pero en el momento en que escuchaba el chapoteo de pies rápidos a su izquierda, sus ojos se deslizaban hacia allá por sí solos. Y en el momento en que sus ojos se deslizaban hacia allá, sus brazos olvidaban lo que estaban haciendo.\n\nLa gran competencia llegó a fin de mes. Seis carriles. Seis niñas. Y en el carril al lado de Maya: la nadadora más rápida que Maya había visto jamás.\n\nMaya estaba parada en el bloque, temblando un poco. Coach Ngu se acercó por detrás.\n\n\"Maya,\" dijo. \"No te voy a pedir que ganes. Te voy a pedir que nades tu carrera. ¿Entiendes la diferencia?\"\n\nMaya asintió, aunque no estaba segura de entender.\n\nSonó el silbato. Maya se zambulló.\n\nEn el agua, el mundo se quedó en silencio. Maya pateó. Respiró. Pateó. Hubo un chapoteo a su izquierda, pero no giró la cabeza. Hubo un ruido de la multitud, pero estaba muy lejos.\n\nMi carril, mi carril, mi carril.\n\nSu mano golpeó la pared.\n\nMaya se quitó las gafas. La nadadora más rápida ya estaba fuera de la piscina, sonriendo a sus padres. Otras dos niñas estaban tocando la pared detrás de Maya. No había ganado.\n\nEntonces Coach Ngu señaló el reloj grande.\n\nMaya miró. El número en el reloj era su tiempo más rápido jamás. Por casi dos segundos.\n\n\"Nadaste tu carrera,\" dijo Coach Ngu, muy bajito. \"Esa es la única carrera que ha sido tuya.\"\n\nMaya miró el reloj por un largo momento.\n\nLuego miró su propio carril. Tranquilo otra vez, azul otra vez, suyo.\n\nY sonrió.", "Maya había sido nadadora desde que podía recordar, lo cual, cuando tienes nueve años, se siente como una eternidad. La piscina era el lugar donde más se sentía ella misma. Era larga, y azul, y en su mayor parte silenciosa, y tenía seis carriles perfectos pintados en el fondo como un mapa para sus brazos.\n\nEl problema, y había un problema, era siempre el carril de al lado.\n\nEn el carril de al lado, casi siempre había alguien rápido. Maya podía verlos por el rabillo de sus gafas. Una estela de brazos pálidos, una agitación de pies pateando, un cuerpo cortando el agua como un pequeño y decidido torpedo. Siempre, siempre, se adelantaban. Y cada vez que Maya lo veía, algo dentro de su pecho se tensaba y su estómago olvidaba lo que estaba haciendo.\n\nReducía la velocidad. Levantaba la cabeza para comprobar. Respiraba fuera de ritmo y le entraba un pequeño sorbo de agua de la piscina por la nariz, que era la peor sensación del mundo.\n\n\"Maya,\" dijo su entrenador, que se llamaba Coach Ngu y que había sido nadador él mismo hace mucho tiempo, \"¿qué estás haciendo?\"\n\n\"Estoy mirando el otro carril,\" dijo Maya.\n\n\"¿Por qué?\"\n\n\"Para ver si voy ganando.\"\n\nCoach Ngu negó con la cabeza, lentamente, de la forma en que lo hacía cuando había explicado algo muchas veces y estaba a punto de explicarlo otra vez. No impaciente, solo un poco cansado.\n\n\"Maya,\" dijo. \"No puedes ganar en el carril de otra persona. Solo puedes nadar en el tuyo. El tuyo es el único que tienes. Mira el tuyo.\"\n\nMaya lo intentó. De verdad, de verdad lo intentó. Metía la cara en el agua fría y azul, daba su primera brazada, y se decía a sí misma, muy firmemente, mi carril, mi carril, mi carril. A veces lograba casi un largo entero antes de que sus ojos la traicionaran. En el momento en que un chapoteo sonaba demasiado cerca a su izquierda, sus gafas se deslizaban de lado por sí solas. Y en el momento en que sus gafas se deslizaban de lado, sus brazos se ponían tontos y sus patadas se convertían en aleteos. Y la nadadora del carril de al lado se adelantaba más, y Maya se hacía más lenta, y todo el asunto salía exactamente como Coach Ngu había dicho que saldría.\n\nLa gran competencia llegó a fin de mes. Todo el equipo recibió gorras nuevas y brillantes. Los padres trajeron sillas plegables y rodajas de naranja. El borde de la piscina olía a cloro y a hormigón caliente, y de alguna manera, un poquito a los nervios de Maya.\n\nHabía seis carriles, y seis niñas. En el carril justo al lado de Maya estaba la nadadora más rápida que Maya había visto jamás. Una niña alta de otro club cuyas brazadas eran tan limpias que apenas salpicaban.\n\nMaya estaba parada en su bloque, temblando, solo un poco. Coach Ngu se acercó por detrás y puso una mano en su hombro.\n\n\"Maya,\" dijo, con su voz tranquila habitual, \"no te voy a pedir que ganes hoy. Te voy a pedir que nades tu carrera. ¿Entiendes la diferencia?\"\n\nMaya asintió, aunque aún no estaba segura de entender.\n\n\"Tu carrera,\" dijo Coach Ngu, \"es la que está en tu carril. Si la nadas bien, el resto se arregla solo. Si la nadas mal, incluso ganar no se sentirá como ganar. ¿Me escuchas?\"\n\nMaya asintió de nuevo.\n\nSonó el silbato. Maya se zambulló.\n\nEn el agua, el mundo se quedó en silencio, como siempre lo hacía. La piscina era azul y su carril era suyo. Maya pateó. Respiró. Pateó. Hubo un chapoteo a su izquierda, muy cerca. La niña alta, por supuesto, adelantándose. Pero Maya no, esta vez, levantó la cabeza para comprobar. No, esta vez, dejó que sus ojos se deslizaran. Había un ruido de gritos desde algún lugar muy por encima de la superficie del agua, pero era un ruido muy lejano, y Maya estaba ocupada.\n\nMi carril, pensaba, en cada respiración. Mi carril. Mi carril. Mi carril.\n\nSu mano golpeó la pared.\n\nMaya se quitó las gafas y miró a su alrededor, parpadeando. La niña alta ya estaba fuera de la piscina, sonriendo a sus padres. Otras dos niñas estaban tocando la pared detrás de Maya. No había ganado. Ni siquiera había estado cerca de ganar.\n\nEntonces Coach Ngu, parado en el borde, señaló el gran reloj amarillo en la pared.\n\nMaya miró.\n\nEl número en el reloj era su propio tiempo. Y era casi dos segundos enteros más rápido que su mejor tiempo de toda la vida.\n\nPor un largo y extraño momento, Maya no se sintió ni feliz ni triste. Solo se sintió tranquila. Se sintió como se sentía la piscina cuando no había nadie en ella. Lisa, asentada, suya.\n\nCoach Ngu se agachó junto a la línea del carril.\n\n\"Nadaste tu carrera,\" dijo, muy suavemente, como si fuera un secreto que solo ella debía escuchar. \"Esa es la única carrera que ha sido tuya.\"\n\nMaya miró el reloj por un largo momento más. Luego, finalmente, miró su propio carril. Tranquilo otra vez, azul otra vez, exactamente tan ancho y exactamente tan largo como siempre había sido.\n\nY sonrió. Con la pequeña y cuidadosa sonrisa de alguien que acaba de aprender el único tipo de victoria que dura.\n\nAlgo para pensar: cuando miras el carril de otra persona, dejas de nadar el tuyo. ¿Qué hay en tu propia vida ahora mismo en lo que estás nadando mejor cuando no estás revisando lo que está haciendo alguien más?"],
      fr: ["Maya était nageuse. La piscine avait six couloirs.\n\nDans son couloir, l'eau était calme. Elle battait des jambes. Elle respirait. Elle battait des jambes.\n\nDans le couloir d'à côté, une fille nageait plus vite.\n\nMaya a regardé. Maya a arrêté de battre des jambes.\n\n\"Regarde ton propre couloir,\" a dit son entraîneuse.\n\nMaya a réessayé. Elle a battu des jambes. Elle a respiré. Mais elle a jeté un œil.\n\nL'autre fille était loin devant.\n\nMaya s'est arrêtée. Elle a éclaboussé. De l'eau lui est entrée dans le nez.\n\n\"Regarde ton propre couloir,\" a redit son entraîneuse. \"Le tien est le seul dans lequel tu nages.\"\n\nLa grande course est arrivée. Six filles. Six couloirs.\n\nMaya a mis son visage dans l'eau. Elle n'a pas regardé à gauche. Elle n'a pas regardé à droite.\n\nElle a battu des jambes. Elle a respiré. Elle a battu des jambes.\n\nSa main a touché le mur.\n\nMaya a levé les yeux. Son entraîneuse souriait.\n\n\"Où suis-je arrivée?\" a demandé Maya.\n\n\"Cinquième,\" a dit son entraîneuse. \"Maintenant regarde l'horloge.\"\n\nLe nombre sur l'horloge était le temps le plus rapide de Maya. De tous les temps.\n\n\"Tu as nagé ta course,\" a dit son entraîneuse. \"C'est la seule qui est à toi.\"\n\nMaya a souri. L'eau était calme à nouveau.", "Maya nageait depuis aussi longtemps qu'elle pouvait s'en souvenir. La piscine était l'endroit où elle se sentait le plus elle-même. Longue, bleue et silencieuse, avec six couloirs bien rangés peints au fond.\n\nLe problème, c'était le couloir d'à côté.\n\nDans le couloir d'à côté, il y avait presque toujours quelqu'un de rapide. Maya pouvait les voir du coin de ses lunettes. Une traînée de bras, une agitation de pieds, prenant de l'avance, prenant toujours de l'avance. Et chaque fois que Maya voyait cela, quelque chose en elle se tendait.\n\nElle ralentissait. Elle levait la tête pour vérifier. Elle perdait son rythme.\n\n\"Maya,\" a dit son entraîneur, qui s'appelait Coach Ngu, \"qu'est-ce que tu fais?\"\n\n\"Je regarde l'autre couloir,\" a dit Maya.\n\n\"Pourquoi?\"\n\n\"Pour voir si je gagne.\"\n\nCoach Ngu a secoué la tête lentement. \"Tu ne peux pas gagner dans le couloir de quelqu'un d'autre,\" a-t-il dit. \"Tu ne peux nager que dans le tien. Regarde le tien.\"\n\nMaya a essayé. Elle a vraiment essayé. Elle mettait son visage dans l'eau et se disait, mon couloir, mon couloir, mon couloir. Mais au moment où elle entendait les éclaboussures de pieds rapides à sa gauche, ses yeux glissaient dans cette direction tout seuls. Et au moment où ses yeux glissaient dans cette direction, ses bras oubliaient ce qu'ils faisaient.\n\nLa grande compétition est arrivée à la fin du mois. Six couloirs. Six filles. Et dans le couloir à côté de Maya: la nageuse la plus rapide que Maya ait jamais vue.\n\nMaya était debout sur le plot, tremblant un peu. Coach Ngu s'est approché par derrière.\n\n\"Maya,\" a-t-il dit. \"Je ne vais pas te demander de gagner. Je vais te demander de nager ta course. Tu comprends la différence?\"\n\nMaya a hoché la tête, même si elle n'était pas sûre de comprendre.\n\nLe sifflet a retenti. Maya a plongé.\n\nDans l'eau, le monde est devenu silencieux. Maya a battu des jambes. Elle a respiré. Elle a battu des jambes. Il y avait une éclaboussure à sa gauche, mais elle n'a pas tourné la tête. Il y avait un bruit de la foule, mais c'était très loin.\n\nMon couloir, mon couloir, mon couloir.\n\nSa main a frappé le mur.\n\nMaya a enlevé ses lunettes. La nageuse la plus rapide était déjà sortie de la piscine, souriant à ses parents. Deux autres filles touchaient le mur derrière Maya. Elle n'avait pas gagné.\n\nPuis Coach Ngu a pointé la grande horloge.\n\nMaya a regardé. Le nombre sur l'horloge était son temps le plus rapide jamais réalisé. De presque deux secondes.\n\n\"Tu as nagé ta course,\" a dit Coach Ngu, très doucement. \"C'est la seule course qui ait jamais été à toi.\"\n\nMaya a regardé l'horloge pendant un long moment.\n\nPuis elle a regardé son propre couloir. Calme à nouveau, bleu à nouveau, à elle.\n\nEt elle a souri.", "Maya était nageuse depuis aussi longtemps qu'elle pouvait s'en souvenir, ce qui, quand on a neuf ans, semble être une éternité. La piscine était l'endroit où elle se sentait le plus elle-même. Elle était longue, et bleue, et la plupart du temps silencieuse, et elle avait six couloirs parfaits peints au fond comme une carte pour ses bras.\n\nLe problème, et il y avait un problème, c'était toujours le couloir d'à côté.\n\nDans le couloir d'à côté, il y avait presque toujours quelqu'un de rapide. Maya pouvait les voir du coin de ses lunettes. Une traînée de bras pâles, une agitation de pieds qui battaient, un corps coupant l'eau comme une petite torpille déterminée. Ils prenaient toujours, toujours, de l'avance. Et chaque fois que Maya voyait cela, quelque chose dans sa poitrine se tendait et son ventre oubliait ce qu'il faisait.\n\nElle ralentissait. Elle levait la tête pour vérifier. Elle respirait hors rythme et une petite gorgée d'eau de piscine entrait dans son nez, ce qui était la pire sensation au monde.\n\n\"Maya,\" a dit son entraîneur, qui s'appelait Coach Ngu et qui avait lui-même été nageur il y a très longtemps, \"qu'est-ce que tu fais?\"\n\n\"Je regarde l'autre couloir,\" a dit Maya.\n\n\"Pourquoi?\"\n\n\"Pour voir si je gagne.\"\n\nCoach Ngu a secoué la tête, lentement, comme il le faisait quand il avait expliqué quelque chose plusieurs fois et qu'il allait l'expliquer à nouveau. Pas impatient, juste un peu fatigué.\n\n\"Maya,\" a-t-il dit. \"Tu ne peux pas gagner dans le couloir de quelqu'un d'autre. Tu ne peux nager que dans le tien. Le tien est le seul que tu as. Regarde le tien.\"\n\nMaya a essayé. Elle a vraiment, vraiment essayé. Elle mettait son visage dans l'eau fraîche et bleue, donnait sa première brasse, et se disait, très fermement, mon couloir, mon couloir, mon couloir. Parfois elle faisait presque une longueur entière avant que ses yeux ne la trahissent. Au moment où une éclaboussure résonnait trop près à sa gauche, ses lunettes glissaient sur le côté toutes seules. Et au moment où ses lunettes glissaient sur le côté, ses bras devenaient stupides et ses battements de jambes se transformaient en battements faibles. Et la nageuse du couloir d'à côté prenait plus d'avance, et Maya devenait plus lente, et tout se passait exactement comme Coach Ngu avait dit que cela se passerait.\n\nLa grande compétition est arrivée à la fin du mois. Toute l'équipe a reçu de nouveaux bonnets brillants. Les parents ont apporté des chaises pliantes et des tranches d'orange. Le bord de la piscine sentait le chlore et le béton chaud, et d'une certaine manière, juste un peu les nerfs de Maya.\n\nIl y avait six couloirs, et six filles. Dans le couloir juste à côté de Maya se trouvait la nageuse la plus rapide que Maya ait jamais vue. Une grande fille d'un autre club dont les brasses étaient si propres qu'elles éclaboussaient à peine.\n\nMaya était debout sur son plot, tremblant juste un peu. Coach Ngu s'est approché par derrière et a posé une main sur son épaule.\n\n\"Maya,\" a-t-il dit, de sa voix calme habituelle, \"je ne vais pas te demander de gagner aujourd'hui. Je vais te demander de nager ta course. Tu comprends la différence?\"\n\nMaya a hoché la tête, même si elle n'était pas encore sûre de comprendre.\n\n\"Ta course,\" a dit Coach Ngu, \"c'est celle qui est dans ton couloir. Si tu la nages bien, le reste se règle tout seul. Si tu la nages mal, même gagner ne ressemblera pas à gagner. Tu m'entends?\"\n\nMaya a hoché la tête à nouveau.\n\nLe sifflet a retenti. Maya a plongé.\n\nDans l'eau, le monde est devenu silencieux, comme toujours. La piscine était bleue et son couloir était à elle. Maya a battu des jambes. Elle a respiré. Elle a battu des jambes. Il y avait une éclaboussure à sa gauche, très près. La grande fille, bien sûr, prenant de l'avance. Mais cette fois, Maya n'a pas levé la tête pour vérifier. Cette fois, elle n'a pas laissé ses yeux glisser. Il y avait un bruit de cris quelque part bien au-dessus de la surface de l'eau, mais c'était un bruit très lointain, et Maya était occupée.\n\nMon couloir, pensait-elle, à chaque respiration. Mon couloir. Mon couloir. Mon couloir.\n\nSa main a frappé le mur.\n\nMaya a enlevé ses lunettes et a regardé autour d'elle, clignant des yeux. La grande fille était déjà sortie de la piscine, souriant à ses parents. Deux autres filles touchaient le mur derrière Maya. Elle n'avait pas gagné. Elle n'avait même pas été près de gagner.\n\nPuis Coach Ngu, debout sur le bord, a pointé la grande horloge jaune sur le mur.\n\nMaya a regardé.\n\nLe nombre sur l'horloge était son propre temps. Et il était presque deux secondes entières plus rapide que son meilleur temps de toute sa vie.\n\nPendant un long et étrange moment, Maya ne s'est sentie ni heureuse ni triste. Elle s'est juste sentie calme. Elle se sentait comme la piscine se sentait quand personne n'y était. Lisse, posée, à elle.\n\nCoach Ngu s'est accroupi près de la ligne du couloir.\n\n\"Tu as nagé ta course,\" a-t-il dit, très doucement, comme si c'était un secret que seule elle devait entendre. \"C'est la seule course qui ait jamais été à toi.\"\n\nMaya a regardé l'horloge encore un long moment. Puis elle a enfin regardé son propre couloir. Calme à nouveau, bleu à nouveau, exactement aussi large et exactement aussi long qu'il l'avait toujours été.\n\nEt elle a souri. Avec le petit sourire prudent de quelqu'un qui vient d'apprendre le seul type de victoire qui dure.\n\nQuelque chose à méditer: quand tu regardes le couloir de quelqu'un d'autre, tu arrêtes de nager le tien. Qu'y a-t-il dans ta propre vie en ce moment où tu nages mieux quand tu ne vérifies pas ce que quelqu'un d'autre fait?"]

    levels: {
      en: ["Franklin loved the ocean.\n\nWhen Franklin was a boy, he sailed every summer. He swam in cold water. He climbed rocks. His legs were strong.\n\n\"You are made of wind and water,\" his mother said.\n\nFranklin grew up. He worked hard. He went into politics. He wanted to help people.\n\nThen one summer, when Franklin was a man, he got very sick.\n\nThe sickness made his legs stop working.\n\nThe doctor said, \"You will not walk again.\"\n\nFranklin was very quiet for a long time.\n\nThen he said, \"That is one thing. There are many other things.\"\n\nFranklin learned to use a chair. He learned to lift his body with his arms. He learned to lead a meeting from his chair the same way he used to lead it standing up.\n\nThe people of his country were scared. There were hard, hard years.\n\nFranklin became their president. He helped them when they were the most afraid.\n\nHe never walked again.\n\nBut every day, he showed up.\n\nAnd showing up, it turned out, was the bravest thing of all.", "Franklin loved the ocean.\n\nWhen Franklin was a small boy, he spent every summer at a place called Campobello, which was a green island off the coast of a cold, blue sea. He learned to sail before he learned to write properly. He swam in water so cold his fingers turned white. He climbed the wet rocks barefoot. His legs were strong and quick.\n\n\"You are made of wind and water,\" his mother told him.\n\nFranklin believed her.\n\nHe grew up. He went to school. He married a thoughtful woman named Eleanor, who would change his life in ways even she did not yet know. He went into politics, because he wanted to help people, and politics, he thought, was a place where you could.\n\nAnd then one summer — Franklin was a grown man by now — he came home to Campobello, dove into the same cold water he had swum in his whole life, and afterwards, lying in bed, he could not feel his legs.\n\nThe sickness was called polio.\n\nThe doctors came. They tried everything they knew. After many weeks, one of them said the words Franklin already suspected: \"You will not walk again.\"\n\nFranklin was very quiet for a long time. Eleanor sat beside him. The sea sounded the way it had always sounded — far away, calm, patient — outside the window.\n\nFinally, Franklin spoke.\n\n\"That,\" he said, \"is one thing. There are many other things.\"\n\nFor years afterwards, he worked. He worked to get stronger in the parts of his body that still listened to him — his shoulders, his arms, his chest. He swam in warm pools to keep what little movement remained in his legs. He learned to use a wheelchair as if it were a tool, not a punishment. He learned how to lift himself, with his arms alone, into a car or onto a stage. He learned to lead a meeting from his chair the same way he used to lead one standing up — by being the calmest person in the room.\n\nMore years passed. His country got into terrible trouble — a great economic storm, and then a great war. People were scared. People were hungry. People were not sure things would ever be all right again.\n\nFranklin ran for president, and he won. And he sat in his chair, in his big office, and he spoke to his country on the radio, in a quiet, steady voice, the way you might speak to a friend across a kitchen table. He told them, gently and firmly, that they were not alone. He told them that they were going to be all right.\n\nFranklin never walked again.\n\nBut every single day, he showed up.\n\nAnd showing up, it turned out, was the bravest thing of all.", "Franklin Delano Roosevelt loved the ocean more than almost anything else in the world.\n\nWhen Franklin was a small boy, his family spent every summer at a place called Campobello — a quiet green island just off the coast of New Brunswick, in Canada, where the water was so cold it made your bones hum and the sky was so big it made you feel small in a wonderful way. Franklin learned to sail before he learned to write a proper letter. He swam in water that turned his fingers white. He climbed the wet, dark rocks barefoot. He could row a heavy wooden boat by himself when other boys his age could barely lift the oars.\n\n\"You are made of wind and water, Franklin,\" his mother told him once, watching him pull a sail tight against the wind.\n\nFranklin believed her, because it felt true. His legs were strong and quick. His arms were stronger. His chest was full of cold, salty air.\n\nHe grew up. He went to school, and then to law school. He married a thoughtful, serious woman named Eleanor, who would later turn out to be one of the great people in his life — perhaps the *most* important — though neither of them quite knew it yet. He went into politics, because he believed politics was a place where you could actually help people, and not just say you wanted to.\n\nAnd then, one summer — Franklin was a grown man of thirty-nine by now, with five children of his own — he came back to Campobello. He swam in the same cold water he had swum in his whole life. He chased a small fire on the shore with his children, laughing. He came inside that evening tired, but a normal kind of tired. He went to bed.\n\nWhen he woke up the next morning, his legs did not work.\n\nThe sickness, the doctors eventually said, was polio.\n\nIt was a hard, frightening summer. Eleanor stayed at his side. Doctors came and went. They tried hot baths, and cold baths, and exercises, and braces. Everyone hoped, very quietly, for a different ending than the one they could feel coming. After many long weeks, one of the doctors finally said the words Franklin had already begun to suspect.\n\n\"Mr. Roosevelt,\" the doctor said, in the gentle voice doctors use when they have something hard to deliver, \"you will not walk again.\"\n\nFranklin was quiet for a very long time. Eleanor was quiet beside him. Outside the window, the sea sounded the way the sea had always sounded — far away, and calm, and patient.\n\nAt last, Franklin spoke.\n\n\"That,\" he said, slowly, \"is *one* thing. There are many other things.\"\n\nWhat happened next did not happen quickly. It took years.\n\nHe worked. He worked harder than he had ever worked in his life — not at running or jumping, which were closed to him now, but at the parts of his body that still answered when he called. His shoulders. His arms. His chest. He learned to lift his own weight with nothing but his arms. He swam in warm pools, because warm pools were one of the few places his legs could remember what moving felt like. He bought a piece of land in Warm Springs, Georgia, where the water was warm year-round, and he turned it into a place where other children with polio could come and swim too.\n\nHe learned to use a wheelchair as if it were a tool, not a punishment. He learned how to lift himself, with his arms alone, in and out of a car. He learned to stand for a few moments at a time on heavy metal braces, holding tight to a podium, smiling out at a crowd, and very few of them ever guessed what it was costing him.\n\nMost importantly — and this is the part Franklin himself did not understand for a long time — he learned to lead a room from a chair the same way he used to lead a room standing up. He did it by being the calmest person in it.\n\nAnd then his country needed him.\n\nThere was a great economic storm — a *Depression*, the newspapers called it. Banks closed. Farms emptied. People who had worked their whole lives could not buy bread. Then, just as the storm was lifting, a great war came across the ocean from Europe, and Franklin's country had to decide whether to stand up for the rest of the world. People were frightened. People were exhausted. People were not sure, anymore, that things could be all right.\n\nFranklin ran for president, and he won — not once, but four times in a row, the only person in his country's history to do that. He sat in his chair, in his big office in Washington, and he spoke to his country on the radio, in a calm, steady voice that sounded as if he were sitting at the kitchen table with you. He called these radio talks his \"Fireside Chats.\" He told the country, gently and firmly, that they were not alone. He told them that fear itself was the only thing they really needed to be afraid of. He told them, in a hundred different ways, that they were going to be all right.\n\nFranklin Delano Roosevelt never walked again.\n\nBut every single day — through depression, and war, and exhaustion that would have broken a quieter man — he *showed up.*\n\nAnd showing up, it turned out, was the bravest thing of all.\n\n*Something to think about: Franklin lost the thing he loved most — being strong in his body — and learned a different kind of strength to put in its place. What's something hard in your own life that might be teaching you a strength you don't have words for yet?*"],
      hi: ["फ़्रैंकलिन को समुद्र बहुत पसंद था।\n\nजब फ़्रैंकलिन एक लड़का था, वह हर गर्मियों में नौकायन करता था। वह ठंडे पानी में तैरता था। वह चट्टानों पर चढ़ता था। उसके पैर मज़बूत थे।\n\n\"तुम हवा और पानी से बने हो,\" उसकी माँ ने कहा।\n\nफ़्रैंकलिन बड़ा हुआ। उसने कड़ी मेहनत की। वह राजनीति में गया। वह लोगों की मदद करना चाहता था।\n\nफिर एक गर्मी में, जब फ़्रैंकलिन एक आदमी था, वह बहुत बीमार पड़ गया।\n\nबीमारी ने उसके पैरों को काम करना बंद करा दिया।\n\nडॉक्टर ने कहा, \"तुम फिर कभी नहीं चलोगे।\"\n\nफ़्रैंकलिन एक लंबे समय के लिए बहुत शांत रहा।\n\nफिर उसने कहा, \"यह एक बात है। और भी कई बातें हैं।\"\n\nफ़्रैंकलिन ने कुर्सी का उपयोग करना सीखा। उसने अपने हाथों से अपना शरीर उठाना सीखा। उसने अपनी कुर्सी से एक मीटिंग चलाना सीखा उसी तरह जैसे वह खड़े होकर चलाता था।\n\nउसके देश के लोग डरे हुए थे। बहुत कठिन साल थे।\n\nफ़्रैंकलिन उनका राष्ट्रपति बना। उसने उनकी मदद की जब वे सबसे ज़्यादा डरे हुए थे।\n\nवह फिर कभी नहीं चला।\n\nलेकिन हर दिन, वह हाज़िर हुआ।\n\nऔर हाज़िर होना, यह पता चला, सबसे बहादुर काम था।", "फ़्रैंकलिन को समुद्र बहुत पसंद था।\n\nजब फ़्रैंकलिन एक छोटा लड़का था, वह हर गर्मी कैम्पोबेलो नामक जगह पर बिताता था, जो एक ठंडे, नीले समुद्र के तट से दूर एक हरा द्वीप था। उसने ठीक से लिखना सीखने से पहले नौकायन सीख लिया था। वह इतने ठंडे पानी में तैरा कि उसकी उँगलियाँ सफ़ेद हो जातीं। वह नंगे पैर गीली चट्टानों पर चढ़ता। उसके पैर मज़बूत और तेज़ थे।\n\n\"तुम हवा और पानी से बने हो,\" उसकी माँ ने उसे बताया।\n\nफ़्रैंकलिन ने उस पर विश्वास किया।\n\nवह बड़ा हुआ। वह स्कूल गया। उसने एलेनॉर नामक एक विचारशील महिला से शादी की, जो उसकी ज़िंदगी को उन तरीकों से बदलने वाली थी जिनके बारे में वह खुद अभी तक नहीं जानती थी। वह राजनीति में गया, क्योंकि वह लोगों की मदद करना चाहता था, और राजनीति, उसने सोचा, ऐसी जगह थी जहाँ आप कर सकते हैं।\n\nऔर फिर एक गर्मी में, अब तक फ़्रैंकलिन एक बड़ा आदमी था, वह कैम्पोबेलो घर आया, उसी ठंडे पानी में डुबकी लगाई जिसमें वह सारी ज़िंदगी तैरता रहा था, और बाद में, बिस्तर पर लेटे हुए, उसे अपने पैरों का एहसास नहीं हो रहा था।\n\nबीमारी का नाम पोलियो था।\n\nडॉक्टर आए। उन्होंने वह सब करने की कोशिश की जो वे जानते थे। कई हफ्तों के बाद, उनमें से एक ने वे शब्द कहे जिनका फ़्रैंकलिन को पहले से ही संदेह था: \"तुम फिर कभी नहीं चलोगे।\"\n\nफ़्रैंकलिन एक लंबे समय के लिए बहुत शांत रहा। एलेनॉर उसके पास बैठी थी। समुद्र वैसा ही सुनाई दे रहा था जैसा हमेशा सुनाई देता था। दूर, शांत, धैर्यवान। खिड़की के बाहर।\n\nआखिरकार, फ़्रैंकलिन बोला।\n\n\"यह,\" उसने कहा, \"एक बात है। और भी कई बातें हैं।\"\n\nसालों तक उसके बाद, वह काम करता रहा। उसने अपने शरीर के उन हिस्सों को मज़बूत बनाने के लिए काम किया जो अभी भी उसकी सुनते थे। उसके कंधे, उसके हाथ, उसकी छाती। वह गर्म पूल में तैरता था ताकि उसके पैरों में जो थोड़ी सी हलचल बची थी वह बनी रहे। उसने व्हीलचेयर का उपयोग करना सीखा जैसे कि वह एक उपकरण हो, सज़ा नहीं। उसने सीखा कि कैसे केवल अपने हाथों से खुद को कार या मंच पर उठाना है। उसने अपनी कुर्सी से एक मीटिंग चलाना सीखा उसी तरह जैसे वह खड़े होकर चलाता था। कमरे में सबसे शांत व्यक्ति बनकर।\n\nऔर साल बीते। उसके देश को भयानक मुसीबत आ गई। एक बड़ा आर्थिक तूफ़ान, और फिर एक बड़ा युद्ध। लोग डरे हुए थे। लोग भूखे थे। लोगों को यकीन नहीं था कि चीज़ें फिर कभी ठीक होंगी।\n\nफ़्रैंकलिन राष्ट्रपति के लिए चुनाव लड़ा, और जीता। और वह अपनी बड़ी ऑफ़िस में अपनी कुर्सी पर बैठा, और उसने रेडियो पर अपने देश से बात की, एक शांत, स्थिर आवाज़ में, उसी तरह जैसे आप रसोई की मेज़ पर एक दोस्त से बात करते हैं। उसने उनसे कहा, धीरे और दृढ़ता से, कि वे अकेले नहीं थे। उसने उनसे कहा कि वे ठीक होने वाले हैं।\n\nफ़्रैंकलिन फिर कभी नहीं चला।\n\nलेकिन हर एक दिन, वह हाज़िर हुआ।\n\nऔर हाज़िर होना, यह पता चला, सबसे बहादुर काम था।", "फ़्रैंकलिन डेलानो रूज़वेल्ट को समुद्र दुनिया की लगभग किसी भी चीज़ से ज़्यादा पसंद था।\n\nजब फ़्रैंकलिन एक छोटा लड़का था, उसका परिवार हर गर्मी कैम्पोबेलो नामक जगह पर बिताता था। यह एक शांत, हरा द्वीप था जो न्यू ब्रंज़विक, कनाडा के तट से दूर था, जहाँ पानी इतना ठंडा था कि आपकी हड्डियाँ गूँजती थीं और आसमान इतना बड़ा था कि आप एक अद्भुत तरीके से छोटा महसूस करते थे। फ़्रैंकलिन ने एक ठीक से पत्र लिखना सीखने से पहले नौकायन सीख लिया था। वह उस पानी में तैरा जो उसकी उँगलियाँ सफ़ेद कर देता था। वह नंगे पैर गीली, काली चट्टानों पर चढ़ता था। वह एक भारी लकड़ी की नाव अकेले खींच सकता था जब उसकी उम्र के दूसरे लड़के मुश्किल से चप्पू उठा सकते थे।\n\n\"तुम हवा और पानी से बने हो, फ़्रैंकलिन,\" उसकी माँ ने उससे एक बार कहा, उसे हवा के विरुद्ध एक पाल खींचते हुए देखकर।\n\nफ़्रैंकलिन ने उस पर विश्वास किया, क्योंकि यह सच लगता था। उसके पैर मज़बूत और तेज़ थे। उसके हाथ और भी मज़बूत थे। उसकी छाती ठंडी, नमकीन हवा से भरी हुई थी।\n\nवह बड़ा हुआ। वह स्कूल गया, और फिर लॉ स्कूल। उसने एलेनॉर नामक एक विचारशील, गंभीर महिला से शादी की, जो बाद में उसकी ज़िंदगी के महान लोगों में से एक साबित होने वाली थी। शायद सबसे महत्वपूर्ण। हालाँकि उनमें से कोई भी अभी तक यह नहीं जानता था। वह राजनीति में गया, क्योंकि उसका मानना ​​था कि राजनीति एक ऐसी जगह है जहाँ आप वास्तव में लोगों की मदद कर सकते हैं, न कि सिर्फ़ कहें कि आप चाहते हैं।\n\nऔर फिर, एक गर्मी में, अब तक फ़्रैंकलिन उनतीस साल का एक बड़ा आदमी था, अपने पाँच बच्चों के साथ, वह कैम्पोबेलो वापस आया। वह उसी ठंडे पानी में तैरा जिसमें वह सारी ज़िंदगी तैरता रहा था। उसने अपने बच्चों के साथ किनारे पर एक छोटी सी आग का पीछा किया, हँसते हुए। वह उस शाम थका हुआ अंदर आया, लेकिन एक सामान्य प्रकार की थकान। वह बिस्तर पर गया।\n\nजब वह अगली सुबह उठा, उसके पैर काम नहीं कर रहे थे।\n\nबीमारी, डॉक्टरों ने अंततः कहा, पोलियो थी।\n\nयह एक कठिन, भयानक गर्मी थी। एलेनॉर उसके पास रही। डॉक्टर आते-जाते रहे। उन्होंने गर्म स्नान, और ठंडे स्नान, और व्यायाम, और ब्रेसेज़ आज़माए। हर कोई बहुत चुपचाप एक अलग अंत की उम्मीद कर रहा था जो वे आते हुए महसूस कर सकते थे। कई लंबे हफ्तों के बाद, एक डॉक्टर ने आखिरकार वे शब्द कहे जिन पर फ़्रैंकलिन को पहले से ही संदेह होने लगा था।\n\n\"श्री रूज़वेल्ट,\" डॉक्टर ने उस कोमल आवाज़ में कहा जिसका डॉक्टर तब उपयोग करते हैं जब उनके पास कुछ कठिन कहना होता है, \"तुम फिर कभी नहीं चलोगे।\"\n\nफ़्रैंकलिन बहुत लंबे समय तक चुप रहा। एलेनॉर उसके बगल में चुप थी। खिड़की के बाहर, समुद्र वैसा ही सुनाई दे रहा था जैसा समुद्र हमेशा सुनाई देता था। दूर, और शांत, और धैर्यवान।\n\nआखिरकार, फ़्रैंकलिन बोला।\n\n\"यह,\" उसने धीरे-धीरे कहा, \"एक बात है। और भी कई बातें हैं।\"\n\nइसके बाद जो हुआ वह जल्दी नहीं हुआ। इसमें सालों लगे।\n\nउसने काम किया। उसने अपनी ज़िंदगी में जितनी कभी मेहनत नहीं की थी उससे ज़्यादा मेहनत की। दौड़ने या कूदने पर नहीं, जो अब उसके लिए बंद थे, बल्कि अपने शरीर के उन हिस्सों पर जो अभी भी उसकी पुकार का जवाब देते थे। उसके कंधे। उसके हाथ। उसकी छाती। उसने अपने वज़न को केवल अपने हाथों से उठाना सीखा। वह गर्म पूल में तैरा, क्योंकि गर्म पूल उन कुछ जगहों में से एक थे जहाँ उसके पैर याद कर सकते थे कि हिलना कैसा लगता है। उसने वार्म स्प्रिंग्स, जॉर्जिया में ज़मीन का एक टुकड़ा खरीदा, जहाँ पानी सारा साल गर्म रहता था, और उसने इसे एक ऐसी जगह बना दी जहाँ पोलियो वाले दूसरे बच्चे भी आ सकते थे और तैर सकते थे।\n\nउसने व्हीलचेयर का उपयोग करना सीखा जैसे कि वह एक उपकरण हो, सज़ा नहीं। उसने सीखा कि कैसे केवल अपने हाथों से खुद को कार से अंदर और बाहर उठाना है। उसने भारी धातु के ब्रेसेज़ पर कुछ क्षणों के लिए खड़े होना सीखा, मंच को कसकर पकड़े हुए, भीड़ की ओर मुस्कुराते हुए, और उनमें से बहुत कम ने कभी अनुमान लगाया कि इसमें उसे क्या क़ीमत चुकानी पड़ रही थी।\n\nसबसे महत्वपूर्ण रूप से, और यह वह हिस्सा है जो फ़्रैंकलिन खुद लंबे समय तक नहीं समझ पाया, उसने एक कुर्सी से एक कमरे का नेतृत्व करना सीखा उसी तरह जैसे वह खड़े होकर एक कमरे का नेतृत्व करता था। उसने यह कमरे में सबसे शांत व्यक्ति होकर किया।\n\nऔर फिर उसके देश को उसकी ज़रूरत पड़ी।\n\nएक बड़ा आर्थिक तूफ़ान आया। अख़बारों ने इसे एक मंदी कहा। बैंक बंद हो गए। खेत खाली हो गए। जिन लोगों ने सारी ज़िंदगी काम किया था वे रोटी नहीं खरीद सकते थे। फिर, जैसे ही तूफ़ान उठ रहा था, यूरोप से समुद्र पार करके एक बड़ा युद्ध आया, और फ़्रैंकलिन के देश को यह तय करना पड़ा कि बाकी दुनिया के लिए खड़ा होना है या नहीं। लोग डरे हुए थे। लोग थक चुके थे। लोग अब निश्चित नहीं थे कि चीज़ें ठीक हो सकती हैं।\n\nफ़्रैंकलिन राष्ट्रपति के लिए चुनाव लड़ा, और जीता। एक बार नहीं, बल्कि लगातार चार बार। उसके देश के इतिहास में ऐसा करने वाला एकमात्र व्यक्ति। वह अपनी कुर्सी पर, वॉशिंगटन में अपनी बड़ी ऑफ़िस में बैठा, और उसने रेडियो पर अपने देश से बात की, एक शांत, स्थिर आवाज़ में जो ऐसी लगती थी जैसे वह आपके साथ रसोई की मेज़ पर बैठा हो। उसने इन रेडियो वार्ताओं को अपनी \"फ़ायरसाइड चैट्स\" कहा। उसने देश को धीरे और दृढ़ता से बताया कि वे अकेले नहीं थे। उसने उन्हें बताया कि डर खुद ही एकमात्र चीज़ थी जिससे उन्हें वास्तव में डरने की ज़रूरत थी। उसने उन्हें सौ अलग-अलग तरीकों से बताया कि वे ठीक होने वाले थे।\n\nफ़्रैंकलिन डेलानो रूज़वेल्ट फिर कभी नहीं चला।\n\nलेकिन हर एक दिन, मंदी, और युद्ध, और थकावट के माध्यम से जो एक शांत आदमी को तोड़ देती, वह हाज़िर हुआ।\n\nऔर हाज़िर होना, यह पता चला, सबसे बहादुर काम था।\n\nसोचने के लिए कुछ: फ़्रैंकलिन ने वह चीज़ खो दी जो उसे सबसे ज़्यादा पसंद थी। अपने शरीर में मज़बूत होना। और उसने उसकी जगह रखने के लिए एक अलग प्रकार की मज़बूती सीखी। आपकी अपनी ज़िंदगी में कुछ कठिन क्या है जो शायद आपको एक ऐसी मज़बूती सिखा रहा है जिसके लिए आपके पास अभी तक शब्द नहीं हैं?"],
      gu: ["ફ્રેન્કલિન ને દરિયો બહુ ગમતો.\n\nજ્યારે ફ્રેન્કલિન છોકરો હતો, એ દર ઉનાળામાં વહાણ ચલાવતો. એ ઠંડા પાણીમાં તરતો. એ ખડકો પર ચડતો. એના પગ મજબૂત હતા.\n\n\"તું પવન અને પાણીમાંથી બનેલો છે,\" એની માએ કહ્યું.\n\nફ્રેન્કલિન મોટો થયો. એણે મહેનત કરી. એ રાજકારણમાં ગયો. એ લોકોને મદદ કરવા માંગતો હતો.\n\nપછી એક ઉનાળે, જ્યારે ફ્રેન્કલિન માણસ હતો, એ ખૂબ બીમાર પડ્યો.\n\nબીમારીએ એના પગને કામ કરતા બંધ કરી દીધા.\n\nડૉક્ટરે કહ્યું, \"તું ફરી ક્યારેય ચાલી નહીં શકે.\"\n\nફ્રેન્કલિન લાંબા સમય માટે ખૂબ શાંત રહ્યો.\n\nપછી એણે કહ્યું, \"એ એક વાત છે. બીજી ઘણી વાતો છે.\"\n\nફ્રેન્કલિન એ ખુરશીનો ઉપયોગ કરવાનું શીખ્યો. એણે પોતાના હાથોથી પોતાનું શરીર ઉપાડવાનું શીખ્યું. એણે પોતાની ખુરશીમાંથી મીટિંગ ચલાવવાનું શીખ્યું એ જ રીતે જે રીતે એ ઊભા રહીને ચલાવતો.\n\nએના દેશના લોકો ડરી ગયા હતા. ખૂબ કઠિન વર્ષો હતા.\n\nફ્રેન્કલિન એમનો રાષ્ટ્રપ્રમુખ બન્યો. એણે એમને મદદ કરી જ્યારે તેઓ સૌથી વધુ ડરેલા હતા.\n\nએ ફરી ક્યારેય ચાલ્યો નહીં.\n\nપણ દરરોજ, એ હાજર થયો.\n\nઅને હાજર થવું, જાણવા મળ્યું કે એ સૌથી બહાદુર કામ હતું.", "ફ્રેન્કલિન ને દરિયો બહુ ગમતો.\n\nજ્યારે ફ્રેન્કલિન નાનો છોકરો હતો, એ દરેક ઉનાળો કેમ્પોબેલો નામની જગ્યાએ વિતાવતો, જે ઠંડા, વાદળી દરિયાના કિનારે એક લીલો ટાપુ હતો. એણે યોગ્ય રીતે લખવાનું શીખતા પહેલા વહાણ ચલાવવાનું શીખી લીધું હતું. એ એટલા ઠંડા પાણીમાં તરતો કે એની આંગળીઓ સફેદ થઈ જતી. એ ઉઘાડા પગે ભીના ખડકો પર ચડતો. એના પગ મજબૂત અને ઝડપી હતા.\n\n\"તું પવન અને પાણીમાંથી બનેલો છે,\" એની માએ એને કહ્યું.\n\nફ્રેન્કલિન એ માન્યું.\n\nએ મોટો થયો. એ સ્કૂલ ગયો. એણે ઇલીનોર નામની એક વિચારશીલ સ્ત્રી સાથે લગ્ન કર્યા, જે એની જિંદગીને એવી રીતે બદલવાની હતી જે એ પોતે હજુ સુધી નહોતી જાણતી. એ રાજકારણમાં ગયો, કારણ કે એ લોકોને મદદ કરવા માંગતો હતો, અને રાજકારણ, એણે વિચાર્યું, એવી જગ્યા હતી જ્યાં તમે મદદ કરી શકો.\n\nઅને પછી એક ઉનાળે, હવે ફ્રેન્કલિન મોટો માણસ હતો, એ કેમ્પોબેલો પાછો આવ્યો, એ જ ઠંડા પાણીમાં ડૂબકી લગાવી જેમાં એ આખી જિંદગી તરતો રહ્યો હતો, અને પછી, પથારીમાં સૂતા, એને એના પગનું ભાન નહોતું થતું.\n\nબીમારીનું નામ પોલિયો હતું.\n\nડૉક્ટરો આવ્યા. એમણે જે કંઈ જાણતા હતા તે બધું કરવાનો પ્રયત્ન કર્યો. ઘણા અઠવાડિયા પછી, એમાંથી એકે એ શબ્દો કહ્યા જેની ફ્રેન્કલિન ને પહેલેથી જ શંકા હતી: \"તું ફરી ક્યારેય ચાલી નહીં શકે.\"\n\nફ્રેન્કલિન લાંબા સમય માટે ખૂબ શાંત રહ્યો. ઇલીનોર એની બાજુમાં બેઠી હતી. દરિયો એ જ રીતે સંભળાતો જે રીતે હંમેશા સંભળાતો. દૂર, શાંત, ધીરજવાન. બારી બહાર.\n\nઆખરે, ફ્રેન્કલિન બોલ્યો.\n\n\"એ,\" એણે કહ્યું, \"એક વાત છે. બીજી ઘણી વાતો છે.\"\n\nવર્ષો સુધી પછી, એણે કામ કર્યું. એણે પોતાના શરીરના એ ભાગોને મજબૂત બનાવવા માટે કામ કર્યું જે હજુ પણ એને સાંભળતા હતા. એના ખભા, એના હાથ, એની છાતી. એ ગરમ પૂલમાં તરતો જેથી એના પગમાં જે થોડી હલચલ બાકી હતી તે જળવાઈ રહે. એણે વ્હીલચેરનો ઉપયોગ કરવાનું શીખ્યું જાણે કે એ સાધન હોય, સજા નહીં. એણે શીખ્યું કે કેવી રીતે માત્ર હાથોથી પોતાને કાર અથવા સ્ટેજ પર ઉપાડવો. એણે પોતાની ખુરશીમાંથી મીટિંગ ચલાવવાનું શીખ્યું એ જ રીતે જે રીતે એ ઊભા રહીને ચલાવતો. રૂમમાં સૌથી શાંત વ્યક્તિ બનીને.\n\nવધુ વર્ષો વીત્યા. એના દેશને ભયંકર મુશ્કેલી આવી. એક મોટું આર્થિક તોફાન, અને પછી એક મોટું યુદ્ધ. લોકો ડરી ગયા હતા. લોકો ભૂખ્યા હતા. લોકોને ખાતરી નહોતી કે વસ્તુઓ ક્યારેય ઠીક થશે.\n\nફ્રેન્કલિન રાષ્ટ્રપ્રમુખ માટે ચૂંટણી લડ્યો, અને જીત્યો. અને એ પોતાની ખુરશીમાં, પોતાની મોટી ઑફિસમાં બેઠો, અને એણે રેડિયો પર પોતાના દેશ સાથે વાત કરી, શાંત, સ્થિર અવાજે, એ રીતે જે રીતે તમે રસોડાના ટેબલ પર મિત્ર સાથે વાત કરો. એણે એમને ધીમેથી અને દૃઢતાથી કહ્યું કે તેઓ એકલા નહોતા. એણે એમને કહ્યું કે તેઓ ઠીક થવાના હતા.\n\nફ્રેન્કલિન ફરી ક્યારેય ચાલ્યો નહીં.\n\nપણ દરેક એક દિવસ, એ હાજર થયો.\n\nઅને હાજર થવું, જાણવા મળ્યું કે એ સૌથી બહાદુર કામ હતું.", "ફ્રેન્કલિન ડેલાનો રૂઝવેલ્ટ ને દુનિયામાં લગભગ બીજી કોઈપણ વસ્તુ કરતાં દરિયો વધારે ગમતો.\n\nજ્યારે ફ્રેન્કલિન નાનો છોકરો હતો, એનું કુટુંબ દરેક ઉનાળો કેમ્પોબેલો નામની જગ્યાએ વિતાવતું. એ ન્યૂ બ્રન્સવિક, કેનેડા ના કિનારે એક શાંત લીલો ટાપુ હતો, જ્યાં પાણી એટલું ઠંડું હતું કે તમારા હાડકા ગુંજતા અને આકાશ એટલું મોટું હતું કે તમે અદ્ભુત રીતે નાનું અનુભવતા. ફ્રેન્કલિન એ યોગ્ય પત્ર લખવાનું શીખતા પહેલા વહાણ ચલાવવાનું શીખી લીધું હતું. એ એવા પાણીમાં તરતો જે એની આંગળીઓ સફેદ કરી દેતું. એ ઉઘાડા પગે ભીના, અંધારા ખડકો પર ચડતો. એ એકલા ભારે લાકડાની હોડી ચલાવી શકતો જ્યારે એની ઉંમરના બીજા છોકરાઓ માંડ માંડ હલેસા ઉપાડી શકતા.\n\n\"તું પવન અને પાણીમાંથી બનેલો છે, ફ્રેન્કલિન,\" એની માએ એને એક વાર કહ્યું, એને પવન સામે સઢ ખેંચતા જોઈને.\n\nફ્રેન્કલિન એ માન્યું, કારણ કે એ સાચું લાગતું. એના પગ મજબૂત અને ઝડપી હતા. એના હાથ વધુ મજબૂત હતા. એની છાતી ઠંડી, ખારી હવાથી ભરેલી હતી.\n\nએ મોટો થયો. એ સ્કૂલ ગયો, અને પછી લૉ સ્કૂલ. એણે ઇલીનોર નામની એક વિચારશીલ, ગંભીર સ્ત્રી સાથે લગ્ન કર્યા, જે પાછળથી એની જિંદગીના મહાન લોકોમાંની એક સાબિત થવાની હતી. કદાચ સૌથી મહત્વપૂર્ણ. જોકે એમાંથી કોઈને હજુ સુધી તે ખબર નહોતી. એ રાજકારણમાં ગયો, કારણ કે એ માનતો હતો કે રાજકારણ એવી જગ્યા છે જ્યાં તમે ખરેખર લોકોને મદદ કરી શકો, માત્ર કહો કે તમે માંગો છો એમ નહીં.\n\nઅને પછી, એક ઉનાળે, હવે ફ્રેન્કલિન ઓગણચાલીસ વર્ષનો મોટો માણસ હતો, પોતાના પાંચ બાળકો સાથે, એ કેમ્પોબેલો પાછો આવ્યો. એ એ જ ઠંડા પાણીમાં તરતો જેમાં એ આખી જિંદગી તરતો રહ્યો હતો. એણે પોતાના બાળકો સાથે કિનારે એક નાની આગનો પીછો કર્યો, હસતા હસતા. એ એ સાંજે થાકીને અંદર આવ્યો, પણ એક સામાન્ય પ્રકારનો થાક. એ પથારી પર ગયો.\n\nજ્યારે એ બીજી સવારે ઊઠ્યો, એના પગ કામ નહોતા કરતા.\n\nબીમારી, ડૉક્ટરોએ આખરે કહ્યું, પોલિયો હતી.\n\nએ એક કઠિન, ડરામણો ઉનાળો હતો. ઇલીનોર એની બાજુમાં રહી. ડૉક્ટરો આવતા ગયા. એમણે ગરમ સ્નાન, ઠંડા સ્નાન, કસરત અને બ્રેસેસ અજમાવ્યા. દરેક જણ ખૂબ શાંતિથી એક અલગ અંતની આશા રાખતું જે તેઓ આવતું અનુભવી શકતા. ઘણા લાંબા અઠવાડિયા પછી, એક ડૉક્ટરે આખરે એ શબ્દો કહ્યા જેની ફ્રેન્કલિન ને પહેલેથી જ શંકા થવા લાગી હતી.\n\n\"શ્રી રૂઝવેલ્ટ,\" ડૉક્ટરે એ કોમળ અવાજે કહ્યું જે ડૉક્ટરો ત્યારે વાપરે છે જ્યારે એમની પાસે કંઈક કઠિન કહેવાનું હોય, \"તું ફરી ક્યારેય ચાલી નહીં શકે.\"\n\nફ્રેન્કલિન ખૂબ લાંબા સમય સુધી શાંત રહ્યો. ઇલીનોર એની બાજુમાં શાંત હતી. બારી બહાર, દરિયો એ જ રીતે સંભળાતો જે રીતે દરિયો હંમેશા સંભળાતો. દૂર, અને શાંત, અને ધીરજવાન.\n\nઆખરે, ફ્રેન્કલિન બોલ્યો.\n\n\"એ,\" એણે ધીમેથી કહ્યું, \"એક વાત છે. બીજી ઘણી વાતો છે.\"\n\nએ પછી જે થયું તે ઝડપથી નહોતું થયું. એમાં વર્ષો લાગ્યા.\n\nએણે કામ કર્યું. એણે પોતાની જિંદગીમાં જેટલી કદી નહોતી કરી તેટલી મહેનત કરી. દોડવા કે કૂદવા પર નહીં, જે હવે એના માટે બંધ હતા, પરંતુ એના શરીરના એ ભાગો પર જે હજુ પણ એને જવાબ આપતા હતા. એના ખભા. એના હાથ. એની છાતી. એણે પોતાનું વજન માત્ર પોતાના હાથોથી ઉપાડવાનું શીખ્યું. એ ગરમ પૂલમાં તરતો, કારણ કે ગરમ પૂલ એ થોડી જગ્યાઓમાંથી એક હતી જ્યાં એના પગ યાદ કરી શકતા કે હલવું કેવું લાગે છે. એણે વોર્મ સ્પ્રિંગ્સ, જ્યોર્જિયા માં જમીનનો એક ટુકડો ખરીદ્યો, જ્યાં પાણી આખું વર્ષ ગરમ રહેતું, અને એણે એને એવી જગ્યા બનાવી જ્યાં પોલિયો વાળા બીજા બાળકો પણ આવી શકે અને તરી શકે.\n\nએણે વ્હીલચેરનો ઉપયોગ કરવાનું શીખ્યું જાણે કે એ સાધન હોય, સજા નહીં. એણે શીખ્યું કે કેવી રીતે માત્ર પોતાના હાથોથી પોતાને કારની અંદર અને બહાર ઉપાડવો. એણે ભારે ધાતુના બ્રેસેસ પર થોડી ક્ષણો માટે ઊભા રહેવાનું શીખ્યું, પોડિયમને કસકસાવીને પકડીને, ભીડ સામે મુસ્કુરાતો, અને એમાંથી બહુ થોડાએ ક્યારેય અંદાજ લગાવ્યો કે એમાં એને શું કિંમત ચૂકવવી પડતી હતી.\n\nસૌથી મહત્વનું, અને આ એ ભાગ છે જે ફ્રેન્કલિન પોતે લાંબા સમય સુધી નહોતો સમજ્યો, એણે ખુરશીમાંથી રૂમનું નેતૃત્વ કરવાનું શીખ્યું એ જ રીતે જે રીતે એ ઊભા રહીને રૂમનું નેતૃત્વ કરતો. એણે એ રૂમમાં સૌથી શાંત વ્યક્તિ બનીને કર્યું.\n\nઅને પછી એના દેશને એની જરૂર પડી.\n\nએક મોટું આર્થિક તોફાન આવ્યું. અખબારોએ એને મંદી કહી. બેંકો બંધ થઈ ગઈ. ખેતરો ખાલી થઈ ગયા. જે લોકોએ આખી જિંદગી કામ કર્યું હતું તેઓ રોટલી ખરીદી શકતા નહોતા. પછી, જેવું તોફાન ઊતરી રહ્યું હતું, યુરોપ થી દરિયો ઓળંગીને એક મોટું યુદ્ધ આવ્યું, અને ફ્રેન્કલિન ના દેશને નક્કી કરવું પડ્યું કે બાકીની દુનિયા માટે ઊભા રહેવું કે નહીં. લોકો ડરી ગયા હતા. લોકો થાકી ગયા હતા. લોકો હવે ખાતરી નહોતા કે વસ્તુઓ ઠીક થઈ શકે.\n\nફ્રેન્કલિન રાષ્ટ્રપ્રમુખ માટે ચૂંટણી લડ્યો, અને જીત્યો. એક વાર નહીં, પણ સતત ચાર વાર. એના દેશના ઇતિહાસમાં એવું કરનાર એકમાત્ર વ્યક્તિ. એ પોતાની ખુરશીમાં, વોશિંગ્ટન માં પોતાની મોટી ઑફિસમાં બેઠો, અને એણે રેડિયો પર પોતાના દેશ સાથે વાત કરી, શાંત, સ્થિર અવાજે જે એવો લાગતો જાણે એ તમારી સાથે રસોડાના ટેબલ પર બેઠો હોય. એણે આ રેડિયો વાતચીતોને પોતાની \"ફાયરસાઈડ ચેટ્સ\" કહી. એણે દેશને ધીમેથી અને દૃઢતાથી કહ્યું કે તેઓ એકલા નહોતા. એણે એમને કહ્યું કે ડર પોતે જ એકમાત્ર વસ્તુ હતી જેનાથી એમને ખરેખર ડરવાની જરૂર હતી. એણે એમને સો જુદી જુદી રીતે કહ્યું કે તેઓ ઠીક થવાના હતા.\n\nફ્રેન્કલિન ડેલાનો રૂઝવેલ્ટ ફરી ક્યારેય ચાલ્યો નહીં.\n\nપણ દરેક એક દિવસ, મંદી, અને યુદ્ધ, અને એવી થાક જે વધુ શાંત માણસને તોડી નાખત તેમાંથી પસાર થઈને, એ હાજર થયો.\n\nઅને હાજર થવું, જાણવા મળ્યું કે એ સૌથી બહાદુર કામ હતું.\n\nવિચારવા જેવી વાત: ફ્રેન્કલિન એ વસ્તુ ગુમાવી જે એને સૌથી વધુ ગમતી. પોતાના શરીરમાં મજબૂત હોવું. અને એણે એની જગ્યાએ મૂકવા માટે એક અલગ પ્રકારની મજબૂતી શીખી. તમારી પોતાની જિંદગીમાં એવું શું કઠિન છે જે કદાચ તમને એવી મજબૂતી શીખવી રહ્યું છે જેના માટે તમારી પાસે હજુ સુધી શબ્દો નથી?"],
      es: ["A Franklin le encantaba el océano.\n\nCuando Franklin era niño, navegaba cada verano. Nadaba en agua fría. Escalaba rocas. Sus piernas eran fuertes.\n\n\"Estás hecho de viento y agua,\" decía su madre.\n\nFranklin creció. Trabajó duro. Entró en la política. Quería ayudar a la gente.\n\nEntonces un verano, cuando Franklin era un hombre, se enfermó gravemente.\n\nLa enfermedad hizo que sus piernas dejaran de funcionar.\n\nEl doctor dijo, \"No volverás a caminar.\"\n\nFranklin estuvo muy callado durante mucho tiempo.\n\nLuego dijo, \"Eso es una cosa. Hay muchas otras cosas.\"\n\nFranklin aprendió a usar una silla. Aprendió a levantar su cuerpo con los brazos. Aprendió a dirigir una reunión desde su silla de la misma manera que solía dirigirla de pie.\n\nLa gente de su país estaba asustada. Hubo años muy, muy difíciles.\n\nFranklin se convirtió en su presidente. Los ayudó cuando estaban más asustados.\n\nNunca volvió a caminar.\n\nPero cada día, se presentaba.\n\nY presentarse, resultó, era lo más valiente de todo.", "A Franklin le encantaba el océano.\n\nCuando Franklin era un niño pequeño, pasaba cada verano en un lugar llamado Campobello, que era una isla verde frente a la costa de un mar frío y azul. Aprendió a navegar antes de aprender a escribir correctamente. Nadaba en agua tan fría que sus dedos se ponían blancos. Trepaba descalzo por las rocas mojadas. Sus piernas eran fuertes y rápidas.\n\n\"Estás hecho de viento y agua,\" le decía su madre.\n\nFranklin le creyó.\n\nCreció. Fue a la escuela. Se casó con una mujer reflexiva llamada Eleanor, quien cambiaría su vida de maneras que ni ella misma sabía aún. Entró en la política, porque quería ayudar a la gente, y la política, pensó, era un lugar donde podías hacerlo.\n\nY entonces un verano, Franklin ya era un hombre adulto para entonces, regresó a casa a Campobello, se zambulló en la misma agua fría en la que había nadado toda su vida, y después, acostado en la cama, no podía sentir sus piernas.\n\nLa enfermedad se llamaba polio.\n\nLlegaron los doctores. Intentaron todo lo que sabían. Después de muchas semanas, uno de ellos dijo las palabras que Franklin ya sospechaba: \"No volverás a caminar.\"\n\nFranklin estuvo muy callado durante mucho tiempo. Eleanor se sentó a su lado. El mar sonaba como siempre había sonado. Lejano, calmado, paciente. Afuera de la ventana.\n\nFinalmente, Franklin habló.\n\n\"Eso,\" dijo, \"es una cosa. Hay muchas otras cosas.\"\n\nDurante años después, trabajó. Trabajó para hacerse más fuerte en las partes de su cuerpo que todavía lo escuchaban. Sus hombros, sus brazos, su pecho. Nadaba en piscinas cálidas para mantener el poco movimiento que quedaba en sus piernas. Aprendió a usar una silla de ruedas como si fuera una herramienta, no un castigo. Aprendió cómo levantarse, solo con los brazos, a un coche o a un escenario. Aprendió a dirigir una reunión desde su silla de la misma manera que solía dirigirla de pie. Siendo la persona más calmada en la sala.\n\nPasaron más años. Su país se metió en terribles problemas. Una gran tormenta económica, y luego una gran guerra. La gente estaba asustada. La gente tenía hambre. La gente no estaba segura de que las cosas alguna vez fueran a estar bien.\n\nFranklin se postuló para presidente, y ganó. Y se sentó en su silla, en su gran oficina, y habló a su país por la radio, con una voz tranquila y firme, como podrías hablar con un amigo en la mesa de la cocina. Les dijo, suave y firmemente, que no estaban solos. Les dijo que iban a estar bien.\n\nFranklin nunca volvió a caminar.\n\nPero cada solo día, se presentaba.\n\nY presentarse, resultó, era lo más valiente de todo.", "A Franklin Delano Roosevelt le encantaba el océano más que casi cualquier otra cosa en el mundo.\n\nCuando Franklin era un niño pequeño, su familia pasaba cada verano en un lugar llamado Campobello. Una isla verde y tranquila justo frente a la costa de New Brunswick, en Canada, donde el agua era tan fría que hacía zumbar tus huesos y el cielo era tan grande que te hacía sentir pequeño de una manera maravillosa. Franklin aprendió a navegar antes de aprender a escribir una carta apropiada. Nadaba en agua que dejaba sus dedos blancos. Trepaba descalzo por las rocas mojadas y oscuras. Podía remar un pesado bote de madera él solo cuando otros niños de su edad apenas podían levantar los remos.\n\n\"Estás hecho de viento y agua, Franklin,\" le dijo su madre una vez, mientras lo veía tensar una vela contra el viento.\n\nFranklin le creyó, porque se sentía verdadero. Sus piernas eran fuertes y rápidas. Sus brazos eran más fuertes. Su pecho estaba lleno de aire frío y salado.\n\nCreció. Fue a la escuela, y luego a la escuela de derecho. Se casó con una mujer reflexiva y seria llamada Eleanor, quien más tarde resultaría ser una de las grandes personas en su vida. Quizás la más importante. Aunque ninguno de los dos lo sabía aún. Entró en la política, porque creía que la política era un lugar donde realmente podías ayudar a la gente, y no solo decir que querías.\n\nY entonces, un verano, Franklin ya era un hombre adulto de treinta y nueve años para entonces, con cinco hijos propios, regresó a Campobello. Nadó en la misma agua fría en la que había nadado toda su vida. Persiguió un pequeño fuego en la orilla con sus hijos, riendo. Entró esa noche cansado, pero un tipo de cansancio normal. Se acostó.\n\nCuando despertó a la mañana siguiente, sus piernas no funcionaban.\n\nLa enfermedad, los doctores eventualmente dijeron, era polio.\n\nFue un verano duro y aterrador. Eleanor permaneció a su lado. Los doctores iban y venían. Probaron baños calientes, y baños fríos, y ejercicios, y aparatos ortopédicos. Todos esperaban, muy silenciosamente, un final diferente al que podían sentir venir. Después de muchas largas semanas, uno de los doctores finalmente dijo las palabras que Franklin ya había empezado a sospechar.\n\n\"Sr. Roosevelt,\" dijo el doctor, con la voz gentil que usan los doctores cuando tienen algo difícil que entregar, \"no volverá a caminar.\"\n\nFranklin estuvo callado durante mucho tiempo. Eleanor estaba callada a su lado. Afuera de la ventana, el mar sonaba como el mar siempre había sonado. Lejano, y calmado, y paciente.\n\nFinalmente, Franklin habló.\n\n\"Eso,\" dijo, lentamente, \"es una cosa. Hay muchas otras cosas.\"\n\nLo que sucedió después no sucedió rápidamente. Tomó años.\n\nTrabajó. Trabajó más duro de lo que jamás había trabajado en su vida. No en correr o saltar, que ahora estaban cerrados para él, sino en las partes de su cuerpo que todavía respondían cuando las llamaba. Sus hombros. Sus brazos. Su pecho. Aprendió a levantar su propio peso con nada más que sus brazos. Nadaba en piscinas cálidas, porque las piscinas cálidas eran uno de los pocos lugares donde sus piernas podían recordar lo que se sentía moverse. Compró un pedazo de tierra en Warm Springs, Georgia, donde el agua era cálida todo el año, y lo convirtió en un lugar donde otros niños con polio también pudieran venir y nadar.\n\nAprendió a usar una silla de ruedas como si fuera una herramienta, no un castigo. Aprendió cómo levantarse, solo con los brazos, dentro y fuera de un coche. Aprendió a pararse por unos momentos a la vez sobre pesados aparatos ortopédicos de metal, sosteniéndose firmemente a un podio, sonriendo a una multitud, y muy pocos de ellos jamás adivinaron lo que le estaba costando.\n\nLo más importante, y esta es la parte que el propio Franklin no entendió durante mucho tiempo, aprendió a liderar una sala desde una silla de la misma manera que solía liderar una sala de pie. Lo hizo siendo la persona más calmada en ella.\n\nY entonces su país lo necesitó.\n\nHubo una gran tormenta económica. Los periódicos la llamaron una Depresión. Los bancos cerraron. Las granjas se vaciaron. La gente que había trabajado toda su vida no podía comprar pan. Luego, justo cuando la tormenta estaba amainando, una gran guerra cruzó el océano desde Europe, y el país de Franklin tuvo que decidir si defender al resto del mundo. La gente estaba asustada. La gente estaba exhausta. La gente ya no estaba segura de que las cosas pudieran estar bien.\n\nFranklin se postuló para presidente, y ganó. No una vez, sino cuatro veces seguidas. La única persona en la historia de su país en hacer eso. Se sentó en su silla, en su gran oficina en Washington, y habló a su país por la radio, con una voz calmada y firme que sonaba como si estuviera sentado en la mesa de la cocina contigo. Llamó a estas charlas de radio sus \"Fireside Chats.\" Le dijo al país, suave y firmemente, que no estaban solos. Les dijo que el miedo mismo era lo único de lo que realmente necesitaban tener miedo. Les dijo, de cien maneras diferentes, que iban a estar bien.\n\nFranklin Delano Roosevelt nunca volvió a caminar.\n\nPero cada solo día, a través de la depresión, y la guerra, y el agotamiento que habría quebrado a un hombre más callado, se presentaba.\n\nY presentarse, resultó, era lo más valiente de todo.\n\nAlgo para pensar: Franklin perdió la cosa que más amaba. Ser fuerte en su cuerpo. Y aprendió un tipo diferente de fuerza para poner en su lugar. ¿Qué hay de difícil en tu propia vida que podría estar enseñándote una fuerza para la que aún no tienes palabras?"],
      fr: ["Franklin adorait l'océan.\n\nQuand Franklin était un garçon, il naviguait chaque été. Il nageait dans l'eau froide. Il escaladait les rochers. Ses jambes étaient fortes.\n\n\"Tu es fait de vent et d'eau,\" disait sa mère.\n\nFranklin a grandi. Il a travaillé dur. Il est entré en politique. Il voulait aider les gens.\n\nPuis un été, quand Franklin était un homme, il est tombé très malade.\n\nLa maladie a fait que ses jambes ont cessé de fonctionner.\n\nLe docteur a dit, \"Tu ne marcheras plus jamais.\"\n\nFranklin est resté très silencieux pendant longtemps.\n\nPuis il a dit, \"C'est une chose. Il y a beaucoup d'autres choses.\"\n\nFranklin a appris à utiliser une chaise. Il a appris à soulever son corps avec ses bras. Il a appris à diriger une réunion depuis sa chaise de la même manière qu'il la dirigeait debout.\n\nLes gens de son pays avaient peur. Il y a eu des années très, très dures.\n\nFranklin est devenu leur président. Il les a aidés quand ils avaient le plus peur.\n\nIl n'a plus jamais marché.\n\nMais chaque jour, il était présent.\n\nEt être présent, il s'est avéré, était la chose la plus courageuse de toutes.", "Franklin adorait l'océan.\n\nQuand Franklin était un petit garçon, il passait chaque été dans un endroit appelé Campobello, qui était une île verte au large de la côte d'une mer froide et bleue. Il a appris à naviguer avant d'apprendre à écrire correctement. Il nageait dans une eau si froide que ses doigts devenaient blancs. Il escaladait les rochers mouillés pieds nus. Ses jambes étaient fortes et rapides.\n\n\"Tu es fait de vent et d'eau,\" lui disait sa mère.\n\nFranklin l'a crue.\n\nIl a grandi. Il est allé à l'école. Il a épousé une femme réfléchie nommée Eleanor, qui allait changer sa vie de manières qu'elle-même ne savait pas encore. Il est entré en politique, parce qu'il voulait aider les gens, et la politique, pensait-il, était un endroit où on pouvait le faire.\n\nEt puis un été, Franklin était un homme adulte maintenant, il
