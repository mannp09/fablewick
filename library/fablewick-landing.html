      gu: "એક પત્થર સો વર્ષથી એક જગ્યાએ બેઠો છે. એક નદી તે બદલવાની છે.",
      es: "Una piedra ha pasado cien años sentada en un solo lugar. Un río está a punto de cambiar eso.",
      fr: "Une pierre est restée cent ans au même endroit. Une rivière va changer cela."
    },
    lesson: {
      en: "Trying something new is scary, and you can be scared and still try.",
      hi: "कुछ नया करना डरावना है, और डरते हुए भी कोशिश कर सकते हो।",
      gu: "કંઈક નવું કરવું બીક લગાડે છે, પણ ડરતા હોવા છતાં પણ પ્રયત્ન કરી શકાય.",
      es: "Probar algo nuevo da miedo, y puedes tener miedo y aún así intentarlo.",
      fr: "Essayer quelque chose de nouveau fait peur, mais on peut avoir peur et essayer quand même."
    },
    levels: {
      en: ["There was a stone by the river.\n\nThe stone had sat there for a long, long time.\n\nThe stone watched the water. The water rushed and rushed.\n\n\"I wonder what it is like to move,\" said the stone.\n\nA fish swam by. \"You could try,\" said the fish.\n\n\"I am too big,\" said the stone.\n\n\"You are not too big for the river,\" said the fish.\n\nThe stone thought about this for many days.\n\nOne morning, the rain came. The river got bigger. The river got stronger.\n\nThe water lifted the stone, just a little.\n\nThe stone felt scared. The stone wanted to stay.\n\nBut the stone also wanted to see.\n\nThe stone let go.\n\nThe water rolled the stone, gently. Just a little way down the river.\n\nThe stone stopped in a new place. It was a nice place. There were yellow flowers.\n\nThe stone looked back at where it had been.\n\n\"That was scary,\" said the stone. \"And I am okay.\"", "There was a stone by the side of a small river. The stone had sat in that exact spot for a hundred years, maybe more. Moss had grown on the stone. The stone was a comfortable shape.\n\nEvery day, the stone watched the river. The river rushed. The river splashed. The river carried leaves and twigs and the occasional fish along to wherever the river was going.\n\nThe stone had never been anywhere.\n\nOne afternoon, a small silver fish stopped near the stone.\n\n\"You're always here,\" said the fish.\n\n\"I am always here,\" agreed the stone.\n\n\"Do you ever want to come along?\" asked the fish, twitching its tail toward the rushing water. \"It's nice down there. There's a meadow. And a willow tree. And a place where the river makes a little pool that has frogs in it.\"\n\nThe stone said nothing for a long while.\n\nThen the stone said, very quietly, \"I think I do want to come. But I am scared. I have always been here.\"\n\nThe fish thought about this. The fish was not a very old fish, but the fish was kind.\n\n\"You can be scared,\" said the fish. \"You can be scared and still come. Those are not opposite things.\"\n\nThe fish swam away.\n\nThe stone thought about what the fish had said for three more days. The stone thought about it during a sunny morning. The stone thought about it during a long, quiet night when the river sounded like a hundred small voices.\n\nAnd then, on the fourth day, the rain came.\n\nThe rain came all afternoon. The river grew bigger. The river grew stronger. The water came higher up the bank than it had in many years — and then it touched the stone. And then it pushed at the stone, gently. And then a little more.\n\nThe stone felt the water trying to lift it. The stone could choose to dig in, hold on, stay.\n\nThe stone was very, very scared.\n\nBut the stone remembered what the fish had said.\n\nThe stone let go.\n\nThe river caught the stone, soft as a hand, and rolled the stone — slowly, gently — down the bank, around a bend, past a willow tree, past a meadow, all the way to a quiet pool where, just as the fish had said, three frogs were having an argument about a lily pad.\n\nThe stone stopped there. It was a good place. The light came through the willow leaves in soft green stripes.\n\nThe stone looked back, the way it had come.\n\n\"That,\" said the stone, mostly to itself, \"was very, very scary.\"\n\nA frog hopped onto the stone and sat there.\n\n\"And,\" said the stone, \"I am okay.\"", "There was a stone by the side of a small river, and the stone had been there for a long time. Long enough that moss had grown thickly over the top half of it. Long enough that a stubborn little fern had set up a household in one of its cracks. Long enough that the local mice considered it part of the geography.\n\nNobody could remember a time when the stone had been anywhere else.\n\nThe stone watched the river. That was what the stone did. The river was, by the stone's standards, a tremendous show. Every day a thousand new things came rushing along — leaves, twigs, the silver flicker of small fish, once a duck that looked extremely confused about how it had gotten there. The river carried everything to somewhere else, somewhere downstream that the stone had never seen.\n\nThe stone had been wondering about that somewhere else for a very long time. It had never said so out loud.\n\nOne sunlit afternoon, a young silver fish stopped near the stone, holding herself easily against the current.\n\n\"You're always here,\" she said.\n\n\"I am always here,\" the stone agreed.\n\n\"Do you ever want to come along?\" The fish flicked her tail toward the downstream bend. \"It's nice down there. There's a meadow full of clover. A willow tree with leaves like long green ribbons. A quiet pool where the river slows down and the light goes all green and gold. You'd like it.\"\n\nThe stone was quiet for a long while. The river kept rushing.\n\n\"I think I do want to come,\" the stone said, finally, in a voice so quiet the fish almost missed it. \"But I am scared. I have never been anywhere. I do not know how to be anywhere else.\"\n\nThe fish considered this. She was not an old fish, but she had been born in a fast current, and fast currents teach you certain things early.\n\n\"You can be scared,\" she said, \"and you can still come. Those are not opposite things. The scared part doesn't have to go away first. It can come along with you.\"\n\nAnd then she flicked her tail and disappeared downstream.\n\nThe stone thought about what the fish had said for three full days. The stone thought about it through a bright, blue morning when a kingfisher dove past three times. The stone thought about it through a long, foggy evening when the world disappeared and only the sound of water remained. The stone thought about it through a soft night when an owl, somewhere upstream, asked a question over and over without ever quite getting an answer.\n\nAnd then, on the fourth day, the rain came.\n\nIt rained all afternoon. It rained into the evening. The river grew. The river darkened. The river ran higher up the bank than it had in a generation, and at last the water reached the stone, and lapped at the stone, and pushed at the stone with a soft, persistent strength.\n\nThe stone could feel the river asking. The stone could feel itself almost lifting.\n\nThe stone could also feel something else, something old and stubborn and frightened — the part of the stone that wanted, very much, to stay exactly where it had always been. To dig in. To wait until the rain stopped and the river went back to being a story it watched from a distance.\n\nThe stone was extremely scared.\n\nAnd then the stone remembered the fish. The stone remembered: those are not opposite things.\n\nThe stone let go.\n\nThe river took the stone, soft as a hand, and rolled it gently down the bank. Around the bend. Past the willow with the long green leaves. Past the meadow that smelled, even in the rain, like sweet clover. Past a place where the river made a small white waterfall and the stone tumbled, just a little, and was startled, and was, somehow, still all right.\n\nAnd then the river slowed. And the stone came to rest in a quiet, green-gold pool where, just as the fish had promised, three frogs were having an extremely committed argument about a lily pad.\n\nThe rain eased. The water settled. The stone lay there, looking up through the willow leaves at a sky that was already beginning to turn pink at the edges.\n\n\"That,\" the stone said, mostly to itself, \"was very, very scary.\"\n\nOne of the frogs, mid-argument, hopped over and sat on top of the stone, as if the stone had been there forever.\n\nA piece of moss began, immediately, to consider its options.\n\n\"And,\" the stone said, softly, \"I am okay.\"\n\nUpstream, somewhere out of sight, a silver fish flicked her tail once, and was gone.\n\n*Something to think about: The stone was scared the whole time, and the stone still let go. What is something scary you've done — or could try — where the scared part comes along with you, instead of waiting for it to go away first?*"],
      hi: ["नदी के किनारे एक पत्थर था.\n\nपत्थर वहाँ बहुत, बहुत लंबे समय से बैठा था.\n\nपत्थर पानी को देखता था. पानी बहता और बहता रहता था.\n\n\"मैं सोचता हूँ कि चलना कैसा होगा,\" पत्थर ने कहा.\n\nएक मछली तैरकर पास आई. \"तुम कोशिश कर सकते हो,\" मछली ने कहा.\n\n\"मैं बहुत बड़ा हूँ,\" पत्थर ने कहा.\n\n\"तुम नदी के लिए बहुत बड़े नहीं हो,\" मछली ने कहा.\n\nपत्थर ने कई दिनों तक इस बारे में सोचा.\n\nएक सुबह, बारिश आई. नदी बड़ी हो गई. नदी ताकतवर हो गई.\n\nपानी ने पत्थर को थोड़ा सा उठाया.\n\nपत्थर को डर लगा. पत्थर रुकना चाहता था.\n\nलेकिन पत्थर देखना भी चाहता था.\n\nपत्थर ने अपने आप को छोड़ दिया.\n\nपानी ने पत्थर को धीरे से लुढ़काया. बस थोड़ा सा नदी के नीचे की तरफ.\n\nपत्थर एक नई जगह पर रुक गया. यह एक अच्छी जगह थी. वहाँ पीले फूल थे.\n\nपत्थर ने पीछे देखा जहाँ वो पहले था.\n\n\"वो डरावना था,\" पत्थर ने कहा. \"और मैं ठीक हूँ.\"", "एक छोटी नदी के किनारे एक पत्थर था. पत्थर ठीक उसी जगह सौ साल से बैठा था, शायद उससे भी ज़्यादा. पत्थर पर काई उग आई थी. पत्थर का आकार आरामदायक था.\n\nहर दिन, पत्थर नदी को देखता. नदी बहती. नदी छप-छप करती. नदी पत्तियाँ, टहनियाँ, और कभी-कभी कोई मछली जहाँ भी नदी जा रही होती वहाँ ले जाती.\n\nपत्थर कभी कहीं नहीं गया था.\n\nएक दोपहर, एक छोटी चाँदी जैसी मछली पत्थर के पास रुकी.\n\n\"तुम हमेशा यहीं रहते हो,\" मछली ने कहा.\n\n\"मैं हमेशा यहीं रहता हूँ,\" पत्थर ने हामी भरी.\n\n\"क्या तुम कभी साथ चलना चाहते हो?\" मछली ने पूछा, अपनी पूँछ बहते पानी की ओर हिलाते हुए. \"नीचे अच्छा है. एक घास का मैदान है. और एक विलो का पेड़. और एक जगह जहाँ नदी एक छोटा तालाब बनाती है जिसमें मेंढक हैं.\"\n\nपत्थर ने एक लंबी देर तक कुछ नहीं कहा.\n\nफिर पत्थर ने बहुत धीरे कहा, \"मुझे लगता है मैं आना चाहता हूँ. लेकिन मुझे डर लगता है. मैं हमेशा यहीं रहा हूँ.\"\n\nमछली ने इस बारे में सोचा. मछली बहुत बूढ़ी नहीं थी, लेकिन मछली दयालु थी.\n\n\"तुम डर सकते हो,\" मछली ने कहा. \"तुम डर सकते हो और फिर भी आ सकते हो. ये उल्टी बातें नहीं हैं.\"\n\nमछली तैरकर चली गई.\n\nपत्थर ने मछली की बात के बारे में तीन और दिनों तक सोचा. पत्थर ने एक धूप वाली सुबह के दौरान इसके बारे में सोचा. पत्थर ने एक लंबी, शांत रात के दौरान इसके बारे में सोचा जब नदी सौ छोटी आवाज़ों जैसी सुनाई दे रही थी.\n\nऔर फिर, चौथे दिन, बारिश आई.\n\nबारिश पूरी दोपहर आती रही. नदी बड़ी हो गई. नदी ताकतवर हो गई. पानी कई सालों में पहली बार किनारे पर इतना ऊँचा आया और फिर उसने पत्थर को छुआ. और फिर उसने पत्थर को धीरे से धकेला. और फिर थोड़ा और.\n\nपत्थर ने पानी को उसे उठाने की कोशिश करते महसूस किया. पत्थर चुन सकता था कि गहरे जम जाए, पकड़े रहे, रुक जाए.\n\nपत्थर बहुत, बहुत डरा हुआ था.\n\nलेकिन पत्थर को याद आया जो मछली ने कहा था.\n\nपत्थर ने अपने आप को छोड़ दिया.\n\nनदी ने पत्थर को पकड़ लिया, हाथ की तरह नरम, और पत्थर को लुढ़काया धीरे, कोमलता से किनारे पर, एक मोड़ के चारों ओर, एक विलो के पेड़ के पास से, एक घास के मैदान के पास से, सीधा एक शांत तालाब तक जहाँ, जैसा मछली ने कहा था, तीन मेंढक एक कमल के पत्ते के बारे में बहस कर रहे थे.\n\nपत्थर वहीं रुक गया. यह एक अच्छी जगह थी. रोशनी विलो के पत्तों से नरम हरी धारियों में आ रही थी.\n\nपत्थर ने पीछे देखा, जिस रास्ते से वो आया था.\n\n\"वो,\" पत्थर ने ज़्यादातर अपने आप से कहा, \"बहुत, बहुत डरावना था.\"\n\nएक मेंढक पत्थर पर कूदा और वहाँ बैठ गया.\n\n\"और,\" पत्थर ने कहा, \"मैं ठीक हूँ.\"", "एक छोटी नदी के किनारे एक पत्थर था, और पत्थर वहाँ लंबे समय से था. इतने लंबे समय से कि उसके ऊपर के आधे हिस्से पर काई मोटी उग आई थी. इतने लंबे समय से कि एक ज़िद्दी छोटी फ़र्न ने उसकी एक दरार में अपना घर बना लिया था. इतने लंबे समय से कि स्थानीय चूहे उसे भूगोल का हिस्सा मानते थे.\n\nकोई याद नहीं कर सकता था जब पत्थर कहीं और रहा हो.\n\nपत्थर नदी को देखता था. यही पत्थर करता था. नदी, पत्थर के हिसाब से, एक शानदार तमाशा थी. हर दिन हज़ार नई चीज़ें बहती हुई आतीं पत्तियाँ, टहनियाँ, छोटी मछलियों की चाँदी जैसी झलक, एक बार एक बत्तख जो बहुत उलझी हुई दिख रही थी कि वो वहाँ कैसे पहुँची. नदी सब कुछ किसी और जगह ले जाती, नीचे की ओर कहीं जहाँ पत्थर ने कभी नहीं देखा था.\n\nपत्थर उस कहीं और के बारे में बहुत लंबे समय से सोच रहा था. उसने यह कभी ज़ोर से नहीं कहा था.\n\nएक धूप वाली दोपहर, एक जवान चाँदी जैसी मछली पत्थर के पास रुकी, धारा के ख़िलाफ़ आसानी से ख़ुद को थामे.\n\n\"तुम हमेशा यहीं रहते हो,\" उसने कहा.\n\n\"मैं हमेशा यहीं रहता हूँ,\" पत्थर ने हामी भरी.\n\n\"क्या तुम कभी साथ चलना चाहते हो?\" मछली ने अपनी पूँछ नीचे की ओर के मोड़ की तरफ हिलाई. \"नीचे अच्छा है. तिपतिया घास से भरा एक मैदान है. एक विलो का पेड़ जिसकी पत्तियाँ लंबी हरी रिबन जैसी हैं. एक शांत तालाब जहाँ नदी धीमी हो जाती है और रोशनी हरी और सुनहरी हो जाती है. तुम्हें वो पसंद आएगा.\"\n\nपत्थर एक लंबी देर तक चुप रहा. नदी बहती रही.\n\n\"मुझे लगता है मैं आना चाहता हूँ,\" पत्थर ने आख़िरकार इतनी धीमी आवाज़ में कहा कि मछली लगभग सुन ही नहीं पाई. \"लेकिन मुझे डर लगता है. मैं कभी कहीं नहीं गया. मुझे नहीं पता कि कहीं और कैसे रहूँ.\"\n\nमछली ने इस पर ग़ौर किया. वह बूढ़ी मछली नहीं थी, लेकिन वो एक तेज़ धारा में पैदा हुई थी, और तेज़ धाराएँ तुम्हें कुछ चीज़ें जल्दी सिखाती हैं.\n\n\"तुम डर सकते हो,\" उसने कहा, \"और फिर भी आ सकते हो. ये उल्टी बातें नहीं हैं. डरे हुए हिस्से को पहले जाने की ज़रूरत नहीं है. वो तुम्हारे साथ आ सकता है.\"\n\nऔर फिर उसने अपनी पूँछ हिलाई और नीचे की ओर बहकर ओझल हो गई.\n\nपत्थर ने मछली की बात के बारे में पूरे तीन दिन तक सोचा. पत्थर ने एक चमकीली, नीली सुबह के दौरान इसके बारे में सोचा जब एक किंगफिशर तीन बार गोता लगाकर पास से गुज़रा. पत्थर ने एक लंबी, धुंधली शाम के दौरान इसके बारे में सोचा जब दुनिया ग़ायब हो गई और सिर्फ़ पानी की आवाज़ बची रही. पत्थर ने एक नरम रात के दौरान इसके बारे में सोचा जब एक उल्लू, कहीं ऊपर नदी के, बार-बार एक सवाल पूछता रहा बिना कभी जवाब पाए.\n\nऔर फिर, चौथे दिन, बारिश आई.\n\nपूरी दोपहर बारिश हुई. शाम तक बारिश हुई. नदी बढ़ी. नदी गहराई. नदी एक पीढ़ी में पहली बार किनारे पर इतनी ऊँची चढ़ी, और अंत में पानी पत्थर तक पहुँचा, और पत्थर को चूमा, और पत्थर को एक नरम, लगातार ताक़त से धकेला.\n\nपत्थर महसूस कर सकता था कि नदी पूछ रही है. पत्थर महसूस कर सकता था कि वो ख़ुद लगभग उठ रहा है.\n\nपत्थर कुछ और भी महसूस कर सकता था, कुछ पुराना और ज़िद्दी और डरा हुआ पत्थर का वो हिस्सा जो बहुत, बहुत चाहता था कि बिल्कुल वहीं रहे जहाँ वो हमेशा रहा था. गहरे जम जाए. इंतज़ार करे जब तक बारिश रुक न जाए और नदी फिर से एक कहानी न बन जाए जिसे वो दूर से देखे.\n\nपत्थर बेहद डरा हुआ था.\n\nऔर फिर पत्थर को मछली याद आई. पत्थर को याद आया: ये उल्टी बातें नहीं हैं.\n\nपत्थर ने अपने आप को छोड़ दिया.\n\nनदी ने पत्थर को ले लिया, हाथ की तरह नरम, और उसे धीरे से किनारे पर लुढ़काया. मोड़ के चारों ओर. लंबे हरे पत्तों वाले विलो के पास से. उस घास के मैदान के पास से जो बारिश में भी मीठी तिपतिया घास जैसा महकता था. एक जगह के पास से जहाँ नदी एक छोटा सफ़ेद झरना बनाती थी और पत्थर थोड़ा सा लुढ़का, और चौंका, और किसी तरह, फिर भी ठीक रहा.\n\nऔर फिर नदी धीमी हो गई. और पत्थर एक शांत, हरे-सुनहरे तालाब में आकर रुक गया जहाँ, जैसा मछली ने वादा किया था, तीन मेंढक एक कमल के पत्ते के बारे में बेहद ज़ोरदार बहस कर रहे थे.\n\nबारिश हल्की हुई. पानी थम गया. पत्थर वहाँ लेटा रहा, विलो के पत्तों से ऊपर एक आसमान को देखता हुआ जो किनारों पर पहले से ही गुलाबी होने लगा था.\n\n\"वो,\" पत्थर ने ज़्यादातर अपने आप से कहा, \"बहुत, बहुत डरावना था.\"\n\nमेंढकों में से एक, बहस के बीच में, कूदकर पत्थर के ऊपर बैठ गया, जैसे पत्थर हमेशा से वहीं था.\n\nकाई के एक टुकड़े ने तुरंत अपने विकल्पों पर विचार करना शुरू कर दिया.\n\n\"और,\" पत्थर ने धीरे से कहा, \"मैं ठीक हूँ.\"\n\nऊपर नदी में, कहीं नज़र से दूर, एक चाँदी जैसी मछली ने अपनी पूँछ एक बार हिलाई, और चली गई.\n\n*सोचने के लिए कुछ: पत्थर पूरे समय डरा हुआ था, और फिर भी पत्थर ने अपने आप को छोड़ दिया. कोई ऐसी डरावनी चीज़ है जो तुमने की हो या कोशिश कर सकते हो जहाँ डरा हुआ हिस्सा तुम्हारे साथ आता है, उसके जाने का इंतज़ार करने के बजाय?*"],
      gu: ["નદીની કિનારે એક પથ્થર હતો.\n\nપથ્થર ત્યાં ઘણા, ઘણા લાંબા સમયથી બેઠો હતો.\n\nપથ્થર પાણીને જોતો. પાણી વહેતું અને વહેતું જતું.\n\n\"મને નવાઈ થાય છે કે ચાલવું કેવું હશે,\" પથ્થરે કહ્યું.\n\nએક માછલી તરીને પાસે આવી. \"તું પ્રયત્ન કરી શકે છે,\" માછલીએ કહ્યું.\n\n\"હું ખૂબ મોટો છું,\" પથ્થરે કહ્યું.\n\n\"તું નદી માટે ખૂબ મોટો નથી,\" માછલીએ કહ્યું.\n\nપથ્થરે કેટલાય દિવસો સુધી આ વિશે વિચાર્યું.\n\nએક સવારે, વરસાદ આવ્યો. નદી મોટી થઈ. નદી મજબૂત થઈ.\n\nપાણીએ પથ્થરને થોડો ઊંચક્યો.\n\nપથ્થરને ડર લાગ્યો. પથ્થર રહેવા માગતો હતો.\n\nપણ પથ્થર જોવા પણ માગતો હતો.\n\nપથ્થરે પોતાને છોડી દીધો.\n\nપાણીએ પથ્થરને ધીમેથી ગબડાવ્યો. બસ થોડોક નદીની નીચે તરફ.\n\nપથ્થર એક નવી જગ્યાએ અટક્યો. એ સારી જગ્યા હતી. ત્યાં પીળાં ફૂલો હતાં.\n\nપથ્થરે પાછળ જોયું જ્યાં તે પહેલાં હતો.\n\n\"એ ડરામણું હતું,\" પથ્થરે કહ્યું. \"અને હું બરાબર છું.\"", "એક નાની નદીની કિનારે એક પથ્થર હતો. પથ્થર એ જ ચોક્કસ જગ્યાએ સો વર્ષથી બેઠો હતો, કદાચ વધારે. પથ્થર પર શેવાળ ઊગ્યું હતું. પથ્થરનો આકાર આરામદાયક હતો.\n\nદરરોજ, પથ્થર નદીને જોતો. નદી વહેતી. નદી છપાક કરતી. નદી પાંદડાં, ટ્વિગ્સ, અને ક્યારેક માછલી જ્યાં પણ નદી જતી ત્યાં લઈ જતી.\n\nપથ્થર ક્યારેય ક્યાંય ગયો ન હતો.\n\nએક બપોરે, એક નાની ચાંદી જેવી માછલી પથ્થર પાસે અટકી.\n\n\"તું હંમેશા અહીં હોય છે,\" માછલીએ કહ્યું.\n\n\"હું હંમેશા અહીં હોઉં છું,\" પથ્થરે સહમતી દર્શાવી.\n\n\"શું તું ક્યારેય સાથે આવવા માગે છે?\" માછલીએ પૂછ્યું, વહેતા પાણી તરફ પૂંછડી હલાવતાં. \"નીચે સારું છે. એક ઘાસનું મેદાન છે. અને એક વિલોનું વૃક્ષ. અને એક જગ્યા જ્યાં નદી એક નાનો તળાવ બનાવે છે જેમાં દેડકાં છે.\"\n\nપથ્થરે લાંબા સમય સુધી કંઈ કહ્યું નહીં.\n\nપછી પથ્થરે ખૂબ ધીમેથી કહ્યું, \"મને લાગે છે કે હું આવવા માગું છું. પણ મને ડર લાગે છે. હું હંમેશા અહીં જ રહ્યો છું.\"\n\nમાછલીએ આ વિશે વિચાર્યું. માછલી ખૂબ વૃદ્ધ ન હતી, પણ માછલી દયાળુ હતી.\n\n\"તું ડરી શકે છે,\" માછલીએ કહ્યું. \"તું ડરી શકે છે અને છતાં આવી શકે છે. એ વિરોધી વસ્તુઓ નથી.\"\n\nમાછલી તરીને દૂર જતી રહી.\n\nપથ્થરે માછલીએ જે કહ્યું તેના વિશે ત્રણ વધુ દિવસ વિચાર્યું. પથ્થરે એક તડકાળી સવારે તે વિશે વિચાર્યું. પથ્થરે એક લાંબી, શાંત રાતે તે વિશે વિચાર્યું જ્યારે નદી સો નાના અવાજો જેવી લાગતી હતી.\n\nઅને પછી, ચોથા દિવસે, વરસાદ આવ્યો.\n\nવરસાદ આખી બપોર પડ્યો. નદી મોટી થઈ. નદી મજબૂત થઈ. પાણી કિનારે ઘણાં વર્ષોમાં પહેલી વાર આટલું ઊંચું આવ્યું અને પછી તેણે પથ્થરને સ્પર્શ કર્યો. અને પછી તેણે પથ્થરને ધીમેથી ધક્કો માર્યો. અને પછી થોડો વધારે.\n\nપથ્થરે પાણીને તેને ઊંચકવાનો પ્રયત્ન કરતું અનુભવ્યું. પથ્થર પસંદ કરી શકતો હતો કે ઊંડે ખૂંપી જાય, પકડી રાખે, રહે.\n\nપથ્થર ખૂબ, ખૂબ ડરી ગયો હતો.\n\nપણ પથ્થરને માછલીએ જે કહ્યું હતું તે યાદ આવ્યું.\n\nપથ્થરે પોતાને છોડી દીધો.\n\nનદીએ પથ્થરને પકડ્યો, હાથની જેમ નરમ, અને પથ્થરને ગબડાવ્યો ધીમે, કોમળતાથી કિનારે, એક વળાંકની આસપાસ, એક વિલોના વૃક્ષ પાસેથી, એક ઘાસના મેદાન પાસેથી, સીધો એક શાંત તળાવ સુધી જ્યાં, જેમ માછલીએ કહ્યું હતું, ત્રણ દેડકાં એક કમળના પાંદડા વિશે દલીલ કરી રહ્યાં હતાં.\n\nપથ્થર ત્યાં અટક્યો. એ સારી જગ્યા હતી. પ્રકાશ વિલોનાં પાંદડાંમાંથી નરમ લીલા પટ્ટાઓમાં આવતો હતો.\n\nપથ્થરે પાછળ જોયું, જે રસ્તે તે આવ્યો હતો.\n\n\"એ,\" પથ્થરે મોટેભાગે પોતાને કહ્યું, \"ખૂબ, ખૂબ ડરામણું હતું.\"\n\nએક દેડકો પથ્થર પર કૂદ્યો અને ત્યાં બેઠો.\n\n\"અને,\" પથ્થરે કહ્યું, \"હું બરાબર છું.\"", "એક નાની નદીની કિનારે એક પથ્થર હતો, અને પથ્થર ત્યાં લાંબા સમયથી હતો. એટલા લાંબા સમય સુધી કે તેના ઉપરના અડધા ભાગ પર શેવાળ જાડું ઊગ્યું હતું. એટલા લાંબા સમય સુધી કે એક હઠીલા નાના ફર્ને તેની એક તિરાડમાં ઘર બનાવ્યું હતું. એટલા લાંબા સમય સુધી કે સ્થાનિક ઉંદરો તેને ભૂગોળનો ભાગ માનતા હતા.\n\nકોઈ યાદ કરી શકતું ન હતું એવો સમય જ્યારે પથ્થર બીજે ક્યાંય હોય.\n\nપથ્થર નદીને જોતો હતો. એ જ પથ્થર કરતો. નદી, પથ્થરના ધોરણે, એક અદ્ભુત તમાશો હતી. દરરોજ હજાર નવી વસ્તુઓ વહેતી આવતી પાંદડાં, ટ્વિગ્સ, નાની માછલીઓની ચાંદી જેવી ઝલક, એક વાર એક બતક જે ત્યાં કેવી રીતે પહોંચ્યું તે વિશે અત્યંત મૂંઝવાયેલું દેખાતું હતું. નદી બધું બીજે ક્યાંક લઈ જતી, નીચે તરફ ક્યાંક જે પથ્થરે ક્યારેય જોયું ન હતું.\n\nપથ્થર એ બીજે ક્યાંક વિશે ખૂબ લાંબા સમયથી વિચારતો હતો. તેણે તે ક્યારેય મોટેથી કહ્યું ન હતું.\n\nએક સૂર્યપ્રકાશિત બપોરે, એક યુવાન ચાંદી જેવી માછલી પથ્થર પાસે અટકી, પ્રવાહ સામે સહેલાઈથી પોતાને જાળવી રાખતી.\n\n\"તું હંમેશા અહીં હોય છે,\" તેણીએ કહ્યું.\n\n\"હું હંમેશા અહીં હોઉં છું,\" પથ્થરે સહમતી દર્શાવી.\n\n\"શું તું ક્યારેય સાથે આવવા માગે છે?\" માછલીએ પૂંછડી નીચે તરફના વળાંક તરફ હલાવી. \"નીચે સારું છે. ક્લોવરથી ભરેલું એક મેદાન છે. એક વિલોનું વૃક્ષ જેનાં પાંદડાં લાંબી લીલી રિબન જેવાં છે. એક શાંત તળાવ જ્યાં નદી ધીમી પડે છે અને પ્રકાશ આખો લીલો અને સોનેરી થઈ જાય છે. તને ગમશે.\"\n\nપથ્થર લાંબા સમય સુધી શાંત રહ્યો. નદી વહેતી રહી.\n\n\"મને લાગે છે કે હું આવવા માગું છું,\" પથ્થરે આખરે કહ્યું, એટલા ધીમા અવાજે કે માછલી લગભગ ચૂકી ગઈ. \"પણ મને ડર લાગે છે. હું ક્યારેય ક્યાંય ગયો નથી. મને ખબર નથી કે બીજે ક્યાંય કેવી રીતે રહેવું.\"\n\nમાછલીએ આ વિશે વિચાર્યું. તેણી વૃદ્ધ માછલી ન હતી, પણ તેણી ઝડપી પ્રવાહમાં જન્મી હતી, અને ઝડપી પ્રવાહો તમને કેટલીક વસ્તુઓ વહેલી શીખવે છે.\n\n\"તું ડરી શકે છે,\" તેણીએ કહ્યું, \"અને છતાં આવી શકે છે. એ વિરોધી વસ્તુઓ નથી. ડરેલા ભાગને પહેલાં જવાની જરૂર નથી. તે તારી સાથે આવી શકે છે.\"\n\nઅને પછી તેણીએ પૂંછડી હલાવી અને નીચે વહીને અદૃશ્ય થઈ ગઈ.\n\nપથ્થરે માછલીએ જે કહ્યું તેના વિશે પૂરા ત્રણ દિવસ વિચાર્યું. પથ્થરે એક ઝળહળતી, વાદળી સવારે તે વિશે વિચાર્યું જ્યારે કિંગફિશર ત્રણ વાર ડૂબકી મારીને પસાર થયું. પથ્થરે એક લાંબી, ધુમ્મસવાળી સાંજે તે વિશે વિચાર્યું જ્યારે દુનિયા અદૃશ્ય થઈ ગઈ અને માત્ર પાણીનો અવાજ બાકી રહ્યો. પથ્થરે એક નરમ રાતે તે વિશે વિચાર્યું જ્યારે એક ઘુવડ, નદીની ઉપર ક્યાંક, ફરી ફરી એક પ્રશ્ન પૂછતું રહ્યું જવાબ ક્યારેય મળ્યા વગર.\n\nઅને પછી, ચોથા દિવસે, વરસાદ આવ્યો.\n\nઆખી બપોર વરસાદ પડ્યો. સાંજ સુધી વરસાદ પડ્યો. નદી વધી. નદી ઘેરી થઈ. નદી એક પેઢીમાં પહેલી વાર કિનારે આટલી ઊંચી ચઢી, અને છેવટે પાણી પથ્થર સુધી પહોંચ્યું, અને પથ્થરને ચૂમ્યું, અને પથ્થરને એક નરમ, સતત તાકાતથી ધક્કો માર્યો.\n\nપથ્થર અનુભવી શકતો હતો કે નદી પૂછી રહી છે. પથ્થર અનુભવી શકતો હતો કે પોતે લગભગ ઊંચકાઈ રહ્યો છે.\n\nપથ્થર કંઈક બીજું પણ અનુભવી શકતો હતો, કંઈક જૂનું અને હઠીલું અને ડરેલું પથ્થરનો એ ભાગ જે ખૂબ ખૂબ ઇચ્છતો હતો કે બરાબર ત્યાં જ રહે જ્યાં તે હંમેશા રહ્યો હતો. ઊંડે ખૂંપી જાય. વરસાદ બંધ થાય ત્યાં સુધી રાહ જુએ અને નદી ફરી એક વાર્તા બની જાય જે તે દૂરથી જુએ.\n\nપથ્થર અત્યંત ડરેલો હતો.\n\nઅને પછી પથ્થરને માછલી યાદ આવી. પથ્થરને યાદ આવ્યું: એ વિરોધી વસ્તુઓ નથી.\n\nપથ્થરે પોતાને છોડી દીધો.\n\nનદીએ પથ્થરને લીધો, હાથની જેમ નરમ, અને તેને ધીમેથી કિનારે ગબડાવ્યો. વળાંકની આસપાસ. લાંબાં લીલાં પાંદડાંવાળા વિલો પાસેથી. એ મેદાન પાસેથી જે વરસાદમાં પણ મીઠી ક્લોવર જેવી સુગંધ આપતું હતું. એક જગ્યા પાસેથી જ્યાં નદી એક નાનો સફેદ ધોધ બનાવતી હતી અને પથ્થર થોડોક ગબડ્યો, અને ચોંક્યો, અને કોઈ રીતે, છતાં ઠીક હતો.\n\nઅને પછી નદી ધીમી પડી. અને પથ્થર એક શાંત, લીલા-સોનેરી તળાવમાં આવીને અટક્યો જ્યાં, જેમ માછલીએ વચન આપ્યું હતું, ત્રણ દેડકાં એક કમળના પાંદડા વિશે અત્યંત ઉગ્ર દલીલ કરી રહ્યાં હતાં.\n\nવરસાદ હળવો થયો. પાણી શાંત થયું. પથ્થર ત્યાં પડ્યો રહ્યો, વિલોનાં પાંદડાંમાંથી ઉપર એક આકાશને જોતો જે કિનારી પર પહેલેથી ગુલાબી થવા લાગ્યું હતું.\n\n\"એ,\" પથ્થરે મોટેભાગે પોતાને કહ્યું, \"ખૂબ, ખૂબ ડરામણું હતું.\"\n\nદેડકાંઓમાંથી એક, દલીલની વચ્ચે, કૂદીને પથ્થર પર બેઠું, જાણે પથ્થર હંમેશા ત્યાં હતો.\n\nશેવાળના એક ટુકડાએ તરત જ પોતાના વિકલ્પો વિચારવા માંડ્યા.\n\n\"અને,\" પથ્થરે ધીમેથી કહ્યું, \"હું બરાબર છું.\"\n\nનદીની ઉપર, ક્યાંક નજરની બહાર, એક ચાંદી જેવી માછલીએ એક વાર પૂંછડી હલાવી, અને ગઈ.\n\n*વિચારવા જેવી વાત: પથ્થર આખો સમય ડરેલો હતો, અને છતાં પથ્થરે પોતાને છોડી દીધો. કોઈ એવી ડરામણી વસ્તુ છે જે તેં કરી હોય અથવા કરવાનો પ્રયત્ન કરી શકે જ્યાં ડરેલો ભાગ તારી સાથે આવે, તેના જવાની રાહ જોવાને બદલે?*"],
      es: ["Había una piedra junto al río.\n\nLa piedra había estado allí sentada durante mucho, mucho tiempo.\n\nLa piedra miraba el agua. El agua corría y corría.\n\n\"Me pregunto cómo será moverse,\" dijo la piedra.\n\nUn pez pasó nadando. \"Podrías intentarlo,\" dijo el pez.\n\n\"Soy demasiado grande,\" dijo la piedra.\n\n\"No eres demasiado grande para el río,\" dijo el pez.\n\nLa piedra pensó en esto durante muchos días.\n\nUna mañana, llegó la lluvia. El río se hizo más grande. El río se hizo más fuerte.\n\nEl agua levantó la piedra, solo un poquito.\n\nLa piedra sintió miedo. La piedra quería quedarse.\n\nPero la piedra también quería ver.\n\nLa piedra se soltó.\n\nEl agua hizo rodar la piedra, suavemente. Solo un trecho río abajo.\n\nLa piedra se detuvo en un lugar nuevo. Era un lugar agradable. Había flores amarillas.\n\nLa piedra miró hacia atrás, hacia donde había estado.\n\n\"Eso fue aterrador,\" dijo la piedra. \"Y estoy bien.\"", "Había una piedra al lado de un pequeño río. La piedra había estado sentada en ese mismo lugar durante cien años, tal vez más. El musgo había crecido sobre la piedra. La piedra tenía una forma cómoda.\n\nCada día, la piedra miraba el río. El río corría. El río salpicaba. El río llevaba hojas y ramitas y algún pez ocasional adonde fuera que iba el río.\n\nLa piedra nunca había estado en ninguna parte.\n\nUna tarde, un pequeño pez plateado se detuvo cerca de la piedra.\n\n\"Siempre estás aquí,\" dijo el pez.\n\n\"Siempre estoy aquí,\" coincidió la piedra.\n\n\"¿Alguna vez has querido venir conmigo?\" preguntó el pez, agitando su cola hacia el agua corriente. \"Es lindo allá abajo. Hay un prado. Y un sauce. Y un lugar donde el río forma una pequeña charca que tiene ranas.\"\n\nLa piedra no dijo nada durante un largo rato.\n\nLuego la piedra dijo, muy bajito, \"Creo que sí quiero ir. Pero tengo miedo. Siempre he estado aquí.\"\n\nEl pez pensó en esto. El pez no era un pez muy viejo, pero el pez era amable.\n\n\"Puedes tener miedo,\" dijo el pez. \"Puedes tener miedo y aun así venir. Esas no son cosas opuestas.\"\n\nEl pez se fue nadando.\n\nLa piedra pensó en lo que había dicho el pez durante tres días más. La piedra pensó en ello durante una mañana soleada. La piedra pensó en ello durante una larga y silenciosa noche en que el río sonaba como cien vocecitas.\n\nY entonces, al cuarto día, llegó la lluvia.\n\nLa lluvia cayó toda la tarde. El río creció. El río se hizo más fuerte. El agua subió más alto por la orilla de lo que lo había hecho en muchos años y entonces tocó la piedra. Y entonces empujó la piedra, suavemente. Y entonces un poco más.\n\nLa piedra sintió que el agua intentaba levantarla. La piedra podía elegir afianzarse, aferrarse, quedarse.\n\nLa piedra tenía mucho, mucho miedo.\n\nPero la piedra recordó lo que había dicho el pez.\n\nLa piedra se soltó.\n\nEl río atrapó la piedra, suave como una mano, e hizo rodar la piedra despacio, suavemente por la orilla, alrededor de un recodo, junto a un sauce, junto a un prado, hasta llegar a una charca tranquila donde, tal como había dicho el pez, tres ranas estaban discutiendo sobre una hoja de nenúfar.\n\nLa piedra se detuvo allí. Era un buen lugar. La luz entraba por las hojas del sauce en suaves franjas verdes.\n\nLa piedra miró hacia atrás, por el camino que había venido.\n\n\"Eso,\" dijo la piedra, principalmente para sí misma, \"fue muy, muy aterrador.\"\n\nUna rana saltó sobre la piedra y se sentó allí.\n\n\"Y,\" dijo la piedra, \"estoy bien.\"", "Había una piedra al lado de un pequeño río, y la piedra había estado allí durante mucho tiempo. Lo suficiente como para que el musgo hubiera crecido espeso sobre la mitad superior. Lo suficiente como para que un terco helecho hubiera instalado su hogar en una de sus grietas. Lo suficiente como para que los ratones locales la consideraran parte de la geografía.\n\nNadie podía recordar un momento en que la piedra hubiera estado en otro lugar.\n\nLa piedra miraba el río. Eso era lo que hacía la piedra. El río era, según los estándares de la piedra, un espectáculo tremendo. Cada día mil cosas nuevas pasaban corriendo hojas, ramitas, el destello plateado de pequeños peces, una vez un pato que parecía extremadamente confundido sobre cómo había llegado allí. El río llevaba todo a otro lugar, algún sitio río abajo que la piedra nunca había visto.\n\nLa piedra se había estado preguntando por ese otro lugar durante mucho tiempo. Nunca lo había dicho en voz alta.\n\nUna tarde soleada, un joven pez plateado se detuvo cerca de la piedra, manteniéndose con facilidad contra la corriente.\n\n\"Siempre estás aquí,\" dijo ella.\n\n\"Siempre estoy aquí,\" coincidió la piedra.\n\n\"¿Alguna vez has querido venir conmigo?\" El pez agitó su cola hacia el recodo río abajo. \"Es lindo allá abajo. Hay un prado lleno de trébol. Un sauce con hojas como largas cintas verdes. Una charca tranquila donde el río se reduce y la luz se vuelve toda verde y dorada. Te gustaría.\"\n\nLa piedra estuvo en silencio durante un largo rato. El río seguía corriendo.\n\n\"Creo que sí quiero ir,\" dijo finalmente la piedra, con una voz tan baja que el pez casi la perdió. \"Pero tengo miedo. Nunca he estado en ninguna parte. No sé cómo estar en otro lugar.\"\n\nEl pez consideró esto. No era un pez viejo, pero había nacido en una corriente rápida, y las corrientes rápidas te enseñan ciertas cosas pronto.\n\n\"Puedes tener miedo,\" dijo ella, \"y aun así puedes venir. Esas no son cosas opuestas. La parte asustada no tiene que irse primero. Puede venir contigo.\"\n\nY entonces agitó su cola y desapareció río abajo.\n\nLa piedra pensó en lo que había dicho el pez durante tres días enteros. La piedra pensó en ello durante una brillante mañana azul cuando un martín pescador se zambulló tres veces. La piedra pensó en ello durante una larga tarde brumosa cuando el mundo desapareció y solo quedó el sonido del agua. La piedra pensó en ello durante una noche suave cuando un búho, en algún lugar río arriba, hacía una pregunta una y otra vez sin obtener nunca una respuesta.\n\nY entonces, al cuarto día, llegó la lluvia.\n\nLlovió toda la tarde. Llovió hasta entrada la noche. El río creció. El río se oscureció. El río subió más alto por la orilla de lo que lo había hecho en una generación, y al fin el agua alcanzó la piedra, y lamió la piedra, y empujó la piedra con una fuerza suave y persistente.\n\nLa piedra podía sentir al río preguntando. La piedra podía sentirse casi elevándose.\n\nLa piedra también podía sentir algo más, algo viejo y terco y asustado la parte de la piedra que quería, muchísimo, quedarse exactamente donde siempre había estado. Afianzarse. Esperar hasta que la lluvia parara y el río volviera a ser una historia que miraba de lejos.\n\nLa piedra estaba extremadamente asustada.\n\nY entonces la piedra recordó al pez. La piedra recordó: esas no son cosas opuestas.\n\nLa piedra se soltó.\n\nEl río tomó la piedra, suave como una mano, y la hizo rodar gentilmente por la orilla. Alrededor del recodo. Junto al sauce con las largas hojas verdes. Junto al prado que olía, incluso bajo la lluvia, a dulce trébol. Junto a un lugar donde el río formaba una pequeña cascada blanca y la piedra rodó, solo un poquito, y se sobresaltó, y de alguna manera, seguía estando bien.\n\nY entonces el río se calmó. Y la piedra vino a descansar en una charca tranquila, verde y dorada donde, tal como el pez había prometido, tres ranas estaban teniendo una discusión extremadamente comprometida sobre una hoja de nenúfar.\n\nLa lluvia cedió. El agua se asentó. La piedra yacía allí, mirando hacia arriba a través de las hojas del sauce a un cielo que ya empezaba a volverse rosado en los bordes.\n\n\"Eso,\" dijo la piedra, principalmente para sí misma, \"fue muy, muy aterrador.\"\n\nUna de las ranas, en plena discusión, saltó y se sentó encima de la piedra, como si la piedra hubiera estado allí desde siempre.\n\nUn trozo de musgo empezó, inmediatamente, a considerar sus opciones.\n\n\"Y,\" dijo la piedra, suavemente, \"estoy bien.\"\n\nRío arriba, en algún lugar fuera de la vista, un pez plateado agitó su cola una vez, y se fue.\n\n*Algo para pensar: La piedra tuvo miedo todo el tiempo, y la piedra aun así se soltó. ¿Hay algo aterrador que hayas hecho o que podrías intentar donde la parte asustada viene contigo, en lugar de esperar a que se vaya primero?*"],
      fr: ["Il y avait une pierre près de la rivière.\n\nLa pierre était assise là depuis très, très longtemps.\n\nLa pierre regardait l'eau. L'eau coulait et coulait.\n\n\"Je me demande ce que ça fait de bouger,\" dit la pierre.\n\nUn poisson passa en nageant. \"Tu pourrais essayer,\" dit le poisson.\n\n\"Je suis trop grosse,\" dit la pierre.\n\n\"Tu n'es pas trop grosse pour la rivière,\" dit le poisson.\n\nLa pierre y pensa pendant plusieurs jours.\n\nUn matin, la pluie vint. La rivière grossit. La rivière devint plus forte.\n\nL'eau souleva la pierre, juste un peu.\n\nLa pierre eut peur. La pierre voulait rester.\n\nMais la pierre voulait aussi voir.\n\nLa pierre se laissa aller.\n\nL'eau fit rouler la pierre, doucement. Juste un petit bout en aval.\n\nLa pierre s'arrêta dans un endroit nouveau. C'était un bel endroit. Il y avait des fleurs jaunes.\n\nLa pierre regarda en arrière vers l'endroit où elle avait été.\n\n\"C'était effrayant,\" dit la pierre. \"Et je vais bien.\"", "Il y avait une pierre au bord d'une petite rivière. La pierre était restée à cet endroit exact pendant cent ans, peut-être plus. De la mousse avait poussé sur la pierre. La pierre avait une forme confortable.\n\nChaque jour, la pierre regardait la rivière. La rivière coulait. La rivière éclaboussait. La rivière emportait des feuilles et des brindilles et le poisson occasionnel jusqu'où qu'elle aille.\n\nLa pierre n'avait jamais été nulle part.\n\nUn après-midi, un petit poisson argenté s'arrêta près de la pierre.\n\n\"Tu es toujours ici,\" dit le poisson.\n\n\"Je suis toujours ici,\" approuva la pierre.\n\n\"Tu n'as jamais voulu venir avec moi?\" demanda le poisson, agitant sa queue vers l'eau qui coulait. \"C'est joli en bas. Il y a une prairie. Et un saule. Et un endroit où la rivière fait un petit bassin avec des grenouilles dedans.\"\n\nLa pierre ne dit rien pendant un long moment.\n\nPuis la pierre dit, très doucement, \"Je crois que je veux bien venir. Mais j'ai peur. J'ai toujours été ici.\"\n\nLe poisson y pensa. Le poisson n'était pas un très vieux poisson, mais le poisson était gentil.\n\n\"Tu peux avoir peur,\" dit le poisson. \"Tu peux avoir peur et venir quand même. Ce ne sont pas des choses opposées.\"\n\nLe poisson s'éloigna en nageant.\n\nLa pierre pensa à ce qu'avait dit le poisson pendant trois jours de plus. La pierre y pensa pendant un matin ensoleillé. La pierre y pensa pendant une longue nuit silencieuse où la rivière sonnait comme cent petites voix.\n\nEt puis, le quatrième jour, la pluie vint.\n\nLa pluie tomba tout l'après-midi. La rivière grossit. La rivière devint plus forte. L'eau monta plus haut sur la berge qu'elle ne l'avait fait depuis bien des années et puis elle toucha la pierre. Et puis elle poussa la pierre, doucement. Et puis un peu plus.\n\nLa pierre sentit l'eau essayer de la soulever. La pierre pouvait choisir de s'enraciner, de s'accrocher, de rester.\n\nLa pierre avait très, très peur.\n\nMais la pierre se souvint de ce qu'avait dit le poisson.\n\nLa pierre se laissa aller.\n\nLa rivière prit la pierre, douce comme une main, et fit rouler la pierre lentement, doucement le long de la berge, autour d'un méandre, près d'un saule, près d'une prairie, jusqu'à un bassin tranquille où, tout comme l'avait dit le poisson, trois grenouilles avaient une dispute à propos d'une feuille de nénuphar.\n\nLa pierre s'arrêta là. C'était un bon endroit. La lumière passait à travers les feuilles du saule en douces bandes vertes.\n\nLa pierre regarda en arrière, le chemin qu'elle avait fait.\n\n\"Ça,\" dit la pierre, surtout à elle-même, \"c'était très, très effrayant.\"\n\nUne grenouille sauta sur la pierre et s'assit là.\n\n\"Et,\" dit la pierre, \"je vais bien.\"", "Il y avait une pierre au bord d'une petite rivière, et la pierre était là depuis longtemps. Assez longtemps pour que de la mousse ait poussé épaisse sur sa moitié supérieure. Assez longtemps pour qu'une petite fougère obstinée ait installé son foyer dans l'une de ses fissures. Assez longtemps pour que les souris locales la considèrent comme faisant partie de la géographie.\n\nPersonne ne pouvait se souvenir d'une époque où la pierre avait été ailleurs.\n\nLa pierre regardait la rivière. C'est ce que la pierre faisait. La rivière était, selon les standards de la pierre, un spectacle formidable. Chaque jour, mille choses nouvelles passaient en trombe des feuilles, des brindilles, le scintillement argenté de petits poissons, une fois un canard qui avait l'air extrêmement confus sur la façon dont il était arrivé là. La rivière emportait tout vers un autre endroit, quelque part en aval que la pierre n'avait jamais vu.\n\nLa pierre s'interrogeait sur cet autre endroit depuis très longtemps. Elle ne l'avait jamais dit à voix haute.\n\nUn après-midi ensoleillé, un jeune poisson argenté s'arrêta près de la pierre, se maintenant aisément contre le courant.\n\n\"Tu es toujours ici,\" dit-elle.\n\n\"Je suis toujours ici,\" approuva la pierre.\n\n\"Tu n'as jamais voulu venir avec moi?\" Le poisson agita sa queue vers le méandre en aval. \"C'est joli en bas. Il y a une prairie pleine de trèfle. Un saule avec des feuilles comme de longs rubans verts. Un bassin tranquille où la rivière ralentit et la lumière devient toute verte et dorée. Tu aimerais.\"\n\nLa pierre resta silencieuse pendant un long moment. La rivière continuait à couler.\n\n\"Je crois que je veux bien venir,\" dit la pierre, enfin, d'une voix si basse que le poisson l'a presque manquée. \"Mais j'ai peur. Je n'ai jamais été nulle part. Je ne sais pas comment être ailleurs.\"\n\nLe poisson y réfléchit. Ce n'était pas un vieux poisson, mais elle était née dans un courant rapide, et les courants rapides t'apprennent certaines choses tôt.\n\n\"Tu peux avoir peur,\" dit-elle, \"et tu peux quand même venir. Ce ne sont pas des choses opposées. La partie effrayée n'a pas besoin de partir d'abord. Elle peut venir avec toi.\"\n\nEt puis elle agita sa queue et disparut en aval.\n\nLa pierre pensa à ce qu'avait dit le poisson pendant trois jours entiers. La pierre y pensa pendant un matin bleu et brillant où un martin-pêcheur plongea trois fois. La pierre y pensa pendant une longue soirée brumeuse où le monde disparut et où il ne resta que le son de l'eau. La pierre y pensa pendant une nuit douce où un hibou, quelque part en amont, posait une question encore et encore sans jamais vraiment obtenir de réponse.\n\nEt puis, le quatrième jour, la pluie vint.\n\nIl plut tout l'après-midi. Il plut jusque dans la soirée. La rivière grossit. La rivière s'assombrit. La rivière monta plus haut sur la berge qu'elle ne l'avait fait depuis une génération, et enfin l'eau atteignit la pierre, et lécha la pierre, et poussa la pierre avec une force douce et persistante.\n\nLa pierre pouvait sentir la rivière demander. La pierre pouvait se sentir presque se soulever.\n\nLa pierre pouvait aussi sentir autre chose, quelque chose de vieux et obstiné et effrayé la partie de la pierre qui voulait, vraiment beaucoup, rester exactement où elle avait toujours été. S'enraciner. Attendre que la pluie cesse et que la rivière redevienne une histoire qu'elle regardait à distance.\n\nLa pierre était extrêmement effrayée.\n\nEt puis la pierre se souvint du poisson. La pierre se souvint: ce ne sont pas des choses opposées.\n\nLa pierre se laissa aller.\n\nLa rivière prit la pierre, douce comme une main, et la fit rouler doucement le long de la berge. Autour du méandre. Près du saule aux longues feuilles vertes. Près de la prairie qui sentait, même sous la pluie, le doux trèfle. Près d'un endroit où la rivière faisait une petite cascade blanche et la pierre culbuta, juste un peu, et fut surprise, et était, en quelque sorte, toujours bien.\n\nEt puis la rivière ralentit. Et la pierre vint se reposer dans un bassin tranquille, vert et doré où, tout comme l'avait promis le poisson, trois grenouilles avaient une dispute extrêmement engagée à propos d'une feuille de nénuphar.\n\nLa pluie s'apaisa. L'eau se calma. La pierre était couchée là, regardant à travers les feuilles du saule un ciel qui commençait déjà à devenir rose sur les bords.\n\n\"Ça,\" dit la pierre, surtout à elle-même, \"c'était très, très effrayant.\"\n\nUne des grenouilles, en pleine dispute, sauta et s'assit sur la pierre, comme si la pierre avait toujours été là.\n\nUn morceau de mousse commença, immédiatement, à considérer ses options.\n\n\"Et,\" dit la pierre, doucement, \"je vais bien.\"\n\nEn amont, quelque part hors de vue, un poisson argenté agita sa queue une fois, et fut parti.\n\n*Quelque chose à méditer: La pierre a eu peur tout le temps, et la pierre s'est quand même laissée aller. Y a-t-il quelque chose d'effrayant que tu as fait ou que tu pourrais essayer où la partie effrayée vient avec toi, au lieu d'attendre qu'elle parte d'abord?*"]
