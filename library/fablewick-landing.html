s'est avéré, était la chose la plus courageuse de toutes.", "Franklin Delano Roosevelt adorait l'océan plus que presque toute autre chose au monde.\n\nQuand Franklin était un petit garçon, sa famille passait chaque été dans un endroit appelé Campobello. Une île verte et calme juste au large de la côte de New Brunswick, au Canada, où l'eau était si froide qu'elle faisait vibrer vos os et le ciel était si grand qu'il vous faisait vous sentir petit d'une manière merveilleuse. Franklin a appris à naviguer avant d'apprendre à écrire une lettre correcte. Il nageait dans une eau qui rendait ses doigts blancs. Il escaladait les rochers mouillés et sombres pieds nus. Il pouvait ramer un lourd bateau en bois tout seul quand d'autres garçons de son âge pouvaient à peine soulever les rames.\n\n\"Tu es fait de vent et d'eau, Franklin,\" lui a dit sa mère une fois, en le regardant tendre une voile contre le vent.\n\nFranklin l'a crue, parce que cela semblait vrai. Ses jambes étaient fortes et rapides. Ses bras étaient plus forts. Sa poitrine était pleine d'air froid et salé.\n\nIl a grandi. Il est allé à l'école, puis à la faculté de droit. Il a épousé une femme réfléchie et sérieuse nommée Eleanor, qui se révélerait plus tard être l'une des grandes personnes de sa vie. Peut-être la plus importante. Bien qu'aucun des deux ne le savait encore. Il est entré en politique, parce qu'il croyait que la politique était un endroit où on pouvait vraiment aider les gens, et pas seulement dire qu'on le voulait.\n\nEt puis, un été, Franklin était un homme adulte de trente-neuf ans maintenant, avec cinq enfants à lui, il est retourné à Campobello. Il a nagé dans la même eau froide dans laquelle il avait nagé toute sa vie. Il a poursuivi un petit feu sur le rivage avec ses enfants, en riant. Il est rentré ce soir-là fatigué, mais une sorte de fatigue normale. Il est allé se coucher.\n\nQuand il s'est réveillé le lendemain matin, ses jambes ne fonctionnaient pas.\n\nLa maladie, ont finalement dit les docteurs, était la polio.\n\nC'était un été dur et effrayant. Eleanor est restée à ses côtés. Les docteurs allaient et venaient. Ils ont essayé des bains chauds, et des bains froids, et des exercices, et des appareils. Tout le monde espérait, très silencieusement, une fin différente de celle qu'ils sentaient venir. Après plusieurs longues semaines, l'un des docteurs a finalement dit les mots que Franklin avait déjà commencé à soupçonner.\n\n\"M. Roosevelt,\" a dit le docteur, de la voix douce que les docteurs utilisent quand ils ont quelque chose de difficile à annoncer, \"vous ne marcherez plus jamais.\"\n\nFranklin est resté silencieux pendant très longtemps. Eleanor était silencieuse à côté de lui. À l'extérieur de la fenêtre, la mer sonnait comme la mer avait toujours sonné. Lointaine, et calme, et patiente.\n\nEnfin, Franklin a parlé.\n\n\"Cela,\" a-t-il dit, lentement, \"est une chose. Il y a beaucoup d'autres choses.\"\n\nCe qui s'est passé ensuite ne s'est pas passé rapidement. Cela a pris des années.\n\nIl a travaillé. Il a travaillé plus dur qu'il n'avait jamais travaillé dans sa vie. Pas à courir ou à sauter, qui lui étaient maintenant fermés, mais aux parties de son corps qui répondaient encore quand il les appelait. Ses épaules. Ses bras. Sa poitrine. Il a appris à soulever son propre poids avec rien d'autre que ses bras. Il nageait dans des piscines chaudes, parce que les piscines chaudes étaient l'un des rares endroits où ses jambes pouvaient se souvenir de ce que c'était de bouger. Il a acheté un terrain à Warm Springs, en Georgia, où l'eau était chaude toute l'année, et il l'a transformé en un endroit où d'autres enfants atteints de polio pouvaient venir nager aussi.\n\nIl a appris à utiliser un fauteuil roulant comme s'il s'agissait d'un outil, pas d'une punition. Il a appris comment se soulever, avec ses bras seuls, dans et hors d'une voiture. Il a appris à se tenir debout pendant quelques moments à la fois sur de lourds appareils en métal, se tenant fermement à un podium, souriant à une foule, et très peu d'entre eux ont jamais deviné ce que cela lui coûtait.\n\nLe plus important, et c'est la partie que Franklin lui-même n'a pas comprise pendant longtemps, il a appris à diriger une salle depuis une chaise de la même manière qu'il dirigeait une salle debout. Il l'a fait en étant la personne la plus calme dans la pièce.\n\nEt puis son pays a eu besoin de lui.\n\nIl y a eu une grande tempête économique. Les journaux l'ont appelée une Dépression. Les banques ont fermé. Les fermes se sont vidées. Les gens qui avaient travaillé toute leur vie ne pouvaient pas acheter de pain. Puis, juste au moment où la tempête se levait, une grande guerre a traversé l'océan depuis l'Europe, et le pays de Franklin a dû décider s'il fallait défendre le reste du monde. Les gens avaient peur. Les gens étaient épuisés. Les gens n'étaient plus sûrs que les choses pourraient aller bien.\n\nFranklin s'est présenté à la présidence, et il a gagné. Pas une fois, mais quatre fois de suite. La seule personne dans l'histoire de son pays à faire cela. Il s'est assis dans sa chaise, dans son grand bureau à Washington, et il a parlé à son pays à la radio, d'une voix calme et stable qui sonnait comme s'il était assis à la table de la cuisine avec vous. Il a appelé ces causeries radiophoniques ses \"Fireside Chats.\" Il a dit au pays, doucement et fermement, qu'ils n'étaient pas seuls. Il leur a dit que la peur elle-même était la seule chose dont ils avaient vraiment besoin d'avoir peur. Il leur a dit, de cent manières différentes, qu'ils allaient s'en sortir.\n\nFranklin Delano Roosevelt n'a plus jamais marché.\n\nMais chaque seul jour, à travers la dépression, et la guerre, et l'épuisement qui aurait brisé un homme plus silencieux, il était présent.\n\nEt être présent, il s'est avéré, était la chose la plus courageuse de toutes.\n\nQuelque chose à méditer: Franklin a perdu la chose qu'il aimait le plus. Être fort dans son corps. Et il a appris une autre sorte de force à mettre à sa place. Qu'y a-t-il de difficile dans ta propre vie qui pourrait t'enseigner une force pour laquelle tu n'as pas encore de mots?"]

// ─── STATE ────────────────────────────────────────────────────

// Restore language from localStorage so it persists across reloads + the reader page
const LANG_KEY = 'fablewick.lang';
const SUPPORTED_LANGS = ['en', 'hi', 'gu', 'es', 'fr'];
let currentLang = (() => {
  try {
    const saved = localStorage.getItem(LANG_KEY);
    return SUPPORTED_LANGS.includes(saved) ? saved : 'en';
  } catch (e) { return 'en'; }
})();
const activeLevels = {};
books.forEach((b, i) => { activeLevels[i] = 0; });

// ─── RENDER ───────────────────────────────────────────────────

function renderGrid() {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  const levelLabels = i18n.levelLabels[currentLang];
  const agePrefix = i18n.agePrefix[currentLang];

  books.forEach((book, idx) => {
    const card = document.createElement('article');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="card-hero" data-read="${idx}" role="button" tabindex="0" aria-label="Read ${book.title[currentLang]}">
        <img src="../src/assets/heroes/hero-${book.slug}.jpg"
             alt="${book.title[currentLang]}"
             loading="lazy">
        <span class="age-badge color-${book.color}">${agePrefix} ${book.age}</span>
      </div>
      <div class="card-body">
        <h2 class="card-title">${book.title[currentLang]}</h2>
        <p class="card-summary">${book.summary[currentLang]}</p>
        <p class="card-lesson">${book.lesson[currentLang]}</p>
        <button class="read-btn" data-read="${idx}">Read story <span class="arr">→</span></button>
        <div class="card-tags">
          ${(book.themes[currentLang] || book.themes.en).map(t =>
            `<span class="tag color-${book.color}">${t}</span>`
          ).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Attach Read-story listeners (button + clickable thumbnail)
  document.querySelectorAll('[data-read]').forEach(el => {
    el.addEventListener('click', function() {
      const bookIdx = parseInt(this.dataset.read);
      openReader(bookIdx, activeLevels[bookIdx]);
    });
    // Keyboard support for the thumbnail role="button"
    if (el.classList.contains('card-hero')) {
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const bookIdx = parseInt(this.dataset.read);
          openReader(bookIdx, activeLevels[bookIdx]);
        }
      });
    }
  });
}

// ─── HELPERS ──────────────────────────────────────────────────
function truncate(s, n) {
  if (!s) return '';
  if (s.length <= n) return s;
  // Cut at last word boundary before n
  let cut = s.slice(0, n);
  const lastSpace = cut.lastIndexOf(' ');
  if (lastSpace > n * 0.6) cut = cut.slice(0, lastSpace);
  return cut.trim() + '…';
}

// ─── READER MODAL ─────────────────────────────────────────────
let readerBookIdx = 0;
let readerLevelIdx = 0;

function openReader(bookIdx, levelIdx) {
  // Every book opens its dedicated illustrated flip-book reader (all 11 built)
  const slug = books[bookIdx].slug;
  if (slug) {
    window.location.href = 'reader-' + slug + '.html';
    return;
  }
  readerBookIdx = bookIdx;
  readerLevelIdx = levelIdx;
  const book = books[bookIdx];
  document.getElementById('readerTitle').textContent = book.title[currentLang] || book.title.en;
  renderReaderLevels();
  renderReaderBody();
  document.getElementById('readerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  document.getElementById('readerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderReaderLevels() {
  const wrap = document.getElementById('readerLevels');
  const labels = i18n.levelLabels[currentLang];
  wrap.innerHTML = labels.map((l, i) =>
    `<button class="reader-level-btn${i === readerLevelIdx ? ' active' : ''}" data-level="${i}">${l}</button>`
  ).join('');
  wrap.querySelectorAll('.reader-level-btn').forEach(b => {
    b.addEventListener('click', function() {
      readerLevelIdx = parseInt(this.dataset.level);
      renderReaderLevels();
      renderReaderBody();
    });
  });
}

function renderReaderBody() {
  const body = document.getElementById('readerBody');
  const levels = books[readerBookIdx].levels;
  // Pick the current language; fall back to English if this book isn't translated yet
  const localized = (levels && levels[currentLang]) ? levels[currentLang] : levels.en;
  const text = (localized && localized[readerLevelIdx]) || '';
  body.innerHTML = text.split(/\n\s*\n/).map(p => `<p>${escapeHtml(p.trim())}</p>`).join('');
  body.scrollTop = 0;
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('readerClose').addEventListener('click', closeReader);
  document.getElementById('readerModal').addEventListener('click', e => {
    if (e.target.id === 'readerModal') closeReader();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeReader();
  });
});

function updateStaticText() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[key] && i18n[key][currentLang]) {
      el.innerHTML = i18n[key][currentLang];
    }
  });
  // Nav links: data-i18n-nav="home" -> i18n.nav.home[lang]
  document.querySelectorAll('[data-i18n-nav]').forEach(el => {
    const key = el.dataset.i18nNav;
    if (i18n.nav && i18n.nav[key] && i18n.nav[key][currentLang]) {
      el.textContent = i18n.nav[key][currentLang];
    }
  });
  // About section: data-i18n-about="heading" -> i18n.about.heading[lang]
  // Uses innerHTML so the co-author hyperlink renders (data is trusted, written by us)
  document.querySelectorAll('[data-i18n-about]').forEach(el => {
    const key = el.dataset.i18nAbout;
    if (i18n.about && i18n.about[key] && i18n.about[key][currentLang]) {
      el.innerHTML = i18n.about[key][currentLang];
    }
  });
}

function switchLanguage(lang) {
  if (lang === currentLang) return;

  // Fade out
  const fadeEls = document.querySelectorAll('.fade-text');
  fadeEls.forEach(el => el.classList.add('fading'));

  // Also fade cards
  const cards = document.querySelectorAll('.book-card');
  cards.forEach(c => { c.style.opacity = '0'; c.style.transition = 'opacity 0.2s ease'; });

  setTimeout(() => {
    currentLang = lang;
    // Persist so it survives page reloads + carries to the Kitchen of Love reader
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}

    // Update lang buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // Update HTML lang attribute
    document.documentElement.lang = lang;

    // Re-render
    updateStaticText();
    renderGrid();

    // Fade in
    fadeEls.forEach(el => el.classList.remove('fading'));
    const newCards = document.querySelectorAll('.book-card');
    requestAnimationFrame(() => {
      newCards.forEach(c => { c.style.opacity = '1'; c.style.transition = 'opacity 0.3s ease'; });
    });
  }, 200);
}

// ─── INIT ─────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  // Sync the active lang button + html[lang] to the persisted language
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
  document.documentElement.lang = currentLang;

  updateStaticText();
  renderGrid();

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => switchLanguage(btn.dataset.lang));
  });
});

// ─── DUSK THEME starfield — small twinkling 4-point stars ──────
(function () {
  var sky = document.getElementById('starfield');
  if (!sky) return;
  var spark = '<svg viewBox="0 0 24 24" width="100%" height="100%" aria-hidden="true"><path d="M12 0 L13.5 10.5 L24 12 L13.5 13.5 L12 24 L10.5 13.5 L0 12 L10.5 10.5 Z" fill="#FFF6E0"/></svg>';
  var n = Math.max(34, Math.min(90, Math.round(window.innerWidth * window.innerHeight / 15000)));
  for (var i = 0; i < n; i++) {
    var s = document.createElement('div');
    s.className = 'twk';
    var size = (3 + Math.random() * 6).toFixed(1);
    s.style.left = (Math.random() * 99).toFixed(1) + '%';
    s.style.top = (Math.random() * 90).toFixed(1) + '%';
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animation = 'fwTw ' + (2.4 + Math.random() * 3.2).toFixed(2) + 's ease-in-out ' + (Math.random() * 6).toFixed(2) + 's infinite';
    s.innerHTML = spark;
    sky.appendChild(s);
  }
})();
</script>
